    questions:
      - number: 1
        question: "Q042: Design a feature flag system. Engineers should be able to enable features for 1%, 10%, or 100% of users without a deployment."
        needed: "flag config in Redis/DB: {flag_id, percentage, user_cohorts, enabled}; SDK evaluates on client using consistent hash(user_id + flag_id) % 100 < percentage; SSE or polling for flag updates"
        answer: "Flag schema: {flag_id VARCHAR PK, enabled BOOL, rollout_percentage INT (0–100), target_user_ids TEXT[] (override), target_cohorts TEXT[] (e.g., 'beta_users')}. Evaluation SDK (client-side, in every service): is_enabled(flag_id, user_id) → consistent_hash(user_id + ':' + flag_id) % 100 < rollout_percentage. The hash is deterministic: same user always gets same result for same flag. Rollout from 0% to 10%: users in buckets 0-9 see the flag. Expand to 20%: users in buckets 0-19. Monotonically adds users — bucket 0-9 users never lose the flag when you expand. Flag store: Redis HGETALL 'flags:{service_name}' → all flags for a service, JSON-encoded. SDK caches locally (30s TTL). Push updates via SSE or Redis Pub/Sub: when a flag is updated, publish to 'flag-updates' channel → all SDK instances re-fetch immediately. Admin UI: simple CRUD on flag configs. Audit log: every flag change logged (who, what, when, old_value, new_value)."
        tradeoff: "Client-side evaluation (hash in SDK) vs. server-side evaluation (RPC to flag service): client-side: no latency per request (cached locally), no single point of failure (flag service can be down, SDK uses cached values). Server-side: stronger consistency (flag changes propagate in <1s), supports complex rules (user behavior attributes). Client-side is correct for simple rollout percentages; server-side for complex targeting rules."
        caveat: "Multiple flags interacting: flag A gates feature X, flag B gates feature Y, feature Z requires both A and B. Flag dependencies can create combinatorial explosions. Avoid dependent flags in the SDK — it becomes an unmanageable state machine. Instead: create a single flag 'feature_z' that encapsulates the combined condition. Flags should be independent, orthogonal controls."
        watch: "Canary analysis follow-up: enable a flag for 1% of users, monitor error rate for 30 minutes, auto-rollback if error rate increases >0.1%. Integration with deployment system: feature flag system exposes a 'canary_analysis' endpoint. Deployment pipeline calls it after rollout to check statistical significance of error rate difference between flag=on and flag=off cohorts. This is progressive delivery — flags become the mechanism for safe deployments, not just feature control."
        related_problems: []
        related_fundamentals: []

      - number: 2
        question: "Q053: Design a priority job queue where premium users' jobs run before free-tier users' jobs. Jobs have SLAs: premium ≤ 5 min, free ≤ 60 min."
        needed: "separate Redis lists per priority: RPUSH 'jobs:premium' and 'jobs:free'; workers use BLPOP with priority ordering: try premium first, fall back to free; track SLA via enqueue_time + job metadata"
        answer: "Queue structure: Redis lists 'jobs:premium' (SLA: 5 min), 'jobs:standard' (SLA: 30 min), 'jobs:free' (SLA: 60 min). Job schema: {job_id UUID, user_id, priority, payload, enqueued_at, sla_seconds}. Enqueue: RPUSH 'jobs:{priority}' job_json. Workers: 100 total. Priority allocation: 70 workers dedicated to premium, 20 to standard, 10 to free. Within each tier, workers use BLPOP with 1s timeout. If premium queue is empty, premium workers can steal from standard (work stealing). If standard is also empty, steal from free. This ensures premium workers don't idle when no premium jobs are queued. SLA monitoring: worker records job_started_at. If now() - enqueued_at > 0.8 × sla_seconds → alert (SLA at risk). Job completion: DEL 'job_result:{job_id}' after TTL (24h). Dead letter: jobs retried 3× with failures → RPUSH 'jobs:dead_letter' for manual inspection."
        tradeoff: "Separate queues per priority vs. single queue with priority score (Redis sorted set): separate queues: simple BLPOP, each tier isolated. Sorted set: single queue, ZPOPMIN gets lowest score. Sorted set advantage: dynamic reprioritization (ZADD updates score). Separate queues advantage: tier isolation — a flood of free jobs cannot starve the free queue workers from draining (workers are allocated, not shared). For strict SLA isolation, separate queues are correct."
        caveat: "Priority inversion: a free-tier job enqueued 50 minutes ago approaches its 60-minute SLA. Meanwhile, premium queue has 100 jobs queued (premium workers are busy). The free job will miss SLA. Detection: SLA monitoring daemon checks oldest job per queue every 30s. If oldest job age > 0.9 × sla_seconds → temporarily pull a premium worker to help drain free queue. Alert on-call engineer. This prevents systematic SLA misses without permanently reducing premium capacity."
        watch: "Job result retrieval follow-up: after submitting a job, how does the client poll for results? Options: 1) Polling: client polls GET /jobs/{job_id}/result every 5s until status=complete. 2) Webhook: client provides callback_url in job submission; worker POSTs result to callback_url when done. 3) SSE: client holds open SSE connection on /jobs/{job_id}/stream; worker pushes result. For browser-based clients: SSE. For server-to-server: webhook. For CLI tools: polling. The job schema includes callback_url (optional), and the worker sends webhook + stores result in Redis for polling regardless."
        related_problems: []
        related_fundamentals: [storage/redis]

      - number: 3
        question: "Q054-Q055: Design a centralized logging system for 500 microservices generating 50GB/day of logs. Logs must be searchable by service, log level, trace_id, and time range within 30 seconds of emission."
        needed: "Fluentd/Vector agents on each host → Kafka → Elasticsearch (or OpenSearch); structured logs JSON format; index by timestamp + service + level + trace_id; retention: 7 days hot, 30 days warm, S3 cold"
        answer: "Log pipeline: each microservice logs in structured JSON: {timestamp, service_name, level, trace_id, span_id, message, context}. Fluentd or Vector agent on each host: tails stdout/file, buffers locally (disk-backed buffer, 1GB), ships to Kafka topic 'logs' (50 partitions). Kafka: 50GB/day = 578KB/s ingestion. 50 partitions × 12KB/s per partition. Log ingestion workers (50): read from Kafka → write to Elasticsearch index 'logs-{YYYY-MM-DD}'. Elasticsearch index settings: 1 shard per day (daily rollover), 2 replicas. Index mapping: keyword type for service_name, level, trace_id (exact match). Text type for message (full-text search). Timestamp as date type. Query: GET /logs-2024-01-15/_search with filter: {service: 'payment-service', level: 'ERROR', range: {timestamp: {gte: 'now-1h'}}}. Latency: log emitted → Kafka (10ms) → Elasticsearch indexed (20s) = 20s. Within 30s SLA. Retention: ILM (Index Lifecycle Management): hot (0-7 days, SSD), warm (7-30 days, HDD, read-only), cold (30-90 days, S3 via Elasticsearch snapshots), delete (>90 days)."
        tradeoff: "Elasticsearch vs. ClickHouse for log storage: Elasticsearch: full-text search on message field, exact match on structured fields, 30s indexing latency. ClickHouse: 50× faster analytical queries (GROUP BY service, level for dashboards), no full-text search. If 80% of queries are analytical (count errors by service per hour) and 20% are exploratory (find logs matching 'NullPointerException'), use ClickHouse + Elasticsearch together: ClickHouse for analytics, Elasticsearch for full-text search."
        caveat: "Log cardinality explosion: if developers add high-cardinality fields (user_id, request_id, session_id) to Elasticsearch mappings, the inverted index size explodes. 50GB logs × 1000 unique user_ids = 50K unique field values × inverted index = 10× storage overhead. Policy: use keyword type only for low-cardinality fields (<10K unique values). High-cardinality fields (user_id): store as text, not indexed, or use ClickHouse instead (handles high cardinality efficiently)."
        watch: "Distributed tracing integration: each log record has trace_id. To see all logs across 500 services for a single user request, query Elasticsearch: filter by trace_id = '$UUID'. Returns all log lines from all services in chronological order for that request. This is the killer feature of structured logging — trace_id is the join key across the distributed system. Combine with OpenTelemetry: spans in Jaeger for timing, logs in Elasticsearch for context, both linked by trace_id."
        related_problems: []
        related_fundamentals: []

      - number: 4
        question: "Q056-Q057: Design a multi-tenant SaaS platform. 5000 tenants, ranging from startups (100 users) to enterprise (100K users). Each tenant's data must be isolated."
        needed: "tenant_id column on every table + row-level security (PostgreSQL RLS); separate database schemas per enterprise tenant; separate DB instances for tenants with PCI/HIPAA requirements; connection pooling via PgBouncer per tenant"
        answer: "Three isolation tiers: Tier 1 (SMB, <1000 users): shared database, shared schema, tenant_id on every table. PostgreSQL Row-Level Security: CREATE POLICY tenant_isolation ON orders USING (tenant_id = current_setting('app.tenant_id')::uuid). Application sets tenant_id at connection start: SET app.tenant_id = '{tenant_uuid}'. All queries automatically filtered. Tier 2 (Mid-market, 1K-50K users): shared database, separate schema per tenant (Postgres schemas, not databases). Schema = tenant1.orders, tenant2.orders. Cross-tenant queries impossible at schema level. Each tenant gets dedicated connection pool (PgBouncer). Tier 3 (Enterprise, >50K users or compliance requirements): separate database instance (RDS per tenant). Full isolation at DB level. Tenant routing: each API request includes X-Tenant-ID header. Auth middleware validates JWT → extracts tenant_id → looks up tier + connection string from tenant registry (Redis cache). Routes request to correct DB connection pool."
        tradeoff: "Shared DB (tenant_id column) vs. separate DB per tenant: shared DB: efficient resource usage (5000 tenants in one DB), easy cross-tenant analytics. Security: one SQL injection can expose all tenants. Separate DB: full isolation, compliance-friendly, but 5000 DB instances = $5M/month on RDS. Correct approach: tiered isolation — shared for SMB, isolated for enterprise. Enterprise pays for the isolation cost."
        caveat: "Noisy neighbor: a large tenant runs a complex report that hammers the shared database. All other tenants on the same DB are degraded. Mitigation: query timeout per tenant (SET statement_timeout = 30s). Read replicas: heavy reports routed to read replica, not primary. Rate limiting per tenant: max 100 concurrent queries per tenant (tracked in Redis). Upgrade noisy neighbor to a dedicated DB (Tier 3) earlier than their user count warrants."
        watch: "Schema migration across 5000 tenants: deploying a new column to all tenants. Approach: online DDL (ALTER TABLE ... ADD COLUMN ... DEFAULT NULL) runs in background without locking (PostgreSQL 11+). For Tier 1 (shared DB): one migration per table. For Tier 2 (per-schema): 5000 migrations. Run in parallel across schemas with pg_migrate or a custom migration runner. Canary: run migration on 1 tenant schema first, verify, then batch the rest. Rollback: ALTER TABLE DROP COLUMN (data is already NULL, fast). New columns are always nullable at first — backfill data asynchronously."
