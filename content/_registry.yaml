      - number: 88
        question: "How do systems deliver low-latency live streaming?"
        needed: "RTMP ingest → HLS chunked (2s segments) → edge CDN; LL-HLS for sub-3s latency"
        answer: "Broadcaster pushes video via RTMP or WebRTC to an ingest server. The ingest server transcodes in real time to multiple bitrates and creates 2-second HLS segments. Segments are pushed to CDN edge nodes as they're created (push-based, not pull). LL-HLS (Low Latency HLS) uses HTTP/2 push and partial segment serving to reduce glass-to-glass latency below 3 seconds — compared to 6–10s for standard HLS."
        tradeoff: "RTMP ingest is widely supported by streaming software (OBS, XSplit) but is TCP-based — buffering on packet loss adds latency. WebRTC is lower latency (sub-second) and UDP-based but requires a WHIP/WHEP server and is less universally supported by stream software."
        caveat: "CDN push-based segment distribution adds coordination complexity — the CDN must be notified of new segments before viewers request them. Alternative: CDN pulls from origin on miss, but this adds one segment duration (~2s) of latency on cold starts at new PoPs."
        watch: "Live stream latency compounds: RTMP ingest buffer (1–2s) + transcoding (1–2s) + segment creation (2s) + CDN propagation (0.5s) + player buffer (3–5s) = 7–12s total. LL-HLS and WebRTC attack each stage independently to get below 3 seconds."
        related_fundamentals: [networking/cdn]
      - number: 89
        question: "How do systems store large video libraries?"
        needed: "tiered storage: hot (S3 Standard) → warm (S3-IA after 30d) → cold (Glacier after 1yr)"
        answer: "Use S3 Intelligent-Tiering or explicit lifecycle rules: videos accessed in the last 30 days stay on S3 Standard ($0.023/GB). Videos inactive for 30–365 days move to S3 Standard-IA ($0.0125/GB, 2x cheaper). Videos inactive for 1+ year move to Glacier Instant Retrieval ($0.004/GB, 6x cheaper than Standard). The total video library costs ~$0.004–0.023/GB/month depending on access pattern."
        tradeoff: "S3 Intelligent-Tiering automatically optimizes costs with no retrieval fees and no performance difference for Standard vs. Standard-IA. Manual lifecycle rules are simpler to reason about but require tuning the transition thresholds. For video platforms with highly skewed access (new videos get 95% of views), manual rules work well."
        caveat: "Glacier retrieval has a minimum storage duration of 90 days and retrieval latency of milliseconds to hours depending on retrieval class. Don't put videos in Glacier if users might want to rewatch them — use Glacier only for archival content you're legally required to retain but don't expect users to access."
        watch: "Video encoding formats become obsolete — H.264 content encoded 5 years ago may need re-encoding to HEVC or AV1 for newer devices. Plan for periodic re-transcoding of your archive. Store original source files in Glacier — you'll need them for future re-transcodes."
      - number: 90
        question: "How do platforms handle viral traffic spikes?"
        needed: "CDN absorbs 95%+ of reads; origin protected by CDN shield; auto-scale origin for cache misses"
        answer: "CDN absorbs 95%+ of read traffic for viral content — a viral video viewed 10M times costs 10M CDN hits, not 10M origin hits. Enable CDN Shield (CloudFront Origin Shield): a single regional origin shield node aggregates all CDN PoP cache misses into a single request to the origin, reducing origin load from thousands of cache misses to a handful. Auto-scale origin servers for the remaining cache-miss traffic."
        tradeoff: "Content that changes frequently (live view counts, comments count) can't be cached long-term. Use separate API endpoints for dynamic data (fetched client-side from origin) and static media (cached aggressively at CDN). Never render dynamic data server-side into the cached HTML."
        caveat: "CDN cache warmup is not instantaneous — a video that goes viral in seconds will have cold caches at all PoPs simultaneously. The first request from each PoP is a cache miss that hits origin. For 400 CloudFront PoPs × 1 cache miss each = 400 origin requests in the first few seconds. Auto-scale to handle this."
        watch: "The thundering herd at viral moment: if 100K users click a link simultaneously and 400 CDN PoPs each have a cache miss at the same millisecond, origin gets 400 concurrent requests. CloudFront Origin Shield reduces this to 25 shield nodes × 1 miss each = 25 origin requests."
