        question: "How do systems detect fraudulent transactions?"
        needed: "real-time risk scoring (velocity checks, geo, device fingerprint), ML model, threshold block"
        answer: "Score each transaction in real time (<100ms) using a rule-based engine combined with ML: velocity checks (more than 3 transactions in 1 hour from same card), geo mismatch (billing address in Germany, IP in Nigeria), new device, unusual amount for this user (10x their average order). ML model combines these signals into a 0–100 risk score. Block above 80, review 50–80, allow below 50."
        tradeoff: "Rules alone miss novel fraud patterns. ML alone is a black box — hard to explain declines to customers and compliance. Layered approach (rules for known patterns, ML for anomaly detection) gives you explainability for high-risk rule blocks and detection for novel attacks."
        caveat: "Never store the reason for a fraud block in the decline message to the customer — 'declined due to unusual location' tells fraudsters exactly what signal to spoof. Return a generic 'unable to process' message."
        watch: "Card testing attacks — where fraudsters verify stolen card validity with small transactions ($1–$2) before large purchases — are detected by velocity rules on small amounts, not large-amount fraud models. Have separate models for small-amount anomalies."
