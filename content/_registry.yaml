      - number: 8
        question: "Q077-Q078: Design a data model for a social network's friendship graph with 1B users. Queries: 'get all friends of user X', 'are user X and user Y friends?', 'get mutual friends of X and Y'."
        needed: "adjacency list in a graph DB (Neo4j) or MySQL edges table (user_id_1, user_id_2); user_id_1 < user_id_2 constraint for deduplication; index on both user_ids; mutual friends = INTERSECT"
        answer: "Relational approach: friendships(user_id_1 BIGINT, user_id_2 BIGINT, created_at TIMESTAMP). Constraint: user_id_1 < user_id_2 (enforces canonical ordering, prevents duplicate (A,B) and (B,A) pairs). Composite PK: (user_id_1, user_id_2). Indexes: INDEX (user_id_1), INDEX (user_id_2). Get friends of X: SELECT user_id_2 FROM friendships WHERE user_id_1 = X UNION SELECT user_id_1 FROM friendships WHERE user_id_2 = X. Both indexes hit. ~500 friends average → O(log N + 500). Are X and Y friends: SELECT 1 FROM friendships WHERE (user_id_1 = min(X,Y) AND user_id_2 = max(X,Y)). PK lookup = O(1). Mutual friends of X and Y: Get friends_of_X (set), friends_of_Y (set), INTERSECT in application layer. For 500 friends each: 500×500 comparison = 250K operations in memory, <1ms. Database-level INTERSECT is possible but less scalable. Sharding: shard friendships table by user_id_1 % N. Both queries (by user_id_1 and user_id_2) hit different shards. Solution: duplicate edges — store both (A,B) and (B,A). Queries by either user_id are single-shard. Storage doubles but sharding becomes clean."
        tradeoff: "MySQL adjacency list vs. Neo4j graph database: MySQL: efficient for 1-hop (friends of X) and 2-hop (mutual friends) queries. Scales to 1B users with proper sharding. Cost: operational familiarity. Neo4j: efficient for deep graph traversals (friends of friends of friends, 6 degrees of separation). MATCH path for multi-hop is Neo4j's strength. At 1B users, Neo4j requires significant cluster resources. For social networks doing mostly 1-2 hop queries (Facebook's use case): MySQL with adjacency list. For recommendation engines doing 5-hop traversals: Neo4j or custom graph store."
        caveat: "Celebrity problem: a celebrity has 10M followers. friendships table for celebrity: 10M rows with user_id_2 = celebrity_id. Index on user_id_2 → 10M row scan. Mitigation: separate followers table for asymmetric relationships (follow ≠ friend). Friendship is symmetric (mutual follow). Followers are asymmetric (A follows B without B following A). Most social networks distinguish: Twitter (asymmetric follows), Facebook (symmetric friends). For friendships specifically: 5000-friend limit (Facebook's actual limit) bounds the table scan to 5000 rows per user."
        watch: "Friend suggestion follow-up (2nd-degree connections): 'People you may know' = friends of friends who are not already your friend. Query: get friends of X → for each friend, get their friends → dedup → remove X's existing friends → sort by mutual friend count. Naive: O(friends × friends_of_friends) = 500 × 500 = 250K lookups. Expensive at scale. Optimization: precompute 2nd-degree connections daily via Spark job, store in Redis (user_id → sorted set of suggested_user_ids by mutual_count). Serve from Redis at read time. Recompute daily or on significant friendship graph changes."
