      - number: 11
        question: "Q146: Design an ML feature store. ML models need consistent features at training time (batch) and inference time (online). Feature staleness must be <1 minute for online serving."
        needed: "offline store (S3 + Spark for batch features); online store (Redis for low-latency feature lookup); feature pipeline writes to both; point-in-time correct joins for training to avoid data leakage"
        answer: "Feature store components: 1. Offline store: S3 (Parquet files), computed by Spark. Features like user_lifetime_purchase_value (daily batch), historical_ctr_by_item (hourly batch). Used for model training. 2. Online store: Redis. Features like user_session_item_clicks (last 30 min), item_current_inventory. Read at inference time. Latency: <5ms. Feature pipeline: Spark computes feature, writes to both S3 (Parquet partition) and Redis (HSET 'features:{entity_id}:{feature_name}' value, TTL=3600s). For high-freshness features (<1 min): Flink stream processor reads events → computes rolling window features → writes directly to Redis. Example: 'user's click count in last 5 minutes' → INCR 'feat:user:{user_id}:clicks_5m', EXPIRE key 300s. Training data generation: point-in-time correct join (critical for avoiding data leakage). For each training example at timestamp T, join the feature values as they were AT T (not current values). Implementation: S3 Parquet files have a 'feature_timestamp' column. Join training labels table with features on (entity_id, feature_timestamp ≤ label_timestamp). Feast, Tecton, or Hopsworks implement this natively."
        tradeoff: "Custom feature store (Redis + S3 + Spark) vs. managed feature store (Vertex AI Feature Store, SageMaker Feature Store): managed: handles online/offline consistency, point-in-time joins, versioning out-of-box. Cost: $0.01/GB/hour online storage on Vertex. Self-built: more control, cheaper at scale (Redis is $0.001/GB/hour). Build custom for >10TB online features; use managed for <1TB to avoid the engineering overhead."
        caveat: "Training/serving skew: the most common ML bug. Training uses features computed differently than inference. Example: training uses 'user_purchase_count last 30 days' computed by Spark; inference uses 'user_purchase_count' from Redis (updated every hour, not rolling 30 days). The feature means different things. Fix: use the SAME feature computation code for both training (batch) and serving (online). Spark job and Flink job both import the same FeatureComputeLibrary. One source of truth for feature logic."
        watch: "Feature versioning follow-up: a feature definition changes (e.g., 'user_age' is now derived differently). Old models trained on old feature definition, new models on new definition. Both need to coexist. Feature store versioning: each feature has a version. Model metadata records which feature versions it was trained on. Inference: model requests feature_v1 → feature store serves feature_v1 (from separate Redis key or hash field). After all models are migrated to feature_v2, deprecate v1. Backfill: recompute historical feature values with new definition for new model training."
