# ─── Quick Answer Categories (150 Q&A) ───
quick_categories:

  - slug: auth
    title: "Authentication & User Accounts"
    description: "Login, sessions, passwords, MFA, social auth, account lifecycle"
    number_range: "1–20"
    questions:
      - number: 1
        question: "How do you prevent duplicate user accounts?"
        needed: "email/phone uniqueness constraint, verification step, idempotent signup endpoint"
        related_fundamentals: [storage/dynamodb]
      - number: 2
        question: "How do you handle millions of simultaneous logins?"
        needed: "load balancer, stateless auth servers, cached sessions in Redis"
        related_problems: [rate-limiter]
        related_fundamentals: [networking/load-balancing, storage/redis]
      - number: 3
        question: "How do you design secure password storage?"
        needed: "bcrypt or argon2 hashing, per-user salt, never plaintext — not MD5 or SHA1"
      - number: 4
        question: "How do you prevent brute-force login attacks?"
        needed: "rate limiting per IP/account, exponential back-off, CAPTCHA after N failures"
        related_problems: [rate-limiter]
      - number: 5
        question: "How do systems implement secure password reset?"
        needed: "short-lived signed token (15 min), delivered to verified email, single-use"
      - number: 6
        question: "How do you support login across multiple devices?"
        needed: "long-lived refresh tokens per device, short-lived access tokens, revocation list"
        related_fundamentals: [storage/redis]
      - number: 7
        question: "How do you detect suspicious logins?"
        needed: "device fingerprinting, geo-location anomaly detection, ML risk scoring"
      - number: 8
        question: "How do you implement two-factor authentication?"
        needed: "TOTP (RFC 6238) for authenticator apps; SMS OTP as fallback; hardware key (WebAuthn) as best"
      - number: 9
        question: "How do you handle session expiration?"
        needed: "access token TTL (15 min), refresh token rotation, silent refresh in background"
        related_fundamentals: [storage/redis]
      - number: 10
        question: "How do you allow users to log out from all devices?"
        needed: "server-side session invalidation list keyed by user ID, or version counter in token"
        related_fundamentals: [storage/redis]
      - number: 11
        question: "How do systems support social login (Google, GitHub, etc.)?"
        needed: "OAuth 2.0 + OIDC: redirect to provider, exchange code for tokens, upsert local user"
      - number: 12
        question: "How do you prevent session hijacking?"
        needed: "HTTPS only, HttpOnly + Secure cookies, SameSite=Strict, token rotation"
      - number: 13
        question: "How do systems support single sign-on (SSO)?"
        needed: "SAML 2.0 or OIDC identity provider, token exchange, assertion validation"
      - number: 14
        question: "How do systems detect fake accounts?"
        needed: "behavior analysis (typing speed, navigation patterns), email domain reputation, ML model"
      - number: 15
        question: "How do you prevent email verification abuse?"
        needed: "rate limiting on verification sends per IP/account, token expiry, resend throttle"
        related_problems: [rate-limiter]
      - number: 16
        question: "How do you manage user profile updates safely?"
        needed: "validation + server-side sanitization, optimistic locking for concurrent updates, audit log"
      - number: 17
        question: "How do you ensure username uniqueness?"
        needed: "unique database constraint, case-insensitive comparison, reserve on intent before commit"
      - number: 18
        question: "How do you handle account deletion?"
        needed: "soft delete with retention window (30 days), async PII cleanup job, GDPR compliance"
      - number: 19
        question: "How do systems restore deleted accounts?"
        needed: "soft delete flag + deletion timestamp, re-activation within retention period, audit trail"
      - number: 20
        question: "How do platforms block banned users from returning?"
        needed: "device fingerprinting, IP monitoring, email domain block, shadow-ban for detection"

  - slug: payments
    title: "Payments & Transactions"
    description: "Idempotency, fraud detection, reconciliation, retries, secure storage"
    number_range: "21–40"
    questions:
      - number: 21
        question: "How do you prevent duplicate payments?"
        needed: "idempotency key (UUID from client), stored with TTL; return cached result on replay"
        related_fundamentals: [storage/redis]
      - number: 22
        question: "How do you ensure exactly-once payment processing?"
        needed: "unique transaction ID + database unique constraint; idempotency at every gateway call"
      - number: 23
        question: "How do you handle payment gateway failures?"
        needed: "async retry via message queue, exponential back-off, dead-letter queue for manual review"
        related_fundamentals: [messaging/kafka]
      - number: 24
        question: "How do you prevent double order creation after payment?"
        needed: "state machine: pending → confirmed → fulfilled; only create order on confirmed state"
      - number: 25
        question: "How do systems detect fraudulent transactions?"
        needed: "real-time risk scoring (velocity checks, geo, device fingerprint), ML model, threshold block"
      - number: 26
        question: "How do systems process refunds?"
        needed: "refund workflow with state: initiated → gateway call → settled; linked to original txn"
      - number: 27
        question: "How do you reconcile payment data with banks?"
        needed: "nightly reconciliation job: compare internal ledger to bank settlement file, flag deltas"
      - number: 28
        question: "How do systems support multiple currencies?"
        needed: "store amounts in minor units (cents), record original currency + FX rate at txn time"
      - number: 29
        question: "How do systems handle partial payments?"
        needed: "split transaction records, track paid/remaining amounts, link to same order"
      - number: 30
        question: "How do you handle chargebacks?"
        needed: "dispute management workflow: receive notice → gather evidence → submit to bank within window"
      - number: 31
        question: "How do systems track payment history efficiently?"
        needed: "append-only ledger table, indexed by user + timestamp, paginated cursor-based reads"
      - number: 32
        question: "How do you prevent payment replay attacks?"
        needed: "nonce + timestamp in request signature; server rejects nonces seen within 5-minute window"
      - number: 33
        question: "How do systems scale payment processing?"
        needed: "microservices per domain (checkout, ledger, notifications), async queues between them"
        related_fundamentals: [messaging/kafka]
      - number: 34
        question: "How do you track payment success/failure events?"
        needed: "event-driven architecture: emit PaymentSucceeded/PaymentFailed events to Kafka topic"
        related_fundamentals: [messaging/kafka]
      - number: 35
        question: "How do systems handle delayed payment confirmations?"
        needed: "webhook callbacks from gateway, idempotent handler, polling fallback with timeout"
      - number: 36
        question: "How do systems support subscription payments?"
        needed: "recurring billing scheduler (cron), retry on failure, dunning logic for delinquent accounts"
      - number: 37
        question: "How do you implement payment retries?"
        needed: "retry policy: max 3 attempts, exponential back-off (1h, 6h, 24h), notify user on failure"
      - number: 38
        question: "How do systems store sensitive payment data securely?"
        needed: "PCI-DSS: tokenize card numbers via vault (Stripe/Braintree), never store raw PAN"
      - number: 39
        question: "How do systems audit financial transactions?"
        needed: "immutable append-only audit log, signed entries, separate read-only replica for auditors"
      - number: 40
