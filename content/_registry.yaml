      - number: 94
        question: "How do platforms recommend videos to users?"
        needed: "two-stage: candidate generation (collaborative filtering, embedding similarity) → ranking model"
        answer: "Two-stage pipeline: candidate generation retrieves ~500 candidates from billions of videos in <100ms using approximate nearest neighbor (ANN) search over video embeddings. Embeddings are computed from video content (audio + visual features via CNN) plus metadata. The ranking model then scores all 500 candidates using user personalization signals (watch history, likes, dwell time) and context (current time, device) to produce the final ordered list of 20–50 results."
        tradeoff: "Collaborative filtering (users who watched X also watched Y) is powerful but has cold-start problem for new videos and users. Content-based filtering (recommend videos similar to what you've watched) works for cold-start but misses serendipitous discovery. Hybrid approaches outperform either alone."
        caveat: "Recommendation systems optimize for clicks and watch time, which can lead to filter bubbles and radicalization via engagement optimization. Build diversity constraints into the ranking model: limit consecutive videos from the same creator or topic cluster."
        watch: "YouTube's research showed that users who watch recommended videos to completion provide a stronger training signal than users who click then skip. Optimize for completion rate and positive interactions (likes, shares), not raw click-through rate — this produces better long-term recommendations."
