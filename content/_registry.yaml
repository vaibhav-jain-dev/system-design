# ─── Problems (System Design) ───
problems:
  - slug: url-shortener
    title: "URL Shortener"
    description: "Design TinyURL: hashing, base62, collision handling, analytics"
    path: problems/url-shortener
    nfrs:
      - slug: scalability
        phases: [3, 4, 5, 7]        # data model, key gen, architecture, sharding
      - slug: performance
        phases: [2, 4, 5, 6]        # API design, key gen, architecture, caching
      - slug: availability
        phases: [5, 6, 8]           # architecture, cache failover, reliability
      - slug: consistency
        phases: [3, 8]              # database choice, reliability
      - slug: durability
        phases: [3, 8]              # database, reliability
      - slug: security
        phases: [9]                 # security & abuse prevention
      - slug: cost
        phases: [6, 7, 10, 11]      # caching, sharding, analytics, monitoring
      - slug: observability
        phases: [10, 11]            # analytics, monitoring & cost
    functional_requirements:
      - slug: url-gen
        title: "URL Generation"
        phases: [3, 4]              # data model + key generation algorithm
      - slug: redirect
        title: "URL Redirect"
        phases: [2, 5, 6]           # API design, architecture, caching hot paths
      - slug: analytics
        title: "Analytics"
        phases: [10, 11]            # analytics deep dive, monitoring & cost
      - slug: custom-aliases
        title: "Custom Aliases"
        phases: [2, 3]              # API design, data model (alias field)
      - slug: abuse-prevention
        title: "Abuse Prevention"
        phases: [9]                 # security & abuse prevention
    uses:
      - fundamental: networking/load-balancing
        config: "ALB with round-robin"
        why: "Stateless API, no sticky sessions needed"
        not_this: "NLB — no HTTP path-based routing"
        risk: "Single AZ deployment = SPOF"
        caveats: "Cross-AZ charges $0.01/GB. Multi-AZ ALB adds ~$16/mo"
        nfrs: [availability, scalability]
      - fundamental: networking/cdn/cloudfront
        config: "Edge caching for 301 redirects"
        why: "Redirects are highly cacheable, 80%+ cache hit rate"
        not_this: "Akamai — overkill for single-region MVP"
        risk: "Stale cache on URL updates, need invalidation API"
        caveats: "Invalidation limit: 3000/mo free, $0.005 each after"
        nfrs: [performance, cost]
      - fundamental: storage/redis
        config: "ElastiCache read-through, TTL 24h"
        why: "Hot URLs (top 20%) account for 80% reads"
        not_this: "Memcached — no persistence on node restart"
        risk: "Thundering herd on cache miss for viral URLs"
        caveats: "r6g.large ~$150/mo on-demand (Valkey) or ~$92/mo reserved. Monitor eviction rate."
        nfrs: [performance, availability]
      - fundamental: storage/sharding
        config: "Hash-based sharding on short_code; consistent hashing ring for DB nodes"
        why: "Single MySQL at 100B URLs = ~20TB. Shard by short_code hash for even distribution"
        not_this: "Range-based sharding — hot shards for popular URL prefixes"
        risk: "Resharding requires migrating ~50% of keys when adding nodes"
        caveats: "Use consistent hashing with 150 virtual nodes per DB. 6→12 shards is zero-downtime with CH."
        nfrs: [scalability]
      - fundamental: distributed/consistent-hashing
        config: "Virtual-node ring for URL DB shard assignment, 150 vnodes per physical node"
        why: "Consistent hashing limits reshuffling to K/N keys on node add (vs full rehash)"
        not_this: "Modulo hashing (key % N) — adding one node reshuffles (N-1)/N keys"
        risk: "Uneven load if virtual node count is too low — monitor shard utilisation"
        caveats: "Jump Consistent Hash or Rendezvous hashing also viable. CH most widely supported."
        nfrs: [scalability]
      - fundamental: distributed/rate-limiting
        config: "Token bucket per API key: 100 req/s burst, 10 req/s sustained for URL creation"
        why: "Abuse prevention requires per-client rate limiting — spam campaigns create millions of malicious short URLs"
        not_this: "Global rate limit only — a single attacker can exhaust global quota for all legitimate users"
        risk: "Rate limit bypass via IP rotation — combine with per-user_id and per-IP limits"
        caveats: "Short URL creation: 10/s per API key. Redirect (read): 10K/s per key (reads are cacheable)."
        nfrs: [security, performance]
      - fundamental: messaging/message-queues
        config: "Kafka for async click-event analytics streaming; Kinesis for real-time analytics dashboards"
        why: "Click events at 100K req/s must not block the redirect response — async event pipeline"
        not_this: "Synchronous DB write on every redirect — adds 5-10ms per redirect, throttles throughput"
        risk: "Kafka consumer lag during viral URL burst = delayed analytics dashboard updates"
        caveats: "Produce click event to Kafka in <1ms (fire-and-forget). Batch consume into analytics DB."
        nfrs: [scalability, observability]
      - fundamental: distributed/circuit-breaker
        config: "Circuit breaker on cache reads — fall through to DB on Redis failure, not fail-closed"
        why: "Cache outage should not bring down the redirect service — DB handles reduced capacity"
        not_this: "Fail-closed on cache miss — blocking all redirects when Redis is unhealthy unacceptable"
        risk: "DB overwhelmed during cache failover — add request queue + concurrency limit to DB fallback"
        caveats: "Circuit opens after 5 consecutive Redis timeouts. Half-open probe every 10s."
        nfrs: [availability]

  - slug: instagram
    title: "Instagram"
    description: "Design Instagram: photo/video feed, stories, likes, comments, explore, notifications"
    path: problems/instagram
    nfrs:
      - slug: scalability
        phases: [3, 5, 6, 7, 11]    # MVP scale, growing, scaling stages, peak, trade-offs
      - slug: performance
        phases: [2, 4, 5]           # API design, upload flow, growing stage
      - slug: availability
        phases: [7, 8, 11]          # peak hours, global scale, trade-offs
      - slug: consistency
        phases: [8]                 # global scale consistency
      - slug: durability
        phases: [3, 4]              # MVP storage, upload flow
      - slug: security
        phases: [9]                 # security & content moderation
      - slug: cost
        phases: [4, 5, 10, 11]      # upload flow (storage), growing (CDN), monitoring, trade-offs
      - slug: observability
        phases: [6, 10]             # scaling stage metrics, analytics & monitoring
    functional_requirements:
      - slug: media-upload
        title: "Photo/Video Upload"
        phases: [3, 4]              # MVP storage design, upload flow
      - slug: feed
        title: "Feed Generation"
        phases: [5, 6, 7]           # growing (fan-out-on-write), scaling, peak handling
      - slug: notifications
        title: "Notifications"
        phases: [7, 10]             # peak (async fan-out), analytics & monitoring
      - slug: security-moderation
        title: "Security & Moderation"
        phases: [9]                 # security & content moderation
      - slug: analytics
        title: "Analytics"
        phases: [6, 10]             # scaling metrics, analytics & monitoring
    uses:
      - fundamental: networking/cdn/cloudfront
        config: "Edge caching for images/videos, S3 origin with OAC"
        why: "Media-heavy app — 80%+ traffic is image/video serving, CDN cuts latency to <50ms globally"
        not_this: "Self-hosted CDN — operational nightmare at Instagram scale"
        risk: "Cache invalidation on image deletion (GDPR compliance)"
        caveats: "CloudFront $0.085/GB first 10TB. At 1PB/mo = ~$40K/mo. Negotiate Enterprise Discount."
        nfrs: [performance, cost]
      - fundamental: networking/load-balancing
        config: "ALB with path-based routing: /api/* → app servers, /media/* → media service"
        why: "Different services for API vs media — ALB routes by path at L7"
        not_this: "NLB — need HTTP path routing for microservice split"
        risk: "Uneven load if /feed endpoint is 10x heavier than /profile"
        caveats: "ALB $0.0225/hr + $0.008/LCU-hr. At 50K RPS ~$200/mo."
        nfrs: [scalability, availability]
      - fundamental: storage/redis
        config: "Feed cache per user (sorted set), session store, like counters"
        why: "Feed generation is expensive (fan-out-on-read). Cache assembled feeds in Redis sorted sets."
        not_this: "Memcached — need sorted sets for ranked feeds, persistence for sessions"
        risk: "Celebrity post = millions of fan-out writes. Use hybrid fan-out."
        caveats: "r6g.xlarge cluster = ~$370/mo. Feed cache TTL 5min. Eviction: allkeys-lru."
        nfrs: [performance, availability]
      - fundamental: storage/dynamodb
        config: "Posts table (PK=user_id, SK=timestamp), Likes counter (atomic increment)"
        why: "Write-heavy for likes/comments. DynamoDB handles 10K+ WPS per partition."
        not_this: "Postgres — write amplification at scale, connection pool exhaustion"
        risk: "Hot partition on celebrity posts — use write sharding (user_id#shard)"
        caveats: "On-demand $1.25/M writes, $0.25/M reads. At 100K WPS = ~$10K/mo."
        nfrs: [scalability, performance]
      - fundamental: storage/sharding
        config: "user_id-based sharding for posts/followers; write sharding for celebrity user_ids"
        why: "Instagram at 1B users = 500TB+ media metadata. Shard by user_id for data co-location"
        not_this: "Media ID sharding — loses user locality, forces cross-shard fan-out for feeds"
        risk: "Celebrity user_id = hot shard — add shard suffix (user_id#0 … user_id#7)"
        caveats: "Add shard index column to avoid cross-shard scatter-gather reads."
        nfrs: [scalability]
      - fundamental: messaging/message-queues
        config: "Kafka for async notification fan-out; SQS for image processing pipeline"
        why: "Fan-out to 100M followers is async — push to Kafka, workers deliver to notification service"
        not_this: "Synchronous fan-out in post request — post API would timeout at Instagram scale"
        risk: "Kafka consumer lag during viral post = delayed notifications"
        caveats: "Partition by user_id for ordered delivery. At-least-once with idempotent consumers."
        nfrs: [scalability, availability]
      - fundamental: storage/s3
        config: "S3 + CloudFront for photo/video storage and delivery; S3 multipart upload for videos"
        why: "Instagram serves 1PB+/day of media — object storage is the only cost-effective option"
        not_this: "Storing media in relational DB or DynamoDB — binary blob storage at Instagram scale is untenable"
        risk: "S3 PUT → CloudFront propagation lag ~1s — image may be unavailable briefly after upload"
        caveats: "S3 Transfer Acceleration for uploads from high-latency regions. Intelligent Tiering for old media."
        nfrs: [durability, cost]
      - fundamental: networking/websockets
        config: "WebSocket push for real-time like/comment counts and notification delivery"
        why: "Real-time engagement counters (likes going from 10K→10M for viral posts) need push, not polling"
        not_this: "Polling every 5s — 1B users × 1 request/5s = 200M requests/s just for notification polling"
        risk: "WebSocket fan-out to 1M active users for viral post notification = 1M concurrent pushes per post"
        caveats: "Server-Sent Events (SSE) sufficient for notification delivery (unidirectional). WebSocket only for bi-directional features."
        nfrs: [performance, scalability]
      - fundamental: distributed/consistent-hashing
        config: "Consistent hashing for user_id-based sharding of follower graph and post metadata DB"
        why: "Adding a DB shard with modulo routing reshuffles (N-1)/N of all user data — CH limits to K/N"
        not_this: "Modulo hash sharding — adding one DB node during Instagram growth requires full data migration"
        risk: "Celebrity user_id concentrates writes on one shard — add shard suffix (user_id#0..7)"
        caveats: "150 virtual nodes per shard. Monitor shard utilisation. Celebrity accounts get dedicated shards."
        nfrs: [scalability]
      - fundamental: distributed/cap-theorem
        config: "AP for feed/likes (eventual consistency OK), CP for follow relationship (strong consistency required)"
        why: "Seeing a post liked 10K vs 10,001 times is fine; missing a follow relationship causes wrong feed"
        not_this: "CP everywhere — follower graph consistency is critical, but like counts don't need linearizability"
        risk: "Read-your-own-writes violation: user posts and immediately doesn't see own post in feed"
        caveats: "Cache user's own recent posts locally. Async feed fan-out is eventually consistent by design."
        nfrs: [consistency, availability]

  - slug: rate-limiter
    title: "Rate Limiter"
    description: "Design API rate limiting: token bucket, sliding window, distributed counters"
    path: problems/rate-limiter
    nfrs:
      - slug: scalability
        phases: [2, 4, 5, 6, 11]    # capacity estimation, algorithm, architecture, distributed, sub-problems
      - slug: performance
        phases: [3, 4, 5, 7, 8]     # API design, algorithm, architecture, schema, Redis config
      - slug: availability
        phases: [5, 6, 8, 9]        # architecture, distributed, Redis config, trade-offs (fail-open)
      - slug: consistency
        phases: [6, 9]              # distributed rate limiting, trade-offs
      - slug: security
        phases: [1]                 # requirements (abuse prevention is core driver)
      - slug: cost
        phases: [2, 8, 10]          # estimation, Redis config, cost estimates
    functional_requirements:
      - slug: sliding-window
        title: "Sliding Window"
        phases: [4, 7]              # algorithm deep dive, Redis schema
      - slug: token-bucket
        title: "Token Bucket"
        phases: [4, 7]              # algorithm deep dive, Redis schema
      - slug: distributed-sync
        title: "Distributed Sync"
        phases: [6, 7]              # distributed rate limiting, Redis schema
      - slug: fail-behavior
        title: "Fail-Open / Closed"
        phases: [8, 9]              # Redis config, trade-offs & edge cases
      - slug: per-user-limits
        title: "Per-User/Service Limits"
        phases: [3, 5]              # API design (rate headers), architecture (hop-by-hop)
    uses:
      - fundamental: storage/redis
        config: "Sorted set sliding window per user_id"
        why: "O(1) atomic ZADD+ZCOUNT, sub-ms latency"
        not_this: "DynamoDB — too slow for per-request check"
        risk: "Redis down = open or closed? Choose fail-open with local fallback"
        caveats: "ZRANGEBYSCORE cost: O(log N + M). Cleanup old entries with ZREMRANGEBYSCORE."
        nfrs: [performance, availability]
      - fundamental: networking/load-balancing
        config: "ALB with sticky sessions (rate state is per-node)"
        why: "Local counter consistency before Redis sync"
        not_this: "Round-robin — splits user requests across nodes, breaks local counters"
        risk: "Sticky session + node failure = temporary over-limit"
        caveats: "Sticky sessions via ALB cookie, not IP. Duration: 1 day."
        nfrs: [scalability, availability]
      - fundamental: distributed/rate-limiting
        config: "Token bucket + sliding window hybrid — burst allowance via token bucket, precise window via sorted set"
        why: "The core system being designed — understanding algorithm trade-offs is the primary interview focus"
        not_this: "Fixed window counter — allows 2× the rate at window boundary (last + first second)"
        risk: "Algorithm mismatch per use case: token bucket for API clients, sliding window for per-user accuracy"
        caveats: "Fixed window: O(1), 1 Redis key. Sliding window: O(log N), sorted set per key. Choose by accuracy need."
        nfrs: [performance, scalability]
      - fundamental: distributed/consistent-hashing
        config: "Consistent hashing for routing requests to Redis rate-limit shards"
        why: "Adding Redis nodes with modulo routing invalidates all counter placements — CH limits to K/N remapping"
        not_this: "Modulo shard routing — adding one Redis node resets (N-1)/N of all rate limit counters"
        risk: "Uneven counter distribution if virtual node count is too low — use 150 vnodes per node"
        caveats: "Rate limit key = user_id:window. Virtual node ring ensures same key always routes to same Redis shard."
        nfrs: [scalability]
      - fundamental: distributed/circuit-breaker
        config: "Circuit breaker on Redis rate-limit store — fail-open (allow requests) when Redis is unreachable"
        why: "Rate limiter outage should never block all traffic — fail-open with local in-memory fallback"
        not_this: "Fail-closed on Redis outage — blocks all API traffic when rate limiter is unavailable"
        risk: "Local in-memory fallback is per-node — 10 app servers = 10× the configured rate limit during outage"
        caveats: "Local fallback at 10% of configured rate. Alert immediately. Circuit half-open every 5s."
        nfrs: [availability]

  - slug: ticket-booking
    title: "BookMyShow Ticket Booking"
    description: "Design movie/event ticket booking: seat locking, payment processing, QR codes, handling 100K users for 500 seats"
    path: problems/ticket-booking
    nfrs:
      - slug: scalability
        phases: [4, 6, 8, 9]        # architecture, rush handling, real-time seats, scaling
      - slug: performance
        phases: [2, 6, 8]           # APIs, rush handling, real-time seats
      - slug: availability
        phases: [3, 4, 6]           # seat locking, architecture, rush handling
      - slug: consistency
        phases: [3, 5, 7]           # seat locking, data model, payment flow
      - slug: durability
        phases: [5, 7, 10]          # data model, payment, QR generation
      - slug: security
        phases: [7, 10, 11]         # payment flow, QR generation, anti-scalping
    functional_requirements:
      - slug: seat-locking
        title: "Seat Locking"
        phases: [3, 5]              # seat locking mechanism, data model
      - slug: payment
        title: "Payment Flow"
        phases: [7]                 # payment flow & saga
      - slug: real-time-seats
        title: "Real-Time Availability"
        phases: [8]                 # real-time seat map updates
      - slug: qr-codes
        title: "QR Code Generation"
        phases: [10]                # QR generation & validation
      - slug: anti-scalping
        title: "Anti-Scalping"
        phases: [11]                # anti-scalping controls
      - slug: rush-handling
        title: "Rush/Peak Handling"
        phases: [4, 6, 9]           # architecture, rush handling, scaling
    uses:
      - fundamental: storage/redis
        config: "Distributed lock for seat reservation with 10-min TTL"
        why: "Sub-ms lock acquisition, automatic expiry on payment timeout"
        not_this: "DynamoDB conditional writes — too slow for real-time seat map updates"
        risk: "Redis failover during seat lock = potential double-booking"
        caveats: "Redlock across 3 Redis nodes for safety. SET NX EX 600 for seat locks."
        nfrs: [consistency, performance]
      - fundamental: networking/load-balancing
        config: "ALB with WebSocket support for real-time seat availability"
        why: "Seat map updates need push to thousands of concurrent users"
        not_this: "NLB — need L7 routing for /api vs /ws paths"
        risk: "WebSocket connection storm on show opening"
        caveats: "ALB WebSocket idle timeout: 4000s max. Keep-alive every 30s."
        nfrs: [scalability, availability]
      - fundamental: networking/websockets
        config: "WebSocket push for real-time seat map updates to all concurrent viewers"
        why: "100K users viewing same show's seat map need instant updates — polling adds 2-5s staleness"
        not_this: "Long-polling — doubles server connections vs WebSocket, higher overhead"
        risk: "WebSocket connection storm when popular show goes on sale"
        caveats: "Throttle seat map broadcasts: batch updates every 500ms. Client debounces renders."
        nfrs: [performance]
      - fundamental: distributed/saga-pattern
        config: "Choreography saga: seat-reserved → payment-processed → ticket-issued"
        why: "Booking spans seat reservation + payment across microservices — saga coordinates rollback"
        not_this: "Two-phase commit (2PC) — distributed lock held across services causes cascading timeouts"
        risk: "Compensating transaction failure = inconsistent state (seat reserved but payment failed)"
        caveats: "Idempotent compensating transactions required. Use outbox pattern for reliable event publishing."
        nfrs: [consistency]
      - fundamental: storage/dynamodb
        config: "Bookings table (PK=event_id, SK=seat_id), Tickets table (PK=booking_id), QR lookup"
        why: "Ticket records are write-once at booking time and read at gate — DynamoDB single-digit-ms access"
        not_this: "Postgres — connection pool exhaustion during ticket release rush (100K concurrent sessions)"
        risk: "Hot partition on popular event_id — write sharding with event_id#shard suffix"
        caveats: "Conditional writes for seat reservation (UpdateItem with ConditionExpression). GSI on user_id."
        nfrs: [scalability, durability]
      - fundamental: messaging/message-queues
        config: "SQS for booking confirmation emails/SMS; Kafka for seat availability updates to websocket servers"
        why: "Booking confirmation is async — user gets instant confirmation ID, email follows asynchronously"
        not_this: "Synchronous email send in booking path — SMTP latency (200-500ms) added to booking response time"
        risk: "SQS consumer failure means confirmation email is delayed — DLQ for retry with idempotent send"
        caveats: "Kafka partition by event_id for ordered seat update delivery to all WebSocket servers."
        nfrs: [scalability, availability]
      - fundamental: storage/s3
        config: "S3 for QR code image storage; served via CloudFront pre-signed URL with 24h TTL"
        why: "QR codes are generated once per booking and read repeatedly at venue — S3+CDN handles millions of scans"
        not_this: "Generating QR in real-time at gate scan — compute overhead, no offline support"
        risk: "Pre-signed URL expiry before event date — TTL must exceed event date + 1 day"
        caveats: "Generate QR at booking confirmation. Store booking_id + HMAC in QR payload for validation."
        nfrs: [performance, durability]
      - fundamental: distributed/circuit-breaker
        config: "Circuit breaker on payment gateway calls — fail-fast after 3 failures, hold seat for retry"
        why: "Payment gateway outage during show opening rush must not cascade to seat lock service"
        not_this: "Infinite retry on payment — blocks seat lock thread pool during gateway outage"
        risk: "Open circuit releases seat after timeout — user must retry, seat may be taken"
        caveats: "Payment timeout: 5s. Circuit opens at 5 consecutive failures. Half-open after 30s."
        nfrs: [availability, consistency]

  - slug: food-delivery
    title: "Swiggy/Zomato Food Delivery"
    description: "Design food delivery: order matching, real-time tracking, ETA prediction, surge pricing, 100K+ concurrent orders"
    path: problems/food-delivery
    nfrs:
      - slug: scalability
        phases: [2, 5, 6, 7, 9, 11]  # estimation, architecture, matching, tracking, data model, scaling
      - slug: performance
        phases: [3, 6, 7, 8]        # API design, matching algo, tracking, ETA
      - slug: availability
        phases: [5, 7, 10]          # architecture, tracking failover, failure handling
      - slug: consistency
        phases: [4]                 # order lifecycle
      - slug: durability
        phases: [4, 9, 10]          # order lifecycle, data model, failure handling
      - slug: cost
        phases: [2, 11]             # estimation, scaling/cost estimates
    functional_requirements:
      - slug: order-lifecycle
        title: "Order Lifecycle"
        phases: [4, 10]             # order state machine, failure handling
      - slug: partner-matching
        title: "Driver Matching"
        phases: [6]                 # partner matching algorithm
      - slug: live-tracking
        title: "Real-Time Tracking"
        phases: [7]                 # real-time location tracking
      - slug: eta-surge
        title: "ETA & Surge Pricing"
        phases: [8]                 # ETA prediction, surge pricing
      - slug: batch-delivery
        title: "Batch Delivery"
        phases: [10]                # batch delivery & failure handling
    uses:
      - fundamental: storage/redis
        config: "Geospatial index (GEOADD/GEORADIUS) for nearby delivery partners"
        why: "O(log N) geo queries for partner matching within radius"
        not_this: "Postgres PostGIS — too slow for real-time matching at 100K orders/min"
        risk: "Stale location data if partner app loses connectivity"
        caveats: "GEORADIUS returns unsorted. Sort by distance client-side. TTL partner locations 60s."
        nfrs: [performance, scalability]
      - fundamental: networking/load-balancing
        config: "ALB with path routing: /api → order service, /ws → tracking service"
        why: "Separate scaling for HTTP API vs persistent WebSocket connections"
        not_this: "Single endpoint — tracking WebSocket connections would exhaust API server capacity"
        risk: "ALB connection limits during dinner rush (100K concurrent WebSockets)"
        caveats: "ALB supports 100K concurrent connections per target. Scale target groups independently."
        nfrs: [scalability, availability]
      - fundamental: networking/cdn/cloudfront
        config: "Edge caching for restaurant menus, images, static assets"
        why: "Menu images are read-heavy (10K views per update), highly cacheable"
        not_this: "Serving images from origin — 100K users loading restaurant photos = origin overload"
        risk: "Stale menu prices after restaurant update"
        caveats: "TTL 5min for menus, 24h for images. Invalidate on menu update."
        nfrs: [performance, cost]
      - fundamental: storage/geospatial
        config: "Geohash for restaurant geo-indexing; Redis GEOADD/GEORADIUS for delivery-partner tracking"
        why: "Finding restaurants within 5 km requires spatial index — Geohash reduces search space to 9 cells"
        not_this: "Full table scan with Haversine formula — O(N) at 100K+ restaurants"
        risk: "Restaurant at geohash boundary can be missed — query self + 8 neighbours"
        caveats: "Geohash precision 6 = ~1.2 km × 0.6 km cells. Redis GEO uses WGS84 encoding internally."
        nfrs: [performance, scalability]
      - fundamental: networking/websockets
        config: "WebSocket for real-time order status updates and delivery-partner location tracking"
        why: "Order tracking needs server push — polling adds 3-5s staleness on driver position"
        not_this: "SSE (Server-Sent Events) — unidirectional, can't receive driver pings from client"
        risk: "WebSocket disconnect during delivery = stale map. Auto-reconnect in 2s."
        caveats: "NLB for WebSocket connections. ALB idle timeout max 4000s — use NLB for long-lived rides."
        nfrs: [performance, availability]
      - fundamental: messaging/message-queues
        config: "Kafka for order lifecycle events: placed → accepted → preparing → picked-up → delivered"
        why: "Order events fan-out to restaurant, delivery partner, customer, analytics — Kafka decouples producers"
        not_this: "Direct RPC calls between services — tight coupling; restaurant service downtime blocks customer"
        risk: "Consumer lag during dinner rush — restaurant confirmation delayed, customer sees stale status"
        caveats: "Partition by order_id for ordered event processing. Consumer group per downstream service."
        nfrs: [scalability, durability]
      - fundamental: storage/dynamodb
        config: "Orders table (PK=order_id, SK=event_timestamp), Restaurant table, Delivery partner table"
        why: "Orders are write-heavy during peak (100K orders/hour) with append-only event pattern — DynamoDB scales"
        not_this: "Postgres — write throughput ceiling at food delivery peak, complex sharding for geo-partitioning"
        risk: "Hot partition for popular restaurants at lunch peak — add restaurant_id#shard key suffix"
        caveats: "TTL for order events after 90 days. Archive to S3 for analytics. GSI on partner_id for assignment queries."
        nfrs: [scalability, durability]
      - fundamental: distributed/circuit-breaker
        config: "Circuit breaker on payment gateway and restaurant partner API calls from order service"
        why: "Restaurant partner API outage should not block order placement — degrade gracefully with 'pending' state"
        not_this: "Unbounded retries to restaurant — repeated timeout cascades fill thread pools and slow all orders"
        risk: "Open circuit puts order in 'pending confirmation' state — need compensating timeout + auto-cancel"
        caveats: "Payment circuit: fail-closed (no pay = no order). Restaurant confirm: fail-open with retry queue."
        nfrs: [availability]
      - fundamental: storage/s3
        config: "S3 for restaurant menu images, dish photos, invoice PDFs, delivery proofs (photos)"
        why: "Media is write-once, read-many — S3 with CloudFront CDN serves 100K+ concurrent menu loads"
        not_this: "Storing images in Postgres or DynamoDB — BLOB storage is expensive and unscalable vs S3"
        risk: "Menu image staleness after restaurant update — CDN cache invalidation required"
        caveats: "CloudFront for image delivery. TTL 5min for menu data, 24h for dish images."
        nfrs: [performance, cost]

  - slug: ride-hailing
    title: "Ola/Uber Ride-Hailing"
    description: "Design ride-hailing: geospatial matching, surge pricing, real-time tracking, ETA, 100K+ concurrent rides"
    path: problems/ride-hailing
    nfrs:
      - slug: scalability
        phases: [4, 5, 6, 7, 9, 10]  # architecture, geo-indexing, matching, surge, data model, scaling
      - slug: performance
        phases: [2, 5, 6, 8]        # APIs, geo-indexing, matching, live tracking
      - slug: availability
        phases: [3, 4, 8, 11]       # ride flow, architecture, live tracking, failure modes
      - slug: consistency
        phases: [3]                 # ride flow (exactly-once matching)
      - slug: durability
        phases: [9, 11]             # data model, failure modes
      - slug: cost
        phases: [7, 10]             # surge pricing, scaling
    functional_requirements:
      - slug: geo-matching
        title: "Geospatial Matching"
        phases: [5, 6]              # geospatial indexing, matching algorithm
      - slug: ride-state
        title: "Ride State Machine"
        phases: [3, 4]              # ride flow, architecture
      - slug: surge-pricing
        title: "Surge Pricing"
        phases: [7]                 # surge pricing algorithm
      - slug: live-tracking
        title: "Live Tracking"
        phases: [8]                 # live driver tracking
      - slug: failure-modes
        title: "Failure Modes"
        phases: [11]                # failure modes & recovery
    uses:
      - fundamental: storage/redis
        config: "GEOADD/GEORADIUS for driver location index, pub/sub for ride updates"
        why: "Sub-ms geospatial queries for nearest driver matching"
        not_this: "Postgres PostGIS — too slow for 1M driver location updates/min"
        risk: "Stale driver locations lead to phantom drivers on map"
        caveats: "Update driver location every 4s. TTL 30s to remove offline drivers."
        nfrs: [performance, scalability]
      - fundamental: networking/load-balancing
        config: "NLB for driver location streaming, ALB for rider HTTP API"
        why: "Driver app sends GPS updates every 4s — NLB handles high-throughput UDP/TCP"
        not_this: "ALB for driver updates — L7 overhead unnecessary for location pings"
        risk: "Connection draining during NLB health checks drops location updates"
        caveats: "NLB cross-zone load balancing: $0.006/GB. Enable for even distribution."
        nfrs: [scalability, availability]
      - fundamental: storage/geospatial
        config: "S2 cells for driver location index; GEORADIUS for nearest-driver matching within radius"
        why: "Finding nearest N drivers requires O(log N) spatial query — geohash/S2 enables this vs O(N) scan"
        not_this: "Lat/lon B-tree scan — O(N) full table scan across 1M active driver locations"
        risk: "S2 cell boundary issue — drivers just outside query radius may be missed"
        caveats: "Query cells at 2 ring levels around rider. Google S2 bindings for Java/C++; Redis GEO for simplicity."
        nfrs: [performance, scalability]
      - fundamental: networking/websockets
        config: "WebSocket for real-time driver location push to rider app (every 4s)"
        why: "Driver map must update in near-real-time — HTTP polling adds 4s+ staleness"
        not_this: "HTTP polling from rider app — adds unnecessary load, stale positions on map"
        risk: "WebSocket disconnect during ride = map freezes. Client must auto-reconnect within 1s."
        caveats: "NLB for WebSocket connections (not ALB) to avoid L7 overhead on high-frequency location pings."
        nfrs: [performance, availability]
      - fundamental: messaging/message-queues
        config: "Kafka for ride lifecycle events: ride-requested → driver-matched → ride-started → completed"
        why: "Ride state transitions trigger multiple downstream services (billing, analytics, notifications) — Kafka decouples them"
        not_this: "Synchronous service calls — billing service timeout blocks ride completion confirmation"
        risk: "Kafka consumer lag during demand surge delays billing events — add consumer autoscaling"
        caveats: "Partition by ride_id for ordered event delivery. Idempotent consumers for at-least-once."
        nfrs: [scalability, durability]
      - fundamental: storage/dynamodb
        config: "Rides table (PK=ride_id, SK=timestamp), Driver table (PK=driver_id), GPS history"
        why: "Ride records are write-once (append GPS points) and read occasionally — DynamoDB handles 100K+ WPS"
        not_this: "Postgres — write throughput bottleneck at 100K concurrent rides with GPS point appends"
        risk: "GPS history at 4s intervals × 100K rides = 25K writes/sec — use batch writes or DynamoDB streams"
        caveats: "TTL for GPS history (30 days). Cold storage to S3 Glacier for compliance/audit."
        nfrs: [scalability, durability]
      - fundamental: distributed/circuit-breaker
        config: "Circuit breaker on payment service calls from ride completion — fail-open, queue for retry"
        why: "Payment gateway outage should not prevent ride completion — defer payment, don't block driver"
        not_this: "Synchronous payment at ride end — gateway timeout holds driver app frozen during payment"
        risk: "Open circuit queues unpaid rides — need reconciliation job to clear queue when payment recovers"
        caveats: "Payment retry queue in SQS with exponential backoff. Alert if queue depth > 1000 rides."
        nfrs: [availability, consistency]
      - fundamental: distributed/cap-theorem
        config: "AP for driver location (stale is OK), CP for ride matching (exactly-once assignment required)"
        why: "Double-matching a ride is catastrophic — matching requires strong consistency; location is eventually consistent"
        not_this: "AP everywhere — eventual consistency for matching causes two drivers to accept the same ride"
        risk: "Network partition during matching — use distributed lock (Redis Redlock) for atomic assignment"
        caveats: "Location updates: Redis GEO (AP). Ride lock: Redis Redlock across 3 nodes (quasi-CP)."
        nfrs: [consistency, availability]
      - fundamental: storage/s3
        config: "S3 for driver/vehicle photos, KYC documents, trip receipts (PDF), insurance certificates"
        why: "Binary documents are write-once read-occasionally — S3 object storage at <$0.023/GB vs DB blob overhead"
        not_this: "Storing documents in DynamoDB or Postgres — binary blobs bloat tables, no content-type support"
        risk: "GDPR deletion request requires purging S3 objects + DB metadata atomically"
        caveats: "S3 versioning for KYC documents (audit compliance). Pre-signed URLs expire in 1h for document access."
        nfrs: [durability, cost]

  - slug: chat-system
    title: "WhatsApp/Slack Messaging"
    description: "Design real-time messaging: 1-to-1 chat, group chat (256 members), E2E encryption, offline queue, 2B users"
    path: problems/chat-system
    nfrs:
      - slug: scalability
        phases: [2, 4, 6, 7, 9, 10]  # estimation, architecture, storage, fan-out, media, scaling
      - slug: performance
        phases: [3, 5, 7, 9, 11]    # API, delivery flow, fan-out, media, presence
      - slug: availability
        phases: [4, 10]             # architecture, scaling & reliability
      - slug: consistency
        phases: [5, 11]             # delivery flow (ordering), presence
      - slug: durability
        phases: [6, 8]              # storage, E2E encryption
      - slug: security
        phases: [8]                 # end-to-end encryption
      - slug: cost
        phases: [2, 9]              # estimation, media sharing storage costs
    functional_requirements:
      - slug: message-delivery
        title: "Message Delivery"
        phases: [4, 5]              # core architecture, delivery flow
      - slug: group-chat
        title: "Group Chat & Fan-out"
        phases: [7]                 # group chat fan-out
      - slug: encryption
        title: "E2E Encryption"
        phases: [8]                 # end-to-end encryption
      - slug: media-sharing
        title: "Media Sharing"
        phases: [9]                 # media sharing & storage
      - slug: presence
        title: "Read Receipts & Presence"
        phases: [11]                # read receipts & presence
      - slug: offline-queue
        title: "Offline Message Queue"
        phases: [5, 6]              # delivery flow, data model & storage
    uses:
      - fundamental: storage/redis
        config: "Pub/Sub for real-time message delivery, presence tracking"
        why: "Sub-ms publish to connected WebSocket sessions"
        not_this: "Polling — adds 1-5 second latency to message delivery"
        risk: "Redis Pub/Sub is fire-and-forget — message loss on disconnect"
        caveats: "Pub/Sub does not persist. Use Kafka for message durability. Redis for delivery only."
        nfrs: [performance, scalability]
      - fundamental: networking/load-balancing
        config: "NLB for persistent WebSocket connections, ALB for REST API"
        why: "WebSocket connections are long-lived — NLB handles millions of concurrent TCP connections"
        not_this: "ALB — WebSocket idle timeout (4000s) and L7 overhead add latency"
        risk: "NLB target deregistration drops active WebSocket sessions"
        caveats: "NLB connection draining: 300s. Client must auto-reconnect on disconnect."
        nfrs: [scalability, availability]
      - fundamental: storage/dynamodb
        config: "Messages table (PK=conversation_id, SK=message_id), TTL for ephemeral messages"
        why: "Write-heavy (billions of messages/day), auto-scales, single-digit-ms reads"
        not_this: "Postgres — write throughput limit at B+ scale, sharding complexity"
        risk: "Hot partition on group chats with 256 members"
        caveats: "On-demand pricing at 2B users = significant cost. Use reserved capacity."
        nfrs: [scalability, durability]
      - fundamental: messaging/message-queues
        config: "Kafka for message persistence and replay; partitioned by conversation_id"
        why: "Redis Pub/Sub is fire-and-forget. Kafka guarantees persistence + replay for offline users"
        not_this: "Redis Streams — works but lacks Kafka's partition-level ordering guarantees"
        risk: "Kafka consumer lag during message storm = delayed delivery notifications"
        caveats: "Partition by conversation_id for ordered delivery. Replication factor 3 for durability."
        nfrs: [scalability, durability]
      - fundamental: networking/websockets
        config: "Persistent WebSocket connections per chat server; sticky sessions via NLB"
        why: "Real-time bidirectional chat — HTTP polling adds 1-5 second latency per message"
        not_this: "SSE — unidirectional only, cannot send messages from client to server"
        risk: "100K concurrent connections per chat server = ~1 GB RAM minimum"
        caveats: "Auto-reconnect with exponential backoff (1s, 2s, 4s, 8s). Preserve message order on reconnect."
        nfrs: [performance]
      - fundamental: distributed/cap-theorem
        config: "AP system: messages delivered at-least-once; read-your-own-writes via local cache"
        why: "Availability over consistency — a delayed message is better than a failed send"
        not_this: "CP system — a network partition that blocks message sends is unacceptable for chat"
        risk: "Eventual consistency means brief duplicate delivery on reconnect — deduplicate client-side"
        caveats: "Use idempotency keys (message_id) for at-least-once deduplication."
        nfrs: [consistency]
      - fundamental: storage/s3
        config: "S3 for media attachments (images, video, voice notes); pre-signed URLs for direct upload"
        why: "Chat media is write-once, read-many — S3 object storage with CDN is optimal, not DB blobs"
        not_this: "Storing media in DynamoDB — 400KB item limit, much higher cost per GB vs S3"
        risk: "Pre-signed URL expiry must outlast delivery to offline users — set TTL ≥ 7 days"
        caveats: "Multipart upload for >5MB. Client compresses images client-side before upload."
        nfrs: [durability, cost]
      - fundamental: distributed/circuit-breaker
        config: "Circuit breaker on presence service calls from chat delivery — fail-open, skip presence check"
        why: "Presence tracking is non-critical — message delivery must continue even if presence service is down"
        not_this: "Fail-closed presence check — blocks all message sends when presence service is overloaded"
        risk: "Messages delivered to 'offline' users when circuit is open — slight read-receipt inaccuracy"
        caveats: "Presence circuit breaker threshold: 5 failures in 10s. Half-open probe every 30s."
        nfrs: [availability]

  - slug: search-autocomplete
    title: "Search Autocomplete"
    description: "Design typeahead: prefix matching, popularity ranking, fuzzy matching, <50ms response, trending updates"
    path: problems/search-autocomplete
    nfrs:
      - slug: scalability
        phases: [3, 4, 8, 9, 10]    # trie structure, architecture, data model, personalization, scaling
      - slug: performance
        phases: [2, 3, 6]           # API design, trie structure, ranking algorithm
      - slug: availability
        phases: [4, 7, 11]          # architecture, trie updates, failure modes
      - slug: consistency
        phases: [7]                 # trie updates
      - slug: durability
        phases: [8, 11]             # data model, failure modes
      - slug: cost
        phases: [9, 10]             # personalization overhead, scaling
      - slug: observability
        phases: [5]                 # data collection & analytics
    functional_requirements:
      - slug: prefix-matching
        title: "Prefix Matching"
        phases: [3, 4]              # trie structure, architecture
      - slug: ranking
        title: "Ranking Algorithm"
        phases: [6, 9]              # ranking algorithm, personalization
      - slug: trending
        title: "Trending Updates"
        phases: [5, 7]              # data collection, trie updates
      - slug: personalization
        title: "Personalization"
        phases: [9]                 # personalization deep dive
    uses:
      - fundamental: storage/redis
        config: "Sorted sets for top-K suggestions per prefix, TTL for trending"
        why: "ZRANGEBYSCORE returns top suggestions in O(log N + K), sub-ms latency"
        not_this: "Elasticsearch — too slow for <50ms typeahead at every keystroke"
        risk: "Memory explosion: all prefixes × top-K suggestions"
        caveats: "Only store prefixes up to length 10. Longer prefixes fall through to ES."
        nfrs: [performance, scalability]
      - fundamental: networking/cdn/cloudfront
        config: "Edge caching for popular prefix results (top 1000 prefixes)"
        why: "80% of searches start with the same 1000 prefixes — cache at edge for <10ms"
        not_this: "No CDN — every keystroke hits origin servers"
        risk: "Stale suggestions for trending topics"
        caveats: "TTL 60s for popular prefixes. Invalidate on trending spike."
        nfrs: [performance, cost]
      - fundamental: storage/sharding
        config: "Shard trie by first character of prefix; Redis cluster for in-memory prefix storage"
        why: "Trie for all English prefixes across 10 length levels doesn't fit on one node"
        not_this: "Single Redis node — trie for 100K+ prefix-suggestion pairs hits memory ceiling"
        risk: "Letter 't' shard receives 10× traffic vs 'x' shard — monitor hot shards"
        caveats: "Only store prefixes up to length 10. Longer strings fall through to Elasticsearch."
        nfrs: [scalability]
      - fundamental: distributed/consistent-hashing
        config: "Consistent hashing for trie shard routing — prefix 'th' always routes to same node"
        why: "Adding a trie shard with modulo routing invalidates all prefix→shard mappings — CH limits to K/N remapping"
        not_this: "Modulo hash routing — adding one shard reshuffles all prefix lookups"
        risk: "Hotspot shard for high-frequency letters ('t', 's', 'a') — use virtual nodes for rebalancing"
        caveats: "150 virtual nodes per trie shard. Monitor query distribution percentile per shard."
        nfrs: [scalability]
      - fundamental: storage/elasticsearch
        config: "Elasticsearch for long-tail prefix matching beyond top-10 chars and fuzzy query fallback"
        why: "Redis holds only top prefixes ≤10 chars — ES handles longer queries and typo-tolerant fuzzy search"
        not_this: "Redis for all queries — 100K+ prefix-suggestion pairs exhaust memory for long-tail prefixes"
        risk: "ES query latency ~20-50ms vs Redis <1ms — only fall through after Redis miss"
        caveats: "Use ES completion suggester with fuzzy enabled (fuzziness=1). Cache hot ES results in Redis."
        nfrs: [performance, scalability]
      - fundamental: storage/dynamodb
        config: "Query logs table: persist (user_id, query, timestamp) for personalisation and analytics"
        why: "Click-through and query log analytics drive personalisation ranking — must survive Redis flush"
        not_this: "Redis for query logs — eviction under memory pressure loses analytics data"
        risk: "High write volume from every keystroke — batch analytics writes, not per-keystroke"
        caveats: "Batch writes via Kinesis Firehose → DynamoDB or S3/Athena. Real-time counters in Redis."
        nfrs: [durability, scalability]

  - slug: twitter-feed
    title: "Twitter/X Feed"
    description: "Design Twitter: tweet posting, fan-out feed, timeline caching, trending, 500M users, celebrity accounts"
    path: problems/twitter-feed
    nfrs:
      - slug: scalability
        phases: [2, 4, 5, 6, 7, 8, 10, 11]  # estimation, fan-out, architecture, caching, data model, celebrity, trending, scaling
      - slug: performance
        phases: [3, 4, 6, 8, 9, 10]         # API, fan-out, caching, celebrity, ranking, trending
      - slug: availability
        phases: [5, 11]                      # architecture, scaling & failure modes
      - slug: consistency
        phases: [4]                          # fan-out strategies (eventual vs strong)
      - slug: durability
        phases: [7, 11]                      # data model, failure modes
      - slug: cost
        phases: [2, 6, 8]                    # estimation, caching, celebrity deep dive
      - slug: observability
        phases: [10]                         # trending topics & search indexing
    functional_requirements:
      - slug: tweet-posting
        title: "Tweet Posting"
        phases: [3, 4]              # API design, fan-out strategies
      - slug: feed-fanout
        title: "Feed Fan-out"
        phases: [4, 5, 6]           # fan-out strategies, architecture, timeline caching
      - slug: celebrity-problem
        title: "Celebrity Problem"
        phases: [8]                 # celebrity problem deep dive
      - slug: trending-topics
        title: "Trending Topics"
        phases: [10]                # trending topics & search indexing
      - slug: feed-ranking
        title: "Feed Ranking"
        phases: [9]                 # feed ranking algorithm
    uses:
      - fundamental: storage/redis
        config: "Sorted sets for home timeline cache, pub/sub for real-time updates"
        why: "Pre-computed timelines in sorted sets — O(log N) insert, O(1) range read"
        not_this: "Memcached — no sorted set support, need ordering for timeline"
        risk: "Celebrity tweet fan-out to 100M followers melts Redis cluster"
        caveats: "Hybrid fan-out: write for <50K followers, read for celebrities. Cap timeline at 800 tweets."
        nfrs: [performance, scalability]
      - fundamental: networking/cdn/cloudfront
        config: "Edge caching for media (images, videos), trending topics API"
        why: "Viral tweet media gets millions of views — CDN absorbs 95% of reads"
        not_this: "Serving media from origin — viral tweet = origin DDoS"
        risk: "DMCA takedown requires instant CDN invalidation"
        caveats: "CloudFront invalidation: 1000 free/mo. Use wildcard paths for bulk purge."
        nfrs: [performance, cost]
      - fundamental: storage/dynamodb
        config: "Tweets table (PK=user_id, SK=tweet_id), Timeline table (PK=user_id, SK=score)"
        why: "Write-heavy (500K tweets/min), auto-scales without manual sharding"
        not_this: "Postgres — connection exhaustion at Twitter scale"
        risk: "Hot partition on celebrity user_id"
        caveats: "Write sharding for celebrities: PK=user_id#shard. Scatter-gather on read."
        nfrs: [scalability, durability]
      - fundamental: networking/load-balancing
        config: "ALB with path routing: /api → tweet service, /stream → streaming API"
        why: "Streaming API (SSE/WebSocket) needs separate scaling from REST API"
        not_this: "Single ALB target — streaming connections exhaust REST capacity"
        risk: "Streaming connection storm during major events"
        caveats: "Rate limit streaming connections: 1 per user. Reconnect backoff: exponential."
        nfrs: [scalability, availability]
      - fundamental: messaging/message-queues
        config: "Kafka for async tweet fan-out to follower timelines; partitioned by tweeter user_id"
        why: "Fan-out to 100M followers must be async — synchronous fan-out would timeout in seconds"
        not_this: "SQS — no partition-based ordering, harder to replay missed timeline events"
        risk: "Consumer lag during viral tweet = delayed timeline updates for followers"
        caveats: "Hybrid fan-out: write for <50K followers, read for celebrities (fan-out-on-read)."
        nfrs: [scalability]
      - fundamental: storage/sharding
        config: "user_id-based sharding for tweets and timelines; write sharding for celebrity accounts"
        why: "500M users × avg 50 tweets each = 25B tweet rows. Must shard across DB nodes"
        not_this: "Single DB — connection exhaustion and write bottleneck at Twitter scale"
        risk: "Celebrity user_id = hot shard — use PK=user_id#shard for write distribution"
        caveats: "Scatter-gather on celebrity reads: query all shards, merge results."
        nfrs: [scalability, cost]
      - fundamental: networking/websockets
        config: "Persistent WebSocket connections for Twitter streaming API (filtered real-time tweet stream)"
        why: "Streaming API delivers tweets matching keyword/user filters in real-time — polling adds seconds of lag"
        not_this: "SSE — unidirectional, no client filter updates without reconnect"
        risk: "Streaming connection storm during major events (elections, World Cup) — rate limit connections per app"
        caveats: "Twitter streaming: 1 connection per bearer token. Use webhook alternatives for enterprise."
        nfrs: [performance, scalability]
      - fundamental: distributed/consistent-hashing
        config: "Consistent hashing ring for tweet DB shard routing; virtual nodes for even tweet distribution"
        why: "tweet_id modulo sharding means adding a node reshuffles (N-1)/N tweets — CH limits to K/N"
        not_this: "Modulo sharding — catastrophic resharding cost at Twitter scale (25B tweets)"
        risk: "Celebrity user_id concentrates writes on one shard — add write sharding suffix"
        caveats: "Use 150 virtual nodes per physical DB. Monitor shard utilisation percentile distribution."
        nfrs: [scalability]
      - fundamental: storage/elasticsearch
        config: "Elasticsearch for tweet full-text search, trending topic aggregations, hashtag index"
        why: "DynamoDB has no full-text search — ES inverted index handles 500M tweet query volume"
        not_this: "DynamoDB scan — O(N) scan across 25B tweets is infeasible for search"
        risk: "ES indexing lag can be 1-2s behind real-time tweet ingest — acceptable for search, not for feed"
        caveats: "Index tweet text + user_id + timestamp. Shard ES by tweet date for time-range query efficiency."
        nfrs: [performance, scalability]
      - fundamental: distributed/circuit-breaker
        config: "Circuit breaker on Kafka fan-out workers to timeline service — fail-open during fan-out storms"
        why: "Viral tweet fan-out to 100M followers can overwhelm timeline service — circuit breaker isolates failure"
        not_this: "Unbounded fan-out retries — cascading timeout as each retry further loads the already-overwhelmed service"
        risk: "Open circuit means some followers see delayed timeline updates — acceptable for eventual consistency"
        caveats: "Monitor fan-out lag as leading indicator. Shed celebrity fan-out first (fallback to fan-out-on-read)."
        nfrs: [availability, scalability]

