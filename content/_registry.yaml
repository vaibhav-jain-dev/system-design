        related_fundamentals: []

      - number: 9
        question: "Q096: Design a mobile location tracking system. 50M active users send GPS coordinates every 30 seconds. Show nearby friends within 500m in real-time."
        needed: "POST /location from app every 30s; store in Redis with GEOADD (geo index per user); query with GEORADIUSBYMEMBER to find nearby users; privacy: only show to mutual friends; expire locations after 5 min"
        answer: "Location update: mobile app → POST /location {user_id, lat, lon, timestamp}. Rate limit: 1 req per 30s per user. Server: GEOADD 'user_locations' {lon} {lat} {user_id}. Redis GEO index: uses geohash internally, stored as sorted set. TTL: EXPIRE 'user_locations' is per-key — instead, track last_updated per user in a separate hash: HSET 'location_timestamps' {user_id} {timestamp}. Background worker every 60s: HGETALL 'location_timestamps' → find users with timestamp > 5 min ago → ZREM 'user_locations' {user_id}. Nearby query: GET /nearby?user_id=X → GEORADIUSBYMEMBER 'user_locations' {user_id} 500 m ASC COUNT 100. Returns up to 100 nearby user_ids. Privacy filter: intersect with friend list (from friendships table or Redis SET 'friends:{user_id}'). Show only mutual friends. Result: friend_ids with distance. Scale: 50M users in one Redis GEO key = 50M entries in a sorted set. Redis handles 50M entries (sorted set memory: ~100 bytes/entry × 50M = 5GB). Single GEORADIUSBYMEMBER on 50M entries: <10ms. Feasible on one Redis instance (r6g.4xlarge, 128GB RAM)."
        tradeoff: "Redis GEO (single cluster) vs. geohash-based sharding: single cluster: simple, 50M entries in one sorted set, <10ms query. Risk: single point of failure, memory bound (~5GB). Sharding by geohash: divide world into geohash cells (precision 4 = 40km×20km), shard by cell. GEORADIUSBYMEMBER within a cell is isolated. Cross-cell queries (user near cell boundary): query 9 adjacent cells. More complex but scales horizontally. For 50M users: single cluster is sufficient with replication. For 500M users: geohash sharding required."
        caveat: "Privacy: GEORADIUSBYMEMBER returns ALL users within 500m, including non-friends. Post-filter by friend list. But the filter itself reveals that someone is nearby — even if not shown, the friend suggestion 'People you may know: nearby' reveals location. Many users don't want any location sharing. Opt-in: location sharing is disabled by default. Only visible to friends you've explicitly enabled sharing with. Ghost mode: user is invisible to GEORADIUSBYMEMBER (not added to the GEO index) but still updates their location for their own queries."
        watch: "Location history follow-up: store full location trail for features like 'where have you been' or delivery tracking. Write location updates to Kafka → consumer writes to time-series DB (InfluxDB or PostgreSQL with TimescaleDB). Query: SELECT * FROM location_history WHERE user_id = X AND time > now() - interval '7 days' ORDER BY time. Partition by user_id for fast single-user queries. Retention: 30 days for users (privacy), 7 years for regulatory (logistics companies). Separate tables by retention tier."
