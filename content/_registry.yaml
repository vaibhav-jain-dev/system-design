        question: "How do systems handle live streaming ingestion?"
        needed: "RTMP/WebRTC ingest servers, transcode to HLS in real time, publish to CDN edge"
        answer: "Ingest servers receive RTMP streams from broadcasters. Each ingest server runs FFmpeg for real-time transcoding to multiple quality levels (1080p, 720p, 480p, 360p) simultaneously. As segments are generated (every 2 seconds), they're uploaded to S3 and pushed to CDN edge locations. The .m3u8 playlist is updated to include new segments. Viewers fetch the live playlist every 2 seconds to discover new segments."
        tradeoff: "RTMP is TCP-based and stable on wired connections but adds latency on packet loss (TCP retransmission). SRT (Secure Reliable Transport) is a modern alternative that works better over lossy networks (mobile streaming). RTMP remains the most widely supported by streaming software."
        caveat: "Ingest server capacity is hard to predict — a popular creator going live can attract thousands of viewers in seconds. Ingest servers need to transcode in real time regardless of viewer count (transcoding is on the ingest side, not per-viewer). Over-provision ingest servers — they're cheaper than dropping a live stream."
        watch: "Live stream interruption (broadcaster loses connection) should show a 'stream interrupted, trying to reconnect' state to viewers rather than ending the stream. Buffer the last 30 seconds of segments; if the broadcaster reconnects within 60 seconds, resume seamlessly."
        related_fundamentals: [networking/cdn]
      - number: 99
        question: "How do systems record live streams for replay?"
        needed: "concatenate HLS segments into full video on stream end, store in S3, trigger transcode job"
        answer: "During live streaming, all HLS segments are already stored in S3. On stream end (stream end signal or timeout after 60 seconds of no new segments), trigger a post-processing job: concatenate all segments into a single MP4 file using FFmpeg, generate a thumbnail from the first few minutes, update the video metadata record from 'live' status to 'vod' status with the VOD URL."
        tradeoff: "Storing segments as-is (without concatenation) works for replay but creates thousands of HTTP requests for a 2-hour stream (3600 segments). Concatenation into a single MP4 enables seeking and better CDN caching. Concatenation takes 5–15 minutes of compute for a 2-hour stream."
        caveat: "Some streamers want clips to be available immediately during the live stream (Twitch Clips). This requires a separate clip extraction service that can seek into the current live segment buffer and extract 60-second clips without waiting for stream end."
        watch: "Live-to-VOD conversion timing is a UX decision: Twitch makes VOD available immediately after stream ends; YouTube Live takes 1–2 hours for processing. Immediate availability (segment concatenation only) is faster but produces lower quality than re-transcoding from source."
      - number: 100
        question: "How do systems store and query video metadata efficiently?"
        needed: "indexed relational table (PostgreSQL) for structured queries; Elasticsearch for full-text search"
        answer: "Use PostgreSQL for structured video metadata: video_id, user_id, title, description, upload_at, duration, status, privacy_setting, view_count, like_count. Index by (user_id, upload_at) for 'my videos' queries and by status for moderation queues. Sync to Elasticsearch (via Debezium CDC) for full-text search on title and description. Cache hot metadata (trending videos' title, thumbnail URL) in Redis."
        tradeoff: "MongoDB (document store) is sometimes used for video metadata because the schema is flexible — videos can have arbitrary tag structures, subtitles, chapters. PostgreSQL with JSONB column for flexible fields gives you the same flexibility with better query performance and transaction safety."
        caveat: "Don't store view_count as a column in the videos table and UPDATE it on every view — at 100K views/second on a viral video, this is 100K UPDATE statements/second on a single row, causing lock contention. Store view count separately in Redis and sync to PostgreSQL in batches."
        watch: "PostgreSQL can handle 100M video records comfortably with proper indexing (partial indexes on status, GIN index on tags). At 1B+ records, partition the table by upload_at (monthly partitions) to keep each partition under 100M rows for maintainable index sizes."

  - slug: search
    title: "Search & Recommendations"
    description: "Autocomplete, ranking, distributed search, personalization, A/B testing"
    number_range: "101–120"
    questions:
      - number: 101
        question: "How do systems implement search autocomplete?"
        needed: "trie or prefix index in Redis sorted set (ZRANGEBYLEX); return top-K by score on each keystroke"
        answer: "Store each query prefix as a key in a Redis sorted set with the full query as the member and historical click count as the score. On each keystroke, call ZRANGEBYLEX with the typed prefix as the range to get all matching entries, then sort by score and return the top 5–10. For sub-50ms latency at scale, precompute prefix→top-K mappings in Redis and cache the final result set per prefix."
        tradeoff: "Trie in Redis is fast for lookups but expensive to update — adding a new query means updating every prefix entry for that query string. Elasticsearch prefix queries are simpler to maintain but slower (>50ms per keystroke vs <5ms for Redis ZRANGEBYLEX)."
        caveat: "Only store prefixes up to length 10 — longer typed strings fall through to a full-text search engine. Redis ZRANGEBYLEX is case-sensitive; normalize all keys to lowercase at write time or you'll miss matches."
        watch: "Personalized autocomplete (user's own history first) requires per-user sorted sets — this multiplies storage by your user count. Distinguish between global popular suggestions (shared sorted set) and user-specific history (per-user set) before you start."
        related_problems: [search-autocomplete]
        related_fundamentals: [storage/redis]
      - number: 102
        question: "How do systems rank search results?"
        needed: "BM25 for text relevance, boosted by recency, popularity, personalization signals"
        answer: "Start with BM25 (Best Match 25) for text relevance — it scores documents by term frequency (how often the query term appears) normalized by document length and field frequency across the corpus. Then apply multiplicative boosts: recency (documents from the last 7 days get 1.3x boost), popularity (click-through rate over last 30 days as a signal), and personalization (cosine similarity of user embedding to document embedding for logged-in users)."
        tradeoff: "BM25 alone is deterministic and interpretable — easy to debug why a result ranked high. Adding ML re-ranking (BERT-based cross-encoder) improves relevance by 15–30% but adds 50–200ms latency and requires inference infrastructure. Use BM25 for retrieval, ML for re-ranking the top 50."
        caveat: "BM25 rewards documents that repeat query terms — 'buy shoes buy shoes buy shoes' ranks high. Spam and keyword-stuffed content must be filtered before indexing or BM25 will surface it as highly relevant."
        watch: "Recency boosts can bury evergreen content that's highly relevant but older. Calibrate the recency decay function carefully — use a logarithmic decay rather than a hard cutoff so 6-month-old documents aren't completely penalized."
        related_problems: [search-autocomplete]
      - number: 103
        question: "How do systems handle millions of searches per second?"
        needed: "distributed search cluster (Elasticsearch shards), query cache for popular terms, CDN for static suggestions"
        answer: "Distribute the index across shards (typically 5–20 primary shards in Elasticsearch), each holding a subset of documents. Add replica shards (1–2 per primary) to scale read throughput — a 10-shard cluster with 2 replicas handles 30x the read load of a single node. Cache query results for popular search terms in Redis with a 60-second TTL — the top 1,000 queries account for ~80% of traffic. Serve autocomplete suggestions from CDN edge nodes for the most popular prefixes."
        tradeoff: "More shards = more parallelism but higher scatter-gather overhead — every query fans out to all shards and the coordinator merges results. The optimal shard count balances parallelism against merge cost; avoid over-sharding (>50GB per shard is a common guideline)."
        caveat: "Elasticsearch's default query cache caches results per shard, not globally — two identical queries on different shards don't share cache entries. Use an application-level Redis cache in front of Elasticsearch for global query result caching."
        watch: "Hot shards (one shard receiving disproportionate traffic) destroy even distribution. Route queries round-robin across replicas and monitor per-shard query rates — a single shard at 10x the average rate signals a problem."
        related_problems: [search-autocomplete]
        related_fundamentals: [distributed/consistent-hashing]
      - number: 104
        question: "How do systems correct spelling mistakes in search?"
        needed: "edit distance (Levenshtein) against dictionary; n-gram index for phonetic matching"
        answer: "Use a two-pass approach: first, check if the query matches known terms in the index exactly; if zero results, generate spelling candidates using Levenshtein distance ≤ 2 from a prebuilt dictionary of indexed terms. Rank candidates by edit distance + term frequency. For phonetic correction ('colour' → 'color'), use Soundex or Metaphone encodings to find phonetically similar terms. Elasticsearch's fuzziness parameter implements edit-distance matching natively."
        tradeoff: "Levenshtein distance at edit distance 2 catches most typos but is O(m×n) per candidate — slow for large vocabularies. Pre-building a BK-tree (metric tree) over the dictionary reduces correction lookup to O(log N) on average."
        caveat: "Autocorrect is inappropriate for domain-specific terms (product IDs, proper nouns, model numbers) — 'iPhone 14 Pro' should not be corrected to 'iPhone 14 Pro Max'. Maintain a do-not-correct allowlist for known exact terms."
        watch: "Did-you-mean suggestions ('Did you mean: running shoes?') require a separate UI treatment from silent autocorrect — users trust systems more when they can see and reject the suggestion rather than having their query silently changed."
        related_problems: [search-autocomplete]
      - number: 105
        question: "How do systems recommend products to users?"
        needed: "collaborative filtering (user-item matrix) or item embeddings (ANN search); personalized ranking"
        answer: "Two approaches: collaborative filtering (matrix factorization on the user-item interaction matrix) finds users with similar purchase/click history and recommends what they bought. Item-based embeddings (train a two-tower model mapping users and items to the same embedding space) enable ANN (Approximate Nearest Neighbor) search over the item embedding index using HNSW. At serve time, retrieve top-100 candidates via ANN, then re-rank with a point-wise ML model incorporating price, recency, and inventory."
        tradeoff: "Collaborative filtering is strong for users with long history but fails for new users (cold start). Item embeddings handle cold start better — a new item without interaction data can still be embedded from its features (title, category, description). Use both and blend scores."
        caveat: "Matrix factorization recommendations become stale as user taste changes — a user who bought baby clothes 3 years ago shouldn't keep seeing them. Weight recent interactions more heavily by applying time-decay to the interaction matrix."
        watch: "Popularity bias: without correction, recommendation systems amplify popular items (80% of recommendations are the same top 1,000 products). Add diversity constraints — ensure at least N different categories in a recommendation set."
      - number: 106
        question: "How do systems personalize recommendations?"
        needed: "user behavior log (clicks, dwell time, purchases) → feature store → model inference at serve time"
        answer: "Collect user behavior events: impressions, clicks, dwell time (>30 seconds = positive signal), add-to-cart, purchase, explicit ratings. Write them to Kafka, consume into a feature store (Redis for real-time features like 'last 5 clicked categories', Hive/BigQuery for batch features like '30-day purchase history'). At serve time, fetch user features from Redis (<1ms), concatenate with item features, and score with the ranking model. Update real-time features on every interaction."
        tradeoff: "Real-time features (updated per event via streaming) are more accurate but require streaming infrastructure (Kafka + Flink). Batch features (updated daily via Spark) are simpler but stale by up to 24 hours — a user who just bought a laptop still sees laptop recommendations until the next batch run."
        caveat: "Users in incognito mode or without cookies have no history — serve popularity-based recommendations and switch to personalized once you observe 3–5 interactions in the current session. Don't show a blank or random set."
        watch: "Feature drift: if the feature store and model training data use different feature computation logic (e.g., different time windows for 'recent clicks'), serving features don't match training distribution and model quality degrades silently. Version your feature definitions."
      - number: 107
        question: "How do systems update recommendations in real time?"
        needed: "streaming pipeline: event → Kafka → Flink → feature store update → model re-rank"
        answer: "Publish user interaction events (click, purchase, skip) to Kafka immediately. A Flink streaming job consumes events, updates real-time features in Redis (e.g., increment click count for a category, update last_seen_item), and triggers a lightweight re-rank of the user's pending recommendation queue. The next API call for recommendations fetches updated features and returns fresher results. Full model retraining runs nightly on the full event log."
        tradeoff: "Full model retraining (nightly) captures long-term patterns but is always 12–24 hours behind user behavior changes. Online learning (incrementally updating model weights on each event) is more current but harder to validate — a bad event can corrupt the model. Most systems use nightly batch retraining + real-time feature updates without online learning."
        caveat: "Real-time feature updates via Flink must be idempotent — Kafka's at-least-once delivery means the same event can be processed twice. Incrementing a counter twice for one click corrupts the feature. Use event deduplication on Kafka consumer or idempotent INCR with a set to track seen event IDs."
        watch: "Real-time recommendation updates create feedback loops — if you instantly boost an item after a click, and that boosted item gets more clicks, it can dominate recommendations within hours. Add decay functions so real-time boosts fade without sustained engagement."
        related_fundamentals: [messaging/kafka]
      - number: 108
        question: "How do systems track user clicks for analytics?"
        needed: "client-side event log (impression, click, conversion) → Kafka → analytics warehouse"
        answer: "Instrument client-side events: impression (item shown), click (item clicked), conversion (purchase). Each event includes: user_id (or anonymous session ID), item_id, position, timestamp, page context, and device type. Batch events on the client (every 5 seconds or on page unload) and POST to a collector endpoint. The collector writes to Kafka with minimal processing. Downstream: Flink for real-time feature updates, Spark batch to warehouse (Redshift/BigQuery) for analytics."
        tradeoff: "Client-side event collection captures browser-level signals (scroll depth, dwell time) that server-side logging can't see. But ad blockers and browser privacy settings block ~15–30% of client-side events. Critical conversion events (purchase, signup) must also be logged server-side as the source of truth."
        caveat: "Position bias: items shown at position 1 get 5–10x more clicks than position 5 regardless of relevance. Raw click rates are misleading for relevance evaluation. Use position-corrected metrics (inverse propensity weighting) when using click data for model training."
        watch: "Anonymous session tracking must comply with GDPR/CCPA — if the anonymous ID can be linked to a known user (through login), you must handle the data under the user's privacy preferences. Build a consent-aware event pipeline from the start."
        related_fundamentals: [messaging/kafka]
      - number: 109
        question: "How do systems detect trending searches?"
        needed: "sliding window count per query term in Redis, top-K via sorted set, refresh every 5 min"
        answer: "Count search queries in a 1-hour sliding window using Redis: for each query, ZINCRBY a sorted set keyed by the current hour bucket (e.g., 'trending:2024-01-15T14'). The top-K trending terms are ZREVRANGE of the sorted set. To detect trending vs. just popular, compare the last-hour count against the 7-day average for that term — a 3x spike over baseline qualifies as trending. Refresh the trending list every 5 minutes."
        tradeoff: "Pure count (absolute query volume) surfaces only perennially popular terms. Velocity-based trending (spike detection against baseline) surfaces genuinely new trends but requires 7-day historical data per query term. The historical baseline data grows with your query vocabulary."
        caveat: "Trending detection is gameable — coordinated bots can inflate query counts for a term to make it trend artificially. Apply bot filtering (same session ID querying the same term repeatedly doesn't count) before updating trending counters."
        watch: "Query normalization matters: 'iphone15', 'iPhone 15', and 'iphone 15' should be the same trending term. Lowercase and strip punctuation before counting, or you'll split the signal across multiple keys and miss the trend."
        related_fundamentals: [storage/redis]
        related_problems: [search-autocomplete]
      - number: 110
        question: "How do systems support multi-language search?"
        needed: "language detection at index time, per-language analyzer (tokenizer + stemmer), query in detected lang"
        answer: "At index time, detect the document's language (using fastText or langdetect) and apply a language-specific analyzer: French uses accent-folding and French stemming, Japanese uses kuromoji tokenizer (character-based, not whitespace), Arabic uses Arabic normalizer + stemmer. Store language as a document field. At query time, detect the query language and use the matching analyzer. In Elasticsearch, define a separate field per language (body.en, body.fr) and boost the field matching the query language."
        tradeoff: "Per-language fields (body.en, body.fr) are clean and fast but double your index size per language. Dynamic language detection at query time avoids this but misclassifies short queries — a 2-word query in French may be detected as Spanish."
        caveat: "Mixed-language documents (a German product page with English technical terms) confuse language detection — the technical terms won't be stemmed correctly if the document is classified as German only. Index critical fields in both detected language and a fallback standard analyzer."
        watch: "Right-to-left languages (Arabic, Hebrew) require text direction handling in both the search UI and the index. The query parser must handle RTL input correctly or searches wrap incorrectly on word boundaries."
      - number: 111
        question: "How do systems filter search results?"
        needed: "post-query filter on indexed fields (price range, category, date); pre-filter narrows candidate set"
        answer: "Two strategies: post-filter (run the full query, then apply filter on results) preserves relevance scoring but wastes computation on documents you'll discard. Pre-filter (filter before scoring, using indexed field values) is faster but may exclude relevant documents from the scored set. In Elasticsearch, use post_filter for faceted navigation (so facet counts reflect unfiltered results) and bool query filters (which are cached) for hard constraints like availability=true."
        tradeoff: "Cached filters (Elasticsearch filter context) are reused across queries without scoring overhead — a category=shoes filter used by 1000 queries per second only needs to be computed once. But query filters (in query context) recompute on every call. Always use filter context for non-scoring constraints."
        caveat: "Range queries on high-cardinality numeric fields (price, timestamp) can be slow without careful indexing. Elasticsearch uses BKD trees for numeric range queries — avoid keyword-type fields for numeric ranges; use integer/float types."
        watch: "Filter + pagination has a subtle bug: applying a post-filter after scoring means page 2 of filtered results doesn't start where page 1 ended in the full result set. Use search_after with the last document's score for consistent pagination."
      - number: 112
        question: "How do systems avoid showing banned or removed content in search?"
        needed: "soft delete + re-index on removal; moderation system emits delete event → index update"
        answer: "When content is removed, emit a ContentRemoved event to Kafka. A search indexer consumer processes the event and issues a DELETE to Elasticsearch by document ID — this removes it from the index within seconds. For soft-deleted content (marked deleted but retained in the DB), use a filtered alias in Elasticsearch that excludes documents where status=deleted, so the index filter is applied at query time without a re-index."
        tradeoff: "Kafka event-driven deletion propagates within seconds but requires the Kafka consumer to be running and caught up. Direct synchronous deletion (REST call to Elasticsearch on every moderation action) is simpler and immediate but creates coupling between the moderation service and the search service."
        caveat: "Content removed from the primary DB may still be in Elasticsearch if the Kafka consumer is lagging. Monitor consumer lag on the content-removal topic and alert if it exceeds 1,000 events — that's potentially 1,000 pieces of removed content still in search."
        watch: "Search engine crawlers (Google, Bing) may cache removed content for days after you remove it from your index. Use robots meta noindex or serve 410 Gone for removed URLs to accelerate deindexing by crawlers."
      - number: 113
        question: "How do systems improve search relevance over time?"
        needed: "click-through rate signals, A/B tests on ranking functions, offline evaluation on labeled set"
        answer: "Three-track relevance improvement: (1) Implicit signals: measure click-through rate (CTR) and last-click abandonment per query-document pair — documents with high CTR rank up, those with low CTR rank down. (2) A/B testing: split traffic between ranking variants, measure CTR/conversion rate with statistical significance. (3) Offline evaluation: maintain a human-labeled dataset of 1,000–5,000 query-document pairs with relevance grades (0–3); compute nDCG (Normalized Discounted Cumulative Gain) on every candidate model before online testing."
        tradeoff: "Implicit CTR signals are abundant and free but noisy — users click on familiar brand names or eye-catching images regardless of text relevance. Human judgment labels are expensive (~$0.05–0.50 per label) but more accurate. Both are needed: labels to train, signals to scale."
        caveat: "nDCG on a static labeled set only measures performance on queries in the label set. For tail queries (long-tail search terms accounting for 40–60% of total volume), there are no labeled pairs — you're flying blind. Use blind-test random sampling for tail query quality assessment."
        watch: "Goodhart's Law in search: optimizing for CTR causes systems to learn to surface clickbait titles. Track post-click metrics (dwell time, purchase rate, return visits) as leading indicators that CTR is being gamed by your own ranking optimization."
      - number: 114
        question: "How do systems store a search index efficiently?"
        needed: "inverted index: term → posting list (doc IDs + positions); stored in Lucene segments on disk"
        answer: "An inverted index maps each term to a sorted posting list: the list of document IDs containing that term, with optional term frequency and positional offsets. Lucene (the engine under Elasticsearch) stores segments — immutable files containing a partial index — and merges them in the background. Each segment has its own inverted index, stored as a compressed FST (finite state transducer) for terms and delta-encoded posting lists (store diffs, not absolute doc IDs). A typical 1B-document index in Lucene takes 20–50 bytes per document in the inverted index."
        tradeoff: "Storing positional information (word offsets) enables phrase queries ('exact phrase search') but doubles or triples index size. If phrase queries aren't needed, disable positions to cut index storage by 30–50%. Trade storage for query capability."
        caveat: "Lucene segments are immutable — updates to a document delete the old doc (mark as deleted in a bitset) and add a new one. Deleted documents still consume disk space until segment merges remove them. Monitor the deleted document ratio — above 20% signals a merge backlog."
        watch: "Index merge storms: Lucene's merge policy triggers large merges when segment count exceeds a threshold. A large merge on a write-heavy index can saturate I/O and cause query latency spikes. Tune merge policy to run merges during off-peak hours."
      - number: 115
        question: "How do systems scale search infrastructure?"
        needed: "horizontal sharding by doc ID range, replica shards for read throughput, coordinator routes query"
        answer: "Distribute the index across primary shards — each shard is a complete independent Lucene index holding a subset of documents. Size each shard at 10–50GB for efficient merge operations. Add replica shards (copies of each primary) to scale read throughput: a 5-primary, 2-replica cluster handles 3x the query load of the primary-only cluster. The coordinator node routes each query to all primary/replica shards, collects results, and merges by score."
        tradeoff: "More shards = higher parallelism for large queries but higher overhead for small queries — a simple query on a 50-shard cluster makes 50 network calls and 50 merge operations. Start with fewer shards (5–10) and shard-split as data grows rather than over-provisioning upfront."
        caveat: "Elasticsearch shards can't be split in place on an existing index (without re-indexing). Size shards conservatively at first — it's easier to merge small shards than to split large ones. The split index API can double shard count if needed."
        watch: "Search nodes are memory-intensive — Elasticsearch recommends 50% of RAM to the JVM heap and the rest for the OS file cache (Lucene segment caching). Undersizing the file cache causes frequent disk reads on segment access, spiking query latency by 10–100x."
        related_fundamentals: [storage/sharding, distributed/consistent-hashing]
      - number: 116
        question: "How do systems track search infrastructure performance?"
        needed: "p99 query latency, cache hit rate, index lag, error rate — emitted as metrics to Prometheus"
        answer: "Export four key metric categories to Prometheus: (1) Query latency: p50/p95/p99 per query type — alert on p99 > 200ms for autocomplete, > 500ms for full-text search. (2) Index freshness: time delta between document update and appearance in search results — alert if lag > 30 seconds. (3) Cache hit rate: for query result cache and OS file cache — < 80% cache hit rate on file cache signals undersized nodes. (4) Cluster health: red/yellow/green status, unassigned shards, JVM heap usage."
        tradeoff: "Elasticsearch's native monitoring (X-Pack) is comprehensive but requires a separate monitoring cluster — sending monitoring data to the same cluster you're monitoring creates a feedback loop under load. Use Metricbeat to export stats to a separate Prometheus instance."
        caveat: "Query latency percentiles (p99) are sensitive to outliers — a single slow query skews p99. Use a histogram metric (rather than summary) in Prometheus to allow re-aggregation across nodes and time windows accurately."
        watch: "JVM garbage collection pauses in Elasticsearch (especially full GC) cause latency spikes of 1–5 seconds, far above SLA. Monitor GC pause duration and frequency — sustained full GC is a sign of a memory leak or insufficient heap, not a tuning problem."
      - number: 117
        question: "How do systems support image or visual search?"
        needed: "encode image to embedding via CNN, ANN search (HNSW) over embedding index"
        answer: "Pass the query image through a CNN (e.g., ResNet-50 or a purpose-built vision encoder) to produce a 512–2048 dimensional embedding vector. Store embeddings for all indexed images in an ANN index (HNSW — Hierarchical Navigable Small World graphs — gives O(log N) approximate nearest neighbor search). At query time, encode the query image and search the HNSW index for the top-K most similar embeddings by cosine similarity. Filter candidates by category or metadata before returning."
        tradeoff: "Exact nearest neighbor search (KNN) is O(N) per query — at 100M images that's 100M distance computations per search. HNSW gives 90–99% recall at <1ms latency with 10–30x less computation by searching a navigable graph structure. The 1–10% recall loss is acceptable for most visual search use cases."
        caveat: "CNN embeddings capture visual similarity, not semantic similarity — a photo of a red umbrella and a red fire hydrant may be more similar to each other than either is to a photo of a yellow umbrella. Fine-tune the encoder on your specific domain (fashion, products) to improve semantic alignment."
        watch: "HNSW indexes are memory-resident for fast access — a 100M-image index with 512-dimensional float32 vectors requires 200GB of RAM. Use quantization (e.g., scalar quantization to int8) to reduce to ~50GB with <1% accuracy loss."
      - number: 118
        question: "How do systems detect and block search abuse?"
        needed: "rate limit per IP/user, CAPTCHA on high-frequency patterns, block scraper user-agents"
        answer: "Apply layered defenses: rate limit search requests to 60/minute per IP and 120/minute per authenticated user using a sliding window counter in Redis. Fingerprint known scraper user-agents and return empty results (not errors) to avoid revealing the detection. For high-value data, add CAPTCHA after the 50th request in a 10-minute window. For coordinated scraping, use IP reputation feeds (MaxMind, ipinfo.io) to pre-block known datacenter and proxy IP ranges."
        tradeoff: "Blocking by user-agent is easily defeated — scrapers set browser user-agents. Behavioral signals (query rate, lack of CSS/image requests, no mouse events, querying sequential IDs) are harder to defeat but require more complex detection logic."
        caveat: "Returning 429 Too Many Requests reveals that rate limiting is in place — scrapers adjust their rate. Returning 200 with empty results (shadow limiting) is more effective because scrapers don't know they're being blocked, but it increases your server load serving empty responses."
        watch: "API key rate limiting is much more effective than IP rate limiting for authenticated search endpoints — a single API key can be revoked immediately, while rotating IPs requires blocklist maintenance. Offer authenticated search APIs with generous limits so legitimate high-volume users don't scrape."
        related_problems: [rate-limiter]
      - number: 119
        question: "How do systems cache popular search queries?"
        needed: "query result cache in Redis with short TTL (60s for trending, 5 min for stable queries)"
        answer: "Cache query results (top 50 documents for a query) in Redis keyed by the normalized query string + filter hash. Trending queries (high velocity in last 15 minutes) get a 60-second TTL — results change fast. Stable queries (consistent volume with no spike) get 5-minute TTL. Evict using LRU. Warm the cache proactively by pre-computing results for the top 10,000 queries by daily volume and loading them into Redis on startup."
        tradeoff: "Short TTLs (60s) for fresh results mean higher cache miss rates and more Elasticsearch load. Longer TTLs (5 min) improve cache hit ratios but show stale results — a product that goes out of stock still appears in cached results for up to 5 minutes. Tune TTL per query category."
        caveat: "Cache key must include all filter parameters, sort order, and page number — a cache hit on query='shoes' with filter=in_stock=true must not serve a result cached for in_stock=false. Hash all query parameters into the cache key to prevent incorrect results."
        watch: "Cache invalidation on index updates is hard at scale — when a popular product goes out of stock, you can't efficiently find and invalidate all cache keys that include it. Use short TTLs as the primary invalidation mechanism; explicit invalidation is only feasible for a small number of high-priority documents."
        related_fundamentals: [storage/redis]
        related_problems: [search-autocomplete]
      - number: 120
        question: "How do systems A/B test search ranking algorithms?"
        needed: "experiment framework: random bucket assignment, log impressions + clicks per bucket, stat significance test"
        answer: "Assign users deterministically to experiment buckets using a hash of user_id + experiment_id (modulo 100 for percentage allocation). Log every impression with its bucket assignment, query, document IDs, and positions. After 7–14 days, compare bucket metrics: CTR (clicks / impressions), NDCG against a labeled set, zero-result rate, and conversion rate. Reject the null hypothesis using a two-sample t-test or Mann-Whitney U test (for non-normal distributions) at p < 0.05."
        tradeoff: "User-level bucketing (same user always sees the same variant) prevents carryover effects but reduces statistical power compared to query-level bucketing (each query is independently assigned). User-level bucketing is standard for personalized ranking to avoid within-session inconsistency."
        caveat: "Search A/B tests are particularly susceptible to novelty effects — users click differently on a new layout for the first 2–3 days before reverting to normal behavior. Exclude the first 48 hours of data from the analysis to avoid novelty bias inflating CTR for the new variant."
        watch: "Simpson's Paradox in search experiments: if one bucket gets more mobile users (who have lower CTR) than the other, the aggregate CTR difference reflects device mix, not ranking quality. Always segment results by device type, query type, and user cohort before drawing conclusions."

  - slug: reliability
    title: "System Reliability & Scaling"
    description: "Auto-scaling, redundancy, observability, deployment, failover, capacity"
    number_range: "121–150"
    questions:
      - number: 121
        question: "How do systems handle sudden traffic spikes?"
        needed: "auto-scaling: CPU/RPS triggers, pre-warming instances, predictive scaling for known events"
        answer: "Configure auto-scaling with two triggers: reactive (scale out when p99 CPU > 70% for 2 minutes, or RPS > 80% of current capacity) and predictive (schedule scale-out 10 minutes before known events like market open, sports events, flash sales). Reactive scaling takes 3–5 minutes from trigger to healthy instance; predictive scaling is immediate. Keep a minimum fleet of 20–30% extra capacity as a buffer for unexpected spikes."
        tradeoff: "Reactive scaling is always 3–5 minutes late — the spike hits before new instances are ready. Predictive scaling requires a known schedule. For truly unpredictable spikes, pre-provision 2x your average capacity during high-risk windows (evenings, weekends) at the cost of ~40% over-provisioning on idle nights."
        caveat: "Auto-scaling with cold instances that take 3 minutes to warm up (JVM startup, cache warming) doesn't protect against spike-of-death. Either reduce startup time to <30 seconds or pre-warm instances by running health-check traffic on new instances before registering them with the load balancer."
        watch: "Scale-in events (removing instances) during sustained high traffic can cause oscillation — you scale out, then the scaler sees capacity is excess and scales back in, then load returns and you scale out again. Add a 15-minute cooldown on scale-in to prevent thrashing."
        related_fundamentals: [networking/load-balancing]
      - number: 122
        question: "How do systems prevent service overload?"
        needed: "rate limiting at API gateway, load shedding (drop low-priority requests), circuit breaker"
        answer: "Apply three-layer overload protection: (1) Rate limiting at the API gateway (nginx, Envoy) — reject excess requests before they hit application servers. (2) Load shedding — under saturation, drop requests by priority: background analytics jobs first, then non-critical reads, never writes or authenticated user requests. (3) Circuit breakers on downstream calls — stop calling a struggling dependency and fail fast, preventing cascading failure."
        tradeoff: "Aggressive load shedding protects the system but degrades user experience. Use graceful degradation instead: under load, serve cached/stale data rather than errors. A user who gets slightly stale feed content is better off than a user who gets 503 Service Unavailable."
        caveat: "Load shedding must be priority-aware — randomly dropping requests is as harmful as not shedding at all. Define request priorities in the API gateway configuration (authenticated > unauthenticated, writes > reads, paying customers > free tier) before you need to shed load in production."
        watch: "Backpressure from load shedding must propagate to clients via proper HTTP status codes (429 with Retry-After, 503 with estimated retry time). Clients that don't handle 429 and immediately retry amplify the overload rather than backing off."
        related_problems: [rate-limiter]
      - number: 123
        question: "How do systems avoid a single point of failure?"
        needed: "redundancy at every layer: multi-AZ deployment, DB replicas, stateless services behind LB"
        answer: "Eliminate SPOFs at every layer: stateless app servers behind a load balancer (N+1 redundancy, any server can be removed), RDS Multi-AZ for the primary DB (synchronous replica in a second AZ, automatic failover in 60–120 seconds), Redis cluster with multiple primaries and replicas, and multi-AZ NAT gateways. For critical paths, deploy active-active across 2 AZs so traffic is always running on both — failover is instant because capacity already exists."
        tradeoff: "Multi-AZ adds ~10% to infrastructure cost (you pay for the standby). Active-active doubles the capacity cost but eliminates failover latency. Active-passive has a 60–120 second failover window — acceptable for databases, too long for stateless API layers."
        caveat: "Multi-AZ doesn't help with regional outages — an AWS us-east-1 region-wide event takes down all AZs simultaneously. For critical applications, multi-region with DNS failover is required. But multi-region adds significant complexity (data replication, CAP tradeoffs)."
        watch: "Shared infrastructure is a hidden SPOF — if your app servers in AZ-A and AZ-B both depend on a single Elasticache cluster in AZ-A, you have a cross-AZ SPOF. Map your full dependency graph and ensure every dependency is also redundant."
        related_fundamentals: [networking/load-balancing]
      - number: 124
        question: "How do systems monitor health of services?"
        needed: "metrics (Prometheus), logs (ELK), traces (Jaeger/Zipkin), health-check endpoints, dashboards"
        answer: "Instrument three pillars: (1) Metrics (Prometheus + Grafana): expose /metrics endpoint from every service with RED metrics (Rate, Errors, Duration) and USE metrics (Utilization, Saturation, Errors) for each resource. (2) Logs: structured JSON logs → Kafka → Elasticsearch (ELK stack); include trace_id on every log line. (3) Traces: inject trace ID at API gateway, propagate via headers, record spans in Jaeger for critical paths. Synthetic health checks (ping every 30 seconds from an external monitor) cover the case where all three pillars are down."
        tradeoff: "Metrics are cheap to store and fast to query but lack context for debugging. Logs provide context but are expensive at high volume ($0.50–$3/GB in managed ELK). Traces are the most expensive (sampling helps) but essential for diagnosing latency in distributed systems. Start with metrics, add logs, add traces for the critical path."
        caveat: "Monitoring infrastructure is itself a SPOF — if PagerDuty is down, you won't get paged when your service is down. Run a separate 'watchdog' monitor that checks whether your monitoring system is healthy, using a different provider."
        watch: "Alert fatigue: too many alerts (> 5/day) that engineers learn to ignore. Each alert must be actionable (you know what to do when it fires) and urgent (it requires immediate human response). Move non-urgent signals to dashboards rather than pages."
      - number: 125
        question: "How do systems detect outages quickly?"
        needed: "alerting on p99 latency, error rate > threshold, heartbeat checks with PagerDuty escalation"
        answer: "Alert on the four golden signals: (1) Latency: p99 > SLA threshold (e.g., > 500ms for APIs) for > 2 minutes. (2) Error rate: HTTP 5xx > 1% of requests for > 1 minute. (3) Traffic: RPS drop > 30% from baseline for > 2 minutes (indicates silent failure). (4) Saturation: CPU > 85%, DB connections > 90% of pool, or disk > 80% full. Route pages to PagerDuty with on-call escalation: 5 minutes before escalating to secondary, 15 minutes before escalating to manager."
        tradeoff: "Alert on symptoms (high error rate, high latency) rather than causes (high CPU, low disk) — causes don't always impact users, and symptoms are what matters. An SRE team should own alert hygiene: review alerts quarterly and remove any that fired without requiring action."
        caveat: "External black-box monitoring (synthetic check hitting your login endpoint every 30 seconds from 3 regions) catches outages that internal monitoring misses — if your metrics pipeline itself is down, you still get an alert from the external check."
        watch: "The most dangerous outages are partial: 10% of requests failing silently, or one AZ degraded while the others are healthy. Overall error rate looks fine but a subset of users is affected. Always split alerts by AZ, region, and customer segment."
      - number: 126
        question: "How do systems restart failed services automatically?"
        needed: "orchestration (Kubernetes): liveness probes trigger container restart, pod rescheduling on node failure"
        answer: "Kubernetes uses two probes per pod: liveness probe (HTTP GET /healthz every 10s; 3 consecutive failures = restart the container) and readiness probe (HTTP GET /ready every 5s; failure = remove from load balancer without restarting). On node failure, the kubelet reports NotReady, and the node controller schedules replacement pods on healthy nodes after a 5-minute grace period. ReplicaSets ensure the desired pod count is maintained."
        tradeoff: "Aggressive liveness probes (short failure threshold) cause restart loops if the service is slow to start up under load — a pod under GC pressure fails the probe and gets killed, triggering more load on remaining pods. Tune liveness probe thresholds conservatively; use readiness probes (not liveness) for temporary unreadiness."
        caveat: "Container restarts don't fix the underlying problem — if a service crashes due to an OOM kill (out of memory), Kubernetes restarts it and it crashes again. Set proper memory limits and requests, and monitor OOMKill events to identify memory leaks."
        watch: "CrashLoopBackOff: Kubernetes doubles the restart delay after each crash (1s, 2s, 4s, up to 5 minutes). A service in CrashLoopBackOff is functionally down for extended periods. Alert on CrashLoopBackOff events and treat them as incidents, not self-healing."
      - number: 127
        question: "How do systems deploy updates safely?"
        needed: "rolling deployment: replace pods gradually, canary (5% → 25% → 100%), rollback on error spike"
        answer: "Use a two-stage deployment: canary then rolling. Send 5% of traffic to the new version for 30 minutes while monitoring error rate and p99 latency. If metrics stay within SLO, roll out to 25%, then 100% over the next 2 hours. Kubernetes rolling deployments replace pods one at a time (maxUnavailable: 1, maxSurge: 1) so capacity stays constant. Automated rollback: if error rate spikes above 2% during rollout, the pipeline automatically reverts to the previous version."
        tradeoff: "Blue-green deployment (full parallel new stack, instant cutover) is safer — you can compare both versions side by side and switch DNS with zero downtime. But it requires double the infrastructure during deployment. Rolling deployment uses less capacity but has a window where both versions are running simultaneously."
        caveat: "Database schema migrations are the hardest part of safe deployment — a migration that adds a NOT NULL column without a default value breaks the old application version still running during a rolling deploy. Always make migrations backward-compatible: add nullable columns, deploy app, backfill, then add constraints."
        watch: "Dark launches (deploy code but keep it dormant behind a feature flag) decouple deployment from release. Deploy the new search ranking algorithm to all pods but only activate it for 1% of traffic via a flag — you can abort instantly without a deploy if the flag causes issues."
      - number: 128
        question: "How do systems test new features safely?"
        needed: "feature flags: dark launch, % rollout, instant kill switch without deploy"
        answer: "Store feature flags in a central config service (LaunchDarkly, AWS AppConfig, or a simple Redis hash). Each flag has: enabled (true/false), rollout_percentage (0–100), target_user_ids (for internal testing), and kill_switch (override to disable instantly). Read flags at request time and cache per service instance for 30 seconds. For dark launches, deploy code that's never executed (flag is 0%) so you can verify the deploy itself is safe before enabling the feature."
        tradeoff: "Centralized flag service (LaunchDarkly) offers real-time flag updates without any code deploy, targeting by user attributes, and rollout analytics. Self-hosted Redis flags are cheaper (~$0/mo vs ~$300/mo for LaunchDarkly) but require building rollout logic yourself. Use managed for user-facing features, Redis for system-level toggles."
        caveat: "Feature flags accumulate over time — stale flags from 2 years ago that are always true add dead code paths and slow down every request that evaluates them. Schedule flag removal as part of the feature launch process: flag goes to 100%, then remove in the next sprint."
        watch: "Flag evaluation order matters when flags are interdependent — if flag B only works when flag A is on, and you toggle them independently, you can create undefined states. Document flag dependencies and enforce them in the evaluation logic."
      - number: 129
        question: "How do systems isolate a failing service?"
        needed: "circuit breaker (Hystrix/Resilience4j): open on N failures, fast-fail during open state, half-open probe"
        answer: "Wrap every downstream service call with a circuit breaker: Closed state (normal operation), Open state (fail immediately without calling the dependency), Half-Open state (allow one probe request to test if the dependency recovered). Transition Closed→Open when failure rate exceeds 50% in a 10-second window with at least 20 requests. Stay Open for 30 seconds, then allow one probe. Transition Open→Closed if the probe succeeds; stay Open if it fails."
        tradeoff: "Circuit breakers prevent cascading failures but introduce complexity: fast-fail responses must return something sensible (cached data, empty list, default value). If the fallback is 'show error to user', the circuit breaker just converts a slow error into a fast one — you need a meaningful fallback for the breaker to add value."
        caveat: "Timeout configuration is critical for circuit breakers — if downstream calls have no timeout, they hold threads indefinitely and the failure rate calculation is meaningless (all calls are 'in flight'). Set aggressive timeouts (100–500ms for synchronous calls) so the circuit breaker gets clean failure signal."
        watch: "Circuit breaker state is per service instance — if you have 100 app servers, each has its own breaker state. A dependency that's partially degraded (affecting 20% of requests) may not open the breaker on any individual instance. Use a shared failure counter in Redis for global circuit breaker state across a fleet."
      - number: 130
        question: "How do systems retry failed requests safely?"
        needed: "retry only idempotent operations, exponential back-off + jitter, max retry budget, idempotency key"
        answer: "Retry only on transient failures (network timeout, 503, 429) — never on permanent failures (400, 401, 404). Use exponential back-off: first retry after 1s, second after 2s, third after 4s, up to a max of 30s. Add jitter (random ±50% of the back-off interval) to prevent retry storms where all clients retry at the same instant. Set a total retry budget (3 attempts max, or a total timeout of 10 seconds across all attempts)."
        tradeoff: "Retrying non-idempotent operations (POST /payment) can cause duplicate processing — an order placed twice charges the customer twice. Use idempotency keys (UUID generated by client, sent on every retry) so the server deduplicates. Without idempotency keys, only retry operations that are provably idempotent (GET, DELETE with guard)."
        caveat: "Retry amplification: if each layer in a call chain retries 3 times, a single user request can generate 3×3×3 = 27 downstream calls. This is a primary cause of thundering-herd cascades. Set retry budgets per layer and propagate deadlines via context so inner layers stop retrying once the outer timeout has expired."
        watch: "The Retry-After header in 429 responses tells clients exactly when to retry — ignoring it and using your own back-off is polite but wasteful. Parse and respect Retry-After headers from downstream services to avoid burning through retries too fast."
      - number: 131
        question: "How do systems store logs for debugging?"
        needed: "centralized logging: structured JSON logs → Kafka → Elasticsearch; retain 30 days, archive to S3"
        answer: "Emit structured JSON logs from every service: each line includes timestamp, service, level, trace_id, span_id, user_id (if applicable), and message. Ship logs via a log agent (Fluentd/Filebeat) to Kafka. A Logstash/Flink consumer parses, enriches (adds service version, AZ), and indexes to Elasticsearch. Retain in Elasticsearch for 30 days for active debugging, then archive to S3 in compressed Parquet format for 90-day compliance retention. Total cost: ~$0.50/GB/month in Elasticsearch, ~$0.02/GB in S3."
        tradeoff: "Hot logging (every request, every event) gives full debuggability but is expensive — a service at 100K RPS emitting 500 bytes per log generates 50MB/s = 4.3TB/day. Sample non-error logs at 1–10% to reduce volume; always log 100% of errors and warnings."
        caveat: "Never log PII (passwords, tokens, credit card numbers, SSNs) — even accidentally. Structured logging libraries make it easy to accidentally serialize request bodies that contain sensitive fields. Add field-level redaction at the log emission layer, not in the central pipeline."
        watch: "Log correlation across services requires trace_id propagation — if the trace_id is not passed in every internal HTTP header and message queue metadata, you can't join log lines across service boundaries to reconstruct a single request's journey."
        related_fundamentals: [messaging/kafka]
      - number: 132
        question: "How do systems trace requests across microservices?"
        needed: "distributed tracing: inject trace-id header at entry, propagate through calls, collect spans in Jaeger"
        answer: "At the API gateway, generate a trace_id (128-bit UUID) and a root span_id (64-bit) and inject them into the HTTP request headers (X-Trace-Id, X-Span-Id) per OpenTelemetry or B3 propagation spec. Each downstream service creates a child span (new span_id, parent_id = upstream span_id) and records start time, end time, service name, operation name, and tags (HTTP status, DB query). Ship spans to Jaeger or Zipkin. The trace viewer reconstructs the full call tree from span parent-child relationships."
        tradeoff: "Tracing every request at 100K RPS generates 100K spans/second — a Jaeger cluster needs ~50GB/day for 7-day retention. Sample at 1% for normal traffic, 100% for errors. Adaptive sampling (always trace slow requests > p99 latency) captures the most useful data without sampling overhead."
        caveat: "Trace propagation breaks across async boundaries — if service A publishes to Kafka and service B consumes it, the trace context must be embedded in the Kafka message headers, or the trace stops at the Kafka produce call and you lose visibility into async processing time."
        watch: "Database spans are often the most valuable — a single API call that makes 50 N+1 SQL queries is immediately visible in a trace but invisible in aggregate latency metrics. Instrument your ORM/DB client to create a span per query, including the full query text."
      - number: 133
        question: "How do systems recover from database failures?"
        needed: "synchronous replica (read standby), automatic failover (RDS Multi-AZ), RPO < 1 min"
        answer: "RDS Multi-AZ maintains a synchronous standby replica in a second AZ that receives every write before the primary acknowledges it (synchronous replication = RPO of 0 transactions). On primary failure, AWS automatically promotes the standby and updates the DNS endpoint — typically takes 60–120 seconds. Your application must retry the connection on DNS resolution failure; most drivers handle this automatically. For < 60-second RTO, use RDS Proxy which maintains warm connection pools and reconnects transparently on failover."
        tradeoff: "Synchronous replication (RDS Multi-AZ) guarantees RPO=0 but adds ~1ms write latency for the synchronous acknowledgment from the standby. Asynchronous replication (read replicas) has no write latency overhead but may lag 10–60 seconds behind the primary — you can lose those transactions on failover."
        caveat: "RDS Multi-AZ failover doesn't protect against data corruption — if an application bug corrupts data and is promoted to the standby, the standby is also corrupted. Point-in-time recovery (PITR) is the safeguard against corruption: restore to any second in the last 35 days."
        watch: "After failover, your DB endpoint DNS has changed to the promoted standby. Applications that cache the resolved IP (not the DNS name) won't reconnect automatically. Set DNS TTL to 5 seconds for DB endpoints, or use RDS Proxy which abstracts the failover behind a stable endpoint."
        related_fundamentals: [storage/dynamodb]
      - number: 134
        question: "How do systems backup critical data?"
        needed: "automated daily snapshots, point-in-time recovery (PITR) for DB, cross-region replication for DR"
        answer: "Three backup tiers: (1) Automated RDS snapshots: daily full snapshot retained for 35 days, stored in S3. Restore time is 10–45 minutes for a 1TB database. (2) Point-in-time recovery (PITR): continuously archive transaction logs (WAL) to S3, enabling restore to any second within the retention window. (3) Cross-region replication: copy daily snapshots to a DR region (us-west-2 if primary is us-east-1) for protection against regional disasters. Test restores monthly — an untested backup is not a backup."
        tradeoff: "Automated RDS snapshots are managed by AWS with zero operational overhead. Self-managed logical backups (pg_dump) give you portability (can restore to non-RDS PostgreSQL) and are mandatory for migration or compliance scenarios where you need the data outside AWS."
        caveat: "RDS snapshot restore creates a new DB instance — not an in-place restore. Your application must be updated with the new endpoint, and any changes made after the backup point are lost. For PITR (transaction log replay), restore time grows with the distance from the last snapshot to the target time."
        watch: "DynamoDB PITR (enabled per table) restores to any second in the last 35 days but restores to a new table, not the original — application code must be updated to use the restored table name, or you need a table swap process."
      - number: 135
        question: "How do systems restore lost data?"
        needed: "restore from latest snapshot, replay WAL to target timestamp, validate integrity before cutover"
        answer: "Identify the target restore time (just before the data loss event). Restore the latest RDS snapshot created before that time to a new instance — this gets you within 24 hours of the target. Then replay WAL (transaction logs archived by PITR) to the exact target second. This gives you a restored instance with data up to the second before the incident. Validate integrity: run checksums, compare row counts, verify referential integrity. Route a read-only replica of production traffic to the restored instance for validation before cutover."
        tradeoff: "Full PITR restore takes 30 minutes to 2 hours depending on DB size and WAL volume to replay. For small tables with known data loss, a faster option is a targeted restore: export the specific rows from the snapshot via pg_dump --table, then re-import to production. This targets the repair without a full instance restore."
        caveat: "Data loss in a distributed system is often in multiple places — if the primary DB lost data and the event was also propagated to Kafka and downstream services before detection, restoring the DB alone leaves downstream systems out of sync. Map all data propagation paths before starting restore."
        watch: "After restore and cutover, any events that occurred between the target restore time and the actual cutover time are lost from the restored DB. Buffer new writes during the restore window or replay post-restore changes from the event log. This window is typically 30–120 minutes for a large DB restore."
      - number: 136
        question: "How do systems handle server crashes?"
        needed: "failover: load balancer health checks remove unhealthy instance, standby promoted automatically"
        answer: "Load balancers run health checks every 10 seconds (configurable). After 2 consecutive failures, the instance is deregistered and no new connections are routed to it. In-flight connections on the crashed instance fail and must be retried by the client. Auto-scaling group (ASG) detects the unhealthy instance and launches a replacement — new instance starts in 2–5 minutes and registers with the load balancer after passing health checks. Total recovery time: 5–10 minutes for a replacement to take over."
        tradeoff: "For faster failover (< 30 seconds), pre-launch warm standby instances in the ASG with desired > minimum. When an instance fails, the standby is already running and can absorb traffic within seconds. This increases baseline cost by 10–20% but eliminates the instance launch delay."
        caveat: "Application crashes that pass health checks (the process is running but returning wrong data) won't be detected by load balancer health checks. Use deep health checks that verify application-level functionality: query the DB, check cache connectivity, validate the response body — not just HTTP 200."
        watch: "Crashes during deployments are common — a new pod with a startup bug crashes immediately, but the rolling deployment proceeds, replacing more healthy pods. Set minReadySeconds in Kubernetes to require a pod to be healthy for 60 seconds before the next pod is replaced, to catch crash-on-startup bugs."
        related_fundamentals: [networking/load-balancing]
      - number: 137
        question: "How do systems balance traffic globally?"
        needed: "geo load balancing: DNS-based (Route 53 latency routing) directs user to nearest region"
        answer: "Use Route 53 latency routing: the DNS resolver returns the A record for the region with the lowest measured latency from the user's source IP. AWS measures latency from edge locations to each region and updates the routing table automatically. Add health checks to each region's endpoint — if us-east-1 fails its health check, Route 53 automatically removes it from DNS responses and routes all traffic to us-west-2."
        tradeoff: "DNS-based geo routing has propagation delay — DNS TTL is typically 60 seconds, so failover takes 60+ seconds while old DNS caches expire. Application-layer routing (Anycast, AWS Global Accelerator) provides sub-second failover by routing at the TCP/IP layer before DNS is involved."
        caveat: "Route 53 latency routing is based on AWS's measured latencies from edge PoPs, not the user's actual latency. Users on unusual network paths (corporate proxies, satellite internet) may get routed to a suboptimal region. AWS Global Accelerator uses Anycast to provide more accurate routing."
        watch: "Geo routing without data affinity creates consistency problems — if a user creates a record in us-east-1 and then is routed to us-west-2 on the next request, the cross-region replication lag means they may not see their own write. Use 'read your own writes' consistency by routing a user to the same region for a session after a write."
        related_fundamentals: [networking/load-balancing]
      - number: 138
        question: "How do systems handle a full region outage?"
        needed: "multi-region active-passive: DNS failover to DR region, data replicated via cross-region replication"
        answer: "Active-passive multi-region: primary region (us-east-1) handles all traffic; DR region (us-west-2) has a warm standby with identical infrastructure and data replicated via cross-region RDS read replica (asynchronous, typically 1–30 seconds of lag). On region failure, manual or automated runbook: promote the read replica to primary in the DR region, update Route 53 health checks to remove the failed region, verify DR environment is healthy, and cut over DNS. Total RTO: 15–30 minutes; RPO: 0–30 seconds of data loss from replication lag."
        tradeoff: "Active-active multi-region (both regions serve traffic simultaneously) eliminates failover delay and RPO but requires conflict resolution for writes — two users can update the same record in different regions simultaneously. Use last-write-wins with timestamp, or route user sessions to a single region for writes. Active-active is correct for read-heavy workloads (CDN, static assets), complex for write-heavy workloads."
        caveat: "Cross-region RDS read replica promotion takes 5–10 minutes and requires DNS change propagation (60 seconds at TTL=60). During this window, writes are rejected (DB is in read-only replica mode) and must be queued or rejected gracefully. Design the DR runbook to handle the 15-minute write blackout."
        watch: "Region failover runbooks must be tested quarterly with actual traffic — a runbook last tested 18 months ago will have gaps caused by schema changes, new services, and configuration drift. Failing to test a DR plan is equivalent to not having one."
      - number: 139
        question: "How do systems reduce latency for global users?"
        needed: "edge servers (CDN PoPs) serve static/cached content, regional API endpoints reduce hop count"
        answer: "Three-layer approach: (1) CDN (CloudFront, Fastly) caches static assets (JS, CSS, images) and cacheable API responses at 200+ PoPs worldwide — cache hit latency is 5–20ms regardless of origin location. (2) Regional API endpoints: deploy compute in 3–4 regions (NA, EU, AP) so the API call itself takes 20–50ms instead of 150–300ms across continents. (3) Anycast routing (AWS Global Accelerator) accelerates non-cacheable API calls by routing via the AWS backbone (private fiber) rather than public internet."
        tradeoff: "Regional API deployment requires cross-region data consistency — a user writing in us-east-1 must see their write in eu-west-1. Options: async replication with eventual consistency (seconds of lag), synchronous replication (adds write latency equal to cross-region RTT ~80ms), or routing writes to a single primary region. Choose based on how write-heavy and latency-sensitive the feature is."
        caveat: "CloudFront caches responses even if your origin sets Cache-Control: no-cache — misconfigured behaviors can cache private API responses at the CDN, exposing other users' data. Always verify CloudFront behavior configuration for API paths; default is no caching, but explicitly setting TTL=0 is safer."
        watch: "API latency from Asia-Pacific to us-east-1 is 200–300ms — at this latency, you can't mask the round trips required for interactive features. Measure latency from your actual user locations (not just from AWS PoPs) before deciding regional deployment is unnecessary."
        related_fundamentals: [networking/cdn, networking/cdn/cloudfront]
      - number: 140
        question: "How do systems manage configuration changes safely?"
        needed: "config service (AWS AppConfig/Consul): versioned configs, validation before apply, instant rollback"
        answer: "Store all non-secret configuration (feature flags, timeouts, rate limits, connection pool sizes) in AWS AppConfig or Consul. Changes are versioned — each update creates a new version, never mutating the current. Deploy config changes with a deployment strategy: linear (10% of hosts per minute) or all-at-once for emergency rollbacks. Validate configs before deployment: schema validation (required fields, types) and optional integration tests against a staging environment. Services poll for config changes every 30 seconds and hot-reload without restart."
        tradeoff: "Baking config into environment variables (12-factor app style) is simple but requires redeployment for every config change — a 5-minute deploy pipeline is a poor emergency response. Config services (AppConfig, Consul) enable live config updates in seconds but add a dependency: if the config service is unavailable at startup, services must handle the fallback to cached config."
        caveat: "Config changes that affect database connection pool sizes, thread counts, or JVM settings require a restart to take effect — you can't hot-reload these. Clearly distinguish between hot-reloadable config and restart-required config in your config schema, and handle them through different processes."
        watch: "Configuration drift: one node in a fleet picks up a new config version while others don't, resulting in inconsistent behavior. Always check the config version in your monitoring dashboards and alert on version divergence within a fleet."
      - number: 141
        question: "How do systems track service dependencies?"
        needed: "service registry (Consul/K8s service discovery): each service registers on start, clients resolve via registry"
        answer: "In Kubernetes, services register automatically via Service objects — each pod is labeled with app=service-name, and the Service resource creates a stable DNS name (service-name.namespace.svc.cluster.local) that routes to healthy pods. For service-to-service calls, use the DNS name rather than IP addresses. For cross-cluster or cross-region dependencies, use a service mesh (Istio, Linkerd) that provides discovery, mTLS, and observability. Keep a service dependency map (auto-generated from network traffic in the service mesh) to understand blast radius."
        tradeoff: "Kubernetes built-in service discovery is simple and zero-config for in-cluster communication. For external services or multi-cluster setups, Consul provides richer health checking (custom scripts, not just TCP) and supports non-Kubernetes nodes. Use Kubernetes service discovery for most things, Consul for heterogeneous environments."
        caveat: "DNS-based service discovery has a caching problem — a pod that crashes is still in the local DNS cache for the TTL duration (typically 30 seconds in kube-dns). Configure ndots and DNS TTLs appropriately, or use readiness probes to ensure failed pods are removed from endpoints before DNS propagation completes."
        watch: "Service registries become the truth of what services exist — a service not in the registry is unreachable. Build tooling to detect orphaned services (registered but no traffic for 7 days) and decommissioned services that still have registered dependencies pointing to them."
      - number: 142
        question: "How do systems throttle abusive users?"
        needed: "rate limiter per user/API key with sliding window; 429 response with Retry-After header"
        answer: "Rate limit at two levels: API key (100 requests/minute for free tier, 1000/minute for paid) using a sliding window counter in Redis. Respond with 429 Too Many Requests and a Retry-After header indicating the number of seconds until the limit resets. For users suspected of abuse (patterns like scraping or credential stuffing), apply a tighter rate limit (10 req/min) without revealing that a stricter limit is in effect. Log all 429s to detect coordinated attacks."
        tradeoff: "Per-user rate limits require user identification on every request — unauthenticated requests can only be rate limited by IP, which is easily circumvented with proxy rotation. Per-API-key rate limiting is much stronger for authenticated APIs. Require API key authentication for all programmatic access."
        caveat: "Rate limit headers (X-RateLimit-Remaining, X-RateLimit-Reset) help legitimate developers build retry logic. Not including them forces developers to guess the rate limit and often leads to exponential retry storms when limits are hit. Always include rate limit status in response headers."
        watch: "Rate limiting must be applied before expensive operations — a rate-limited endpoint that still executes a database query before checking the limit wastes resources on abusive traffic. Check the rate limit counter at the start of the request handler, before any I/O."
