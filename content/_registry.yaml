        related_fundamentals: []

      - number: 5
        question: "Q059-Q060: Design a CI/CD pipeline for 200 microservices. Average deploy time must be under 10 minutes from code merge to production."
        needed: "parallel test + build via GitHub Actions matrix; Docker layer caching; smoke test in staging with synthetic traffic; canary deploy 5% → auto-promote after 5 min if error rate stable; GitOps for config"
        answer: "Pipeline stages (parallel where possible): 1. Code merge triggers GitHub Actions (2s). 2. Lint + unit tests: parallel matrix jobs (Go test -race, 1000 tests in 60s with parallelism=8). 3. Docker build: BuildKit with layer caching (cache FROM base image, only rebuild changed layers). Service with 10 layers: rebuild 2 changed layers in 30s vs. 3min full build. 4. Push to ECR (30s). 5. Deploy to staging: Helm upgrade (30s). Smoke test: 2 min synthetic traffic via k6/Gatling. 6. Canary deploy to production: Helm upgrade with 5% traffic weight (Istio/NGINX split). Monitor 5 min: error rate <0.1% AND p99 latency <500ms. 7. Auto-promote to 100% (Argo Rollouts). Total: 2 + 60 + 30 + 30 + 30 + 120 + 300 + 30 = 9.5 min. Under 10 min. GitOps: Helm charts in separate 'infra' repo. Argo CD syncs cluster state from 'infra' repo. No kubectl apply in CI — only Helm chart updates."
        tradeoff: "Blue-green (instant switch) vs. canary (gradual rollout): blue-green: instant switchover, but doubles infrastructure cost during deploy. Canary: incremental risk, catches issues before full rollout, but slower to complete. For 200 microservices with varying risk profiles: use canary for stateful services (databases, caches) and blue-green for stateless services. Auto-rollback triggers on error rate spike."
        caveat: "Database migrations in CI/CD: schema changes must be backward-compatible with the running code (both old and new code version run simultaneously during canary). Rule: add columns as nullable first; deploy new code that writes to new column; backfill data; remove NOT NULL constraint; never drop a column in the same deploy that removes the code reading it — always two deploys. The CD pipeline enforces this: migration scripts are reviewed for backward compatibility before auto-deploy."
        watch: "Rollback follow-up: a deploy completes to 100%, then a P0 bug is found 30 minutes later. Rollback: Helm rollback (previous chart version from Helm history). Takes 2 minutes. Database rollback: if the migration is backward-compatible, old code works with new schema. If not: manual rollback required (the dangerous case). This is why backward-compatible migrations are non-negotiable in CD pipelines. Rollback of a database DROP is a full restore from backup = hours of downtime."
