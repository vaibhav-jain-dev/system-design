      - number: 143
        question: "How do systems isolate noisy tenants in a multi-tenant system?"
        needed: "resource quotas per tenant, separate queues/DB schemas, burst limits, tenant-aware rate limiting"
        answer: "Enforce resource quotas at the database layer (connection pool per tenant, query timeout per tenant), compute layer (CPU/memory limits per tenant namespace in Kubernetes), and queue layer (separate Kafka consumer groups per tenant tier, so a burst from one tenant doesn't block others). For large enterprise tenants, provide dedicated infrastructure (separate DB cluster, dedicated pods) rather than shared with rate limits — it's operationally simpler and justifies premium pricing."
        tradeoff: "Shared infrastructure with quotas is cost-efficient (bin-packing) but complex to enforce consistently. Dedicated infrastructure per tenant is operationally simple but linearly expensive — 1,000 tenants = 1,000 mini-stacks. Use shared infrastructure for small/free tenants, dedicated for enterprise contracts."
        caveat: "Resource quota enforcement at the application layer is best-effort — a tenant that bypasses the API (direct DB access via a compromised credential) ignores application-layer quotas. Enforce quotas at the infrastructure layer (DB connection limits, Kubernetes resource requests/limits) where they can't be bypassed."
        watch: "Noisy-neighbor detection requires per-tenant telemetry — if you only aggregate metrics across all tenants, one heavy tenant is invisible in the average. Tag all metrics with tenant_id and alert when any single tenant exceeds 20% of a shared resource's capacity for more than 5 minutes."
