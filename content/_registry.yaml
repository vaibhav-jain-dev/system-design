        answer: "Enforce resource quotas at the database layer (connection pool per tenant, query timeout per tenant), compute layer (CPU/memory limits per tenant namespace in Kubernetes), and queue layer (separate Kafka consumer groups per tenant tier, so a burst from one tenant doesn't block others). For large enterprise tenants, provide dedicated infrastructure (separate DB cluster, dedicated pods) rather than shared with rate limits — it's operationally simpler and justifies premium pricing."
