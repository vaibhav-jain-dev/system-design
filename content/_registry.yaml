        question: "How do you prevent duplicate user accounts?"
        needed: "email/phone uniqueness constraint, verification step, idempotent signup endpoint"
        answer: "Add a unique index on the email (or phone) column so the DB rejects duplicates at the constraint level. Require verification before the account is active — an unverified account can't log in, which also catches typos. Make the signup endpoint idempotent by returning the existing account if the email already exists and is unverified, rather than an error."
        tradeoff: "Case-sensitive unique constraints miss 'User@Example.com' vs 'user@example.com' — normalize to lowercase before storing. Phone-number dedup works the same way but needs E.164 normalization first."
        caveat: "Don't rely only on application-layer checks — a race between two concurrent signups will bypass them. The DB unique constraint is the only safe guard. Also, don't expose whether an email already exists in your error message — that leaks account enumeration."
        watch: "Soft-deleted accounts still hold the unique constraint slot — a re-registration attempt silently fails unless you release the constraint on deletion or use a deleted_at suffix trick like appending the user ID."
        related_fundamentals: [storage/dynamodb]
      - number: 2
        question: "How do you handle millions of simultaneous logins?"
        needed: "load balancer, stateless auth servers, cached sessions in Redis"
        answer: "Make auth servers stateless: validate credentials, issue a JWT or opaque token, store sessions in Redis. The load balancer then routes any login request to any auth server — no sticky sessions needed. Redis cluster handles ~1M ops/sec at sub-ms latency; a 10-node cluster can sustain millions of concurrent session lookups."
        tradeoff: "Sticky sessions (server-side memory) avoids Redis but means one crashed auth server invalidates all its sessions. Stateless JWT avoids Redis entirely but makes revocation hard — you can't invalidate a JWT without a blacklist, which brings Redis back anyway."
        caveat: "Don't put the session store on the same Redis cluster as your rate limiter or cache — a login spike exhausting connections will also kill rate limiting. Use separate Redis clusters per concern."
        watch: "Login spikes are predictable (market open, sports event start) — pre-warm auth server instances 10 minutes ahead using scheduled auto-scaling policies, not reactive CPU-based scaling which is 3-5 minutes too slow."
        related_problems: [rate-limiter]
        related_fundamentals: [networking/load-balancing, storage/redis]
      - number: 3
        question: "How do you design secure password storage?"
        needed: "bcrypt or argon2 hashing, per-user salt, never plaintext — not MD5 or SHA1"
        answer: "Use bcrypt (cost factor 12) or Argon2id. Both are intentionally slow — bcrypt does ~4,096 rounds of SHA; Argon2id adds memory-hardness (64MB by default). Each password gets a random 32-byte salt so identical passwords hash differently. Never use MD5, SHA1, or SHA256 — they're too fast; an attacker can try 10 billion SHA256 guesses/second on a GPU."
        tradeoff: "Argon2id is stronger (memory-hard, resistant to GPU/ASIC cracking) but requires tuning memory/iterations. bcrypt is battle-tested and widely supported. PBKDF2 is acceptable for compliance but weaker than both against modern GPU attacks."
        caveat: "Never hash without a salt — rainbow table attacks crack unsalted hashes instantly. Don't re-use the same salt for all users. Also never store the plain password even temporarily in logs or request traces."
        watch: "Cost factor 12 means bcrypt takes ~250ms on modern hardware — that's intentional for login but too slow for high-throughput API auth; use JWT/sessions instead of re-hashing on every request."
      - number: 4
        question: "How do you prevent brute-force login attacks?"
        needed: "rate limiting per IP/account, exponential back-off, CAPTCHA after N failures"
        answer: "Rate limit by both IP and account independently — 5 failures per account in 15 minutes triggers a lockout; 20 failures per IP in 1 minute triggers a challenge. Exponential back-off doubles the delay after each failure (1s, 2s, 4s, up to 30s). After 5 consecutive failures, require CAPTCHA to prove human. Store failure counts in Redis with TTL so they expire automatically."
        tradeoff: "Account lockout stops brute force but enables denial-of-service (attacker locks out victim). Prefer progressive delay + CAPTCHA over hard lockout. IP-based limiting alone fails against distributed attacks from botnets using thousands of IPs."
        caveat: "Don't alert users with 'account locked' — tell them 'too many attempts, try again later'. Revealing lockout status helps attackers confirm valid usernames. Also never send lockout emails immediately — that's a DoS vector via email flooding."
        watch: "Credential stuffing (trying breach passwords) succeeds even at 1 attempt per account because it uses different IPs — detect it by monitoring the ratio of failed logins across accounts, not per account."
        related_problems: [rate-limiter]
      - number: 5
        question: "How do systems implement secure password reset?"
        needed: "short-lived signed token (15 min), delivered to verified email, single-use"
        answer: "Generate a cryptographically random 32-byte token, store its hash (SHA-256) in the DB with a 15-minute expiry, and email the raw token to the verified address on file. On reset, hash the submitted token, look it up, verify it hasn't expired, then delete it and update the password. Delete all other active sessions on success."
        tradeoff: "Magic-link login (token = login without password) is simpler but riskier — email compromise = full account access. Password reset tokens are scoped to one action. SMS OTP is an alternative delivery channel but SMS is vulnerable to SIM-swapping."
        caveat: "Never put the token in a URL query param that gets logged by proxies and browser history. Store it as a path segment or POST body. Always invalidate all existing sessions after a successful password reset — otherwise a compromised session persists."
        watch: "Store only the hash of the token in the DB, not the raw token — if your DB is compromised, stored tokens can't be replayed to reset accounts."
      - number: 6
        question: "How do you support login across multiple devices?"
        needed: "long-lived refresh tokens per device, short-lived access tokens, revocation list"
        answer: "Issue one refresh token per device (stored in device-local secure storage), paired with a short-lived access token (15 min TTL). The refresh token is long-lived (90 days) but device-bound. Store all refresh tokens in Redis keyed by user_id, with the device ID as a sub-key. To revoke a specific device, delete that entry from Redis."
        tradeoff: "Storing sessions server-side (Redis) enables instant revocation but adds a Redis lookup on every token refresh. Fully stateless JWTs avoid Redis but can't be revoked until expiry — a stolen token is valid for up to 15 minutes."
        caveat: "Don't reuse the same refresh token across devices — if one device is compromised and you can't distinguish which one, you'd need to log out all devices. Device-bound tokens let you revoke surgically."
        watch: "Implement refresh token rotation: each use of a refresh token returns a new one and invalidates the old. If an old token is reused, it signals theft — immediately revoke all tokens for that user."
        related_fundamentals: [storage/redis]
      - number: 7
        question: "How do you detect suspicious logins?"
        needed: "device fingerprinting, geo-location anomaly detection, ML risk scoring"
        answer: "Fingerprint each login: IP geolocation, user-agent, timezone, screen resolution. On each login, compute a risk score based on: new device (never seen before for this user), new country, impossible travel (login from London then New York within 30 min), and time-of-day anomaly. Score above threshold triggers step-up auth (SMS OTP or email challenge)."
        tradeoff: "ML-based risk scoring is more accurate but requires training data and a model serving pipeline. Rule-based heuristics (impossible travel, new country) are simpler, lower latency (~1ms vs ~50ms for ML), and interpretable — start with rules, layer ML later."
        caveat: "Don't block on suspicion alone — that causes legitimate users to lose access. Require step-up authentication (MFA) instead. VPN and Tor users will always look 'foreign' — don't over-index on IP geolocation alone."
        watch: "Impossible travel detection: if login A is in Tokyo and login B is in New York 2 hours later, the user can't have physically traveled — flag it, but check for VPN usage before triggering a lockout."
      - number: 8
        question: "How do you implement two-factor authentication?"
        needed: "TOTP (RFC 6238) for authenticator apps; SMS OTP as fallback; hardware key (WebAuthn) as best"
        answer: "TOTP (RFC 6238) generates a 6-digit code from HMAC-SHA1 of the secret + current 30-second time window. The user scans a QR code encoding the base32 secret, then their app generates codes client-side. No network call needed at verify time — server recomputes the same HMAC and compares. Allow ±1 window for clock skew."
        tradeoff: "SMS OTP is weaker — SIM swapping attacks, SS7 vulnerabilities, and delayed delivery make it a fallback, not a primary factor. WebAuthn (hardware keys, Face ID, Touch ID) is strongest — phishing-resistant because the credential is bound to the origin domain."
        caveat: "Store the TOTP secret encrypted at rest — if your DB is compromised and secrets leak, attackers can generate valid codes. Also, never accept a TOTP code twice in the same window — replay the code within 30 seconds and it should be rejected."
        watch: "TOTP codes are valid for 30 seconds but you should accept ±1 window (90-second effective window) to handle clock drift — without this, users with slightly fast clocks get locked out consistently."
      - number: 9
        question: "How do you handle session expiration?"
        needed: "access token TTL (15 min), refresh token rotation, silent refresh in background"
        answer: "Access tokens expire in 15 minutes; the client silently refreshes them using a long-lived refresh token before expiry (e.g., refresh when 5 minutes remain). Refresh tokens rotate on each use — every refresh returns a new refresh token and invalidates the old one. Store refresh tokens in Redis with user_id → device_id → token mapping for revocation."
        tradeoff: "Longer access token TTL (e.g., 24h) reduces Redis round trips but means a stolen token is usable until expiry with no revocation path. Shorter TTL (5 min) is safer but causes more refresh calls — find the balance based on your security requirements."
        caveat: "Don't store JWTs in localStorage — XSS can steal them. Use HttpOnly cookies for refresh tokens and keep access tokens in memory (JS variable). The access token lives only in the running JS context, not persisted to disk."
        watch: "Silent refresh needs to handle the case where the refresh token is also expired — if the user's device was offline for 90 days, the refresh fails and you must redirect to login. Build this fallback into your client auth layer."
        related_fundamentals: [storage/redis]
      - number: 10
        question: "How do you allow users to log out from all devices?"
        needed: "server-side session invalidation list keyed by user ID, or version counter in token"
        answer: "The cleanest approach: store a session_version integer on the user record. Embed it in the JWT at issuance. On each request, verify the JWT's version matches the DB value. 'Log out all devices' increments session_version — all existing tokens immediately fail version check. This requires one DB lookup per request but is simple and instant."
        tradeoff: "Redis blocklist (storing invalidated JWIs) avoids the DB lookup but requires storage proportional to active tokens — thousands of tokens per user at scale adds up. Version counter is a single integer per user, far cheaper."
        caveat: "If you use the version counter approach, don't cache the user record too aggressively — a 5-minute cache means tokens remain valid for 5 minutes after logout. For 'log out all devices', users expect immediate effect."
        watch: "The version counter approach gives you log-out-all-devices for free and also serves as a kill switch for compromised accounts — increment the version and every token in the wild stops working within seconds."
        related_fundamentals: [storage/redis]
      - number: 11
        question: "How do systems support social login (Google, GitHub, etc.)?"
        needed: "OAuth 2.0 + OIDC: redirect to provider, exchange code for tokens, upsert local user"
        answer: "Use OAuth 2.0 Authorization Code flow with PKCE. User clicks 'Sign in with Google', you redirect them to Google's auth server with your client_id and a random state parameter. Google redirects back with an authorization code. You exchange the code for an ID token (OIDC) containing name, email, and provider user ID. Upsert a local user record on the email or provider_id, then issue your own session token."
        tradeoff: "Linking on email (matching Google email to existing account) is convenient but risky — a compromised Google account takes over the local account. Linking on provider_id (sub claim) is safer but requires users to explicitly link accounts, not just match by email."
        caveat: "Always verify the state parameter on callback to prevent CSRF. Also verify the ID token signature using Google's public JWKS endpoint — never trust the claims without signature verification. Don't accept the email claim as proof of email ownership if email_verified is false."
        watch: "If a user's Google account email changes, your email-based link breaks — store the provider's stable user ID (sub claim) as the foreign key, not their email."
      - number: 12
        question: "How do you prevent session hijacking?"
        needed: "HTTPS only, HttpOnly + Secure cookies, SameSite=Strict, token rotation"
        answer: "Use HttpOnly cookies (prevents JS access, blocks XSS theft), Secure flag (HTTPS-only transmission), and SameSite=Strict (blocks CSRF — cookie not sent on cross-site requests). Rotate session tokens on privilege escalation (login, password change). Bind sessions to the user-agent and IP as soft factors — flag but don't reject on mismatch."
        tradeoff: "SameSite=Strict breaks OAuth flows where the redirect back from the IdP is a cross-site navigation — the session cookie won't be sent. Use SameSite=Lax for OAuth compatibility; it still prevents CSRF for state-changing requests."
        caveat: "HttpOnly alone doesn't prevent session theft if the server itself is compromised or if the cookie is transmitted over HTTP before the Secure flag is enforced. Enforce HSTS (HTTP Strict Transport Security) so browsers always upgrade to HTTPS."
        watch: "Token rotation after login (issue a new session token immediately after authentication) defeats session fixation attacks where an attacker plants a known session ID before the user authenticates."
      - number: 13
        question: "How do systems support single sign-on (SSO)?"
        needed: "SAML 2.0 or OIDC identity provider, token exchange, assertion validation"
        answer: "OIDC is preferred for modern SSO: the Identity Provider (IdP) issues ID tokens after authentication. Service Providers (SPs) redirect users to the IdP, which authenticates them once and returns a signed token. Each SP validates the token signature using the IdP's public keys (JWKS endpoint). Session lifetime is governed by the IdP — logout at the IdP propagates to all SPs via back-channel logout."
        tradeoff: "SAML 2.0 is XML-based, enterprise-standard, and widely supported by older IdPs (Okta, ADFS) but verbose and harder to implement. OIDC is JSON/JWT-based, simpler, and better for SPAs and mobile apps. If your enterprise customers use ADFS, you need SAML support."
        caveat: "Back-channel logout in OIDC is often not implemented by SPs — when a user logs out at the IdP, sessions at individual SPs stay alive until expiry. This is a major SSO security gap. Implement back-channel logout webhooks."
        watch: "SSO session duration is separate from SP session duration — an OIDC ID token might be valid for 1 hour but your SP session lasts 8 hours. Enforce re-authentication at the IdP for sensitive operations regardless of SP session status."
      - number: 14
        question: "How do systems detect fake accounts?"
        needed: "behavior analysis (typing speed, navigation patterns), email domain reputation, ML model"
        answer: "Multi-signal approach: email domain reputation (disposable email services like mailinator.com are blocked), phone number validation (VoIP numbers flagged), typing pattern analysis (bots type at inhuman speed or perfectly consistent rhythm), and behavioral signals (no mouse movement before form submission). Run these through an ML risk model that scores the signup 0–100."
        tradeoff: "Hard blocking on signals causes false positives — legitimate users with VoIP numbers or fast typing get rejected. Score and gate instead: low-risk signup proceeds, medium-risk requires phone verification, high-risk requires human review."
        caveat: "Disposable email blocklists need constant updates — new domains appear daily. Email deliverability check (SMTP verification of the mailbox) is more reliable but adds 200–500ms latency per signup."
        watch: "Bots that purchase high-quality residential proxies and use browser automation frameworks (Playwright) defeat IP and user-agent signals — behavioral biometrics (mouse micro-movements, keystroke dynamics) are harder to fake at scale."
      - number: 15
        question: "How do you prevent email verification abuse?"
        needed: "rate limiting on verification sends per IP/account, token expiry, resend throttle"
        answer: "Rate limit verification email sends: max 3 sends per email address per hour, max 10 per IP per hour. Use exponential back-off on the resend button (1 min → 5 min → 15 min). Tokens expire after 15 minutes. Store send count in Redis with 1-hour TTL. Unverified accounts older than 24 hours are purged by a background job."
        tradeoff: "Stricter rate limits reduce spam abuse but also hurt legitimate users on flaky email providers who need multiple resends. Per-account limits (not just per-IP) are critical since attackers often control valid email addresses."
        caveat: "Don't expose the rate limit threshold in error messages — 'you've sent 3 emails in the last hour' tells attackers exactly how to stay under the limit. Return a generic 'try again later' message."
        watch: "Verification email flooding is a DoS against users — an attacker enters a victim's email and repeatedly triggers verification sends, filling their inbox. The per-email-address rate limit (not just per-IP) is what stops this."
        related_problems: [rate-limiter]
      - number: 16
        question: "How do you manage user profile updates safely?"
        needed: "validation + server-side sanitization, optimistic locking for concurrent updates, audit log"
        answer: "Validate all fields server-side (not just client-side): email format, name length limits, no script tags in display name. Use optimistic locking — include an updated_at or version field in the update request; reject if the DB version doesn't match (someone else updated concurrently). Write every change to an audit log with old_value, new_value, timestamp, and user_id."
        tradeoff: "Pessimistic locking (row-level DB lock during update) prevents concurrent conflicts but serializes writes — terrible for high-concurrency profile update endpoints. Optimistic locking scales better; conflicts are rare in practice for profile updates."
        caveat: "Never trust client-submitted user IDs — always derive the user being updated from the authenticated session, not from a request body parameter. A missing check here is a classic IDOR (Insecure Direct Object Reference) vulnerability."
        watch: "Email changes are especially sensitive — require re-verification of the new email before activating it, and notify the old email address that a change was made, giving the real user a chance to recover."
      - number: 17
        question: "How do you ensure username uniqueness?"
        needed: "unique database constraint, case-insensitive comparison, reserve on intent before commit"
        answer: "Store usernames normalized to lowercase (or use citext column in PostgreSQL) and add a unique index. For two-step signup flows, reserve the username in a pending_usernames table when the user picks it, then promote to the users table on completion. Set a 30-minute TTL on reservations so abandoned signups release the name."
        tradeoff: "Case-insensitive unique constraints (citext) prevent 'admin' vs 'Admin' conflicts. Unicode normalization is also needed — 'café' and 'café' can look identical but have different byte sequences (precomposed vs decomposed accents)."
        caveat: "Don't check uniqueness at application layer with SELECT then INSERT — concurrent requests both see the name as available and both attempt INSERT. Only the DB unique constraint is race-condition-safe."
        watch: "Reserve a block of usernames that look like admin/system usernames ('support', 'admin', 'root', 'help') to prevent impersonation attacks before you enforce it via policy."
      - number: 18
        question: "How do you handle account deletion?"
        needed: "soft delete with retention window (30 days), async PII cleanup job, GDPR compliance"
        answer: "Mark the account deleted_at instead of physically deleting the row — this retains the unique constraint on email/username, preserves foreign key integrity (posts, payments), and allows recovery within 30 days. After 30 days, an async job anonymizes PII: null out name/email, replace with a pseudonymous ID. For GDPR, respond to erasure requests within 30 days."
        tradeoff: "Physical deletion is simpler but cascades across many tables (posts, comments, payments) and can break audit logs. Soft delete + anonymization preserves referential integrity and audit trails while still complying with right-to-erasure."
        caveat: "Don't delete financial transaction records even on account deletion — regulatory compliance (SOX, PCI-DSS) requires retaining payment history for 7 years. Anonymize the PII in the record, but keep the transaction itself."
        watch: "After soft deletion, the email is still 'taken' — a user who regrets deleting can't re-register with the same email until you release it. Either release the email immediately on deletion or on recovery expiry."
      - number: 19
        question: "How do systems restore deleted accounts?"
        needed: "soft delete flag + deletion timestamp, re-activation within retention period, audit trail"
        answer: "During the 30-day retention window, reactivation is a single update: clear deleted_at, restore active status. The user must authenticate with their original credentials (or a verification email), confirming they own the account. Log the restoration event with timestamp and IP. After 30 days, PII has been purged — full restoration is impossible; only a fresh account creation is possible."
        tradeoff: "Longer retention windows (90 days) are user-friendly but hold PII longer than needed. Shorter windows (7 days) reduce PII exposure but frustrate users who regret deletion after a week. 30 days is the GDPR-compliant balance."
        caveat: "Reactivating an account must also restore all linked data (posts, follows, orders) that was soft-deleted in the same transaction. Partial restoration — where the account is active but posts are gone — is confusing and hard to debug."
        watch: "If an account was deleted due to ToS violation, the restoration path must check with your trust-and-safety system before reactivating — don't let banned users restore accounts through the normal deletion-recovery flow."
      - number: 20
        question: "How do platforms block banned users from returning?"
        needed: "device fingerprinting, IP monitoring, email domain block, shadow-ban for detection"
        answer: "Build a multi-signal ban evasion detection system: fingerprint devices (browser fingerprint, iOS IDFV, Android GAID), hash and store on ban. On new signups, check against the blocked fingerprint list. Block email domains that were associated with multiple banned accounts. IP monitoring flags new accounts from IPs used by banned users."
        tradeoff: "Hard blocking on device fingerprint causes false positives (shared devices, factory reset reinstalls). Shadow banning (account appears functional to the user but content is hidden from others) is more effective — the banned user doesn't know they're banned and can't as easily identify what signal to evade."
        caveat: "Device fingerprints are not stable — users clear cookies, factory reset phones, or change browsers. Never rely on a single signal; require multiple signals to match before flagging. Fingerprint matching should raise risk score, not auto-ban."
        watch: "The most effective signal is behavioral — banned users who return often exhibit the same patterns (same posting rhythm, same content style, same targets) that got them banned. ML behavioral fingerprinting catches evasion that device signals miss."

  - slug: payments
    title: "Payments & Transactions"
    description: "Idempotency, fraud detection, reconciliation, retries, secure storage"
    number_range: "21–40"
    questions:
      - number: 21
        question: "How do you prevent duplicate payments?"
        needed: "idempotency key (UUID from client), stored with TTL; return cached result on replay"
        answer: "The client generates a UUID idempotency key and sends it with every payment request. The server stores the key + result in Redis with a 24-hour TTL on first processing. If the same key arrives again (network retry, user double-click), the server returns the cached result without reprocessing. The DB also has a unique constraint on the idempotency key as a secondary safeguard."
        tradeoff: "Redis-only idempotency (no DB constraint) fails if Redis is flushed or the key expires before the client retries. DB unique constraint alone is race-safe but slower. Both together handle the edge cases: Redis for speed, DB for durability."
        caveat: "The client must generate the idempotency key before the first attempt and reuse it on all retries — don't generate a new key on retry. If the client generates a fresh UUID each time, you get no idempotency protection at all."
        watch: "24-hour TTL on idempotency keys means network retries beyond 24 hours create a new payment. For subscription billing where retry windows are longer, use 7-day TTL and store keys in the DB, not just Redis."
        related_fundamentals: [storage/redis]
      - number: 22
        question: "How do you ensure exactly-once payment processing?"
        needed: "unique transaction ID + database unique constraint; idempotency at every gateway call"
        answer: "Assign a system-generated transaction_id before calling the payment gateway. Include it in the gateway request as the external reference. Store it with a unique constraint in your DB. If the gateway call times out, retry with the same transaction_id — most gateways (Stripe, Adyen) deduplicate on their side. On response, use the transaction_id to match the outcome to your pending record."
        tradeoff: "At-least-once delivery (with idempotency) is achievable without distributed transactions. Exactly-once in the strict sense is impossible across system boundaries — you can only achieve idempotency (same logical result regardless of how many times you try)."
        caveat: "Never call a payment gateway twice with different amounts for the same transaction_id — even if you think the first call failed. The gateway may have succeeded; check the transaction status first before retrying."
        watch: "Idempotency at the payment gateway level doesn't help if your internal order creation is not idempotent — a gateway success followed by an internal DB failure will trigger a retry that creates a duplicate order even though the payment was processed once."
      - number: 23
        question: "How do you handle payment gateway failures?"
        needed: "async retry via message queue, exponential back-off, dead-letter queue for manual review"
        answer: "On gateway timeout or 5xx error, publish a retry event to a Kafka topic with the transaction_id and attempt count. A consumer retries with exponential back-off: 1 minute, 5 minutes, 30 minutes. After 3 failures, route to a dead-letter queue and alert the on-call engineer. Always check transaction status before retrying — a timeout doesn't mean the payment failed, it means you don't know."
        tradeoff: "Synchronous retry (blocking the HTTP request) is simpler but holds the user connection open for minutes. Async retry via Kafka decouples the user experience from the retry logic — show 'payment processing' UI and notify via webhook/email when settled."
        caveat: "Don't retry on 4xx responses (invalid card, insufficient funds) — these are permanent failures. Only retry on 5xx (gateway error) and network timeouts. Retrying a declined card wastes attempts and may trigger fraud detection."
        watch: "Build a status check endpoint that polls the gateway for transaction status before each retry — gateways like Stripe have a retrieve-charge endpoint. This prevents retrying a payment the gateway already processed successfully."
        related_fundamentals: [messaging/kafka]
      - number: 24
        question: "How do you prevent double order creation after payment?"
        needed: "state machine: pending → confirmed → fulfilled; only create order on confirmed state"
        answer: "Use a payment-order state machine: create the order in 'pending' state before initiating payment. On payment confirmation (webhook), transition to 'confirmed'. Create fulfillment work only on the confirmed→fulfilling transition. Each state transition is idempotent — applying it twice leaves the order in the same state. Use a DB transaction to atomically update state and create fulfillment records."
        tradeoff: "Creating the order before payment confirmation (optimistic) means you may have pending orders that never convert — clean them up with a background job. Creating the order after payment (wait for webhook) is cleaner but adds latency to fulfillment."
        caveat: "Payment confirmation webhooks can arrive out of order or be duplicated. A webhook handler must be idempotent: if the order is already 'confirmed', ignore the duplicate confirmation event rather than re-processing it."
        watch: "Webhooks from payment gateways are not guaranteed to be delivered exactly once — in practice they retry on your 5xx responses. Design your webhook handler to be idempotent by checking current order state before applying any transition."
      - number: 25
        question: "How do systems detect fraudulent transactions?"
        needed: "real-time risk scoring (velocity checks, geo, device fingerprint), ML model, threshold block"
        answer: "Score each transaction in real time (<100ms) using a rule-based engine combined with ML: velocity checks (more than 3 transactions in 1 hour from same card), geo mismatch (billing address in Germany, IP in Nigeria), new device, unusual amount for this user (10x their average order). ML model combines these signals into a 0–100 risk score. Block above 80, review 50–80, allow below 50."
        tradeoff: "Rules alone miss novel fraud patterns. ML alone is a black box — hard to explain declines to customers and compliance. Layered approach (rules for known patterns, ML for anomaly detection) gives you explainability for high-risk rule blocks and detection for novel attacks."
        caveat: "Never store the reason for a fraud block in the decline message to the customer — 'declined due to unusual location' tells fraudsters exactly what signal to spoof. Return a generic 'unable to process' message."
        watch: "Card testing attacks — where fraudsters verify stolen card validity with small transactions ($1–$2) before large purchases — are detected by velocity rules on small amounts, not large-amount fraud models. Have separate models for small-amount anomalies."
      - number: 26
        question: "How do systems process refunds?"
        needed: "refund workflow with state: initiated → gateway call → settled; linked to original txn"
        answer: "Create a refund record linked to the original transaction with its own state machine: initiated → gateway_call → settled (or failed). Call the gateway's refund API with the original transaction reference. On success, credit the user's ledger balance or wait for bank settlement (typically 5–10 business days). Emit a RefundInitiated event for downstream systems (email notification, analytics)."
        tradeoff: "Partial refunds (specific line items in an order) are more complex — track amount_refunded per transaction and validate that total refunds don't exceed the original charge. Full refund is simpler but less flexible."
        caveat: "Refunds can fail if the gateway no longer has the funds on hold (e.g., settlement already occurred and the merchant account is empty). Build a fallback for manual processing. Also, refund timing differs by card type: credit card refunds post in 3–5 days; debit can take up to 10."
        watch: "Refunds on cross-border transactions with FX conversion need a policy decision: refund at original FX rate (favors you on currency appreciation) or current rate (favors the customer). Document and enforce the policy consistently."
      - number: 27
        question: "How do you reconcile payment data with banks?"
        needed: "nightly reconciliation job: compare internal ledger to bank settlement file, flag deltas"
        answer: "Run a nightly reconciliation job: download the bank settlement file (ISO 8583 or CSV from the acquiring bank), parse each settlement record, match to your internal transaction by reference number, and verify amounts match. Flag any discrepancies: transactions in bank file not in your ledger (missing payment), transactions in your ledger not in bank file (not yet settled), and amount mismatches."
        tradeoff: "Real-time reconciliation (streaming vs. bank webhooks) reduces reconciliation lag but most banks only provide settlement files daily — real-time is aspirational for most payment volumes. Nightly batch is the operational standard."
        caveat: "Bank settlement files use business days — a payment made on Friday may not appear in settlement until Monday. Your reconciliation logic must handle pending states that span weekends and holidays."
        watch: "Currency conversion mismatches cause reconciliation failures that look like amount errors — a EUR transaction settled in USD at a slightly different FX rate than what you recorded. Store the original currency, amount, FX rate, and converted amount separately."
      - number: 28
        question: "How do systems support multiple currencies?"
        needed: "store amounts in minor units (cents), record original currency + FX rate at txn time"
        answer: "Store all amounts as integers in the currency's minor unit (cents for USD, pence for GBP, sen for JPY — but JPY has no minor unit, so store in yen directly). Record original_currency, original_amount, display_currency, display_amount, and fx_rate_at_txn_time on every transaction. Never store floating-point numbers for money — use integers or Decimal types."
        tradeoff: "Storing only the converted amount in a base currency (USD) is simpler for analytics but loses the original currency context — you can't recreate the exact amount displayed to the customer. Store both."
        caveat: "Some currencies have no minor unit (JPY, KRW) or unusual minor unit scales (KWD uses 3 decimal places = fils). Hardcode currency metadata (ISO 4217 code, decimal places) rather than inferring it — don't assume 2 decimal places."
        watch: "FX rates change constantly — if you charge the customer in their local currency and settle in USD, lock the FX rate at authorization time. A delay between auth and settlement at different FX rates creates reconciliation problems."
      - number: 29
        question: "How do systems handle partial payments?"
        needed: "split transaction records, track paid/remaining amounts, link to same order"
        answer: "Model partial payments as separate payment transactions linked to the same order, with the order tracking total_amount, amount_paid, and amount_remaining. Each payment reduces amount_remaining. The order transitions to 'paid' only when amount_remaining reaches 0. Store each payment as its own record with its own gateway transaction reference."
        tradeoff: "Installment plans (fixed schedule of partial payments) are more structured — create all installment records upfront with due dates, then settle each on schedule. Ad-hoc partial payments (pay what you can) are more flexible but harder to reconcile."
        caveat: "Partial payment refunds are complex — which payment does the refund apply to? Apply refunds to the most recent payment first (LIFO) for simplicity. Document the policy in code."
        watch: "If a partial payment authorization fails, you need to decide whether to keep the order in a partially-paid state or roll back the earlier payments — clearly define the business rule upfront, since rolling back completed gateway transactions requires refund API calls."
      - number: 30
        question: "How do you handle chargebacks?"
        needed: "dispute management workflow: receive notice → gather evidence → submit to bank within window"
        answer: "Build a dispute management workflow: gateway webhooks notify you of a chargeback within 24–72 hours of the bank filing. Automatically gather evidence: transaction record, delivery confirmation, communication logs, IP and device fingerprint at purchase time. Submit evidence to the gateway's dispute portal within the response window (typically 7–20 days depending on card network). Provisionally hold the disputed amount."
        tradeoff: "Fighting every chargeback costs $15–50 in representment fees and staff time. For transactions under $25, accept the chargeback automatically — fighting costs more than you recover. Set a threshold for auto-accept vs. auto-fight based on transaction amount and fraud signal."
        caveat: "Chargeback ratio above 1% of transactions triggers fines and eventually account termination by the card networks (Visa, Mastercard). Monitor your chargeback rate daily and investigate spikes — often caused by a specific product, merchant, or fraud pattern."
        watch: "Friendly fraud (legitimate customer claims non-delivery) is the majority of chargebacks on many platforms — delivery confirmation + tracking number is the most effective evidence to win representment. Integrate with your fulfillment system to auto-attach."
      - number: 31
        question: "How do systems track payment history efficiently?"
        needed: "append-only ledger table, indexed by user + timestamp, paginated cursor-based reads"
        answer: "Use an append-only ledger table: each row is an immutable financial event (charge, refund, fee) with amount, currency, type, user_id, and created_at. Never update or delete rows — corrections are new rows with negative amounts. Index on (user_id, created_at DESC) for efficient per-user history queries. Use cursor-based pagination (last seen created_at) for consistent paging on large histories."
        tradeoff: "Separate ledger table (double-entry bookkeeping: debit/credit sides) is more rigorous but complex. Single-entry append-only log is simpler and works for most consumer payment histories. Adopt double-entry when regulatory requirements demand it."
        caveat: "Offset-based pagination (LIMIT 50 OFFSET 500) on large ledger tables is slow — it reads 550 rows to return 50. Cursor-based pagination using the last row's ID or timestamp is O(log N) with an index."
        watch: "Ledger tables grow indefinitely — archive rows older than 2 years to cold storage and keep only a running balance snapshot in the hot table. This keeps query performance consistent as transaction volume grows."
      - number: 32
        question: "How do you prevent payment replay attacks?"
        needed: "nonce + timestamp in request signature; server rejects nonces seen within 5-minute window"
        answer: "Sign every payment API request with HMAC-SHA256 using: request body, timestamp (Unix epoch), and a random nonce. The server verifies the signature, then checks the timestamp is within ±5 minutes (rejects old requests), and checks the nonce hasn't been seen before (stored in Redis with 10-minute TTL). This prevents an intercepted valid request from being replayed."
        tradeoff: "Short replay windows (5 minutes) stop replay attacks but fail if the client's clock is skewed. Require clients to sync their clock (NTP) or accept ±10-minute windows with strict nonce tracking."
        caveat: "The nonce must be genuinely random — sequential nonces or timestamp-derived nonces don't prevent replay within the same second. Use a UUID or 128-bit random value."
        watch: "Webhook payloads from payment gateways are also vulnerable to replay — verify the gateway's HMAC signature (Stripe uses Stripe-Signature header) and reject payloads with a timestamp older than 5 minutes from the current time."
      - number: 33
        question: "How do systems scale payment processing?"
        needed: "microservices per domain (checkout, ledger, notifications), async queues between them"
        answer: "Split into domain services: checkout service (validates cart, initiates payment), payment service (calls gateway, manages transaction state), ledger service (records financial events), notification service (sends receipts). Services communicate via Kafka: PaymentSucceeded/PaymentFailed events trigger downstream processing. This allows each service to scale independently — notification service can lag during spikes without blocking checkout."
        tradeoff: "Microservices add operational complexity (service discovery, distributed tracing, failure modes). For teams under 20 engineers, a modular monolith with separate DB schemas per domain is often a better trade — same boundaries, simpler operations."
        caveat: "Distributed transactions across microservices are hard — use the Saga pattern (choreography-based with compensation) rather than 2PC. Each service handles its part of the transaction and publishes events for the next step."
        watch: "The checkout service must be idempotent even in a microservices architecture — a user clicking 'pay' twice in the UI sends two requests. The checkout service deduplicates on session + cart hash before initiating payment."
        related_fundamentals: [messaging/kafka]
      - number: 34
        question: "How do you track payment success/failure events?"
        needed: "event-driven architecture: emit PaymentSucceeded/PaymentFailed events to Kafka topic"
        answer: "Emit structured events to Kafka on every state transition: PaymentInitiated, PaymentSucceeded, PaymentFailed, RefundInitiated, RefundSettled. Each event includes: transaction_id, user_id, amount, currency, timestamp, and gateway_reference. Multiple consumers subscribe: order fulfillment, email notification, analytics, fraud model feature store. Events are retained for 7 days for replay."
        tradeoff: "Kafka guarantees at-least-once delivery — consumers must be idempotent. Each consumer tracks the last processed offset. If a consumer crashes mid-processing, it will re-process the same event. Build idempotency into every consumer."
        caveat: "Don't put sensitive payment data (full card numbers, CVV) in Kafka events — even if topics are encrypted. Kafka events flow to many consumers and are retained on disk. Reference the transaction_id and let consumers look up details from the payment service."
        watch: "Kafka consumer lag is a key metric for payment systems — if the order fulfillment consumer is 10,000 events behind, orders aren't being created. Alert on consumer lag exceeding 1,000 events with a 5-minute window."
        related_fundamentals: [messaging/kafka]
      - number: 35
        question: "How do systems handle delayed payment confirmations?"
        needed: "webhook callbacks from gateway, idempotent handler, polling fallback with timeout"
        answer: "Register a webhook URL with the payment gateway to receive asynchronous confirmation. The webhook handler must be idempotent: check current transaction state before applying confirmation. Also implement a polling fallback: a background job queries the gateway status API for all transactions in 'pending' state for more than 5 minutes, and applies the confirmed status if found."
        tradeoff: "Relying only on webhooks is fragile — your server may be down when the webhook fires. Webhooks + polling (belt and suspenders) ensures eventual consistency. Polling adds gateway API load; rate-limit to 1 request per pending transaction per 5 minutes."
        caveat: "Webhooks can arrive before your payment initiation response has been committed to the DB — if you create the transaction record asynchronously, a webhook may arrive before the record exists. Ensure the transaction record is committed before the gateway call returns."
        watch: "Some gateways retry webhooks for up to 72 hours after failures. Your idempotency logic must work across this entire window — not just for the first few minutes after payment."
      - number: 36
        question: "How do systems support subscription payments?"
        needed: "recurring billing scheduler (cron), retry on failure, dunning logic for delinquent accounts"
        answer: "Store subscription plans with billing_cycle (monthly/annual), next_billing_date, and payment_method_token. A daily cron job selects subscriptions due for billing, charges the stored payment method, and updates next_billing_date on success. On failure, start the dunning process: retry at day 1, 3, 7, 14; send escalating email notifications. Suspend the account after 14 days of failed payment."
        tradeoff: "Fixed billing dates (everyone billed on the 1st) create massive load spikes. Billing on anniversary date (user signs up on the 14th, billed every 14th) distributes load. Anniversary billing is the industry standard for exactly this reason."
        caveat: "30-day months don't divide evenly — a subscription billed on January 31 needs a policy for February (bill on the 28th? March 3rd?). Use anniversary date normalized to end-of-month for months with fewer days."
        watch: "Dunning emails are the single highest-recovery mechanism for failed subscriptions — a well-timed 'your payment failed, update your card' email recovers 30–40% of failed payments. Build a proper email cadence, not just a single failure notification."
      - number: 37
        question: "How do you implement payment retries?"
        needed: "retry policy: max 3 attempts, exponential back-off (1h, 6h, 24h), notify user on failure"
        answer: "Define separate retry policies by failure type: soft declines (insufficient funds, do-not-honor) retry on schedule (1h, 6h, 24h); hard declines (stolen card, invalid account) don't retry. Store retry_count and next_retry_at on the transaction record. A scheduled job picks up transactions where next_retry_at <= now and retry_count < max_retries. Notify the user after the first failure, not just the final one."
        tradeoff: "Immediate retry on failure is almost always wrong — the conditions that caused the failure (insufficient funds, gateway overload) rarely resolve in seconds. Waiting 1 hour before the first retry dramatically improves success rates."
        caveat: "Some card networks penalize excessive retries on declined cards — Visa's 'retry rules' limit retries to 15 within 30 days. Exceeding this triggers interchange fee increases. Track retry counts per card, not just per transaction."
        watch: "Card updater services (Visa Account Updater, Mastercard ABU) automatically update stored card tokens when a card is replaced. Enable these services — they prevent declines from expired cards without requiring user action."
      - number: 38
        question: "How do systems store sensitive payment data securely?"
        needed: "PCI-DSS: tokenize card numbers via vault (Stripe/Braintree), never store raw PAN"
        answer: "Never store raw PANs (Primary Account Numbers) in your systems — use a PCI-compliant vault (Stripe, Braintree, Adyen) that handles all card data. The vault returns a token that maps to the card in their system. Store only the token, last 4 digits, expiry month/year, and card brand. Your systems never touch the raw card number; the vault handles encryption, key management, and PCI audit scope."
        tradeoff: "Building your own card vault (HSM + PCI-DSS certification) costs $300K–$1M+ in audit fees and infrastructure. Using Stripe or Braintree reduces your PCI scope to SAQ-A (minimal) and costs a few basis points in fees. Use a third-party vault unless you process $10B+ annually."
        caveat: "Even with tokenization, your checkout page must not have any JS that could intercept card input — use hosted payment fields (iframe from the vault provider) so card data never touches your DOM. A single JS vulnerability in your checkout page blows your PCI scope."
        watch: "PCI-DSS Level 1 compliance (required above 6M transactions/year) requires an annual on-site audit by a QSA (Qualified Security Assessor). Tokenization via a third-party vault keeps you at Level 4 (self-assessment questionnaire) regardless of volume."
      - number: 39
        question: "How do systems audit financial transactions?"
        needed: "immutable append-only audit log, signed entries, separate read-only replica for auditors"
        answer: "Write every financial event to an append-only audit log: the record includes event_type, actor_id, transaction_id, old_state, new_state, timestamp, and a SHA-256 hash chained to the previous record (blockchain-style integrity). Store this log in a separate DB schema with no UPDATE or DELETE permissions. Provide auditors a read-only replica connection."
        tradeoff: "Blockchain-style hash chaining (each entry hashes the previous) makes tamper-evident but adds write latency. Simpler approach: append-only table with a database trigger that prevents UPDATEs and DELETEs. Either provides audit integrity; chained hashes provide cryptographic proof."
        caveat: "Audit logs must survive even if the primary DB is compromised or corrupted. Stream audit events to an immutable storage system (AWS S3 with Object Lock, WORM storage) as a secondary archive."
        watch: "Audit logs for payment systems must be retained for 7 years (PCI-DSS, SOX). Design storage tiering from day one: hot storage (PostgreSQL) for the last 90 days, cold storage (S3 Glacier) for the rest — otherwise audit table size becomes unmanageable."
      - number: 40
        question: "How do systems ensure financial data consistency?"
        needed: "ACID transactions for ledger writes, two-phase commit across services if needed, saga pattern"
        answer: "Use ACID transactions within a single DB for all ledger writes — charge, fee, and balance update in one atomic transaction. Across services, use the Saga pattern: each service completes its local transaction and publishes an event. Compensating transactions roll back if a later step fails. For inter-service money movement, a two-phase commit via an orchestrator is an alternative but adds latency and coupling."
        tradeoff: "2PC (two-phase commit) guarantees strong consistency across services but requires a coordinator, blocks on failures, and is hard to implement correctly. Sagas offer eventual consistency but require compensating transactions for every step — more code, more testing."
        caveat: "BASE (eventually consistent) databases (DynamoDB, Cassandra) are unsuitable for financial ledgers that require strong consistency. Ledger tables should always run on ACID-compliant databases (PostgreSQL, MySQL) with synchronous replication."
        watch: "The trickiest consistency problem is between the ledger DB and the Kafka event bus — a payment succeeds in the DB but the Kafka publish fails. Use the transactional outbox pattern: write the event to an outbox table in the same DB transaction, then a CDC (Change Data Capture) process publishes it to Kafka."

  - slug: coupons
    title: "Coupons & Flash Sales"
    description: "Inventory locking, fair queuing, abuse prevention, real-time counters"
    number_range: "41–60"
    questions:
      - number: 41
        question: "How do systems distribute limited coupons without overselling?"
        needed: "atomic DECR in Redis; reject when counter hits 0; fall back to DB compare-and-swap"
        answer: "Initialize a Redis counter with the inventory count (e.g., SET coupon:1234:inventory 500). Each claim atomically DECRements: if the result is >= 0, the claim succeeds; if the result is -1 or less, increment back and reject. This is O(1) and atomic — no race conditions. Write the final inventory to the DB asynchronously. For extra safety, add a DB check-and-update as a reconciliation step."
        tradeoff: "DB compare-and-swap (SELECT FOR UPDATE + UPDATE WHERE count > 0) works but serializes claims at the DB row level — a lock per row under high concurrency causes queueing and latency spikes. Redis DECR handles tens of thousands of claims per second on a single node."
        caveat: "Redis DECR can go below zero if you're not careful — a DECR followed by a check is not atomic. Use a Lua script that combines the check and decrement in one atomic operation: DECR only if current value > 0, return 0 if already at zero."
        watch: "Redis is in-memory — a crash can lose the inventory counter. Persist with RDB snapshots every 60 seconds or AOF (append-only file). For critical inventory, the DB is the source of truth; Redis is a fast gate that may briefly allow a few extra claims that the DB reconciliation corrects."
        related_fundamentals: [storage/redis]
      - number: 42
        question: "How do systems handle flash sale traffic spikes?"
        needed: "request queue to flatten spike, rate limiting at entry, pre-warm cache before sale"
        answer: "At sale start, route all requests into a virtual waiting room — issue each user a queue position token, then meter them into the sale at a controlled rate (e.g., 10K users/minute). This prevents the 100K simultaneous users from hammering Redis. Pre-warm: seed Redis inventory counters and cache product data 5 minutes before sale start. Rate limit individual users at the entry point to prevent bot advantage."
        tradeoff: "No queue + horizontal scaling is simpler but requires provisioning for peak load (100K concurrent requests) for a 10-minute event — very expensive. A queue lets you serve the same demand with 1/10th the infrastructure."
        caveat: "The virtual waiting room is itself a target — don't let users hold queue positions without activity. Time out idle queue positions after 5 minutes and give them to the next user in line."
        watch: "CDN caching doesn't help during flash sales for the claim step (it's a write operation), but it does protect the product listing pages — pre-cache the sale landing page on CDN to absorb 95% of the initial traffic before it hits your origin."
        related_problems: [rate-limiter]
        related_fundamentals: [storage/redis]
      - number: 43
        question: "How do you ensure one coupon per user?"
        needed: "user redemption table with unique(user_id, coupon_id) constraint; Redis SET NX as fast guard"
        answer: "Use a two-layer approach: Redis SET NX (set if not exists) as a fast first check — SET user:1234:coupon:5678 1 NX EX 86400 returns 1 on first call and 0 on subsequent calls for the same user+coupon. On success, persist to a redemptions table with a unique(user_id, coupon_id) DB constraint as the durable guard. The DB constraint catches any race condition that slipped past Redis."
        tradeoff: "DB unique constraint alone (without Redis) is the only correct solution — Redis SET NX can miss if Redis data is evicted or lost. The Redis layer is a performance optimization (sub-ms check) in front of the guaranteed DB constraint."
        caveat: "Don't trust client-submitted user_id for the redemption check — derive user identity from the authenticated session. A user could submit a different user_id in the request body to bypass per-user limits."
        watch: "Multi-account abuse: one person creates 10 accounts to get 10 coupons. One-per-user (enforced by user_id) doesn't stop this. Add one-per-device (device fingerprint) and one-per-payment-method as additional signals."
        related_fundamentals: [storage/redis]
      - number: 44
        question: "How do you prevent coupon abuse?"
        needed: "account age check, device fingerprinting, velocity limit (N redemptions per day per device)"
        answer: "Layer multiple signals: account age (accounts less than 7 days old can't redeem high-value coupons), device fingerprint (max 2 redemptions per device per campaign), payment method binding (coupon is locked to the first payment method used), and velocity limit (max 3 coupon uses per hour per user). Score each redemption attempt and require manual review above a threshold."
        tradeoff: "Hard blocks on new accounts stop most abuse but also block legitimate new users. Soft limits (lower coupon value for new accounts, not a block) are better UX while still reducing abuse impact."
        caveat: "Don't reveal which signal triggered the rejection — 'This coupon is not available for your account' tells abusers what to change. A generic 'coupon cannot be applied' message forces them to guess."
        watch: "Organized coupon abuse rings share device fingerprints and rotate them. Behavioral signals (how quickly they navigated to checkout, typing patterns) are harder to fake at scale than static fingerprints."
      - number: 45
        question: "How do you generate unique coupon codes?"
        needed: "cryptographically random base62 token (8–12 chars), check DB uniqueness before issuing"
        answer: "Generate a cryptographically random 8–12 character base62 string (A–Z, a–z, 0–9) using os.urandom(). The code space for 8 chars is 62^8 = 218 trillion combinations — collision probability is negligible for millions of coupons. Check DB uniqueness on insert with a unique index; retry on collision (extremely rare). Store codes hashed in the DB to prevent enumeration from DB access."
        tradeoff: "Sequential IDs (COUPON00001, COUPON00002) are guessable — attackers enumerate codes. Random base62 makes guessing infeasible. Checksum-embedded codes (Luhn algorithm variant) catch typos at the client before a DB lookup."
        caveat: "8-character codes have 218T possibilities, but if attackers can test 1M codes/second against your API (no rate limiting), they'll find one valid code in ~60 hours. Rate limit code validation aggressively (10 per hour per IP)."
        watch: "For mass distribution (email campaigns), generate codes in batches asynchronously before the send — don't generate on-demand during email send because DB uniqueness checks under load can cause send delays."
        related_problems: [url-shortener]
      - number: 46
        question: "How do systems expire coupons automatically?"
        needed: "TTL on Redis key for fast check; background job to mark expired in DB for audit trail"
        answer: "Set a Redis TTL on the coupon's active key (SET coupon:1234:active 1 EX <seconds_until_expiry>). On redemption attempt, check if the key exists — absence means expired. Separately, run a background job every 15 minutes that queries the DB for coupons where expiry_at < NOW() and status = 'active', marks them expired, and emits an analytics event."
        tradeoff: "Redis TTL alone is not durable — Redis eviction or restart can remove the key before actual expiry, making coupons look expired early. DB timestamp check is the source of truth; Redis TTL is a fast negative cache for already-expired coupons."
        caveat: "Don't rely on Redis key expiry as the only expiry signal — Redis keyspace notification events (for expiry) can be missed under load. Always check expiry_at in the DB during the final redemption transaction."
        watch: "Coupon expiry at midnight creates a race: a user starts checkout at 11:59 PM and completes payment at 12:01 AM. Decide and enforce the policy: expiry is checked at checkout start (timestamp when code entered) not at payment time — this is more user-friendly."
        related_fundamentals: [storage/redis]
      - number: 47
        question: "How do you track coupon usage in real time?"
        needed: "Redis counter per coupon; async flush to DB analytics table every 60 seconds"
        answer: "Increment a Redis counter on each successful redemption: INCR coupon:1234:used_count. This gives sub-millisecond real-time usage count. A background job flushes the Redis count to a DB analytics table every 60 seconds using a compare-and-swap pattern. For campaign dashboards, also stream redemption events to Kafka for downstream analytics (Flink/Spark aggregations, daily conversion reports)."
        tradeoff: "Writing directly to the DB analytics table on every redemption is safe but adds write latency to the checkout path — at 10K redemptions/second, that's 10K writes/second to analytics, potentially competing with transactional writes. Redis counter + async flush decouples analytics write load from the checkout path."
        caveat: "Redis counter and DB count will briefly diverge — don't use the Redis count for financial reconciliation. Redis is for real-time display ('847 redeemed so far'); DB is for accurate reporting after flush."
        watch: "Redis counter resets to 0 on restart unless you persist it. Use Redis persistence (AOF) for usage counters, or seed the Redis counter from the DB on startup with the last known count."
        related_fundamentals: [storage/redis]
      - number: 48
        question: "How do systems distribute coupons fairly?"
        needed: "FIFO queue at sale start; virtual waiting room with position tracking"
        answer: "At campaign start, users join a virtual waiting room — each gets a position token (sequential integer from an atomic counter). A dispatcher processes the queue at a controlled rate (e.g., 5K positions/minute), allowing each user in order to complete their claim. Users see their queue position in real time via WebSocket or polling. Fairness is guaranteed by the FIFO order of position assignment."
        tradeoff: "First-come-first-served FIFO favors users who can click fastest (bots, fast internet). A lottery model (random selection from all users who joined in the first 5 minutes) is fairer for high-demand items. Choose based on user expectations for your platform."
        caveat: "Queue position tokens must be non-guessable and tied to a user session — otherwise a user can claim position 1 by guessing the token. Use signed tokens (HMAC) with user_id embedded."
        watch: "Users will open the sale page on multiple devices simultaneously to get a better queue position — detect and consolidate multiple sessions per user into one queue position. Use user_id for queue dedup, not session ID."
      - number: 49
        question: "How do systems prevent bots during flash sales?"
        needed: "CAPTCHA challenge on queue entry, browser fingerprinting, behavioral analysis"
        answer: "CAPTCHA on queue entry filters the easiest bots. Browser fingerprinting (canvas fingerprint, WebGL, screen resolution, font list) identifies automation frameworks. Behavioral signals (time-on-page before clicking, mouse movement entropy, scroll patterns) distinguish humans from scripts. Rate limit at the IP level and impose device-level limits (max 1 position per device per sale)."
        tradeoff: "Invisible CAPTCHAs (reCAPTCHA v3 risk scores) add no user friction but advanced bots defeat them. Visible CAPTCHAs block more bots but hurt conversion. For high-value sales, visible challenges are worth the conversion cost."
        caveat: "Browser fingerprinting degrades with privacy browsers (Firefox with resistance mode, Brave) and VPNs — these users look like bots but are legitimate. Don't hard-block on fingerprint alone; use it as one signal in a composite risk score."
        watch: "CAPTCHA farms — services where humans solve CAPTCHAs for $2/1000 — defeat all CAPTCHA-based defenses. Time-based behavioral analysis (too fast from page load to click) catches both automated bots and CAPTCHA farms."
        related_problems: [rate-limiter]
      - number: 50
        question: "How do systems prioritize premium users in sales?"
        needed: "priority queue (Redis sorted set by tier + join time); premium users get lower score (higher priority)"
        answer: "Use a Redis sorted set as a priority queue. Score = (tier_weight * -1) + join_timestamp_fractional. Premium users get a large negative tier_weight that dominates the score, so ZRANGEBYSCORE returns them first. Within each tier, users are ordered by join time (FIFO). This gives premium users early access without a separate queue — one sorted set handles all tiers."
        tradeoff: "Separate queues per tier (premium, standard) are simpler to reason about and test but require more coordination code. A single sorted set with composite scores is elegant but the score calculation must be carefully designed to prevent overflow or ordering bugs."
        caveat: "Publishing that premium users get early access is a UX decision — some users see it as fair (paid for the benefit), others see it as unfair (can't compete). Design with this tradeoff in mind and communicate the policy clearly."
        watch: "Redis sorted set ZADD is O(log N) — at 1M concurrent users in the queue, insertion is ~20 comparisons, which is fine. At 10M+, the sorted set becomes the bottleneck; shard the queue by user cohort and merge on dispatch."
        related_fundamentals: [storage/redis]
      - number: 51
        question: "How do systems prevent duplicate coupon redemption?"
        needed: "unique constraint on (user_id, coupon_id) in DB; Redis SET NX as first line of defense"
        answer: "Redis SET NX (atomic set-if-not-exists) is the fast first check — SET redemption:user:1234:coupon:5678 1 NX returns 1 on first call (success) and 0 on all subsequent calls (duplicate). If Redis returns success, proceed to the DB write. The DB has a unique(user_id, coupon_id) constraint as the final guard. If the DB INSERT fails with a duplicate key error, undo the Redis SET."
        tradeoff: "DB unique constraint alone is correct but slower (~5ms DB write per check). Redis NX check is sub-ms. Two-layer approach: Redis guards 99.9% of duplicates at sub-ms, DB catches the rare Redis miss (eviction, restart)."
        caveat: "If Redis SET NX succeeds but the DB INSERT fails (DB down, constraint violation due to Redis miss), you must UNSET the Redis key — otherwise that user can never redeem again on retry. Wrap the entire flow in error handling that cleans up Redis on DB failure."
        watch: "Concurrent requests from the same user (double-click, network retry) race to Redis at the same microsecond. Redis is single-threaded — SET NX is atomic and one will win, one will get 0. This is why Redis NX is safe; application-layer SELECT-then-INSERT is not."
        related_fundamentals: [storage/redis]
      - number: 52
        question: "How do systems limit coupon redemption per day?"
        needed: "Redis counter with 24h TTL per (user, coupon_type); reset at midnight UTC"
        answer: "Use a Redis counter keyed by user_id + coupon_type + date: INCR daily_redemptions:user:1234:percent_off:2024-01-15. Set EX to the number of seconds until midnight UTC. Check the counter before incrementing — if current value >= limit, reject. The TTL auto-resets the counter at midnight without a manual cleanup job."
        tradeoff: "Midnight reset is predictable and exploitable — a user can redeem up to the limit just before midnight and again just after. A rolling 24-hour window (using a Redis sorted set with timestamps) is harder to game but more complex and uses more memory."
        caveat: "Using a date string in the key (date:2024-01-15) requires consistent timezone handling — use UTC everywhere. If some services use local time, two services may generate different date strings for the same moment and get separate counters."
        watch: "Per-day limits combined with a rolling 24h window give different behavior — a user who hits the daily limit at 11pm still has to wait until midnight, not 24 hours. Decide which behavior you want and communicate it clearly in the UI."
        related_fundamentals: [storage/redis]
      - number: 53
        question: "How do systems manage coupon campaigns?"
        needed: "campaign service: create, schedule, activate/deactivate campaigns; rules engine for eligibility"
        answer: "Model campaigns as entities with: campaign_id, name, start_time, end_time, inventory, max_per_user, eligibility_rules (JSON), and status (draft/active/paused/ended). A scheduler activates campaigns at start_time by seeding Redis counters and publishing a CampaignActivated event. An eligibility rules engine (criteria like min_order_value, user_tier, product_category) evaluates each redemption attempt."
        tradeoff: "Hard-coded eligibility logic in code is fast but requires a deployment for every rule change. A rules engine (JSON DSL evaluated at runtime) is flexible but adds eval overhead (~1ms) and more failure surface. Hybrid: simple rules (min amount, expiry) in code, complex rules (combo discounts, user segment) in the rules engine."
        caveat: "Campaign data is read far more than written — cache active campaigns in Redis or application memory (updated on CampaignActivated events) to avoid DB reads on every checkout. Don't query the DB for campaign eligibility on every checkout request."
        watch: "Campaign deactivation must be atomic with inventory close — if you deactivate the campaign first and then close the Redis counter separately, there's a window where the counter is open but the campaign appears inactive, allowing redemptions with no campaign to match."
      - number: 54
        question: "How do systems rollback coupons after order cancellation?"
        needed: "compensating transaction: restore coupon inventory in DB and Redis on order cancel event"
        answer: "Order cancellation publishes an OrderCancelled event to Kafka. The coupon service consumes it and executes a compensating transaction: increment the Redis inventory counter (INCR coupon:1234:inventory), update the DB redemption record to status='cancelled', and decrement the redemptions_count on the coupon. This restores the inventory atomically. Make the compensation handler idempotent — duplicate events must not double-restore."
        tradeoff: "Synchronous rollback (coupon service processes cancellation in the same DB transaction as order cancellation) is simpler but tightly couples two services. Async via Kafka is more resilient — if the coupon service is down, it catches up when it recovers."
        caveat: "Don't restore inventory for fraudulent orders even if they're 'cancelled'. Mark the redemption record as fraud_cancelled and skip inventory restoration. Otherwise fraudsters cancel orders to recycle coupons."
        watch: "Idempotency is critical here — Kafka delivers at least once. An idempotency check (has this order_id already been compensated?) must gate the inventory restore. Store compensated order IDs in a Redis set with 7-day TTL."
        related_fundamentals: [storage/redis]
      - number: 55
        question: "How do systems notify users of available coupons?"
        needed: "notification service: push (FCM/APNs), email, in-app; triggered by campaign scheduler"
        answer: "When a campaign activates, publish a CampaignActivated event. The notification service consumes it, queries the eligible user segment, and fans out notifications: in-app notification (immediate, cheap), push notification via FCM (Android) / APNs (iOS), and email for high-value coupons. Use a queue with priority lanes — push notifications before email since push is time-sensitive."
        tradeoff: "Sending to all users at campaign start creates a massive traffic spike as they all click through simultaneously. Stagger delivery: send to 10% of users 10 minutes before start, 30% at start, 60% over the next 30 minutes. Reduces spike, sacrifices fairness for some users."
        caveat: "Notification fatigue: too many coupon notifications causes users to disable push permissions. Respect user notification preferences (set in their profile) — don't send marketing coupons to users who've opted out of marketing."
        watch: "APNs and FCM delivery rates are not guaranteed — typical push delivery rates are 85-95%. Build an in-app notification inbox as the reliable fallback that users see when they open the app regardless of push delivery."
      - number: 56
        question: "How do systems support location-based coupons?"
        needed: "geo filter at redemption time: user lat/lng vs coupon geo-fence (PostGIS or bounding box)"
        answer: "Attach a geo_fence to the coupon: either a radius (center lat/lng + radius in km) or a polygon (list of coordinates). At redemption time, check if the user's coordinates fall within the geo-fence using PostGIS ST_Contains (polygon) or ST_DWithin (radius). Index coupon locations with a spatial index (PostGIS GIST) for fast lookup. Accept GPS coordinates from the mobile client."
        tradeoff: "Client-side geo check (JS in browser) is fast but the client can spoof coordinates. Server-side check is secure but requires the client to send coordinates with each redemption request. For high-value location coupons, server-side is mandatory."
        caveat: "GPS coordinates have ~5–10m accuracy in open spaces but degrade significantly indoors and in urban canyons (tall buildings). For in-store coupons, a 50m radius is more reliable than a tight 10m fence. Never set geo-fence radius below 50m for consumer apps."
        watch: "Location data is sensitive PII — don't log or store user coordinates beyond what's needed for the redemption check. Use it, check it, and discard it in the same request without persisting to the redemptions table."
      - number: 57
        question: "How do systems track coupon performance?"
        needed: "analytics pipeline: redemption events → Kafka → Spark/Flink → dashboard (impressions, conversions, revenue)"
        answer: "Stream three event types to Kafka: CouponImpression (user sees the coupon), CouponApplied (user enters the code at checkout), CouponRedeemed (order completed with coupon). A Flink streaming job computes real-time metrics: impression-to-apply rate, apply-to-redeem rate, revenue impact, and average order value with vs. without coupon. A Spark batch job runs daily full analytics."
        tradeoff: "Flink streaming gives real-time dashboards (sub-minute lag) but is operationally complex. Spark batch is simpler but has hourly or daily lag. For coupon performance tracking, batch is usually sufficient — you rarely need sub-minute coupon analytics."
        caveat: "Don't track coupon impressions on every page load — it creates enormous event volume with low signal. Track only when the coupon is prominently displayed or when a user actively views a coupon offer page."
        watch: "Attribution is tricky — a user may see a coupon on day 1 and redeem it on day 7. Use a 7-day attribution window (redemption credited to the last impression within 7 days) as the standard, matching how paid marketing attribution works."
        related_fundamentals: [messaging/kafka]
      - number: 58
        question: "How do systems apply coupons during checkout?"
        needed: "validation service checks eligibility, expiry, inventory atomically before applying discount"
        answer: "Coupon application is a two-step flow: preview (validate and show discount amount before payment) and commit (apply discount atomically with the order creation). At preview, check: coupon exists, not expired, user is eligible, inventory > 0. Return the discount amount. At commit, re-validate all conditions and atomically decrement inventory + create the redemption record + create the order in one DB transaction."
        tradeoff: "Reserving inventory at preview (locking it for 10 minutes) prevents selling the last coupon to two users, but requires a release mechanism if the user abandons checkout. Not reserving at preview means the coupon may show a discount at preview but be out of stock at commit."
        caveat: "Never apply the discount before the payment succeeds — if payment fails and you've already discounted the order, you need a compensating transaction. Apply the coupon discount only after payment confirmation is received."
        watch: "Coupon + sale price interaction: if an item is already discounted 30% and the coupon adds another 20%, is the coupon applied to the original price or the sale price? Define the stacking policy explicitly — ambiguity here causes customer disputes and revenue leakage."
      - number: 59
        question: "How do systems prevent expired coupon use?"
        needed: "check expiry_at at redemption time; Redis TTL for fast rejection; DB as source of truth"
        answer: "Three-layer expiry enforcement: Redis TTL (set to expire at coupon expiry_at, fast O(1) miss), application layer check (compare current UTC time to expiry_at field in cached coupon data), and DB constraint (final check within the redemption DB transaction). All three must pass. The Redis TTL check rejects 99% of expired coupons without a DB read."
        tradeoff: "Redis TTL is not perfectly precise — Redis TTL resolution is 1 second, and lazy expiry means a key may persist a few seconds past its TTL under low-frequency access. For coupons expiring at exactly midnight, add a 30-second buffer and rely on the DB timestamp as the authoritative check."
        caveat: "Coupon expiry times are often stored in the local timezone of the business but processed in UTC. A coupon that 'expires Dec 31 at midnight EST' actually expires Jan 1 5:00 AM UTC. Always store expiry_at in UTC, never rely on local time."
        watch: "Under high load, the Redis TTL check and DB check may see different times if system clocks drift. Synchronize all service clocks via NTP and use database NOW() (not application-layer time) as the authoritative time source for expiry checks."
        related_fundamentals: [storage/redis]
      - number: 60
        question: "How do systems handle millions of coupon requests simultaneously?"
        needed: "Redis atomic counters, horizontal scaling of validation service, queue to serialize final claim"
        answer: "For millions of concurrent requests: Redis handles the atomic inventory check at ~100K ops/second per node. The validation service is stateless and horizontally scalable — add pods behind a load balancer. Final claim serialization uses Redis DECR (atomic, single-threaded at Redis level). At 1M req/s, use Redis Cluster with inventory sharded across nodes."
        tradeoff: "Redis Cluster shards keys across nodes — a single coupon's inventory key lands on one shard, so you can't exceed ~100K DECR/second for a single coupon. For higher throughput, split inventory into buckets (coupon:1234:inventory:0 through :9) and distribute claims across buckets."
        caveat: "Horizontal scaling the validation service doesn't help if all traffic converges on a single Redis key for a popular coupon. The Redis key for a viral single coupon is the bottleneck — not the validation service. Pre-split popular coupon inventory into shards."
        watch: "At extreme concurrency (100K+ req/s on one coupon), even Redis becomes a bottleneck. Local in-process reservations (each pod holds a small batch of inventory, e.g., 10 units) dramatically reduce Redis pressure — only 1 Redis call per 10 claims instead of per claim."
        related_fundamentals: [storage/redis, networking/load-balancing]

  - slug: messaging
    title: "Messaging & Notifications"
    description: "Real-time delivery, message guarantees, offline handling, push, group chats"
    number_range: "61–80"
    questions:
      - number: 61
        question: "How do systems deliver real-time chat messages?"
        needed: "WebSockets for persistent connection; message server fans out to recipient's connection"
        answer: "Each client maintains a persistent WebSocket connection to a message server. When user A sends a message to user B, the message server looks up which server B is connected to (via a Redis hash: user_id → server_id), then forwards the message to that server via an internal pub/sub channel (Redis pub/sub or Kafka topic per server). That server pushes the message to B's open WebSocket connection."
        tradeoff: "Long polling is a simpler fallback (no WebSocket infrastructure) but adds 1–3s latency per message and higher server load (HTTP overhead per poll). SSE (Server-Sent Events) is one-way only — works for notifications but not bidirectional chat. WebSockets are the right choice for real-time bidirectional messaging."
        caveat: "WebSocket connections are stateful — load balancers must use sticky sessions (or consistent hashing by user_id) so reconnects land on the same server. If a server crashes, all its users must re-establish connections and sync missed messages."
        watch: "WebSocket connections consume a file descriptor per connection — Linux's default limit is 1024, but it can be tuned to 1M+ per server with ulimit. Each server handles ~100K concurrent connections comfortably with async I/O (Node.js/Go)."
        related_problems: [chat-system]
      - number: 62
        question: "How do systems guarantee message delivery?"
        needed: "persistent message queue, client acknowledgment, retry on missing ack, at-least-once delivery"
        answer: "Store every message in persistent storage (Cassandra/DynamoDB) before delivery attempt. After pushing the message to the recipient's WebSocket, wait for a client ACK (sent back on the same WebSocket). If no ACK within 5 seconds, retry up to 3 times. On reconnect, the client sends its last_seen_message_id; the server sends all messages since that ID."
        tradeoff: "Exactly-once delivery is theoretically impossible across unreliable networks. At-least-once delivery (with client-side deduplication) is the practical solution. The client deduplicates by message UUID, so retried messages don't appear twice in the UI."
        caveat: "Don't deliver messages from the transient WebSocket buffer only — if the server restarts before the client ACKs, those messages are lost. Persistence to the DB must happen before the delivery attempt, not after the ACK."
        watch: "The 'last seen message_id' sync on reconnect must use a monotonically increasing ID (Snowflake ID or sequence number), not timestamps — two messages can have the same millisecond timestamp, causing one to be missed on sync."
        related_fundamentals: [messaging/kafka]
        related_problems: [chat-system]
      - number: 63
        question: "How do systems store chat history?"
        needed: "time-series store (Cassandra/DynamoDB) partitioned by conversation_id, sorted by timestamp"
        answer: "Use DynamoDB or Cassandra with partition key = conversation_id and sort key = message_id (Snowflake ID, time-ordered). This allows efficient range queries: 'get messages in conversation X from timestamp T onwards'. Message IDs are Snowflake IDs (timestamp-embedded) so sort order matches creation order. Retain last 90 days in hot storage; archive older messages to S3."
        tradeoff: "Relational DB (PostgreSQL) supports rich queries (search, reactions aggregation) but doesn't scale horizontally by conversation_id the way DynamoDB does. At 1B messages/day, DynamoDB's auto-sharding is critical. PostgreSQL needs manual sharding at that scale."
        caveat: "Partition on conversation_id, not user_id — a group chat has many participants, and partitioning by user_id means writing the same message N times (once per participant). Store each message once and query by conversation."
        watch: "DynamoDB sort keys must be globally unique within a partition — using timestamp as sort key alone causes collisions in active conversations (two messages in the same millisecond). Always use timestamp + sender_id + random suffix as a composite sort key."
        related_fundamentals: [storage/dynamodb]
        related_problems: [chat-system]
      - number: 64
        question: "How do systems handle offline users?"
        needed: "queue undelivered messages; on reconnect, sync from last seen message_id (cursor-based)"
        answer: "Mark users as offline in Redis when their WebSocket disconnects. Messages sent to offline users are stored normally in the persistent message store. Simultaneously, send a push notification (FCM/APNs) to their device. On reconnect, the client sends its last_seen_message_id, and the server fetches all newer messages via a range query on the messages table. No special queue needed — the messages table IS the queue."
        tradeoff: "Maintaining a separate 'undelivered messages' queue adds complexity without benefit — the persistent message store already holds all messages. Query it directly on reconnect with a cursor. A separate queue is only useful if the message store has no time-based query support."
        caveat: "Don't send push notifications immediately on WebSocket disconnect — users often have brief interruptions (switching WiFi, opening another app). Wait 3–5 seconds before marking offline and sending push, to avoid flooding users with push notifications for split-second disconnects."
        watch: "Large message backlogs on reconnect: a user offline for 24 hours in an active group chat may have 10K messages to sync. Page the sync in batches of 50 with cursor pagination — don't return 10K messages in one response."
        related_problems: [chat-system]
      - number: 65
        question: "How do systems avoid duplicate messages?"
        needed: "client-generated message UUID; server deduplicates on insert; server deduplicates on display"
        answer: "Client generates a UUID (client_message_id) before sending. Server checks if this UUID already exists before inserting: DB unique constraint on client_message_id, or Redis SET NX check. If the UUID exists, return the existing stored message instead of inserting a duplicate. Client also deduplicates on display using the same client_message_id — if it receives the same ID twice, it renders it only once."
        tradeoff: "Server-side deduplication via DB unique constraint is the reliable layer. Client-side deduplication is a UX optimization to prevent visible flicker when a message is delivered via both the WebSocket push and the reconnect sync simultaneously."
        caveat: "Client-generated UUIDs must be random (UUID v4), not sequential or time-based — sequential IDs from different clients can collide. A user re-sending after a perceived failure must reuse the same client_message_id, not generate a new one."
        watch: "Network retries create duplicates in two ways: client retries (sends the same message again after timeout) and server retries (server pushes the same message to the client twice). Both are solved by client_message_id deduplication — it's the universal dedup key."
        related_problems: [chat-system]
      - number: 66
        question: "How do systems send push notifications to millions of users?"
        needed: "fan-out to APNs (iOS) and FCM (Android) via notification service; batch + async"
        answer: "Publish a NotificationRequested event to Kafka. Notification workers consume from the topic and call APNs (iOS) or FCM (Android) APIs. FCM supports sending to up to 500 device tokens per API call (multicast) — batch tokens by platform. APNs requires one API call per token. At 10M devices, 20K FCM calls (500 tokens each) or 10M APNs calls. Use connection pooling to the APNs/FCM gateways — HTTP/2 multiplexing allows 1,500 concurrent push streams per connection."
        tradeoff: "Synchronous fan-out (push directly from the chat server) is simpler but blocks message processing and creates a bottleneck at the APNs/FCM API rate limits. Async via Kafka decouples message storage from notification delivery and allows the notification worker to scale independently."
        caveat: "APNs and FCM silently drop notifications for devices with disabled notifications — there's no error, just no delivery. Don't assume push delivery is confirmed by a 200 response from APNs/FCM. Track push delivery rates separately from app open rates."
        watch: "FCM's multicast endpoint (v1 API) is being deprecated — the new FCM HTTP v1 API requires one call per token (no batch). Plan for 10M individual calls for a global broadcast — this requires high-concurrency async workers."
      - number: 67
        question: "How do systems prioritize urgent notifications?"
        needed: "priority queue (Kafka topic per tier), high-priority lane bypasses batch queue"
        answer: "Use separate Kafka topics per priority tier: notifications_critical (password reset, account security), notifications_transactional (order confirmation, payment receipt), notifications_marketing (promotions, newsletters). Each topic has a dedicated consumer group with different throughput targets. Critical and transactional use high-priority topics with more partitions and consumers; marketing uses a separate low-priority topic with rate limiting."
        tradeoff: "Single topic with message priority headers (Kafka doesn't natively support priority queues) requires consumers to sort messages, which adds complexity and doesn't give low-priority messages a separate consumer group to fall behind independently. Separate topics are cleaner."
        caveat: "Don't make every notification 'critical' — if all notifications share the critical lane, there's no priority differentiation. Enforce classification at the producer level with clear rules: only auth events and payment alerts are 'critical'."
        watch: "Marketing notifications are the highest volume but lowest priority — if your notification service is overloaded, marketing must shed first. Implement explicit load shedding in the marketing consumer: drop messages if consumer lag > 10,000 events rather than letting lag grow unbounded."
        related_fundamentals: [messaging/kafka]
      - number: 68
        question: "How do systems retry failed notifications?"
        needed: "exponential back-off (1s, 5s, 30s), max 3 retries, dead-letter queue for manual inspection"
        answer: "On APNs/FCM delivery failure, publish a RetryNotification event with retry_count and next_retry_at (computed as exponential back-off: 1s, 5s, 30s). A retry scheduler picks up events where next_retry_at <= now. After 3 failures, route to a dead-letter queue (DLQ) and alert the engineering team. Categorize failures: device_unregistered (don't retry, clean up token), rate_limited (retry), server_error (retry with back-off)."
        tradeoff: "Infinite retries with back-off cause notifications to arrive very late — a password reset email arriving 4 hours later is useless. Set maximum retry windows per notification type: security notifications retry for 30 minutes max; marketing notifications retry for 1 hour then discard."
        caveat: "APNs error code 410 (BadDeviceToken) means the app was uninstalled — stop sending to that device immediately and delete the token from your DB. Continuing to send to unregistered tokens wastes API calls and may trigger APNs rate limiting."
        watch: "Device token churn: users reinstall apps, replace phones, and get new tokens. Implement token refresh: when APNs or FCM returns an updated token in the response, immediately update your stored token. Stale tokens cause silent delivery failures."
        related_fundamentals: [messaging/kafka]
      - number: 69
        question: "How do systems manage notification preferences?"
        needed: "user settings store (per channel: push/email/SMS, per type: marketing/transactional)"
        answer: "Store preferences as a user_settings record with per-channel, per-type toggles: {push: {marketing: false, transactional: true, security: true}, email: {marketing: true, transactional: true}, sms: {security: true}}. Before sending any notification, check the user's preference for that channel + type combination. Cache preferences in Redis (TTL 5 minutes) to avoid DB reads on every notification dispatch."
        tradeoff: "Fine-grained preferences (toggle per notification subtype) give users control but create a complex settings UI. Coarse preferences (just 'marketing on/off') are simpler but frustrate users who want some marketing emails but not SMS."
        caveat: "Transactional notifications (password reset, payment confirmation) must always be sent regardless of preferences — they're required for account security and legal compliance. Don't allow users to opt out of transactional notifications."
        watch: "Preference changes must propagate before the next notification — if a user opts out of marketing at 2 PM and a marketing email is queued for 2:05 PM, it should respect the opt-out. Cache TTL of 5 minutes means a 5-minute window where preferences are stale — use a publish/invalidate pattern to force immediate cache refresh on preference change."
      - number: 70
        question: "How do systems prevent notification spam?"
        needed: "rate limit per user per channel (e.g. max 5 marketing pushes/day), digest mode option"
        answer: "Apply rate limits per user per channel per type: max 1 security alert per 10 minutes, max 5 marketing pushes per day, max 2 marketing emails per week. Store counts in Redis with appropriate TTL windows. When the limit is hit, buffer remaining notifications into a daily digest (one email with all missed notifications) rather than discarding them."
        tradeoff: "Hard drop (discard over-limit notifications) is simpler but means users miss information. Digest mode batches them — users get one email instead of 10. Digest adds a batching job but dramatically improves user satisfaction."
        caveat: "Don't apply the same rate limit to security notifications — a user receiving 10 login alerts in 10 minutes needs to see all of them; this is exactly when rate limiting would harm them most. Security and transactional notifications are exempt from spam controls."
        watch: "Push notification opt-out rates increase sharply above 5-7 push notifications per week per app. Track opt-out rates by notification type — if marketing push opt-outs spike, you're sending too many. Optimize for long-term channel health, not short-term send volume."
        related_problems: [rate-limiter]
      - number: 71
        question: "How do systems support group chats?"
        needed: "group membership table; fan-out on write to each member's message queue on send"
        answer: "Store group membership in a group_members table (group_id, user_id, joined_at). On message send, look up all current members, then fan out the message to each member's message queue or WebSocket connection. For groups up to 1K members, fan-out-on-write is efficient. For larger groups (thousands of members), fan-out-on-read (store once, each member queries on demand) is better."
        tradeoff: "Fan-out-on-write (copy message to each member's queue): fast reads, expensive writes — at 500 members and 100 messages/second, that's 50K writes/second. Fan-out-on-read (store once): cheap writes, more expensive reads (every member reads from the same place). Choose based on read/write ratio — most chat systems read far more than they write."
        caveat: "Member list changes (joins, leaves) during an active message send can cause partial delivery — a user who joined between fan-out start and finish receives the message; a user who left between fan-out start and finish also receives it. Use a snapshot of the member list at message creation time."
        watch: "Very large groups (Discord servers, broadcast channels with 100K+ members) must use fan-out-on-read — the write amplification of fan-out-on-write is impractical. Segment 'chat groups' (fan-out-on-write, max ~1K) from 'channels/broadcasts' (fan-out-on-read, unlimited)."
        related_problems: [chat-system]
      - number: 72
        question: "How do systems show 'user is typing'?"
        needed: "ephemeral WebSocket signal (no persistence); debounced emit every 2s; auto-clear after 5s"
        answer: "Client emits a typing_start event via WebSocket when the user begins typing, debounced to at most one event every 2 seconds (prevents flooding the server). Server broadcasts it to all other participants in the conversation via their WebSocket connections. Server sets a 5-second TTL on the typing state in Redis; if no typing_start arrives before the TTL, broadcast a typing_stop. No DB persistence — it's purely ephemeral."
        tradeoff: "Client-emitted typing_stop event (sent when user stops typing or sends the message) is more precise but relies on reliable delivery. TTL-based auto-clear (clear after 5s of no typing_start) is simpler and handles client disconnects — if the user closes the app, the typing indicator clears automatically after 5 seconds."
        caveat: "Don't store typing events in the message history DB — they're ephemeral state, not messages. Persisting them wastes space and pollutes the message log."
        watch: "Typing indicators for large group chats (>20 members) create a noisy UI and excessive WebSocket traffic — suppress typing indicators for groups above a configurable threshold (e.g., 20+ members), or show a generalized '3 people are typing' aggregation."
        related_problems: [chat-system]
      - number: 73
        question: "How do systems sync messages across devices?"
        needed: "message offset per device, on connect sync from last seen offset; server stores all messages"
        answer: "Each device maintains a last_seen_message_id per conversation. On app open or WebSocket reconnect, the client sends its last_seen_message_id for each active conversation. The server responds with all messages in those conversations with ID > last_seen_message_id, paginated in batches of 50. The server stores all messages centrally — devices don't store the canonical copy, they cache it."
        tradeoff: "Per-device cursors (separate last_seen_message_id per device per conversation) enable independent sync. A single cursor shared across devices means reading on one device marks messages as read on all — often the desired behavior, but not always."
        caveat: "Message IDs must be monotonically increasing within a conversation for cursor-based sync to work reliably. Time-ordered Snowflake IDs work. Non-sequential IDs (random UUIDs) don't — you'd need to query by timestamp, which is less precise."
        watch: "A user with 50 active conversations on reconnect would trigger 50 sync queries simultaneously — batch these into a single request: send all cursor states at once, get a single paged response for all conversations. This reduces reconnect latency significantly."
        related_problems: [chat-system]
      - number: 74
        question: "How do systems encrypt messages end-to-end?"
        needed: "Signal Protocol: X3DH key agreement, Double Ratchet for forward secrecy; server sees ciphertext only"
        answer: "Signal Protocol provides end-to-end encryption: X3DH (Extended Triple Diffie-Hellman) establishes a shared secret between two parties without the server knowing the key. Double Ratchet advances the encryption key after every message, providing forward secrecy (past messages can't be decrypted even if current keys leak). The server stores and routes ciphertext only — it cannot read message content."
        tradeoff: "End-to-end encryption breaks server-side features: message search is impossible (server can't index ciphertext), spam/content moderation requires client-side scanning, and message backup requires the user to manage key backups. These are fundamental tradeoffs, not implementation choices."
        caveat: "Key backup is the hardest part of E2E encryption UX — if the user loses their device and their key backup, their message history is permanently unrecoverable. Signal allows optional encrypted backup to the cloud; the backup key is the user's responsibility."
        watch: "Forward secrecy means even if an attacker records all your ciphertext today and later steals your private key, they still can't decrypt past messages — because each message used a different derived key that was discarded after use. This is the primary security advantage of Double Ratchet over simple public-key encryption."
      - number: 75
        question: "How do systems support message search?"
        needed: "full-text index on message content (Elasticsearch); index only after delivery to avoid blocking"
        answer: "After message delivery, emit a MessageDelivered event. An async indexing consumer writes the message content to Elasticsearch with fields: conversation_id, sender_id, timestamp, and full-text content. Search queries filter by conversation_id (the user's conversations) and use Elasticsearch's BM25 full-text match. Index personal messages only for the participants — access-control at the Elasticsearch level via conversation_id filter."
        tradeoff: "Full-text search in the primary message DB (DynamoDB full-scan or PostgreSQL LIKE '%term%') doesn't scale. Elasticsearch provides inverted index search at O(1) vs. O(N) for full-scans. The async indexing introduces a lag of 1–5 seconds between message delivery and searchability."
        caveat: "End-to-end encrypted messages can't be indexed on the server — the server only sees ciphertext. For E2E encrypted systems, message search must be done client-side in the local message cache. Server-side search is only possible for non-E2E-encrypted systems."
        watch: "Elasticsearch indices grow indefinitely — implement index rollover: one index per month, with aliases. Search only the last 12 months by default. Messages older than 12 months require an explicit 'search all time' with a warning about slower performance."
      - number: 76
        question: "How do systems delete messages?"
        needed: "soft delete: mark deleted_at, filter in queries; 'delete for everyone' propagates tombstone"
        answer: "Soft delete: set deleted_at on the message record. Queries filter out deleted messages. 'Delete for me' sets a user-specific hide flag (user_message_hides table) that the sender's client uses to filter. 'Delete for everyone' sets deleted_at on the message itself and broadcasts a MessageDeleted tombstone event to all participants' WebSocket connections, which remove the message from their local displays."
        tradeoff: "Physical deletion removes the data permanently but breaks conversations — missing messages create gaps in chat history that are confusing. Soft deletion with tombstone records maintains thread continuity while hiding content."
        caveat: "Soft-deleted message content is still on disk — if a data breach occurs, deleted message content is exposed. Encrypt message content at rest and physically purge the content column after a retention period (e.g., 30 days after deletion), keeping only the tombstone metadata."
        watch: "Delete for everyone has a time limit on most messaging platforms (e.g., 1 hour on WhatsApp). After the limit, deletion is not possible — the recipient may have already read and screenshotted the message. Enforce the time limit at the API layer."
        related_problems: [chat-system]
      - number: 77
        question: "How do systems show read receipts?"
        needed: "client sends ack with message_id on display; server stores read_at per (user, message)"
        answer: "Client sends a MessageRead event via WebSocket when a message scrolls into view (Intersection Observer API). Server stores read_at = NOW() in a message_reads table: (message_id, user_id, read_at). On the sender's side, the server pushes a ReadReceipt event with the reader's user_id. For group chats, the sender's client shows 'Read by 3' based on the count of message_reads for that message_id."
        tradeoff: "Sending a read receipt for every individual message generates enormous write traffic in active conversations. Optimize by sending only one read receipt per conversation per 'viewing session' (the highest message_id currently visible), not per message."
        caveat: "Read receipts are privacy-sensitive — some users don't want to reveal when they've read messages. Expose a user preference toggle that disables outgoing read receipts. If disabled, don't store read_at for that user's reads."
        watch: "Message reads table grows extremely fast in active chat systems — a 1:1 conversation with 1K messages between two users generates 2K rows (one per user per message). Archive old read receipts after 30 days; nobody checks whether a message from last month was 'read' at 3:45 PM."
        related_problems: [chat-system]
      - number: 78
        question: "How do systems support media sharing in chat?"
        needed: "upload to object storage (S3), store URL in message, CDN for serving"
        answer: "Generate a pre-signed S3 upload URL for the client (valid for 15 minutes), which uploads directly from the client to S3 — bypassing your servers. On upload complete, the client sends a message with the S3 key. The message server generates a CDN URL (CloudFront URL from the S3 key) and stores it in the message record. Clients load media via CDN, not directly from S3."
        tradeoff: "Direct upload from client to S3 (via pre-signed URL) offloads your servers — you're not proxying gigabytes of media uploads. Server-side upload (client → your server → S3) gives you full control (virus scan, content moderation) before storing but costs you bandwidth and CPU."
        caveat: "Pre-signed URLs for uploads must be short-lived (15 minutes) and single-use. A leaked pre-signed URL lets anyone upload to your S3 bucket. Also, never expose raw S3 URLs to clients — always use CDN URLs so you can invalidate and control access."
        watch: "Video files require additional processing before sharing: transcode to web-compatible formats (H.264/MP4), generate a thumbnail, and create adaptive bitrate streams. The client should show a 'processing' state and receive the final playback URL via a webhook when transcoding completes."
        related_fundamentals: [networking/cdn]
      - number: 79
        question: "How do systems moderate chat content?"
        needed: "async scan via ML model (hate speech, CSAM) after delivery; action on violation (remove, ban)"
        answer: "Deliver first, scan asynchronously: after message delivery, emit a ContentSubmitted event. A moderation consumer passes the content through an ML classifier (hate speech, spam, CSAM detection using PhotoDNA for images). The scan completes in 50–500ms. On violation, take automated action: soft-delete the message, issue a warning or ban to the sender, and alert the trust-and-safety team."
        tradeoff: "Pre-delivery moderation (scan before delivery, hold if suspicious) eliminates harmful content but adds 200–500ms latency for every message. Post-delivery (scan after) has near-zero latency impact but means harmful content is briefly visible. Most consumer chat platforms use post-delivery; legal exceptions apply for CSAM."
        caveat: "CSAM detection (PhotoDNA hash matching) should be synchronous and pre-delivery — legal obligations require immediate reporting and removal, not eventual moderation. All other content types can use post-delivery async moderation."
        watch: "ML moderation models have false positive rates — innocent messages flagged as violations. Build a human review queue for borderline cases (confidence score 60–90%) and auto-action only on high-confidence violations (>90%). Track false positive rates weekly and retrain when they spike."
      - number: 80
        question: "How do systems scale messaging to millions of concurrent users?"
        needed: "partitioned WebSocket servers (consistent hash user → server), Kafka for cross-server fan-out"
        answer: "Use consistent hashing to assign users to WebSocket servers: user_id hashes to a server slot. All users in a conversation are likely on different servers. When a message arrives, the receiving server looks up all recipients, determines which servers they're on (Redis hash: user_id → server_id), and publishes the message to each server's Kafka topic. Each server subscribes to its own topic and pushes to connected clients."
        tradeoff: "Redis pub/sub for cross-server fan-out is simpler than Kafka (no offset management) but doesn't persist messages — if a server restarts mid-delivery, messages in transit are lost. Kafka persists messages with replay; critical for reliability. Use Redis pub/sub for typing indicators; Kafka for messages."
        caveat: "Consistent hashing rebalancing on server scale-out reassigns ~1/N of all users to new servers — all those users' WebSocket connections break and reconnect. Smooth this with a warm-up period: new servers join gradually and handle new connections first, while existing connections drain naturally."
        watch: "At 1M concurrent WebSocket connections, plan for 10 servers × 100K connections each. Each connection consumes ~50KB memory (send/receive buffers) — 100K connections = 5GB RAM per server. Size your instances accordingly: a c5.2xlarge has 16GB, leaving 11GB for headroom and application state."
        related_fundamentals: [messaging/kafka, distributed/consistent-hashing]
