        answer: "The client generates a UUID idempotency key and sends it with every payment request. The server stores the key + result in Redis with a 24-hour TTL on first processing. If the same key arrives again (network retry, user double-click), the server returns the cached result without reprocessing. The DB also has a unique constraint on the idempotency key as a secondary safeguard."
        tradeoff: "Redis-only idempotency (no DB constraint) fails if Redis is flushed or the key expires before the client retries. DB unique constraint alone is race-safe but slower. Both together handle the edge cases: Redis for speed, DB for durability."
        caveat: "The client must generate the idempotency key before the first attempt and reuse it on all retries — don't generate a new key on retry. If the client generates a fresh UUID each time, you get no idempotency protection at all."
        watch: "24-hour TTL on idempotency keys means network retries beyond 24 hours create a new payment. For subscription billing where retry windows are longer, use 7-day TTL and store keys in the DB, not just Redis."
