            <line x1="336" y1="50" x2="374" y2="50" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#q2a)"/>
            <line x1="336" y1="80" x2="374" y2="62" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#q2a)"/>
            <rect x="376" y="28" width="100" height="44" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
            <text x="426" y="47" text-anchor="middle" font-size="12" fill="#92400E" font-family="system-ui,sans-serif" font-weight="500">Redis</text>
            <text x="426" y="63" text-anchor="middle" font-size="10" fill="#92400E" font-family="system-ui,sans-serif">Sessions</text>
            <text x="488" y="34" font-size="10" fill="#64748B" font-family="system-ui,sans-serif">stateless →</text>
            <text x="488" y="47" font-size="10" fill="#64748B" font-family="system-ui,sans-serif">any server</text>
            <text x="488" y="60" font-size="10" fill="#64748B" font-family="system-ui,sans-serif">can serve</text>
          </svg>
        answer: "Make auth servers stateless: validate credentials, issue a JWT or opaque token, store sessions in Redis. The load balancer then routes any login request to any auth server — no sticky sessions needed. Redis cluster handles ~1M ops/sec at sub-ms latency; a 10-node cluster can sustain millions of concurrent session lookups."
        tradeoff: "Sticky sessions (server-side memory) avoids Redis but means one crashed auth server invalidates all its sessions. Stateless JWT avoids Redis entirely but makes revocation hard — you can't invalidate a JWT without a blacklist, which brings Redis back anyway."
        caveat: "Don't put the session store on the same Redis cluster as your rate limiter or cache — a login spike exhausting connections will also kill rate limiting. Use separate Redis clusters per concern."
        watch: "Login spikes are predictable (market open, sports event start) — pre-warm auth server instances 10 minutes ahead using scheduled auto-scaling policies, not reactive CPU-based scaling which is 3-5 minutes too slow."
        related_problems: [rate-limiter]
        related_fundamentals: [networking/load-balancing, storage/redis]
      - number: 3
        question: "How do you design secure password storage?"
        needed: "bcrypt or argon2 hashing, per-user salt, never plaintext — not MD5 or SHA1"
        answer: "Use bcrypt (cost factor 12) or Argon2id. Both are intentionally slow — bcrypt does ~4,096 rounds of SHA; Argon2id adds memory-hardness (64MB by default). Each password gets a random 32-byte salt so identical passwords hash differently. Never use MD5, SHA1, or SHA256 — they're too fast; an attacker can try 10 billion SHA256 guesses/second on a GPU."
        tradeoff: "Argon2id is stronger (memory-hard, resistant to GPU/ASIC cracking) but requires tuning memory/iterations. bcrypt is battle-tested and widely supported. PBKDF2 is acceptable for compliance but weaker than both against modern GPU attacks."
        caveat: "Never hash without a salt — rainbow table attacks crack unsalted hashes instantly. Don't re-use the same salt for all users. Also never store the plain password even temporarily in logs or request traces."
        watch: "Cost factor 12 means bcrypt takes ~250ms on modern hardware — that's intentional for login but too slow for high-throughput API auth; use JWT/sessions instead of re-hashing on every request."
      - number: 4
        question: "How do you prevent brute-force login attacks?"
        needed: "rate limiting per IP/account, exponential back-off, CAPTCHA after N failures"
        answer: "Rate limit by both IP and account independently — 5 failures per account in 15 minutes triggers a lockout; 20 failures per IP in 1 minute triggers a challenge. Exponential back-off doubles the delay after each failure (1s, 2s, 4s, up to 30s). After 5 consecutive failures, require CAPTCHA to prove human. Store failure counts in Redis with TTL so they expire automatically."
        tradeoff: "Account lockout stops brute force but enables denial-of-service (attacker locks out victim). Prefer progressive delay + CAPTCHA over hard lockout. IP-based limiting alone fails against distributed attacks from botnets using thousands of IPs."
        caveat: "Don't alert users with 'account locked' — tell them 'too many attempts, try again later'. Revealing lockout status helps attackers confirm valid usernames. Also never send lockout emails immediately — that's a DoS vector via email flooding."
        watch: "Credential stuffing (trying breach passwords) succeeds even at 1 attempt per account because it uses different IPs — detect it by monitoring the ratio of failed logins across accounts, not per account."
        related_problems: [rate-limiter]
      - number: 5
        question: "How do systems implement secure password reset?"
        needed: "short-lived signed token (15 min), delivered to verified email, single-use"
        diagram_html: |
