        question: "How do systems balance traffic globally?"
        needed: "geo load balancing: DNS-based (Route 53 latency routing) directs user to nearest region"
        answer: "Use Route 53 latency routing: the DNS resolver returns the A record for the region with the lowest measured latency from the user's source IP. AWS measures latency from edge locations to each region and updates the routing table automatically. Add health checks to each region's endpoint — if us-east-1 fails its health check, Route 53 automatically removes it from DNS responses and routes all traffic to us-west-2."
        tradeoff: "DNS-based geo routing has propagation delay — DNS TTL is typically 60 seconds, so failover takes 60+ seconds while old DNS caches expire. Application-layer routing (Anycast, AWS Global Accelerator) provides sub-second failover by routing at the TCP/IP layer before DNS is involved."
        caveat: "Route 53 latency routing is based on AWS's measured latencies from edge PoPs, not the user's actual latency. Users on unusual network paths (corporate proxies, satellite internet) may get routed to a suboptimal region. AWS Global Accelerator uses Anycast to provide more accurate routing."
        watch: "Geo routing without data affinity creates consistency problems — if a user creates a record in us-east-1 and then is routed to us-west-2 on the next request, the cross-region replication lag means they may not see their own write. Use 'read your own writes' consistency by routing a user to the same region for a session after a write."
