      - number: 6
        question: "Q070: Design a distributed configuration management system. 500 microservices need to pick up config changes (feature flags, DB connection strings, rate limits) within 30 seconds without a restart."
        needed: "config store (etcd or Consul) → services watch keys via long-polling or gRPC watch stream; config SDK caches locally; hot reload: service applies new config without restart via channel/goroutine"
        answer: "Config store: etcd (strongly consistent, supports Watch API). Config hierarchy: /config/{env}/{service}/{key} = value. Example: /config/prod/payment-service/db_max_connections = 100. Service SDK (embedded in every microservice): on startup, GET all keys under /config/prod/{service_name}/ → local cache (in-memory map). Watch: gRPC stream WATCH /config/prod/{service_name}/ → receives delta events (PUT, DELETE) within milliseconds of config update. Hot reload: SDK emits event to application listener. Application: config_subscriber.on_change('db_max_connections', lambda value: pool.resize(int(value))). Change propagation: etcd write → gRPC watch notification → SDK receives → application callback = 500ms end-to-end. Well within 30s SLA. Fallback: if etcd is unreachable, serve cached config. Never block service startup on config fetch — use cached values (persisted to local file on last successful fetch)."
        tradeoff: "etcd (CP) vs. Consul (AP with strong consistency option): etcd: Raft consensus, writes are strongly consistent, Watch API is reliable. Best for configs where correctness matters (DB connection strings, API keys). Consul: built-in service discovery + health checks, HTTP API + gRPC, slightly more operational complexity for non-Kubernetes deployments. Both are correct choices; etcd is already present in Kubernetes clusters."
        caveat: "etcd Watch API and reconnection: if a service restarts or loses network, it must re-establish the Watch. On reconnect, GET current values (might have changed while disconnected) then start Watch from current revision. The SDK handles this internally. Missing: if service is down for 10 minutes and config changes 5 times, the SDK fetches the latest value on reconnect (doesn't replay all 5 changes). For audit purposes, etcd stores all revisions — but service only needs the latest value."
        watch: "Secret management follow-up: DB passwords and API keys should NOT be in etcd (etcd is not a secret store). Use Vault for secrets: service authenticates to Vault via Kubernetes service account (Vault Kubernetes auth method). Vault issues a short-lived secret with 1-hour TTL. SDK fetches new secret before TTL expires (lease renewal). Config system holds non-sensitive config; Vault holds secrets. Never mix them in the same store."
        related_problems: []
        related_fundamentals: []

      - number: 7
        question: "Q073: Design an offline-first mobile app sync system. Users edit data offline. Multiple devices for the same user may edit the same data concurrently. Changes must merge correctly when devices reconnect."
        needed: "CRDT (Last-Write-Wins or operational transform) per field; each device has a unique device_id; changes stored as operations log with (device_id, timestamp, operation); server merges on reconnect using vector clocks"
        answer: "Conflict resolution strategy: Last-Write-Wins (LWW) per field. Each field has a (value, device_id, lamport_timestamp) tuple. On device A: user edits task title at T=100 → local: {title: 'New Title', device: 'A', ts: 100}. On device B (offline): user edits same title at T=105 → local: {title: 'Another Title', device: 'B', ts: 105}. Server merge on sync: compare timestamps. B's edit (T=105) wins over A's (T=100). title = 'Another Title'. Local storage: SQLite on device. Changes stored as operation log: {op_id UUID, device_id, entity_id, field, old_value, new_value, lamport_ts}. Sync protocol: POST /sync with all local ops since last_sync_ts → server applies and returns all remote ops since last_sync_ts. Device applies remote ops: for each remote op, if remote.lamport_ts > local.lamport_ts for that field → apply. Else: keep local. Lamport clock: max(local_clock, received_clock) + 1 on each event. This gives total ordering even without wall clock synchronization."
        tradeoff: "LWW (Last-Write-Wins) vs. operational transform (OT): LWW is simple and correct for independent field edits (user edits task title on device A, due date on device B — no conflict). LWW fails for concurrent text editing (Google Docs scenario: both devices insert text at position 5 — LWW drops one edit). For text documents: use CRDT (RGA, or libraries like Yjs, Automerge). For structured data (task fields, settings): LWW is correct and much simpler."
        caveat: "Clock skew: Device A's clock is 10 minutes ahead of Device B's clock. A edits at wall-clock T=10:00 (Lamport T=50). B edits at wall-clock T=10:05 but Lamport T=45 (B's Lamport clock is lower because B has done fewer operations). Lamport timestamp comparison: B.ts=45 < A.ts=50 → A wins. But B's edit was 5 minutes later in wall time. This is expected with Lamport clocks — they give causal ordering, not wall-clock ordering. If wall-clock ordering is required: use hybrid logical clocks (HLC) which combine wall clock + logical counter."
        watch: "Sync conflict UI follow-up: instead of silently resolving with LWW, show the user a conflict UI: 'Device A changed title to X. Device B changed it to Y. Which do you want to keep?' This is correct for high-value data (documents) but unusable at scale (100 fields changed offline → 100 conflict dialogs). Rule: show conflict UI only for fields where both changes have user-visible intent (e.g., task status: both marked it complete vs. incomplete). For low-stakes fields (last_viewed_at): always use LWW silently."
