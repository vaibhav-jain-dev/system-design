        question: "How do systems backup critical data?"
        needed: "automated daily snapshots, point-in-time recovery (PITR) for DB, cross-region replication for DR"
        answer: "Three backup tiers: (1) Automated RDS snapshots: daily full snapshot retained for 35 days, stored in S3. Restore time is 10–45 minutes for a 1TB database. (2) Point-in-time recovery (PITR): continuously archive transaction logs (WAL) to S3, enabling restore to any second within the retention window. (3) Cross-region replication: copy daily snapshots to a DR region (us-west-2 if primary is us-east-1) for protection against regional disasters. Test restores monthly — an untested backup is not a backup."
        tradeoff: "Automated RDS snapshots are managed by AWS with zero operational overhead. Self-managed logical backups (pg_dump) give you portability (can restore to non-RDS PostgreSQL) and are mandatory for migration or compliance scenarios where you need the data outside AWS."
        caveat: "RDS snapshot restore creates a new DB instance — not an in-place restore. Your application must be updated with the new endpoint, and any changes made after the backup point are lost. For PITR (transaction log replay), restore time grows with the distance from the last snapshot to the target time."
        watch: "DynamoDB PITR (enabled per table) restores to any second in the last 35 days but restores to a new table, not the original — application code must be updated to use the restored table name, or you need a table swap process."
      - number: 135
        question: "How do systems restore lost data?"
        needed: "restore from latest snapshot, replay WAL to target timestamp, validate integrity before cutover"
        answer: "Identify the target restore time (just before the data loss event). Restore the latest RDS snapshot created before that time to a new instance — this gets you within 24 hours of the target. Then replay WAL (transaction logs archived by PITR) to the exact target second. This gives you a restored instance with data up to the second before the incident. Validate integrity: run checksums, compare row counts, verify referential integrity. Route a read-only replica of production traffic to the restored instance for validation before cutover."
        tradeoff: "Full PITR restore takes 30 minutes to 2 hours depending on DB size and WAL volume to replay. For small tables with known data loss, a faster option is a targeted restore: export the specific rows from the snapshot via pg_dump --table, then re-import to production. This targets the repair without a full instance restore."
        caveat: "Data loss in a distributed system is often in multiple places — if the primary DB lost data and the event was also propagated to Kafka and downstream services before detection, restoring the DB alone leaves downstream systems out of sync. Map all data propagation paths before starting restore."
        watch: "After restore and cutover, any events that occurred between the target restore time and the actual cutover time are lost from the restored DB. Buffer new writes during the restore window or replay post-restore changes from the event log. This window is typically 30–120 minutes for a large DB restore."
