      - number: 81
        question: "How do platforms store billions of images?"
        needed: "object storage (S3): flat namespace, 11 nines durability, lifecycle rules for cold tiers"
        answer: "S3 (or GCS) is the standard: it provides 11 nines of durability (replicated across 3+ AZs), virtually unlimited capacity, and a flat key namespace. Structure keys by date and content hash: images/{year}/{month}/{user_id}/{content_hash}.webp. Enable S3 Intelligent-Tiering to automatically move infrequently accessed images to cheaper storage classes after 30 days. S3 at $0.023/GB for the first 50 TB."
        tradeoff: "Self-hosted distributed file systems (Ceph, Hadoop HDFS) give you more control but require significant ops investment and can't match S3's durability guarantees without extensive engineering. Facebook's Haystack is a notable exception but was built before S3 existed — start with S3."
        caveat: "Don't use sequential S3 keys (image_00001, image_00002) — S3 internally partitions by key prefix and sequential keys create hotspots on a single partition. Use content hashes or random prefixes to distribute load across S3 partitions."
        watch: "S3 LIST operations are expensive (O(N) scan) and don't support filtering — if you need to find images by user or date, store that metadata in a database. Never use S3 as a database — it's a blob store."
        related_problems: [instagram]
      - number: 82
        question: "How do platforms serve images globally with low latency?"
        needed: "CDN in front of S3: edge PoPs serve cached objects, origin fetch on miss"
        answer: "Place CloudFront (or Fastly/Akamai) in front of S3. Configure CloudFront with a long cache TTL (7 days for immutable images identified by content hash in the URL). Edge PoPs cache the image after the first request from each region — subsequent requests for the same image in that region are served from memory at <5ms. S3 is only hit on cold requests (first user in each region to view an image)."
        tradeoff: "CDN cache TTL tradeoff: longer TTL = higher cache hit rate = lower origin load and latency. But longer TTL means image updates/deletions propagate slowly. For immutable images (content hash in URL), use 365-day TTL. For mutable profile photos, use shorter TTL (1 hour) or versioned URLs."
        caveat: "Don't serve images directly from S3 to clients — S3 bandwidth is $0.09/GB, CloudFront is $0.0085/GB (10x cheaper) and much faster. Also, direct S3 URLs expose your bucket structure; CDN provides a stable URL regardless of backend."
        watch: "Use separate CloudFront distributions for user-generated content and static assets — this allows independent cache invalidation and origin configuration. Invalidating the wrong distribution for a security incident (compromised user images) is a costly mistake."
        related_fundamentals: [networking/cdn, networking/cdn/cloudfront]
        related_problems: [instagram]
      - number: 83
        question: "How do systems compress images automatically?"
        needed: "image processing pipeline on upload: resize to standard sizes, convert to WebP, quality 80"
        answer: "On upload, trigger an async image processing job: decode the original, resize to standard variants (thumbnail 150x150, medium 600x600, large 1200x1200), convert to WebP (25–35% smaller than JPEG at equal quality), and compress at quality 80. Store all variants in S3 with paths encoding the variant: /images/{hash}/600x600.webp. The original is retained separately for future re-processing."
        tradeoff: "Processing on upload (eager) generates all variants immediately — serving is fast but wastes compute and storage for variants never requested. Processing on demand (lazy, via imgproxy or Cloudflare Image Resizing) generates variants on first request — saves storage but adds latency on cold requests and requires an image transform proxy in front of S3."
        caveat: "Don't use a single 'max quality' WebP for all use cases — a mobile thumbnail at 150x150 doesn't benefit from quality 85; quality 65 is indistinguishable at that size and saves 40% more. Tune quality separately per variant size."
        watch: "AVIF (successor to WebP) offers another 25–30% size reduction over WebP at equal quality but has limited browser support (no Safari until 2023). Use WebP as baseline with AVIF served via Content Negotiation (Accept: image/avif) to browsers that support it."
        related_problems: [instagram]
      - number: 84
        question: "How do platforms detect duplicate images?"
        needed: "perceptual hashing (pHash): similar images have Hamming distance < threshold; index hashes"
        answer: "Compute a perceptual hash (pHash or dHash) from the image: resize to 8x8 grayscale, compute DCT, encode as a 64-bit integer. Two visually similar images (cropped, resized, slightly edited) will have Hamming distance < 10 out of 64 bits. Store all pHashes in a database with a BK-tree or VP-tree index for efficient nearest-neighbor search. Flag pairs with Hamming distance < 5 as duplicates."
        tradeoff: "Cryptographic hash (MD5/SHA256) detects byte-identical duplicates — any pixel change produces a completely different hash. Perceptual hash detects visually similar images even after minor edits. Use SHA256 for exact dedup and pHash for near-duplicate detection — they serve different purposes."
        caveat: "pHash collision rate increases with image complexity — an image of a white wall and another white wall may hash identically even if they're different images. Supplement pHash with a secondary check (compare color histograms or a CNN embedding) before hard-blocking as duplicates."
        watch: "BK-trees enable O(log N) nearest-neighbor search over Hamming distance, making duplicate detection feasible even over billions of pHashes. A brute-force linear scan over 1B hashes takes ~1 second; a BK-tree reduces it to milliseconds."
      - number: 85
        question: "How do systems moderate harmful content?"
        needed: "async ML classifier (nudity, violence) on upload; human review queue for borderline cases"
        answer: "On content submission, emit a ContentSubmitted event to Kafka. A moderation consumer passes the content to a multi-label ML classifier (nudity, graphic violence, hate symbols, CSAM). High-confidence violations (>95%) trigger automated removal and sender action. Medium-confidence (60–95%) adds the content to a human review queue. Low-confidence (<60%) allows publication. CSAM uses PhotoDNA hash matching — synchronous and pre-publish."
        tradeoff: "Synchronous pre-publish moderation eliminates harmful content but adds 500ms–2s latency to every upload and requires high availability of the ML service. Async post-publish moderation is faster for users but means harmful content is briefly live. Synchronous is required only for CSAM; async is acceptable for most other categories."
        caveat: "ML models have demographic bias — nudity classifiers often over-flag non-Western traditional dress and art. Build a bias audit into your review queue: track false positive rates by content category and demographics. Uncorrected bias causes disproportionate harm to specific communities."
        watch: "User reporting is your most effective moderation signal at scale — your users see far more content than your ML does. Build a report button on every piece of content, route reports to human reviewers, and feed confirmed violations back into ML training data."
      - number: 86
        question: "How do platforms support video streaming?"
        needed: "HLS or DASH adaptive bitrate: transcode to multiple resolutions, serve via CDN"
        answer: "Transcode uploaded video into multiple quality levels: 360p, 480p, 720p, 1080p, 4K. Generate HLS (HTTP Live Streaming) playlist files (.m3u8) that list the segments for each quality level. The video player (HLS.js, AVPlayer) fetches the master playlist, measures network speed, and selects the appropriate quality level, switching dynamically as bandwidth changes. Serve all segments from CDN."
        tradeoff: "HLS is Apple's standard, universally supported, but 6–10 second latency due to segment size. DASH (Dynamic Adaptive Streaming over HTTP) is the MPEG standard, more flexible, but requires an MSE-capable browser (no Safari without Media Source Extensions). HLS for broadest compatibility; DASH for lower latency in controlled environments."
        caveat: "Segment size is the latency/efficiency tradeoff: 10-second segments have lower overhead but 10 seconds of buffering to switch quality. 2-second segments enable faster adaptation but create 5x more HTTP requests. Standard for VoD: 6-second segments. For live: 2-second segments."
        watch: "Adaptive bitrate logic must avoid quality oscillation — rapidly switching between 720p and 360p every few seconds creates a bad UX. Use a bandwidth smoothing window (exponential moving average over 10 seconds) before making quality switch decisions."
      - number: 87
        question: "How do platforms transcode videos after upload?"
        needed: "transcoding pipeline: upload → queue → workers transcode to 360p/720p/1080p → S3 output"
        answer: "Upload triggers a TranscodeJob event to Kafka with video S3 key, resolution targets, and output paths. Transcoding workers (GPU-accelerated, e.g., using FFmpeg with NVENC) consume from the queue, download the source video, transcode to each resolution, generate HLS segments and playlist, and upload outputs to S3. On completion, update the video metadata DB record with available resolutions and set status to 'available'."
        tradeoff: "Managed transcoding (AWS Elastic Transcoder, MediaConvert) costs more per minute (~$0.015/min vs $0.003/min self-managed) but eliminates ops burden. Self-managed FFmpeg on GPU instances is 5x cheaper at scale (>1M minutes/month) but requires significant infrastructure work."
        caveat: "Don't block the upload response on transcoding completion — transcoding a 1-hour 4K video takes 20+ minutes. Return immediately after upload, poll transcoding status, and use webhooks or WebSockets to notify the user when processing completes."
        watch: "Prioritize transcoding queue by video age — a video uploaded 10 minutes ago should be transcoded before one uploaded 10 seconds ago, because the new upload's user is still on the platform and waiting. FIFO queuing delays older users indefinitely during spikes."
