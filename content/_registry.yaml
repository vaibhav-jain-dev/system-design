            <rect x="340" y="84" width="90" height="30" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
            <text x="385" y="99" text-anchor="middle" font-size="10" fill="#065F46" font-family="system-ui,sans-serif">Upsert user</text>
            <text x="385" y="111" text-anchor="middle" font-size="10" fill="#065F46" font-family="system-ui,sans-serif">Issue session</text>
          </svg>
        answer: "Use OAuth 2.0 Authorization Code flow with PKCE. User clicks 'Sign in with Google', you redirect them to Google's auth server with your client_id and a random state parameter. Google redirects back with an authorization code. You exchange the code for an ID token (OIDC) containing name, email, and provider user ID. Upsert a local user record on the email or provider_id, then issue your own session token."
        tradeoff: "Linking on email (matching Google email to existing account) is convenient but risky — a compromised Google account takes over the local account. Linking on provider_id (sub claim) is safer but requires users to explicitly link accounts, not just match by email."
        caveat: "Always verify the state parameter on callback to prevent CSRF. Also verify the ID token signature using Google's public JWKS endpoint — never trust the claims without signature verification. Don't accept the email claim as proof of email ownership if email_verified is false."
        watch: "If a user's Google account email changes, your email-based link breaks — store the provider's stable user ID (sub claim) as the foreign key, not their email."
      - number: 12
        question: "How do you prevent session hijacking?"
        needed: "HTTPS only, HttpOnly + Secure cookies, SameSite=Strict, token rotation"
        answer: "Use HttpOnly cookies (prevents JS access, blocks XSS theft), Secure flag (HTTPS-only transmission), and SameSite=Strict (blocks CSRF — cookie not sent on cross-site requests). Rotate session tokens on privilege escalation (login, password change). Bind sessions to the user-agent and IP as soft factors — flag but don't reject on mismatch."
        tradeoff: "SameSite=Strict breaks OAuth flows where the redirect back from the IdP is a cross-site navigation — the session cookie won't be sent. Use SameSite=Lax for OAuth compatibility; it still prevents CSRF for state-changing requests."
        caveat: "HttpOnly alone doesn't prevent session theft if the server itself is compromised or if the cookie is transmitted over HTTP before the Secure flag is enforced. Enforce HSTS (HTTP Strict Transport Security) so browsers always upgrade to HTTPS."
        watch: "Token rotation after login (issue a new session token immediately after authentication) defeats session fixation attacks where an attacker plants a known session ID before the user authenticates."
