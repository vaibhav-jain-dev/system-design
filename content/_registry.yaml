      - number: 144
        question: "How do systems measure performance?"
        needed: "metrics: p50/p95/p99 latency, RPS, error rate, saturation; exported to Prometheus, visualized in Grafana"
        answer: "Export RED metrics (Rate, Errors, Duration) and USE metrics (Utilization, Saturation, Errors) from every service to Prometheus. For latency, use histograms (not summaries) to capture p50/p95/p99 — histograms can be aggregated across instances, summaries cannot. Key thresholds: API p99 < 500ms, DB p99 < 50ms, cache hit rate > 80%, error rate < 0.1% for critical paths. Visualize in Grafana with service-level dashboards and drill-down from service to method to downstream call."
        tradeoff: "High-cardinality labels (user_id, request_id as Prometheus labels) cause cardinality explosion — a 10M-user system with per-user metrics uses 10M metric series, which OOMs a Prometheus instance. Aggregate to coarser labels (tenant_id, user_tier) for Prometheus metrics; use logs/traces for individual user debugging."
        caveat: "p99 latency is a lagging indicator — it reflects the past 30–60 seconds of requests. For alerting on latency spikes, track the 'current worst 1%' in a rolling 1-minute window, not a 5-minute or 30-minute window. Slow alerting on latency is one of the most common causes of prolonged incidents."
        watch: "Goodhart's Law applies to performance metrics: teams optimize for the measured metrics at the expense of unmeasured ones. If you only measure p99 API latency, teams build fast APIs that offload work to async jobs that are never measured. Measure end-to-end user-perceived latency, not just API response time."
      - number: 145
        question: "How do systems predict capacity needs?"
        needed: "usage trend analysis + seasonal patterns + event calendar → capacity model → provision 20% headroom"
        answer: "Build a capacity model from historical data: fit a trend line to weekly peak RPS, DB write throughput, and storage growth rate. Overlay seasonal patterns (Thanksgiving, Black Friday, year-end). Project 3–6 months forward and identify when current capacity will be exceeded. Provision at the point where utilization hits 70–75% of max capacity — this leaves 25–30% headroom for organic spikes and unexpected growth. Add a separate event calendar (product launches, marketing campaigns) for event-driven pre-scaling."
        tradeoff: "Linear extrapolation works for steady growth but misses hockey-stick inflection points (viral product launches, seasonal spikes). Use exponential smoothing (EMA) on growth rate rather than raw RPS to detect acceleration earlier. Also maintain a 'capacity reserve' account in your cloud budget for emergency scale-out without procurement approvals."
        caveat: "Storage capacity planning needs to account for replication factor — 10TB of application data becomes 20TB with 2x replication and 30TB with 3x. Add index overhead (typically 20–50% of data size for databases) and temporary working space (sort buffers, vacuum, backups) when estimating total disk needs."
        watch: "Capacity planning for stateful services (databases, queues) is much harder than for stateless services — you can't just add nodes. DB sharding requires a migration; Kafka repartitioning requires consumer rebalancing. Start stateful services with 2–3x the capacity you think you need to defer the costly scaling operation."
      - number: 146
        question: "How do systems migrate infrastructure safely?"
        needed: "staged rollout: shadow traffic, dual-write, validate, cut over, rollback plan at each stage"
        answer: "Four-phase migration: (1) Shadow: new system receives a copy of all traffic but results are discarded — compare outputs against the old system for divergence. (2) Dual-write: all writes go to both old and new systems simultaneously; reads still come from the old system. (3) Read from new: gradually shift read traffic from old to new (1% → 10% → 50% → 100%), monitoring for correctness. (4) Deprecate old: once new system handles 100% of traffic and data is consistent, decommission the old system. Rollback is possible at every phase."
        tradeoff: "Dual-write is expensive — every write is processed twice during the migration window. For large-scale migrations, the dual-write window must be as short as possible. Minimize by doing bulk data migration before enabling dual-write, so the old and new systems start close to parity."
        caveat: "Shadow traffic from production is valuable but must not cause side effects — if the shadow system sends emails, charges cards, or calls third-party APIs based on shadow traffic, you create real-world impact from test traffic. Shadow systems must be configured to no-op on external side effects."
        watch: "The most dangerous moment in a migration is the cutover — when you switch reads from the old to the new system. Have a runbook with a clear decision gate: if error rate on the new system exceeds 1% within 5 minutes of cutover, immediately revert reads to the old system. Don't improvise under pressure."
      - number: 147
        question: "How do systems handle rolling restarts without downtime?"
        needed: "graceful shutdown: drain in-flight requests (30s), deregister from LB before stopping"
        answer: "Graceful shutdown sequence: (1) Deregister from the load balancer (send SIGTERM to the process, which triggers the pre-stop hook to call the LB deregistration API or decrement K8s readiness). (2) Wait for the load balancer to stop routing new requests (typically 30–60 seconds for in-flight draining). (3) Drain in-flight requests — complete all requests currently being processed, up to a 30-second deadline. (4) Close DB connections cleanly. (5) Exit. Kubernetes terminationGracePeriodSeconds should be set to 90 seconds to accommodate this."
        tradeoff: "Short drain windows (5 seconds) minimize restart time but abort in-flight long-running requests (file uploads, streaming responses). Long drain windows (5 minutes) are user-friendly but slow rolling restarts to a crawl. Match drain window to your p99 request duration + 20% buffer."
        caveat: "Kubernetes default terminationGracePeriodSeconds is 30 seconds — if your drain takes longer than 30 seconds (due to long-running requests), Kubernetes sends SIGKILL and terminates the process immediately. Increase terminationGracePeriodSeconds beyond your expected drain time."
        watch: "WebSocket connections don't drain on SIGTERM — they're long-lived connections that must be explicitly closed by the application. A WebSocket server being restarted must send a close frame to all connected clients before shutdown, triggering client reconnection to a new instance."
        related_fundamentals: [networking/load-balancing]
      - number: 148
        question: "How do systems reduce cold start latency for serverless functions?"
        needed: "provisioned concurrency (warm instances), minimize package size, keep connections in module scope"
        answer: "Three strategies: (1) Provisioned concurrency (AWS Lambda): pre-initialize N execution environments so they're warm and ready — first invocations get <1ms cold start instead of 500ms–3s. (2) Minimize deployment package size: each MB of dependencies adds ~5ms cold start time. Remove unused libraries, use tree-shaking, prefer slim base images. (3) Move initialization outside the handler function: DB connections, SDK clients, and config loading happen once on container start, not on every invocation."
        tradeoff: "Provisioned concurrency costs the same as running the equivalent EC2 instances continuously — for always-busy functions, use EC2 or Fargate instead. Provisioned concurrency makes sense for latency-sensitive functions that receive traffic in short bursts (not continuous load)."
        caveat: "Lambda cold starts in VPCs are much slower (1–8 seconds historically) because attaching an ENI to the Lambda execution environment takes time. AWS's Hyperplane NAT addresses this for new functions, but old Lambda functions in VPCs may still see elevated cold starts. Test cold start latency in your specific configuration."
        watch: "Connection pooling in serverless functions is fundamentally broken — each Lambda invocation can create a new DB connection, and with 1,000 concurrent Lambdas, you exhaust a PostgreSQL connection limit of 100 immediately. Use RDS Proxy or PgBouncer as a connection pooler in front of the DB for Lambda workloads."
      - number: 149
        question: "How do systems test disaster recovery plans?"
        needed: "chaos engineering (inject node/zone failures), game days (simulated incident drills), measure RTO/RPO"
        answer: "Three DR testing methods: (1) Chaos engineering: inject failures in production (Chaos Monkey kills random EC2 instances, Chaos Kong kills an entire AZ) and measure recovery time and user impact. Start in staging; graduate to production on off-peak hours. (2) Game days: scheduled 3-hour exercises where you inject a specific failure scenario (region outage, DB corruption) and measure time-to-recover against your RTO target. (3) Data restore tests: monthly restore of the previous night's backup to a staging environment, verify data integrity and restore time."
        tradeoff: "Chaos engineering in production is the most realistic DR test but carries real risk of user impact. Shadow chaos (replay production traffic on a parallel staging environment and inject failures there) provides realistic load without user impact, but staging environments are rarely identical to production."
        caveat: "DR tests reveal toil and manual steps in your runbooks — steps like 'promote the read replica' or 'update DNS' that each take 5 minutes add up. After each game day, measure time spent on each runbook step and automate anything that takes > 2 minutes."
        watch: "The most common finding in DR drills is that critical credentials, access keys, and runbooks are stored in systems that are unavailable during the outage — in the very service that's down. Store DR runbooks in a separate system (printed, external wiki, S3 bucket in the DR region) so you can access them when your primary tools are unavailable."
      - number: 150
        question: "How do systems ensure long-term reliability?"
        needed: "observability (metrics + logs + traces) + redundancy (multi-AZ, replicas) + runbooks + blameless post-mortems"
        answer: "Reliability is a practice, not a configuration. Four pillars: (1) Observability: full metrics/logs/traces coverage so you know what's broken and why within minutes. (2) Redundancy: multi-AZ, replicas, and circuit breakers so no single failure takes down the service. (3) Runbooks: documented procedures for every alert and every known failure mode, kept current and tested in game days. (4) Post-mortems: every SEV-1 and SEV-2 incident gets a blameless post-mortem within 5 business days — document timeline, root cause, contributing factors, and action items. Track action item completion."
        tradeoff: "SRE (Site Reliability Engineering) formalizes reliability work with error budgets: if the system is 99.9% available, you have a 43-minute monthly error budget. Spending the budget on planned maintenance and experiments is healthy. Burning it on incidents signals systemic reliability problems. Error budgets make reliability trade-offs explicit and quantifiable."
        caveat: "Blameless post-mortems are culturally hard — engineers feel implicated when their code caused an outage. Leadership must explicitly model blameless behavior: the goal is to learn and fix systems, not to assign fault. A culture where engineers fear post-mortems is one where incidents get under-reported."
        watch: "Reliability debt accumulates invisibly — every system that lacks automated failover, lacks monitoring, or has a single point of failure is a future incident waiting to happen. Track reliability debt explicitly (as tech debt tickets) and allocate 20% of engineering capacity per quarter to reliability improvements, not just feature work."
