        answer: "Use a two-stage deployment: canary then rolling. Send 5% of traffic to the new version for 30 minutes while monitoring error rate and p99 latency. If metrics stay within SLO, roll out to 25%, then 100% over the next 2 hours. Kubernetes rolling deployments replace pods one at a time (maxUnavailable: 1, maxSurge: 1) so capacity stays constant. Automated rollback: if error rate spikes above 2% during rollout, the pipeline automatically reverts to the previous version."
        tradeoff: "Blue-green deployment (full parallel new stack, instant cutover) is safer — you can compare both versions side by side and switch DNS with zero downtime. But it requires double the infrastructure during deployment. Rolling deployment uses less capacity but has a window where both versions are running simultaneously."
        caveat: "Database schema migrations are the hardest part of safe deployment — a migration that adds a NOT NULL column without a default value breaks the old application version still running during a rolling deploy. Always make migrations backward-compatible: add nullable columns, deploy app, backfill, then add constraints."
        watch: "Dark launches (deploy code but keep it dormant behind a feature flag) decouple deployment from release. Deploy the new search ranking algorithm to all pods but only activate it for 1% of traffic via a flag — you can abort instantly without a deploy if the flag causes issues."
      - number: 128
        question: "How do systems test new features safely?"
        needed: "feature flags: dark launch, % rollout, instant kill switch without deploy"
        answer: "Store feature flags in a central config service (LaunchDarkly, AWS AppConfig, or a simple Redis hash). Each flag has: enabled (true/false), rollout_percentage (0–100), target_user_ids (for internal testing), and kill_switch (override to disable instantly). Read flags at request time and cache per service instance for 30 seconds. For dark launches, deploy code that's never executed (flag is 0%) so you can verify the deploy itself is safe before enabling the feature."
        tradeoff: "Centralized flag service (LaunchDarkly) offers real-time flag updates without any code deploy, targeting by user attributes, and rollout analytics. Self-hosted Redis flags are cheaper (~$0/mo vs ~$300/mo for LaunchDarkly) but require building rollout logic yourself. Use managed for user-facing features, Redis for system-level toggles."
        caveat: "Feature flags accumulate over time — stale flags from 2 years ago that are always true add dead code paths and slow down every request that evaluates them. Schedule flag removal as part of the feature launch process: flag goes to 100%, then remove in the next sprint."
        watch: "Flag evaluation order matters when flags are interdependent — if flag B only works when flag A is on, and you toggle them independently, you can create undefined states. Document flag dependencies and enforce them in the evaluation logic."
      - number: 129
        question: "How do systems isolate a failing service?"
        needed: "circuit breaker (Hystrix/Resilience4j): open on N failures, fast-fail during open state, half-open probe"
        answer: "Wrap every downstream service call with a circuit breaker: Closed state (normal operation), Open state (fail immediately without calling the dependency), Half-Open state (allow one probe request to test if the dependency recovered). Transition Closed→Open when failure rate exceeds 50% in a 10-second window with at least 20 requests. Stay Open for 30 seconds, then allow one probe. Transition Open→Closed if the probe succeeds; stay Open if it fails."
        tradeoff: "Circuit breakers prevent cascading failures but introduce complexity: fast-fail responses must return something sensible (cached data, empty list, default value). If the fallback is 'show error to user', the circuit breaker just converts a slow error into a fast one — you need a meaningful fallback for the breaker to add value."
        caveat: "Timeout configuration is critical for circuit breakers — if downstream calls have no timeout, they hold threads indefinitely and the failure rate calculation is meaningless (all calls are 'in flight'). Set aggressive timeouts (100–500ms for synchronous calls) so the circuit breaker gets clean failure signal."
        watch: "Circuit breaker state is per service instance — if you have 100 app servers, each has its own breaker state. A dependency that's partially degraded (affecting 20% of requests) may not open the breaker on any individual instance. Use a shared failure counter in Redis for global circuit breaker state across a fleet."
      - number: 130
        question: "How do systems retry failed requests safely?"
        needed: "retry only idempotent operations, exponential back-off + jitter, max retry budget, idempotency key"
        answer: "Retry only on transient failures (network timeout, 503, 429) — never on permanent failures (400, 401, 404). Use exponential back-off: first retry after 1s, second after 2s, third after 4s, up to a max of 30s. Add jitter (random ±50% of the back-off interval) to prevent retry storms where all clients retry at the same instant. Set a total retry budget (3 attempts max, or a total timeout of 10 seconds across all attempts)."
        tradeoff: "Retrying non-idempotent operations (POST /payment) can cause duplicate processing — an order placed twice charges the customer twice. Use idempotency keys (UUID generated by client, sent on every retry) so the server deduplicates. Without idempotency keys, only retry operations that are provably idempotent (GET, DELETE with guard)."
        caveat: "Retry amplification: if each layer in a call chain retries 3 times, a single user request can generate 3×3×3 = 27 downstream calls. This is a primary cause of thundering-herd cascades. Set retry budgets per layer and propagate deadlines via context so inner layers stop retrying once the outer timeout has expired."
        watch: "The Retry-After header in 429 responses tells clients exactly when to retry — ignoring it and using your own back-off is polite but wasteful. Parse and respect Retry-After headers from downstream services to avoid burning through retries too fast."
      - number: 131
        question: "How do systems store logs for debugging?"
        needed: "centralized logging: structured JSON logs → Kafka → Elasticsearch; retain 30 days, archive to S3"
        answer: "Emit structured JSON logs from every service: each line includes timestamp, service, level, trace_id, span_id, user_id (if applicable), and message. Ship logs via a log agent (Fluentd/Filebeat) to Kafka. A Logstash/Flink consumer parses, enriches (adds service version, AZ), and indexes to Elasticsearch. Retain in Elasticsearch for 30 days for active debugging, then archive to S3 in compressed Parquet format for 90-day compliance retention. Total cost: ~$0.50/GB/month in Elasticsearch, ~$0.02/GB in S3."
        tradeoff: "Hot logging (every request, every event) gives full debuggability but is expensive — a service at 100K RPS emitting 500 bytes per log generates 50MB/s = 4.3TB/day. Sample non-error logs at 1–10% to reduce volume; always log 100% of errors and warnings."
        caveat: "Never log PII (passwords, tokens, credit card numbers, SSNs) — even accidentally. Structured logging libraries make it easy to accidentally serialize request bodies that contain sensitive fields. Add field-level redaction at the log emission layer, not in the central pipeline."
        watch: "Log correlation across services requires trace_id propagation — if the trace_id is not passed in every internal HTTP header and message queue metadata, you can't join log lines across service boundaries to reconstruct a single request's journey."
        related_fundamentals: [messaging/kafka]
      - number: 132
        question: "How do systems trace requests across microservices?"
        needed: "distributed tracing: inject trace-id header at entry, propagate through calls, collect spans in Jaeger"
        answer: "At the API gateway, generate a trace_id (128-bit UUID) and a root span_id (64-bit) and inject them into the HTTP request headers (X-Trace-Id, X-Span-Id) per OpenTelemetry or B3 propagation spec. Each downstream service creates a child span (new span_id, parent_id = upstream span_id) and records start time, end time, service name, operation name, and tags (HTTP status, DB query). Ship spans to Jaeger or Zipkin. The trace viewer reconstructs the full call tree from span parent-child relationships."
        tradeoff: "Tracing every request at 100K RPS generates 100K spans/second — a Jaeger cluster needs ~50GB/day for 7-day retention. Sample at 1% for normal traffic, 100% for errors. Adaptive sampling (always trace slow requests > p99 latency) captures the most useful data without sampling overhead."
        caveat: "Trace propagation breaks across async boundaries — if service A publishes to Kafka and service B consumes it, the trace context must be embedded in the Kafka message headers, or the trace stops at the Kafka produce call and you lose visibility into async processing time."
        watch: "Database spans are often the most valuable — a single API call that makes 50 N+1 SQL queries is immediately visible in a trace but invisible in aggregate latency metrics. Instrument your ORM/DB client to create a span per query, including the full query text."
