# ─── Problems (System Design) ───
problems:
  - slug: url-shortener
    title: "URL Shortener"
    description: "Design TinyURL: hashing, base62, collision handling, analytics"
    path: problems/url-shortener
    uses:
      - fundamental: networking/load-balancing
        config: "ALB with round-robin"
        why: "Stateless API, no sticky sessions needed"
        not_this: "NLB — no HTTP path-based routing"
        risk: "Single AZ deployment = SPOF"
        caveats: "Cross-AZ charges $0.01/GB. Multi-AZ ALB adds ~$16/mo"
      - fundamental: networking/cdn/cloudfront
        config: "Edge caching for 301 redirects"
        why: "Redirects are highly cacheable, 80%+ cache hit rate"
        not_this: "Akamai — overkill for single-region MVP"
        risk: "Stale cache on URL updates, need invalidation API"
        caveats: "Invalidation limit: 3000/mo free, $0.005 each after"
      - fundamental: storage/redis
        config: "ElastiCache read-through, TTL 24h"
        why: "Hot URLs (top 20%) account for 80% reads"
        not_this: "Memcached — no persistence on node restart"
        risk: "Thundering herd on cache miss for viral URLs"
        caveats: "r6g.large = $0.126/hr = ~$92/mo. Monitor eviction rate."

  - slug: instagram
    title: "Instagram"
    description: "Design Instagram: photo/video feed, stories, likes, comments, explore, notifications"
    path: problems/instagram
    uses:
      - fundamental: networking/cdn/cloudfront
        config: "Edge caching for images/videos, S3 origin with OAC"
        why: "Media-heavy app — 80%+ traffic is image/video serving, CDN cuts latency to <50ms globally"
        not_this: "Self-hosted CDN — operational nightmare at Instagram scale"
        risk: "Cache invalidation on image deletion (GDPR compliance)"
        caveats: "CloudFront $0.085/GB first 10TB. At 1PB/mo = ~$40K/mo. Negotiate Enterprise Discount."
      - fundamental: networking/load-balancing
        config: "ALB with path-based routing: /api/* → app servers, /media/* → media service"
        why: "Different services for API vs media — ALB routes by path at L7"
        not_this: "NLB — need HTTP path routing for microservice split"
        risk: "Uneven load if /feed endpoint is 10x heavier than /profile"
        caveats: "ALB $0.0225/hr + $0.008/LCU-hr. At 50K RPS ~$200/mo."
      - fundamental: storage/redis
        config: "Feed cache per user (sorted set), session store, like counters"
        why: "Feed generation is expensive (fan-out-on-read). Cache assembled feeds in Redis sorted sets."
        not_this: "Memcached — need sorted sets for ranked feeds, persistence for sessions"
        risk: "Celebrity post = millions of fan-out writes. Use hybrid fan-out."
        caveats: "r6g.xlarge cluster = ~$370/mo. Feed cache TTL 5min. Eviction: allkeys-lru."
      - fundamental: storage/dynamodb
        config: "Posts table (PK=user_id, SK=timestamp), Likes counter (atomic increment)"
        why: "Write-heavy for likes/comments. DynamoDB handles 10K+ WPS per partition."
        not_this: "Postgres — write amplification at scale, connection pool exhaustion"
        risk: "Hot partition on celebrity posts — use write sharding (user_id#shard)"
        caveats: "On-demand $1.25/M writes, $0.25/M reads. At 100K WPS = ~$10K/mo."

  - slug: rate-limiter
    title: "Rate Limiter"
    description: "Design API rate limiting: token bucket, sliding window, distributed counters"
    path: problems/rate-limiter
    uses:
      - fundamental: storage/redis
        config: "Sorted set sliding window per user_id"
        why: "O(1) atomic ZADD+ZCOUNT, sub-ms latency"
        not_this: "DynamoDB — too slow for per-request check"
        risk: "Redis down = open or closed? Choose fail-open with local fallback"
        caveats: "ZRANGEBYSCORE cost: O(log N + M). Cleanup old entries with ZREMRANGEBYSCORE."
      - fundamental: networking/load-balancing
        config: "ALB with sticky sessions (rate state is per-node)"
        why: "Local counter consistency before Redis sync"
        not_this: "Round-robin — splits user requests across nodes, breaks local counters"
        risk: "Sticky session + node failure = temporary over-limit"
        caveats: "Sticky sessions via ALB cookie, not IP. Duration: 1 day."

# ─── Fundamentals (hierarchical) ───
fundamentals:
  - slug: networking/load-balancing
    title: "Load Balancing"
    description: "ALB vs NLB, routing algorithms, health checks, AZ distribution"
    path: fundamentals/networking/load-balancing
    children:
      - slug: networking/load-balancing/alb
        title: "Application Load Balancer (ALB)"
        description: "Layer 7, path-based routing, WebSocket support, gRPC, WAF integration"
        path: fundamentals/networking/load-balancing/alb
      - slug: networking/load-balancing/nlb
        title: "Network Load Balancer (NLB)"
        description: "Layer 4, static IP, ultra-low latency, TCP/UDP passthrough"
        path: fundamentals/networking/load-balancing/nlb

  - slug: networking/cdn
    title: "CDN"
    description: "Edge caching, Points of Presence, invalidation strategies, origin shield"
    path: fundamentals/networking/cdn
    children:
      - slug: networking/cdn/cloudfront
        title: "CloudFront"
        description: "AWS CDN: Lambda@Edge, Origin Access Identity, geo restrictions, signed URLs"
        path: fundamentals/networking/cdn/cloudfront

  - slug: storage/redis
    title: "Redis / ElastiCache"
    description: "Caching strategies, data structures, clustering, persistence, pub/sub"
    path: fundamentals/storage/redis

  - slug: storage/dynamodb
    title: "DynamoDB"
    description: "Single-table design, GSI/LSI, TTL, streams, on-demand vs provisioned"
    path: fundamentals/storage/dynamodb

# ─── Algorithms (with LLD implementations) ───
algorithms:
  - slug: base62-encoding
    title: "Base62 Encoding"
    description: "Convert numeric IDs to short alphanumeric strings (a-z, A-Z, 0-9)"
    path: algorithms/base62-encoding
    used_in: [url-shortener]

  - slug: consistent-hashing
    title: "Consistent Hashing"
    description: "Distribute data across nodes with minimal reshuffling on add/remove"
    path: algorithms/consistent-hashing
    used_in: [url-shortener, instagram]

  - slug: token-bucket
    title: "Token Bucket"
    description: "Rate limiting algorithm that allows bursts while enforcing average rate"
    path: algorithms/token-bucket
    used_in: [rate-limiter]

  - slug: bloom-filter
    title: "Bloom Filter"
    description: "Space-efficient probabilistic set membership test (no false negatives)"
    path: algorithms/bloom-filter
    used_in: [url-shortener, instagram]

  - slug: snowflake-id
    title: "Snowflake ID"
    description: "Distributed unique ID generation — time-sorted, no coordination"
    path: algorithms/snowflake-id
    used_in: [url-shortener, instagram]

# ─── Design Patterns (for LLM) ───
patterns:
  - slug: rag
    title: "RAG"
    description: "Retrieval-Augmented Generation — ground LLM responses in retrieved documents"
    path: patterns/rag

  - slug: agent-tools
    title: "Agent + Tool Use"
    description: "LLM agents that call external tools/APIs to accomplish multi-step tasks"
    path: patterns/agent-tools

  - slug: prompt-chaining
    title: "Prompt Chaining"
    description: "Break complex tasks into sequential LLM calls, each building on the previous"
    path: patterns/prompt-chaining

  - slug: guardrails
    title: "Guardrails"
    description: "Input/output validation, content filtering, and safety layers for LLM apps"
    path: patterns/guardrails

  - slug: embeddings-vector-search
    title: "Embeddings + Vector Search"
    description: "Convert text to vectors for semantic similarity search and retrieval"
    path: patterns/embeddings-vector-search

# ─── Concepts (cross-cutting knowledge index) ───
# Concepts are granular topics that appear across problems, fundamentals,
# algorithms, and patterns. Each concept links to where it's discussed,
# with section-level granularity.
concepts:
  - category: "Caching"
    concepts:
      - slug: multi-layer-caching
        title: "Multi-Layer Caching"
        description: "Browser → CDN → regional cache → database: stacking cache layers for compound hit rates"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Caching Deep Dive", phase: 6}
          - {type: problem, slug: instagram, section: "Growing — Caching & Feed", phase: 5}
          - {type: fundamental, slug: storage/redis, section: "Caching Strategies", phase: 2}
          - {type: fundamental, slug: networking/cdn/cloudfront, section: "Edge Caching", phase: 2}

      - slug: cache-invalidation
        title: "Cache Invalidation"
        description: "TTL expiry, event-driven purge, stale-while-revalidate, thundering herd prevention"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Caching Deep Dive", phase: 6}
          - {type: problem, slug: instagram, section: "Growing — Caching & Feed", phase: 5}
          - {type: fundamental, slug: networking/cdn, section: "Invalidation Strategies", phase: 4}
          - {type: fundamental, slug: storage/redis, section: "Eviction Policies", phase: 4}

      - slug: read-through-vs-write-through
        title: "Read-Through vs Write-Through Cache"
        description: "Populate cache on read miss vs populate on write — trade-offs for hot/cold data"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Caching Deep Dive", phase: 6}
          - {type: fundamental, slug: storage/redis, section: "Caching Strategies", phase: 2}

  - category: "Data Distribution"
    concepts:
      - slug: database-sharding
        title: "Database Sharding"
        description: "Range-based, hash-based, consistent hashing — partitioning data across nodes"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Scaling & Sharding", phase: 7}
          - {type: problem, slug: instagram, section: "Sharding & Partitioning", phase: 8}
          - {type: algorithm, slug: consistent-hashing, section: "Ring-Based Distribution", phase: 2}
          - {type: fundamental, slug: storage/dynamodb, section: "Partition Key Design", phase: 3}

      - slug: hot-partition
        title: "Hot Partition / Hot Key"
        description: "Single key receiving disproportionate traffic — detection and mitigation strategies"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Scaling & Sharding", phase: 7}
          - {type: problem, slug: instagram, section: "Bottlenecks & Trade-offs", phase: 11}
          - {type: fundamental, slug: storage/dynamodb, section: "Adaptive Capacity", phase: 4}
          - {type: fundamental, slug: storage/redis, section: "Cluster Mode", phase: 5}

      - slug: replication
        title: "Replication"
        description: "Leader-follower, multi-region, conflict resolution, replication lag"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Availability & Reliability", phase: 8}
          - {type: problem, slug: instagram, section: "Multi-Region", phase: 8}
          - {type: fundamental, slug: storage/dynamodb, section: "Global Tables", phase: 5}
          - {type: fundamental, slug: storage/redis, section: "Replication", phase: 3}

  - category: "Feed & Fanout"
    concepts:
      - slug: fanout-patterns
        title: "Fan-out-on-Write vs Fan-out-on-Read"
        description: "Pre-compute feeds on post vs assemble feeds on request — hybrid approach for celebrities"
        appears_in:
          - {type: problem, slug: instagram, section: "Growing — Caching & Feed", phase: 5}

      - slug: feed-ranking
        title: "Feed Ranking Algorithms"
        description: "Chronological vs ML-ranked feeds, engagement scoring, diversity injection"
        appears_in:
          - {type: problem, slug: instagram, section: "Growing — Caching & Feed", phase: 5}

      - slug: celebrity-problem
        title: "Celebrity / Hot User Problem"
        description: "Users with millions of followers cause write amplification — threshold-based hybrid fanout"
        appears_in:
          - {type: problem, slug: instagram, section: "Growing — Caching & Feed", phase: 5}
          - {type: problem, slug: instagram, section: "Bottlenecks & Trade-offs", phase: 11}

  - category: "Rate Limiting"
    concepts:
      - slug: rate-limit-algorithms
        title: "Rate Limiting Algorithms"
        description: "Token bucket, sliding window, fixed window, leaky bucket — when to use each"
        appears_in:
          - {type: problem, slug: rate-limiter, section: "Algorithm Deep Dive", phase: 4}
          - {type: algorithm, slug: token-bucket, section: "Token Bucket Algorithm", phase: 1}

      - slug: distributed-rate-limiting
        title: "Distributed Rate Limiting"
        description: "Shared state across nodes, Redis atomic operations, local + global counters"
        appears_in:
          - {type: problem, slug: rate-limiter, section: "Distributed Rate Limiting", phase: 5}
          - {type: fundamental, slug: storage/redis, section: "Atomic Operations", phase: 3}

      - slug: fail-open-vs-closed
        title: "Fail-Open vs Fail-Closed"
        description: "What happens when rate limiter infrastructure is down — availability vs safety trade-off"
        appears_in:
          - {type: problem, slug: rate-limiter, section: "Requirements & Problem Scope", phase: 1}

  - category: "ID Generation"
    concepts:
      - slug: unique-id-generation
        title: "Distributed Unique ID Generation"
        description: "Snowflake, UUID, counter ranges, KGS — collision-free ID assignment"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Key Generation Deep Dive", phase: 4}
          - {type: problem, slug: instagram, section: "MVP Data Model", phase: 3}
          - {type: algorithm, slug: snowflake-id, section: "Snowflake ID", phase: 1}
          - {type: algorithm, slug: base62-encoding, section: "Base62 Encoding", phase: 1}

      - slug: collision-prevention
        title: "Collision Prevention"
        description: "Bloom filters, conditional writes, pre-generation — ensuring uniqueness at scale"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Key Generation Deep Dive", phase: 4}
          - {type: algorithm, slug: bloom-filter, section: "Bloom Filter", phase: 1}
          - {type: fundamental, slug: storage/dynamodb, section: "Conditional Writes", phase: 3}

  - category: "Availability & Resilience"
    concepts:
      - slug: multi-az-deployment
        title: "Multi-AZ Deployment"
        description: "Spread across availability zones for 99.99% uptime, AZ-aware load balancing"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Availability & Reliability", phase: 8}
          - {type: problem, slug: instagram, section: "Security & Content Moderation", phase: 9}
          - {type: fundamental, slug: networking/load-balancing, section: "AZ Distribution", phase: 3}

      - slug: circuit-breaker
        title: "Circuit Breaker Pattern"
        description: "Stop cascading failures by short-circuiting calls to degraded services"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Availability & Reliability", phase: 8}
          - {type: problem, slug: rate-limiter, section: "Trade-offs & Edge Cases", phase: 8}

      - slug: graceful-degradation
        title: "Graceful Degradation"
        description: "Reduce functionality under load — serve cached data, disable non-critical features"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Availability & Reliability", phase: 8}
          - {type: problem, slug: instagram, section: "Peak Hours", phase: 7}
          - {type: problem, slug: rate-limiter, section: "Trade-offs & Edge Cases", phase: 8}

  - category: "CAP & Consistency"
    concepts:
      - slug: cap-analysis
        title: "CAP Theorem Analysis"
        description: "AP vs CP trade-off, partition tolerance, eventual consistency windows"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Monitoring, Observability & Cost", phase: 11}
          - {type: problem, slug: instagram, section: "Multi-Region", phase: 8}

      - slug: eventual-consistency
        title: "Eventual Consistency"
        description: "Last-writer-wins, conflict resolution, replication lag tolerance"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Monitoring, Observability & Cost", phase: 11}
          - {type: problem, slug: instagram, section: "Multi-Region", phase: 8}
          - {type: fundamental, slug: storage/dynamodb, section: "Global Tables", phase: 5}

  - category: "Async Processing"
    concepts:
      - slug: async-pipelines
        title: "Async Event Pipelines"
        description: "Kinesis/Kafka/SQS for decoupling writes — batch processing, eventual delivery"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Analytics Deep Dive", phase: 10}
          - {type: problem, slug: instagram, section: "Microservices Split", phase: 6}
          - {type: problem, slug: rate-limiter, section: "Distributed Rate Limiting", phase: 5}

      - slug: event-driven-architecture
        title: "Event-Driven Architecture"
        description: "Producers/consumers, fan-out via topics, exactly-once vs at-least-once delivery"
        appears_in:
          - {type: problem, slug: instagram, section: "Microservices Split", phase: 6}

  - category: "Cost Optimization"
    concepts:
      - slug: cost-at-scale
        title: "Cost Analysis at Scale"
        description: "Per-component cost breakdown, managed vs self-hosted crossover points"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Monitoring, Observability & Cost", phase: 11}
          - {type: problem, slug: instagram, section: "Analytics & Monitoring", phase: 10}
          - {type: problem, slug: rate-limiter, section: "Cost Estimates", phase: 9}

      - slug: cdn-cost-optimization
        title: "CDN Cost Optimization"
        description: "PriceClass selection, compression, cache-control tuning, origin shield"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Monitoring, Observability & Cost", phase: 11}
          - {type: fundamental, slug: networking/cdn/cloudfront, section: "Cost Optimization", phase: 6}

  - category: "Security"
    concepts:
      - slug: abuse-prevention
        title: "Abuse Prevention"
        description: "Rate limiting, URL scanning, blocklists, reputation scoring"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Enhanced Security & Abuse Prevention", phase: 9}
          - {type: problem, slug: rate-limiter, section: "Requirements & Problem Scope", phase: 1}

      - slug: open-redirect
        title: "Open Redirect Vulnerability"
        description: "Phishing via shortener domains — preview pages, Safe Browsing, reporting"
        appears_in:
          - {type: problem, slug: url-shortener, section: "Enhanced Security & Abuse Prevention", phase: 9}
