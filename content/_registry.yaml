        question: "How do systems ensure financial data consistency?"
        needed: "ACID transactions for ledger writes, two-phase commit across services if needed, saga pattern"
        answer: "Use ACID transactions within a single DB for all ledger writes — charge, fee, and balance update in one atomic transaction. Across services, use the Saga pattern: each service completes its local transaction and publishes an event. Compensating transactions roll back if a later step fails. For inter-service money movement, a two-phase commit via an orchestrator is an alternative but adds latency and coupling."
        tradeoff: "2PC (two-phase commit) guarantees strong consistency across services but requires a coordinator, blocks on failures, and is hard to implement correctly. Sagas offer eventual consistency but require compensating transactions for every step — more code, more testing."
        caveat: "BASE (eventually consistent) databases (DynamoDB, Cassandra) are unsuitable for financial ledgers that require strong consistency. Ledger tables should always run on ACID-compliant databases (PostgreSQL, MySQL) with synchronous replication."
        watch: "The trickiest consistency problem is between the ledger DB and the Kafka event bus — a payment succeeds in the DB but the Kafka publish fails. Use the transactional outbox pattern: write the event to an outbox table in the same DB transaction, then a CDC (Change Data Capture) process publishes it to Kafka."

