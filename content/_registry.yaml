      - number: 123
        question: "How do systems avoid a single point of failure?"
        needed: "redundancy at every layer: multi-AZ deployment, DB replicas, stateless services behind LB"
        answer: "Eliminate SPOFs at every layer: stateless app servers behind a load balancer (N+1 redundancy, any server can be removed), RDS Multi-AZ for the primary DB (synchronous replica in a second AZ, automatic failover in 60–120 seconds), Redis cluster with multiple primaries and replicas, and multi-AZ NAT gateways. For critical paths, deploy active-active across 2 AZs so traffic is always running on both — failover is instant because capacity already exists."
        tradeoff: "Multi-AZ adds ~10% to infrastructure cost (you pay for the standby). Active-active doubles the capacity cost but eliminates failover latency. Active-passive has a 60–120 second failover window — acceptable for databases, too long for stateless API layers."
        caveat: "Multi-AZ doesn't help with regional outages — an AWS us-east-1 region-wide event takes down all AZs simultaneously. For critical applications, multi-region with DNS failover is required. But multi-region adds significant complexity (data replication, CAP tradeoffs)."
        watch: "Shared infrastructure is a hidden SPOF — if your app servers in AZ-A and AZ-B both depend on a single Elasticache cluster in AZ-A, you have a cross-AZ SPOF. Map your full dependency graph and ensure every dependency is also redundant."
        related_fundamentals: [networking/load-balancing]
      - number: 124
        question: "How do systems monitor health of services?"
        needed: "metrics (Prometheus), logs (ELK), traces (Jaeger/Zipkin), health-check endpoints, dashboards"
        answer: "Instrument three pillars: (1) Metrics (Prometheus + Grafana): expose /metrics endpoint from every service with RED metrics (Rate, Errors, Duration) and USE metrics (Utilization, Saturation, Errors) for each resource. (2) Logs: structured JSON logs → Kafka → Elasticsearch (ELK stack); include trace_id on every log line. (3) Traces: inject trace ID at API gateway, propagate via headers, record spans in Jaeger for critical paths. Synthetic health checks (ping every 30 seconds from an external monitor) cover the case where all three pillars are down."
        tradeoff: "Metrics are cheap to store and fast to query but lack context for debugging. Logs provide context but are expensive at high volume ($0.50–$3/GB in managed ELK). Traces are the most expensive (sampling helps) but essential for diagnosing latency in distributed systems. Start with metrics, add logs, add traces for the critical path."
        caveat: "Monitoring infrastructure is itself a SPOF — if PagerDuty is down, you won't get paged when your service is down. Run a separate 'watchdog' monitor that checks whether your monitoring system is healthy, using a different provider."
        watch: "Alert fatigue: too many alerts (> 5/day) that engineers learn to ignore. Each alert must be actionable (you know what to do when it fires) and urgent (it requires immediate human response). Move non-urgent signals to dashboards rather than pages."
      - number: 125
        question: "How do systems detect outages quickly?"
        needed: "alerting on p99 latency, error rate > threshold, heartbeat checks with PagerDuty escalation"
        answer: "Alert on the four golden signals: (1) Latency: p99 > SLA threshold (e.g., > 500ms for APIs) for > 2 minutes. (2) Error rate: HTTP 5xx > 1% of requests for > 1 minute. (3) Traffic: RPS drop > 30% from baseline for > 2 minutes (indicates silent failure). (4) Saturation: CPU > 85%, DB connections > 90% of pool, or disk > 80% full. Route pages to PagerDuty with on-call escalation: 5 minutes before escalating to secondary, 15 minutes before escalating to manager."
        tradeoff: "Alert on symptoms (high error rate, high latency) rather than causes (high CPU, low disk) — causes don't always impact users, and symptoms are what matters. An SRE team should own alert hygiene: review alerts quarterly and remove any that fired without requiring action."
        caveat: "External black-box monitoring (synthetic check hitting your login endpoint every 30 seconds from 3 regions) catches outages that internal monitoring misses — if your metrics pipeline itself is down, you still get an alert from the external check."
        watch: "The most dangerous outages are partial: 10% of requests failing silently, or one AZ degraded while the others are healthy. Overall error rate looks fine but a subset of users is affected. Always split alerts by AZ, region, and customer segment."
      - number: 126
        question: "How do systems restart failed services automatically?"
        needed: "orchestration (Kubernetes): liveness probes trigger container restart, pod rescheduling on node failure"
        answer: "Kubernetes uses two probes per pod: liveness probe (HTTP GET /healthz every 10s; 3 consecutive failures = restart the container) and readiness probe (HTTP GET /ready every 5s; failure = remove from load balancer without restarting). On node failure, the kubelet reports NotReady, and the node controller schedules replacement pods on healthy nodes after a 5-minute grace period. ReplicaSets ensure the desired pod count is maintained."
        tradeoff: "Aggressive liveness probes (short failure threshold) cause restart loops if the service is slow to start up under load — a pod under GC pressure fails the probe and gets killed, triggering more load on remaining pods. Tune liveness probe thresholds conservatively; use readiness probes (not liveness) for temporary unreadiness."
        caveat: "Container restarts don't fix the underlying problem — if a service crashes due to an OOM kill (out of memory), Kubernetes restarts it and it crashes again. Set proper memory limits and requests, and monitor OOMKill events to identify memory leaks."
        watch: "CrashLoopBackOff: Kubernetes doubles the restart delay after each crash (1s, 2s, 4s, up to 5 minutes). A service in CrashLoopBackOff is functionally down for extended periods. Alert on CrashLoopBackOff events and treat them as incidents, not self-healing."
      - number: 127
