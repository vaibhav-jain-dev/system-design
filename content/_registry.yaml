          </svg>
        answer: "OIDC is preferred for modern SSO: the Identity Provider (IdP) issues ID tokens after authentication. Service Providers (SPs) redirect users to the IdP, which authenticates them once and returns a signed token. Each SP validates the token signature using the IdP's public keys (JWKS endpoint). Session lifetime is governed by the IdP — logout at the IdP propagates to all SPs via back-channel logout."
        tradeoff: "SAML 2.0 is XML-based, enterprise-standard, and widely supported by older IdPs (Okta, ADFS) but verbose and harder to implement. OIDC is JSON/JWT-based, simpler, and better for SPAs and mobile apps. If your enterprise customers use ADFS, you need SAML support."
        caveat: "Back-channel logout in OIDC is often not implemented by SPs — when a user logs out at the IdP, sessions at individual SPs stay alive until expiry. This is a major SSO security gap. Implement back-channel logout webhooks."
        watch: "SSO session duration is separate from SP session duration — an OIDC ID token might be valid for 1 hour but your SP session lasts 8 hours. Enforce re-authentication at the IdP for sensitive operations regardless of SP session status."
      - number: 14
        question: "How do systems detect fake accounts?"
        needed: "behavior analysis (typing speed, navigation patterns), email domain reputation, ML model"
        answer: "Multi-signal approach: email domain reputation (disposable email services like mailinator.com are blocked), phone number validation (VoIP numbers flagged), typing pattern analysis (bots type at inhuman speed or perfectly consistent rhythm), and behavioral signals (no mouse movement before form submission). Run these through an ML risk model that scores the signup 0–100."
        tradeoff: "Hard blocking on signals causes false positives — legitimate users with VoIP numbers or fast typing get rejected. Score and gate instead: low-risk signup proceeds, medium-risk requires phone verification, high-risk requires human review."
        caveat: "Disposable email blocklists need constant updates — new domains appear daily. Email deliverability check (SMTP verification of the mailbox) is more reliable but adds 200–500ms latency per signup."
        watch: "Bots that purchase high-quality residential proxies and use browser automation frameworks (Playwright) defeat IP and user-agent signals — behavioral biometrics (mouse micro-movements, keystroke dynamics) are harder to fake at scale."
      - number: 15
        question: "How do you prevent email verification abuse?"
        needed: "rate limiting on verification sends per IP/account, token expiry, resend throttle"
        answer: "Rate limit verification email sends: max 3 sends per email address per hour, max 10 per IP per hour. Use exponential back-off on the resend button (1 min → 5 min → 15 min). Tokens expire after 15 minutes. Store send count in Redis with 1-hour TTL. Unverified accounts older than 24 hours are purged by a background job."
        tradeoff: "Stricter rate limits reduce spam abuse but also hurt legitimate users on flaky email providers who need multiple resends. Per-account limits (not just per-IP) are critical since attackers often control valid email addresses."
        caveat: "Don't expose the rate limit threshold in error messages — 'you've sent 3 emails in the last hour' tells attackers exactly how to stay under the limit. Return a generic 'try again later' message."
        watch: "Verification email flooding is a DoS against users — an attacker enters a victim's email and repeatedly triggers verification sends, filling their inbox. The per-email-address rate limit (not just per-IP) is what stops this."
        related_problems: [rate-limiter]
      - number: 16
        question: "How do you manage user profile updates safely?"
        needed: "validation + server-side sanitization, optimistic locking for concurrent updates, audit log"
        answer: "Validate all fields server-side (not just client-side): email format, name length limits, no script tags in display name. Use optimistic locking — include an updated_at or version field in the update request; reject if the DB version doesn't match (someone else updated concurrently). Write every change to an audit log with old_value, new_value, timestamp, and user_id."
        tradeoff: "Pessimistic locking (row-level DB lock during update) prevents concurrent conflicts but serializes writes — terrible for high-concurrency profile update endpoints. Optimistic locking scales better; conflicts are rare in practice for profile updates."
        caveat: "Never trust client-submitted user IDs — always derive the user being updated from the authenticated session, not from a request body parameter. A missing check here is a classic IDOR (Insecure Direct Object Reference) vulnerability."
        watch: "Email changes are especially sensitive — require re-verification of the new email before activating it, and notify the old email address that a change was made, giving the real user a chance to recover."
      - number: 17
        question: "How do you ensure username uniqueness?"
        needed: "unique database constraint, case-insensitive comparison, reserve on intent before commit"
        answer: "Store usernames normalized to lowercase (or use citext column in PostgreSQL) and add a unique index. For two-step signup flows, reserve the username in a pending_usernames table when the user picks it, then promote to the users table on completion. Set a 30-minute TTL on reservations so abandoned signups release the name."
        tradeoff: "Case-insensitive unique constraints (citext) prevent 'admin' vs 'Admin' conflicts. Unicode normalization is also needed — 'café' and 'café' can look identical but have different byte sequences (precomposed vs decomposed accents)."
        caveat: "Don't check uniqueness at application layer with SELECT then INSERT — concurrent requests both see the name as available and both attempt INSERT. Only the DB unique constraint is race-condition-safe."
        watch: "Reserve a block of usernames that look like admin/system usernames ('support', 'admin', 'root', 'help') to prevent impersonation attacks before you enforce it via policy."
      - number: 18
        question: "How do you handle account deletion?"
        needed: "soft delete with retention window (30 days), async PII cleanup job, GDPR compliance"
        answer: "Mark the account deleted_at instead of physically deleting the row — this retains the unique constraint on email/username, preserves foreign key integrity (posts, payments), and allows recovery within 30 days. After 30 days, an async job anonymizes PII: null out name/email, replace with a pseudonymous ID. For GDPR, respond to erasure requests within 30 days."
        tradeoff: "Physical deletion is simpler but cascades across many tables (posts, comments, payments) and can break audit logs. Soft delete + anonymization preserves referential integrity and audit trails while still complying with right-to-erasure."
        caveat: "Don't delete financial transaction records even on account deletion — regulatory compliance (SOX, PCI-DSS) requires retaining payment history for 7 years. Anonymize the PII in the record, but keep the transaction itself."
        watch: "After soft deletion, the email is still 'taken' — a user who regrets deleting can't re-register with the same email until you release it. Either release the email immediately on deletion or on recovery expiry."
      - number: 19
        question: "How do systems restore deleted accounts?"
        needed: "soft delete flag + deletion timestamp, re-activation within retention period, audit trail"
        answer: "During the 30-day retention window, reactivation is a single update: clear deleted_at, restore active status. The user must authenticate with their original credentials (or a verification email), confirming they own the account. Log the restoration event with timestamp and IP. After 30 days, PII has been purged — full restoration is impossible; only a fresh account creation is possible."
        tradeoff: "Longer retention windows (90 days) are user-friendly but hold PII longer than needed. Shorter windows (7 days) reduce PII exposure but frustrate users who regret deletion after a week. 30 days is the GDPR-compliant balance."
        caveat: "Reactivating an account must also restore all linked data (posts, follows, orders) that was soft-deleted in the same transaction. Partial restoration — where the account is active but posts are gone — is confusing and hard to debug."
        watch: "If an account was deleted due to ToS violation, the restoration path must check with your trust-and-safety system before reactivating — don't let banned users restore accounts through the normal deletion-recovery flow."
      - number: 20
        question: "How do platforms block banned users from returning?"
        needed: "device fingerprinting, IP monitoring, email domain block, shadow-ban for detection"
        answer: "Build a multi-signal ban evasion detection system: fingerprint devices (browser fingerprint, iOS IDFV, Android GAID), hash and store on ban. On new signups, check against the blocked fingerprint list. Block email domains that were associated with multiple banned accounts. IP monitoring flags new accounts from IPs used by banned users."
        tradeoff: "Hard blocking on device fingerprint causes false positives (shared devices, factory reset reinstalls). Shadow banning (account appears functional to the user but content is hidden from others) is more effective — the banned user doesn't know they're banned and can't as easily identify what signal to evade."
        caveat: "Device fingerprints are not stable — users clear cookies, factory reset phones, or change browsers. Never rely on a single signal; require multiple signals to match before flagging. Fingerprint matching should raise risk score, not auto-ban."
        watch: "The most effective signal is behavioral — banned users who return often exhibit the same patterns (same posting rhythm, same content style, same targets) that got them banned. ML behavioral fingerprinting catches evasion that device signals miss."

