        answer: "Each client maintains a persistent WebSocket connection to a message server. When user A sends a message to user B, the message server looks up which server B is connected to (via a Redis hash: user_id → server_id), then forwards the message to that server via an internal pub/sub channel (Redis pub/sub or Kafka topic per server). That server pushes the message to B's open WebSocket connection."
        tradeoff: "Long polling is a simpler fallback (no WebSocket infrastructure) but adds 1–3s latency per message and higher server load (HTTP overhead per poll). SSE (Server-Sent Events) is one-way only — works for notifications but not bidirectional chat. WebSockets are the right choice for real-time bidirectional messaging."
        caveat: "WebSocket connections are stateful — load balancers must use sticky sessions (or consistent hashing by user_id) so reconnects land on the same server. If a server crashes, all its users must re-establish connections and sync missed messages."
        watch: "WebSocket connections consume a file descriptor per connection — Linux's default limit is 1024, but it can be tuned to 1M+ per server with ulimit. Each server handles ~100K concurrent connections comfortably with async I/O (Node.js/Go)."
        related_problems: [chat-system]
      - number: 62
        question: "How do systems guarantee message delivery?"
        needed: "persistent message queue, client acknowledgment, retry on missing ack, at-least-once delivery"
        answer: "Store every message in persistent storage (Cassandra/DynamoDB) before delivery attempt. After pushing the message to the recipient's WebSocket, wait for a client ACK (sent back on the same WebSocket). If no ACK within 5 seconds, retry up to 3 times. On reconnect, the client sends its last_seen_message_id; the server sends all messages since that ID."
        tradeoff: "Exactly-once delivery is theoretically impossible across unreliable networks. At-least-once delivery (with client-side deduplication) is the practical solution. The client deduplicates by message UUID, so retried messages don't appear twice in the UI."
        caveat: "Don't deliver messages from the transient WebSocket buffer only — if the server restarts before the client ACKs, those messages are lost. Persistence to the DB must happen before the delivery attempt, not after the ACK."
        watch: "The 'last seen message_id' sync on reconnect must use a monotonically increasing ID (Snowflake ID or sequence number), not timestamps — two messages can have the same millisecond timestamp, causing one to be missed on sync."
        related_fundamentals: [messaging/kafka]
        related_problems: [chat-system]
      - number: 63
        question: "How do systems store chat history?"
        needed: "time-series store (Cassandra/DynamoDB) partitioned by conversation_id, sorted by timestamp"
        answer: "Use DynamoDB or Cassandra with partition key = conversation_id and sort key = message_id (Snowflake ID, time-ordered). This allows efficient range queries: 'get messages in conversation X from timestamp T onwards'. Message IDs are Snowflake IDs (timestamp-embedded) so sort order matches creation order. Retain last 90 days in hot storage; archive older messages to S3."
        tradeoff: "Relational DB (PostgreSQL) supports rich queries (search, reactions aggregation) but doesn't scale horizontally by conversation_id the way DynamoDB does. At 1B messages/day, DynamoDB's auto-sharding is critical. PostgreSQL needs manual sharding at that scale."
        caveat: "Partition on conversation_id, not user_id — a group chat has many participants, and partitioning by user_id means writing the same message N times (once per participant). Store each message once and query by conversation."
        watch: "DynamoDB sort keys must be globally unique within a partition — using timestamp as sort key alone causes collisions in active conversations (two messages in the same millisecond). Always use timestamp + sender_id + random suffix as a composite sort key."
        related_fundamentals: [storage/dynamodb]
        related_problems: [chat-system]
      - number: 64
        question: "How do systems handle offline users?"
        needed: "queue undelivered messages; on reconnect, sync from last seen message_id (cursor-based)"
        answer: "Mark users as offline in Redis when their WebSocket disconnects. Messages sent to offline users are stored normally in the persistent message store. Simultaneously, send a push notification (FCM/APNs) to their device. On reconnect, the client sends its last_seen_message_id, and the server fetches all newer messages via a range query on the messages table. No special queue needed — the messages table IS the queue."
        tradeoff: "Maintaining a separate 'undelivered messages' queue adds complexity without benefit — the persistent message store already holds all messages. Query it directly on reconnect with a cursor. A separate queue is only useful if the message store has no time-based query support."
        caveat: "Don't send push notifications immediately on WebSocket disconnect — users often have brief interruptions (switching WiFi, opening another app). Wait 3–5 seconds before marking offline and sending push, to avoid flooding users with push notifications for split-second disconnects."
        watch: "Large message backlogs on reconnect: a user offline for 24 hours in an active group chat may have 10K messages to sync. Page the sync in batches of 50 with cursor pagination — don't return 10K messages in one response."
        related_problems: [chat-system]
      - number: 65
        question: "How do systems avoid duplicate messages?"
        needed: "client-generated message UUID; server deduplicates on insert; server deduplicates on display"
        answer: "Client generates a UUID (client_message_id) before sending. Server checks if this UUID already exists before inserting: DB unique constraint on client_message_id, or Redis SET NX check. If the UUID exists, return the existing stored message instead of inserting a duplicate. Client also deduplicates on display using the same client_message_id — if it receives the same ID twice, it renders it only once."
        tradeoff: "Server-side deduplication via DB unique constraint is the reliable layer. Client-side deduplication is a UX optimization to prevent visible flicker when a message is delivered via both the WebSocket push and the reconnect sync simultaneously."
        caveat: "Client-generated UUIDs must be random (UUID v4), not sequential or time-based — sequential IDs from different clients can collide. A user re-sending after a perceived failure must reuse the same client_message_id, not generate a new one."
        watch: "Network retries create duplicates in two ways: client retries (sends the same message again after timeout) and server retries (server pushes the same message to the client twice). Both are solved by client_message_id deduplication — it's the universal dedup key."
        related_problems: [chat-system]
