        answer: "Create a refund record linked to the original transaction with its own state machine: initiated → gateway_call → settled (or failed). Call the gateway's refund API with the original transaction reference. On success, credit the user's ledger balance or wait for bank settlement (typically 5–10 business days). Emit a RefundInitiated event for downstream systems (email notification, analytics)."
        tradeoff: "Partial refunds (specific line items in an order) are more complex — track amount_refunded per transaction and validate that total refunds don't exceed the original charge. Full refund is simpler but less flexible."
        caveat: "Refunds can fail if the gateway no longer has the funds on hold (e.g., settlement already occurred and the merchant account is empty). Build a fallback for manual processing. Also, refund timing differs by card type: credit card refunds post in 3–5 days; debit can take up to 10."
        watch: "Refunds on cross-border transactions with FX conversion need a policy decision: refund at original FX rate (favors you on currency appreciation) or current rate (favors the customer). Document and enforce the policy consistently."
