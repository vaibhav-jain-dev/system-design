        question: "How do systems show trending videos?"
        needed: "sliding window view count in Redis sorted set, re-scored every 5 min, top-K exposed via API"
        answer: "Maintain a Redis sorted set where each video is a member and the score is a time-decayed view count: score = views_in_last_1h × decay_factor, where decay_factor decreases with age. Every 5 minutes, a job: 1) increments scores from new view events, 2) applies decay to all scores (multiply by 0.95 or subtract a fixed amount), 3) ZREMRANGEBYSCORE removes videos below threshold. The API serves the top-K (ZREVRANGE 0 49) in sub-ms."
        tradeoff: "Real-time trending (update score on every view event) is more accurate but Redis ZADD for every view event at 100K views/second is expensive. Batch trending (aggregate views in Redis counters, flush to sorted set every 5 minutes) reduces Redis ops significantly at the cost of 5-minute freshness lag."
        caveat: "Pure view count trending favors established channels — a new creator's video that gets 10K views in an hour (huge for them) is buried behind established creators with millions of views. Weight by relative growth rate (current views / historical average views) to surface breakout content."
        watch: "Trending must be filtered per region, language, and category — a Hindi-language video trending globally isn't relevant to English-speaking users. Maintain separate sorted sets per (region, language, category) combination. This multiplies Redis memory usage — use approximation (Bloom filter pre-filter + top-K sorted set) for long-tail combinations."
