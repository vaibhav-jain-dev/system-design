            <line x1="76" y1="88" x2="95" y2="88" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#q5a)"/>
            <rect x="97" y="74" width="90" height="28" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
            <text x="142" y="92" text-anchor="middle" font-size="10" fill="#5B21B6" font-family="system-ui,sans-serif">Hash + lookup</text>
            <line x1="187" y1="88" x2="206" y2="88" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#q5a)"/>
            <rect x="208" y="74" width="90" height="28" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
            <text x="253" y="92" text-anchor="middle" font-size="10" fill="#92400E" font-family="system-ui,sans-serif">Expiry check</text>
            <line x1="298" y1="88" x2="317" y2="88" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#q5a)"/>
            <rect x="319" y="74" width="90" height="28" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
            <text x="364" y="88" text-anchor="middle" font-size="10" fill="#065F46" font-family="system-ui,sans-serif">Delete token</text>
            <line x1="409" y1="88" x2="428" y2="88" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#q5a)"/>
            <rect x="430" y="74" width="90" height="28" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
            <text x="475" y="88" text-anchor="middle" font-size="10" fill="#065F46" font-family="system-ui,sans-serif">Update pw</text>
            <text x="528" y="92" font-size="9" fill="#059669" font-family="system-ui,sans-serif">+ revoke sessions</text>
          </svg>
        answer: "Generate a cryptographically random 32-byte token, store its hash (SHA-256) in the DB with a 15-minute expiry, and email the raw token to the verified address on file. On reset, hash the submitted token, look it up, verify it hasn't expired, then delete it and update the password. Delete all other active sessions on success."
        tradeoff: "Magic-link login (token = login without password) is simpler but riskier — email compromise = full account access. Password reset tokens are scoped to one action. SMS OTP is an alternative delivery channel but SMS is vulnerable to SIM-swapping."
        caveat: "Never put the token in a URL query param that gets logged by proxies and browser history. Store it as a path segment or POST body. Always invalidate all existing sessions after a successful password reset — otherwise a compromised session persists."
        watch: "Store only the hash of the token in the DB, not the raw token — if your DB is compromised, stored tokens can't be replayed to reset accounts."
      - number: 6
        question: "How do you support login across multiple devices?"
        needed: "long-lived refresh tokens per device, short-lived access tokens, revocation list"
        answer: "Issue one refresh token per device (stored in device-local secure storage), paired with a short-lived access token (15 min TTL). The refresh token is long-lived (90 days) but device-bound. Store all refresh tokens in Redis keyed by user_id, with the device ID as a sub-key. To revoke a specific device, delete that entry from Redis."
        tradeoff: "Storing sessions server-side (Redis) enables instant revocation but adds a Redis lookup on every token refresh. Fully stateless JWTs avoid Redis but can't be revoked until expiry — a stolen token is valid for up to 15 minutes."
        caveat: "Don't reuse the same refresh token across devices — if one device is compromised and you can't distinguish which one, you'd need to log out all devices. Device-bound tokens let you revoke surgically."
        watch: "Implement refresh token rotation: each use of a refresh token returns a new one and invalidates the old. If an old token is reused, it signals theft — immediately revoke all tokens for that user."
        related_fundamentals: [storage/redis]
      - number: 7
        question: "How do you detect suspicious logins?"
        needed: "device fingerprinting, geo-location anomaly detection, ML risk scoring"
        answer: "Fingerprint each login: IP geolocation, user-agent, timezone, screen resolution. On each login, compute a risk score based on: new device (never seen before for this user), new country, impossible travel (login from London then New York within 30 min), and time-of-day anomaly. Score above threshold triggers step-up auth (SMS OTP or email challenge)."
        tradeoff: "ML-based risk scoring is more accurate but requires training data and a model serving pipeline. Rule-based heuristics (impossible travel, new country) are simpler, lower latency (~1ms vs ~50ms for ML), and interpretable — start with rules, layer ML later."
        caveat: "Don't block on suspicion alone — that causes legitimate users to lose access. Require step-up authentication (MFA) instead. VPN and Tor users will always look 'foreign' — don't over-index on IP geolocation alone."
        watch: "Impossible travel detection: if login A is in Tokyo and login B is in New York 2 hours later, the user can't have physically traveled — flag it, but check for VPN usage before triggering a lockout."
      - number: 8
        question: "How do you implement two-factor authentication?"
        needed: "TOTP (RFC 6238) for authenticator apps; SMS OTP as fallback; hardware key (WebAuthn) as best"
        answer: "TOTP (RFC 6238) generates a 6-digit code from HMAC-SHA1 of the secret + current 30-second time window. The user scans a QR code encoding the base32 secret, then their app generates codes client-side. No network call needed at verify time — server recomputes the same HMAC and compares. Allow ±1 window for clock skew."
        tradeoff: "SMS OTP is weaker — SIM swapping attacks, SS7 vulnerabilities, and delayed delivery make it a fallback, not a primary factor. WebAuthn (hardware keys, Face ID, Touch ID) is strongest — phishing-resistant because the credential is bound to the origin domain."
        caveat: "Store the TOTP secret encrypted at rest — if your DB is compromised and secrets leak, attackers can generate valid codes. Also, never accept a TOTP code twice in the same window — replay the code within 30 seconds and it should be rejected."
        watch: "TOTP codes are valid for 30 seconds but you should accept ±1 window (90-second effective window) to handle clock drift — without this, users with slightly fast clocks get locked out consistently."
      - number: 9
        question: "How do you handle session expiration?"
        needed: "access token TTL (15 min), refresh token rotation, silent refresh in background"
        answer: "Access tokens expire in 15 minutes; the client silently refreshes them using a long-lived refresh token before expiry (e.g., refresh when 5 minutes remain). Refresh tokens rotate on each use — every refresh returns a new refresh token and invalidates the old one. Store refresh tokens in Redis with user_id → device_id → token mapping for revocation."
        tradeoff: "Longer access token TTL (e.g., 24h) reduces Redis round trips but means a stolen token is usable until expiry with no revocation path. Shorter TTL (5 min) is safer but causes more refresh calls — find the balance based on your security requirements."
        caveat: "Don't store JWTs in localStorage — XSS can steal them. Use HttpOnly cookies for refresh tokens and keep access tokens in memory (JS variable). The access token lives only in the running JS context, not persisted to disk."
        watch: "Silent refresh needs to handle the case where the refresh token is also expired — if the user's device was offline for 90 days, the refresh fails and you must redirect to login. Build this fallback into your client auth layer."
        related_fundamentals: [storage/redis]
      - number: 10
        question: "How do you allow users to log out from all devices?"
        needed: "server-side session invalidation list keyed by user ID, or version counter in token"
        answer: "The cleanest approach: store a session_version integer on the user record. Embed it in the JWT at issuance. On each request, verify the JWT's version matches the DB value. 'Log out all devices' increments session_version — all existing tokens immediately fail version check. This requires one DB lookup per request but is simple and instant."
        tradeoff: "Redis blocklist (storing invalidated JWIs) avoids the DB lookup but requires storage proportional to active tokens — thousands of tokens per user at scale adds up. Version counter is a single integer per user, far cheaper."
        caveat: "If you use the version counter approach, don't cache the user record too aggressively — a 5-minute cache means tokens remain valid for 5 minutes after logout. For 'log out all devices', users expect immediate effect."
        watch: "The version counter approach gives you log-out-all-devices for free and also serves as a kill switch for compromised accounts — increment the version and every token in the wild stops working within seconds."
        related_fundamentals: [storage/redis]
      - number: 11
        question: "How do systems support social login (Google, GitHub, etc.)?"
        needed: "OAuth 2.0 + OIDC: redirect to provider, exchange code for tokens, upsert local user"
        diagram_html: |
