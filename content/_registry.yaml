# ─── Quick Answer Categories (150 Q&A) ───
quick_categories:

  - slug: auth
    title: "Authentication & User Accounts"
    description: "Login, sessions, passwords, MFA, social auth, account lifecycle"
    number_range: "1–20"
    questions:
      - number: 1
        question: "How do you prevent duplicate user accounts?"
        needed: "email/phone uniqueness constraint, verification step, idempotent signup endpoint"
        answer: "Add a unique index on the email (or phone) column so the DB rejects duplicates at the constraint level. Require verification before the account is active — an unverified account can't log in, which also catches typos. Make the signup endpoint idempotent by returning the existing account if the email already exists and is unverified, rather than an error."
        tradeoff: "Case-sensitive unique constraints miss 'User@Example.com' vs 'user@example.com' — normalize to lowercase before storing. Phone-number dedup works the same way but needs E.164 normalization first."
        caveat: "Don't rely only on application-layer checks — a race between two concurrent signups will bypass them. The DB unique constraint is the only safe guard. Also, don't expose whether an email already exists in your error message — that leaks account enumeration."
        watch: "Soft-deleted accounts still hold the unique constraint slot — a re-registration attempt silently fails unless you release the constraint on deletion or use a deleted_at suffix trick like appending the user ID."
        related_fundamentals: [storage/dynamodb]
      - number: 2
        question: "How do you handle millions of simultaneous logins?"
        needed: "load balancer, stateless auth servers, cached sessions in Redis"
        diagram_html: |
          <svg viewBox="0 0 600 100" width="100%" style="max-height:100px" xmlns="http://www.w3.org/2000/svg">
