        not_this: "ClickHouse — better for metrics/time-series, not full-text search across arbitrary log fields"
        risk: "ES shard explosion — one index per day × 30 days × 10 services = 300 shards, degrades performance"
        caveats: "One index per service per day. ILM policy moves index to warm after 7 days, cold after 30."
        nfrs: [performance, scalability]
      - fundamental: storage/dynamodb
        config: "Metrics time-series table (PK=metric_name+host, SK=timestamp); alert rules config table"
        why: "Metrics are simple numeric time-series — DynamoDB TTL handles automatic retention cleanup"
        not_this: "Elasticsearch for metrics — overkill, high cost for numeric time-series data"
        risk: "DynamoDB hot partition on high-cardinality metric keys during peak traffic"
        caveats: "Write sharding: append random suffix to PK, query all shards and merge. Or use InfluxDB/Prometheus."
        nfrs: [scalability, durability]
      - fundamental: storage/s3
        config: "S3 for cold log archival: Parquet format, Athena for ad-hoc historical queries"
        why: "Cold logs (>90 days) cost $0.023/GB on S3 vs $0.10/GB on ES SSD — 4x cheaper"
        not_this: "Keep everything in Elasticsearch — ES hot storage at $0.10/GB × 1PB = $100K/mo"
        risk: "Athena query on 1PB S3: $5/TB scanned — partition by date and service to limit scan"
        caveats: "Parquet compression 10:1 over raw JSON. Partition S3 prefix: /logs/{service}/{date}/. Athena auto-discovers."
        nfrs: [cost, durability]

  - slug: recommendation-system
    title: "Recommendation System (YouTube / Netflix)"
    description: "Design a personalized recommendation engine: collaborative filtering, real-time signals, A/B testing"
    path: problems/recommendation-system
    category: distributed
    nfrs:
      - slug: scalability
        phases: [3, 5, 6, 7, 8]     # data model, architecture, ML pipeline, candidate generation, scaling
      - slug: performance
        phases: [2, 4, 6]           # API design, retrieval, real-time ranking
      - slug: availability
        phases: [5, 8, 9]           # architecture, failure modes, fallback
      - slug: consistency
        phases: [4, 7]              # feature freshness, model-serving consistency
      - slug: durability
        phases: [3, 5]              # data model, feature store
      - slug: cost
        phases: [6, 10, 11]         # ML serving cost, batching, monitoring
      - slug: observability
        phases: [10, 11]            # CTR metrics, A/B testing, monitoring
    functional_requirements:
      - slug: candidate-generation
        title: "Candidate Generation"
        phases: [6, 7]              # candidate retrieval, ML pipeline
      - slug: ranking
        title: "Ranking & Scoring"
        phases: [4, 6]              # real-time ranking, feature computation
      - slug: real-time-signals
        title: "Real-Time Signals"
        phases: [4, 5]              # signal ingestion, feature store
      - slug: ab-testing
        title: "A/B Testing"
        phases: [9, 10]             # experimentation, monitoring
    uses:
      - fundamental: storage/redis
        config: "Serving cache: pre-computed top-K recs per user (LRANGE, TTL=1h); real-time feature vectors"
        why: "Recommendation serving must be <100ms — pre-computing and caching candidates avoids live ML inference"
        not_this: "Live model inference per request — transformer models take 50-200ms, unacceptable for every page load"
        risk: "Cache miss for new users (cold start) — fallback to popularity-based recommendations"
        caveats: "Pre-compute recs hourly per user. Blend with real-time signals (last 5 clicks) at serve time."
        nfrs: [performance, availability]
      - fundamental: storage/elasticsearch
        config: "Item index for content-based retrieval: dense vector search (ANN) for embedding similarity"
        why: "Candidate generation via embedding ANN search — find 100 candidates from 100M items in <50ms"
        not_this: "Brute-force cosine similarity on 100M items — O(N) per query, 10 seconds per user request"
        risk: "ANN approximate results miss some relevant items — trade recall for latency (90% recall is acceptable)"
        caveats: "Elasticsearch kNN with HNSW index. Tune ef_search for recall vs latency. Pre-filter by user's country."
        nfrs: [performance, scalability]
      - fundamental: messaging/message-queues
        config: "Kafka for user event stream (clicks, watch time, skips); feature pipeline trigger"
        why: "Real-time signals (user just clicked video X) must update recommendations within minutes"
        not_this: "Batch signal processing — daily batch means new preferences take 24h to appear in recs"
        risk: "Kafka consumer lag during viral content — real-time signals delayed, recommendations lag behind trends"
        caveats: "Flink consumer on Kafka: compute sliding window features (clicks in last 1h, 24h). Write to feature store."
        nfrs: [scalability, durability]
      - fundamental: storage/dynamodb
        config: "User interaction history (PK=user_id, SK=timestamp#item_id); model serving metadata"
        why: "User history lookups are by user_id — DynamoDB single-partition query for all of a user's history"
        not_this: "Postgres for user history — 1B users × 10K interactions = 10T rows, join-heavy queries slow"
        risk: "User interaction table unbounded growth — TTL=90 days, archive older to S3 for offline training"
        caveats: "Limit stored interactions to last 10K per user. Older interactions have diminishing signal value."
        nfrs: [scalability, durability]
      - fundamental: distributed/cap-theorem
        config: "AP for recommendation serving (stale recs for 1h acceptable). CP for A/B experiment assignment."
        why: "Showing slightly stale recommendations is fine. Seeing different experiment variants inconsistently is not."
        not_this: "CP for recommendations — waiting for global consistency adds latency, recommendations degrade"
        risk: "AP A/B assignment causes user to switch experiment buckets — ruins statistical validity of experiment"
        caveats: "Sticky A/B assignment: hash(user_id + experiment_id) % 100. Same user always in same bucket."
        nfrs: [consistency, availability]

