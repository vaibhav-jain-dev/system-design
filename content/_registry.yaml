        question: "Q121-Q122: Design a product analytics system (like Mixpanel). Track user events, compute funnels (sign_up → add_to_cart → purchase), and show conversion rates within 5 minutes of events occurring."
        needed: "event ingestion via Kafka; ClickHouse for OLAP queries (columnar, handles GROUP BY at billions of rows); funnel query: ordered event sequence per user within time window; materialized views for precomputed funnels"
        answer: "Event ingestion: client SDK sends events to POST /events. Events batched (100 per request) and written to Kafka. Schema: {event_id UUID, user_id, session_id, event_type, properties JSON, timestamp}. ClickHouse as OLAP store: events table with ReplicatedMergeTree engine. Partitioned by toYYYYMM(timestamp). Order by (user_id, timestamp) — this colocates all events for a user on the same disk block for funnel queries. Funnel query: SELECT user_id, arrayJoin(steps_completed) FROM ( SELECT user_id, windowFunnel(86400)(timestamp, event_type = 'sign_up', event_type = 'add_to_cart', event_type = 'purchase') AS steps_completed FROM events WHERE timestamp > now() - 7 DAYS GROUP BY user_id ). ClickHouse's windowFunnel function handles ordered event sequences within a time window natively. 10B events, funnel query across 7 days: <5 seconds. Precomputed funnels (for dashboards): ClickHouse materialized view recomputes funnel stats hourly. Dashboard reads from materialized view (<100ms). Fresh data: event arrives → Kafka → ClickHouse insert (10s) → materialized view refresh (next hourly) → dashboard (within 1h). For 5-minute freshness: skip materialized views, run live funnel query on ClickHouse directly (<5s per query). Acceptable for on-demand funnel analysis."
        tradeoff: "ClickHouse vs. BigQuery/Redshift for funnel analytics: ClickHouse: self-hosted, sub-second queries at billions of rows, windowFunnel native function, $0 per query (only infrastructure cost). BigQuery: managed, $5/TB scanned, slower for funnel queries (no native windowFunnel), good for ad-hoc analysis. For a product analytics system with high query frequency (engineers running 50 funnel queries/day): ClickHouse's fixed infrastructure cost beats BigQuery's per-query cost at scale."
        caveat: "ClickHouse and concurrent writes: high-frequency inserts (Kafka consumer writing individual events) cause ClickHouse merge overhead. ClickHouse recommendation: batch inserts, minimum 1000 events per INSERT. Buffer table: INSERT into Buffer table → ClickHouse auto-flushes to main table every 60s or when buffer hits 1M rows. Consumers write to Buffer table (fast), main table is written in batches (efficient). Never INSERT one row at a time into ClickHouse."
        watch: "Cohort analysis follow-up: 'show me the 7-day retention for users who signed up in January 2024.' Cohort = users who fired 'sign_up' event in January. Retention day N = users who fired any event on day N after sign-up. ClickHouse query: JOIN events (sign_up) with events (any) on user_id, group by (sign_up_date, day_diff). windowFunnel doesn't help here — this is a self-join by user_id and date. ClickHouse handles self-joins on user_id efficiently when data is partitioned by user_id. Result: retention table (cohort × day) pre-cached in Redis, refreshed nightly."
