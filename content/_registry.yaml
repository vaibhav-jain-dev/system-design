        question: "How do systems track payment history efficiently?"
        needed: "append-only ledger table, indexed by user + timestamp, paginated cursor-based reads"
        answer: "Use an append-only ledger table: each row is an immutable financial event (charge, refund, fee) with amount, currency, type, user_id, and created_at. Never update or delete rows — corrections are new rows with negative amounts. Index on (user_id, created_at DESC) for efficient per-user history queries. Use cursor-based pagination (last seen created_at) for consistent paging on large histories."
        tradeoff: "Separate ledger table (double-entry bookkeeping: debit/credit sides) is more rigorous but complex. Single-entry append-only log is simpler and works for most consumer payment histories. Adopt double-entry when regulatory requirements demand it."
        caveat: "Offset-based pagination (LIMIT 50 OFFSET 500) on large ledger tables is slow — it reads 550 rows to return 50. Cursor-based pagination using the last row's ID or timestamp is O(log N) with an index."
        watch: "Ledger tables grow indefinitely — archive rows older than 2 years to cold storage and keep only a running balance snapshot in the hot table. This keeps query performance consistent as transaction volume grows."
      - number: 32
        question: "How do you prevent payment replay attacks?"
        needed: "nonce + timestamp in request signature; server rejects nonces seen within 5-minute window"
        answer: "Sign every payment API request with HMAC-SHA256 using: request body, timestamp (Unix epoch), and a random nonce. The server verifies the signature, then checks the timestamp is within ±5 minutes (rejects old requests), and checks the nonce hasn't been seen before (stored in Redis with 10-minute TTL). This prevents an intercepted valid request from being replayed."
        tradeoff: "Short replay windows (5 minutes) stop replay attacks but fail if the client's clock is skewed. Require clients to sync their clock (NTP) or accept ±10-minute windows with strict nonce tracking."
        caveat: "The nonce must be genuinely random — sequential nonces or timestamp-derived nonces don't prevent replay within the same second. Use a UUID or 128-bit random value."
        watch: "Webhook payloads from payment gateways are also vulnerable to replay — verify the gateway's HMAC signature (Stripe uses Stripe-Signature header) and reject payloads with a timestamp older than 5 minutes from the current time."
