        question: "How do systems manage configuration changes safely?"
        needed: "config service (AWS AppConfig/Consul): versioned configs, validation before apply, instant rollback"
        answer: "Store all non-secret configuration (feature flags, timeouts, rate limits, connection pool sizes) in AWS AppConfig or Consul. Changes are versioned — each update creates a new version, never mutating the current. Deploy config changes with a deployment strategy: linear (10% of hosts per minute) or all-at-once for emergency rollbacks. Validate configs before deployment: schema validation (required fields, types) and optional integration tests against a staging environment. Services poll for config changes every 30 seconds and hot-reload without restart."
        tradeoff: "Baking config into environment variables (12-factor app style) is simple but requires redeployment for every config change — a 5-minute deploy pipeline is a poor emergency response. Config services (AppConfig, Consul) enable live config updates in seconds but add a dependency: if the config service is unavailable at startup, services must handle the fallback to cached config."
        caveat: "Config changes that affect database connection pool sizes, thread counts, or JVM settings require a restart to take effect — you can't hot-reload these. Clearly distinguish between hot-reloadable config and restart-required config in your config schema, and handle them through different processes."
        watch: "Configuration drift: one node in a fleet picks up a new config version while others don't, resulting in inconsistent behavior. Always check the config version in your monitoring dashboards and alert on version divergence within a fleet."
