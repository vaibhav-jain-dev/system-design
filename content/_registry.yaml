        tradeoff: "No queue + horizontal scaling is simpler but requires provisioning for peak load (100K concurrent requests) for a 10-minute event — very expensive. A queue lets you serve the same demand with 1/10th the infrastructure."
        caveat: "The virtual waiting room is itself a target — don't let users hold queue positions without activity. Time out idle queue positions after 5 minutes and give them to the next user in line."
