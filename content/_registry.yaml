        question: "How do systems test disaster recovery plans?"
        needed: "chaos engineering (inject node/zone failures), game days (simulated incident drills), measure RTO/RPO"
        answer: "Three DR testing methods: (1) Chaos engineering: inject failures in production (Chaos Monkey kills random EC2 instances, Chaos Kong kills an entire AZ) and measure recovery time and user impact. Start in staging; graduate to production on off-peak hours. (2) Game days: scheduled 3-hour exercises where you inject a specific failure scenario (region outage, DB corruption) and measure time-to-recover against your RTO target. (3) Data restore tests: monthly restore of the previous night's backup to a staging environment, verify data integrity and restore time."
        tradeoff: "Chaos engineering in production is the most realistic DR test but carries real risk of user impact. Shadow chaos (replay production traffic on a parallel staging environment and inject failures there) provides realistic load without user impact, but staging environments are rarely identical to production."
        caveat: "DR tests reveal toil and manual steps in your runbooks — steps like 'promote the read replica' or 'update DNS' that each take 5 minutes add up. After each game day, measure time spent on each runbook step and automate anything that takes > 2 minutes."
        watch: "The most common finding in DR drills is that critical credentials, access keys, and runbooks are stored in systems that are unavailable during the outage — in the very service that's down. Store DR runbooks in a separate system (printed, external wiki, S3 bucket in the DR region) so you can access them when your primary tools are unavailable."
      - number: 150
        question: "How do systems ensure long-term reliability?"
        needed: "observability (metrics + logs + traces) + redundancy (multi-AZ, replicas) + runbooks + blameless post-mortems"
        answer: "Reliability is a practice, not a configuration. Four pillars: (1) Observability: full metrics/logs/traces coverage so you know what's broken and why within minutes. (2) Redundancy: multi-AZ, replicas, and circuit breakers so no single failure takes down the service. (3) Runbooks: documented procedures for every alert and every known failure mode, kept current and tested in game days. (4) Post-mortems: every SEV-1 and SEV-2 incident gets a blameless post-mortem within 5 business days — document timeline, root cause, contributing factors, and action items. Track action item completion."
        tradeoff: "SRE (Site Reliability Engineering) formalizes reliability work with error budgets: if the system is 99.9% available, you have a 43-minute monthly error budget. Spending the budget on planned maintenance and experiments is healthy. Burning it on incidents signals systemic reliability problems. Error budgets make reliability trade-offs explicit and quantifiable."
        caveat: "Blameless post-mortems are culturally hard — engineers feel implicated when their code caused an outage. Leadership must explicitly model blameless behavior: the goal is to learn and fix systems, not to assign fault. A culture where engineers fear post-mortems is one where incidents get under-reported."
        watch: "Reliability debt accumulates invisibly — every system that lacks automated failover, lacks monitoring, or has a single point of failure is a future incident waiting to happen. Track reliability debt explicitly (as tech debt tickets) and allocate 20% of engineering capacity per quarter to reliability improvements, not just feature work."

  - slug: qb-distributed-counters
    title: "Distributed Counters"
    description: "Write-path sharding, atomic counters, HyperLogLog, idempotency, flash-sale inventory"
    number_range: "Q001–Q005, Q101"
    questions:
      - number: 1
        question: "Design the write path for YouTube's video view counter. A video gets 500K views/min on upload. How do you accept all increments without hammering the DB?"
        needed: "in-memory counter shards (Redis) + periodic flush; write-behind: batch 1000 increments → single DB update; partition by video_id"
        diagram_html: |
          <svg viewBox="0 0 600 108" width="100%" style="max-height:108px" xmlns="http://www.w3.org/2000/svg">
            <defs><marker id="qb1a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#94A3B8" stroke-width="1.2"/></marker></defs>
            <text x="4" y="12" font-size="10" fill="#DC2626" font-family="system-ui,sans-serif" font-weight="600">500K views/min</text>
            <rect x="4" y="18" width="72" height="28" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
            <text x="40" y="36" text-anchor="middle" font-size="11" fill="#B91C1C" font-family="system-ui,sans-serif">View event</text>
            <line x1="76" y1="32" x2="108" y2="20" stroke="#94A3B8" stroke-width="1" marker-end="url(#qb1a)"/>
            <line x1="76" y1="32" x2="108" y2="32" stroke="#94A3B8" stroke-width="1" marker-end="url(#qb1a)"/>
            <line x1="76" y1="32" x2="108" y2="44" stroke="#94A3B8" stroke-width="1" marker-end="url(#qb1a)"/>
            <text x="78" y="13" font-size="9" fill="#64748B" font-family="system-ui,sans-serif">random shard</text>
            <rect x="110" y="8" width="90" height="18" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
            <text x="155" y="21" text-anchor="middle" font-size="9" fill="#92400E" font-family="system-ui,sans-serif">Redis shard:0 INCR</text>
            <rect x="110" y="30" width="90" height="18" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
            <text x="155" y="43" text-anchor="middle" font-size="9" fill="#92400E" font-family="system-ui,sans-serif">Redis shard:1 INCR</text>
            <rect x="110" y="52" width="90" height="18" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
            <text x="155" y="65" text-anchor="middle" font-size="9" fill="#92400E" font-family="system-ui,sans-serif">Redis shard:N INCR</text>
            <text x="110" y="86" font-size="9" fill="#64748B" font-family="system-ui,sans-serif">100 shards/video = 5K/min each ✓</text>
            <line x1="200" y1="36" x2="240" y2="58" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#qb1a)"/>
            <text x="200" y="54" font-size="9" fill="#064E3B" font-family="system-ui,sans-serif">flush every</text>
            <text x="200" y="65" font-size="9" fill="#064E3B" font-family="system-ui,sans-serif">5–30 sec</text>
            <rect x="242" y="44" width="110" height="36" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
            <text x="297" y="59" text-anchor="middle" font-size="10" fill="#5B21B6" font-family="system-ui,sans-serif" font-weight="600">Flusher job</text>
            <text x="297" y="73" text-anchor="middle" font-size="9" fill="#5B21B6" font-family="system-ui,sans-serif">MGET all shards → sum</text>
            <line x1="352" y1="62" x2="386" y2="62" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#qb1a)"/>
            <rect x="388" y="44" width="110" height="36" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
            <text x="443" y="59" text-anchor="middle" font-size="10" fill="#065F46" font-family="system-ui,sans-serif">DB: views +=</text>
            <text x="443" y="73" text-anchor="middle" font-size="9" fill="#065F46" font-family="system-ui,sans-serif">1 write/interval</text>
            <text x="504" y="59" font-size="9" fill="#64748B" font-family="system-ui,sans-serif">vs 500K/min</text>
            <text x="504" y="71" font-size="9" fill="#059669" font-family="system-ui,sans-serif">directly ✓</text>
          </svg>
        answer: "Shard the counter across 100 Redis keys per video: 'views:{id}:shard:{0-99}'. Each increment picks a random shard with INCR. A background flusher runs every 5–30s, sums all shards via MGET, and issues a single atomic DB increment: UPDATE SET views = views + delta. At 500K views/min across 100 shards, each shard handles 5K writes/min — well within Redis's 100K ops/sec limit. Single DB write per flush interval instead of 500K individual writes."
        tradeoff: "Write-through (DB on every view) = 500K DB writes/min. At 5ms each = 41K req/s to DB — unsustainable. Redis INCR handles 100K ops/sec per node. Flush interval tradeoff: 5s = max 41K views lost on crash; 30s = max 250K lost. For YouTube, 250K lost views is acceptable. For ad impression billing, use Redis AOF fsync every 1s to limit loss to 1 second of data."
        caveat: "Don't use a single Redis key per video — at 500K writes/min it becomes a hotspot. Redis is single-threaded per slot; a single key maxes at ~100K ops/sec. Don't flush on every view event — flush in batches on a timer. Also don't use SET (overwrite) on flush; use atomic ADD to avoid overwriting concurrent increments from other flusher instances."
        watch: "Follow-up on buffer size vs. data loss: if Redis crashes with 30s buffer, you lose 30s × 500K = 250K views. For billing systems, this is unacceptable — use Redis persistence (AOF) or a durable write-ahead log (Kafka) as the primary counter source, with Redis as a fast cache layer. Flush interval is a business risk decision, not a technical one."
        related_fundamentals: [storage/redis]

      - number: 2
        question: "Design the merge strategy for Hotstar's concurrent viewer count across 3 datacenters. Each DC counts locally; you need a global total never off by more than 2%."
        needed: "HyperLogLog per DC — merge with union; periodic gossip every 5s; accept stale global count; freshen on next merge cycle"
        answer: "Each DC maintains a HyperLogLog (HLL) per match in Redis: PFADD 'viewers:{match_id}' user_id. Every 5 seconds, DCs gossip their HLL sketches to each other. Each DC runs PFMERGE 'global:{match_id}' dc1_hll dc2_hll dc3_hll to get the global unique viewer count. HLL error rate is ±0.8% — well within 2%. A 12KB sketch handles 50M users. Gossip interval of 5s means count is at most 5s stale — acceptable for a live viewer ticker."
        tradeoff: "Exact count needs a distributed set of all user IDs: at 50M users × 8 bytes = 400MB per DC, with synchronization overhead. HLL uses 12KB regardless. Sum of local counts overcounts users watching from multiple DCs. HLL correctly deduplicates via PFMERGE union operation. If 2% error is too high, increase HLL precision from 12 bits to 14 bits — error drops to ±0.2% at cost of 48KB per sketch."
        caveat: "Follow-up: detect DC that stopped sending updates. Track each DC's last_gossip_at timestamp. If DC-2 missed 3 consecutive 5-second cycles (15s silence), mark it as partitioned. Exclude its stale sketch from merge — better than showing artificially inflated counts from a ghost DC. Alert on-call. When DC-2 reconnects, merge its fresh sketch immediately."
        watch: "Follow-up: 60-second partition fallback. DC-2's 1-minute-old sketch is still a valid approximation — viewer counts don't swing dramatically in 60s. Show a UI indicator 'approx' instead of 'live'. The HLL sketch is timestamped so consumers know its staleness. On reconnect, the fresh merge corrects the count within 5 seconds."
        related_fundamentals: [storage/redis]

      - number: 3
        question: "Design an atomic 'exactly-one' like counter for Instagram posts. A user double-taps rapidly 5 times — the like count should increment by exactly 1."
        needed: "idempotency key: (user_id, post_id) in Redis SET; SADD returns 0 if member exists → skip increment; TTL on SET to allow re-liking after unlike"
        answer: "Use a Redis SET per post: SADD 'likes:{post_id}' user_id returns 1 (new like) or 0 (already liked). If 1, run INCR 'like_count:{post_id}'. Unlike: SREM then DECR. Wrap SADD + INCR in a Lua script to ensure atomicity — no race between membership check and counter update. No TTL on the SET: it must persist for the post's lifetime. For viral posts with 10M likes, the SET uses 80MB. At that scale, shard into 'likes:{post_id}:{user_id % 100}' buckets."
        tradeoff: "Redis SET membership check vs. DB unique constraint: DB approach (INSERT IGNORE into likes table) works but at 50K likes/sec on a viral post it saturates the primary. Redis handles 100K SADD ops/sec per node. Memory tradeoff: 10M likes × 8 bytes = 80MB per post. Bloom filter alternative uses <1MB but has ~1% false positive rate (users told 'already liked' incorrectly). Accept the Bloom filter tradeoff only for posts with >50M likes."
        caveat: "Follow-up: unlike then immediate re-like. SREM removes from SET, DECR adjusts count. Re-like hits SADD again (member removed so returns 1), INCRs. Correct. Follow-up: Redis crash after SADD but before INCR. Lua atomicity means both ops complete or neither does within a single Lua execution. If Redis crashes mid-Lua (power failure), the operation is lost — AOF persistence with fsync=everysec limits loss to 1 second."
        watch: "At 10M likes, a single Redis SET key is 80MB. This approaches Redis's per-key memory limit and causes replication lag when syncing this key. Shard: 'likes:{post_id}:{user_id % 100}'. To check membership, SISMEMBER on 1 shard (hash-determined) — O(1) lookup. Counting total likes: SCARD × 100 shards via pipeline — still <1ms."
        related_problems: [instagram]
        related_fundamentals: [storage/redis]

      - number: 4
        question: "Design the top-10 trending hashtag counter for Twitter. Input: 500K tweets/min. Output: ranked top-10 refreshed every 30s. You don't need exact counts."
        needed: "Space-Saving algorithm for approximate heavy hitters; Kafka stream → 30s tumbling window; two-tier: local top-100 per partition → global merge"
        answer: "Kafka ingest with hashtags extracted at the producer. A Flink job processes 30-second tumbling windows. Within each partition, use the Space-Saving (Misra-Gries) algorithm: maintain a table of (hashtag, count, error) of fixed size k. When a new hashtag arrives and table is full, find the minimum-count entry, increment it, and set error = min_count. Guarantees any hashtag in true top-k is tracked with error ≤ N/k where N is events in the window. Table size 1000 at 250K events/30s window gives error ≤ 250 counts. At window close, each partition emits local top-100. Coordinator merges across partitions using final scores, outputs global top-10."
        tradeoff: "Space-Saving vs Count-Min Sketch: CMS estimates any hashtag's frequency, Space-Saving tracks heavy hitters directly. For top-K, Space-Saving is preferred. Exact counting: full hashtag→count hashmap, potentially millions of unique entries per 30s window — unbounded memory. Space-Saving memory is O(k) regardless of hashtag count. Accuracy at k=1000: error ≤ 0.1% of window volume."
        caveat: "Follow-up: decaying older counts. Across windows, apply exponential decay: score = window_count + 0.7 × previous_score. After 1 window, yesterday's score is 70% weight. After 3 windows (~90s), it's 0.7³ = 34%. This prevents hashtags that went viral yesterday from dominating today's trends."
        watch: "Follow-up: accuracy vs. memory tradeoff. Space-Saving table size k determines both memory and accuracy. Doubling k halves the error but doubles memory. At 500K tweets/min with 1000-entry table, error bound is 250 counts per 30s window — accurate enough to distinguish trending vs. not trending. The algorithm is provably optimal: no algorithm using O(k) space can do better."

      - number: 5
        question: "Design the inventory decrement for a flash sale: 500 units, 100K users hit 'Buy' simultaneously. No overselling, sub-100ms response."
        needed: "Redis DECR with Lua: check > 0 then decrement atomically; pre-load inventory into Redis before sale; return 'sold out' immediately when count hits 0"
        answer: "Pre-load: SET inventory:{sku} 500. Each Buy request runs a Lua script: local count = tonumber(redis.call('GET', key)); if count <= 0 then return -1 end; return redis.call('DECR', key). Returns -1 (sold out) or remaining count. If sold out, return 200 with 'sold out' message immediately — no DB touch. If success, async-write reservation to DB. Redis Lua is atomic: no two concurrent scripts interleave. At 100K concurrent users, Redis processes them serially; only 500 return success. Response time: Redis Lua <1ms, DB async write doesn't block user."
        tradeoff: "DB SELECT FOR UPDATE serializes 100K requests through a single row lock — at 5ms each, that's 500 seconds to drain the queue. Redis Lua processes ~100K ops/sec, completing all 100K requests in ~1 second. Redis wins decisively. Risk: Redis crash after DECR but before DB async write causes oversell by in-flight count (at most a few hundred units during crash window). Mitigate with Redis AOF fsync=everysec."
        caveat: "Follow-up: Redis down mid-sale. Fallback to DB: UPDATE inventory SET count = count - 1 WHERE sku_id = X AND count > 0. Check rows_affected = 0 means sold out. Handles ~500 concurrent requests before row-lock contention degrades performance. Accept degraded throughput (10K req/s vs 100K) during Redis outage. Follow-up: payment failure after decrement. INCR to return unit + DELETE reservation from DB. Compensating transaction."
        watch: "Redis WATCH + MULTI + EXEC (optimistic locking) is an alternative to Lua but requires retry on conflict. At 100K concurrent users, almost every transaction conflicts — retry loops turn O(1) operations into O(N) network round trips. Lua eliminates retries by making the check-then-decrement atomic on the server side."
        related_fundamentals: [storage/redis]

      - number: 6
        question: "Design an atomic page view counter for a CMS (like Medium) handling 100K reads/sec on a single article without hitting the DB on every view."
        needed: "Redis INCR on article_id key; flush to DB every 60s; accept eventual consistency (count may be 60s stale); separate read counter from display counter"
        answer: "INCR 'views:{article_id}' on every page load — O(1), handles 100K ops/sec on a single Redis key. Background job every 60s: read current value, compute delta vs. last_flushed, run UPDATE articles SET views = views + delta. Display counter updates every 5 minutes (separate from the write counter) to avoid distracting users with rapidly changing numbers. The system tracks the true view count accurately; the display shows a smoothed version."
        tradeoff: "60-second flush = max 6M view loss on Redis crash at 100K reads/sec. For a blog, acceptable. For ad billing, flush every 5 seconds (max 500K view loss) or use Redis AOF. Alternative: write every view to Kafka (durable), aggregate with a batch job. Adds pipeline complexity but eliminates data loss. Choose based on whether view counts have billing implications."
        caveat: "Follow-up: deleted article handling. When an article is deleted, DEL the Redis key. Background flusher should check article existence before writing delta. Alternatively, set a TTL on the counter key after deletion so it auto-expires. Follow-up: max data loss at 60s interval. 60s × 100K = 6M increments. With Redis AOF fsync=everysec, max loss is 1 second × 100K = 100K views. Business requirement determines flush frequency."
        related_fundamentals: [storage/redis]


  - slug: qb-rate-limiting
    title: "Rate Limiting"
    description: "Token bucket, sliding window, distributed rate limiting, per-key throttling"
    number_range: "Q006–Q008, Q031, Q104"
    questions:
      - number: 1
        question: "Design the token bucket algorithm for Razorpay's API: 1000 req/min per merchant, enforced across 10 gateway pods, under 5ms overhead."
        needed: "centralized bucket in Redis: tokens + last_refill_time; Lua script: refill based on elapsed time then consume; local cache with 100ms TTL to reduce Redis round-trips"
        answer: "Redis hash per merchant: {tokens: 1000, last_refill_at: timestamp}. Lua script: elapsed = now - last_refill_at; new_tokens = min(capacity, tokens + elapsed * rate); if new_tokens < 1 then return 0 (reject); else save new_tokens - 1 and new timestamp, return 1 (allow). The entire check-refill-consume runs atomically in Lua. Local cache on each gateway pod with 100ms TTL: if cached count > safe_threshold (e.g., >50 tokens), allow without Redis call. Only hit Redis when approaching limit or cache is stale. This cuts Redis calls by ~80% for merchants under quota."
        tradeoff: "Centralized Redis: single source of truth, accurate to the request, but adds 1–2ms per request. Local cache: reduces latency to <0.1ms for non-contested merchants, but can over-allow by up to (pods × cache_window × rate) = 10 × 0.1s × 16.7 req/s = 16.7 extra requests during a 100ms window. For Razorpay, ±17 extra requests per 100ms is acceptable if the client hasn't already exceeded their quota."
        caveat: "Follow-up: Redis down — fail open or closed. Fail open (allow all requests) is correct for payment APIs. A brief outage means merchants can exceed quota by a small amount — much better than blocking legitimate payment transactions. Log excess traffic for retroactive analysis. Follow-up: allow burst (1200 req for 10s). Implement burst bucket: separate burst_tokens=1200 that refills at the same 1000/min rate but allows momentary excess up to 1200. Standard bucket and burst bucket are checked in sequence."
        watch: "The key insight interviewers look for: local cache reduces Redis load by ~80% but you must flush the local cache when the centralized count drops below threshold. Implement this as a lazy flush: if local cache says 'allowed' but Redis returns 'rejected', invalidate local cache immediately and propagate the rejection. This bounds the over-allowance to one cache TTL window (100ms)."
        related_problems: [rate-limiter]
        related_fundamentals: [storage/redis]

      - number: 2
        question: "Design a sliding window rate limiter for a public API (like GitHub) that must be accurate to the second, not just per-minute bucket."
        needed: "sorted set in Redis: score = timestamp, value = request_id; count entries in (now - 60s, now] window; ZREMRANGEBYSCORE to evict old entries on each request"
        answer: "Redis sorted set per user: ZADD 'rl:{user_id}' now request_uuid. Three ops in a Lua script: (1) ZREMRANGEBYSCORE 'rl:{user_id}' 0 (now - 60) — remove entries older than 60 seconds. (2) ZCARD 'rl:{user_id}' — count current entries. (3) If count < limit, ZADD new entry and return allowed; else return rejected. The sorted set score is the timestamp, so ZRANGEBYSCORE gives the exact sliding window count without any bucket boundary artifacts. A per-minute bucket limiter resets at :00 — a burst of 5000 requests at :59 and another 5000 at :01 passes, violating the spirit of the 5000/min limit. Sliding window prevents this."
        tradeoff: "Sorted set per user: O(log N) ZADD and ZREMRANGEBYSCORE where N is requests in the window. At 5000 req/min limit with 60-second window, N ≤ 5000 — log(5000) ≈ 13 comparisons. Memory: each entry is ~50 bytes (UUID + timestamp), so 5000 entries = 250KB per user. At 10M active users, that's 2.5TB if all users hit their limit simultaneously — not realistic but a useful worst-case."
        caveat: "Follow-up: memory growth under sustained high traffic. Each request adds one entry; ZREMRANGEBYSCORE removes entries older than 60s. In steady state, the set size = (requests in last 60s). If a user is at their limit (5000 req/min), the set stabilizes at 5000 entries. It only grows unboundedly if the cleanup step is skipped — always run ZREMRANGEBYSCORE. Follow-up: clock skew between gateway nodes. Use a centralized time source (Redis server time via TIME command) inside the Lua script instead of gateway local time to prevent skew."
        watch: "Sliding window sorted set is the most accurate rate limiting approach but uses more memory than a fixed window counter. The hybrid approach: fixed window counter for coarse limiting (O(1) memory per user), plus a sorted set for the top-1% of users near their limit (accurate enforcement when it matters). Normal users never hit Redis sorted set operations."
        related_problems: [rate-limiter]
        related_fundamentals: [storage/redis]

      - number: 3
        question: "Zomato OTP API is being hit by bots at 50K req/sec. Design a per-phone-number rate limiter: max 3 OTPs per phone per 10 minutes."
        needed: "Redis counter with INCR + TTL = 600s; on INCR result > 3, return 429 without sending OTP; composite key: 'otp:{phone}:{10min_bucket}'"
        answer: "Key: 'otp:{e164_phone}:{floor(now/600)}' where floor(now/600) creates 10-minute buckets (0, 1, 2...). On OTP request: count = INCR key; if count == 1 then EXPIRE key 600; if count > 3 then return 429 (Too Many Requests). Never call the SMS gateway if count > 3. The bucket key naturally expires after 10 minutes, resetting the counter. E.164 normalization (strip whitespace, normalize country code) before using phone as key prevents '+91-98765-43210' and '9876543210' from being treated as different keys."
        tradeoff: "INCR + EXPIRE vs. GETSET + TTL: INCR returns the new count atomically; EXPIRE only needed on first request (count == 1 means freshly created key). If Redis crashes between INCR and EXPIRE on first request, the key has no TTL and never expires — a 1-in-a-million bug. Fix: use SET key 0 EX 600 NX (set key to 0 with TTL 600 if not exists) before INCR, or use a Lua script for atomic INCR+EXPIRE."
        caveat: "Follow-up: VPN user sharing IP with legitimate users. IP-based rate limiting would incorrectly block legitimate users on shared IPs (corporate NAT, university networks). Phone-based limiting is correct here — each phone gets its own 3 OTPs regardless of IP. Add IP-based limiting as a secondary check for IPs generating >1000 OTP requests in 10 minutes (bot indicator). Follow-up: TTL drift. The bucket key (floor(now/600)) handles this — all requests in the same 10-minute bucket share a key that was set with EXPIRE 600 on creation. No drift possible."
        watch: "The 10-minute bucket boundary creates a spike: at minute 10:00, all rate limits reset simultaneously, allowing a burst of 3 OTPs per phone in the first few seconds. Mitigate with a sliding 10-minute window using a sorted set — but at 50K req/sec, the sorted set approach uses too much memory. Accept the bucket boundary artifact for OTP use case; the security benefit outweighs the minor exploit window."
        related_problems: [rate-limiter]
        related_fundamentals: [storage/redis]

      - number: 4
        question: "Design a client-side rate limiter SDK in Python/Go that respects a 100 req/s limit per API key, works without a central server, used inside microservices."
        needed: "token bucket in-process: tokens refilled in a goroutine/background thread; thread-safe counter with mutex or atomic operations; expose Wait() method that blocks until a token is available"
        answer: "Token bucket implemented with an atomic counter and a refiller goroutine. State: tokens (atomic int64), max_tokens=100, refill_rate=100/sec. Refiller goroutine: every 10ms, add min(10, max_tokens - current) tokens using compare-and-swap (no mutex needed). Client call: atomic decrement of tokens; if result < 0, increment back and either return error (non-blocking) or sleep until refilled (blocking Wait()). The atomic CAS loop is lock-free — no goroutine blocks another. Expose two APIs: TryAcquire() bool (non-blocking) and Acquire() (blocks, honors context cancellation)."
        tradeoff: "In-process limiter: sub-microsecond latency, zero network calls. Downside: 20 microservice pods each with 100 req/s limits = 2000 req/s total to the downstream — much higher than intended 100 req/s. In-process limiting works for per-pod limits, not global limits. For global 100 req/s across all pods, use centralized Redis-based limiting. SDK should support both modes via configuration."
        caveat: "Follow-up: enforce limit across multiple goroutines sharing the same client. The atomic counter is shared across all goroutines — they all compete for the same tokens. One greedy goroutine cannot monopolize tokens since each request takes exactly 1 token. The atomic decrement is the single serialization point. Follow-up: Lambda/serverless. Lambda restarts the process for cold starts, losing refiller goroutine state. On each cold start, initialize tokens = max_tokens (full bucket) — cold starts get full burst capacity, which is acceptable."
        watch: "The Wait() method must honor context cancellation. If ctx is cancelled while waiting, Wake() should unblock and return context.Canceled — never leave callers blocked on a cancelled context. Use a select statement in the waiting loop: select { case <-ctx.Done(): return ctx.Err(); case <-time.After(refillDelay): retry }."

      - number: 5
        question: "Design per-user API throttling for a developer platform (like Twilio). Free: 100 req/day. Paid: 10K req/day. Limits reset at midnight UTC."
        needed: "counter key: 'ratelimit:{user_id}:{YYYY-MM-DD}' with TTL expiring at midnight; INCR + check against tier limit; return X-RateLimit-Remaining and X-RateLimit-Reset headers"
        answer: "Key: 'rl:{user_id}:{date}' where date = current UTC date (YYYY-MM-DD). INCR key returns new count. TTL set to seconds until next midnight UTC: ttl = 86400 - (now % 86400). Use SET key 0 EX ttl NX (set to 0 with TTL if not exists) then INCR — or Lua script for atomic INCR + conditional EXPIRE. Lookup user tier from cache (Redis hash or JWT claim): free=100, paid=10000. If count > limit, return 429. Response headers: X-RateLimit-Limit: 10000, X-RateLimit-Remaining: 9850, X-RateLimit-Reset: 1710201600 (next midnight Unix timestamp)."
        tradeoff: "Date-based key (resets at midnight) vs. rolling 24-hour window (sliding): date-based is simpler and aligns with user expectations ('daily limit'). Sliding 24h window requires a sorted set per user — more memory but more accurate. For developer platforms, midnight reset is standard (Stripe, GitHub, Twilio all use this). Rolling window is better for API-to-API integrations where arbitrary cutoffs cause bursting."
        caveat: "Follow-up: user upgrades free→paid mid-day. The existing counter key still holds the day's count (e.g., 95 out of 100). After upgrade, check the new limit (10000) against the existing counter — the user immediately gets 9905 more requests. No key migration needed; just change the limit lookup. Follow-up: Redis as single point of failure. Add a local fallback: each pod maintains an in-memory counter as backup. If Redis is unreachable for >5s, use local counter for the next 60s before returning errors."
        watch: "The X-RateLimit-Reset header should be the Unix timestamp of the exact moment the limit resets (next midnight UTC), not a delta ('resets in 3h'). Clients can calculate their own 'resets in X' from the timestamp. Using a fixed timestamp prevents clock drift between client and server from confusing reset timing."
        related_problems: [rate-limiter]
        related_fundamentals: [storage/redis]


  - slug: qb-id-generation
    title: "ID Generation"
    description: "Snowflake IDs, Base62 short codes, correlation IDs, globally unique identifiers"
    number_range: "Q009–Q011"
    questions:
      - number: 1
        question: "Design a Snowflake-style ID generator for a Kubernetes-based order service. IDs must be time-sortable, globally unique, no coordination between pods."
        needed: "64-bit: 41b timestamp + 10b machine_id + 12b sequence; machine ID from pod ordinal or env variable injected at startup; sequence resets each millisecond; overflow waits for next ms"
        answer: "64-bit layout: 1 bit unused | 41 bits epoch milliseconds (lasts 69 years from 2024) | 10 bits machine_id (1024 unique IDs) | 12 bits sequence (4096 IDs/ms/machine). Machine ID: inject as K8s downward API env var from pod ordinal index (StatefulSet) or use last 10 bits of pod IP. Sequence increments on each ID within the same millisecond; resets to 0 at next ms. If sequence overflows (4096 IDs in one ms), sleep until next millisecond. Generation is lock-free within a pod (single goroutine owns the generator), and globally unique across pods because machine_id is unique."
        tradeoff: "Snowflake vs. UUID: UUID is globally unique without coordination but 128 bits, not sortable, random — causes B-tree index fragmentation as inserts scatter across the index. Snowflake is time-sortable (newest IDs always append to index), 64 bits (fits in a DB bigint), and decodes the timestamp for free. Snowflake downside: machine_id coordination (two pods must not share a machine_id — see caveat)."
        caveat: "Follow-up: two pods get the same machine_id. IDs generated simultaneously on both pods with same machine_id and same timestamp would collide on sequence numbers if they overlap. Prevention: use K8s StatefulSet with stable ordinals (pod-0 = machine_id 0), or a lightweight Zookeeper/etcd lease for machine_id assignment at startup. Follow-up: clock going backward 5ms (NTP correction). Detect clock backward: last_ts = 1710000000100; new_ts = 1710000000095 (backward by 5ms). Wait until current time ≥ last_ts before generating next ID. Log a warning and pause ID generation for up to 10ms — rare event in practice."
        watch: "The 41-bit timestamp field starts from a custom epoch (e.g., Jan 1, 2024) not Unix epoch (1970). Starting from 2024 gives 69 years of IDs before overflow (until 2093). Using Unix epoch wastes 54 years of timestamp range. Always document the custom epoch so future engineers can decode the embedded timestamp."
        related_problems: [url-shortener]
        related_fundamentals: [storage/dynamodb]

      - number: 2
        question: "Design the short-code generation for a URL shortener with 10B existing URLs. New codes must be 7 chars, no collisions, not sequentially guessable."
        needed: "auto-increment DB ID → Base62 encode; shuffle the Base62 alphabet with a secret permutation; reserve ID ranges per app server to avoid coordination"
        answer: "Use a DB auto-increment sequence (or distributed sequence via ZooKeeper/etcd counter) for global ordering. Convert the integer ID to Base62 (62^7 = 3.5 trillion combinations, enough for 10B with room to grow). To prevent sequential guessing: apply a Feistel cipher or a secret permutation to the ID before Base62 encoding — ID 1000000 becomes ID 7482931, which encodes to a non-sequential code. The secret permutation is a one-way mapping that's reversible only with the key. Alternatively, shuffle the Base62 alphabet with a server secret: the standard alphabet 'ABC...abc...012...9' becomes a shuffled version known only to your service."
        tradeoff: "Random code generation: 7-char random Base62 = pick random string, check DB for collision, retry if collision. At 10B existing URLs, collision probability per attempt = 10B / 3.5T = 0.3%. Expect 1 retry per 330 attempts — manageable but adds latency. Sequential + permutation: zero collision risk (each ID maps to exactly one code), no retries, no DB read needed before write. Sequential is faster and deterministic."
        caveat: "Follow-up: remaining capacity at 10B URLs. 62^7 = 3.52 trillion codes. With 10B used, 3.51 trillion remain — 0.28% utilized. At current growth rate, capacity won't exhaust for decades. When approaching capacity, add an 8th character: 62^8 = 218 trillion codes. Follow-up: reclaiming expired URL codes. Expired URLs release their integer ID back to a free-list. The integer ID is overwritten in the DB; the short code now points to the new URL. Old bookmarks resolve to the new destination after reclamation — document this TTL-reset behavior in API docs."
        related_problems: [url-shortener]

      - number: 3
        question: "Design a correlation ID system for microservices. Every request must carry a unique ID propagated across all 30 services for tracing, without changing existing service contracts."
        needed: "generate UUID at API gateway if header absent; propagate via X-Request-ID header in all inter-service calls; log the correlation ID at every service entry/exit point"
        answer: "API gateway checks X-Request-ID header: if absent, generate UUID v4 and inject. All inter-service HTTP calls forward X-Request-ID. All outbound gRPC calls set it in metadata. All log lines include correlation_id as a structured field. For async (Kafka), embed correlation_id in the message headers — Kafka supports arbitrary message headers. Kafka consumer reads header and injects into context for the processing thread. The UUID is 36 chars (with hyphens) or 32 chars (hex); stored as a header with negligible overhead (<1KB per request)."
        tradeoff: "UUID v4 (random) vs Snowflake-style ID: UUID has no timestamp but is universally unique without coordination. Snowflake embeds a timestamp, making correlation IDs time-sortable — useful when searching logs by approximate time. For tracing, both work equally well. Use Snowflake-style if you need to decode the timestamp from the correlation ID (e.g., 'this request happened at 10:00:05 AM')."
        caveat: "Follow-up: service strips custom headers. Some HTTP clients (OkHttp, certain proxies) strip unknown headers. Fix: configure inter-service HTTP client to explicitly preserve X-Request-ID. For services you don't control, wrap the call with header injection middleware. For outbound calls to third-party APIs (Stripe, Twilio), inject correlation ID in their request body or a custom field they support. Follow-up: correlate correlation ID to a Kafka message mid-flow. Producer: message.headers.add('X-Request-ID', correlationId). Consumer: extract from headers into thread-local context at consumer startup."
        watch: "Some distributed tracing systems (Zipkin, Jaeger) use their own propagation headers (X-B3-TraceId, traceparent). If you adopt OpenTelemetry, the W3C Trace Context spec (traceparent header) is the standard. X-Request-ID can coexist with trace context — use X-Request-ID for business-level correlation (tying a user action to its audit trail) and traceparent for latency analysis (showing the call tree)."


  - slug: qb-caching
    title: "Caching Strategies"
    description: "Cache eviction, invalidation, warming, stampede prevention, multi-tenant caching"
    number_range: "Q012–Q014, Q051, Q102, Q105"
    questions:
      - number: 1
        question: "Design the cache eviction strategy for a product detail page (Amazon). 10M products, 1% responsible for 80% traffic. Cache size fits only 200K items."
        needed: "LFU eviction: evict least-frequently-used on capacity breach; separate hot-tier (top 1%) with longer TTL; lazy population: cache on first miss, not on write"
        answer: "Use Redis with LFU eviction policy (maxmemory-policy=allkeys-lfu). The 200K-slot cache naturally concentrates on the 100K products (1% of 10M) driving 80% of traffic — LFU evicts the tail. Cache aside: on miss, fetch from DB, cache with TTL 1 hour. For the top 0.1% of products (viral, homepage-featured), use a hot-tier with TTL 24 hours and pre-warming. Lazy population means only products that are actually requested ever enter the cache — no wasted slots for products that haven't been viewed in months."
        tradeoff: "LFU vs LRU: LRU evicts items not used recently, which fails for seasonal products (ski gear in summer — low recent use but high future use). LFU tracks long-term access frequency, better for stable product catalogs. Redis LFU uses a probabilistic counter (4-bit per item) with logarithmic counting — takes very little memory. LRU is simpler and works better for bursty access patterns (newly listed products). For Amazon-scale, Redis offers both; choose LFU for product pages."
        caveat: "Follow-up: new product launch (cold start). A new product has zero cache history — first 1000 users all hit DB simultaneously. Mitigation: pre-warm the cache for product launches by fetching the product detail page from the DB into Redis 5 minutes before launch. Use a 'scheduled warm-up' job triggered by the product listing event. Follow-up: flash sale. During a flash sale, traffic shifts to a small subset of products — the LFU cache quickly learns the new hot products as they accumulate frequency counts. But the first few minutes of a flash sale, the hot products haven't built up frequency yet — manual cache pinning (non-evictable entries) for flash sale products is the safe approach."
        watch: "Cache size 200K out of 10M products = 2% of catalog. If access is perfectly Zipfian (top 1% gets 80% of traffic), those 100K products should all fit in cache (100K < 200K). The remaining 100K slots hold the next tier. Cache hit rate should be >80% in steady state. If hit rate drops, it means your hot set is larger than 200K or access is more uniform than expected."
        related_fundamentals: [storage/redis]

      - number: 2
        question: "Design cache invalidation for a user profile read by 20 different microservices. A profile update must propagate to all caches within 10 seconds."
        needed: "pub/sub invalidation: profile update publishes user_id to 'invalidate' channel; each service subscribes and deletes its local cache entry; version tag in cached value; stale version triggers re-fetch"
        answer: "Profile update service publishes to Redis Pub/Sub channel 'cache:invalidate:profile:{user_id}'. All 20 microservices subscribe to this channel pattern on startup. On receiving an invalidation message, each service deletes its local cache entry for that user_id. Version tag: cache stores {profile_data, version: 42}. On each profile read, if the cached version doesn't match the current version from the DB (checked via a lightweight 'get_version' query), re-fetch. The version check is O(1) and can be done with a separate Redis key 'profile_version:{user_id}'."
        tradeoff: "Pub/sub invalidation: low latency (sub-second propagation) but fire-and-forget — if a service is down when the message is published, it misses the invalidation. On recovery, the service serves stale data until its cache TTL expires. TTL is the safety net: set cache TTL to 60 seconds so even missed invalidations self-heal within 1 minute. This satisfies the '10 seconds' SLA in the normal case while providing TTL-based eventual consistency as a fallback."
        caveat: "Follow-up: service misses the invalidation event (offline for 30s). On reconnect, the service re-subscribes to the channel. It misses events during downtime. The TTL (60s) ensures stale entries expire. Alternatively, on reconnect, the service can subscribe AND flush its entire local cache — this guarantees freshness at the cost of a temporary cold cache. Follow-up: thundering herd when a popular user (100M followers) updates their profile. Use a mutex (Redis SETNX) or probabilistic early recomputation: only 1 request per service computes the new cache value; others wait. Stagger invalidation events with a small random delay (0–100ms) across services."
        watch: "The version tag approach enables conditional invalidation: if the cached version matches the invalidation message's version, delete the cache entry. This prevents a race where invalidation arrives before the write completes — the old-version invalidation message would erroneously evict a freshly-written cache entry."
        related_fundamentals: [storage/redis]

      - number: 3
        question: "Design the cache warming strategy for a cricket match score API. Match starts at 7 PM; by 6:55 PM, all 200 gateway pods must have the match data pre-loaded."
        needed: "scheduled pre-fetch job at T-10min: fetch match data, push to Redis; gateway pods share a single Redis cluster (no per-pod cache needed); staggered warm-up to avoid all pods hitting source simultaneously"
        answer: "Gateway pods all read from a shared Redis cluster — pre-warming Redis warms all pods simultaneously. Scheduled job at 6:50 PM (T-10min): fetch match data from DB/API, serialize to JSON, SET 'match:{match_id}' with TTL 24h. Single Redis write, all 200 pods benefit immediately on next read. No pod-level warm-up needed. Staggered source fetch: if warming 50 concurrent matches (IPL day), stagger fetch jobs every 100ms to avoid 50 simultaneous DB queries. Use a message queue (Kafka or SQS) to serialize warm-up tasks."
        tradeoff: "Push warm-up (pre-fetch before demand) vs. pull warm-up (first request cold, subsequent requests cached): push guarantees 0ms latency for the first request. Pull requires the first user to experience full DB latency — unacceptable for a live match where millions connect simultaneously at 7:00:00 PM. Push warm-up is the correct choice for predictable high-traffic events."
        caveat: "Follow-up: 50 concurrent matches on IPL day. 50 warm-up jobs each querying the DB simultaneously at 6:50 PM = 50 concurrent DB queries. At 10ms each, no DB issue. But if each warm-up job fetches player statistics and team rosters too (10 tables per match), that's 500 DB queries in 10ms — could overload the DB. Batch: one query per match type, 50 matches at once using WHERE match_id IN (...). Follow-up: verify warming completed before match start. Warm-up job publishes to a 'warm-up:complete:{match_id}' Redis key after writing. A readiness check verifies this key exists before allowing match traffic. Alert if key missing at T-2min."
        watch: "Cache warming is only safe if the warm-up data is immutable or can be overwritten without conflict. For live match data that updates every ball (every ~30s), set a short TTL (60s) on the pre-warmed data so it refreshes quickly once the match starts. The warm-up just prevents the cold start at match open; normal cache population takes over immediately after."

      - number: 4
        question: "Design a solution for the cache stampede when a Redis key expires and 10K requests simultaneously hit the DB to repopulate it."
        needed: "probabilistic early recomputation: probabilistically recompute before TTL=0; mutex: first request locks, computes, populates; background refresh: async job recomputes before expiry, never lets key expire"
        answer: "Three patterns: (1) Mutex lock on cache miss: first thread to detect miss acquires a Redis SETNX lock, recomputes value, populates cache, releases lock. Other threads spin-wait or serve stale value during lock. (2) Probabilistic early recomputation (PER): when remaining TTL falls below threshold, each request computes with probability p = e^(-β × remaining_ttl / recompute_cost). As TTL shrinks, probability rises — spreads recomputation across multiple requests before expiry. (3) Background refresh: a dedicated job reads the TTL and recomputes before it hits 0, using EXPIRE to extend. The key never expires — consumers always get a cached value."
        tradeoff: "Mutex (blocking): simple, guaranteed consistency, but blocks all requests waiting for the lock holder. If the DB query takes 2s, all 10K threads wait 2s. Background refresh: zero stampede risk, but requires a separate job process and can serve slightly stale data if the background job is delayed. PER: probabilistic, requires no coordination but can still cause multiple simultaneous recomputations (by design — it distributes the recomputation traffic). For read-heavy, write-rare data (product details): background refresh is best. For user-specific data: mutex or PER."
        caveat: "Follow-up: detecting stampede events in metrics. Track: DB query rate per second (spike = stampede), cache miss rate (spike = stampede), and a metric 'stampede_detected' that fires when DB query rate > 10× baseline for the same key prefix. Alert when any single key causes >100 DB queries in 1 second. Follow-up: stale-while-revalidate. Serve the expired (stale) value immediately while recomputing in the background. Most popular CDN edge caches implement this. The user gets instant response; fresh data appears on next request after recomputation completes."
        watch: "The key insight: cache stampede happens because the expiry of a popular key creates an artificial 'cold start' that all concurrent requests experience simultaneously. The real solution is to ensure keys never 'go cold' — either by background refresh (never expire) or by probabilistic early recomputation (expire gradually, not suddenly). Both approaches transform a simultaneous stampede into a gradual recomputation."
        related_fundamentals: [storage/redis]

      - number: 5
        question: "Design the cache key strategy for a multi-tenant API response cache. Tenant A must never see Tenant B's cached data."
        needed: "cache key: hash(tenant_id + endpoint + params); include config_version in key: new config busts old cache automatically; per-tenant cache namespace for easy bulk invalidation"
        answer: "Key structure: '{tenant_id}:{endpoint_hash}:{params_hash}:{config_version}'. Including config_version in the key means any config change automatically produces a new key — old key with old version expires naturally (no explicit invalidation needed). Per-tenant namespace prefix ensures all of Tenant A's keys are isolatable: SCAN 'tenant_A:*' to enumerate them. For bulk invalidation on tenant config change: SCAN + DEL all keys matching 'tenant_A:*:{old_config_version}'. Never store tenant ID in the cached value — the key alone must enforce isolation."
        tradeoff: "Key-per-request (tenant+endpoint+params) vs. shared cache with tenant filter: shared cache allows cross-tenant cache hits (Tenant A benefits from Tenant B's warm cache) but risks data leakage if key construction is buggy. Tenant-isolated keys are slightly less cache-efficient (no cross-tenant sharing) but eliminate any risk of data leakage. Tenant isolation is always worth the hit rate trade-off."
        caveat: "Follow-up: bulk invalidation after Tenant A config change. SCAN 'tenant_A:*' returns all keys for that tenant — pipeline DEL on all matching keys. Redis SCAN is O(N) in total but O(1) per call — safe for production use. Alternative: delete the config_version-specific keys only. Old versions expire naturally via TTL. Follow-up: preventing a tenant from guessing another's cache key. Cache keys must not be predictable from client-provided inputs. Hash the key with a server-side secret: HMAC(server_secret, tenant_id + endpoint + params). An attacker who knows their own key cannot derive another tenant's key."
        watch: "Config version in cache key is a form of cache-busting versioning. It has a side effect: old keys accumulate until TTL expiry even after config changes. Set a short TTL (5 minutes) on config-sensitive cache entries so old versioned keys clean themselves up quickly. This bounds memory bloat from accumulated stale versioned keys."
        related_fundamentals: [storage/redis]

      - number: 6
        question: "Design a fallback strategy for a product recommendation service. If the ML recommendation API times out in 200ms, return a reasonable default without blocking the page load."
        needed: "200ms hard timeout; fallback: pre-computed 'popular in category' list from Redis; cache the fallback list per category, refreshed hourly"
        answer: "Client calls recommendation API with a 200ms deadline. On timeout or error, immediately return the fallback list from Redis: GET 'popular:{category_id}'. Fallback list is a pre-computed JSON array of the top-20 products in the category by sales volume, updated hourly by a background job. The background job queries the DB (slow, OK since it's async), serializes to JSON, and writes to Redis with TTL 2 hours. The fallback is always in memory — even if the hourly job fails, the previous version serves for 2 hours before expiring. No user-facing delay; the fallback path is as fast as any Redis GET (~1ms)."
        tradeoff: "Per-user fallback (user's historical favorites from cache) vs. per-category popular (same for all users): per-user requires a second Redis lookup per user and depends on having history. Per-category popular requires no user history and is always available (even for new users). For cold-start users, category popular is the only viable fallback. Layer them: if user history is in cache, use it; otherwise fall back to category popular."
        caveat: "Follow-up: which category's fallback to show when user has no browsing history. Default to the top 20 globally popular products (homepage bestsellers). If the URL contains a category signal (user is on 'Electronics' page), use that category's popular list. Follow-up: tracking how often the fallback is served. Emit a metric 'recommendation_source': label it 'ml' (normal) or 'fallback' (degraded). Alert when 'fallback' rate exceeds 5% — that signals the ML service is degraded and requires attention."
        watch: "The 200ms timeout must be enforced at the HTTP client level, not just hoped for. Use context.WithTimeout(ctx, 200ms) in Go or httpx.AsyncClient(timeout=0.2) in Python. Without a hard timeout, a slow ML service will cascade — recommendation calls block the page rendering threads, eventually exhausting the thread pool and taking down the entire page load."


  - slug: qb-messaging-kafka
    title: "Messaging & Kafka"
    description: "Kafka retry topics, exactly-once delivery, fan-out, ordered events, consumer groups, DLQ"
    number_range: "Q015–Q017, Q068–Q069, Q099–Q100, Q103, Q124–Q125, Q136"
    questions:
      - number: 1
        question: "Design the retry mechanism for a failed Kafka consumer. A message fails processing (DB timeout). Retry with backoff without blocking the main partition."
        needed: "retry topics: main → retry-1m → retry-10m → retry-60m → DLQ; consumer commits offset only after successful processing; separate consumer group per retry topic"
        answer: "On processing failure, publish the message to a retry topic with a delay indicator in the header: 'retry-1m', 'retry-10m', 'retry-60m', 'dlq'. Each retry topic has a dedicated consumer group that reads the message, checks the delivery_time header, and sleeps until the delivery time before processing. The main consumer group commits the offset immediately after publishing to the retry topic — it never blocks. Retry consumer groups are independent: 'retry-1m-consumer-group' only reads 'orders.retry-1m' topic. After 3 retries, publish to DLQ. Separate consumer groups allow independent scaling and avoid head-of-line blocking."
        tradeoff: "Exponential backoff in Kafka (via separate retry topics) vs. blocking with Thread.sleep(): Thread.sleep() in the main consumer blocks all messages in that partition during the wait — a single failing message delays all subsequent messages by 60 minutes. Retry topics decouple the main processing flow from retry delays. Memory vs. duplication: retry topics duplicate the message payload for each retry attempt — at 1KB/message with 3 retries, 3× storage. Acceptable for most use cases."
        caveat: "Follow-up: poison pill message (malformed payload) clogging all retry queues. Message fails on every retry. After max retries (3 in this case), publish to DLQ with the full error stack trace in the message header. In the DLQ, alert on-call. Never retry from DLQ automatically — require a human to review the message and decide whether to replay or discard. Follow-up: replay from DLQ after fixing the bug. DLQ consumer publishes messages back to the original topic with a 'dlq_replay: true' header. This triggers reprocessing with the fixed logic. Idempotency key prevents double-processing if the original message was partially processed."
        watch: "The key distinction: retry topics preserve Kafka's ordering guarantee within a partition for the main topic. Retry messages are processed asynchronously and may complete out of order relative to new messages. If ordering is critical (payments), use a different retry mechanism: process the failed message with a circuit breaker that holds subsequent messages in the partition until the retry succeeds."

      - number: 2
        question: "Design an exactly-once delivery guarantee for a payment event going from the order service to the ledger service via Kafka."
        needed: "transactional outbox: write event to DB in same transaction as order; Kafka idempotent producer + transactions for atomic produce; consumer deduplication: (producer_id, sequence_no) stored in ledger DB"
        answer: "Three-layer exactly-once: (1) Transactional outbox: INSERT INTO orders AND INSERT INTO outbox_events in a single DB transaction. An outbox poller reads uncommitted events and publishes to Kafka using a transactional producer. DB transaction + Kafka transaction are separate — the outbox bridges them without distributed 2PC. (2) Idempotent Kafka producer: enable.idempotence=true + transactional.id. The broker deduplicates producer retries using (producer_id, epoch, sequence_number). (3) Consumer deduplication: before processing, check IF NOT EXISTS (producer_id, sequence_no) in the ledger DB. Insert the key with the processing result. On redelivery, the duplicate key constraint fires — return the cached result idempotently."
        tradeoff: "Transactional Kafka (producer transactions + consumer group transactions) provides end-to-end exactly-once but at ~3× latency overhead vs. at-least-once: transactions require all brokers in the transaction to acknowledge before commit. At low volume (< 1K events/sec), acceptable. At 100K events/sec, 3× latency makes Kafka transactions a bottleneck — switch to at-least-once delivery with consumer-side idempotency (approach 3 above) which is ~1.2× overhead."
        caveat: "Follow-up: outbox committed to DB but Kafka is down for 5 minutes. Outbox poller retries publishing every 30s. Events are durably stored in the DB outbox table. When Kafka recovers, the poller catches up. Maximum delay: Kafka downtime (5 minutes) + retry interval (30s). No events are lost. Follow-up: Kafka transactions throughput limit. Each transactional producer can sustain ~1K committed messages/sec. For 100K events/sec, use 100 transactional producers partitioned by order_id — each handles a subset of orders."
        watch: "Exactly-once delivery requires both idempotent produce and idempotent consume. Many teams implement idempotent produce (via Kafka transactions) but forget idempotent consume — the consumer still processes the same message twice if the consumer crashes after processing but before committing the offset. Always implement both sides."

      - number: 3
        question: "Design the fan-out for a Swiggy order state change notification. One order event must trigger: push notification, SMS, email, analytics — all within 2 seconds."
        needed: "single Kafka topic per order event, 4 consumer groups; each consumer group handles one channel independently; dead-letter per channel: push failure doesn't block SMS"
        answer: "Producer publishes 'order.state_changed' with order_id, state, user_id to a single Kafka topic with 50 partitions (partitioned by order_id). Four consumer groups: 'push-cg', 'sms-cg', 'email-cg', 'analytics-cg'. Each reads independently from the same topic. Consumer group offset is tracked per-group, so SMS consumer lag doesn't affect push consumer. Each consumer group has its own DLQ for failures. With 4 independent consumers, total fan-out time ≤ max(processing time per consumer) — not sum. With 2-second SLA and p99 push latency of 800ms, the 2-second window is easily met."
        tradeoff: "Kafka fan-out (multiple consumer groups) vs. single consumer that calls all 4 APIs serially: serial = 800ms push + 500ms SMS + 400ms email + 200ms analytics = 1.9 seconds in series, barely within 2s, and one failure blocks all channels. Kafka fan-out = max(800ms, 500ms, 400ms, 200ms) = 800ms parallel, with independent failure handling. Kafka adds ~50ms overhead per consumer (partition read) but enables independent scaling, retries, and deployment."
        caveat: "Follow-up: ensure all 4 consumers processed before 'done'. Don't coordinate across consumers — each consumer group is independent. Instead, define 'done' per channel: when the push consumer commits the offset for order X, push is done for X. Use a saga or event tracking table if you need cross-channel completion tracking. Follow-up: analytics consumer slow without backing up push consumer. Kafka consumer groups have independent lag. Analytics can be 10 minutes behind without affecting push. Monitor consumer lag per group; alert when analytics lag > 1 hour."
        watch: "The key benefit of Kafka fan-out is failure isolation. If the email service is down for 30 minutes, the email consumer group accumulates lag (messages are durably in Kafka) without affecting push or SMS. On email service recovery, the consumer group catches up independently. This is impossible with a single orchestrating consumer calling all 4 APIs."

      - number: 4
        question: "Design a fan-out notification system: one 'order placed' event must be delivered to 5 internal services. Services may be temporarily down."
        needed: "Kafka topic with 5 consumer groups (one per service); each consumer group tracks its own offset; each service has its own DLQ for failed events"
        answer: "Same architecture as Q015 above. The critical property: Kafka retains messages for a configurable retention period (default 7 days). If a service is down for 6 hours, it resumes consuming from its last committed offset on recovery — no messages are lost. Each service's consumer group is entirely independent: inventory consumer at offset 1000, billing consumer at offset 800 (200 messages behind). Kafka doesn't delete messages until all consumer groups have passed that offset (if using min.cleanable.dirty.ratio) or until the retention time expires."
        tradeoff: "Kafka fan-out vs. HTTP callbacks (webhook to each service): webhooks require the producer to know all 5 consumers and retry failed deliveries. If a consumer changes its endpoint, the producer config must update. Kafka decouples producer from consumers — consumers register themselves by creating a consumer group on the topic. New consumers can be added without changing the producer."
        caveat: "Follow-up: how to ensure all 5 consumers have consumed before deleting. Kafka doesn't offer this guarantee natively — messages are deleted by retention policy, not by consumer acknowledgment. If you need confirmation that all consumers processed a message, use a separate tracking table: each consumer group writes (event_id, consumer_name, processed_at) on success. A cleanup job checks this table before archiving old events. Follow-up: billing consumer lag affecting inventory consumer. Zero impact — consumer groups are fully independent. Inventory consumer can be at offset 1000 while billing is at 900."

      - number: 5
        question: "Design ordered event delivery for user account events (create, update, delete) in Kafka. A 'delete' must never be processed before the preceding 'create'."
        needed: "partition by user_id: all events for a user go to same partition; Kafka guarantees order within a partition; consumer must not skip offsets — process sequentially within partition"
        answer: "Partition key = user_id (string). Kafka hashes user_id to partition: all events for user_id=12345 always go to the same partition (e.g., partition 7). Within partition 7, events are totally ordered — create (offset 100), update (offset 101), delete (offset 102). Consumer reads offsets sequentially and never skips. The consumer commits offset 100 only after fully processing create, then processes 101, then 102. This guarantees delete is never processed before create. 50 partitions = 50 users processed in parallel; events for the same user are strictly sequential."
        tradeoff: "Partition by user_id vs. message timestamp: timestamp-based ordering requires a global sort across all partitions — impossible in Kafka without a shuffle step. User-keyed partitioning makes ordering a single-partition guarantee: O(1) per event without cross-partition coordination. Downside: partition hotspot if one user generates 1000× more events than average — add more partitions or use composite key (user_id + time_bucket) to spread the hot user."
        caveat: "Follow-up: maintaining order during retries. If processing create (offset 100) fails, the consumer must not skip to 101 — retrying a failed event while advancing the offset would process update before create. Retry the event in-place using retry topics (same as Q015), but the main consumer partition must remain paused for that user_id's events until the retry succeeds. Implement with a pause/resume per partition based on retry key. Follow-up: ordering after partition count increase. Adding partitions mid-stream breaks user_id → partition mapping. Existing messages stay on old partitions; new messages route to new partitions. Temporary disorder during the transition. Plan partition count upfront; never repartition a live topic with ordering requirements."
        watch: "Kafka guarantees ordering within a partition, not across partitions. If two users share a partition (hash collision), their events are interleaved but still ordered per-user (user A's events are in order; user B's events are in order; they don't affect each other). The consumer must track ordering per user_id, not per partition."

      - number: 6
        question: "Design a dead-letter queue system for a payment event processor. Events that fail after 3 retries must be captured, inspectable, and replayable."
        needed: "after 3 retries, publish to DLQ topic with metadata: original_topic, error_message, attempt_count; DLQ dashboard: view events, filter by error type, trigger replay; replay is idempotent"
        answer: "DLQ Kafka topic: 'payments.dlq'. Message schema: {original_message, original_topic, original_partition, original_offset, error_type, error_message, attempt_count, first_failed_at, last_failed_at}. DLQ consumer (separate consumer group) writes to a DLQ database table for dashboard queries. Dashboard allows: filter by error_type (DB_TIMEOUT, SCHEMA_ERROR, DOWNSTREAM_FAILURE), view raw message payload, trigger replay to original topic. Replay: read from DLQ DB table, publish to original topic with header 'dlq_replay: true'. Consumer idempotency (event_id deduplication) ensures safe replay."
        tradeoff: "DLQ as Kafka topic vs. DLQ as database table: Kafka topic is durable and integrates naturally with the existing pipeline. DB table is easier to query, filter, and manage from a dashboard. Best practice: use both — Kafka topic for durability/replay, DB table for inspection/alerting. The DLQ consumer bridges them. Retention: keep DLQ events for 30 days minimum (enough time for the bug to be diagnosed and fixed)."
        caveat: "Follow-up: prevent DLQ replay from triggering second set of retries. The 'dlq_replay: true' header signals the consumer to use a different code path: skip the retry logic and process directly, logging the result to the DLQ tracking table rather than republishing to the retry topic chain. Follow-up: alert on DLQ depth exceeding threshold. Kafka consumer group lag metric: if DLQ topic lag > 100 messages for > 5 minutes, fire PagerDuty. This catches systematic failures (new service deployment breaking message format) vs. transient failures (DB blip causing 3–4 retries)."
        watch: "DLQ depth is the most important observability metric for async processing systems. A growing DLQ means events are failing faster than they're being fixed. A DLQ that's been growing for 6 hours without any replay activity is a P1 incident — those payment events represent real money not being credited."

      - number: 7
        question: "Design a priority-aware Kafka consumer for an order processing system. Critical (same-day delivery) orders must always be consumed before standard orders."
        needed: "separate Kafka topics: orders-critical and orders-standard; consumer poll loop: always drain critical topic first; weighted consumer: 10 critical : 1 standard when both have messages"
        answer: "Two topics: 'orders.critical' (same-day) and 'orders.standard' (2-day+). Consumer poll loop: call poll(critical_topic) first; if messages returned, process all before calling poll(standard_topic). If critical is empty, poll standard. Weighted: use a consumer that assigns 10 processing slots to critical for every 1 slot to standard — prevents starvation while prioritizing critical. Consumer implementation: consumer.assign([critical_partition_0, ..., standard_partition_0, ...]). In each poll cycle, drain critical first; process standard only when critical is empty or a timer fires (to prevent standard starvation)."
        tradeoff: "Two topics vs. single topic with priority field: single topic loses ordering guarantees within priority levels (Kafka doesn't support per-message priority natively). Two topics with separate consumer groups allow different scaling (20 critical consumers, 5 standard consumers) and different retention policies. Downside of two topics: fan-out complexity — the API server must determine priority and publish to the right topic at submission time."
        caveat: "Follow-up: prevent standard order starvation when critical queue is always full. Add a starvation timer: if a standard message has been in the queue for > 5 minutes, promote it to critical processing regardless of queue state. Track oldest_standard_message_timestamp. Follow-up: reclassify standard → critical (customer calls). Customer service publishes a 'promote_order' event to 'orders.priority-upgrade' topic. A priority upgrade consumer reads this and republishes the order to 'orders.critical' with updated_priority flag. Consumer handles duplicate processing with idempotency key."
        watch: "The weighted 10:1 ratio means standard orders experience average wait = 10 × average_critical_processing_time. If critical processing takes 100ms, standard orders wait up to 1 second on average. Model your starvation risk: if critical queue is always at 100 messages and you process 10 critical per standard, standard orders wait 10× the critical queue drain time."

      - number: 8
        question: "Design a Kafka consumer group for processing 10M events/day from an order topic with even partition distribution and fast rebalance on pod crash."
        needed: "10 partitions, 10 consumers: one partition per consumer; cooperative sticky rebalancing; heartbeat interval 3s, session timeout 10s for fast failure detection"
        answer: "10 partitions = 10 consumer pods, one-to-one assignment. Enable cooperative sticky rebalancing (partition.assignment.strategy=CooperativeStickyAssignor): on rebalance, only reassign partitions that changed owners — other consumers continue processing uninterrupted. Heartbeat interval 3s, session.timeout.ms 10s: a crashed pod is detected within 10 seconds (Kafka broker stops receiving heartbeats) then triggers a rebalance. With cooperative rebalancing, the rebalance completes in <1 second (only 1 partition reassigned from crashed pod to surviving pods). Average rebalance time drops from 10s (EagerAssignor, which stops all consumers) to <1s (CooperativeStickyAssignor)."
        tradeoff: "Eager rebalancing (default): all consumers stop, all partitions are revoked, then reassigned. Zero-downtime impossible. Cooperative rebalancing: consumers that keep their partition assignment continue processing during rebalance. Only consumers receiving new partitions pause briefly to fetch starting offsets. This is the right choice for any production Kafka consumer group with >5 consumers."
        caveat: "Follow-up: 3 of 10 pods crash simultaneously. 3 partitions become unassigned. With 7 remaining consumers and 10 partitions, 3 consumers each get 1 extra partition (7 consumers, 10 partitions = 3 with 2 partitions, 4 with 1 partition). The rebalance triggers when the broker detects 3 missed heartbeats (10 second session timeout). Total disruption: 10 seconds detection + <1 second cooperative rebalance. Follow-up: scale to 20 consumer pods with 10 partitions. Only 10 consumers are active (each with 1 partition). The other 10 are idle — they join the consumer group but receive no partition assignments. Use them as hot standbys: 0-second rebalance time when an active consumer crashes (idle consumer takes over immediately)."
        watch: "Setting session.timeout.ms too low (e.g., 1s) causes false failures: a consumer under GC pause for 2 seconds appears dead, triggering unnecessary rebalances. session.timeout.ms = 3× heartbeat.interval.ms is a safe ratio. Under normal GC, a consumer sends heartbeats every 3s — a 10s timeout allows 3 missed heartbeats before declaring the consumer dead."

      - number: 9
        question: "Design a Kafka topic partitioning strategy for an e-commerce order event stream. Ensure events for the same order are processed in order, maximizing parallelism."
        needed: "partition key = order_id: guarantees all events for an order go to same partition; partition count = max desired parallelism; never re-partition a live topic; plan partition count for expected scale"
        answer: "Partition key = order_id (string, hashed to partition number). Each partition is processed by exactly one consumer thread at a time — ordering within each order is guaranteed. Partition count = number of desired parallel processors. For 10M orders/day at peak 1000 orders/sec, and each order generates 5 events = 5000 events/sec. With each consumer processing 500 events/sec, need 10 consumers = 10 partitions. Set 50 partitions for 5× future growth headroom — partition count cannot be increased without breaking key→partition mapping."
        tradeoff: "More partitions = more parallelism = higher throughput. But each partition is a file on the broker — 50 partitions × 3 replicas = 150 files per topic. At 1000 topics × 50 partitions = 50,000 files — manageable on modern disks. More partitions also mean longer rebalance time (each partition needs offset fetch). Balance: use 2–4× your current consumer count as partition count."
        caveat: "Follow-up: hotspot partition (one seller with 1000× normal order volume). Hash(order_id) might cluster hot orders on one partition. Mitigation: use compound partition key (order_id + random_suffix % 5) for the most active sellers — this spreads the seller's orders across 5 partitions but breaks strict ordering across those partitions. For most use cases, per-order ordering is sufficient (events for the same order are ordered, not events across orders from the same seller). Follow-up: increasing partition count on live topic. Add partitions, but existing data stays in old partitions. New messages route to new partitions. Consumer must handle offset tracking across the new partition count. Best practice: plan partition count at topic creation."

      - number: 10
        question: "Design a Kafka consumer that processes payment events exactly-once end-to-end: from Kafka to a Postgres DB, with no duplicate charges."
        needed: "Kafka transaction: read event + write to DB in same distributed transaction; DB table includes (kafka_topic, kafka_partition, kafka_offset) as unique constraint; on redelivery: INSERT fails unique constraint → idempotent no-op"
        answer: "Approach: at-least-once Kafka consumption + idempotent DB writes. On each message: INSERT INTO payment_charges (payment_id, amount, kafka_topic, kafka_partition, kafka_offset) with a unique constraint on (kafka_topic, kafka_partition, kafka_offset). If Kafka redelivers the same message (same partition + offset), the INSERT fails on the unique constraint — return success (idempotent no-op) without charging again. Commit the Kafka offset after the DB INSERT succeeds. This gives exactly-once processing without Kafka transactions' throughput penalty."
        tradeoff: "Kafka transactions (read-process-write atomically): 3× latency overhead, 1K messages/sec per transactional producer. DB deduplication (our approach): 1.2× latency overhead (one extra unique constraint check), scales to 100K messages/sec. DB deduplication is almost always the right choice for Kafka → DB pipelines. Kafka transactions are only necessary when the output is another Kafka topic (not a DB) and you need atomic produce+consume."
        caveat: "Follow-up: latency overhead of Kafka transactions. A transactional commit requires the transaction coordinator (a special broker partition) to acknowledge. Each commit is a network round trip to the broker: +2ms at p50, +20ms at p99. For payment event processing at 1K events/sec, this is acceptable. At 100K events/sec, 20ms × 100K = 2000 CPU-seconds/second of blocking — the DB deduplication approach is necessary. Follow-up: DB down during processing. Consumer pauses (doesn't commit offset). On DB recovery, consumer re-reads from last committed offset. Duplicate DB inserts are idempotent (unique constraint). No data loss, no duplicates."
        watch: "The (kafka_topic, kafka_partition, kafka_offset) unique index grows unboundedly — a row per processed message. Implement a cleanup job: DELETE FROM payment_charges WHERE kafka_offset < (current_min_committed_offset - 7_days_of_offsets). Or use a time-based cleanup: DELETE WHERE processed_at < NOW() - INTERVAL '30 days'. Archive to cold storage before deletion for audit trail."


  - slug: qb-search-indexing
    title: "Search & Indexing"
    description: "Inverted index, NRT indexing, query routing, spell correction, autocomplete, synonyms, relevance"
    number_range: "Q018–Q020, Q081, Q108–Q109, Q145"
    questions:
      - number: 1
        question: "Design the inverted index update strategy for a news search engine. Breaking news must be searchable within 5 seconds of publication."
        needed: "near-real-time (NRT) indexing: in-memory buffer flushed every 1s; segment merge happens async; separate 'hot' index (last 24h) from 'cold' index (older)"
        answer: "Elasticsearch NRT indexing: documents written to an in-memory segment, flushed to disk every 1 second (refresh_interval=1s). After flush, the segment is searchable — not after merge. The 1-second refresh is your 5-second SLA's main lever. For breaking news, set refresh_interval=500ms on the hot index. The hot index covers the last 24 hours with a shorter refresh interval; the cold index covers older content with 30-second refresh (less write overhead). Segment merge (Lucene background operation) consolidates small segments — it doesn't affect searchability. Documents are visible after flush, not after merge."
        tradeoff: "1-second refresh vs. 30-second refresh: each refresh creates a new Lucene segment (file I/O). With 1s refresh and 1000 documents/minute, you create 60 segments/minute — the segment merge thread is busy merging constantly. For write-heavy workloads, reduce refresh interval to 10 seconds to reduce merge pressure. For 5-second searchability SLA, 1-second refresh is necessary. Separate hot/cold indices allows per-index tuning."
        caveat: "Follow-up: article updated 3 times in 10 seconds. Elasticsearch handles updates as delete + insert. The original document is marked deleted (tombstone) in the old segment; the new version is in the new segment. Both exist until merge cleans up the tombstone. Search sees the latest version (highest version number wins). Follow-up: NRT consistency — can you miss an article? Yes: between publish and the next 1-second refresh, the document is not searchable. For a 5-second SLA, this 1-second window is within tolerance. If strict 0-delay searchability is required, use the real-time GET API (hits the shard directly, bypassing the refresh cycle) but this only works for ID-based lookups."
        watch: "The refresh_interval setting has a massive impact on indexing throughput. At refresh_interval=1s, each refresh creates a segment requiring a file open, write, and fsync. At 1000 docs/sec, you get 1000 segments/minute before merge. The merge thread CPU usage can reach 100% on a single core. Monitor merge_current and merge_throttle metrics — if throttling is active, indexing latency increases. Set the refresh interval as high as your SLA allows."

      - number: 2
        question: "Design the query routing strategy for an Elasticsearch cluster with 20 shards. Some shards are hot (news), some cold (archive). Route queries to minimize latency."
        needed: "index lifecycle policy: hot → warm → cold → frozen nodes; preference routing: send queries to node with matching shard for cache locality; async search for cold queries"
        answer: "ILM (Index Lifecycle Management) policy: hot phase (SSD nodes, latest 7 days), warm phase (HDD nodes, 7–90 days, read-only, force-merged to 1 segment for query efficiency), cold phase (HDD nodes, 90 days+, compressed), frozen phase (S3-backed, only kept in cache when queried). Route queries using the 'preference' parameter: ?preference=_local routes to the local node first (cache locality), ?preference=_shards:1,2 routes to specific shards. For cold/frozen queries (archive search), use async search: POST /_async_search returns job_id; client polls GET /_async_search/{id}. Response times: hot = <100ms, warm = 200–500ms, cold = 2–5s, frozen = 30–60s."
        tradeoff: "Single index vs. time-based index rotation: single index means all 20 shards hold mixed hot/cold data — routing is impossible. Time-based indices (daily, weekly) allow ILM to tier entire indices to warm/cold nodes automatically. At the cost of cross-index queries for date-range searches (fan-out across multiple index aliases), which Elasticsearch handles natively but with higher coordinator overhead."
        caveat: "Follow-up: query spanning hot and cold shards. Fan-out across all shards, merge results at the coordinator. Latency = max(hot_shard_latency, cold_shard_latency) = dominated by cold shard (2–5s). For user-facing queries, restrict to hot index by default (last 7 days). Provide an explicit 'search archive' option with warning about slower response. Follow-up: rebalance when hot node added. Elasticsearch automatically rebalances shards to the new node via shard allocation. 'move' operations: live read continues from old location while Lucene segments are copied. No query disruption. Monitor shard recovery progress with GET /_cat/recovery."
        watch: "Shard sizing rule: 50GB is the sweet spot for a shard. Too large (>100GB) = slow queries, slow recovery. Too small (<1GB) = too many segments, too much merge pressure, too many open file handles. For a news archive growing at 1TB/month, use monthly time-based indices with 20 shards each = 50GB per shard."

      - number: 3
        question: "Design the spell-correction component for product search. 'iphone chargar' should return results for 'iphone charger' without adding more than 50ms latency."
        needed: "precomputed correction dictionary from query logs; edit distance 1 check only if original query returns 0 results; Symspell algorithm for O(1) lookup"
        answer: "Symspell precomputes all edit distance 1 and 2 variants of dictionary words at index time (one-time cost). Lookup is O(1): hash the misspelled word, find it in the precomputed variants table, return the original word. Dictionary built from: (1) product catalog — all product names, brands, and models. (2) Query logs — the most frequent queries (top 1M) with their click-through rates. (3) Wikipedia/web corpus for common English words. Two-pass strategy: run original query first; if results > 0, skip spell correction (avoid over-correcting correct niche terms). If 0 results, apply Symspell correction and rerun. Total overhead: 2ms for Symspell lookup + rerun latency if correction applied — well within 50ms."
        tradeoff: "Symspell (O(1) lookup, high memory) vs. BK-tree (O(log N) lookup, low memory): Symspell precomputes 20–40 variants per word. 1M word dictionary × 30 variants × 15 bytes = 450MB RAM. BK-tree uses 10MB but takes O(log N) = 20 comparisons per lookup at 200ns each = 4µs — negligible compared to 50ms SLA. Both are fast enough; choose Symspell for simplicity, BK-tree for memory-constrained environments."
        caveat: "Follow-up: building the correction dictionary. Primary source: query logs with click data. 'iphone chargar' → user clicked 'iphone charger' result → correction pair (chargar → charger). Secondary source: product catalog. Third: spell-checked corpus. Reweight by frequency and recency. Follow-up: new product name that spell-checker incorrectly corrects. 'airpods pro max' is correct but spell-checker might suggest 'airport pro max'. Fix: add product names and brand names to the dictionary with zero edit distance — they're never corrected. Also add explicit 'never correct' list for known product names."
        watch: "Spell correction should only trigger on 0-result queries, not on all queries. Applying spell correction to a correct query like 'pro' (user wants Pro MacBook) that returns results would incorrectly change it to 'bro'. The two-pass strategy (correct only on 0 results) prevents over-correction and is standard in production search systems."

      - number: 4
        question: "Design the autocomplete suggestions API for a food delivery app. User types 'piz' — return top-5 matching dishes and restaurants within 300ms."
        needed: "prefix-indexed suggestions in Redis ZSET scored by popularity; geo-filter: only restaurants within 10km (pre-filter by geohash); personalization: boost recently ordered items"
        answer: "Redis sorted set per prefix length: 'suggest:piz' → {member: 'Pizza Hut', score: 95000} (score = popularity × geo_proximity_factor). Pre-populate all prefix keys at write time: when 'Pizza Hut' is added, ZADD 'suggest:pi' 95000 'Pizza Hut', ZADD 'suggest:piz' 95000 'Pizza Hut', ZADD 'suggest:pizz' 95000 'Pizza Hut', etc. On query: ZREVRANGEBYSCORE 'suggest:piz' +inf -inf LIMIT 0 5. Geo pre-filter: only include restaurants in the user's city shard (geohash prefix). Personalization: at query time, boost score for recently ordered items by multiplying their base score by 1.5 and re-merging with ZUNIONSTORE."
        tradeoff: "Redis prefix sorted sets vs. Elasticsearch prefix query: Redis ZREVRANGEBYSCORE is O(log N + k) where k is result count — sub-millisecond. Elasticsearch prefix query does a linear scan through the terms index — 5–50ms. For autocomplete latency < 50ms, Redis is the right choice. Memory cost: each character adds a ZADD operation to all prefix sets. A restaurant name of 15 characters adds 15 ZADD operations. With 10M restaurant names, each 15 chars, this uses ~15GB of Redis memory — shard across multiple Redis nodes."
        caveat: "Follow-up: updating suggestion scores when a new dish becomes popular. Background job runs every 15 minutes: recompute popularity scores from order volume in the last 24 hours, then ZADD with the new score (ZADD with NX=false updates in place). Trending dishes bubble up in autocomplete within 15 minutes. Follow-up: unavailable restaurant (closed). Restaurant closed → remove from suggest sets: ZREM 'suggest:{prefix}' 'Restaurant Name' for all prefix lengths. Or add availability as a boolean field and filter at query time: ZREVRANGEBYSCORE with a score filter that excludes closed restaurants (score = -1 for closed)."
        related_fundamentals: [storage/redis]

      - number: 5
        question: "Design an Elasticsearch index mapping for a product catalog with 10M products. Fields: name (searchable), price (range filter), category (exact match), description (searchable, not returned)."
        needed: "name: text with keyword sub-field for sorting/aggregation; price: scaled_float; description: text with store: false (analyzed but not returned in _source)"
        answer: "Mapping: name: {type: text, analyzer: standard, fields: {keyword: {type: keyword, ignore_above: 256}}} — dual mapping enables full-text search on the text field and exact-match/sort on the keyword sub-field. price: {type: scaled_float, scaling_factor: 100} — stores price × 100 as long (avoids floating-point rounding: $9.99 stored as 999). category: {type: keyword} — exact match only, no analysis. description: {type: text, store: false} — store: false means description is indexed for search (tf-idf scoring, analyzed) but excluded from _source, so it's never returned in API responses. Saves bandwidth on product listing APIs."
        tradeoff: "text vs. keyword for name: text enables full-text search (partial match, stemming) but cannot aggregate or sort. keyword enables exact-match and aggregation but no partial matching. The dual-mapping (text + keyword sub-field) gives both: search with text, aggregate and sort with keyword. Memory cost: storing both versions uses ~2× memory per field. For name field on 10M products, negligible."
        caveat: "Follow-up: multilingual product names. Add a language-specific analyzer per language: name.en (english analyzer, stems English words), name.fr (french analyzer), name.de (german analyzer). At query time, match the user's locale to the appropriate sub-field. Follow-up: adding new field to 10M existing documents without downtime. Elasticsearch allows adding new fields to the mapping dynamically without reindexing. Existing documents lack the new field but aren't broken — queries on the new field simply return no results for old documents. If the new field requires backfill: use reindex API (reindex from source to destination index with new mapping) — live reads go to the source index during reindex."
        watch: "The store: false optimization for description is significant at scale. A typical product description is 500 bytes. Storing 10M descriptions in _source = 5GB. With store: false, that 5GB is removed from the response payload — reducing bandwidth and Elasticsearch heap pressure from _source serialization. Always exclude large text fields from _source if they're not needed in API responses."

      - number: 6
        question: "Design a relevance tuning strategy for a job search engine. 'Python developer Bangalore' should rank Python-heavy, Bangalore-based jobs above others — while showing remote Python jobs."
        needed: "BM25 base score + function score boosting: city_match×2.0, experience_match×1.5; geo decay function: reduce score for remote jobs; A/B test new boost weights"
        answer: "Query: BM25 full-text on (title, description, skills) combined with function_score: city_match_boost=2.0 (multiply score by 2 if job.city == query.city), experience_match_boost=1.5 (multiply if experience range overlaps user profile). Geo decay for remote jobs: gauss decay function on distance (if job has coordinates), applying 0.7× score factor at 100km. Final score = BM25 × city_match_boost × experience_boost × geo_decay. Remote jobs (no city) receive a 0.8× penalty unless the query explicitly includes 'remote'. Results: Bangalore Python jobs rank 2× higher than remote Python jobs of equal BM25 relevance."
        tradeoff: "Static boosting (fixed multiply factors) vs. learning-to-rank (ML model predicts relevance from features): static boosting is interpretable and fast. Learning-to-rank (LambdaMART, XGBoost) learns boost weights from click data — more accurate but requires labeled training data and a model serving pipeline. Start with static boosts; graduate to learning-to-rank when you have >100K click events per day."
        caveat: "Follow-up: preventing keyword-stuffed description from ranking top. Add a field-norm penalty: Elasticsearch BM25 already applies field-length normalization (longer documents are penalized per term to prevent keyword stuffing). Increase 'b' parameter in BM25 (controls field-length normalization) from default 0.75 to 0.9 to stronger penalize long descriptions. Follow-up: offline metrics for tuning boost weights before A/B testing. Compute NDCG (Normalized Discounted Cumulative Gain) on a held-out set of queries with manually labeled relevance judgments. Test different boost weight combinations offline; only A/B test the top-3 configurations that improve NDCG."
        watch: "A/B testing relevance changes requires careful design: the treatment group must receive consistent ranking (same user always gets same ranking) to measure behavior changes. Use a user-ID hash to assign to control/treatment consistently across sessions. Measure CTR, apply rate (applied to a job listing), and 7-day return rate (did the user come back?) — not just immediate CTR."

      - number: 7
        question: "Design a synonym expansion system for a product search. 'mobile' should match 'phone', 'smartphone'. Updates must take effect within 5 minutes."
        needed: "Elasticsearch synonym token filter in analyzer configuration; synonyms stored in file on ES nodes; reload analyzer without reindexing; two-way synonyms"
        answer: "Synonym filter configuration in the index analyzer: filter: {synonyms: {type: synonym_graph, synonyms: ['mobile,phone,smartphone', 'tv,television,telly']}}. Synonym file stored on all ES nodes: synonyms.txt. To update: (1) Update synonyms.txt on all nodes. (2) POST /{index}/_reload_search_analyzers — reloads the synonym filter without reindexing. Two-way synonyms: 'mobile,phone,smartphone' expands all three to the same token set — searching 'phone' returns documents containing 'mobile' or 'smartphone'. One-way synonyms: 'iphone => apple iphone' — searching 'iphone' expands to 'apple iphone' but not vice versa. Use one-way for brand aliases."
        tradeoff: "Query-time synonym expansion vs. index-time expansion: query-time (synonym_graph filter at search) means existing index is unchanged — update synonyms by reloading analyzer, affects all future queries immediately. Index-time expansion indexes all synonym variants for each document — query is simpler but requires full reindex when synonyms change. Query-time is always preferred for rapidly-changing synonym sets."
        caveat: "Follow-up: prevent incorrect synonyms (mobile adjective vs mobile device). Add part-of-speech disambiguation: if query contains 'mobile [noun]' (e.g., 'mobile phone'), expand; if 'mobile [adjective]' (e.g., 'mobile home'), don't. Requires a more sophisticated NLP pipeline (spaCy POS tagging) at query time. Simpler approach: maintain a blocklist of ambiguous terms that should never be expanded. Follow-up: test synonym set before production deployment. Deploy to a staging ES cluster, run regression queries (queries where correct results are known), compare ranking before/after synonym change using NDCG. Promote to production only if NDCG ≥ baseline."
        watch: "Synonym expansion increases query recall (more results) at the cost of precision (more irrelevant results). Monitor click-through rate and bounce rate before and after synonym changes. A synonym that increases CTR is good; one that increases bounce rate is harmful. Deploy synonyms with A/B testing framework, not all-at-once."


  - slug: qb-payments-txn
    title: "Payments & Transactions"
    description: "Idempotency, UPI timeout handling, distributed sagas, double-spend prevention"
    number_range: "Q021–Q023"
    questions:
      - number: 1
        question: "Design the idempotency key check for Razorpay. A client retries a payment with the same key. Your service is stateless across 20 pods. Guarantee exactly-one charge."
        needed: "idempotency store: Redis/DB keyed by idempotency_key with TTL 24h; store: {request_hash, response, status} on first attempt; on retry: return cached response if request_hash matches; 422 if hash differs"
        answer: "On first request: INSERT INTO idempotency_keys (key, request_hash, status='processing', created_at) — SELECT FOR UPDATE to prevent concurrent inserts. Execute payment charge. UPDATE status='completed', response=... On retry: SELECT idempotency_keys WHERE key = $1. If status='completed': return cached response (200). If status='processing': the original is still in-flight — return 409 Conflict (see caveat). If request_hash differs from stored hash: return 422 Unprocessable (different request with same key). TTL 24h: after 24 hours, the key expires and the request is treated as new. Use DB (not Redis) for idempotency keys in payment systems — payments require durable storage, not in-memory (Redis can lose data on crash)."
        tradeoff: "DB vs. Redis for idempotency store: Redis is faster (1ms vs 5ms) but can lose in-flight keys on crash. For payments, a lost idempotency key means a duplicate charge — catastrophic. Use Postgres with a unique index on idempotency_key. Postgres ensures durability and the unique constraint prevents concurrent inserts for the same key (only one pod processes a given key even with 20 concurrent pods)."
        caveat: "Follow-up: first attempt still in-flight when retry arrives. Return 409 Conflict with Retry-After: 5 seconds header. The client knows to wait and retry. If the client retries immediately: still 409. This prevents two simultaneous charges. The first attempt will eventually complete (or fail) and update the status. Follow-up: prevent two simultaneous retries from both executing the charge. DB SELECT FOR UPDATE: the first pod acquires a row lock. The second pod's SELECT FOR UPDATE blocks until the first pod releases the lock (after INSERT + status update). Only one pod ever sets status='processing' for a given key."
        watch: "The request_hash is crucial: it prevents a client from sending a request for $100, getting an error, then retrying with a request for $1000 using the same idempotency key. Hash the entire request body (amount, currency, customer_id, etc.) using SHA-256. If hashes differ, reject with 422 — the client must generate a new idempotency key for a different request."

      - number: 2
        question: "Design the timeout handling for a UPI transaction. The bank API takes 30 seconds to respond. How do you handle the user waiting, without double-charging on retry?"
        needed: "async flow: initiate txn → return txn_id → client polls for status; timeout at 30s → mark txn as 'unknown' — never debit until confirmed; reconciliation job: check bank's status API every 5s for 'unknown' txns"
        answer: "Async UPI flow: (1) Client submits payment → service generates txn_id, stores {txn_id, status='initiated', amount, user_id} in DB, returns txn_id immediately (200ms response). (2) Background worker calls bank API with a 30-second timeout. On success: UPDATE status='completed', debit user account. On timeout: UPDATE status='unknown'. (3) Reconciliation job runs every 5 seconds: SELECT WHERE status='unknown'. For each, call bank's status inquiry API. If bank confirms success: complete the debit. If bank confirms failure: mark as 'failed', refund any debit. If bank still pending: keep as 'unknown', retry after 5s for up to 30 minutes. (4) Client polls GET /payment/{txn_id}/status every 3 seconds."
        tradeoff: "Synchronous UPI (block user for 30s) vs. async with polling: synchronous means HTTP connection held open for 30 seconds. At 10K concurrent UPI transactions × 30s each = 300,000 open connections — exhausts web server thread pool and client patience. Async flow uses a callback or polling mechanism, keeping HTTP connections short-lived. All payment APIs at scale use async flows."
        caveat: "Follow-up: telling user 'we don't know yet' without triggering retry. Show a 'Payment in progress — do not close this page' UI with a spinner and a progress bar. Poll every 3 seconds; update the UI on each status change. Disable the 'Pay' button until the status resolves. Provide a clear status message: 'We're confirming your payment with your bank — this may take up to 5 minutes.' Follow-up: how long to keep a transaction in 'unknown'. 30 minutes is the industry standard for UPI. After 30 minutes, if bank hasn't confirmed, mark as 'failed' and notify the user. The user can retry. Banks typically resolve within 10 minutes; 30 minutes covers edge cases."
        watch: "The 'unknown' state is intentional — debiting the user before bank confirmation risks charging them for a failed transaction. Never debit on initiation; only debit on bank confirmation. This is the core of payment correctness. An 'unknown' transaction that resolves as 'failed' costs a refund processing fee (~$0.10) — much cheaper than a chargebacks from incorrect debits."

      - number: 3
        question: "Design a distributed saga for a hotel+flight booking that charges two separate payment APIs. If either fails, both must be rolled back automatically."
        needed: "choreography saga: each service emits success/failure event; compensating transactions: hotel.cancel(), flight.cancel() on failure; saga log persisted to DB so incomplete sagas can be resumed on restart"
        answer: "Orchestrator saga (preferred over choreography for complex flows): a BookingOrchestrator service manages the saga state machine. Steps: (1) ChargeFlightPayment — if success, proceed; if failure, saga complete (nothing to rollback). (2) ChargeHotelPayment — if success, saga complete; if failure, trigger compensating step. (3) Compensating: RefundFlightPayment. Saga state persisted in DB: {saga_id, step, status, payload}. If orchestrator crashes mid-saga, on restart: SELECT incomplete sagas WHERE status != 'complete', resume from last successful step. Each step is idempotent (idempotency key per step)."
        tradeoff: "Choreography (each service reacts to events, no central coordinator) vs. orchestrator (central service drives the flow): choreography is decentralized and resilient to coordinator failure, but tracing saga state across events is complex. Orchestrator is easier to debug (single saga state machine) but creates a central coordinator that must be resilient (HA deployed). For 3+ steps with complex compensating logic, orchestrator is easier to reason about and maintain."
        caveat: "Follow-up: compensating transaction (hotel.cancel) itself fails. Mark the saga step as 'compensation_failed' in the DB. Alert on-call with the saga_id and failed step. An SRE manually investigates: retry the compensation, contact the hotel API, or issue a manual refund. Don't retry compensations automatically more than 3 times — after 3 failures, the issue is systemic (hotel API down, invalid account) and requires human judgment. Follow-up: surface partial failure to user. Show 'Your booking is being processed — please wait' while the saga runs. On compensation complete: show 'Booking failed — your payment has been refunded.' On compensation failure: 'Booking failed — please contact support. Reference: {saga_id}'. Never hide partial failures from the user."
        watch: "A saga does not provide ACID isolation — between the point where flight is charged and hotel is charged, another saga can observe the intermediate state (flight charged, hotel not yet). This is acceptable for bookings (the intermediate state is brief) but unacceptable for financial ledger entries (which need strict atomicity). Use 2PC for financial debits; use sagas for multi-service business flows that span minutes."


  - slug: qb-location-geo
    title: "Location & Geo"
    description: "Geospatial indexing, geofencing, demand heatmaps, last-known location"
    number_range: "Q024–Q025, Q117–Q118"
    questions:
      - number: 1
        question: "Design the geospatial index for finding the 5 nearest available Uber drivers to a rider. 1M drivers update location every 4 seconds."
        needed: "Redis GEOADD per driver update, GEORADIUS for nearest search; geohash prefix indexing; driver TTL: remove from index if no update for 30s"
        answer: "Redis GEO commands: GEOADD 'drivers' lng lat driver_id on each location update. GEORADIUSBYMEMBER 'drivers' rider_lat rider_lng 5 km WITHCOORD COUNT 5 ASC finds the 5 nearest drivers within 5km. Driver TTL: EXPIRE 'driver:{driver_id}' 30 on each location update — if no update for 30 seconds, the key expires. Run ZREM 'drivers' driver_id in the expiry event (via Redis keyspace notifications) to remove from the geo index. At 1M drivers updating every 4 seconds: 250K GEOADD ops/sec — requires Redis Cluster with geographic sharding (shard by city or geohash prefix)."
        tradeoff: "Redis GEO (O(log N) geospatial queries) vs. PostGIS (full SQL spatial queries): Redis GEO gives GEORADIUS results in <1ms; PostGIS with spatial index gives results in 10–100ms. For real-time driver matching at 1000 match requests/sec, Redis is necessary. PostGIS is better for analytics (polygon intersections, complex spatial joins). Use Redis for real-time matching, PostGIS for reporting."
        caveat: "Follow-up: avoid showing a driver who just accepted another ride. On ride acceptance, immediately ZREM 'drivers' driver_id and set driver status to 'busy' in a Redis hash. The GEORADIUS query won't return this driver because they've been removed from the GEO set. The status hash ('driver:{driver_id}:status' = busy) provides a second check for any race conditions. Follow-up: 0 drivers in radius — expand or return 'no cars'. Expand radius progressively: try 2km, 5km, 10km, 20km. If no drivers within 20km, return 'no cars available in your area'. Cap expansion to avoid absurd matches (a driver 50km away won't arrive for an hour)."
        related_fundamentals: [storage/redis, storage/geospatial]

      - number: 2
        question: "Design a geofence entry/exit detector for Swiggy. When a delivery agent enters a 100m zone around a restaurant, trigger 'agent arrived' event. 50K active agents."
        needed: "agent location update → check membership in registered geofences (S2/R-tree); state machine per (agent, geofence): outside → inside → outside; debounce: require 2 consecutive inside readings before firing"
        answer: "Geofence storage: each restaurant has a geofence polygon/circle stored in a spatial index (Redis GEO or in-memory R-tree). On each location update (every 5s for active agents): (1) Identify candidate geofences near the agent's new location using a bounding-box pre-filter (geohash prefix lookup). (2) For each candidate, check if agent coordinates are inside the geofence polygon. (3) Check previous state for (agent_id, geofence_id) in Redis hash: was inside? now outside? = exit event. Was outside? now inside? = candidate for entry. (4) Debounce: require 2 consecutive 'inside' readings before firing 'agent arrived' event. State machine per (agent, geofence) in Redis: {agent_123:geofence_456: inside|outside|candidate_inside}."
        tradeoff: "Server-side geofencing (check on every location update) vs. client-side (agent app checks its own location against downloaded geofences): server-side is more accurate (server has ground truth of all geofences) but requires 50K location updates/5s = 10K updates/sec to the geofence service. Client-side reduces server load but requires syncing geofences to the device and trusting the device (spoofing risk). For food delivery, client-side is acceptable (no financial incentive to spoof location); for fraud detection, server-side is required."
        caveat: "Follow-up: GPS jitter causing agent to flicker across boundary. Debounce with 2 consecutive readings: the state machine only transitions from 'outside' to 'candidate_inside' on the first inside reading, then to 'inside' (and fires the event) on the second consecutive inside reading. A single jitter doesn't trigger the event. If two readings are 5 seconds apart and the agent is near the boundary, 2 inside readings = 10 seconds minimum before event fires — acceptable for 'agent arrived' use case. Follow-up: index 100K geofences for O(log n) lookup. Use an R-tree: each geofence's bounding box is inserted as a leaf node. Query: find all geofences whose bounding box overlaps the agent's location. O(log n + k) where k is candidate geofences. Redis natively supports this with GEORADIUS queries (circular geofences). For polygon geofences, use PostGIS or an in-memory R-tree library."
        related_fundamentals: [storage/geospatial, storage/redis]

      - number: 3
        question: "Design the 'last known location' storage for a delivery tracking app. 500K active agents update GPS every 5 seconds. Fetch last location for an agent in under 10ms."
        needed: "Redis HSET 'location:{agent_id}' lat lon updated_at — O(1) write and read; TTL on key: auto-expire after 60s of no update; async persist to DB every 60s for historical replay"
        answer: "HSET 'loc:{agent_id}' lat 12.9716 lon 77.5946 ts 1710000000. O(1) read: HGETALL 'loc:{agent_id}' returns in <1ms. EXPIRE 'loc:{agent_id}' 60 on each update — if no update for 60 seconds, key auto-expires (agent offline). At 500K agents updating every 5 seconds: 100K HSET ops/sec. Redis Cluster with 10 nodes handles 1M ops/sec total — comfortable. Background job every 60s: read all active location keys, write to DB (location_history table) for historical playback. DB write is async and non-blocking for real-time reads."
        tradeoff: "Redis HSET per agent vs. Redis GEO (GEOADD) per agent: GEO is better for nearest-driver queries (GEORADIUS), HSET is better for single-agent lookups (HGETALL is faster than GEOPOS because no coordinate conversion). Use both: HSET for individual agent lookups, GEO for spatial queries. The dual write (HSET + GEOADD on each update) adds 2 Redis commands per update but enables both use cases."
        caveat: "Follow-up: 'last seen 5 minutes ago' when agent goes offline. When key expires (agent offline), the last update timestamp is in the DB (persisted every 60s). Read from DB: SELECT updated_at WHERE agent_id = X ORDER BY updated_at DESC LIMIT 1. Display 'last seen {now - updated_at} ago'. Follow-up: stuck GPS (same coordinates repeated). Detect by comparing current lat/lng to previous value in Redis: if equal for 3+ consecutive updates (15 seconds), set a 'gps_stuck' flag. Alert the agent through the app. For purposes of delivery tracking, mark the agent as 'location uncertain' in the UI."
        related_fundamentals: [storage/redis, storage/geospatial]

      - number: 4
        question: "Design a geo-based demand heatmap for Uber, updated every 30 seconds. Show zones with high rider demand to drivers so they can reposition."
        needed: "bucket incoming ride requests into S2 cells (level 12 ~ 600m radius); count requests per cell in 5-minute sliding window; heatmap computed every 30s: rank cells by count, return top-50 as JSON to drivers"
        answer: "S2 cell level 12 (~600m radius, ~1.1M cells globally). On each ride request: INCR 'demand:{s2_cell_l12}:{current_5min_bucket}'. Background job every 30 seconds: SCAN all 'demand:*:{current_bucket}' keys, rank by count, select top-50 cells. Encode as GeoJSON polygon array with demand score per cell. Push to drivers via WebSocket or return on next location update poll. Each cell key has TTL = 10 minutes (covers current + previous 5-min window). Memory: at peak, 10K active cells × 10 bytes/key = 100KB total."
        tradeoff: "S2 cells vs. arbitrary grid: S2 cells have equal area at the same level and tessellate without gaps. A fixed lat/lng grid has cells that vary in real-world size (cells near the poles are smaller). S2 is the industry standard for geo-indexing (used by Uber, Google, Foursquare). Level selection: L12 (600m) is right for Uber surge zones — small enough to be actionable for driver repositioning, large enough to aggregate meaningful demand signals."
        caveat: "Follow-up: sudden demand spike in 10 cells simultaneously (concert end). All 10 cells see demand spike simultaneously. The 30-second aggregation job picks them all up in the next run. Response time: spike happens at T=0, next aggregation job runs at T=30s, drivers receive updated heatmap at T=30s. For faster response to spikes, reduce aggregation interval to 10s — increases Redis load by 3× but improves responsiveness. Follow-up: driver already in high-demand zone. The heatmap shows demand, not driver density. Add a 'supply-demand ratio' field: demand_count / available_drivers_count per cell. Show drivers in oversupplied cells a lower priority score, even if demand is high. This prevents all drivers from rushing to the same location."
        related_fundamentals: [storage/redis, storage/geospatial]


  - slug: qb-database
    title: "Database Design"
    description: "Sharding, read replica routing, online index migrations, soft delete, connection pooling, upsert, CDC"
    number_range: "Q028–Q030, Q062–Q063, Q092–Q093, Q110, Q131–Q132, Q148"
    questions:
      - number: 1
        question: "Design the sharding key selection for WhatsApp message storage. Users must fetch their last 30 messages in under 50ms."
        needed: "shard by user_id: all messages for a user on one shard; composite sort key: (user_id, timestamp DESC) for fast range scan; avoid shard by message_id"
        answer: "Shard by user_id (or conversation_id for group chats): all messages for user A on shard 3, all for user B on shard 7. This allows a single-shard query for 'last 30 messages for user A': no cross-shard scatter-gather. Sort key within the shard: (user_id, timestamp DESC) — a range scan from the latest timestamp backwards returns exactly 30 rows without full-table scan. Composite key index: CREATE INDEX ON messages (user_id, timestamp DESC). DynamoDB: partition key = user_id, sort key = timestamp."
        tradeoff: "Shard by user_id vs. shard by message_id: message_id sharding distributes writes evenly (sequential IDs → sequential shards) but scatters a user's messages across all shards. Fetching 'last 30 messages for user A' requires querying all N shards and merging — O(N) fan-out at read time. For WhatsApp-scale (100B messages, 50M active users), user-based sharding is correct: O(1) read latency. Write distribution is good enough because writes are distributed by user_id hash."
        caveat: "Follow-up: power user with 10M messages on one shard (hotspot). A single power user generates more storage but not necessarily more read load — each user is still fetching their own messages on one shard. The hotspot is a storage problem, not a query problem. Mitigate: archive messages older than 1 year to cold storage (S3/Glacier), keeping only recent 1M messages per user in the hot shard. Follow-up: group chat thread with users on different shards. Group chat messages can be stored by conversation_id (shard by conversation_id, not user_id). Each group chat is on one shard. Members query the conversation shard for group messages and their own user shard for direct messages."
        related_fundamentals: [storage/dynamodb, storage/sharding]

      - number: 2
        question: "Design the read replica routing strategy for a MySQL setup with 1 primary and 3 replicas. Analytics queries must not go to primary; user-facing reads must not go to lagged replicas."
        needed: "tag replicas: 'analytics' vs 'user-facing'; lag check before routing: reject replica if Seconds_Behind_Master > 2; sticky routing for read-after-write: route to primary for 500ms after a write"
        answer: "Replica tagging: replica-1 and replica-2 are tagged 'user-facing'; replica-3 is tagged 'analytics'. Lag monitoring: each replica reports Seconds_Behind_Master. Connection proxy (ProxySQL or HAProxy): routing table: if lag > 2s → remove replica from user-facing pool, add to degraded pool (or route to primary). Analytics replica: accept lag up to 5 minutes (analytics queries tolerate stale data). Read-after-write: on write, tag the current connection with last_write_ts = now. For the next 500ms, route this connection's reads to the primary. After 500ms, assume replication has caught up (typical replication lag < 100ms in healthy setup)."
        tradeoff: "ProxySQL (application-transparent proxy) vs. application-level routing: ProxySQL intercepts all MySQL connections, routing transparently. Application code changes zero. Lag checking is built-in. Downside: ProxySQL is an additional infrastructure component. Application-level routing: flexible, configurable per query, but requires code in every service. For a multi-service architecture, ProxySQL is preferred to avoid duplicating routing logic."
        caveat: "Follow-up: all user-facing replicas are lagged. Fallback: route all user-facing reads to the primary. Alert on-call: this means all reads hit the primary, which can saturate it. Capacity plan: primary can handle ~2× steady-state load (both reads and writes) for a 30-minute window while replicas recover. Follow-up: silent lag (replica lagged but not reporting). Implement an active lag check: write a timestamp to a probe table on the primary every 5s; read from the replica and check if it reflects the timestamp. If probe timestamp is older than 2s, the replica is silently lagged. This is more reliable than trusting Seconds_Behind_Master (which can be inaccurate for certain replication errors)."
        related_fundamentals: [storage/dynamodb]

      - number: 3
        question: "Design a zero-downtime index addition on a MySQL table with 200M rows used by a live production API."
        needed: "gh-ost: shadow table with triggers, backfills in background; monitor replication lag during backfill; cutover: brief lock swap, typically < 1s"
        answer: "Use gh-ost (GitHub's Online Schema Change tool): (1) gh-ost creates a shadow table with the new index. (2) Installs change-data-capture triggers on the original table (INSERT/UPDATE/DELETE events are replicated to the shadow table). (3) Backfills the shadow table in chunks of 1000 rows with throttling — pauses if replica lag > 5s to protect replication. (4) Cutover: briefly locks the original table (< 1s), swaps the table name atomically, drops the triggers. Live traffic is paused for < 1 second. Application sees the original table name with the new index after cutover."
        tradeoff: "gh-ost vs. pt-online-schema-change (Percona): both use shadow table + triggers approach. gh-ost uses the binary log for change capture instead of triggers — less write overhead on the primary. pt-osc uses triggers (adds write overhead). For tables with heavy write load (> 5K writes/sec), gh-ost's binlog approach causes less overhead. For tables with light writes, either works."
        caveat: "Follow-up: validate new index is being used after cutover. Run EXPLAIN SELECT ... WHERE your_new_column = X — check 'key' column in EXPLAIN output shows the new index name, not NULL or another index. Use pt-query-digest on MySQL slow log to confirm queries that should use the new index are running faster (latency drop). Follow-up: rollback if cutover causes lock contention. gh-ost supports a '--postpone-cut-over-flag-file' — touch the file to pause before cutover. If dry-run shows contention, abort before the swap. gh-ost's cutover is atomic and fast enough that rolling back (by dropping the shadow table) is the safer option if anything goes wrong."
        related_fundamentals: [storage/dynamodb]

      - number: 4
        question: "Design the connection pool configuration for a Python service on Kubernetes with 20 pods connecting to PostgreSQL with max_connections=200."
        needed: "pool size per pod = (max_connections - reserved) / num_pods = ~8; use PgBouncer as sidecar; min pool size: 2; max: 8"
        answer: "PgBouncer sidecar in transaction pooling mode: each pod's PgBouncer connects to Postgres with a pool of up to 8 connections. 20 pods × 8 connections = 160 connections. Reserve 40 connections for admin and monitoring tools. Application → PgBouncer (1000s of application connections multiplexed) → Postgres (max 8 connections per pod). Transaction pooling: a Postgres connection is held only for the duration of a transaction, then returned to the pool — enabling 1000 application connections to share 8 Postgres connections. This is the correct architecture for Python WSGI/ASGI servers with high concurrency."
        tradeoff: "Direct connection pooling (SQLAlchemy pool_size=8) vs. PgBouncer: SQLAlchemy pool holds Postgres connections for the lifetime of the process (session pooling). Each pod holds 8 idle Postgres connections even during low traffic. PgBouncer transaction pooling multiplexes — a connection is released to the pool immediately after the transaction commits. PgBouncer is more efficient by 2–3× in terms of Postgres connections used during mixed traffic."
        caveat: "Follow-up: rolling restart temporarily runs 25 pods (20 old + 5 new during rollout). 25 × 8 = 200 connections — exactly at max_connections. During this 2-minute window, new connections from additional tools (migrations, admin queries) will fail with 'too many connections'. Mitigate: reserve more connections (set max pod connections to 7 to handle 28 pods × 7 = 196). Or use PgBouncer with a global max_connections cap that prevents exceeding 180 regardless of pod count. Follow-up: traffic spike 5× during peak hours. PgBouncer queues excess connections: at 5× traffic, 5× more application-level connections attempt to acquire Postgres connections. PgBouncer queues them with a configurable timeout (server_login_retry). The Postgres connections are reused more intensively; latency increases but connections don't fail."
        related_fundamentals: [storage/dynamodb]

      - number: 5
        question: "Design the index strategy for a MySQL query: fetch all orders for merchant_id X, in status 'pending', sorted by created_at DESC, paginated."
        needed: "composite index: (merchant_id, status, created_at DESC); index covers all WHERE and ORDER BY columns — no filesort; partial index if MySQL 8+: index only WHERE status='pending'"
        answer: "Composite index: CREATE INDEX idx_merchant_pending ON orders (merchant_id, status, created_at DESC). Index column order: (1) merchant_id — equality filter first. (2) status — equality filter second. (3) created_at DESC — ORDER BY last. This index covers the full query: MySQL traverses merchant_id leaf nodes, filters status='pending', returns rows in created_at DESC order — zero filesort. EXPLAIN shows: key=idx_merchant_pending, Extra=Using index (no filesystem sort). For cursor-based pagination: WHERE merchant_id = X AND status = 'pending' AND created_at < cursor_ts ORDER BY created_at DESC LIMIT 20 — uses the same index."
        tradeoff: "Composite index (merchant_id, status, created_at) vs. separate indices: separate indices on (merchant_id) and (status) require MySQL to use one index and then filter by the other — extra filtering step, worse performance at scale. A composite index covers both conditions with a single B-tree traversal. Downside: the composite index is larger (3 columns × rows) and must be updated on every INSERT/UPDATE."
        caveat: "Follow-up: index performance with 10M orders for merchant X vs 100 orders. For 10M orders: MySQL index scan for merchant_id=X with status='pending' returns millions of rows — paginated query is fast (cursor-based stops at LIMIT 20). For 100 orders: same query is trivially fast regardless of index. The composite index matters most for high-volume merchants. Follow-up: adding index to live 500M row table without locking. Same as Q030 — use pt-online-schema-change or gh-ost. The ALTER TABLE ... ADD INDEX in MySQL 5.7+ does support online DDL (no table lock) for secondary index additions but causes replication lag. For a 500M row table, gh-ost with throttled backfill is safer."
        related_fundamentals: [storage/dynamodb]

      - number: 6
        question: "Design a soft-delete strategy for a PostgreSQL table with 500M rows. Deleted records must be excluded from all queries by default but recoverable within 30 days."
        needed: "deleted_at TIMESTAMP NULL column; NULL means active; partial index: CREATE INDEX ... WHERE deleted_at IS NULL; purge job: hard-delete rows WHERE deleted_at < NOW() - INTERVAL '30 days'"
        answer: "Add column: deleted_at TIMESTAMP WITH TIME ZONE DEFAULT NULL. Soft-delete: UPDATE orders SET deleted_at = NOW() WHERE id = X. Partial index: CREATE INDEX orders_active_idx ON orders (id) WHERE deleted_at IS NULL — this index contains only active (non-deleted) rows. All active queries use this partial index: SELECT ... FROM orders WHERE id = X AND deleted_at IS NULL. Purge job (runs nightly): DELETE FROM orders WHERE deleted_at < NOW() - INTERVAL '30 days'. Recoverable: to undelete, UPDATE orders SET deleted_at = NULL WHERE id = X."
        tradeoff: "Soft delete (deleted_at column) vs. archive table (move deleted rows to orders_deleted): soft delete is simpler — single table, no data movement. Archive table keeps the active table small (no soft-deleted rows) but requires UNION queries to search across active + archived. For 500M rows with 10% deletion rate, soft-delete row overhead is 50M rows — manageable if the partial index excludes them from active queries."
        caveat: "Follow-up: ensure all queries automatically filter out soft-deleted rows. Use PostgreSQL Row Level Security (RLS) or a database view: CREATE VIEW orders_active AS SELECT * FROM orders WHERE deleted_at IS NULL. All application queries use the view instead of the base table. RLS policy: CREATE POLICY active_only ON orders USING (deleted_at IS NULL). Both approaches enforce the filter at the DB layer — no risk of a developer forgetting the WHERE clause. Follow-up: partial index impact on INSERT/UPDATE. INSERT INTO orders: if deleted_at IS NULL (default), the new row is added to the partial index. UPDATE SET deleted_at = NOW(): the row is removed from the partial index (deleted_at is no longer NULL). Both are O(log N) index updates — negligible overhead compared to the full table index."
        related_fundamentals: [storage/dynamodb]

      - number: 7
        question: "Design a time-series data retention policy for IoT sensor data in TimescaleDB. Full resolution for 7 days, hourly aggregates for 90 days, daily aggregates forever."
        needed: "TimescaleDB retention policies: auto-drop chunks older than 7 days; continuous aggregates: background job computes hourly rollups; tiered storage: compress old chunks"
        answer: "TimescaleDB hypertable with 1-day chunk size. Retention: SELECT add_retention_policy('sensor_data', INTERVAL '7 days') — automatically drops chunks older than 7 days. Continuous aggregates for hourly rollup: CREATE MATERIALIZED VIEW hourly_sensor_data WITH (timescaledb.continuous) AS SELECT time_bucket('1 hour', time) AS bucket, device_id, avg(value), max(value), min(value) FROM sensor_data GROUP BY bucket, device_id. Refresh policy: add_continuous_aggregate_policy('hourly_sensor_data', start_offset => INTERVAL '2 days', end_offset => INTERVAL '1 hour', schedule_interval => INTERVAL '1 hour'). For 90-day retention on hourly data: separate retention policy on the hourly aggregate view. Daily aggregate is derived from hourly (SELECT time_bucket('1 day', bucket), ...) — kept forever."
        tradeoff: "TimescaleDB continuous aggregates vs. custom batch jobs: TimescaleDB manages the refresh automatically, handles gaps, and resumes after failures. Custom batch jobs require scheduling, error handling, and idempotency logic. TimescaleDB is purpose-built for this pattern. Downside: you need TimescaleDB extension — not available on all managed Postgres offerings."
        caveat: "Follow-up: querying across raw and hourly aggregate tables. TimescaleDB's continuous aggregate is queryable like a regular view — you can SELECT from hourly_sensor_data directly. For queries spanning both raw (last 7 days) and hourly (7–90 days), use a UNION query: SELECT * FROM sensor_data WHERE time > NOW() - INTERVAL '7 days' UNION ALL SELECT bucket, device_id, avg_value FROM hourly_sensor_data WHERE bucket <= NOW() - INTERVAL '7 days' AND bucket > NOW() - INTERVAL '90 days'. Follow-up: backfill after continuous aggregate job paused 12 hours. TimescaleDB refresh_lag tracks the point up to which aggregates are computed. On restart, the policy backfills from the last refresh point automatically — no manual intervention needed."
        related_fundamentals: [storage/dynamodb]

      - number: 8
        question: "Design an efficient upsert strategy for a user activity tracking table in PostgreSQL. 100K events/sec: if row exists, update; if not, insert."
        needed: "INSERT ... ON CONFLICT (user_id, date) DO UPDATE SET count = count + 1; batch inserts: group 1000 events → single multi-row INSERT ON CONFLICT; partial index on (user_id, date)"
        answer: "Table: user_activity (user_id BIGINT, date DATE, action_type VARCHAR, count INT, PRIMARY KEY (user_id, date, action_type)). Batched upsert (every 1s or 1000 events): INSERT INTO user_activity (user_id, date, action_type, count) VALUES ($1,$2,$3,1), ($4,$5,$6,1), ... ON CONFLICT (user_id, date, action_type) DO UPDATE SET count = user_activity.count + EXCLUDED.count. Batching 1000 events into one INSERT ON CONFLICT reduces DB round trips from 100K/sec to 100/sec — 1000× reduction. The ON CONFLICT clause atomically handles both insert and update in one query."
        tradeoff: "Batch size vs. latency: larger batches (5000 events) reduce DB pressure but increase event processing latency (5 seconds to fill a 5000-event batch at 1000 events/sec). Smaller batches (100 events) are more responsive but less efficient. 1000 events/batch with 1-second flush interval gives a good balance: <1s staleness, 100 DB writes/sec (very manageable)."
        caveat: "Follow-up: lock contention when 1000 events for the same user arrive simultaneously. INSERT ON CONFLICT for the same primary key serializes within Postgres — only one transaction updates the row at a time. With 1000 simultaneous inserts for user_id=12345, there's significant lock contention. Mitigate: batch events for the same user_id together before inserting (reduce to 1 INSERT ON CONFLICT per user per batch, with pre-aggregated count). Follow-up: track per-event data, not just counts. Add an events table (user_id, timestamp, action_type, metadata) for per-event storage. Use the count table for aggregated queries; join with events table only for drill-down. Avoid storing all per-event metadata in the count table (it defeats the purpose of aggregation)."
        related_fundamentals: [storage/dynamodb]

      - number: 9
        question: "Design a read-through cache for product pricing. On miss, read from MySQL and populate Redis. Handle stale data correctly."
        needed: "TTL on cache entry: 5 minutes; on price update in DB: also DELETE the Redis key (cache invalidation); read-through: service handles miss explicitly"
        answer: "Cache-aside (lazy loading): service reads from Redis first. On hit: return cached price. On miss: query MySQL, cache the result in Redis with TTL 5 minutes (SETEX 'price:{product_id}' 300 {json_price}), return to user. On price update: UPDATE MySQL price AND DEL Redis key in the same request handler (not the same DB transaction — DB write is durable, Redis DEL is best-effort). If Redis DEL fails (Redis briefly unavailable), the stale price is served for up to 5 minutes (the TTL serves as a safety net). Acceptable for pricing that changes infrequently."
        tradeoff: "Cache-aside vs. write-through: write-through populates the cache on every DB write — cache is always warm. Cache-aside only populates on the first read after a miss — cold cache on new products. For product pricing with high read:write ratio (1000:1), cache-aside is sufficient. Write-through is better for high-write patterns where you need cache warmth immediately."
        caveat: "Follow-up: DB write succeeds but Redis DEL fails — how long is stale data served? Until the 5-minute TTL expires. Maximum stale window = TTL = 5 minutes. Mitigation: reduce TTL to 1 minute for high-frequency price changes. Or use a shorter TTL for products in active flash sales (30 seconds). Follow-up: cache returns price of 0 (corrupted value). Add application-layer validation: if cached price <= 0 or > MAX_PRICE, treat as a cache miss and fetch from DB. Also set Redis maxmemory-policy to allkeys-lru (not allkeys-volatile) — LRU eviction doesn't corrupt values; it removes them. A corrupted value is a Redis bug (extremely rare) or application bug (writing invalid data to cache)."
        related_fundamentals: [storage/redis, storage/dynamodb]

      - number: 10
        question: "Design a write-ahead log (WAL) based audit trail for a banking application. Every INSERT/UPDATE/DELETE on the accounts table must be captured with before/after values."
        needed: "PostgreSQL logical replication slot + pgoutput plugin; consumer reads WAL events and writes to audit_log table; audit entry: {table, operation, old_row, new_row, changed_by, changed_at}"
        answer: "Logical replication slot: CREATE_REPLICATION_SLOT 'audit_slot' LOGICAL pgoutput. A consumer process (written in Go/Python using the pgoutput protocol) subscribes to the slot and receives decoded WAL messages: INSERT, UPDATE (with before/after row), DELETE (with before row). Consumer writes to audit_log: {id, table_name, operation, old_data JSONB, new_data JSONB, changed_at, transaction_id}. The 'changed_by' (application user, not DB user) must be injected via session variable: SET app.current_user = 'user_id_123' before each transaction. The WAL consumer reads this from the WAL event's session variables."
        tradeoff: "WAL-based audit vs. trigger-based audit: triggers (AFTER INSERT/UPDATE/DELETE) write to audit_log in the same transaction — if the transaction rolls back, the audit entry is also rolled back (no phantom audit entries). WAL-based audit sees committed changes only — more reliable. Trigger-based: synchronous, adds latency to every write. WAL-based: async, zero overhead on writes, slight delay in audit log (usually <1 second). For banking, WAL-based is preferred: it audits only committed changes and has zero impact on transaction performance."
        caveat: "Follow-up: ensure audit log captures the user who made the change. SET LOCAL app.current_user = 'svc_account:user_id_123' at the start of each transaction. The WAL consumer reads session variables from the BEGIN message in the logical replication stream. This requires the application to always set the session variable — enforce via a database connection wrapper that sets it automatically. Follow-up: audit log storage growing unboundedly. Implement a tiered retention policy: keep detailed (row-level) audit logs for 90 days in the audit_log DB table, then archive to Parquet files in S3 (queryable via Athena) and delete from DB. S3 storage is ~0.023/GB/month vs ~0.10/GB/month for DB storage."
        related_fundamentals: [storage/dynamodb]

      - number: 11
        question: "Design a hot-cold data tiering strategy for a messaging app. Messages in the last 7 days are frequently accessed; older messages rarely accessed but must remain queryable."
        needed: "hot tier: PostgreSQL with SSD; cold tier: S3/GCS as Parquet, queryable via Athena/BigQuery; migration job: after 7 days, copy to cold, delete from hot"
        answer: "Hot tier: PostgreSQL on SSD with a 7-day retention window per user. Cold tier: Parquet files on S3, partitioned by (user_id, year, month, day). Migration job runs nightly: SELECT messages WHERE created_at < NOW() - INTERVAL '7 days' → serialize to Parquet → upload to S3 → DELETE from Postgres. AWS Athena queries S3 Parquet with standard SQL: SELECT * FROM cold_messages WHERE user_id = X AND created_at BETWEEN '2023-01-01' AND '2023-02-01'. Parquet columnar format makes predicate pushdown on user_id and date fast."
        tradeoff: "Single DB (Postgres) with partitioning vs. hot-cold split: Postgres table partitioning (PARTITION BY RANGE on created_at) allows automatic archival of old partitions and fast queries on hot partition (SSD). Downside: all data still in Postgres, which means all backups, replication, and storage costs apply to old messages. Hot-cold split moves cold data out of Postgres entirely — reduces DB size, backup size, and cost. For a messaging app where old messages are rarely accessed (<1% of queries), the cost savings of hot-cold split outweigh the complexity."
        caveat: "Follow-up: seamless query across hot and cold tiers. Application layer: first query Postgres (hot). If no results found and the query includes dates older than 7 days, fall back to Athena (cold). Or use a federated query layer (Amazon Athena Federated Query or PrestoDB) that can query both Postgres and S3 Parquet in a single SQL statement. Follow-up: cold-tier fetch takes 2 seconds vs 200ms expectation. UI: show a 'Loading older messages...' indicator when the query hits cold storage. Athena query time is 2–10 seconds for first query (cold cache) and 200–500ms for cached results. Pre-warm frequent cold queries by caching Athena results in Redis (with TTL 1 hour) for users who recently requested old messages."
        related_fundamentals: [storage/dynamodb, storage/redis]


  - slug: qb-resilience
    title: "Resilience & Fault Tolerance"
    description: "Circuit breakers, retry budgets, bulkheads, graceful shutdown, request hedging, fallbacks"
    number_range: "Q032–Q033, Q058, Q064, Q076, Q097, Q134"
    questions:
      - number: 1
        question: "Design a circuit breaker for a Go service calling a slow downstream fraud API. Protect your service without dropping legitimate payments."
        needed: "states: Closed → Open (on 50% error in 10s window) → Half-Open; probe 1 request in Half-Open; fallback: approve payment with async fraud check when circuit is open"
        answer: "Circuit breaker state machine: Closed (normal), Open (failing fast), Half-Open (probing). Transition Closed→Open: if error rate > 50% in the last 10-second sliding window (minimum 10 requests). In Open state: immediately return a fallback response without calling the fraud API — approve the payment and queue it for async fraud review. Transition Open→Half-Open: after 30 seconds. In Half-Open: let exactly 1 request through as a probe. If probe succeeds → Closed. If probe fails → back to Open for another 30 seconds. Implementation: prometheus counter for successes/failures; goroutine checks ratio every 5s."
        tradeoff: "Fail-open (approve payment, async fraud check) vs. fail-closed (reject payment when fraud API is down): fail-closed protects against fraud but blocks legitimate payments during fraud API outages. At 0.1% fraud rate, fail-open means 0.1% of payments during outage are fraudulent — acceptable. Fail-closed means 100% of payments are blocked — catastrophic for revenue. Always fail-open for fraud checks; fail-closed only for hard dependencies (like the payment processor itself)."
        caveat: "Follow-up: tuning the threshold. 50% error rate with a 10-second window is appropriate for fraud APIs. For critical APIs (database), use a lower threshold (10% errors) and a shorter window (1 minute). The threshold must be higher than the API's normal error rate — if the fraud API has 5% baseline errors, a 10% threshold would permanently open the circuit. Monitor the baseline error rate before setting thresholds. Follow-up: distinguish timeout from connection refused. Both count as errors, but differently: connection refused = server is down (open circuit immediately). Timeout = server is slow (only open circuit if sustained). Implement separate counters for timeout vs. connection error; weight connection errors more heavily."
        watch: "The Half-Open state is the most critical — it's when the circuit decides whether the downstream has recovered. Only allow one request in Half-Open (not 5 or 10) — if the downstream is still struggling, one failing probe re-opens the circuit without adding load. The probe request should be a real production request, not a synthetic health check, because the downstream may respond differently to production vs. health-check traffic."

      - number: 2
        question: "Design a retry budget for a microservice: total retry traffic must never exceed 10% of original traffic across all instances."
        needed: "global retry counter in Redis: track retries per second across all pods; each pod checks budget before retrying; budget replenishes over time (token bucket for retry budget)"
        answer: "Global retry budget as a token bucket in Redis: capacity = 0.1 × baseline_rps (10% of normal traffic). Replenishment rate: 0.1 × baseline_rps per second. Each pod, before retrying a failed request: DECR 'retry_budget'. If returns 0 or negative: don't retry, fail fast. If positive: proceed with retry. Background job monitors baseline_rps from Prometheus and updates the budget capacity every 30 seconds. The token bucket ensures that even if one pod fails all its requests (e.g., it's behind a broken load balancer), retries are globally bounded."
        tradeoff: "Global Redis budget vs. local per-pod budget: local budget means each of 20 pods can retry up to 10% of its own traffic independently = 20 pods × 10% = effectively 200% of total traffic in retries in the worst case. Global budget caps total retry traffic at exactly 10% regardless of how many pods are retrying. Global requires a Redis round-trip per retry (1–2ms overhead) — acceptable since retries are already slow-path operations."
        caveat: "Follow-up: one pod exhausting the budget for all others. If pod-5 has a cascading failure and generates 100% of its traffic as retries, it will consume all retry budget tokens. Other pods find the budget empty and can't retry even their own legitimate transient errors. Mitigation: per-pod retry budget (local token bucket) as a secondary limit: each pod gets at most 5% of the global budget. This prevents one bad pod from monopolizing the retry budget. Follow-up: retry budget too strict, harming availability. If the budget is exhausted during a normal transient failure (DB hiccup), legitimate retries fail fast — causing unnecessary errors. The budget should be set based on observed retry rates during normal operations, not an arbitrary 10%. Measure: what is the average retry rate in healthy conditions? Set the budget to 3× that rate."
        watch: "Retry budget is a form of adaptive load shedding — when the system is under stress (generating many errors), retries amplify load, potentially causing a death spiral. The budget caps this amplification. Combined with exponential backoff on the client side (which reduces retry rate over time), the retry budget prevents retry storms from cascading into full system failures."

      - number: 3
        question: "Design a health check endpoint for a Python FastAPI service on Kubernetes. The readiness check must fail if the DB connection pool is exhausted or the cache is unreachable."
        needed: "GET /health/ready: tests DB with SELECT 1, Redis with PING; return 503 if either check fails; shallow check (connection test), not deep (business logic test)"
        answer: "Two health check endpoints: GET /health/live (liveness — is the process running? always returns 200 unless process is hung) and GET /health/ready (readiness — can the service accept traffic?). Readiness checks: (1) DB: acquire a connection from the pool (with 100ms timeout), run SELECT 1, release. If pool exhausted (all connections in use) → 503. (2) Redis: PING with 100ms timeout → 503 if unreachable. Return 200 with {db: ok, cache: ok} if both pass. Kubernetes routes traffic only when readiness check passes. K8s configuration: readinessProbe.httpGet.path: /health/ready, periodSeconds: 5, failureThreshold: 3."
        tradeoff: "Shallow check (connection test, SELECT 1) vs. deep check (run a real business query): deep checks are more accurate but can themselves fail for unrelated reasons (data corruption, slow query plans) — causing false-positive readiness failures. Shallow checks test the infrastructure layer only. If the DB has a bad query plan but connections work, the service is technically ready (it will just serve slow responses). Use shallow checks for readiness; use synthetic transaction monitoring for deeper health."
        caveat: "Follow-up: DB health check exhausting the connection pool. The readiness check must use a dedicated connection from a small pool (min_size=1, max_size=1) reserved for health checks only. Never use the application's primary connection pool for health checks — a burst of readiness checks during a slow DB would exhaust application connections. Follow-up: Redis responding slowly (3s) vs. down. Slow response (3s): readiness check times out at 100ms, returns 503, Kubernetes stops routing traffic. This is correct — a 3-second Redis ping means every cache operation in the service is 3 seconds slow. The service is not ready. Down Redis (connection refused): immediate 503. Both cases trigger the same 503 response."
        related_fundamentals: [storage/redis]

      - number: 4
        question: "Design a graceful shutdown handler for a Python Kubernetes pod. On SIGTERM, finish in-flight requests and Kafka messages before exiting."
        needed: "catch SIGTERM → set 'shutting_down' flag → stop accepting new connections; wait for in-flight requests with 30s timeout; Kafka consumer: finish current message batch, commit offsets, then close"
        answer: "Signal handler: signal.signal(SIGTERM, graceful_shutdown). shutdown() function: (1) Set global is_shutting_down = True. (2) Call uvicorn.Server.should_exit = True (stops accepting new HTTP connections). (3) Wait for in-flight requests: track active request count with a semaphore; shutdown waits until semaphore = 0 or 30s timeout. (4) Kafka consumer: consumer.pause() (no new messages), wait for current batch to finish, consumer.commit(asynchronous=False), consumer.close(). (5) Close DB connections. (6) sys.exit(0). Kubernetes: set terminationGracePeriodSeconds=45 (> 30s shutdown + 10s buffer)."
        tradeoff: "30-second grace period: allows even slow in-flight requests to complete. Kubernetes default is 30s; match terminationGracePeriodSeconds to your shutdown timeout + 15s buffer. Shorter grace period (10s) risks killing in-flight long-running requests (file uploads, streaming). Longer (120s) slows rolling deployments."
        caveat: "Follow-up: Kubernetes sends traffic after SIGTERM but before shutdown is complete. Race condition: Kubernetes sends SIGTERM and simultaneously removes the pod from the load balancer endpoints list. But the LB may still route requests to the pod for 5–30 seconds after endpoint removal (depending on cloud provider). Fix: in the shutdown handler, sleep 5 seconds before stopping request acceptance — this allows the LB to drain naturally before the service stops accepting. Follow-up: 45-second long-running request exceeds grace period. Kubernetes sends SIGKILL after terminationGracePeriodSeconds. The 45-second request is killed abruptly. Mitigation: set request timeouts at the API layer (max 30s for any single request). Long-running operations should be async (return immediately with a job ID, process in background)."
        watch: "The preStop hook in Kubernetes is useful here: add a preStop lifecycle hook that runs 'sleep 5' before SIGTERM is sent. This gives the load balancer 5 extra seconds to drain connections before the process starts shutting down. Combined with terminationGracePeriodSeconds=45, the shutdown sequence is: preStop (5s) → SIGTERM → graceful shutdown (30s) → SIGKILL (never triggered if shutdown completes in 30s)."

      - number: 5
        question: "Design a bulkhead pattern for a service that calls both a critical user API and a non-critical recommendation API. Recommendation slowness must not affect user API calls."
        needed: "separate HTTP client connection pools for each upstream; recommendation pool capped at 20 connections; user API pool at 100; recommendation calls have 500ms timeout, user API 2s timeout"
        answer: "Two separate HTTP clients: user_api_client (connection pool max=100, timeout=2s) and recommendation_client (connection pool max=20, timeout=500ms). All user API calls go through user_api_client; recommendation calls through recommendation_client. When recommendation API is slow and all 20 connections are busy: new recommendation calls fail fast (connection pool exhausted) without waiting — the failure is contained to the recommendation pool. User API calls are unaffected — they use a completely separate connection pool and TCP connections. The 20-connection cap on recommendations is calculated: at 500ms timeout × 20 connections = max 40 in-flight recommendation requests (1 request per connection). This bounds the memory and CPU impact of slow recommendation calls."
        tradeoff: "Shared connection pool vs. separate pools: shared pool means a slow recommendation API can consume all connections, starving user API calls even though they're healthy. Bulkhead (separate pools) prevents resource sharing across different risk domains. Additional benefit: separate pools allow different timeout configurations (2s for user API where latency matters, 500ms for recommendations where we can afford to drop)."
        caveat: "Follow-up: recommendation pool exhausted — drop request or queue. Drop immediately and return the fallback (popular items list from Redis). Queuing is dangerous: at 500ms timeout, a queue of 100 requests that each wait 500ms = 50 seconds of queuing latency. A 500ms-timeout request queued for 10 seconds has already missed its deadline. Never queue in a bulkhead — the purpose is to fail fast. Follow-up: sizing each pool when traffic patterns change. Monitor recommendation pool utilization: if average utilization > 80%, increase pool size. If consistently < 30%, reduce to free TCP connections for other uses. Use adaptive pool sizing: adjust cap based on 5-minute moving average of connection utilization."
        watch: "Bulkhead pattern is the service-level equivalent of watertight compartments in a ship — one compartment flooding (recommendation API slow) doesn't sink the ship (user API fails). Without bulkheads, any slow downstream eventually consumes all resources. With bulkheads, each downstream has a fixed resource allocation; failures are contained."

      - number: 6
        question: "Design a timeout strategy for a Python async service calling 3 external APIs. Total response to the user must be within 500ms regardless of which APIs are slow."
        needed: "asyncio.gather with per-task timeout using asyncio.wait_for; deadline propagation: if 200ms remain, don't start a call needing 300ms; return cached/default value for timed-out calls"
        answer: "Set a global deadline: async with asyncio.timeout(0.5): request_start = asyncio.get_event_loop().time(). Call all 3 APIs concurrently: results = await asyncio.gather(asyncio.wait_for(api1(), timeout=0.3), asyncio.wait_for(api2(), timeout=0.3), asyncio.wait_for(api3(), timeout=0.3), return_exceptions=True). For each result: if isinstance(result, asyncio.TimeoutError) → use fallback. The 300ms per-API timeout leaves 200ms for processing and response serialization. With return_exceptions=True, one API timeout doesn't cancel the others. Deadline check before each call: elapsed = now - request_start; if elapsed > 400ms and the API needs 300ms → skip the call, use fallback."
        tradeoff: "Parallel calls (gather) vs. sequential with deadline propagation: sequential would be 300ms + 300ms + 300ms = 900ms in the worst case — exceeds 500ms SLA. Parallel: max(api1_time, api2_time, api3_time) → dominated by slowest API but all three run concurrently. With 300ms per-API timeout, total API call time ≤ 300ms, leaving 200ms for overhead. Parallel is the correct approach for independent API calls."
        caveat: "Follow-up: propagating deadline to APIs that support it (gRPC deadline). gRPC context deadline: stub.MyMethod(request, timeout=remaining_seconds). Calculate remaining: remaining = deadline - asyncio.get_event_loop().time(). Pass remaining as the gRPC timeout. If remaining < 0 → deadline already passed, return error immediately without calling. Follow-up: tracking which API causes timeouts. Track per-API timeout rate as a Prometheus counter: api_timeout_total{api='payment'} += 1. Alert when timeout rate for any API > 5% over 5 minutes — that API needs investigation."
        watch: "The 500ms total includes time for: (1) deserializing the request, (2) calling all 3 APIs concurrently, (3) processing results, (4) serializing the response, (5) network transmission. Account for this overhead: if API calls must complete in 300ms, set per-API timeout to 280ms (20ms buffer for network jitter) and ensure gather overhead is <50ms. Measure each component's latency independently to find where the 500ms budget is spent."

      - number: 7
        question: "Design a request hedging strategy for a latency-sensitive API. If the first upstream call doesn't respond within 100ms, fire a second request to a different replica and use whichever responds first."
        needed: "fire primary request; start 100ms timer; on timer expiry (not completion), fire secondary to different pod; cancel losing request on first response; return winner's result"
        answer: "Hedging implementation: (1) Send request to replica-1 with a 100ms hedge threshold. (2) Start a 100ms timer concurrently. (3) If replica-1 responds before timer fires → cancel timer, return response. (4) If timer fires before response → send request to replica-2 (a different pod, selected by the load balancer with a preference for an already-connected pod). (5) The first response (from either replica-1 or replica-2) wins. Cancel the losing request. The critical insight: the hedge timer fires at p99 latency, meaning most requests (99%) complete before the hedge fires. Only the tail 1% triggers a second request."
        tradeoff: "Hedging at p99 (100ms) adds at most 1% extra upstream traffic. If p99 latency is 100ms and hedge threshold is set at 100ms: 1% of requests generate a second request = 1% overhead. If set at p50 (50ms): 50% of requests are hedged = 50% overhead. Use hedging only for latency-critical services (search, recommendations) where the p99 tail latency is significantly higher than p50 (indicating occasional slow nodes). Monitor upstream request rate before and after enabling hedging."
        caveat: "Follow-up: overhead at p99. If p99 = 100ms and hedge fires at p99, then only the slowest 1% of requests generate a hedge = 1% extra traffic. The hedge request itself also has a p99 tail — if the second request is also slow, total latency is max(original, hedge). Hedging reduces tail latency from p99→p50 of the hedge distribution — typically a 50% latency reduction at the p99 mark. Follow-up: choosing the hedge threshold. Set threshold between p95 and p99 of the upstream latency distribution. Below p95 = too many hedge requests (>5% traffic overhead). Above p99 = hedge fires too late to help (would only catch outliers beyond p99, which are rarer). Measure the actual upstream latency distribution and pick a threshold empirically."
        watch: "Hedging only works when there are multiple available replicas and the slow response is node-specific (not a network-wide slowdown). If all nodes are slow (DB overload, network congestion), hedging adds load without reducing latency. Add a circuit breaker: if hedge-triggered secondary request also times out >50% of the time, disable hedging (it's making things worse)."


  - slug: qb-distributed-lock
    title: "Distributed Locks & Coordination"
    description: "Redis SETNX locks, fencing tokens, leader election, batch job coordination, lease-based mechanisms"
    number_range: "Q034–Q035, Q052, Q111, Q128"
    questions:
      - number: 1
        question: "Design a distributed lock for a Celery scheduler: ensure only one pod runs the 'send daily digest' job across 10 worker pods."
        needed: "Redis SET NX EX: set key if not exists with TTL; lock value = unique owner ID; heartbeat renewal: owner extends TTL every 5s while job runs"
        answer: "Lock acquisition: SET 'lock:daily_digest:{date}' {pod_unique_id} NX EX 30. Returns OK (acquired) or nil (already locked). Lock value = pod_unique_id (UUID generated at pod startup). TTL = 30 seconds (initial estimate for job duration). Owner pod runs the job. Heartbeat: every 5 seconds, extend TTL: Lua script: if redis.call('GET', key) == owner then redis.call('EXPIRE', key, 30) end. The Lua script prevents a pod that lost the lock (due to slow heartbeat) from extending another pod's lock. Lock release: Lua script: if GET key == owner then DEL key end — prevents releasing another pod's lock."
        tradeoff: "Single Redis instance vs. Redlock (multi-Redis majority quorum): single Redis is simple and sufficient for scheduler jobs where brief duplicate execution is acceptable. Redlock (Redisson library) uses 5 Redis nodes — lock is valid only if acquired on 3+/5 nodes. Provides fault tolerance against single Redis node failure. For a daily digest job, brief duplicate execution (sending digest twice) is a minor inconvenience, not a critical failure — single Redis is appropriate. For financial transactions, use Redlock."
        caveat: "Follow-up: lock holder crashes and never releases. The TTL (30s) auto-expires the lock. Maximum delay before another pod acquires: 30s. During this window, the daily digest is delayed (not sent twice). After TTL expiry, a new pod acquires and runs the job. Follow-up: heartbeat fails due to Redis slowdown. If Redis is slow (5s response time) and heartbeat misses 2 cycles (10s), the 30s TTL hasn't expired yet — the lock holder still has the lock. If Redis is completely unreachable for 30 seconds, the TTL expires and another pod takes over. The original job may still be running — both pods now attempt the job. This is an edge case; for daily digest, tolerate the occasional duplicate. For financial operations, use a DB-level lock with WAL as the source of truth."
        watch: "The Lua script for heartbeat (GET + EXPIRE if owner matches) is critical — without it, any pod that knows the key name could extend the TTL, preventing legitimate lock release. The value (owner ID) acts as a capability — only the owner can extend or release the lock. This is the 'check ownership before acting' pattern that prevents lock hijacking."

      - number: 2
        question: "Design a fencing token mechanism so a distributed lock holder can't take actions after losing the lock (e.g., slow GC pause causing missed heartbeat)."
        needed: "lock returns a monotonically increasing fencing token; all downstream writes include token; storage layer rejects writes with token <= last seen; no write succeeds from a zombie lock holder with old token"
        answer: "Lock acquisition returns a fencing token (monotonically increasing integer). Implementation: atomic counter in Redis (INCR 'lock_counter') — each lock acquisition gets the next integer. Token is included in all writes: client sends {data, fencing_token: 42} to the storage layer. Storage layer tracks last_accepted_token per resource. On write: if request.fencing_token <= last_accepted_token → reject with 409 (stale lock). If request.fencing_token > last_accepted_token → accept and update last_accepted_token. A zombie client (GC-paused, slow) that resumes after losing the lock sends writes with old token (e.g., 42) while the new lock holder has token 43. The storage layer rejects the zombie's writes."
        tradeoff: "Fencing tokens vs. check-before-write (read lock then write): check-before-write has a TOCTOU race: zombie reads the lock (still appears valid), then GC pause, lock expires, new holder acquires, zombie resumes and writes (after lock expiry). Fencing tokens don't have this race because the comparison is monotonic: even if the zombie checks and the lock appears valid, the storage layer's last_accepted_token will have advanced, rejecting the stale write."
        caveat: "Follow-up: generating monotonically increasing tokens without a coordinator. Use a distributed counter in Redis (INCR) — single Redis is a coordinator but a lightweight one for just incrementing a counter. Alternative: use Postgres sequence (SELECT nextval('lock_sequence')) for tokens — DB-backed, durable, monotonic. Alternative without coordinator: use timestamps + machine ID (similar to Snowflake ID) — monotonic within a machine but not globally ordered. Global monotonic ordering requires a coordinator. Follow-up: storage layer overhead for checking fencing tokens on every write. Store last_accepted_token in Redis (O(1) get/set, <1ms). The overhead is one Redis GET + optional SET per write — negligible for most write patterns."
        watch: "Fencing tokens solve the problem that Redlock (multi-node Redis consensus) cannot: even with a perfect lock, a GC pause after acquiring the lock but before completing the write creates a zombie that has a 'valid' lock from its perspective. Fencing tokens ensure the storage layer is the final arbiter of correctness, not just the lock service. This is the distributed systems lesson from Martin Kleppmann's critique of Redlock."

      - number: 3
        question: "Design a distributed cron job lock: a 'send invoice' job runs every hour and must execute exactly once across 5 worker pods."
        needed: "Redis SET NX with job_id + hour_bucket as key, TTL = 3600s; first pod to SET NX wins and runs the job; heartbeat renewal if job takes longer than TTL"
        answer: "Key: 'cron:invoice:{YYYY-MM-DD-HH}' (e.g., '2024-03-15-14' for 2 PM). SET NX EX 3600: the first pod to run at 2 PM acquires this key for the 2 PM hour bucket. TTL = 3600s (1 hour) prevents the lock from persisting into the next hour's bucket. If the job takes > 30 minutes: implement heartbeat renewal (EXPIRE key 3600 every 15 minutes). The key expires naturally after 1 hour — the next hour's job gets a new key ('2024-03-15-15'). No manual lock release needed because the TTL-based expiry aligns with the cron schedule."
        tradeoff: "Redis-based lock vs. DB advisory lock (PostgreSQL pg_try_advisory_lock): Redis: fast, simple, TTL-based auto-expiry. DB advisory lock: durable (survives Redis failure), requires manual release, tied to DB connection lifetime. For hourly cron jobs where running twice per hour is a minor issue (duplicate invoice emails), Redis is sufficient. For invoice sending where duplicates have financial consequences, DB advisory lock with idempotency checks on the invoice table is safer."
        caveat: "Follow-up: detect job that acquired lock but silently failed without running. Add a job_status key: on lock acquisition, SET 'job_status:invoice:{bucket}' starting EX 3600. On completion, SET 'job_status:invoice:{bucket}' completed. On failure, SET failed. A monitoring job checks job_status after each scheduled run time: if status is 'starting' for > 30 minutes (job hung), alert on-call. If status is absent (job never ran), alert. Follow-up: replay missed job after 2-hour outage. The 2 PM and 3 PM jobs were missed. On recovery: check which hour buckets are absent from job_status table for the last 24 hours. Run missed jobs manually or trigger a 'backfill' mode that processes missed invoices with appropriate timestamps."
        watch: "The hour bucket key design automatically handles the case where the cluster restarts: on restart, pods race to SET NX the current hour's key. Exactly one wins. No coordination needed between pods — they all independently try the same Redis command atomically. This is the simplest possible distributed election mechanism."

      - number: 4
        question: "Design a leader election mechanism for a Python worker pool: exactly one worker runs a background job, and if the leader crashes, a new one is elected within 30 seconds."
        needed: "Redis SET NX with TTL=30s as leader lease; all workers attempt SETNX periodically; holder is leader; heartbeat: leader renews TTL every 10s; on crash TTL expires, new leader elected"
        answer: "Leader key: 'leader:{job_name}'. On startup and every 10 seconds: all workers attempt SET 'leader:{job_name}' '{worker_id}' NX EX 30. Only the first succeeds (NX = set only if not exists). The winner is the leader — it starts running the job immediately. Loser workers check if they're the leader every 10 seconds (try SETNX; if it returns nil, they're not the leader). Leader heartbeat: every 10 seconds, run a Lua script: if GET key == worker_id then EXPIRE key 30. If the leader crashes, it stops sending heartbeats. TTL expires after 30 seconds. Next SETNX attempt by any surviving worker acquires leadership. Maximum leader change time: TTL = 30 seconds."
        tradeoff: "SETNX-based election vs. etcd/Zookeeper watch-based election: SETNX requires polling every 10s — 30-second election time. etcd/Zookeeper use watches — when the leader's key expires, all followers are immediately notified and race to become leader. Election time: <1 second. For most use cases, 30-second election time is acceptable. Use etcd/Zookeeper only if you need sub-second leader failover."
        caveat: "Follow-up: leader alive but Redis writes failing (false death). Redis writes fail → heartbeat stops → TTL expires → a new leader is elected. Now two workers believe they're leader (split-brain). The original leader may be running the job with stale belief of leadership. Prevention: leader checks its own lock before each job iteration: GET 'leader:{job_name}' → if not worker_id, stop immediately. This self-check prevents the zombie leader from running without a valid lock. Follow-up: preventing split-brain (two workers simultaneously leader). The SET NX is atomic — only one worker can succeed in setting a non-existent key. After election, only the leader can renew (Lua script checks owner before EXPIRE). Split-brain can only occur if: (1) Redis has a bug in SET NX atomicity (impossible with Redis single-threaded model) or (2) the leader's Lua heartbeat somehow succeeds after TTL expiry (impossible — TTL expiry and Lua execution are atomic)."
        watch: "The leader should check its lease validity before each critical action, not just at election time. A GC pause of 31 seconds causes the leader to lose its TTL without knowing it. Adding a self-check at the start of each iteration (GET key; if not me, stop) is a lightweight but critical safety mechanism. This is the fencing token concept applied to self-checks."

      - number: 5
        question: "Design a lease-based coordination mechanism for a distributed batch job. Only one pod should own a 'batch segment' (user IDs 0-1000). On crash, segment must be re-acquired within 30 seconds."
        needed: "lease table in DB: (segment_id, owner_pod, expires_at); owner renews lease every 10s; on crash, lease expires after 30s; new pod acquires with UPDATE ... WHERE expires_at < NOW()"
        answer: "DB lease table: CREATE TABLE batch_leases (segment_id INT PRIMARY KEY, owner_pod VARCHAR, expires_at TIMESTAMP). Acquisition: UPDATE batch_leases SET owner_pod = $pod_id, expires_at = NOW() + INTERVAL '30 seconds' WHERE segment_id = $seg AND (owner_pod IS NULL OR expires_at < NOW()). Rows affected = 1 means acquisition succeeded (0 means another pod holds it). Renewal (every 10s): UPDATE batch_leases SET expires_at = NOW() + INTERVAL '30 seconds' WHERE segment_id = $seg AND owner_pod = $pod_id. On crash: pod stops renewing → expires_at expires after 30s → another pod's acquisition query succeeds."
        tradeoff: "DB-based lease vs. Redis-based lock: DB lease is durable (survives Redis failure) and enables audit trail (who held which segment when). Redis lock is faster (1ms vs 5ms) and simpler. For batch jobs where durability of the lease state matters (audit compliance, accounting batch), DB is correct. For real-time coordination where speed matters, use Redis."
        caveat: "Follow-up: network partition where owner can't renew but is still processing. Pod A's network to DB is partitioned — renewals fail. After 30s, lease expires. Pod B acquires the segment and starts processing the same user IDs. Pod A is still processing (it doesn't know it lost the lease). This is the split-brain scenario. Mitigation: Pod A checks lease validity before each write: SELECT owner_pod FROM batch_leases WHERE segment_id = $seg — if not self, abort batch and roll back. Follow-up: detecting a dead segment (never acquired). Add a monitoring query: SELECT * FROM batch_leases WHERE owner_pod IS NULL OR expires_at < NOW() - INTERVAL '5 minutes'. These are segments that haven't been claimed. Alert on-call. The 5-minute threshold allows for normal startup lag."
        watch: "The UPDATE ... WHERE expires_at < NOW() acquisition pattern is a database-native CAS (compare-and-swap): it atomically checks the condition and updates if true. Unlike SELECT + conditional UPDATE (TOCTOU race), this single UPDATE is atomic. This is a powerful pattern: it works on any relational DB with MVCC (Postgres, MySQL InnoDB) without explicit locking."


  - slug: qb-realtime
    title: "Real-Time Systems"
    description: "WebSocket routing, presence detection, live scores, typing indicators, leaderboards, live polls"
    number_range: "Q036–Q037, Q091, Q116, Q135, Q147"
    questions:
      - number: 1
        question: "Design the WebSocket connection routing for a chat app with 1M concurrent connections across 50 stateless gateway pods. A message to user A must reach their pod."
        needed: "Redis pub/sub: each pod subscribes to channel 'user:{user_id}'; on message send: PUBLISH to user's channel; connection registry: Redis stores user_id → pod_id mapping"
        answer: "Each gateway pod subscribes to its own pod-level channel: 'pod:{pod_id}'. Connection registry: on WebSocket connect, SET 'ws:{user_id}' pod_id EX 3600 (with TTL for cleanup). On message send: (1) HGET 'ws:{user_id}' → returns pod_id. (2) If pod_id == self → deliver directly to in-process WebSocket. (3) If pod_id == other → PUBLISH 'pod:{pod_id}' {user_id, message}. The correct pod receives the pub/sub message and delivers to the WebSocket. At 1M connections across 50 pods = 20K connections per pod — Redis fan-out for single-pod delivery is a simple point-to-point PUBLISH (not broadcast)."
        tradeoff: "Redis pub/sub routing vs. consistent hashing (route based on user_id hash): consistent hashing routes a request to the correct pod without a registry lookup — O(1), no Redis call. But consistent hashing doesn't handle pod failures gracefully (re-hashing during pod restarts disrupts connections). Redis registry-based routing requires one Redis GET per outgoing message but correctly handles pod restarts and reconnections without remapping."
        caveat: "Follow-up: user connected on 2 devices (2 different pods). Redis registry stores one value per user_id — the most recent device. Solution: change registry to store a list: SADD 'ws:{user_id}' pod_id. On message send, SMEMBERS 'ws:{user_id}' → get all pods → PUBLISH to each. Message is delivered to both devices. Cleanup: on WebSocket disconnect, SREM 'ws:{user_id}' pod_id. Follow-up: pod crashes — client reconnect. Client detects WebSocket disconnect (ping/pong timeout or TCP reset). Client reconnects to any available pod via the load balancer. New pod: SET 'ws:{user_id}' new_pod_id in registry. Old pod's registry entry (stale pod_id) is replaced. Any messages published to the old pod_id are lost during the reconnection window (acceptable for chat — messages since last delivered ID are re-fetched on reconnect)."
        related_fundamentals: [storage/redis, networking/websockets]

      - number: 2
        question: "Design the presence system (online/offline) for a messaging app with 500M users. 'Online' must update within 3 seconds; must survive pod restarts."
        needed: "heartbeat every 2s → Redis key 'presence:{user_id}' with 5s TTL; on TTL expiry, Redis keyspace notification fires 'user went offline'; last-seen timestamp written to DB asynchronously"
        answer: "Client sends heartbeat every 2 seconds: SETEX 'presence:{user_id}' 5 '1'. If client goes offline (process killed, network loss), no heartbeat for 5 seconds → key expires → Redis keyspace notification: '__keyevent@0__:expired' 'presence:{user_id}'. Presence service subscribes to keyspace notifications and publishes 'user_offline' event to Kafka. Parallel: every heartbeat also writes last_seen to a Kafka topic → consumed by a writer service that batches DB updates (UPDATE users SET last_seen = NOW() WHERE id = X). The DB write is async — presence in Redis is the real-time source of truth."
        tradeoff: "Redis TTL-based presence vs. poll-based: polling DB 500M times every 2 seconds = 250M DB reads/sec — impossible. Redis SETEX is O(1) and handles 100K ops/sec per node. With 500M active users heartbeating every 2s, that's 250M ops/sec — requires Redis Cluster with ~2500 shards (100K ops/sec × 2500 = 250M ops/sec). Alternatively, use Redis Cluster with 100 shards and batch heartbeats: send once every 2 seconds but pipeline 100 user_ids per batch request."
        caveat: "Follow-up: scaling 500M heartbeat writes to Redis. Batch heartbeats: client sends all heartbeats for the user's devices in one pipeline call. Server side: batch MSET with 100 keys per Redis call. 500M users × 0.5 active at peak = 250M users. 250M / 100 per batch = 2.5M Redis pipeline calls per 2s = 1.25M calls/sec. With Redis Cluster at 100K pipeline calls/sec per node, need 12.5 shards. Very manageable. Follow-up: network blip (2s offline) vs genuine disconnect (10s offline). 5s TTL with 2s heartbeat interval: a 2s blip causes one missed heartbeat. Key still valid for 3 more seconds — user appears online. A 10s disconnect means 5 missed heartbeats; key expires after 5s. User correctly appears offline. The TTL acts as a debounce — transient blips don't cause false offline events."
        related_fundamentals: [storage/redis, networking/websockets]

      - number: 3
        question: "Design a live sports score push system. 50M users subscribed to a cricket match. Each ball event must reach all users within 2 seconds."
        needed: "score update → Kafka → fan-out to SSE/WebSocket gateway clusters partitioned by user_id range; CDN-based SSE: push to edge PoPs; users connect to nearest PoP"
        answer: "Score update pipeline: scoreboard server publishes to Kafka 'match.score_updates' (1 event per ball). A fan-out service consumes from Kafka and publishes via SSE (Server-Sent Events) to CDN edge PoPs. CDN edge: AWS CloudFront, Fastly, or Akamai streaming — each PoP maintains SSE connections with users in its region. PoP receives score update via origin push, fans out to all connected users in <100ms. Architecture: users connect to nearest CDN PoP (geographic routing). Score update → Kafka → fan-out service → HTTP push to all CDN origin servers → CDN fans out to users. Total latency: event processing (100ms) + CDN distribution (200ms) + last-mile (200ms) = <600ms well within 2s."
        tradeoff: "WebSocket vs. SSE for score delivery: SSE is unidirectional (server → client) — perfectly suited for score push. SSE uses HTTP/1.1 chunked transfer or HTTP/2 streams; CDNs cache and fan-out SSE streams natively. WebSocket is bidirectional but more complex to fan-out at CDN level (requires stateful load balancing). For sports scores (read-only push), SSE through CDN is more scalable than WebSocket."
        caveat: "Follow-up: 50M users connecting simultaneously at match start. Connection storm: 50M users connect in 10 seconds = 5M connections/sec. CDN edge servers handle 100K connections/sec each → need 50 edge servers in each PoP. Use a slow-rollout strategy: app opens SSE connection 1 minute before match start (not at exact match start) to spread the connection storm. Follow-up: edge PoP goes down mid-match. Users connected to that PoP lose their SSE connection. Their clients immediately reconnect (SSE auto-reconnect is built into the EventSource API). Reconnect to a different PoP. PoP failure affects the users' connection for <5 seconds (reconnect + score catch-up). CDN health checks detect PoP failure and reroute DNS in <30 seconds."
        related_fundamentals: [networking/cdn, networking/load-balancing]

      - number: 4
        question: "Design the typing indicator for a chat app (like WhatsApp). 'User is typing...' must appear within 1 second and disappear 3 seconds after the user stops typing."
        needed: "client sends typing event on every keystroke (debounced to 1/sec); server publishes to recipient's channel via Redis pub/sub; auto-expire: if no typing event for 3s, publish 'stopped typing'"
        answer: "Client-side debounce: emit 'typing' event once per second while user is typing (not on every keystroke). Server receives 'typing' event: (1) SET 'typing:{conv_id}:{sender_id}' 1 EX 3 — key expires in 3 seconds. (2) If key was previously absent (SETNX returned 1 meaning first typing event), PUBLISH 'conv:{conv_id}' {user_id: X, status: typing}. (3) On key expiry (Redis keyspace notification), PUBLISH {user_id: X, status: stopped}. Recipient's client receives the pub/sub message and shows/hides the typing indicator. The Redis TTL handles the 'stopped typing after 3s' requirement automatically."
        tradeoff: "Redis keyspace notifications vs. client-side timer: client-side timer in the app (hide typing indicator after 3s of no new typing event) avoids server-side state. But different clients may have different clock accuracy, causing inconsistent hide timing. Server-side TTL ensures consistent 3-second window across all clients. Downside: Redis keyspace notifications are a broadcast channel with potential high event volume in active group chats."
        caveat: "Follow-up: 1000-member group chat with many people typing simultaneously. 1000 typing users × 1 pub/sub event/sec = 1000 pub/sub events/sec to the group's channel. Each member subscribes to the channel and receives all 1000 events. At scale, show only '3 people are typing...' aggregation rather than individual names — reduces visual noise and the event processing burden on clients. Server-side: maintain a count of active typers per conversation; emit aggregate events. Follow-up: prevent typing indicators to blocked users. Before publishing the typing event to a channel, check if sender is blocked by recipient: SELECT FROM blocks WHERE blocker = recipient AND blocked = sender. If blocked, skip the publish. This check adds 1 DB lookup per typing event — cache block lists in Redis with TTL 60s."
        related_fundamentals: [storage/redis, networking/websockets]

      - number: 5
        question: "Design the live leaderboard update mechanism for a gaming platform. 10M players, scores update continuously. Top-100 leaderboard must refresh every 5 seconds."
        needed: "Redis Sorted Set: ZADD player scores, ZRANGE for top-100; snapshot top-100 every 5s via background job; delta updates: push score changes to subscribers via WebSocket"
        answer: "Redis Sorted Set: ZADD 'leaderboard:global' score player_id. Score updates stream in continuously: ZADD 'leaderboard:global' NX/GT score player_id (GT = update only if new score is greater than existing). Background job every 5 seconds: ZREVRANGE 'leaderboard:global' 0 99 WITHSCORES → top-100 list → publish to 'leaderboard:snapshot' Redis channel → WebSocket gateway fans out to all subscribed clients. Client receives and re-renders top-100 every 5 seconds. For player's own rank: ZREVRANK 'leaderboard:global' player_id → O(log N) lookup without reading the full set."
        tradeoff: "Full snapshot every 5s vs. incremental deltas: full snapshot (100 entries × ~50 bytes = 5KB) every 5s per client. At 1M connected users, that's 5GB/5s = 1GB/sec bandwidth just for leaderboard snapshots. Optimization: only send deltas (entries that changed position since last snapshot). Deltas require tracking previous state and computing diffs — adds complexity. For gaming leaderboards, incremental deltas are usually worth it above 100K concurrent users."
        caveat: "Follow-up: regional vs. global leaderboard. Create separate sorted sets: 'leaderboard:global', 'leaderboard:region:us-west', 'leaderboard:region:eu'. ZADD to all relevant sets on each score update. ZREVRANGE on the appropriate set for the requested leaderboard. Regional leaderboards are subsets of global data — no additional storage, just different key scopes. Follow-up: player at rank #4,500,000 querying their own rank. ZREVRANK 'leaderboard:global' player_id returns 4,499,999 (0-indexed). O(log N) operation — <1ms for 10M entries. Player rank is always available without scanning the full sorted set. Show: 'Your rank: #4,500,000 / 10M players'."
        related_fundamentals: [storage/redis, networking/websockets]

      - number: 6
        question: "Design a live poll system for an event (concert audience votes in real time). 50K concurrent voters, results visible to everyone within 2 seconds."
        needed: "vote event → Redis INCR per option → broadcast updated counts via WebSocket; debounce broadcast: emit result snapshot every 500ms; prevent multi-vote: Redis SET NX before counting"
        answer: "Vote submission: SET NX 'vote:{event_id}:{user_id}' 1 EX 86400 (returns 0 if already voted). If NX returns 1 (new vote): INCR 'poll:{event_id}:{option_id}'. Broadcast: every 500ms, a background job reads all option counts (MGET 'poll:{event_id}:1', 'poll:{event_id}:2', ...) and publishes to 'poll:{event_id}:broadcast' Redis channel. WebSocket gateways fan out to all connected viewers. 50K viewers × 500ms broadcast = 50K WebSocket messages per broadcast cycle. At 100ms per message delivery, the fan-out completes in 5 seconds — too slow. Use pub/sub with 1000 WebSocket gateway pods, each handling 50 users, receiving the broadcast in parallel. Total fan-out time: 100ms."
        tradeoff: "Real-time per-vote broadcast vs. 500ms batched broadcast: per-vote broadcast at 50K votes/minute = 833 broadcasts/second × 50K viewers = 41M WebSocket messages/sec — impossible. Batched broadcast at 2/sec × 50K viewers = 100K messages/sec — manageable. The 500ms batching introduces up to 500ms display lag — imperceptible in a live event context."
        caveat: "Follow-up: preventing bots from skewing the poll. Rate limit votes by device fingerprint + IP, not just user_id. Bot detection: votes arriving at >10 per second from the same IP = suspicious; apply CAPTCHA. For public events, accept some noise — absolute vote counts are less important than the real-time feel. Follow-up: display running percentages while total is changing. Calculate percentages client-side from the counts: (option_1_count / total_votes) × 100. The percentages update on each snapshot received. If total is 0 (no votes yet), show equal percentages (50%/50% for binary poll). Use smooth CSS transitions for percentage bar animations — prevents jarring jumps."
        related_fundamentals: [storage/redis, networking/websockets]


  - slug: qb-observability
    title: "Observability & Monitoring"
    description: "Alerting rules, distributed tracing, SLO burn rates, dead man's switch, canary deployment, latency dashboards"
    number_range: "Q040–Q041, Q074–Q075, Q088, Q126, Q141"
    questions:
      - number: 1
        question: "Design the alerting rule for a payment API. Page on-call within 90 seconds of error rate exceeding 1%, but avoid false alarms from 1-second spikes."
        needed: "alert on 5-of-last-5 minutes above 1% (multi-window evaluation); short burn rate rule: 14x error budget consumed in 1h; separate alert for sudden spike vs. sustained degradation"
        answer: "Two alerting rules: (1) Fast burn: ALERT IF rate(http_errors_total[5m]) / rate(http_requests_total[5m]) > 0.14 FOR 1m — this fires if error rate > 14% for 1 minute (meaning 14× budget consumption rate; at this rate, you'd burn the monthly budget in ~2 hours). Pages on-call immediately. (2) Slow burn: ALERT IF rate(http_errors_total[1h]) / rate(http_requests_total[1h]) > 0.01 FOR 5m — fires if error rate > 1% sustained for 5 minutes. Pages on-call with lower urgency. The 1-second spike doesn't trigger either rule — it's too short to appear in the 5-minute rate calculation."
        tradeoff: "Single threshold alert (>1% for 5min) vs. multi-window burn rate: single threshold catches sustained degradation but misses 100% error rate for 1 minute (which burns 50× the budget). Multi-window burn rate catches both: fast burn (100% error for 1min) and slow burn (2% error for 5 hours). Google SRE Workbook recommends multi-window for accurate SLO alerting with minimal false positives."
        caveat: "Follow-up: threshold for service with 0.1% normal error rate vs 0.9% normal error rate. The alert threshold should be relative to the error budget, not absolute. For a 99.9% SLO service (0.1% budget): alert at >0.5% error rate sustained for 5 minutes (5× budget burn). For a 99.1% SLO service (0.9% budget): alert at >2% error rate sustained for 5 minutes. Set thresholds as a multiple of baseline error rate. Follow-up: suppress during planned deployment window. Add a silencing label to the deployment pipeline: for N minutes before and after deployment, silence the slow burn alert. The fast burn alert (14× consumption) should never be silenced — a deployment that causes 100% error rate should page immediately regardless of maintenance windows."
        watch: "The 90-second page time requirement constrains the alert evaluation frequency. Prometheus default evaluation interval is 1 minute. To page within 90 seconds, set evaluation interval to 30 seconds and use FOR 1m (fire after 2 consecutive positive evaluations = 60 seconds detection + 30 second evaluation = 90 seconds from incident start to page). Tune evaluation interval based on your SLA."

      - number: 2
        question: "Design a distributed tracing sampling strategy for a 200-service system handling 100K req/s. Store at most 1000 traces/s without sampling bias."
        needed: "head-based: sample 1% at entry point; tail-based: sample 100% of error/slow traces, 0.1% of healthy traces; consistent sampling: propagate sample decision in trace context header"
        answer: "Tail-based sampling (preferred): collect all spans to a trace aggregator. At trace completion, decide keep/drop: keep 100% of traces with any error span, keep 100% of traces > 1s (slow), keep 1% of traces that are healthy and fast. This gives unbiased sampling of the important cases (errors and slowness) while controlling storage. The 100K req/s splits: 1% error rate = 1000 error traces/s (keep all), 10% slow (>1s) = 10K/s (keep all... but this is too many). Revised: keep 100% errors (1000/s), keep 10% slow traces (1000/s), keep 0.05% healthy (5/s) = ~2005 traces/s ≈ 2000/s. Consistent sampling: traceparent header propagates the 'sampled: 1' flag so all 200 services emit spans for sampled traces."
        tradeoff: "Head-based (sample 1% at entry) vs. tail-based (sample at trace completion): head-based is simple and low latency — sample decision made at request entry, propagated in header. No buffering needed. Downside: error traces are sampled at 1% = 99% of errors never recorded. Tail-based buffers all spans in memory until the trace completes, then makes a smart decision. Requires ~10 seconds of span buffering (for long traces). Memory overhead: 100K spans/sec × 10s × 500 bytes = 500MB buffer. Worthwhile for error detection."
        caveat: "Follow-up: when to make keep/drop decision in tail-based sampling. The decision is made when the root span completes (trace is 'closed'). Root span timeout: if root span doesn't close within 60 seconds, force-evaluate and apply the sampling decision. For async traces (Kafka consumers), the 'trace' may span minutes — use a 5-minute timeout. Follow-up: 40-service trace with sampling decision. Consistent sampling: the root span (service 1) makes the sampling decision and includes 'sampled: 1' or 'sampled: 0' in the traceparent header. All 39 downstream services read this header and emit spans only if 'sampled: 1'. The collector receives all spans for sampled traces; drops all spans for unsampled traces at ingestion."
        watch: "Sampling bias is the main risk. If you sample 1% uniformly, you see 1% of errors — but errors might cluster in specific services or user segments. Ensure your sampling strategy doesn't accidentally under-sample a specific service's errors (e.g., payment service errors are high-value). Apply service-specific sampling rules: 100% of payment service spans, 1% of recommendation service spans."

      - number: 3
        question: "Design a dead man's switch alert for a critical Kafka consumer. If the consumer stops processing messages, page on-call within 2 minutes."
        needed: "consumer emits 'heartbeat' metric every 30s when processing; alert: no heartbeat for 90s → fire PagerDuty; alternatively: alert on consumer lag growing > threshold for 2min"
        answer: "Two complementary approaches: (1) Heartbeat metric: consumer emits a Prometheus gauge 'consumer_last_seen_ts{group=X}' = current Unix timestamp every 30 seconds. Alert: IF (time() - consumer_last_seen_ts) > 90 THEN page. (2) Consumer lag: monitor kafka_consumer_group_lag{group=X} metric. Alert: IF kafka_consumer_group_lag > 1000 FOR 2m THEN page. Lag growing means the consumer exists but isn't keeping up; absent heartbeat means the consumer has stopped entirely. Use both: one catches a stopped consumer, the other catches a slow/stuck consumer."
        tradeoff: "Heartbeat-based vs. lag-based alerting: heartbeat fires even if the topic is empty (consumer running but no messages to process). Lag-based fires even if the consumer is running but slow. Heartbeat is more sensitive (fires on completely stopped consumer even with 0 messages). Lag-based catches degraded throughput. Use both together: heartbeat with a 90s window (fast detection), lag-based with a 2-minute window and lag threshold tuned to normal backlog."
        caveat: "Follow-up: distinguish consumer stopped vs topic empty. If the topic has 0 messages (no new orders), consumer lag = 0 and heartbeat = OK. No alert. If the consumer stops and the topic has 0 messages, heartbeat stops → 90-second alert. The heartbeat correctly distinguishes these cases. If you only use lag-based alerting, you'd never alert on a stopped consumer processing an empty topic. Follow-up: avoid false alerts during planned consumer restart. Add a maintenance window label to the alert: for 10 minutes during deployment, silence the heartbeat alert. Never silence the lag alert during deployment — a deploy that causes the consumer to stop processing should page immediately."
        watch: "The dead man's switch pattern (alert if you don't hear from me within N seconds) is the correct abstraction for monitoring background jobs and consumers. It inverts the normal alerting model: instead of 'alert when something bad happens', it says 'alert when you stop proving things are good'. This catches the silent failure mode (process crashed silently, no error thrown) that positive-condition alerts miss."

      - number: 4
        question: "Design SLO alerting for a payment API with a 99.9% availability SLO (error budget = 43.8 min/month). Alert when burning error budget too fast."
        needed: "multi-window burn rate: 1h window (14x burn rate) for fast burn; 72h window (1x burn rate) for slow burn; error budget remaining on dashboard; page only on fast burn"
        answer: "Error budget = (1 - 0.999) × 43,800 minutes/month = 43.8 minutes/month. Fast burn: rate = 14× means the budget will be exhausted in 43.8 / 14 ≈ 3 hours. Alert: IF rate(errors[1h]) / rate(requests[1h]) > 14 × 0.001 = 0.014 FOR 5m → PAGE (Critical). Slow burn: rate = 1× means on track to exactly exhaust the budget by month end. Alert: IF rate(errors[6h]) / rate(requests[6h]) > 0.001 FOR 30m → TICKET (Warning). Error budget consumed: (actual_errors / budget_errors) × 100. Show on dashboard: 'Error budget remaining: 73% (32 min remaining of 43.8 min)'. Page on fast burn only; create tickets for slow burn."
        tradeoff: "SLO-based alerting (burn rate) vs. threshold alerting (>1% error rate): threshold alerting pages for sustained >1% error rate regardless of budget impact. This causes alert fatigue if the baseline is 0.9% (just 0.1% over threshold). Burn rate alerting pages based on budget consumption speed — meaningful in context of the SLO. A 2% error rate for 30 minutes is only meaningful if it's consuming 14× the monthly budget."
        caveat: "Follow-up: define 'error' for this SLO. Standard definition: HTTP 5xx responses. But also consider: HTTP 4xx from the server's perspective (e.g., 429 rate limited = client error but impacts user experience), timeouts (request takes >30s = de facto error even if technically succeeds), and partial failures (payment processed but receipt email failed). Explicitly define the SLI (Service Level Indicator) and document which HTTP codes count as errors. Follow-up: 50% monthly budget consumed in 10 minutes. This is 50% / (10 / 43,800) = ~2,190× burn rate. The fast burn alert fires within 5 minutes of the incident. With 50% budget consumed in 10 minutes, the budget is exhausted at 20 minutes. You have 15 minutes to respond after the alert fires. Automate immediate traffic shedding or rollback — 15 minutes is too short for manual diagnosis."
        watch: "Error budget gives a concrete, business-meaningful number to communicate incident severity. 'We have a P1 incident that has consumed 50% of our monthly error budget in 10 minutes' is more actionable than 'error rate is 2%'. Budget framing connects technical metrics to customer impact and business risk."

      - number: 5
        question: "Design an uptime monitor for 10K customer API endpoints. Each endpoint must be probed every 60 seconds from 3 geographic regions."
        needed: "partitioned probe jobs: each worker owns N endpoints; probe result → time-series DB → alert if 2/3 regions fail simultaneously; jitter probes to avoid synchronized spikes every 60s"
        answer: "Workers: 100 worker pods, each assigned 100 endpoints (10K / 100). Each worker probes its 100 endpoints every 60 seconds using async HTTP (all 100 in parallel, not serial — avoids cumulative latency). Per-endpoint probe schedule: scheduled at T + hash(endpoint_id) % 60 seconds for initial offset (jitter). Three regional probe clusters (US, EU, APAC): each region has 100 workers probing all 10K endpoints. Results stream to a time-series DB (InfluxDB or Prometheus). Alert rule: endpoint_down = 1 if >= 2 of 3 regions report failure within the same 60-second window. A single region failing = regional issue, not customer-facing. At least 2 regions failing = genuine outage."
        tradeoff: "Active probing (HTTP GET from outside) vs. passive monitoring (analyze traffic logs): active probing detects outages even when there's no traffic (e.g., at 3 AM with zero users). Passive monitoring requires traffic but gives exact user-facing success rates. For SLA monitoring of customer endpoints, active probing is standard — it directly measures availability from the customer's perspective."
        caveat: "Follow-up: detect probe that's itself failing (false negatives). If the probe infrastructure fails (DNS resolution failure, regional network outage), all endpoints in that region appear down simultaneously. Detection: if >= 80% of probed endpoints in one region fail simultaneously, it's the probe that's failing, not the endpoints. Suppress region-wide failure alerts; alert the probe infrastructure team. Cross-check: if US region shows all down but EU shows all up, the US probe is broken. Follow-up: handle slow endpoints (5s response) vs. down endpoints. Set probe timeout at 10 seconds. Endpoints that respond in 5s = up (but record latency for SLA tracking). Endpoints that don't respond in 10s = treated as down for alert purposes. Track response time separately from uptime for SLA reporting."
        watch: "Jitter is critical: without jitter, all 100 workers hit their 100 endpoints at T=:00, T=:60, T=:120. At T=:00, 10K probes fire simultaneously — potential probe infrastructure overload and endpoint overload (10K HTTP requests in 1 second). With hash-based jitter, probes are spread evenly across the 60-second window: ~167 probes/second instead of 10K probes/second."

      - number: 6
        question: "Design a latency percentile dashboard for a Python API service. Track p50, p95, p99 latency per endpoint, updated every 30 seconds."
        needed: "Prometheus histogram buckets per endpoint label; PromQL: histogram_quantile(0.99, rate(...))[30s]; alert if p99 > 500ms for > 2 minutes"
        answer: "Prometheus histogram: http_request_duration_seconds_bucket{endpoint='/api/payment', le='0.1'} — 15 pre-defined buckets (0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10, 25, 50, 100, +Inf). Bucket boundaries chosen to span expected latency range. PromQL: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{endpoint='/api/payment'}[30s])). Dashboard: separate Grafana panel per percentile (p50, p95, p99) with endpoint as a variable. Alerting rule: ALERT IF histogram_quantile(0.99, rate(...)[2m]) > 0.5 FOR 2m → high p99 latency."
        tradeoff: "Prometheus histogram vs. summary: summary computes quantiles client-side (fast, accurate) but can't be aggregated across instances — summaries from pod-1 and pod-2 can't be combined. Histogram stores bucket counts (aggregatable across instances: rate(bucket{instance=~'.*'}[5m]) sums all instances). For a multi-instance service, histogram is always correct. Summary quantiles are inaccurate when aggregated."
        caveat: "Follow-up: detect latency regression introduced by a specific deployment. Use deployment markers in Grafana: annotate the dashboard with deployment events (Kubernetes deployment updates trigger an annotation via webhook). Visually inspect the p99 trend around the deployment time. Programmatically: compare p99 in the 30-minute window before deploy vs. 30-minute window after deploy. If after_p99 > before_p99 × 1.5 (50% regression), alert. Follow-up: why histogram over summary for multi-instance. Histograms are additive: to get fleet-wide p99, sum all bucket counters across all instances and then apply histogram_quantile. This gives accurate fleet-wide percentiles. Summary quantiles cannot be averaged or summed — the average of two p99 values is not the fleet p99."
        watch: "Histogram bucket boundaries must be set before deployment and cannot be changed without creating a new metric. Choosing boundaries that are too coarse (e.g., only 0s, 0.5s, 1s) gives inaccurate quantiles between buckets. A request taking 0.6s would land in the [0.5, 1] bucket — you can only know it's between 0.5s and 1s, not 0.6s. Set 15–20 buckets spanning your full expected latency range."

      - number: 7
        question: "Design a canary deployment monitor. After deploying to 5% of pods, automatically rollback if error rate on canary pods is > 2x the baseline error rate."
        needed: "compare error_rate(canary pods) vs error_rate(stable pods) in Prometheus; alert rule: canary > 2× stable for 5 minutes; automated rollback via Argo Rollouts analysis step"
        answer: "Argo Rollouts progressive delivery: 5% canary weight → analysis step runs for 10 minutes. Analysis template: PromQL: rate(http_errors_total{version='canary'}[2m]) / rate(http_errors_total{version='stable'}[2m]). Success condition: result < 2.0 (canary error rate < 2× stable). Failure condition: result > 2.0 for 5 consecutive measurements (every 1 minute). On failure: Argo Rollouts automatically scales canary to 0%, restores stable to 100%. Total detection time: 5 minutes. Notification: Argo sends Slack/PagerDuty notification with the PromQL result that triggered rollback."
        tradeoff: "Automated rollback vs. manual rollback with automated alert: automated rollback is faster (5 minutes vs. time-to-human-response × 2) but can hide bugs if the rollback is triggered by a false positive (e.g., noisy metric during the canary window). Manual rollback preserves the canary pod state for debugging. For payment-critical deployments, automated rollback within 5 minutes saves significant error budget. For debugging-heavy deployments (new complex feature), manual rollback with automated alert allows investigation before rollback."
        caveat: "Follow-up: compute error rate with only 5% traffic (small sample). At 1000 req/s total, canary gets 50 req/s. At 2% error rate, canary gets 1 error/sec. Over 5 minutes: 300 errors. Statistically significant at this volume. But at 10 req/s total (very low traffic service), canary gets 0.5 req/s → 1.5 errors in 5 minutes → statistically unreliable. For low-traffic services, extend the analysis window to 30 minutes or use a request count threshold (minimum 500 requests before evaluating). Follow-up: how long to wait before declaring canary healthy. 10-minute analysis window at 5% → 30 minutes at 20% → 60 minutes at 50% → 100% promotion. Progressive: 5% → 20% → 50% → 100%, each stage with analysis. Total promotion time: ~2 hours. Acceptable for weekly deployments; for continuous delivery (50 deploys/day), automate with shorter windows."
        watch: "The canary error rate comparison must be fair: if 5% canary traffic is routed to the 'harder' requests (newer users, larger payloads) due to load balancer quirks, the comparison is biased. Use consistent hashing (route the same user always to the same version) or random 5% sampling. Monitor traffic distribution per version — if user demographics differ significantly between canary and stable, the comparison is meaningless."


  - slug: qb-api-design
    title: "API Design & Gateways"
    description: "Cursor pagination, API versioning, bulk APIs, GraphQL N+1, request aggregation, JWT validation, webhooks"
    number_range: "Q043–Q044, Q061, Q071–Q072, Q094–Q095, Q123, Q137, Q144"
    questions:
      - number: 1
        question: "Design a cursor-based pagination API for a 100M-row transaction history table. Pages must be stable — new transactions added while paginating must not shift results."
        needed: "cursor = opaque Base64-encoded (created_at, id); query: WHERE (created_at, id) < (cursor_ts, cursor_id) ORDER BY created_at DESC LIMIT 20; index on (created_at, id)"
        answer: "Cursor: Base64-encode {created_at: '2024-01-15T10:30:00Z', id: 123456789}. First page: SELECT * FROM transactions WHERE user_id = X ORDER BY created_at DESC, id DESC LIMIT 20. Response includes: {transactions: [...], next_cursor: 'base64(created_at_of_last, id_of_last)'}. Subsequent pages: SELECT * FROM transactions WHERE user_id = X AND (created_at, id) < ($cursor_ts, $cursor_id) ORDER BY created_at DESC, id DESC LIMIT 20. This uses a composite index on (user_id, created_at DESC, id DESC). New transactions (created after cursor start) are added to the beginning of the result set — they don't shift pages because each page starts from the last item's cursor position, not a row offset."
        tradeoff: "Cursor-based vs. offset-based pagination: OFFSET N scans and discards N rows — at offset 1M on a 100M-row table, that's 1M rows scanned for zero returned. Cursor-based uses the index to start at the exact cursor position — O(log N) regardless of page depth. Cursor is opaque to the client (can't skip pages), but for transaction history where sequential browsing is the use case, this is acceptable."
        caveat: "Follow-up: cursor pointing to a deleted transaction. The deleted transaction's created_at and id no longer exist. The query WHERE (created_at, id) < ($cursor_ts, $cursor_id) still works — it returns rows before the deleted row's position. No error, no duplicate, no missed rows. The gap where the deleted row was simply isn't returned. Follow-up: backward pagination (prev page). Reverse the sort: ORDER BY created_at ASC, id ASC LIMIT 20, using a 'previous_cursor' that encodes the first item of the current page. Alternatively: store the full cursor chain client-side and navigate by requesting pages by their start cursor. Most transaction histories are forward-only — prev page is rarely needed."
        watch: "The cursor must be opaque to clients — never expose raw timestamps or IDs in the cursor. Use Base64 encoding to signal 'this is an opaque token, don't try to parse it'. If you expose raw timestamps, clients may try to construct their own cursors (e.g., skip to a specific date), which can break if the sort order or schema changes."

      - number: 2
        question: "Design the API versioning strategy for Stripe's payment API. New breaking changes must not affect existing customers while new customers use the latest version."
        needed: "version tied to customer's account (set on API key creation date); request transformer per version: adapt new model to old response shape; deprecation sunset header"
        answer: "Version is a property of the API key, set at key creation: 2023-11-01, 2024-01-01, etc. All requests from a key use that version automatically — no version parameter in the URL or header required. When a breaking change is made (e.g., renamed field 'amount' to 'amount_cents'): create a new version date, add a request/response transformer that adapts the new shape to the old shape for older versions. The transformer is a middleware mapping: if version < '2024-01-01' then response.amount = response.amount_cents / 100. Old customers see the old shape. New customers (new API key) get the latest version and see the new shape. Sunset header: Stripe-Version: 2023-11-01 Sunset: 2025-01-01 — warns callers that this version will be removed."
        tradeoff: "Version-per-API-key (Stripe approach) vs. URL versioning (/v1/charge, /v2/charge): URL versioning is explicit and easy to test, but customers must explicitly migrate. Version-per-API-key is transparent — existing code keeps working after the API changes. Downside: maintaining N response transformers for N API versions is complex. Stripe maintains dozens of versions. Budget for this complexity if you need strict backward compatibility."
        caveat: "Follow-up: customer creates a new API key — do they get the latest version? Yes. New API keys always get the latest API version. Existing customers can request a 'pinned version' new API key to stay on an older version intentionally. Follow-up: testing that v3 change doesn't break v1 behavior. Maintain a regression test suite per API version: for each version, snapshot the expected request/response pairs. Run all version test suites on every deploy. If any older version's transformer fails to produce the expected output, the deploy is blocked."
        watch: "Stripe maintains API version compatibility for years (some versions since 2014 are still supported). This requires disciplined transformation middleware and explicit versioning discipline: every breaking change gets a new version date, every version gets a transformer. The alternative (breaking the API whenever needed) destroys developer trust and causes churn. Invest in versioning infrastructure early."

      - number: 3
        question: "Design an API for bulk creating 10K orders in one request (B2B use case). Handle partial failures: some orders succeed, some fail validation."
        needed: "accept array of orders; validate all before processing any; return per-item status; async option for >1K orders: return job_id, poll for completion"
        answer: "Endpoint: POST /v1/orders/bulk. Request: {orders: [{...}, {...}, ...]}. Sync path (≤1K orders): validate all orders first (fail-fast on schema errors). Then process: INSERT in a single multi-row transaction. Return: {succeeded: [{order_id, status: 'created'}, ...], failed: [{index: 5, error: {code: 'INVALID_SKU', message: '...'}}, ...]}. Async path (>1K orders): accept the batch, return 202 Accepted with job_id. POST /v1/bulk_jobs/{job_id}/status returns progress. HTTP 207 Multi-Status response for sync path (some succeeded, some failed — not 200 or 400)."
        tradeoff: "All-or-nothing transaction (all orders in one DB transaction) vs. best-effort (commit each order independently): B2B clients usually prefer best-effort — they want as many orders processed as possible, even if some fail. All-or-nothing requires every order to be valid before any are processed — a single invalid order blocks the entire batch. Best-effort is more complex to implement (partial rollbacks) but provides better UX for B2B clients."
        caveat: "Follow-up: process in a transaction (all-or-nothing) or best-effort. Ask the client. Provide a parameter: ?mode=transactional (all-or-nothing) or ?mode=best_effort (default). Transactional is useful for financial operations where partial success creates reconciliation issues. Best-effort is useful for order intake where you want max throughput. Follow-up: HTTP timeout for 10K orders taking 30s. For >1K orders, always use the async path (202 + job_id). The sync path has a 5-second timeout. For async path, return 202 immediately (within 100ms), process in background, client polls for completion. Never block on HTTP for bulk operations that take >5 seconds."
        watch: "The 207 Multi-Status HTTP code is often overlooked. Use it explicitly for bulk operations with partial success — it signals to clients that they must inspect per-item status rather than treating the entire response as a success. Standard HTTP 200 for partial success hides failures from clients that only check the status code."

      - number: 4
        question: "Design a DataLoader to solve the N+1 query problem for a GraphQL API that fetches user details for each post in a feed (100 posts = 100 user queries)."
        needed: "DataLoader batches all user_id lookups in a single request frame; single SELECT WHERE id IN (...) replaces 100 individual SELECTs; cache results within request lifecycle"
        answer: "DataLoader implementation: collect all user_id lookups that happen within the same 'tick' (one GraphQL resolver execution). Instead of SELECT * FROM users WHERE id = 1, SELECT * FROM users WHERE id = 2, ... (N separate queries), DataLoader batches them: SELECT * FROM users WHERE id IN (1, 2, 3, ..., 100). Return results as a map. Cache the results within the request scope: a second resolver asking for user_id=1 returns from cache without a new DB query. Implementation in Python (strawberry-graphql): use a DataLoader class with a batch_load_fn that takes [ids] and returns [users_in_same_order]. At 100 posts × 100 user lookups → 1 batch query = 1 DB round trip (100 rows) vs. 100 DB round trips."
        tradeoff: "DataLoader (batching + per-request cache) vs. preloading (JOIN in the parent resolver): JOIN in parent: SELECT posts.*, users.* FROM posts LEFT JOIN users ON posts.user_id = users.id — returns posts with users in one query. Simpler but couples post resolver to user resolution. DataLoader: decouples resolvers (each resolver is independent) but requires a DataLoader abstraction. For GraphQL with deep nesting (post → user → company → industry), DataLoader scales better — JOINs become exponentially complex."
        caveat: "Follow-up: user appears in 40 of 100 posts. DataLoader caches within the request: the first batch query returns user_id=5. The 40th resolver asking for user_id=5 gets the cached result — zero DB queries for the 40 cached lookups. Total DB calls: 1 batch query for all unique user_ids. Follow-up: batch partially fails (3 of 100 users not found). DataLoader returns null for missing users (user was deleted after post was created). The batch_load_fn returns a list in the same order as the input ids: [user_obj, None, user_obj, ...]. GraphQL null propagation: if user field is non-null in the schema, a null from DataLoader propagates as an error. Make user field nullable or return a stub object for missing users."
        watch: "DataLoader solves N+1 at the GraphQL resolver level. But N+1 can also occur at the application layer (loop calling a REST API N times). The same batching principle applies: collect all IDs from the loop, make one bulk API call, map results back to individual items. DataLoader is the pattern; the implementation adapts to the context."

      - number: 5
        question: "Design rate limiting for a GraphQL API where query cost is variable. Limit clients to 1000 units/min."
        needed: "static query analysis: assign cost per field/depth at parse time; check cost against client's token bucket before execution; reject over-limit queries with 429 and remaining budget"
        answer: "Query cost calculation at parse time (before execution): define a cost schema — every scalar field = 1 unit, every connection field (paginated list) = page_size × child_cost, every nested object = parent_cost + child_cost. Example: posts(first: 10) { user { followers { id } } } = 10 posts × 1 user × N followers (unknown until execution!). For unknown sizes, use a pessimistic estimate (e.g., max 100 items per connection). Calculate total cost: 10 × 1 × 100 = 1000 units. Check against client's token bucket (Redis): if cost > remaining_budget → reject 429. On success: DECRBY 'rl:{client_id}' cost. Response headers: X-Cost: 1000, X-Budget-Remaining: 500."
        tradeoff: "Static cost analysis (at parse time) vs. runtime cost (measure actual DB queries): runtime is more accurate but can't reject expensive queries before they execute. Static analysis allows rejection before any DB work. Downside: static analysis may over-estimate cost for queries with small actual result sets. Over-rejection (client's query was cheap but estimated expensive) is a UX issue — provide cost estimates in error responses so clients can optimize."
        caveat: "Follow-up: client sends 1000 max-cost queries simultaneously. Rate limiting should prevent all 1000 from executing. Redis DECRBY is atomic — the first client to decrement below 0 is rejected. With 1000 concurrent queries all at 1000 units, only the first query would succeed (assuming 1000-unit/min budget). The other 999 are rejected with 429. Client should implement retry with backoff. Follow-up: cost assignment for queries using fragments or variables. Inline fragments (... on Post { title }) have the same cost as the expanded query — cost the fields within the fragment normally. Variable-sized connections with variables (first: $n) use the maximum allowed value for $n when calculating cost (pessimistic bound). Clients who use small values don't get credit for it statically."
        watch: "Document the cost schema for API consumers. Publish a 'cost calculator' endpoint: POST /graphql/cost with the query body returns the estimated cost. This allows developers to optimize their queries before hitting rate limits in production."

      - number: 6
        question: "Design request transformation in an API gateway. External clients send camelCase JSON; internal services expect snake_case. Transform at the gateway layer transparently."
        needed: "request interceptor in Kong/Nginx converts camelCase keys to snake_case; response interceptor does reverse; transformation config per route; no touching service code"
        answer: "Kong plugin or Nginx Lua script: (1) Request transformer: on incoming request, recursively convert all JSON keys from camelCase to snake_case. {userId: 123} → {user_id: 123}. Forward transformed request to upstream. (2) Response transformer: on response, recursively convert snake_case keys back to camelCase. {user_id: 123} → {userId: 123}. Transformation config stored per route in Kong's Admin API. Recursive key conversion handles nested objects and arrays. Performance: transformation adds 1–3ms for typical payloads (1–10KB). For large payloads (1MB+), consider streaming transformation to avoid buffering."
        tradeoff: "Gateway-level transformation vs. each service accepting both formats: each service accepting both adds complexity (dual field names, validation for both). Gateway transformation is transparent to services — they always receive snake_case. Downside: transformation logic is now in the gateway, not with the service owner. Ensure transformation rules are version-controlled and tested as part of the service's integration tests."
        caveat: "Follow-up: nested JSON objects and arrays. Recursive traversal handles nested objects. Arrays of objects: iterate the array and transform each object's keys. Performance consideration: a deeply nested object (10 levels, 100 fields each) requires 10^3 = 1000 key iterations — budget ~0.1ms per MB. Follow-up: ensure transformation doesn't break on new field. Add a 'passthrough unknown fields' rule: if a key is already snake_case (or camelCase but not in the transformation config), pass it through unchanged. Never reject requests for having unrecognized fields — that would break clients when new fields are added."

      - number: 7
        question: "Design a request aggregation pattern in an API gateway: one client request to /dashboard fetches data from 5 microservices in parallel and combines the response."
        needed: "gateway fires 5 parallel requests with deadline propagation; partial response: if 1 of 5 fails, return other 4 + error flag; response schema versioned"
        answer: "Gateway receives GET /dashboard. Fires 5 parallel subrequests: user_profile (50ms), recent_orders (100ms), notifications (30ms), recommendations (200ms), promotions (80ms). All with a shared deadline: context with timeout=500ms. On completion: merge all responses into {user_profile: {...}, recent_orders: {...}, notifications: {...}, recommendations: null, promotions: {...}, _errors: {recommendations: 'timeout'}}. The 200ms recommendations request timed out — returned as null with an error flag. Client shows the 4 successful sections; gracefully hides the recommendations section with a 'load failed' state."
        tradeoff: "Gateway aggregation vs. client-side parallel calls: client-side requires 5 separate HTTP round trips from the client (5× network latency if the client is mobile). Gateway aggregation uses server-side network (datacenter speed, <1ms between services). Client gets one fast round trip. Gateway aggregation is better for mobile clients. Client-side calls are better for browser SPAs where the client can render partial data as each call completes (progressive rendering)."
        caveat: "Follow-up: one upstream taking 800ms while others return in 50ms. With a 500ms gateway deadline, the slow upstream is cancelled at 500ms. The gateway returns partial results with an error flag for the slow service. Monitor: track per-service response time at the gateway. Alert if any upstream causes > 10% of /dashboard requests to have a missing section. Follow-up: cache aggregated response when sub-responses have different TTLs. Cache the aggregated response at the minimum TTL of all sub-responses: if user_profile TTL=60s and promotions TTL=10s, cache the combined response for 10s. Return cached response without re-aggregating for 10 seconds. After 10s, re-aggregate."
        watch: "The gateway aggregation pattern creates a single point of failure: if the gateway crashes, all 5 services become unreachable from the client. Ensure the gateway itself is redundant (3+ instances behind a load balancer). The latency SLA for /dashboard is dominated by the slowest sub-request — monitor per-service contribution to /dashboard latency to identify which service to optimize first."

      - number: 8
        question: "Design JWT validation at the API gateway layer. 500 microservices should not each validate tokens; the gateway validates once and passes user context downstream."
        needed: "gateway validates JWT signature using cached public key (JWKS endpoint); injects X-User-ID and X-User-Roles headers after validation; downstream services trust gateway headers"
        answer: "Gateway validates JWT: (1) Extract JWT from Authorization: Bearer {token} header. (2) Verify signature using the auth server's public key — fetch from JWKS endpoint (https://auth.example.com/.well-known/jwks.json) and cache in memory with 1-hour TTL. (3) Verify claims: expiry (exp), audience (aud), issuer (iss). (4) On success: inject X-User-ID: {user_id} and X-User-Roles: {roles_csv} headers. (5) Strip the Authorization header (prevent downstream services from accidentally using it). (6) Forward to upstream service. Downstream services: trust X-User-ID and X-User-Roles headers. Never re-validate the JWT — the gateway's validation is the single point of trust."
        tradeoff: "Centralized JWT validation at gateway vs. per-service validation: per-service validation adds 1–2ms per request in every microservice (JWKS key fetch is cached, but JWT verification still requires asymmetric crypto: ~0.5ms). At 500 services × 1ms = 500ms overhead per request chain. Gateway validation: 1ms once, then fast header injection. Centralized validation also ensures consistent behavior — a security bug in validation only needs to be fixed in one place."
        caveat: "Follow-up: key rotation without invalidating active sessions. Auth server generates a new key pair. JWKS endpoint now returns both old and new public keys (both active). Gateway validates new JWTs with the new key; old tokens signed with the old key still validate (old key is still in JWKS). After JWT TTL expires (15 minutes), all clients have refreshed their tokens using the new key. Remove old key from JWKS after 30 minutes. No session interruption. Follow-up: token valid but user has been banned since issuance. JWT doesn't check DB for user status — banned user's valid (unexpired) token still passes signature validation. Fix: add a 'token version' or 'banned' check: maintain a short-lived blocklist in Redis (SET 'banned:{user_id}' 1 EX 900 where 900s = JWT TTL). Gateway checks Redis after signature validation: if SISMEMBER banned users → 401."
        related_fundamentals: [storage/redis]

      - number: 9
        question: "Design a webhook registration API for a developer platform. Support adding, updating, deleting webhooks, with signature verification."
        needed: "POST /webhooks {url, events[], secret}, returns webhook_id; sign each delivery with HMAC-SHA256 using secret; webhook secret stored hashed in DB; never returned in GET responses"
        answer: "Registration: POST /webhooks {url: 'https://app.example.com/webhook', events: ['payment.completed', 'payment.failed'], secret: 'user_provided_or_generated'}. Store: {webhook_id, url, events, secret_hash: SHA256(secret + salt), created_at, status: active}. Delivery signature: X-Webhook-Signature: sha256=HMAC-SHA256(secret, raw_request_body). Recipient verifies: compute_hmac(secret, body) == header_signature (constant-time comparison to prevent timing attacks). GET /webhooks/{id} returns {webhook_id, url, events, created_at} — never returns the secret or secret_hash. To update: PATCH /webhooks/{id} allows changing url or events; changing the secret requires generating a new one (re-send to client securely)."
        tradeoff: "HMAC-SHA256 signature vs. mutual TLS (mTLS) for webhook security: HMAC is simpler (no cert management) and portable (can be verified in any language). mTLS provides stronger authentication (proves the sender, not just the secret) but requires the developer to manage client certificates. For webhooks, HMAC-SHA256 is the industry standard (Stripe, GitHub, Twilio all use it)."
        caveat: "Follow-up: validate that developer's endpoint is reachable before registering. Send a 'ping' event to the provided URL during registration: POST /webhooks triggers an immediate delivery of a test event {type: 'webhook.test', webhook_id: '...'}. If the endpoint returns 200 within 10 seconds, confirm registration. If timeout or error: return 422 with 'endpoint unreachable' error. Follow-up: endpoint returns 2xx but developer is ignoring it. You can't distinguish 'received and ignored' from 'received and processed' at the HTTP layer. Require the developer to parse the event type and return 200 only after acknowledging the specific event. Track event delivery metrics — if a webhook is always returning 200 but the developer never triggers follow-up actions, it suggests passive acceptance without processing."


  - slug: qb-security-compliance
    title: "Security & Compliance"
    description: "CSRF, secret rotation, GDPR erasure, mTLS, pre-signed URLs, data masking, secrets injection"
    number_range: "Q047–Q048, Q082–Q083, Q086–Q087, Q113, Q129–Q130"
    questions:
      - number: 1
        question: "Design the CSRF protection for a banking app's fund transfer endpoint. Prevent cross-site request forgery without breaking the mobile app flow."
        needed: "web: synchronizer token in form, validated server-side; mobile: SameSite=Strict cookies + Origin header check; double submit cookie for stateless services"
        answer: "Web browser: on GET /transfer (load the form), server sets a CSRF token (random 32-byte value) in the user's session and embeds it in a hidden form field. On POST /transfer, server validates that the submitted CSRF token matches the session's token — a cross-origin attacker can't read the user's cookie (SameSite=Strict) or access the hidden form field (same-origin policy). Mobile app: uses Bearer token authentication (not cookies) — CSRF doesn't apply, because CSRF requires cookie-based authentication. A cross-site request from a malicious page can't include Bearer tokens (they're not automatically sent like cookies). For stateless services: double-submit cookie — CSRF token in both a cookie and a request header. Cross-origin attackers can't read cookies (same-origin policy) but the server can verify they match."
        tradeoff: "Synchronizer token (server-side state) vs. double-submit cookie (stateless): synchronizer token is more secure (token stored server-side can't be leaked via subdomain cookie compromise). Double-submit cookie is stateless (no server-side session needed) — better for horizontally scaled services. For banking apps, use synchronizer token — the extra security is worth the statefulness."
        caveat: "Follow-up: CSRF protection interaction with CORS. CORS and CSRF are different mechanisms. CORS prevents cross-origin JavaScript from reading responses (doesn't prevent requests). CSRF prevents cross-origin requests from being unintentionally executed. For same-origin web apps: CSRF tokens are the protection. For CORS-enabled APIs (cross-origin JavaScript clients): use SameSite=Strict cookies + CORS Origin validation as the CSRF protection. Follow-up: CSRF protection needed for mobile app using Bearer token. No — CSRF is specifically a browser-cookie vulnerability. Mobile apps using Bearer tokens (stored in app memory, not cookies) are not vulnerable to CSRF. Don't add CSRF token validation to mobile API endpoints — it adds complexity without security benefit."
        watch: "SameSite=Strict cookies prevent cookie transmission in cross-origin requests — including OAuth redirect flows. A user who clicks 'authorize' in a third-party OAuth flow and is redirected back won't have their SameSite=Strict session cookie sent with the redirect. Use SameSite=Lax for OAuth-compatible CSRF protection: Lax allows top-level navigation (redirect) but blocks cross-origin POST. For fund transfers (POST only), Lax still provides CSRF protection."

      - number: 2
        question: "Design a secret rotation system for a Python microservice using a DB password stored in AWS Secrets Manager. Rotation must happen with zero service downtime."
        needed: "Secrets Manager rotates: creates new password, updates DB, marks old as pending; service fetches secret at startup and caches with 5min TTL; on DB auth failure, force re-fetch of secret"
        answer: "Secrets Manager rotation Lambda: (1) Create new password in Secrets Manager (new version marked AWSPENDING). (2) Update DB user to accept the new password (or create new DB user). (3) Mark new version as AWSCURRENT; old version becomes AWSPREVIOUS. Service-side: cache secret in memory with 5-minute TTL. On cache miss: GET /secret/{name}?VersionStage=AWSCURRENT. On DB connection failure with authentication error: immediately re-fetch from Secrets Manager (bypass cache TTL). This handles the race condition: if cache holds old password during rotation, next DB auth failure triggers a fresh fetch of the new password. Maximum stale period: until the next connection attempt fails → re-fetch (<1s)."
        tradeoff: "Automatic rotation (AWS-managed Lambda) vs. manual rotation (engineering-triggered): automatic rotation runs on a schedule (30 days) with no human intervention. Manual requires a runbook and human execution — prone to delays and errors. Automatic rotation is the correct choice for production. The rotation Lambda must be idempotent: multiple invocations (from Lambda retry) must not create duplicate DB users or leave the DB in an inconsistent state."
        caveat: "Follow-up: 20 pods simultaneously fetching new secret after rotation. Thundering herd on Secrets Manager API. AWS Secrets Manager has API rate limits (1000 req/sec per region). With 20 pods, each pod has 1 connection → 20 simultaneous cache misses → 20 API calls — trivial, not a thundering herd. At 5000 pods, stagger cache TTL with jitter: TTL = 300 + random(0, 30) seconds. This spreads cache misses over 30 seconds → 5000/30 = 167 API calls/sec — within limits. Follow-up: rollback if new secret fails to authenticate. Keep AWSPREVIOUS version in Secrets Manager for 30 minutes after rotation. Service's re-fetch-on-failure logic: if AWSCURRENT fails authentication, try AWSPREVIOUS (fallback). Trigger an alert: rotation may have failed. Rotation Lambda: include a test step that validates the new password authenticates before marking it AWSCURRENT."
        watch: "Never inject secrets as environment variables at pod start. Env vars are visible in Kubernetes pod spec, pod logs, and process listings. Use Secrets Manager with at-runtime fetch or Kubernetes ExternalSecrets operator (syncs Secrets Manager secrets to K8s secrets, mounted as files or env vars). If you must use env vars, at least fetch from Secrets Manager at runtime and set in the container's environment, rather than baking secrets into the container image."

      - number: 3
        question: "Design RBAC (Role-Based Access Control) for a multi-tenant SaaS. A user may have different roles in different tenants. Permission checks must be < 5ms."
        needed: "roles and permissions pre-computed and cached per (user_id, tenant_id) in Redis; JWT contains user roles for current tenant; permission check: cache hit is simple set membership test"
        answer: "Data model: users, roles, permissions, user_roles (user_id, tenant_id, role_id). Permission check: is user X allowed to perform action Y in tenant T? Pre-compute and cache: on user login or role change, compute the full permission set for (user_id, tenant_id) and store in Redis as a SET 'perms:{user_id}:{tenant_id}' with TTL 5 minutes. Permission check: SISMEMBER 'perms:{user_id}:{tenant_id}' 'orders:create' → O(1), <1ms. JWT: include roles array for the current tenant. On role change: DEL the Redis key and publish an invalidation event so all service instances invalidate their local cache."
        tradeoff: "Pre-computed permissions in Redis (cache) vs. DB query on each permission check: DB query adds 5–20ms per check. At 100 permission checks per request × 20ms = 2 seconds overhead per request. Redis SISMEMBER: <1ms per check = 100ms total. Redis cache is mandatory for the 5ms SLA. Memory: if a user has 100 permissions in a tenant, and there are 10M users × 10 tenants each = 100M permission sets. Not all are active simultaneously — LRU eviction removes inactive users' cached permissions."
        caveat: "Follow-up: permission change that must take effect within 30 seconds. On role change: DEL 'perms:{user_id}:{tenant_id}' in Redis immediately. The next permission check will miss the cache and recompute from DB. Maximum stale window: until the user's next request (which triggers cache miss → DB fetch → fresh cache). If the user is actively making requests, the fresh cache is populated within <1 second of the role change. In the worst case (user idle for TTL duration), the stale permission is served for TTL-5min. Set TTL=30s for permission caches to meet the 30-second requirement. Follow-up: role inheritance (Admin inherits all Editor permissions). Store inherited permissions in the pre-computed set: when computing Admin's permissions, include all Editor's permissions. The Redis SET includes all permissions from all inherited roles. Permission check remains O(1) regardless of inheritance depth."
        related_fundamentals: [storage/redis]

      - number: 4
        question: "Design a GDPR right-to-erasure pipeline. When a user deletes their account, all PII must be purged from 20+ data stores within 30 days, with proof of deletion."
        needed: "deletion request creates a saga that fans out to each data store owner service; each service has a defined deletion handler; audit log (non-PII): (user_id_hash, store_name, deleted_at) retained for proof"
        answer: "Deletion request → orchestrator creates a deletion task per data store: {user_id, store: 'user_db', status: 'pending'}, {user_id, store: 'analytics_warehouse', status: 'pending'}, ... (20 tasks). Each service team owns a deletion handler that receives user_id and deletes PII from their store. Handlers report completion back to the orchestrator. Status tracking: deletion_tasks table shows per-store progress. Proof of deletion: immutable audit log (separate, secure system): {user_id_hash: SHA256(user_id), store_name: 'user_db', deleted_at: 2024-01-15T10:00:00Z}. Use a hash of user_id (not user_id itself) so the audit log contains no PII. Provide this log to regulators on request."
        tradeoff: "Saga orchestrator vs. event-driven (publish user_deleted event, each service reacts): event-driven is simpler to implement (no orchestrator state), but tracking completion across 20 services is hard — who verifies all 20 have processed the event? Orchestrator maintains explicit state per service → easy to answer 'has store X completed deletion?' for compliance audits."
        caveat: "Follow-up: delete user's data from an immutable analytics data lake (S3/BigQuery). True erasure from immutable data lakes is difficult. Options: (1) Pseudonymization: replace user_id with a random token in raw events — deletion is 'delete the mapping key', making events unlinkable to the user. (2) Re-partition and overwrite: write new Parquet files excluding the user's rows (expensive). (3) Metadata-level deletion: record user_id as deleted in a 'deleted_users' table; all analytics queries filter against this table. Choose based on regulatory interpretation — regulators increasingly accept pseudonymization as erasure. Follow-up: third-party vendor who received data export. Send a 'data deletion request' per your vendor contract's DPA (Data Processing Agreement). The vendor is legally obligated to honor it within 30 days. Track vendor deletion requests in the same orchestrator: {store: 'salesforce', status: 'requested', requested_at: ...}. Follow up if vendor hasn't confirmed deletion within 30 days."
        watch: "The 30-day GDPR deadline runs from the date of the deletion request, not from when you process it. Start the deletion saga within 24 hours of the request. Track the deadline: deletion_deadline = requested_at + 30 days. Set alerts at 20 days and 25 days for any incomplete deletions — never let a deletion approach the deadline without completion confirmation."

      - number: 5
        question: "Design a secrets injection strategy for a Python microservice running in Kubernetes. DB passwords and API keys must not be stored in env vars or config files in the repo."
        needed: "secrets stored in AWS Secrets Manager; fetched at pod startup via init container; K8s ExternalSecrets Operator syncs ASM secrets to K8s secrets; mount as env var or volume file; never log"
        answer: "ExternalSecrets Operator: define an ExternalSecret CR that references AWS Secrets Manager paths. The operator syncs ASM secrets into K8s Secret objects on a schedule (every 5 minutes). K8s Secret is mounted into the pod: either as env var (envFrom: secretRef) or as a volume file (/secrets/db_password). Application reads secrets at startup from env or file — no network call to ASM at runtime. If ASM is unavailable, the cached K8s Secret is still available. Secret rotation: ASM rotates the secret → ExternalSecrets Operator syncs the new value into K8s Secret → pod reads the new value on next startup or cache miss."
        tradeoff: "ExternalSecrets Operator (sync to K8s Secrets) vs. AWS SDK calls at runtime (fetch from ASM in app code): operator approach: secrets are in K8s, available to pod even if ASM is unreachable. Runtime fetch: always gets the latest secret but adds ASM API latency (5–50ms per fetch) and ASM dependency to every pod startup. For secrets that rarely rotate, ExternalSecrets with 5-minute sync is simpler and more resilient."
        caveat: "Follow-up: rotate secret without restarting all pods. ExternalSecrets Operator updates the K8s Secret. Pods with envFrom don't automatically reload env vars — env vars are baked at container start. Options: (1) Volume-mounted secrets: K8s automatically updates the file when the Secret changes (no restart needed). (2) Rolling restart: kubectl rollout restart deployment/{name} — pods restart with the new env var. Volume mounting is the recommended approach for secrets that rotate frequently. Follow-up: detect if a secret has been accidentally logged. Secret scanning in CI: scan git commits and build artifacts for patterns matching secret formats (high-entropy strings, AWS key patterns). Runtime scanning: use a log scrubbing library (python-loguru with a filter) that redacts patterns matching known secret formats before logs are written. Alert if any pattern match is found."
        watch: "K8s Secrets are base64-encoded, not encrypted, by default. Enable K8s at-rest encryption for Secrets (EncryptionConfiguration in the API server). With ExternalSecrets, the canonical source is ASM (encrypted). K8s is a cache. If the K8s Secret is compromised, the attacker gets the secret value — ensure RBAC is strict: only the service's ServiceAccount should be able to read its own Secret."

      - number: 6
        question: "Design a short-lived signed URL system for private S3 files. A user requests a download; they get a URL valid for 5 minutes that can't be shared to grant others permanent access."
        needed: "AWS S3 pre-signed URL with 300s expiry; URL includes HMAC signature over (object_key, expiry, user_id); log each URL generation with user_id for audit"
        answer: "Application server generates a pre-signed URL: s3.generate_presigned_url(ClientMethod='get_object', Params={'Bucket': bucket, 'Key': file_key}, ExpiresIn=300). The URL includes AWS signature (SigV4) over the S3 credentials, the file key, and the expiry timestamp. Anyone with the URL can download the file for 5 minutes — after expiry, the URL returns 403. For user-scoped access: generate the URL only after verifying the requesting user's access rights (check ACL/permissions in your own DB). Log: INSERT INTO url_audit (user_id, file_key, generated_at, expires_at). Do not log the URL itself (it contains credentials)."
        tradeoff: "Pre-signed URL vs. signed cookies (S3 CloudFront): pre-signed URL is per-file with a specific expiry. Signed cookies allow access to multiple files in a CloudFront distribution with one cookie. For document management (one file per download), pre-signed URL is simpler. For media players that stream multiple segments, signed cookies are more efficient."
        caveat: "Follow-up: revoke a pre-signed URL before it expires if the user loses access. Pre-signed URLs can't be revoked individually — the signature is computed from credentials that are still valid. Options: (1) Use short TTL (5 minutes) — the window of unauthorized access is bounded. (2) For immediate revocation: route downloads through your application (proxy the S3 file), revocation is just removing the user's access permission before the proxy fetch. The proxy approach adds bandwidth costs but enables instant revocation. Follow-up: prevent user from generating 1000 pre-signed URLs simultaneously. Rate limit the URL generation endpoint: max 10 pre-signed URLs per user per minute (Redis INCR). This prevents a user from pre-generating URLs to share widely. Log all URL generations — if a user generates 100 URLs for the same file, investigate."
        related_fundamentals: [storage/redis]

      - number: 7
        question: "Design a data masking layer for a customer support tool. Agents must see partial card numbers (last 4 digits only) and masked email addresses."
        needed: "masking applied at API response layer, not at DB storage; masking rules per field per role stored in config; log access to unmasked data (audit trail)"
        answer: "Masking middleware in the API gateway or application layer: on each API response, apply masking rules based on the caller's role. Masking rules (stored in config): {role: 'support_agent', field: 'card_number', rule: 'last4'} → transform '4111111111111111' to '****1111'. {field: 'email', rule: 'domain_only'} → 'alice@example.com' → 'a***@example.com'. Rules are applied to every API response containing these fields. The DB stores the full, unmasked values — masking is a view-layer concern. Audit: every time an agent views a customer record, log {agent_id, customer_id, fields_accessed: ['card_number', 'email'], timestamp} to an immutable audit log."
        tradeoff: "Masking at API response layer vs. DB views (store-side masking): DB view masking (CREATE VIEW ... AS SELECT MASK_EMAIL(email)) is simpler but harder to selectively unmask for privileged roles. API layer masking is more flexible: apply different masking rules per role without changing DB structure. Downside: masking logic is in application code — a bug could accidentally unmask data. Defense: code review, automated tests verifying masked output per role."
        caveat: "Follow-up: role that legitimately needs full card numbers (fraud team). Add a 'fraud_analyst' role with unmasked access to card_number. Accessing unmasked data triggers an audit log entry AND requires a justification reason (required form field in the UI). The audit log for unmasked access is reviewed quarterly by the security team. Alert if a fraud_analyst views >50 cards in 1 hour (potential data exfiltration). Follow-up: prevent compromised support account from exporting unmasked data. Download prevention: the API rate-limits bulk data exports (max 100 records per minute for support role). Require MFA for support role access. Session timeout: 1 hour of inactivity. Monitor for anomalous bulk access patterns (support agent viewing 1000 cards in 10 minutes = automatic account suspension)."


  - slug: qb-storage-files
    title: "Storage & File Systems"
    description: "Multipart upload, deduplication, thumbnail generation, video streaming, geo-replicated storage, access control"
    number_range: "Q065–Q066, Q084–Q085, Q119–Q120, Q139–Q140"
    questions:
      - number: 1
        question: "Design the file chunking strategy for uploading a 2GB video to S3. The upload must be resumable if interrupted."
        needed: "S3 multipart upload: split into 5MB chunks, upload each part independently; store {upload_id, uploaded_parts} in DB so client can resume from last part; complete multipart after all parts"
        answer: "S3 multipart upload: (1) Initiate: POST /upload → server calls s3.create_multipart_upload() → returns upload_id. Store {file_id, upload_id, total_parts: 400, completed_parts: []} in DB. (2) Client uploads chunks: PUT /upload/{file_id}/part/{n} (with chunk bytes in body) → server calls s3.upload_part(upload_id, part_number=n, body=chunk) → gets ETag. Store ETag per part in DB. (3) Resume: GET /upload/{file_id}/status → returns list of completed part numbers. Client skips completed parts, retransmits remaining. (4) Complete: server calls s3.complete_multipart_upload(upload_id, parts=[{PartNumber: n, ETag: e}]). S3 assembles the parts into the final object."
        tradeoff: "5MB vs. 10MB chunk size: S3 minimum part size is 5MB (except the last part). Larger chunks = fewer HTTP requests (faster on good networks). Smaller chunks = more granular resumability (less re-upload on failure). 10MB chunks for 2GB video = 200 parts. On failure at part 150, re-upload 50 parts × 10MB = 500MB re-upload. With 5MB chunks: 400 parts, re-upload 250MB. 5MB is a good balance."
        caveat: "Follow-up: how does client know which parts are uploaded on resume. GET /upload/{file_id}/status returns {completed_part_numbers: [1, 2, 3, ..., 150], total_parts: 400}. Client resumes from part 151. The server also calls s3.list_parts(upload_id) to validate the DB matches S3 state — in case of server crash between S3 upload and DB write. Follow-up: cleanup incomplete multipart uploads. S3 multipart uploads not completed within 7 days accumulate storage costs. Lifecycle rule: PUT /bucket/lifecycle → abort incomplete multipart uploads after 7 days. Also clean up DB records: nightly job deletes upload records older than 7 days and calls s3.abort_multipart_upload()."
        related_fundamentals: [storage/dynamodb]

      - number: 2
        question: "Design content deduplication for a file sync service (like Dropbox). Identical files uploaded by different users should only be stored once in S3."
        needed: "SHA-256 hash entire file content before upload; check if hash exists in dedup table; if yes, store only a reference; reference counting: delete S3 object only when ref count = 0"
        answer: "Client-side hashing: SHA-256 of file content before upload (computed in-browser or in the client app). Check: GET /files/dedup/{sha256_hash} → returns {exists: true, s3_key: 'files/{hash}'} or {exists: false}. If exists: INSERT INTO user_files (user_id, file_name, dedup_key: sha256) — no S3 upload needed. If not exists: upload to S3 as 'files/{sha256_hash}', then INSERT. Reference table: dedup_files (sha256, s3_key, ref_count). On new reference: UPDATE dedup_files SET ref_count = ref_count + 1. On file delete: UPDATE ref_count - 1; if ref_count = 0 → delete from S3. Atomic update with pessimistic locking: SELECT FOR UPDATE + UPDATE."
        tradeoff: "Content-addressable storage (sha256 as key) vs. separate dedup index: content-addressable is self-consistent — the key is derived from content, so dedup is inherent. Separate index (store file by random UUID, maintain sha256→uuid mapping) is more flexible but requires maintaining the mapping consistently. For dedup, content-addressable storage is simpler."
        caveat: "Follow-up: SHA-256 collisions at scale. SHA-256 has 2^256 possible hashes. With 10B files, collision probability is negligible (birthday paradox at 2^128 scale). SHA-256 collisions in practice are considered computationally infeasible. For paranoia: verify file content matches expected hash after download (hash both when fetched). Follow-up: dedup without revealing User A has same file as User B. Client-side SHA-256 means the hash is computed on the client — the server only sees the hash, not the file content. Two users having the same hash proves file equality but doesn't reveal which user uploaded first. Don't surface dedup information in the API response (don't say 'this file already exists' — just say 'upload complete'). Privacy risk: server can infer users share files if hashes match. For maximum privacy, use blind dedup (hash with user-specific salt), but this sacrifices cross-user dedup."
        watch: "Server-side SHA-256 verification: after the client claims a dedup hash match, verify by comparing a small random block of the 'existing' file against the 'new' upload. This prevents a client from gaming dedup (claiming a known hash to access another user's file without uploading). The verification is a cheap partial read from S3."

      - number: 3
        question: "Design the thumbnail generation pipeline for Instagram. Every uploaded photo must have 4 thumbnail sizes generated and available within 5 seconds of upload."
        needed: "upload → S3 → trigger Lambda/worker via S3 event; worker generates 4 sizes in parallel using Pillow/libvips; write all 4 URLs to DB, then flip photo.status to 'ready'"
        answer: "Upload flow: (1) Client uploads photo to S3. (2) S3 event triggers Lambda (or SQS → EC2 worker). (3) Worker downloads original from S3. (4) Generates 4 sizes concurrently (asyncio or ThreadPoolExecutor): 150×150 (thumbnail), 640×640 (feed), 1080×1080 (full-screen), 50×50 (avatar). Use libvips (not Pillow — libvips is 4-8× faster for large images with lower memory). (5) Uploads 4 sizes to S3 under different keys: 'photo/{id}/thumb_150.webp', etc. (6) UPDATE photos SET status='ready', thumb_urls=[...]. (7) Client polls GET /photo/{id}/status until ready. Total time: upload (1-2s) + processing (0.5s with libvips) + S3 upload (0.5s × 4 parallel) + DB write = ~3-4s within 5s SLA."
        tradeoff: "Eager processing (generate on upload) vs. lazy processing (generate on first request): eager: thumbnails available immediately when users view the post. Lazy: first viewer waits for thumbnail generation (~500ms) — acceptable for low-traffic posts but unacceptable for a viral post's first 1000 viewers all waiting simultaneously. Eager processing is correct for Instagram-scale."
        caveat: "Follow-up: worker crash after generating 2 of 4 thumbnails. S3 has the 2 completed thumbnails. DB status is still 'processing'. Worker crash → SQS redelivers the message (visibility timeout). New worker picks up: checks which S3 keys already exist, skips completed, generates remaining 2. Idempotent: generating the same thumbnail twice is harmless (overwrites with identical content). Follow-up: backfill 1B existing photos when adding a 5th size. Batch job: read all photo IDs from DB (paginate), for each photo download the original from S3, generate the 5th size, upload, update DB. At 1 photo/second (libvips): 1B seconds = 31 years. Parallelize: 10K workers each processing 100K photos = 1B photos in ~100K seconds (28 hours). Use spot instances for cost. Monitor with a progress counter."
        related_problems: [instagram]
        related_fundamentals: [networking/cdn]

      - number: 4
        question: "Design the video segment delivery for Netflix. Each video is split into 4-second segments at 5 quality levels. The player must start playing within 2 seconds of clicking play."
        needed: "first 3 segments of lowest quality pre-fetched on page load; manifest file (m3u8) lists all segments and quality URLs; CDN edge caches popular segments; origin pulled only on cache miss"
        answer: "DASH/HLS adaptive bitrate streaming: (1) Manifest fetch: GET /video/{id}/manifest.m3u8 → returns URLs for all segments at all quality levels. (2) Player selects quality based on network speed. (3) Pre-buffer: download first 3 segments (3 × 4s = 12s buffer) at lowest quality before playing. Playing starts after buffer 1 is downloaded (4s at lowest quality, ~100KB = 2 seconds on 400Kbps). CDN edge (AWS CloudFront) caches popular segments globally — a Netflix original gets cached across 400+ edge locations during the first few hours. Cache hit rate: >95% for popular content. Only 5% of requests hit the origin. Segment keys: immutable (content-addressed by hash) with 365-day CDN cache TTL."
        tradeoff: "Pre-loading first 3 segments at page load vs. on play button click: pre-loading at page load = faster playback start (user clicked play, buffer already downloaded). Risk: if user never clicks play, bandwidth is wasted. Netflix pre-loads 1 segment (4s) at page load — enough for 2-second start time on fast connections. More aggressive pre-loading for users with good network speed (inferred from past session data)."
        caveat: "Follow-up: CDN warm-up for a new release. Netflix's day-1 release of a new original: before public release, Netflix pushes the first 3 episodes' content to all 400+ edge locations proactively. This is called 'Open Connect cache fill' — Netflix's proprietary CDN prefetch. For non-Netflix companies: use a pre-warming job that fetches the first 10 segments of each new episode from all CDN edge locations the night before release. Follow-up: player deciding which quality for next segment. ABR (Adaptive Bitrate) algorithm: (1) Measure download speed of last 3 segments (average throughput). (2) Select the highest quality level whose bitrate is ≤ 80% of measured throughput (20% buffer for jitter). (3) If buffer falls below 8 seconds, drop one quality level. (4) If buffer exceeds 30 seconds and network is fast, try one higher quality level."
        related_fundamentals: [networking/cdn]

      - number: 5
        question: "Design the access control for a shared file storage (like Google Drive). File owner grants 'view' or 'edit' to specific users or 'anyone with link'."
        needed: "permission table: (file_id, principal_id, role) — principal is user_id or 'public'; cache permission set per file in Redis with 30s TTL; public link check"
        answer: "Permissions table: {file_id UUID, principal VARCHAR (user_id or 'public'), role ENUM('view', 'edit'), granted_by UUID, granted_at TIMESTAMP}. Permission check: SELECT role FROM file_permissions WHERE file_id = $1 AND principal IN ($user_id, 'public') ORDER BY role DESC LIMIT 1 (prioritize 'edit' over 'view'). Cache per file: Redis SET 'file_perms:{file_id}:{user_id}' {role} EX 30. On permission change: DEL all cached entries for the file. Public link: if 'public' row exists with 'view' → allow unauthenticated access. The link token (UUID) serves as the URL — knowing the link = access. Generate a hard-to-guess link UUID, not the file_id itself."
        tradeoff: "Per-file permission model vs. per-folder inheritance with propagation: per-file is explicit — permissions must be granted individually to each file. Per-folder (parent grants to all children) is more practical for large file trees but requires recursive permission resolution. For Drive-like systems, implement folder permissions with lazy propagation: a file checks its own permissions first, then its parent folder's permissions, up to the root."
        caveat: "Follow-up: permission inheritance (folder grants apply to all files inside). Folder creates a permission entry. File permission check: (1) Check file_permissions for the specific file. (2) If not found, recursively check parent folder. (3) If parent has permission, it applies to the file. Cache the resolved permission per (file_id, user_id) — avoid recursive DB queries on every access. On folder permission change: invalidate all cached permissions for files in that folder (expensive if folder has 10K files — use a version counter per folder instead of individual invalidations). Follow-up: revoke access when a user leaves an org that has shared access. DELETE FROM file_permissions WHERE principal = $user_id. Cascades to all files — revocation is immediate via cache invalidation. For org-level sharing (share with 'org' principal), leaving the org updates the user's org membership and the permission check fails at org membership check."
        related_fundamentals: [storage/redis]

      - number: 6
        question: "Design the chunked resumable upload protocol for a 10GB file. Upload must resume from the last successful chunk after network interruption."
        needed: "client splits file into 10MB chunks, assigns chunk_index; server stores received chunks in S3 with prefix upload_id/chunk_index; on resume: GET /upload/{id}/status → server returns list of received chunk indices"
        answer: "Upload session: POST /upload {filename, total_size, chunk_size: 10MB} → returns upload_id, total_chunks. Client-side: split file into 10MB chunks, compute SHA-256 per chunk. Upload each chunk: PUT /upload/{upload_id}/chunks/{chunk_index} with body = chunk bytes and X-Chunk-Hash header. Server: store chunk in S3 as 'uploads/{upload_id}/{chunk_index}', record in DB {upload_id, chunk_index, s3_key, chunk_hash, received_at}. Resume: GET /upload/{upload_id}/status → {received_chunks: [0, 1, 2, ..., 75], total_chunks: 1000}. Client resumes from chunk 76. Completion: when all chunks received, trigger S3 multipart assembly job."
        tradeoff: "Client-side chunk tracking vs. server-provided resume point: server-provided (as above) is more reliable — server has the authoritative list of received chunks, even if the client loses its local tracking state. Client-only tracking requires the client to remember which chunks were sent — risky after device restart. Server-side tracking is the correct approach for resumable uploads."
        caveat: "Follow-up: detecting a corrupted chunk. Client sends X-Chunk-Hash: sha256=abc123. Server: after receiving the chunk, compute SHA-256 of received bytes. If mismatch → reject chunk (409 Conflict with error: 'hash mismatch'). Client re-uploads the chunk. This catches partial network failures that corrupt bytes mid-transfer. Follow-up: cleanup incomplete uploads abandoned by clients. S3 lifecycle rule: delete objects with prefix 'uploads/' that are older than 7 days. DB cleanup: cron job deletes upload records with created_at < NOW() - INTERVAL '7 days' and status != 'complete'. Send email reminder after 3 days: 'Your upload of {filename} is 75% complete — resume here.'."

      - number: 7
        question: "Design the image storage and serving pipeline for a social app. 10M images uploaded/day; each image served at 3 sizes. Cost must be optimized."
        needed: "store original in S3; generate 3 sizes lazily on first request via Lambda; cache generated sizes in CloudFront CDN indefinitely; use WebP format for 30% storage/bandwidth saving"
        answer: "Upload: store original JPEG/PNG in S3 (original-images/{user_id}/{image_id}.{ext}). On first request for a specific size: CloudFront cache miss → triggers Lambda@Edge or Image Lambda. Lambda: download original, resize using libvips, encode as WebP. Store result in S3 (images/{image_id}/640.webp). Return to user. Subsequent requests for the same size: CloudFront cache hit (365-day TTL, immutable content). Cost optimization: WebP is 25-34% smaller than JPEG at equivalent quality. Storing 10M images/day × 1MB average = 10TB/day in original format. With WebP for thumbnails (~300KB) + CDN caching: bandwidth cost drops by ~70% vs. serving original JPEGs."
        tradeoff: "Lazy generation (generate on first request) vs. eager generation (generate 3 sizes immediately on upload): lazy: zero storage cost for unused sizes (if a photo is deleted before viewed, its thumbnails are never generated). Eager: thumbnails available immediately without first-request delay. For a social app where profile photos are viewed within seconds of upload, eager generation is better. For user-uploaded documents where many are never viewed, lazy is more cost-effective."
        caveat: "Follow-up: request for size not yet generated (cache miss). CloudFront miss → Lambda generates the size (500ms) → returns to user. First viewer experiences 500ms extra latency. Subsequent viewers get the CDN-cached version (<10ms). For critical images (profile photos), eager generation eliminates this latency at the cost of generating unused sizes. Follow-up: purge old image variants when original deleted. CloudFront allows cache invalidation via API: CREATE INVALIDATION for paths matching /images/{image_id}/*. Cost: first 1000 invalidations/month free, then $0.005 per path. S3: DELETE with prefix /images/{image_id}/. If the CDN TTL is 365 days, clients who cached the URL locally still have the old URL — return 410 Gone from the origin to signal the resource is permanently deleted."
        related_fundamentals: [networking/cdn]

      - number: 8
        question: "Design a geo-replicated object storage system (like S3 with CRR). A file uploaded in India must be readable from Singapore within 60 seconds."
        needed: "asynchronous cross-region replication via event-driven pipeline; upload succeeds when primary region confirms; read routing: serve from nearest region; fallback to origin if not yet replicated"
        answer: "Write: client uploads to the nearest region (India, us-east-1 equivalent). S3 confirms write. S3 CRR (Cross-Region Replication) rule asynchronously replicates to Singapore. Replication time depends on object size: <100MB objects typically replicate in <30 seconds. For the 60-second SLA: 100MB objects at 100Mbps = 8 seconds transfer + replication overhead = ~20s. Well within SLA. Read routing: Route 53 latency-based routing directs Singapore users to the Singapore bucket. On cache miss (object not yet replicated): CloudFront fallback origin pointing to the India bucket — serves from source until replication completes. After replication, Singapore bucket serves subsequent requests."
        tradeoff: "Synchronous replication (write succeeds only when both regions confirm) vs. async replication (write succeeds on one region, replicate asynchronously): synchronous: zero replication lag but 2× write latency (must wait for India + Singapore to confirm) and write fails if Singapore is unreachable. Async: fast writes, at most 60s replication lag, writes work even during Singapore outage. For global object storage, async is the standard."
        caveat: "Follow-up: read from Singapore for a file uploaded 10 seconds ago (not yet replicated). CloudFront origin fallback: Singapore CloudFront distribution has two origins: primary = Singapore S3, fallback = India S3. If Singapore S3 returns 404 (not yet replicated), CloudFront falls back to India S3. This adds ~50–100ms latency (cross-region) for the pre-replication window. After replication, Singapore S3 serves (fast). Follow-up: detect replication lag and alert when > 60 seconds. S3 CRR provides 'ReplicationTime Control' (RTC) as a feature — guarantees 99.99% of objects replicate within 15 minutes and provides a ReplicationMetrics CloudWatch metric. Enable S3 metrics: 'replication.OperationFailedReplication' alerts when any object fails to replicate. Monitor the p99 replication time metric — alert if > 45 seconds (15-second buffer before SLA breach)."
        related_fundamentals: [networking/cdn]


  - slug: qb-ecommerce
    title: "E-Commerce & Bookings"
    description: "Seat holds, saga patterns, inventory sync, restocking notifications, dynamic pricing, coupons, recommendation re-ranking"
    number_range: "Q049–Q050, Q079–Q080, Q089–Q090, Q114–Q115, Q133"
    questions:
      - number: 1
        question: "Design the seat hold mechanism for BookMyShow. User selects 2 seats; they're 'held' for 10 minutes while they complete payment. No one else can book them."
        needed: "seat state: available → held (with user_id + expiry) → booked; Redis key 'seat:{show_id}:{seat_id}' with 600s TTL; on TTL expiry, seat returns to available"
        answer: "Seat lock: SET 'seat:{show_id}:{seat_id}' {user_id} NX EX 600. NX = only set if not already held. Returns OK (acquired) or nil (seat already held). For 2 seats: use a Lua script to acquire both atomically — if either fails, release the other: local r1 = SET NX EX 600 seat1; local r2 = SET NX EX 600 seat2; if r1 OK and r2 OK then return OK; else DEL seat1, seat2; return FAIL. On payment success: UPDATE seats SET status='booked' in DB, DEL Redis keys. On payment failure or timeout: DEL Redis keys immediately (or let them TTL expire). No hold needed in DB — Redis TTL handles the 10-minute window."
        tradeoff: "Redis lock vs. DB optimistic locking (version column): Redis lock: sub-millisecond, handles 100K concurrent users per seat show. DB optimistic lock: UPDATE seats SET status='held', holder=X WHERE id=Y AND status='available' — row-level lock. At 100K concurrent users, DB lock contention causes queue-like serialization. Redis is clearly faster for flash sales. Downside: Redis crash between DEL and DB update could leave Redis showing seat as available while DB shows it as booked — resolve with periodic DB→Redis sync job."
        caveat: "Follow-up: two users selecting the same seat within 100ms of each other. Redis SET NX is atomic — only one user's SET NX succeeds. The other gets nil and immediately sees 'seat taken' error. Follow-up: release hold early if user navigates away. Client sends DELETE /seat-hold/{hold_id} on page unload (beforeunload event). Server runs DEL Redis key. beforeunload is not guaranteed to fire on mobile (app kill) — the 10-minute TTL is the safety net. For better UX, also poll heartbeat: if no heartbeat from client for 2 minutes, release the hold early."
        related_fundamentals: [storage/redis]

      - number: 2
        question: "Design the saga for a flight+hotel bundle booking (MakeMyTrip). Flight booking succeeds; hotel fails. You must refund the flight automatically."
        needed: "saga orchestrator: sequence of steps with compensating transactions; on hotel failure: call flight.cancel(); saga state persisted to DB; resumable on crash"
        answer: "Orchestrator saga state machine in DB: {saga_id, steps: [{name:'book_flight', status:'completed', data:{booking_ref:'FL123'}}, {name:'book_hotel', status:'failed', error:'no_rooms'}, {name:'refund_flight', status:'pending'}], created_at}. On hotel booking failure: orchestrator executes compensating step: POST /flights/cancel {booking_ref: 'FL123'}. Mark refund_flight step as 'completed' on success. User notification: email 'Hotel booking failed, your flight has been refunded. Reference: {saga_id}'. Idempotency: each step has an idempotency key — refund_flight with key 'refund-{saga_id}' ensures duplicate compensation calls are ignored."
        tradeoff: "Orchestrator saga vs. choreography saga: orchestrator (central state machine) vs. each service emitting events and reacting. Orchestrator: easy to trace saga progress, easy to handle compensating transactions, single point of failure (mitigate with HA orchestrator). Choreography: no central coordinator, but tracking saga state requires querying all participating services. For 5-step booking flows, orchestrator is simpler to reason about."
        caveat: "Follow-up: flight.cancel() also fails (airline API down). Mark 'refund_flight' step as 'compensation_failed'. Alert on-call with saga_id. An SRE manually retries the compensation after the airline API recovers. Don't retry automatically more than 3 times — after 3 failures, the issue is systemic. Send user email: 'Hotel unavailable. Your flight refund is being processed — expect it within 24 hours. Contact support if not received.' Follow-up: surface partial failure to user while saga is running. Show a real-time status page: 'Booking in progress... Flight confirmed ✓ Hotel confirming...' Long-polling or SSE for status updates. On failure + compensation: show 'Hotel unavailable — refunding flight payment. This may take a few minutes.' Never show a blank loading screen for >5 seconds without an explanation."

      - number: 3
        question: "Design the stock reservation for a medicine delivery app. Reserve at nearest warehouse on order, auto-release if payment not completed in 10 minutes."
        needed: "reservation record: {order_id, warehouse_id, sku_id, expires_at}; Redis TTL key triggers expiry; committed stock = total stock - active reservations"
        answer: "Reservation: SET 'reserve:{sku_id}:{order_id}' {warehouse_id, qty} EX 600 (10 minutes). DB reservation record: {order_id, warehouse_id, sku_id, qty, expires_at}. Available stock for a given SKU: SELECT (total_stock - SUM(qty) FROM reservations WHERE sku_id = X AND expires_at > NOW()). On Redis TTL expiry (keyspace notification): DELETE FROM reservations WHERE order_id = X AND expires_at < NOW(). On payment success: UPDATE inventory SET qty = qty - reserved_qty; DELETE FROM reservations WHERE order_id = X. On payment failure: same as TTL expiry."
        tradeoff: "Redis TTL for reservation expiry vs. DB cleanup job: Redis TTL provides near-instant release (within seconds of 10-minute timeout). DB cleanup job runs every 5 minutes — reservation may hold stock for up to 15 minutes (10 min + 5 min cleanup lag). For medicine (stock is scarce), Redis TTL is more responsive. Both should be implemented: Redis for responsiveness, DB job as safety net for Redis downtime."
        caveat: "Follow-up: two simultaneous orders for the last unit. ORDER A: check available stock (1 unit). ORDER B: check available stock (1 unit). Both see 1 unit available. Both create reservation records. DB now has 2 reservations for 1 unit — oversold. Fix: use DB atomic check-and-reserve: INSERT INTO reservations SELECT X if (total_stock - active_reservations) >= qty. Or use a Lua script in Redis to atomically check and decrement the available count. Follow-up: warehouse goes offline mid-reservation. The reservation record (DB) is still valid for the offline warehouse. On order fulfillment: the fulfillment service detects the warehouse is offline and either re-routes to the next nearest warehouse (updating the reservation) or cancels and refunds. The reservation TTL prevents indefinite hold."
        related_fundamentals: [storage/redis]

      - number: 4
        question: "Design a real-time inventory sync across Zara's 5000 stores and online store. A sale at any store must reduce available stock everywhere within 30 seconds."
        needed: "POS sale event → Kafka → inventory service → update Redis stock counter; Redis: DECRBY stock:{sku_id}:{warehouse_id} atomically; DB updated asynchronously; Redis is source of truth for availability"
        answer: "POS sale: publishes {sku_id, store_id, qty_sold, timestamp} to Kafka 'pos.sales' topic. Inventory service consumes: DECRBY 'stock:{sku_id}' qty_sold (global stock counter), DECRBY 'stock:{sku_id}:{store_id}' qty_sold (per-store stock). Redis update propagates to all pods reading from the same Redis cluster within <1ms. DB update: async consumer writes to DB every 30 seconds in batch. Result: all stores and online see updated stock within 30 seconds (Kafka consumer lag < 30s + Redis propagation < 1ms)."
        tradeoff: "Redis as primary stock counter vs. DB as primary with Redis cache: DB-primary: DB is source of truth, Redis is a read cache. DB update takes 5–10ms per write; at 5000 stores × 100 sales/hour = 138 sales/sec → 138 DB writes/sec. Feasible. But if DB is slow or down, inventory reads fail. Redis-primary: Redis is source of truth (DECRBY), DB is async backup. Redis handles 100K ops/sec easily. DB downtime doesn't affect inventory reads. Risk: Redis crash loses in-flight decrements. Use Redis persistence (AOF) to limit loss."
        caveat: "Follow-up: negative stock if Redis and DB get out of sync. Redis shows 0 units (all sold). DB shows 5 units (async update lagging). The discrepancy is resolved in the next DB sync cycle. During the lag window, Redis correctly prevents new sales (returns 0), while the DB may think stock is available. The UI should always read from Redis for real-time availability. Follow-up: store POS offline for 2 hours sending 300 stale sales. The 300 stale sale events arrive in Kafka after the store reconnects. The inventory service processes them in order. DECRBY stock for each. If total DECRBY causes stock to go below 0: check balance before applying (Lua script: if stock >= qty then DECRBY; else reject with insufficient_stock). Stale sales that would oversell are rejected — manually reconcile with the store."
        related_fundamentals: [storage/redis]

      - number: 5
        question: "Design the 'out of stock' notification system for Amazon. Users click 'notify me'. When restocked, notify up to 1000 users per product within 5 minutes."
        needed: "waitlist stored per product_id in DB; restock event triggers notification job: fetch top-1000, enqueue notifications; cap at 1000 to prevent over-notifying with limited stock"
        answer: "Waitlist table: {product_id, user_id, subscribed_at, priority: FIFO}. On 'notify me': INSERT INTO waitlist (product_id, user_id, subscribed_at = NOW()). On restock event (inventory update to qty > 0): enqueue a job to the notification queue. Job: SELECT user_id FROM waitlist WHERE product_id = X ORDER BY subscribed_at ASC LIMIT 1000. Send push/email notifications to all 1000. Delete them from the waitlist. If < 1000 users on waitlist, notify all. The 1000-user cap prevents sending 100K notifications when stock is only 10 units — many users will be disappointed."
        tradeoff: "FIFO 1000-user cap vs. lottery vs. notify all: FIFO (first come, first notified) is fairest. Lottery (random 1000 of 100K) gives everyone an equal chance. Notify all (100K notifications for 10 units): 99,990 users are notified but can't buy = false alarm, damages trust. FIFO cap of 1000 is the industry standard (Amazon, Target all use FIFO with caps)."
        caveat: "Follow-up: only 10 units restocked but 10K subscribers. Notify 1000 (first 1000 by subscribed_at). Of the 1000 notified, maybe 100 act quickly and buy the 10 units. The other 900 see 'sold out' when they click. This is acceptable — they got the notification, had a chance to buy. Leave the remaining 9000 on the waitlist for the next restock. Follow-up: product restocked twice in 10 minutes (prevent double-notification). On first restock event: mark product as 'notification_sent' in Redis with TTL 10 minutes. On second restock event within 10 minutes: skip notification (TTL key exists). After 10 minutes, allow another notification. This prevents duplicate notifications for rapid restocks."
        related_fundamentals: [storage/redis]

      - number: 6
        question: "Design the 'apply coupon code' API. A coupon has usage limits (total + per-user). 10K users apply the same coupon simultaneously — enforce limits exactly."
        needed: "coupon usage counter in Redis; INCR + check atomically via Lua script; per-user check: Redis SET NX; reserve on apply; commit on order completion; release on cancel"
        answer: "Coupon state in Redis: HINCRBY 'coupon:{code}' uses 1 (global counter). Lua script: local uses = redis.call('HINCRBY', key, 'uses', 1); if uses > limit then redis.call('HINCRBY', key, 'uses', -1); return 0; end; return 1. Returns 0 if over limit (Lua atomically rolls back). Per-user check: SET NX 'coupon:{code}:used:{user_id}' 1 EX 86400 (1 day TTL). Returns nil if user already used the coupon. Reserve: mark coupon as 'reserved' for this order. Commit on order completion: no additional action (reservation becomes final). Release on cancel: DEL 'coupon:{code}:used:{user_id}' + HINCRBY 'coupon:{code}' uses -1."
        tradeoff: "Redis atomic counter vs. DB optimistic lock: at 10K concurrent coupon applications, DB with SELECT FOR UPDATE serializes all 10K → severe latency (5ms × 10K sequential = 50 seconds). Redis Lua is atomic within a key: processes ~100K ops/sec per key. Redis handles 10K concurrent requests in <0.1 seconds. Redis is the correct choice for flash coupon events."
        caveat: "Follow-up: user applies coupon but never completes checkout. The reservation holds the coupon usage slot for the TTL duration (or order expiry). After order expires (30 minutes), release: DEL user coupon key + HINCRBY -1. Background job: scan expired orders, release coupon reservations. Follow-up: Redis crashes between reserving coupon and committing order. Coupon is 'used' in Redis but order is incomplete in DB. On recovery, the background job: compare Redis coupon usage to DB committed orders. Discrepancy = crashed reservation. Release the discrepancy back to Redis. This is the reconciliation process — runs nightly."
        related_fundamentals: [storage/redis]

      - number: 7
        question: "Design the 'recently viewed products' feature. Each user's last 20 viewed products must be stored, deduped, and retrievable in under 20ms."
        needed: "Redis List per user: LPUSH + LTRIM to 20 items; LREM before LPUSH to prevent duplicates; async persist to DB for cross-device sync; Redis is primary read path"
        answer: "Redis List: LREM 'recently_viewed:{user_id}' 0 {product_id} (removes any existing occurrence), then LPUSH 'recently_viewed:{user_id}' {product_id}, then LTRIM 'recently_viewed:{user_id}' 0 19 (keep only 20 items). LRANGE 'recently_viewed:{user_id}' 0 19 for reads. Total: 3 Redis commands per view, all O(N) where N≤20 = negligible. Persist to DB asynchronously: on each view, enqueue a message to a 'recently_viewed' Kafka topic. A consumer writes to DB: {user_id, product_id, viewed_at}. Fetch on first load from DB if Redis key doesn't exist (cross-device sync)."
        tradeoff: "Redis List vs. Redis Sorted Set for recently viewed: Sorted Set with timestamp score supports time-ordered retrieval and O(log N) membership check. List: LREM for dedup is O(N), but N=20 so O(20)=O(1) in practice. List is simpler and sufficient. Sorted Set would be better if N was 1000+ or if you needed to query by time range."
        caveat: "Follow-up: sync across phone and laptop. First load on laptop: LRANGE returns empty (laptop is new session). Fallback to DB: SELECT product_id FROM recently_viewed WHERE user_id = X ORDER BY viewed_at DESC LIMIT 20. Populate Redis from DB result: RPUSH + LTRIM. On subsequent views from laptop: Redis is warm, cross-device. Follow-up: Redis key evicted due to memory full. allkeys-lru evicts least recently used keys. A recently viewed list that hasn't been read recently might be evicted. On the next request, Redis returns empty list → fallback to DB (same as cross-device). No data loss — DB is the durable store."
        related_fundamentals: [storage/redis]

      - number: 8
        question: "Design a dynamic pricing engine that adjusts product prices based on competitor prices, demand signals, and inventory levels — updating within 5 minutes of a trigger."
        needed: "trigger events: competitor price change, stock < 10%, demand spike; rule engine evaluates price adjustment with floor/ceiling constraints; price change event → Kafka → product catalog updated → CDN cache invalidated"
        answer: "Trigger sources: (1) Competitor price crawler (runs every 5 minutes, publishes competitor_price_change events). (2) Inventory service (publishes low_stock events when SKU drops below 10%). (3) Demand monitor (publishes demand_spike events when buy rate increases 3× vs. 7-day average). All trigger types go to Kafka 'pricing.triggers'. Pricing engine consumer: reads triggers, applies rule engine: {if competitor_price < our_price × 0.95 then adjust_price = competitor_price + margin; if stock < 10% then adjust_price = our_price × 1.05 (scarcity premium); if demand_spike then adjust_price = our_price × 1.02 (surge)}. Constraints: price ≥ floor (cost + minimum margin), price ≤ ceiling (MSRP). Publish price change to Kafka 'pricing.updates'. Consumer updates product catalog DB and publishes CloudFront invalidation for the product's CDN-cached price."
        tradeoff: "Real-time rule engine vs. ML-based pricing model: rule engine is interpretable, auditable, and predictable. ML model can discover non-obvious pricing strategies but is a black box — hard to audit why a price changed. For regulated industries (pharmaceuticals), rule engine is required. For consumer e-commerce, ML can improve revenue by 2–5%."
        caveat: "Follow-up: preventing feedback loop (our price change triggers competitor, triggers ours). Add a cooldown: after any price adjustment, ignore triggers for that SKU for 10 minutes. The cooldown prevents rapid oscillation. Monitor for circular pricing patterns (our price and competitor price converging/diverging rapidly) and apply dampening: max 1 adjustment per SKU per hour. Follow-up: audit why a price changed. Every price adjustment event includes: {trigger_type, trigger_value, rules_applied, input_price, output_price, constraints_hit, timestamp}. Store in an audit log table. Query: 'Why did SKU XYZ price change at 2 PM?' → SELECT * FROM price_audit WHERE sku_id = XYZ AND changed_at BETWEEN ... ORDER BY changed_at."
        related_fundamentals: [storage/redis, networking/cdn]

      - number: 9
        question: "Design a real-time recommendation engine re-ranker that personalizes top-10 search results per user based on browsing history — adding under 30ms latency."
        needed: "pre-computed user embedding in Redis (updated every 6h offline); at query time: ANN search for candidates, then dot-product score with user embedding; skip re-ranking if embedding fetch > 15ms"
        answer: "Offline job (every 6 hours): compute user embedding (128-dim float vector) from browsing history using a matrix factorization or deep learning model. Store in Redis: HSET 'user_emb:{user_id}' v0 0.123 v1 0.456 ... v127 0.789 EX 28800 (8-hour TTL). At query time: (1) Fetch user embedding from Redis: HGETALL 'user_emb:{user_id}' (< 2ms on hot Redis). (2) Retrieve 50 candidate results from the base ranking (Elasticsearch or BM25). (3) Score each candidate: dot_product(user_embedding, item_embedding). Item embeddings pre-computed and stored in Redis or in the search index. (4) Sort by score, return top 10. Total overhead: 2ms embedding fetch + 50 dot products (50 × 128 multiplications = 6400 flops in <1ms) = ~3ms. Well within 30ms budget."
        tradeoff: "Pre-computed embeddings (offline) vs. online embedding (compute on each request): online embedding (run the model at request time) takes 50–200ms — too slow for a 30ms budget. Pre-computed embeddings: 6-hour staleness means new browsing history isn't immediately reflected. For most users, 6-hour-old embeddings are accurate enough — browsing interests don't change in 6 hours. For high-value real-time signals (just searched for 'running shoes'), inject the last 5 browsing items directly into the scoring without waiting for the embedding update."
        caveat: "Follow-up: cold start for new user with no browsing history. No embedding in Redis. Fallback: use popularity-based ranking (same as the base search results — no re-ranking). Or use demographic-based embeddings (same age group, same geography). Show the default top 10 without personalization. Track new users — after 5 browsing events, compute an initial embedding and start personalizing. Follow-up: measuring whether personalization improved CTR without hurting revenue. A/B test: control (no re-ranking), treatment (re-ranking). Metrics: CTR (impressions → clicks), conversion rate (clicks → purchases), revenue per session. Deploy to 5% traffic for 1 week before full rollout. Monitor all three metrics — an approach that increases CTR but decreases average order value (by showing cheaper items the user clicks more often) isn't net positive."
        related_fundamentals: [storage/redis]


  - slug: qb-distributed-systems
    title: "Distributed Systems"
    description: "Consistent hashing, two-phase commit, gossip protocol, vector clocks, read-your-writes, optimistic concurrency, idempotent APIs"
    number_range: "Q098, Q106, Q111–Q112, Q127, Q142–Q143, Q149–Q150"
    questions:
      - number: 1
        question: "Design a read-your-writes consistency layer for a social app. After a user posts a tweet, they must see their own tweet immediately even if replicas are lagged."
        needed: "track last_write_timestamp per user in Redis on every write; on read: if last_write_timestamp < 2s ago, route to primary instead of replica; after 2s, route back to replica"
        answer: "On write: SET 'last_write:{user_id}' {timestamp} EX 10 (10-second TTL). On read: GET 'last_write:{user_id}' — if key exists and age < 2s, route this read to the primary (or the replica that received the write). After 2s, assume replication has caught up (typical MySQL replication lag < 100ms in healthy setup). Route back to replica. This is 'sticky primary' read-your-writes: the writing user gets strong consistency for 2 seconds; other users always read from replica (eventual consistency)."
        tradeoff: "Read-your-writes via primary routing vs. synchronous replication (wait for replica to confirm before returning write): synchronous replication: write takes 2× latency (wait for replica ACK). Read-your-writes via routing: write is fast (primary only), read is fast (replica for non-writers, primary for 2s post-write). The routing approach is more performant and the standard implementation in read-heavy social apps."
        caveat: "Follow-up: user switches from WiFi to 4G mid-session. The 'last_write:{user_id}' Redis key is keyed by user_id, not device or session — it persists regardless of network change. The user gets read-your-writes consistency across devices as long as the Redis key hasn't expired. Follow-up: read traffic increase to primary if 5% of users wrote recently. At 10M active users with 5% writing recently (500K users): their reads hit the primary. If the primary normally handles writes only (10% of traffic), 500K extra reads = significant extra load. Mitigate: set a dedicated 'strong_read' replica that's always synchronously replicated from primary. Route post-write reads to this replica instead of the primary. This distributes the post-write read load without adding to the primary's query load."
        related_fundamentals: [storage/redis]

      - number: 2
        question: "Design an optimistic concurrency control mechanism for a shared document editor. Two users edit the same document simultaneously — last writer must not silently overwrite first writer."
        needed: "document has version_number in DB; client reads version on open; on save: UPDATE ... WHERE version = client_version AND id = doc_id; if 0 rows updated (version mismatch): return 409 Conflict with current version"
        answer: "Document table: {id, content, version: INT, last_edited_by, last_edited_at}. Client reads document: returns {content, version: 42}. Client saves: PATCH /docs/{id} {content: new_content, expected_version: 42}. Server: UPDATE documents SET content = $1, version = version + 1, last_edited_at = NOW() WHERE id = $2 AND version = $3. Check rows_affected: if 0, another user has already updated (version is now 43). Return 409 Conflict with body: {current_version: 43, conflict: true}. Client handles 409: re-fetch the current version, merge changes, retry save."
        tradeoff: "Optimistic concurrency (version-based) vs. pessimistic locking (SELECT FOR UPDATE on document): pessimistic: one user holds a DB lock for the entire editing duration (5–30 minutes) — all other users are blocked. Optimistic: no lock held during editing, conflict detected only at save time. Optimistic is correct for collaborative editing — conflict is rare and the cost of occasional retry is much lower than blocking all editors."
        caveat: "Follow-up: present the conflict to the user in a friendly way. Show a diff: 'Someone else edited this document while you were working. Here are their changes. Would you like to merge or overwrite?' Provide a 3-way merge view: original, your changes, their changes. For plain text, compute and show diffs. For rich documents (Notion/Confluence), use operational transforms or CRDTs for auto-merge of non-conflicting changes. Follow-up: merging changes from both users editing different paragraphs. At the character level, operational transforms (OT) or CRDTs (Conflict-free Replicated Data Types) enable automatic merging of non-conflicting edits. Paragraph A edited by User 1 and Paragraph B edited by User 2 are merged automatically — no conflict. Only edits to the same characters create a true conflict requiring human resolution."

      - number: 3
        question: "Design a consistent hashing ring for distributing cache keys across 10 Redis nodes. When a new node is added, only ~10% of keys should be remapped."
        needed: "virtual nodes: each physical node maps to 100-200 virtual positions on ring; new node takes over key range from its successor only; client-side routing: client computes target node from hash ring"
        answer: "Consistent hashing ring: hash space is [0, 2^32). Each of 10 Redis nodes is mapped to 150 virtual nodes (positions on the ring), computed as hash(node_id + ':' + i) for i in 0..149. Total 1500 virtual positions on the ring. Key routing: hash(key) → find the next virtual node clockwise on the ring → route to the physical node owning that virtual node. On adding node 11: node 11 gets 150 new virtual positions scattered around the ring. Each new virtual position 'steals' a range from an existing node. Total remapped keys ≈ 1/11 = 9% — close to the optimal 10%."
        tradeoff: "Consistent hashing vs. modulo hashing (key % N): modulo hashing: when N changes from 10 to 11, ~90% of keys remap (because key % 10 ≠ key % 11 for most keys). Consistent hashing: only ~10% remap. The difference is critical for cache: 90% remap = 90% cache miss rate = thundering herd on the DB. 10% remap = manageable cache warmup."
        caveat: "Follow-up: warm the new node's keys before it starts serving traffic. 'Shadow mode': add the new node to the ring but route all reads to the original node. Simultaneously, duplicate writes to both the original and new node. After 1 TTL duration (keys replicated to the new node), flip to routing reads to the new node. This is called 'dual write' warm-up. Alternative: when the new node starts serving traffic and gets cache misses, it fetches from DB and populates itself. The warmup latency (extra DB reads) is limited to the first request per key. Follow-up: temporarily slow node vs. crashed node. Slow node: health check timeout (3 consecutive failures in 5 seconds). Mark as 'unavailable', reroute to next node on the ring (consistent hashing's natural fallback). After node recovers, mark as 'available'. Crashed node: same behavior but the node never recovers. It's removed from the ring permanently — 10% of keys are remapped."
        related_fundamentals: [consistent-hashing, storage/redis]

      - number: 4
        question: "Design a two-phase commit coordinator for a distributed transaction spanning an order DB and an inventory DB. Handle coordinator crash mid-protocol."
        needed: "phase 1 (Prepare): coordinator asks both DBs to lock and prepare; phase 2 (Commit): coordinator sends commit after both ACK prepare; coordinator writes decision to WAL before sending commit — recoverable on crash"
        answer: "Phase 1 (Prepare): coordinator sends Prepare(txn_id) to order_db and inventory_db. Each DB locks the affected rows, writes a prepare record to its WAL, responds PREPARED or ABORT. Coordinator waits for both responses. Phase 2 (Commit): if both PREPARED → coordinator writes Commit decision to its own WAL, then sends Commit(txn_id) to both DBs. Each DB commits and releases locks. If either ABORTED in phase 1 → coordinator writes Abort to WAL, sends Abort(txn_id) to both. Recovery from crash: coordinator replays its WAL on restart. If WAL has Commit → re-send Commit to all participants. If WAL has Prepare but no Commit → send Abort. Participants remain in PREPARED state (rows locked) until the coordinator recovers — this is the blocking property of 2PC."
        tradeoff: "2PC vs. saga: 2PC provides ACID atomicity (all-or-nothing, no intermediate states visible to other transactions). Sagas provide eventual consistency (intermediate states are visible — flight charged but hotel not yet). 2PC is correct for financial ledger entries where no intermediate state should be visible. Sagas are correct for long-running business flows (hotel+flight booking) where intermediate states are acceptable and 2PC latency (multiple round trips) is too high."
        caveat: "Follow-up: one DB says PREPARED but coordinator crashes before sending COMMIT. Both DBs are in PREPARED state (rows locked). The coordinator was going to commit. On crash recovery: coordinator reads WAL — finds Prepare but no Commit. 2PC rules: if in Prepare state with no decision, abort. Coordinator sends Abort to both. This is conservative — may abort a transaction that could have committed. The application retries the transaction. Follow-up: 2PC blocking indefinitely. If the coordinator crashes AND never recovers: participants remain locked in PREPARED state indefinitely (blocking protocol). They cannot unilaterally abort (might conflict with a Commit the coordinator was about to send). Solution: a backup coordinator takes over (reads the primary coordinator's WAL from a replicated store) and continues the protocol. Or: implement a timeout on the PREPARED state — if coordinator doesn't respond within 30 seconds of PREPARED, participants ask each other about the coordinator's decision (participatory protocol — complex but non-blocking)."
        related_fundamentals: [distributed/cap-theorem]

      - number: 5
        question: "Design a vector clock implementation for a shopping cart service where the same cart can be modified from two devices offline. Detect and surface conflicts."
        needed: "each device maintains a vector clock: {device_id: version_number}; on merge: take element-wise max of vector clocks; conflict detected when neither clock dominates the other"
        answer: "Cart state includes a vector clock: {cart_id, items: [...], vclock: {device_A: 3, device_B: 1}}. On each update from Device A: vclock[device_A] += 1. Sync: client sends {cart, vclock}. Server merges: for each dimension, take max(server_vclock[d], client_vclock[d]). Compare versions to detect conflict: clock A dominates clock B if A[d] ≥ B[d] for all d (A is newer). Neither dominates = concurrent updates = conflict. Example: server vclock {A:3, B:1}, client vclock {A:2, B:3} → neither dominates (server A>client A, client B>server B) → conflict."
        tradeoff: "Vector clocks vs. last-write-wins (timestamp): timestamps are unreliable (clock skew between devices can be seconds) and discard information. Vector clocks provide causal history — you know exactly which updates are causally related. For shopping carts, LWW would lose items added on one device when the other device's cart overwrites. Vector clocks preserve all changes and flag true conflicts."
        caveat: "Follow-up: cart size vs. vector clock overhead. Vector clock entry per device: 8 bytes (device_id) + 4 bytes (version) = 12 bytes per device. With 5 devices per user, vector clock = 60 bytes. Cart JSON is typically 1–10KB. 60 bytes is negligible overhead. Vector clocks grow with the number of distinct devices that have ever modified the cart. Clean up: prune devices not seen for > 30 days. Follow-up: UX for conflict resolution. Show the user: 'Your cart was updated from two devices. Review and confirm.' Display both cart versions: 'iPhone version: {items}' vs 'Laptop version: {items}'. Allow user to select one version, merge both, or manually edit. Auto-merge: if items in both versions are non-overlapping (device A added shoes, device B added shirt), merge automatically without user intervention."

      - number: 6
        question: "Design a gossip protocol for service discovery in a 500-node cluster. Each node must know the health status of all other nodes within 10 seconds of a node failure."
        needed: "each node maintains a membership list with (node_id, status, heartbeat_version); every second: each node gossips to 3 random peers; node marked failed if heartbeat_version not updated for 10s"
        answer: "Membership list per node: {node_id: 'node-42', ip: '10.0.1.42', status: healthy, heartbeat_seq: 1000, last_updated: T}. Gossip cycle (every 1 second): each node selects 3 random peers and sends its full membership list (compressed). Receiving node: for each entry, if received heartbeat_seq > stored heartbeat_seq → update entry. Own heartbeat: increment own heartbeat_seq every 1 second and gossip it. Failure detection: if any node's last_updated is > 10 seconds ago, mark as SUSPECT. If SUSPECT for >5 more seconds, mark as FAILED. Convergence time: with n=500 nodes, each gossiping to 3 peers per second, information reaches all nodes in O(log n) = log₂(500) ≈ 9 gossip rounds = 9 seconds."
        tradeoff: "Gossip vs. centralized health registry (Consul, etcd): centralized: O(1) lookup, but the registry is a single point of failure. Gossip: decentralized, resilient to any single node failure, but convergence takes O(log n) seconds. For a 500-node cluster requiring 10-second failure detection, gossip is correct — O(log 500) ≈ 9 gossip rounds = 9 seconds."
        caveat: "Follow-up: false failure detection during network partition. Partition: nodes in partition A can't reach nodes in partition B. From A's perspective, B is failed. From B's perspective, A is failed. Both sides mark each other as failed. On partition heal, they gossip and reconcile. The reconciliation uses the higher heartbeat_seq: the node with the higher seq is the 'truth'. Both partitions have been incrementing their own nodes' seqs — no data loss, just temporary mutual suspicion. Follow-up: failed node recovers — rejoin the cluster. Restarting node increments its own heartbeat_seq (or resets to a high value above its last known seq + 1). Gossips its fresh membership entry to 3 peers. Within 10 seconds, all nodes update their membership list to show the node as healthy. No coordination needed for rejoining — gossip handles it."
        watch: "Gossip protocols trade consistency for availability: during a network partition, nodes believe incorrect health state about partitioned peers. This is acceptable for service discovery (route around unhealthy nodes) but unacceptable for leader election (which requires consensus). Use gossip for health dissemination; use Raft or Paxos for leader election and configuration consensus."

      - number: 7
        question: "Design an idempotent order creation API. A client submits an order, network drops, and retries the same request 3 times. Exactly one order must be created."
        needed: "client generates UUID order_id before submit; includes it in request; server: INSERT INTO orders ... ON CONFLICT (order_id) DO NOTHING; return 200 with existing order on duplicate, not 201"
        answer: "Client generates UUID order_id at UI layer before the first POST. Request body includes order_id. Server: INSERT INTO orders (id, user_id, items, total, created_at) VALUES ($order_id, ...) ON CONFLICT (id) DO NOTHING. Check rows_affected: if 1 → first creation, return 201 Created. If 0 → duplicate, SELECT * FROM orders WHERE id = $order_id, return 200 OK with the existing order. Both 201 and 200 return identical response structure — client behavior is the same regardless. Network retries (3 identical POSTs with the same order_id) result in exactly one DB row and one 201 response; the subsequent 200 responses are identical in content."
        tradeoff: "Client-generated ID (order_id) vs. server-generated ID with idempotency header: client-generated: simple — the ID IS the idempotency key. ON CONFLICT DO NOTHING is a standard PostgreSQL operation. Server-generated with idempotency key (X-Idempotency-Key header): requires a separate idempotency_keys table to map key → order_id. More flexible but more complex. For order IDs that are client-facing (shown in emails, order history), server-generated is cleaner — the order_id is a sequential or formatted ID, not a raw UUID."
        caveat: "Follow-up: two different clients generating the same UUID by accident (collision). UUID v4 collision probability with 2 clients: 1 / 2^122 ≈ 10^-37. Statistically impossible. Don't add extra collision detection logic — the probability is lower than hardware bit-flip errors. Follow-up: idempotency window — if client retries after 24 hours, should it still be idempotent? It depends on business rules. If an order was placed and not paid within 30 minutes, it's cancelled. A retry after 24 hours should not resurrect the cancelled order. Implement: if the existing order is CANCELLED and the retry comes after 24 hours, treat as a new order. Window: idempotency key is valid for ORDER_TTL (e.g., 24 hours). After 24 hours, the same order_id can create a new order."

      - number: 8
        question: "Design a health check aggregator for a microservices platform. 200 services, each with /health endpoint. A status page must reflect all service health within 30 seconds."
        needed: "central health check service polls all 200 endpoints every 20s; store latest status per service in Redis; status page reads from Redis (never polls services directly)"
        answer: "Health check service: 200 endpoints × poll every 20s. Run all 200 HTTP GETs concurrently (asyncio.gather in Python, goroutines in Go). Timeout per request: 5s. Results stored in Redis: HSET 'service_health' {service_name: {status: healthy, latency_ms: 45, last_checked: timestamp}}. Status page: reads from Redis on page load (never polls services directly — that would create a massive fan-out on every page view). Update Redis within 20s of each probe: maximum staleness = 20s + probe time + Redis write = ~25s. Well within 30s SLA. Alert rule: if health.status == 'down' AND last_check > 45s ago → escalate to PagerDuty (both current status AND recency matter)."
        tradeoff: "Centralized poller (one service polls all 200) vs. sidecar health checker (each service polls itself and reports): centralized: simple architecture, single place to configure probe parameters. Single point of failure (if poller crashes, health is not updated). Sidecar: each service reports its own health — poller failure doesn't cause health to stale. But sidecar adds complexity. Mitigate centralized SPOF: run 2 health check service instances with coordinated polling (odd services → instance 1, even → instance 2)."
        caveat: "Follow-up: scale polling to 1000 services. 1000 concurrent HTTP GETs every 20s. Python asyncio handles 1000 concurrent network calls easily (I/O-bound). At 5s timeout × 1000 services = 5 seconds of concurrent waiting. Memory: 1000 HTTP response objects × ~5KB = 5MB peak. No scaling issue. For 10,000 services: distribute across 10 health check service instances, each handling 1000 services. Use a consistent hash to assign services to instances. Follow-up: slow service (200ms response) vs. failing service (no response). 200ms response: mark as 'degraded' (status: slow, latency_ms: 200). No response within 5s: mark as 'down'. Show both states differently on the status page: 'Degraded' (yellow) vs. 'Down' (red). Alert on 'Down'; warn on 'Degraded' (but don't page on-call for slow-but-responsive)."
        related_fundamentals: [storage/redis]


  - slug: qb-notifications
    title: "Notifications & Push"
    description: "Push notification fan-out, delivery guarantees, user preference management, digest batching"
    number_range: "Q038–Q039, Q107"
    questions:
      - number: 1
        question: "Design a push notification system for a 100M user mobile app. A single event (e.g., product announcement) must reach all users within 5 minutes."
        needed: "fan-out via Kafka topic → N worker shards → APNs/FCM per platform; batch 1000 tokens per FCM batch API call; track delivery receipts per notification_id in Redis"
        answer: "Architecture: event producer (backend service) publishes to Kafka topic 'notifications'. Kafka has 100 partitions. 100 consumer workers read from the topic. Each worker: reads a batch of user_ids, looks up device tokens from MySQL (sharded by user_id), groups tokens by platform (iOS/Android), calls APNs (iOS) and FCM (Android) batch APIs. FCM batch: up to 500 tokens per request. For 100M users → 200K FCM batch calls. At 5ms per batch call, 1000 concurrent workers: 200K / 1000 workers = 200 calls/worker × 5ms = 1 second. Parallelism across 100 Kafka partitions: total time = ~1s. Device token lookup: Redis cache (user_id → device_token) with 24h TTL. MySQL as source of truth for device registration. Delivery: FCM/APNs return per-token success/failure. Store delivery receipts: HSET 'notification:{id}:receipts' {user_id: delivered/failed}. Failed: retry queue with exponential backoff (2s, 4s, 8s)."
        tradeoff: "Fan-out on write (pre-compute per user) vs. fan-out on read (compute at delivery time): at 100M users, always fan-out on write — reading 100M rows at delivery time is too slow. Fan-out on write requires a fan-out queue (Kafka) to avoid thundering herd: all 100M messages are queued and processed by workers at a controlled rate, not all at once."
        caveat: "APNs and FCM have rate limits: FCM allows ~600K concurrent connections from a single project. At 100M notifications/day = ~1150 req/s average. Burst from a campaign: 100M in 5 min = 333K req/s → needs FCM batch API (500 tokens/request) to stay under connection limits. Invalid device tokens: FCM returns InvalidRegistration for unregistered tokens. Delete these from the device token table immediately — they're no longer valid. Sending to invalid tokens wastes quota."
        watch: "Interviewer follow-up on notification fatigue: how do you prevent spamming users? User notification preferences table (user_id, notification_type, channel, enabled). Before fan-out, filter by user preferences. Digest batching: instead of 50 notifications/day, aggregate into a daily digest. Quiet hours: check user timezone and local time — don't send between 10PM and 8AM."
        related_problems: []
        related_fundamentals: []

      - number: 2
        question: "Design user notification preferences. Users can opt out of specific notification types, set quiet hours, and choose channels (push, email, SMS)."
        needed: "preferences table (user_id, notification_type, channel, enabled, quiet_hours_start, quiet_hours_end, timezone); read from Redis cache on every notification; invalidate cache on preference update"
        answer: "Schema: notification_preferences(user_id PK, notification_type VARCHAR, channel ENUM(push, email, sms), enabled BOOL, quiet_hours_start TIME, quiet_hours_end TIME, timezone VARCHAR). Composite PK: (user_id, notification_type, channel). Cache: on notification send, look up Redis key 'prefs:{user_id}' → JSON blob of all preferences. TTL: 1 hour. Cache miss: SELECT * FROM notification_preferences WHERE user_id = $uid → cache result. On preference update: DELETE Redis key immediately (write-invalidate pattern). Quiet hours check: convert notification timestamp to user's timezone, check if within quiet_hours range. If in quiet hours: queue the notification for delivery at quiet_hours_end. Defer queue: Redis sorted set 'deferred_notifications', score = delivery_timestamp, member = notification payload. A cron job every minute: ZRANGEBYSCORE with score ≤ now → deliver deferred notifications."
        tradeoff: "Per-user preference granularity (every notification type per user) vs. coarse categories (marketing/transactional/system): coarse categories are easier to build and most users only want to opt out of marketing. Per-type granularity is needed for power users. Start with 3 categories; let users request finer control. The schema supports both — just vary the notification_type values."
        caveat: "Quiet hours across timezones: user sets 10PM–8AM in their timezone. If user travels, their timezone changes. Store timezone per user preference, not computed from IP. Transition at daylight saving time: use IANA timezone names (America/New_York), not fixed offsets (UTC-5), so the DST transition is handled automatically by the timezone library."
        watch: "Digest batching follow-up: instead of delivering 30 notifications during quiet hours individually at 8AM, aggregate them into a single digest. Digest format: 'You have 30 new notifications: 5 from Instagram, 10 order updates, 15 promotional offers.' The deferred queue groups by user_id and collapses multiple notifications into one digest payload on delivery."
        related_problems: []
        related_fundamentals: []

      - number: 3
        question: "Q107: A mobile app sends push notifications. 20% of device tokens are stale (uninstalled apps). How do you detect and clean up stale tokens efficiently?"
        needed: "FCM/APNs return specific error codes for unregistered tokens; process error responses in bulk; delete from DB + Redis; run periodic audit: tokens not seen in 90 days → mark inactive"
        answer: "Stale token detection: FCM batch API returns per-token result. Error code 'UNREGISTERED' = token is invalid (app uninstalled). On receiving UNREGISTERED: DELETE FROM device_tokens WHERE token = $token. Also invalidate Redis cache for that user. APNs: HTTP/2 response with status 410 Gone = token is invalid. Same cleanup. Periodic audit: tokens not used (no successful delivery) in 90 days → status = INACTIVE. Reduce notification sends to INACTIVE tokens (save FCM quota). If delivery succeeds for an INACTIVE token, re-activate it. Token refresh: when app restarts, it re-registers its current token with your backend. Backend: UPSERT device_tokens SET token = $new_token, updated_at = now() WHERE user_id = $uid AND platform = $platform. This handles token rotation (FCM rotates tokens periodically for security)."
        tradeoff: "Immediate deletion on UNREGISTERED vs. soft-delete with reactivation: immediate deletion is simpler. But FCM might return UNREGISTERED transiently (service hiccup). Safer: mark as UNREGISTERED (soft-delete), wait 24 hours, if not re-registered → hard delete. The 24-hour window handles FCM transient errors without data loss."
        caveat: "20% stale tokens × 100M users = 20M stale tokens. FCM quota is based on requests, not recipients. Sending to 20M stale tokens wastes 20M/500 = 40K batch requests per campaign — 20% of total FCM quota. Cleaning up stale tokens recovers this quota. Also reduces billing if you're on a paid FCM tier."
        watch: "When a user reinstalls the app, FCM assigns a new token. If the old token is still in your DB, you'll get UNREGISTERED for it. The reinstalled app registers its new token. Your backend should do UPSERT by (user_id, platform), not INSERT — so the old stale token is overwritten by the new valid token atomically."
        related_problems: []
        related_fundamentals: []

  - slug: qb-feed-timeline
    title: "Feed & Timeline"
    description: "Fan-out on write vs read, celebrity problem, timeline aggregation, pagination, ranking"
    number_range: "Q026–Q027"
    questions:
      - number: 1
        question: "Design Instagram's news feed. Each post by a user you follow appears in your feed within 5 seconds. You follow 1000 users; 5% of accounts have >1M followers (celebrities)."
        needed: "fan-out on write for normal users (<1M followers): write post_id to each follower's feed list in Redis; fan-out on read for celebrities: merge celebrity posts at read time; Redis sorted set per user_id with score=timestamp"
        answer: "Post creation flow: user publishes a post. If user has <1M followers: fan-out-on-write via Kafka. Post service publishes to 'post-created' Kafka topic. Fan-out workers consume: for each follower, ZADD 'feed:{follower_id}' {score: timestamp, member: post_id}. Feed list is a Redis sorted set, max 1000 entries (trim with ZREMRANGEBYRANK). For celebrities (>1M followers): skip fan-out. Read-time merge: when user loads feed, fetch their sorted set + fetch recent posts from celebrities they follow (Redis sorted set 'celebrity_posts:{celebrity_id}', populated on post creation). Merge in application layer: heapq.merge() by timestamp. Serve top 20. Timeline load: Redis ZREVRANGEBYSCORE 'feed:{user_id}' score=(-inf, now) LIMIT 0 20 → returns 20 post_ids. Batch fetch post content: MGET all post_ids from Redis post cache. Follower count threshold: flag accounts with >1M followers as CELEBRITY in user table. Update flag when follower count crosses threshold."
        tradeoff: "Fan-out on write (precompute per follower): O(followers) write cost per post; O(1) read. Good for users following celebrities because the celebrity's post is merged at read time, not written to 1M feeds. Fan-out on read (compute at read time): O(followed_count) at read time; write is O(1). Unacceptable at 1000 followed accounts — feed load would require 1000 Redis reads + merge. Hybrid is correct: fan-out on write for normal users, fan-out on read for celebrities."
        caveat: "Fan-out for 1M followers: at 100 fan-out workers × 100K followers/worker, a single celebrity post takes 10 seconds to fan-out. Use Kafka partitioning: fan-out topic has 1000 partitions, each worker processes 1000 followers → parallel fan-out in 1 second. But this still requires 1M Redis ZADD operations per celebrity post. For the top 10 accounts (each with 50M followers), even parallel fan-out is expensive. Hence the celebrity hybrid: skip fan-out entirely for accounts >1M followers."
        watch: "Pagination follow-up: cursor-based pagination for infinite scroll. Cursor = last seen timestamp. Next page: ZREVRANGEBYSCORE 'feed:{user_id}' (cursor - 1) 0 LIMIT 0 20. This is O(log N + page_size) — efficient even for 1000-entry sorted sets. Avoid LIMIT offset,20 pattern (SKIP offset is O(offset) in most DBs). Redis sorted sets don't have this problem — ZRANGEBYSCORE is always O(log N + range_size)."
        related_problems: [instagram]
        related_fundamentals: []

      - number: 2
        question: "Design Twitter's timeline ranking. Raw chronological feed has 1000 posts. You need to rank them by relevance without significant latency increase. Ranking must complete within 100ms."
        needed: "two-pass: fetch top 200 by recency from Redis sorted set; score each with lightweight ML model (engagement prediction: likes/retweets/click-through); return top 20; precompute features offline"
        answer: "Two-phase timeline serving: Phase 1 (retrieval): ZREVRANGEBYSCORE 'feed:{user_id}' LIMIT 0 200 → 200 candidate post_ids. Phase 2 (ranking): For each candidate, compute relevance score. Features: author_engagement_rate (precomputed, stored in Redis hash 'user_stats:{user_id}': likes_per_post, retweets_per_post), post_age_hours, media_type (video > image > text), user_affinity_with_author (precomputed: how often user liked/clicked this author, stored in 'affinity:{user_id}:{author_id}'). Lightweight model: logistic regression or GBDT (10ms inference for 200 candidates). Score = w1×engagement_rate + w2×recency_decay + w3×affinity. Sort by score, return top 20. Total latency: Redis retrieval (5ms) + feature lookup (10ms) + scoring (10ms) = 25ms. Well within 100ms. Model served in-process (not RPC) to avoid network latency."
        tradeoff: "Full ML model (BERT-based, 500ms inference) vs. lightweight model (logistic regression, 10ms): full model produces better ranking but 5× over latency budget. Lightweight model: precompute the expensive features offline (author engagement rates, user-author affinity), serve simple linear combination at read time. 90% of the ranking quality at 5% of the inference cost. A/B test both to measure quality vs. latency tradeoff empirically."
        caveat: "Feature staleness: author_engagement_rate is recomputed every hour. A post that goes viral within the last hour won't have updated engagement stats. Mitigate: for posts < 1 hour old, use raw metrics (current_likes / time_since_post) as the engagement signal instead of precomputed rate. Affinity features can be computed daily (less sensitive to recency). Avoid real-time feature computation for high-cardinality features (200 candidates × 1000 authors = 200K DB lookups) — this kills the latency budget."
        watch: "Diversity follow-up: naive ranking puts the highest-engagement author's 5 posts at the top. User sees a monoculture of one creator. Add diversity constraint: max 2 posts per author in top 20. Implementation: after scoring, apply maximal marginal relevance or simple deduplication by author_id. Select top 2 per author from sorted list; fill remaining slots with next-best candidates."
        related_problems: [instagram]
        related_fundamentals: []

  - slug: qb-data-pipeline
    title: "Data Pipeline & Analytics"
    description: "ETL design, stream processing, batch vs stream tradeoffs, Lambda architecture, analytics at scale"
    number_range: "Q045–Q046, Q138"
    questions:
      - number: 1
        question: "Design a real-time analytics pipeline for an e-commerce site. 500K events/sec (page views, clicks, purchases). Dashboard must show per-minute aggregates with <60 second lag."
        needed: "Kafka ingest → Flink stream processor → aggregate per minute per event_type in Redis sorted sets; Flink does windowed aggregation (tumbling window 60s); write to Redis + ClickHouse for persistence"
        answer: "Ingestion: 500K events/sec → Kafka, 100 partitions (5K events/partition/sec). Kafka producers are app servers + mobile SDKs. Event schema: {event_id, user_id, session_id, event_type, url, item_id, timestamp}. Stream processing: Apache Flink, 100 parallelism (1 task per Kafka partition). Tumbling window of 60 seconds: GROUP BY (event_type, minute_bucket) COUNT(*), SUM(revenue). Window output: at T+60s, emit aggregate: {minute: '14:32', page_views: 1.2M, purchases: 5400, revenue: $180K}. Write to: Redis (for dashboard, HSET 'analytics:minute:{timestamp}' {page_views: N, purchases: N}) TTL 2 days. ClickHouse (for historical queries, append-only columnar table). Dashboard: reads from Redis for recent 60 minutes (sub-ms). Historical: queries ClickHouse (OLAP, <1s for millions of rows). End-to-end latency: event produced → Kafka (10ms) → Flink window closes (60s) → Redis write (5ms) → dashboard read (5ms) = ~61 seconds. Meets <60s SLA? Window of 60s means avg latency is 30s for events at start of window; max is 60s. Acceptable."
        tradeoff: "Tumbling window (60s fixed boundaries) vs. sliding window (every 10s, last 60s): tumbling: lower resource usage, simple to implement. Sliding: more continuous updates (dashboard refreshes every 10s). Sliding window uses 6× more Flink state. For a marketing dashboard that refreshes every minute, tumbling is correct. For real-time fraud detection needing 10s windows, sliding is justified."
        caveat: "Out-of-order events: mobile events can arrive late (poor connectivity). A purchase at 14:32:30 might arrive at 14:33:45. Tumbling window for [14:32:00, 14:33:00) has already closed. Flink watermark: allow 30s of late events. Events arriving within 30s of window close are included. Events arriving after 30s are counted in a 'late events' counter (for quality monitoring). Late event rate >1% triggers alert — mobile SDK might have a bug holding events too long."
        watch: "Lambda architecture follow-up: batch layer (daily Spark job on S3 data) + speed layer (Flink for recent data) + serving layer (ClickHouse + Redis). The batch layer reprocesses historical data with the correct logic if the streaming logic had a bug. The speed layer shows real-time data that will be overwritten by the batch layer once the batch runs. This solves the 'streaming bugs corrupt historical data' problem. Cost: maintain two processing pipelines. Modern Kappa architecture (Flink only, replay from Kafka for correction) is simpler if Kafka retention is 30+ days."
        related_problems: []
        related_fundamentals: []

      - number: 2
        question: "Design an ETL pipeline that moves 10TB of daily transaction data from PostgreSQL to a data warehouse. Pipeline must complete within 4 hours. Data has PII that must be masked before warehousing."
        needed: "CDC (change data capture via Debezium/logical replication) → Kafka → transformation service masks PII → load to Snowflake/BigQuery; full load on Day 1, incremental CDC after; hash email/phone for pseudonymization"
        answer: "Initial load: pg_dump --no-owner | gzip → S3. Snowflake COPY INTO from S3 (parallel load). 10TB at 2.5GB/s = 4000s / 3600 = 1.1 hours. Within 4h budget. Incremental CDC (after initial load): Debezium connector on PostgreSQL (reads WAL, logical replication slot). Emits {before, after, op: insert/update/delete, timestamp}. Kafka topic 'transactions-cdc' with 20 partitions. Transformation workers (20): read from Kafka, apply PII masking. PII fields: email → SHA-256 hash. Phone → last 4 digits + 'XXXXX-'. Name → 'MASKED'. Credit card → first 6 + last 4 ('XXXX XXXX' in middle). Write masked record to Snowflake. Throughput: 10TB daily / 86400s = 116MB/s → easily handled by 20 Debezium consumers. Latency: CDC events arrive in Snowflake within 30-60 seconds of the transaction. PII masking is deterministic: same email always hashes to the same value (enables joins on hashed_email across tables without exposing PII)."
        tradeoff: "CDC (Debezium + WAL) vs. batch extract (pg_dump daily): CDC: sub-minute latency, incremental load, minimal source DB impact. Batch: simpler to implement, no WAL configuration, but 4h+ extraction time for 10TB daily growth. For 10TB daily, CDC is correct — daily batch would take the full 4-hour window just for extraction, leaving no buffer for failures."
        caveat: "WAL disk usage: Debezium uses a PostgreSQL logical replication slot. If the consumer falls behind, WAL accumulates on the PostgreSQL server disk (WAL cannot be cleaned up until the consumer confirms it's processed). WAL disk fill = database downtime. Monitor: replication slot lag in bytes (alert at 10GB lag). If Debezium crashes for 4 hours: WAL accumulates at 116MB/s × 4h = 1.7TB. Ensure PostgreSQL server has >2TB WAL headroom. Set wal_level=logical in postgresql.conf."
        watch: "GDPR deletion follow-up: user requests data deletion. Hashed PII in the warehouse cannot be reversed — good. But the original transaction records reference the user. GDPR requires deletion within 30 days. Options: 1) Store a mapping table (user_id → hashed_email) in a separate encrypted DB; delete from mapping table on GDPR request (pseudonymization becomes anonymization). 2) Delete the user_id from warehouse records (set to NULL). Option 2 is simpler and fully compliant. Data warehouse tables are typically append-only → use Snowflake GDPR DELETE (UPDATE partition) or BigQuery DML DELETE statement."
        related_problems: []
        related_fundamentals: []

      - number: 3
        question: "Q138: Design a system that detects trending topics from 500K tweets/minute in real-time. Topics must appear in trending list within 2 minutes of a spike."
        needed: "sliding window count per hashtag using Redis sorted set; ZINCRBY 'trending:{window}' for each hashtag; compare window-over-window growth rate; spike = 3× vs prior window"
        answer: "Ingestion: Twitter firehose → Kafka (100 partitions). Stream processor (Flink or custom workers): extract hashtags from each tweet. For each hashtag in the tweet: ZINCRBY 'trending:{current_minute}' 1 {hashtag}. Two Redis keys per minute: current and previous window. Trending detection: every 60s, compare ZREVRANGEBYSCORE for current_minute vs previous_minute. Growth rate = current_count / max(previous_count, 1). If growth_rate > 3.0 AND current_count > 500 (minimum volume threshold): mark as trending. Volume threshold prevents 'my cat' trending because @cat123's 3 friends all tweeted it simultaneously. Trending list: top 10 by growth rate weighted by volume. ZREVRANGE 'trending_topics' 0 9. TTL: expire per-minute keys after 10 minutes (rolling window). Smoothing: exponential moving average over 5 windows to reduce noise from single-spike bots."
        tradeoff: "Redis sorted set per minute vs. HyperLogLog per hashtag per window: sorted sets count exact frequencies but use O(N) memory (N = unique hashtags). At 500K tweets/min × 10 hashtags/tweet average = 5M hashtag mentions. Unique hashtags: ~100K. Redis sorted set with 100K members = ~10MB. Feasible. HyperLogLog: counts unique users who used a hashtag (measures reach, not volume). Different metric — use for 'trending by unique users' variant."
        caveat: "Coordinated inauthentic behavior (bot farms): 10K bots all tweet #BuyMyProduct simultaneously → spikes with growth_rate=1000. Minimum volume from unique users: filter by unique user_id count, not raw tweet count. Redis HyperLogLog per hashtag: PFADD 'unique_users:{hashtag}:{minute}' {user_id}. PFCOUNT returns approximate unique user count (±0.8% error). Only trend if unique_user_count > 500. This kills bot farm attacks: even 10K bots are 10K 'unique' user_ids, but they're all new accounts with 0 followers → add follower-count weighting: tweets from accounts with >100 followers count 2×."
        watch: "Geo-trending follow-up: topics trending in New York vs. London. Add user location to tweet schema. Separate Redis sorted sets per city: ZINCRBY 'trending:{city}:{minute}' 1 {hashtag}. Top 50 cities × 100K hashtags × 10 minutes = 50 × 100K × 10 = 50M Redis entries = 500MB. Feasible. Alternative: geohash the user location (geohash precision 4 = ~40km × 20km cells), use geohash as partition key instead of city name."
        related_problems: []
        related_fundamentals: [storage/redis]

  - slug: qb-misc-operations
    title: "Operations & Architecture Misc"
    description: "Feature flags, job queues, logging, multi-tenancy, CI/CD, config management, offline sync, analytics, ML feature stores"
