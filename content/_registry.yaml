        question: "How do systems support comments at scale?"
        needed: "sharded comment table by post_id; cursor-based pagination; Redis for hot post comment counts"
        answer: "Shard the comments table by post_id — all comments for a post land on the same shard, enabling efficient range queries without cross-shard joins. Use cursor-based pagination: the client sends the last seen comment_id, the server queries WHERE comment_id < cursor AND post_id = X ORDER BY comment_id DESC LIMIT 50. Cache comment count per post in Redis (INCR on insert, DECR on delete) to avoid COUNT(*) queries."
        tradeoff: "Nested comments (Reddit-style threads) require storing parent_comment_id and an adjacency list or materialized path. This adds complexity — a simple flat comment list (top-level only, Instagram style) is far easier to implement and scale. Add threading only if your UX requires it."
        caveat: "Sharding by post_id creates hot shards for viral posts — a post with 1M comments per hour hits one shard. Use a hash of post_id to distribute to one of N comment shards rather than a direct modulo — or use a dedicated comments DB for hot posts identified by a monitor."
        watch: "Sorting comments by 'top' (likes minus dislikes) requires re-sorting on every new vote — expensive at scale. Pre-compute top comments periodically (every 60 seconds for active posts, every hour for older posts) and cache the sorted list in Redis."
