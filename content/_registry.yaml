            <line x1="218" y1="75" x2="248" y2="96" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#q41a)"/>
            <text x="220" y="91" font-size="9" fill="#DC2626" font-family="system-ui,sans-serif">result &lt; 0</text>
            <rect x="250" y="80" width="130" height="34" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
            <text x="315" y="94" text-anchor="middle" font-size="9" fill="#B91C1C" font-family="system-ui,sans-serif">INCR back</text>
            <text x="315" y="108" text-anchor="middle" font-size="9" fill="#B91C1C" font-family="system-ui,sans-serif">→ 429 Rejected</text>
            <text x="388" y="20" font-size="9" fill="#64748B" font-family="system-ui,sans-serif">DB = source of truth</text>
            <text x="388" y="32" font-size="9" fill="#64748B" font-family="system-ui,sans-serif">Redis = fast gate</text>
          </svg>
        answer: "Initialize a Redis counter with the inventory count (e.g., SET coupon:1234:inventory 500). Each claim atomically DECRements: if the result is >= 0, the claim succeeds; if the result is -1 or less, increment back and reject. This is O(1) and atomic — no race conditions. Write the final inventory to the DB asynchronously. For extra safety, add a DB check-and-update as a reconciliation step."
        tradeoff: "DB compare-and-swap (SELECT FOR UPDATE + UPDATE WHERE count > 0) works but serializes claims at the DB row level — a lock per row under high concurrency causes queueing and latency spikes. Redis DECR handles tens of thousands of claims per second on a single node."
        caveat: "Redis DECR can go below zero if you're not careful — a DECR followed by a check is not atomic. Use a Lua script that combines the check and decrement in one atomic operation: DECR only if current value > 0, return 0 if already at zero."
        watch: "Redis is in-memory — a crash can lose the inventory counter. Persist with RDB snapshots every 60 seconds or AOF (append-only file). For critical inventory, the DB is the source of truth; Redis is a fast gate that may briefly allow a few extra claims that the DB reconciliation corrects."
        related_fundamentals: [storage/redis]
      - number: 42
        question: "How do systems handle flash sale traffic spikes?"
