      - number: 22
        question: "How do you ensure exactly-once payment processing?"
        needed: "unique transaction ID + database unique constraint; idempotency at every gateway call"
        answer: "Assign a system-generated transaction_id before calling the payment gateway. Include it in the gateway request as the external reference. Store it with a unique constraint in your DB. If the gateway call times out, retry with the same transaction_id — most gateways (Stripe, Adyen) deduplicate on their side. On response, use the transaction_id to match the outcome to your pending record."
        tradeoff: "At-least-once delivery (with idempotency) is achievable without distributed transactions. Exactly-once in the strict sense is impossible across system boundaries — you can only achieve idempotency (same logical result regardless of how many times you try)."
        caveat: "Never call a payment gateway twice with different amounts for the same transaction_id — even if you think the first call failed. The gateway may have succeeded; check the transaction status first before retrying."
        watch: "Idempotency at the payment gateway level doesn't help if your internal order creation is not idempotent — a gateway success followed by an internal DB failure will trigger a retry that creates a duplicate order even though the payment was processed once."
