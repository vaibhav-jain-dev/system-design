        tradeoff: "Kubernetes built-in service discovery is simple and zero-config for in-cluster communication. For external services or multi-cluster setups, Consul provides richer health checking (custom scripts, not just TCP) and supports non-Kubernetes nodes. Use Kubernetes service discovery for most things, Consul for heterogeneous environments."
