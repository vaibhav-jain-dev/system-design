# ─── Problems (System Design) ───
problems:
  - slug: url-shortener
    title: "URL Shortener"
    description: "Design TinyURL: hashing, base62, collision handling, analytics"
    path: problems/url-shortener
    uses:
      - fundamental: networking/load-balancing
        config: "ALB with round-robin"
        why: "Stateless API, no sticky sessions needed"
        not_this: "NLB — no HTTP path-based routing"
        risk: "Single AZ deployment = SPOF"
        caveats: "Cross-AZ charges $0.01/GB. Multi-AZ ALB adds ~$16/mo"
      - fundamental: networking/cdn/cloudfront
        config: "Edge caching for 301 redirects"
        why: "Redirects are highly cacheable, 80%+ cache hit rate"
        not_this: "Akamai — overkill for single-region MVP"
        risk: "Stale cache on URL updates, need invalidation API"
        caveats: "Invalidation limit: 3000/mo free, $0.005 each after"
      - fundamental: storage/redis
        config: "ElastiCache read-through, TTL 24h"
        why: "Hot URLs (top 20%) account for 80% reads"
        not_this: "Memcached — no persistence on node restart"
        risk: "Thundering herd on cache miss for viral URLs"
        caveats: "r6g.large = $0.126/hr = ~$92/mo. Monitor eviction rate."

  - slug: instagram
    title: "Instagram"
    description: "Design Instagram: photo/video feed, stories, likes, comments, explore, notifications"
    path: problems/instagram
    uses:
      - fundamental: networking/cdn/cloudfront
        config: "Edge caching for images/videos, S3 origin with OAC"
        why: "Media-heavy app — 80%+ traffic is image/video serving, CDN cuts latency to <50ms globally"
        not_this: "Self-hosted CDN — operational nightmare at Instagram scale"
        risk: "Cache invalidation on image deletion (GDPR compliance)"
        caveats: "CloudFront $0.085/GB first 10TB. At 1PB/mo = ~$40K/mo. Negotiate Enterprise Discount."
      - fundamental: networking/load-balancing
        config: "ALB with path-based routing: /api/* → app servers, /media/* → media service"
        why: "Different services for API vs media — ALB routes by path at L7"
        not_this: "NLB — need HTTP path routing for microservice split"
        risk: "Uneven load if /feed endpoint is 10x heavier than /profile"
        caveats: "ALB $0.0225/hr + $0.008/LCU-hr. At 50K RPS ~$200/mo."
      - fundamental: storage/redis
        config: "Feed cache per user (sorted set), session store, like counters"
        why: "Feed generation is expensive (fan-out-on-read). Cache assembled feeds in Redis sorted sets."
        not_this: "Memcached — need sorted sets for ranked feeds, persistence for sessions"
        risk: "Celebrity post = millions of fan-out writes. Use hybrid fan-out."
        caveats: "r6g.xlarge cluster = ~$370/mo. Feed cache TTL 5min. Eviction: allkeys-lru."
      - fundamental: storage/dynamodb
        config: "Posts table (PK=user_id, SK=timestamp), Likes counter (atomic increment)"
        why: "Write-heavy for likes/comments. DynamoDB handles 10K+ WPS per partition."
        not_this: "Postgres — write amplification at scale, connection pool exhaustion"
        risk: "Hot partition on celebrity posts — use write sharding (user_id#shard)"
        caveats: "On-demand $1.25/M writes, $0.25/M reads. At 100K WPS = ~$10K/mo."

  - slug: rate-limiter
    title: "Rate Limiter"
    description: "Design API rate limiting: token bucket, sliding window, distributed counters"
    path: problems/rate-limiter
    uses:
      - fundamental: storage/redis
        config: "Sorted set sliding window per user_id"
        why: "O(1) atomic ZADD+ZCOUNT, sub-ms latency"
        not_this: "DynamoDB — too slow for per-request check"
        risk: "Redis down = open or closed? Choose fail-open with local fallback"
        caveats: "ZRANGEBYSCORE cost: O(log N + M). Cleanup old entries with ZREMRANGEBYSCORE."
      - fundamental: networking/load-balancing
        config: "ALB with sticky sessions (rate state is per-node)"
        why: "Local counter consistency before Redis sync"
        not_this: "Round-robin — splits user requests across nodes, breaks local counters"
        risk: "Sticky session + node failure = temporary over-limit"
        caveats: "Sticky sessions via ALB cookie, not IP. Duration: 1 day."

# ─── Fundamentals (hierarchical) ───
fundamentals:
  - slug: networking/load-balancing
    title: "Load Balancing"
    description: "ALB vs NLB, routing algorithms, health checks, AZ distribution"
    path: fundamentals/networking/load-balancing
    children:
      - slug: networking/load-balancing/alb
        title: "Application Load Balancer (ALB)"
        description: "Layer 7, path-based routing, WebSocket support, gRPC, WAF integration"
        path: fundamentals/networking/load-balancing/alb
      - slug: networking/load-balancing/nlb
        title: "Network Load Balancer (NLB)"
        description: "Layer 4, static IP, ultra-low latency, TCP/UDP passthrough"
        path: fundamentals/networking/load-balancing/nlb

  - slug: networking/cdn
    title: "CDN"
    description: "Edge caching, Points of Presence, invalidation strategies, origin shield"
    path: fundamentals/networking/cdn
    children:
      - slug: networking/cdn/cloudfront
        title: "CloudFront"
        description: "AWS CDN: Lambda@Edge, Origin Access Identity, geo restrictions, signed URLs"
        path: fundamentals/networking/cdn/cloudfront

  - slug: storage/redis
    title: "Redis / ElastiCache"
    description: "Caching strategies, data structures, clustering, persistence, pub/sub"
    path: fundamentals/storage/redis

  - slug: storage/dynamodb
    title: "DynamoDB"
    description: "Single-table design, GSI/LSI, TTL, streams, on-demand vs provisioned"
    path: fundamentals/storage/dynamodb
