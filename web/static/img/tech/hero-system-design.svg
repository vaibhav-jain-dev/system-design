<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" fill="none">
  <!-- Background grid -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#6366F1" stroke-width="0.3" opacity="0.2"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="480" height="240" fill="url(#bg)" rx="12"/>
  <rect width="480" height="240" fill="url(#grid)" rx="12"/>

  <!-- Client (left) -->
  <rect x="20" y="95" width="60" height="50" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <rect x="28" y="103" width="44" height="28" rx="3" fill="#334155"/>
  <rect x="32" y="107" width="18" height="3" rx="1" fill="#6366F1" opacity="0.7"/>
  <rect x="32" y="113" width="28" height="3" rx="1" fill="#475569"/>
  <rect x="32" y="119" width="22" height="3" rx="1" fill="#475569"/>
  <text x="50" y="158" font-family="Inter,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Client</text>

  <!-- Arrow client → LB -->
  <path d="M 82 120 L 128 120" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="124,116 132,120 124,124" fill="#6366F1" opacity="0.8"/>

  <!-- Load Balancer -->
  <rect x="130" y="88" width="64" height="64" rx="8" fill="#1E293B" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="162" cy="110" r="12" fill="#1D4ED8" opacity="0.3"/>
  <path d="M 155 110 L 162 103 L 169 110" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 150 120 L 162 116 L 174 120" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <text x="162" y="142" font-family="Inter,sans-serif" font-size="8" fill="#93C5FD" text-anchor="middle">Load</text>
  <text x="162" y="152" font-family="Inter,sans-serif" font-size="8" fill="#93C5FD" text-anchor="middle">Balancer</text>

  <!-- Arrows LB → Servers -->
  <path d="M 196 105 L 232 90" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="3,2"/>
  <path d="M 196 120 L 232 120" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="3,2"/>
  <path d="M 196 135 L 232 150" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Server 1 -->
  <rect x="234" y="70" width="52" height="44" rx="6" fill="#1E293B" stroke="#059669" stroke-width="1.5"/>
  <rect x="241" y="78" width="38" height="6" rx="2" fill="#065F46" opacity="0.8"/>
  <rect x="241" y="88" width="38" height="6" rx="2" fill="#065F46" opacity="0.6"/>
  <rect x="241" y="98" width="24" height="6" rx="2" fill="#065F46" opacity="0.4"/>
  <circle cx="274" cy="81" r="2.5" fill="#10B981"/>
  <circle cx="274" cy="91" r="2.5" fill="#10B981" opacity="0.7"/>
  <text x="260" y="125" font-family="Inter,sans-serif" font-size="8" fill="#6EE7B7" text-anchor="middle">App</text>

  <!-- Server 2 -->
  <rect x="234" y="100" width="52" height="44" rx="6" fill="#1E293B" stroke="#059669" stroke-width="1.5"/>
  <rect x="241" y="108" width="38" height="6" rx="2" fill="#065F46" opacity="0.8"/>
  <rect x="241" y="118" width="38" height="6" rx="2" fill="#065F46" opacity="0.6"/>
  <rect x="241" y="128" width="24" height="6" rx="2" fill="#065F46" opacity="0.4"/>
  <circle cx="274" cy="111" r="2.5" fill="#10B981"/>
  <circle cx="274" cy="121" r="2.5" fill="#10B981" opacity="0.7"/>
  <text x="260" y="155" font-family="Inter,sans-serif" font-size="8" fill="#6EE7B7" text-anchor="middle">App</text>

  <!-- Server 3 -->
  <rect x="234" y="130" width="52" height="44" rx="6" fill="#1E293B" stroke="#059669" stroke-width="1.5"/>
  <rect x="241" y="138" width="38" height="6" rx="2" fill="#065F46" opacity="0.8"/>
  <rect x="241" y="148" width="38" height="6" rx="2" fill="#065F46" opacity="0.6"/>
  <rect x="241" y="158" width="24" height="6" rx="2" fill="#065F46" opacity="0.4"/>
  <circle cx="274" cy="141" r="2.5" fill="#10B981"/>
  <circle cx="274" cy="151" r="2.5" fill="#10B981" opacity="0.7"/>
  <text x="260" y="185" font-family="Inter,sans-serif" font-size="8" fill="#6EE7B7" text-anchor="middle">App</text>

  <!-- Arrows Servers → Cache/DB -->
  <path d="M 288 90 L 324 100" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3,2"/>
  <path d="M 288 120 L 324 120" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3,2"/>
  <path d="M 288 150 L 324 140" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Redis Cache -->
  <rect x="326" y="78" width="58" height="48" rx="8" fill="#1E293B" stroke="#DC2626" stroke-width="1.5"/>
  <path d="M 348 96 L 355 88 L 362 96 L 362 106 L 355 110 L 348 106 Z" fill="none" stroke="#F87171" stroke-width="1.5"/>
  <path d="M 348 96 L 355 100 L 362 96" stroke="#F87171" stroke-width="1.5" fill="none"/>
  <path d="M 355 100 L 355 110" stroke="#F87171" stroke-width="1.5"/>
  <text x="355" y="138" font-family="Inter,sans-serif" font-size="8" fill="#FCA5A5" text-anchor="middle">Redis</text>
  <text x="355" y="148" font-family="Inter,sans-serif" font-size="8" fill="#FCA5A5" text-anchor="middle">Cache</text>

  <!-- Database -->
  <rect x="326" y="140" width="58" height="52" rx="8" fill="#1E293B" stroke="#D97706" stroke-width="1.5"/>
  <ellipse cx="355" cy="155" rx="18" ry="6" fill="none" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 337 155 L 337 175" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 373 155 L 373 175" stroke="#FCD34D" stroke-width="1.5"/>
  <ellipse cx="355" cy="175" rx="18" ry="6" fill="none" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 337 165 Q 355 170 373 165" stroke="#FCD34D" stroke-width="1" fill="none" opacity="0.5"/>
  <text x="355" y="203" font-family="Inter,sans-serif" font-size="8" fill="#FDE68A" text-anchor="middle">Database</text>

  <!-- CDN on top -->
  <rect x="20" y="18" width="440" height="42" rx="6" fill="#0F2A1E" stroke="#065F46" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>
  <circle cx="80" cy="39" r="12" fill="none" stroke="#10B981" stroke-width="1.5"/>
  <path d="M 68 39 Q 80 28 92 39 Q 80 50 68 39" stroke="#10B981" stroke-width="1" fill="none"/>
  <line x1="68" y1="39" x2="92" y2="39" stroke="#10B981" stroke-width="1"/>
  <line x1="80" y1="27" x2="80" y2="51" stroke="#10B981" stroke-width="1"/>
  <text x="113" y="35" font-family="Inter,sans-serif" font-size="9" fill="#6EE7B7" font-weight="600">CDN / Edge Network</text>
  <text x="113" y="48" font-family="Inter,sans-serif" font-size="8" fill="#34D399" opacity="0.7">Cache at edge • 50ms global • 99.99% uptime</text>
  <!-- CDN nodes -->
  <circle cx="320" cy="39" r="4" fill="#10B981" opacity="0.8"/>
  <circle cx="350" cy="29" r="3.5" fill="#10B981" opacity="0.6"/>
  <circle cx="380" cy="45" r="4" fill="#10B981" opacity="0.7"/>
  <circle cx="415" cy="32" r="3" fill="#10B981" opacity="0.5"/>
  <circle cx="445" cy="42" r="3.5" fill="#10B981" opacity="0.6"/>
  <line x1="320" y1="39" x2="350" y2="29" stroke="#10B981" stroke-width="0.8" opacity="0.5"/>
  <line x1="350" y1="29" x2="380" y2="45" stroke="#10B981" stroke-width="0.8" opacity="0.5"/>
  <line x1="380" y1="45" x2="415" y2="32" stroke="#10B981" stroke-width="0.8" opacity="0.5"/>
  <line x1="415" y1="32" x2="445" y2="42" stroke="#10B981" stroke-width="0.8" opacity="0.5"/>

  <!-- Queue -->
  <rect x="402" y="90" width="62" height="50" rx="8" fill="#1E293B" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="410" y="100" width="46" height="8" rx="3" fill="#4C1D95" opacity="0.8"/>
  <rect x="410" y="112" width="46" height="8" rx="3" fill="#4C1D95" opacity="0.6"/>
  <rect x="410" y="124" width="30" height="8" rx="3" fill="#4C1D95" opacity="0.4"/>
  <text x="433" y="152" font-family="Inter,sans-serif" font-size="8" fill="#C4B5FD" text-anchor="middle">Message</text>
  <text x="433" y="162" font-family="Inter,sans-serif" font-size="8" fill="#C4B5FD" text-anchor="middle">Queue</text>

  <!-- Arrow cache → queue -->
  <path d="M 386 100 L 400 110" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
</svg>
