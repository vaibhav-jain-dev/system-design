<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" font-family="Inter,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="700">Snowflake ID  —  64-bit Distributed ID Generator</text>

  <!-- ── Top: Bit layout ── -->
  <rect x="18" y="42" width="864" height="130" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="450" y="64" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">64-bit Bit Layout</text>

  <!-- Sign bit: 1 bit -->
  <rect x="30" y="74" width="36" height="48" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="48" y="92" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">sign</text>
  <text x="48" y="105" font-family="monospace" font-size="9" fill="#94A3B8" text-anchor="middle">0</text>
  <text x="48" y="118" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">1 bit</text>

  <!-- Timestamp: 41 bits -->
  <rect x="70" y="74" width="360" height="48" rx="4" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="250" y="92" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="700">Timestamp</text>
  <text x="250" y="108" font-family="monospace" font-size="9" fill="#1E40AF" text-anchor="middle">milliseconds since custom epoch</text>
  <text x="250" y="120" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">~69 years of IDs  ·  41 bits</text>

  <!-- Datacenter: 5 bits -->
  <rect x="434" y="74" width="100" height="48" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="484" y="92" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle" font-weight="700">DC ID</text>
  <text x="484" y="106" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">0-31 DCs</text>
  <text x="484" y="118" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">5 bits</text>

  <!-- Worker: 5 bits -->
  <rect x="538" y="74" width="100" height="48" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="588" y="92" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" text-anchor="middle" font-weight="700">Worker</text>
  <text x="588" y="106" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">0-31 nodes</text>
  <text x="588" y="118" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">5 bits</text>

  <!-- Sequence: 12 bits -->
  <rect x="642" y="74" width="220" height="48" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="752" y="92" font-family="Inter,sans-serif" font-size="11" fill="#92400E" text-anchor="middle" font-weight="700">Sequence</text>
  <text x="752" y="108" font-family="monospace" font-size="9" fill="#92400E" text-anchor="middle">0-4095 per ms per node</text>
  <text x="752" y="120" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">12 bits  =  4096/ms</text>

  <!-- Capacity calc -->
  <rect x="30" y="130" width="832" height="32" rx="4" fill="#F8FAFC"/>
  <text x="450" y="144" font-family="monospace" font-size="9" fill="#374151" text-anchor="middle">Max throughput: 32 DCs × 32 workers × 4096 seq =</text>
  <text x="690" y="144" font-family="monospace" font-size="9" fill="#059669" font-weight="700">4,194,304 IDs/ms</text>
  <text x="810" y="144" font-family="monospace" font-size="9" fill="#64748B">globally</text>

  <!-- ── Bottom Left: Properties ── -->
  <rect x="18" y="184" width="420" height="268" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="228" y="204" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Properties</text>

  <rect x="30" y="214" width="396" height="44" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="42" y="230" font-family="monospace" font-size="9" fill="#1D4ED8" font-weight="600">Monotonically Increasing</text>
  <text x="42" y="245" font-family="monospace" font-size="8.5" fill="#64748B">IDs sort by time · enables range scans in DB</text>

  <rect x="30" y="264" width="396" height="44" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="42" y="280" font-family="monospace" font-size="9" fill="#065F46" font-weight="600">No Coordination Needed</text>
  <text x="42" y="295" font-family="monospace" font-size="8.5" fill="#64748B">each node generates independently · no central lock</text>

  <rect x="30" y="314" width="396" height="44" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="42" y="330" font-family="monospace" font-size="9" fill="#6D28D9" font-weight="600">Globally Unique</text>
  <text x="42" y="345" font-family="monospace" font-size="8.5" fill="#64748B">DC + Worker + Seq + Timestamp → guaranteed unique</text>

  <rect x="30" y="364" width="396" height="44" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="42" y="380" font-family="monospace" font-size="9" fill="#92400E" font-weight="600">Clock Drift Problem</text>
  <text x="42" y="395" font-family="monospace" font-size="8.5" fill="#64748B">if system clock goes back → duplicate IDs · wait or use NTP</text>

  <rect x="30" y="414" width="396" height="28" rx="4" fill="#F1F5F9"/>
  <text x="228" y="432" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">64-bit integer · fits in SQL BIGINT · no UUID overhead</text>

  <!-- ── Bottom Right: Alternatives ── -->
  <rect x="450" y="184" width="432" height="268" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="666" y="204" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Alternatives Comparison</text>

  <rect x="462" y="214" width="408" height="46" rx="5" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="472" y="230" font-family="Inter,sans-serif" font-size="9" fill="#475569" font-weight="600">UUID v4  (random)</text>
  <text x="472" y="245" font-family="monospace" font-size="8" fill="#64748B">128-bit · globally unique · not sortable</text>
  <text x="472" y="257" font-family="monospace" font-size="8" fill="#DC2626">poor DB index performance (random inserts)</text>

  <rect x="462" y="266" width="408" height="46" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="472" y="282" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" font-weight="600">Auto-Increment (DB)</text>
  <text x="472" y="297" font-family="monospace" font-size="8" fill="#64748B">simple · sortable · single point of failure</text>
  <text x="472" y="309" font-family="monospace" font-size="8" fill="#D97706">centralized → doesn't scale to multi-DB</text>

  <rect x="462" y="318" width="408" height="46" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="472" y="334" font-family="Inter,sans-serif" font-size="9" fill="#065F46" font-weight="600">Snowflake  ← recommended</text>
  <text x="472" y="349" font-family="monospace" font-size="8" fill="#64748B">64-bit · sortable · decentralized · high throughput</text>
  <text x="472" y="361" font-family="monospace" font-size="8" fill="#059669">used by Twitter, Discord, Instagram</text>

  <rect x="462" y="370" width="408" height="46" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="472" y="386" font-family="Inter,sans-serif" font-size="9" fill="#92400E" font-weight="600">ULID / KSUID</text>
  <text x="472" y="401" font-family="monospace" font-size="8" fill="#64748B">URL-safe, base32, time-sortable, 128-bit</text>
  <text x="472" y="413" font-family="monospace" font-size="8" fill="#64748B">good alternative when string IDs preferred</text>

  <rect x="462" y="422" width="408" height="22" rx="4" fill="#F8FAFC"/>
  <text x="666" y="437" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">Instagram: timestamp(ms) + shard_id + seq · 64-bit BIGINT</text>
</svg>
