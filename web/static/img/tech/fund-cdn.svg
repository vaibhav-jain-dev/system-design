<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- ── Left panel ── -->
  <rect x="18" y="18" width="280" height="424" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <circle cx="158" cy="106" r="56" fill="#ECFDF5" stroke="#059669" stroke-width="2.5"/>
  <ellipse cx="158" cy="106" rx="22" ry="56" fill="none" stroke="#059669" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="158" cy="106" rx="56" ry="22" fill="none" stroke="#059669" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="158" cy="106" rx="44" ry="56" fill="none" stroke="#059669" stroke-width="0.8" opacity="0.3"/>
  <line x1="102" y1="106" x2="214" y2="106" stroke="#059669" stroke-width="1" opacity="0.4"/>
  <line x1="158" y1="50" x2="158" y2="162" stroke="#059669" stroke-width="1" opacity="0.4"/>
  <text x="158" y="113" font-family="Inter,sans-serif" font-size="22" fill="#065F46" text-anchor="middle" font-weight="700">CDN</text>
  <text x="228" y="74" font-family="Inter,sans-serif" font-size="11" fill="#065F46" font-weight="700">200+ PoPs</text>
  <text x="228" y="90" font-family="Inter,sans-serif" font-size="10" fill="#64748B">globally</text>
  <text x="228" y="112" font-family="Inter,sans-serif" font-size="11" fill="#059669" font-weight="700">~12ms</text>
  <text x="228" y="128" font-family="Inter,sans-serif" font-size="10" fill="#64748B">avg latency</text>

  <rect x="30" y="176" width="256" height="48" rx="6" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="1"/>
  <text x="50" y="196" font-family="Inter,sans-serif" font-size="11" fill="#065F46" font-weight="600">Edge Caching</text>
  <text x="50" y="212" font-family="monospace" font-size="9" fill="#64748B">Cache-Control · stale-while-revalidate</text>

  <rect x="30" y="232" width="256" height="48" rx="6" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="1"/>
  <text x="50" y="252" font-family="Inter,sans-serif" font-size="11" fill="#065F46" font-weight="600">Origin Shield</text>
  <text x="50" y="268" font-family="monospace" font-size="9" fill="#64748B">collapse misses · single origin fetch</text>

  <rect x="30" y="288" width="256" height="48" rx="6" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="1"/>
  <text x="50" y="308" font-family="Inter,sans-serif" font-size="11" fill="#065F46" font-weight="600">Behaviors</text>
  <text x="50" y="324" font-family="monospace" font-size="9" fill="#64748B">path-based rules · signed URLs · WAF</text>

  <rect x="30" y="344" width="256" height="48" rx="6" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="1"/>
  <text x="50" y="364" font-family="Inter,sans-serif" font-size="11" fill="#065F46" font-weight="600">Invalidation</text>
  <text x="50" y="380" font-family="monospace" font-size="9" fill="#64748B">CloudFront ~15s · versioned URLs instant</text>

  <rect x="30" y="400" width="256" height="34" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="158" y="414" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">60%+ traffic absorbed before origin</text>
  <text x="158" y="428" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">saves cost · reduces origin load</text>

  <!-- ── Right: Request Flow ── -->
  <text x="320" y="30" font-family="Inter,sans-serif" font-size="13" fill="#374151" font-weight="600">Request Flow  ·  Cache Hit vs Miss</text>

  <!-- CACHE HIT section -->
  <text x="320" y="52" font-family="Inter,sans-serif" font-size="10" fill="#059669" font-weight="600">CACHE HIT</text>
  <line x1="318" y1="55" x2="882" y2="55" stroke="#059669" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- User HIT -->
  <rect x="318" y="62" width="112" height="74" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="374" cy="86" r="14" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="374" cy="82" r="5" fill="#94A3B8"/>
  <path d="M 360 97 Q 374 90 388 97" fill="#E2E8F0" stroke="none"/>
  <text x="374" y="124" font-family="Inter,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">User</text>

  <path d="M 432 99 L 454 99" stroke="#059669" stroke-width="1.5"/>
  <polygon points="451,95 459,99 451,103" fill="#059669"/>
  <text x="443" y="92" font-family="monospace" font-size="7" fill="#059669" text-anchor="middle">GET</text>

  <rect x="457" y="62" width="158" height="74" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="536" y="84" font-family="Inter,sans-serif" font-size="11" fill="#065F46" text-anchor="middle" font-weight="700">PoP Edge</text>
  <rect x="468" y="92" width="136" height="14" rx="3" fill="#D1FAE5"/>
  <text x="536" y="103" font-family="monospace" font-size="8" fill="#059669" text-anchor="middle">HIT · X-Cache: Hit</text>
  <text x="536" y="125" font-family="Inter,sans-serif" font-size="8" fill="#065F46" text-anchor="middle">served from edge memory</text>

  <path d="M 457 106 L 435 106" stroke="#059669" stroke-width="1.5"/>
  <polygon points="438,102 430,106 438,110" fill="#059669"/>
  <text x="443" y="120" font-family="monospace" font-size="7" fill="#059669" text-anchor="middle">200</text>

  <rect x="635" y="62" width="228" height="74" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="749" y="87" font-family="Inter,sans-serif" font-size="26" fill="#059669" text-anchor="middle" font-weight="700">&lt; 5ms</text>
  <text x="749" y="107" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle">cache hit latency</text>
  <text x="749" y="123" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">no origin request made</text>

  <!-- CACHE MISS section -->
  <text x="320" y="158" font-family="Inter,sans-serif" font-size="10" fill="#D97706" font-weight="600">CACHE MISS</text>
  <line x1="366" y1="161" x2="882" y2="161" stroke="#D97706" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- User MISS -->
  <rect x="318" y="168" width="112" height="74" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="374" cy="192" r="14" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="374" cy="188" r="5" fill="#94A3B8"/>
  <path d="M 360 203 Q 374 196 388 203" fill="#E2E8F0" stroke="none"/>
  <text x="374" y="230" font-family="Inter,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">User</text>

  <path d="M 432 205 L 454 205" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="451,201 459,205 451,209" fill="#D97706"/>

  <rect x="457" y="168" width="158" height="74" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="536" y="190" font-family="Inter,sans-serif" font-size="11" fill="#92400E" text-anchor="middle" font-weight="700">PoP Edge</text>
  <rect x="468" y="198" width="136" height="14" rx="3" fill="#FEF3C7"/>
  <text x="536" y="209" font-family="monospace" font-size="8" fill="#D97706" text-anchor="middle">MISS · X-Cache: Miss</text>
  <text x="536" y="231" font-family="Inter,sans-serif" font-size="8" fill="#92400E" text-anchor="middle">fetch origin → cache it</text>

  <path d="M 617 205 L 639 205" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="636,201 644,205 636,209" fill="#D97706"/>

  <rect x="642" y="168" width="222" height="74" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="753" y="190" font-family="Inter,sans-serif" font-size="11" fill="#92400E" text-anchor="middle" font-weight="700">Origin Server</text>
  <rect x="653" y="198" width="200" height="14" rx="3" fill="#FEF3C7"/>
  <text x="753" y="209" font-family="monospace" font-size="8" fill="#D97706" text-anchor="middle">Cache-Control: max-age=86400</text>
  <text x="753" y="231" font-family="Inter,sans-serif" font-size="8" fill="#92400E" text-anchor="middle">cached at PoP for next request</text>

  <!-- PoP regions + Cache-Control -->
  <text x="320" y="264" font-family="Inter,sans-serif" font-size="11" fill="#374151" font-weight="600">PoP Regions  +  Cache-Control Cheatsheet</text>

  <rect x="318" y="272" width="114" height="60" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.2"/>
  <text x="375" y="292" font-family="Inter,sans-serif" font-size="11" fill="#059669" text-anchor="middle" font-weight="700">Americas</text>
  <text x="375" y="308" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">us-east · us-west</text>
  <text x="375" y="322" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">sa-east</text>

  <rect x="440" y="272" width="114" height="60" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.2"/>
  <text x="497" y="292" font-family="Inter,sans-serif" font-size="11" fill="#059669" text-anchor="middle" font-weight="700">Europe</text>
  <text x="497" y="308" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">eu-west · eu-central</text>
  <text x="497" y="322" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">eu-north</text>

  <rect x="562" y="272" width="114" height="60" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.2"/>
  <text x="619" y="292" font-family="Inter,sans-serif" font-size="11" fill="#059669" text-anchor="middle" font-weight="700">APAC</text>
  <text x="619" y="308" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">ap-southeast</text>
  <text x="619" y="322" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">ap-northeast</text>

  <rect x="684" y="272" width="178" height="60" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.2"/>
  <text x="773" y="292" font-family="Inter,sans-serif" font-size="11" fill="#059669" text-anchor="middle" font-weight="700">Origin Shield</text>
  <text x="773" y="308" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">regional cache layer</text>
  <text x="773" y="322" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">collapses origin fetches</text>

  <!-- Cache-Control table -->
  <rect x="318" y="344" width="544" height="108" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="590" y="364" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Cache-Control Directives</text>
  <rect x="328" y="370" width="156" height="14" rx="2" fill="#F1F5F9"/>
  <text x="333" y="381" font-family="monospace" font-size="9" fill="#475569">Directive</text>
  <rect x="492" y="370" width="190" height="14" rx="2" fill="#F1F5F9"/>
  <text x="497" y="381" font-family="monospace" font-size="9" fill="#475569">Meaning</text>
  <rect x="690" y="370" width="160" height="14" rx="2" fill="#F1F5F9"/>
  <text x="695" y="381" font-family="monospace" font-size="9" fill="#475569">Use Case</text>
  <text x="333" y="400" font-family="monospace" font-size="8.5" fill="#1D4ED8">max-age=86400</text>
  <text x="497" y="400" font-family="monospace" font-size="8.5" fill="#64748B">cache 24 hours</text>
  <text x="695" y="400" font-family="monospace" font-size="8.5" fill="#94A3B8">static assets</text>
  <text x="333" y="416" font-family="monospace" font-size="8.5" fill="#1D4ED8">s-maxage=3600</text>
  <text x="497" y="416" font-family="monospace" font-size="8.5" fill="#64748B">CDN only, 1h</text>
  <text x="695" y="416" font-family="monospace" font-size="8.5" fill="#94A3B8">API responses</text>
  <text x="333" y="432" font-family="monospace" font-size="8.5" fill="#1D4ED8">no-cache</text>
  <text x="497" y="432" font-family="monospace" font-size="8.5" fill="#64748B">validate before use</text>
  <text x="695" y="432" font-family="monospace" font-size="8.5" fill="#94A3B8">dynamic HTML</text>
  <text x="333" y="448" font-family="monospace" font-size="8.5" fill="#1D4ED8">stale-while-revalidate</text>
  <text x="497" y="448" font-family="monospace" font-size="8.5" fill="#64748B">serve stale, refresh bg</text>
  <text x="695" y="448" font-family="monospace" font-size="8.5" fill="#94A3B8">news feeds</text>
</svg>
