<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <defs>
    <linearGradient id="bg-cdn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#051A0F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" fill="url(#bg-cdn)" rx="12"/>

  <!-- ── Left: CDN logo + key stats ── -->
  <rect x="18" y="18" width="280" height="424" rx="8" fill="#1E293B" stroke="#059669" stroke-width="1.5"/>

  <!-- Globe logo (large) -->
  <circle cx="158" cy="106" r="56" fill="#0A1A0F" stroke="#059669" stroke-width="2.5"/>
  <ellipse cx="158" cy="106" rx="22" ry="56" fill="none" stroke="#059669" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="158" cy="106" rx="56" ry="22" fill="none" stroke="#059669" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="158" cy="106" rx="44" ry="56" fill="none" stroke="#059669" stroke-width="0.8" opacity="0.3"/>
  <line x1="102" y1="106" x2="214" y2="106" stroke="#059669" stroke-width="1" opacity="0.4"/>
  <line x1="158" y1="50" x2="158" y2="162" stroke="#059669" stroke-width="1" opacity="0.4"/>
  <text x="158" y="113" font-family="Inter,sans-serif" font-size="22" fill="#34D399" text-anchor="middle" font-weight="700">CDN</text>

  <!-- Sub-text -->
  <text x="232" y="70" font-family="Inter,sans-serif" font-size="11" fill="#6EE7B7" font-weight="700">200+ PoPs</text>
  <text x="232" y="86" font-family="Inter,sans-serif" font-size="10" fill="#475569">globally</text>
  <text x="232" y="108" font-family="Inter,sans-serif" font-size="11" fill="#34D399" font-weight="700">~12ms</text>
  <text x="232" y="124" font-family="Inter,sans-serif" font-size="10" fill="#475569">avg latency</text>

  <!-- Key stats -->
  <rect x="30" y="176" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="196" font-family="Inter,sans-serif" font-size="11" fill="#6EE7B7" font-weight="600">Edge Caching</text>
  <text x="50" y="212" font-family="monospace" font-size="9" fill="#64748B">Cache-Control max-age · stale-while-revalidate</text>

  <rect x="30" y="236" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="256" font-family="Inter,sans-serif" font-size="11" fill="#6EE7B7" font-weight="600">Origin Shield</text>
  <text x="50" y="272" font-family="monospace" font-size="9" fill="#64748B">collapse misses · single origin fetch</text>

  <rect x="30" y="296" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="316" font-family="Inter,sans-serif" font-size="11" fill="#6EE7B7" font-weight="600">Behaviors</text>
  <text x="50" y="332" font-family="monospace" font-size="9" fill="#64748B">path-based rules · signed URLs · WAF</text>

  <rect x="30" y="356" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="376" font-family="Inter,sans-serif" font-size="11" fill="#6EE7B7" font-weight="600">Invalidation</text>
  <text x="50" y="392" font-family="monospace" font-size="9" fill="#64748B">CloudFront ~15s · versioned URLs instant</text>

  <rect x="30" y="416" width="256" height="18" rx="4" fill="#1E293B" stroke="#059669" stroke-width="0.5"/>
  <text x="158" y="429" font-family="Inter,sans-serif" font-size="9" fill="#6EE7B7" text-anchor="middle">60%+ traffic absorbed before origin</text>

  <!-- ── Right: Request Flow ── -->
  <text x="320" y="30" font-family="Inter,sans-serif" font-size="13" fill="#94A3B8" font-weight="600">Request Flow  ·  Cache Hit vs Miss</text>

  <!-- ── HIT path (top half) ── -->
  <text x="320" y="52" font-family="Inter,sans-serif" font-size="10" fill="#10B981" font-weight="600">CACHE HIT</text>
  <line x1="318" y1="55" x2="882" y2="55" stroke="#10B981" stroke-width="0.4" stroke-dasharray="4,3"/>

  <!-- User (HIT) -->
  <rect x="318" y="62" width="120" height="74" rx="6" fill="#1E293B" stroke="#475569" stroke-width="1"/>
  <circle cx="378" cy="86" r="16" fill="#0F172A" stroke="#64748B" stroke-width="1.2"/>
  <circle cx="378" cy="82" r="5" fill="#64748B"/>
  <path d="M 362 99 Q 378 90 394 99" fill="#334155" stroke="none"/>
  <text x="378" y="124" font-family="Inter,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">User</text>

  <!-- Arrow: User → PoP -->
  <path d="M 440 99 L 462 99" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="459,95 467,99 459,103" fill="#10B981"/>
  <text x="451" y="92" font-family="monospace" font-size="7" fill="#10B981" text-anchor="middle">GET</text>

  <!-- PoP Edge (HIT) -->
  <rect x="465" y="62" width="160" height="74" rx="6" fill="#1E293B" stroke="#059669" stroke-width="1.5"/>
  <text x="545" y="84" font-family="Inter,sans-serif" font-size="11" fill="#6EE7B7" text-anchor="middle" font-weight="700">PoP  Edge</text>
  <rect x="478" y="92" width="134" height="14" rx="3" fill="#0F2A1E"/>
  <text x="545" y="103" font-family="monospace" font-size="8" fill="#34D399" text-anchor="middle">HIT · X-Cache: Hit from cf</text>
  <text x="545" y="126" font-family="Inter,sans-serif" font-size="9" fill="#059669" text-anchor="middle">served from edge memory</text>

  <!-- Arrow: PoP → User (response) -->
  <path d="M 465 112 L 440 112" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="443,108 435,112 443,116" fill="#10B981"/>
  <text x="451" y="126" font-family="monospace" font-size="7" fill="#10B981" text-anchor="middle">200</text>

  <!-- HIT latency badge -->
  <rect x="643" y="62" width="220" height="74" rx="6" fill="#0F2A1E" stroke="#10B981" stroke-width="1.2"/>
  <text x="753" y="86" font-family="Inter,sans-serif" font-size="24" fill="#10B981" text-anchor="middle" font-weight="700">&lt; 5ms</text>
  <text x="753" y="106" font-family="Inter,sans-serif" font-size="10" fill="#6EE7B7" text-anchor="middle">cache hit latency</text>
  <text x="753" y="122" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">no origin request made</text>

  <!-- ── MISS path (middle) ── -->
  <text x="320" y="158" font-family="Inter,sans-serif" font-size="10" fill="#D97706" font-weight="600">CACHE MISS</text>
  <line x1="366" y1="161" x2="882" y2="161" stroke="#D97706" stroke-width="0.4" stroke-dasharray="4,3"/>

  <!-- User (MISS) -->
  <rect x="318" y="168" width="120" height="74" rx="6" fill="#1E293B" stroke="#475569" stroke-width="1"/>
  <circle cx="378" cy="192" r="16" fill="#0F172A" stroke="#64748B" stroke-width="1.2"/>
  <circle cx="378" cy="188" r="5" fill="#64748B"/>
  <path d="M 362 205 Q 378 196 394 205" fill="#334155" stroke="none"/>
  <text x="378" y="230" font-family="Inter,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">User</text>

  <!-- Arrow: User → PoP (miss) -->
  <path d="M 440 205 L 462 205" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="459,201 467,205 459,209" fill="#D97706"/>

  <!-- PoP Edge (MISS) -->
  <rect x="465" y="168" width="160" height="74" rx="6" fill="#1E293B" stroke="#D97706" stroke-width="1.5"/>
  <text x="545" y="190" font-family="Inter,sans-serif" font-size="11" fill="#FCD34D" text-anchor="middle" font-weight="700">PoP  Edge</text>
  <rect x="478" y="198" width="134" height="14" rx="3" fill="#2A1A0F"/>
  <text x="545" y="209" font-family="monospace" font-size="8" fill="#F59E0B" text-anchor="middle">MISS · X-Cache: Miss</text>
  <text x="545" y="232" font-family="Inter,sans-serif" font-size="9" fill="#D97706" text-anchor="middle">fetch from origin → cache</text>

  <!-- Arrow: PoP → Origin -->
  <path d="M 627 205 L 649 205" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="646,201 654,205 646,209" fill="#D97706"/>
  <text x="638" y="198" font-family="monospace" font-size="7" fill="#D97706" text-anchor="middle">fetch</text>

  <!-- Origin Server -->
  <rect x="652" y="168" width="210" height="74" rx="6" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="757" y="190" font-family="Inter,sans-serif" font-size="11" fill="#FDE68A" text-anchor="middle" font-weight="700">Origin Server</text>
  <rect x="665" y="198" width="184" height="14" rx="3" fill="#1C1917"/>
  <text x="757" y="209" font-family="monospace" font-size="8" fill="#FCD34D" text-anchor="middle">Cache-Control: max-age=86400</text>
  <text x="757" y="232" font-family="Inter,sans-serif" font-size="9" fill="#D97706" text-anchor="middle">response cached at PoP for next req</text>

  <!-- ── Bottom: PoP Map + TTL table ── -->
  <text x="320" y="264" font-family="Inter,sans-serif" font-size="13" fill="#94A3B8" font-weight="600">PoP Regions  +  Cache-Control Cheatsheet</text>

  <!-- PoP region cards -->
  <rect x="318" y="274" width="116" height="62" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1.2"/>
  <text x="376" y="294" font-family="Inter,sans-serif" font-size="12" fill="#34D399" text-anchor="middle" font-weight="700">Americas</text>
  <text x="376" y="312" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">us-east · us-west</text>
  <text x="376" y="326" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">sa-east</text>

  <rect x="442" y="274" width="116" height="62" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1.2"/>
  <text x="500" y="294" font-family="Inter,sans-serif" font-size="12" fill="#34D399" text-anchor="middle" font-weight="700">Europe</text>
  <text x="500" y="312" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">eu-west · eu-central</text>
  <text x="500" y="326" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">eu-north</text>

  <rect x="566" y="274" width="116" height="62" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1.2"/>
  <text x="624" y="294" font-family="Inter,sans-serif" font-size="12" fill="#34D399" text-anchor="middle" font-weight="700">APAC</text>
  <text x="624" y="312" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">ap-southeast</text>
  <text x="624" y="326" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">ap-northeast</text>

  <rect x="690" y="274" width="172" height="62" rx="6" fill="#1E293B" stroke="#059669" stroke-width="1.2"/>
  <text x="776" y="294" font-family="Inter,sans-serif" font-size="12" fill="#6EE7B7" text-anchor="middle" font-weight="700">Origin Shield</text>
  <text x="776" y="312" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">regional cache layer</text>
  <text x="776" y="326" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">collapses origin fetches</text>

  <!-- Cache-Control cheatsheet -->
  <rect x="318" y="348" width="544" height="108" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="590" y="368" font-family="Inter,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" font-weight="600">Cache-Control Directives</text>

  <!-- Headers -->
  <rect x="328" y="374" width="160" height="14" rx="2" fill="#0F172A"/>
  <text x="333" y="385" font-family="monospace" font-size="9" fill="#6EE7B7">Directive</text>
  <rect x="496" y="374" width="192" height="14" rx="2" fill="#0F172A"/>
  <text x="501" y="385" font-family="monospace" font-size="9" fill="#6EE7B7">Meaning</text>
  <rect x="696" y="374" width="156" height="14" rx="2" fill="#0F172A"/>
  <text x="701" y="385" font-family="monospace" font-size="9" fill="#6EE7B7">Use Case</text>

  <text x="333" y="401" font-family="monospace" font-size="8.5" fill="#FCD34D">max-age=86400</text>
  <text x="501" y="401" font-family="monospace" font-size="8.5" fill="#94A3B8">cache 24 hours</text>
  <text x="701" y="401" font-family="monospace" font-size="8.5" fill="#64748B">static assets</text>

  <text x="333" y="416" font-family="monospace" font-size="8.5" fill="#FCD34D">s-maxage=3600</text>
  <text x="501" y="416" font-family="monospace" font-size="8.5" fill="#94A3B8">CDN only, 1h</text>
  <text x="701" y="416" font-family="monospace" font-size="8.5" fill="#64748B">API responses</text>

  <text x="333" y="431" font-family="monospace" font-size="8.5" fill="#FCD34D">no-cache</text>
  <text x="501" y="431" font-family="monospace" font-size="8.5" fill="#94A3B8">validate before use</text>
  <text x="701" y="431" font-family="monospace" font-size="8.5" fill="#64748B">dynamic HTML</text>

  <text x="333" y="446" font-family="monospace" font-size="8.5" fill="#FCD34D">stale-while-revalidate</text>
  <text x="501" y="446" font-family="monospace" font-size="8.5" fill="#94A3B8">serve stale, refresh bg</text>
  <text x="701" y="446" font-family="monospace" font-size="8.5" fill="#64748B">news feeds</text>
</svg>
