<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 140" fill="none">
  <defs>
    <linearGradient id="bg-cdn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1A0F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="240" height="140" fill="url(#bg-cdn)" rx="10"/>

  <!-- Globe (center) -->
  <circle cx="120" cy="62" r="36" fill="#1E293B" stroke="#059669" stroke-width="1.5"/>
  <ellipse cx="120" cy="62" rx="14" ry="36" fill="none" stroke="#059669" stroke-width="1" opacity="0.5"/>
  <ellipse cx="120" cy="62" rx="36" ry="14" fill="none" stroke="#059669" stroke-width="1" opacity="0.5"/>
  <ellipse cx="120" cy="62" rx="28" ry="36" fill="none" stroke="#059669" stroke-width="0.7" opacity="0.3"/>
  <line x1="84" y1="62" x2="156" y2="62" stroke="#059669" stroke-width="1" opacity="0.4"/>
  <line x1="120" y1="26" x2="120" y2="98" stroke="#059669" stroke-width="1" opacity="0.4"/>
  <text x="120" y="67" font-family="Inter,sans-serif" font-size="11" fill="#34D399" text-anchor="middle" font-weight="700">CDN</text>

  <!-- Edge nodes around globe -->
  <!-- Top-left (US) -->
  <circle cx="48" cy="28" r="12" fill="#1E293B" stroke="#10B981" stroke-width="1.5"/>
  <text x="48" y="32" font-family="Inter,sans-serif" font-size="7" fill="#6EE7B7" text-anchor="middle">US</text>
  <line x1="84" y1="45" x2="60" y2="36" stroke="#10B981" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Top-right (EU) -->
  <circle cx="192" cy="28" r="12" fill="#1E293B" stroke="#10B981" stroke-width="1.5"/>
  <text x="192" y="32" font-family="Inter,sans-serif" font-size="7" fill="#6EE7B7" text-anchor="middle">EU</text>
  <line x1="156" y1="45" x2="180" y2="36" stroke="#10B981" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Bottom-right (APAC) -->
  <circle cx="205" cy="102" r="12" fill="#1E293B" stroke="#10B981" stroke-width="1.5"/>
  <text x="205" y="106" font-family="Inter,sans-serif" font-size="7" fill="#6EE7B7" text-anchor="middle">APAC</text>
  <line x1="154" y1="78" x2="193" y2="94" stroke="#10B981" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Bottom-left (SA) -->
  <circle cx="35" cy="102" r="12" fill="#1E293B" stroke="#10B981" stroke-width="1.5"/>
  <text x="35" y="106" font-family="Inter,sans-serif" font-size="7" fill="#6EE7B7" text-anchor="middle">SA</text>
  <line x1="86" y1="78" x2="47" y2="94" stroke="#10B981" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Latency indicators -->
  <text x="120" y="118" font-family="Inter,sans-serif" font-size="7.5" fill="#059669" text-anchor="middle">~12ms latency from any location</text>

  <!-- Origin server (top) -->
  <rect x="100" y="8" width="40" height="14" rx="4" fill="#1E293B" stroke="#D97706" stroke-width="1"/>
  <text x="120" y="19" font-family="Inter,sans-serif" font-size="7" fill="#FCD34D" text-anchor="middle">Origin</text>
</svg>
