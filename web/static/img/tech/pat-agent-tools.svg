<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" font-family="Inter,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="700">Agent Tools (Tool Use)  —  Cheat Sheet</text>

  <!-- ── Top: ReAct loop ── -->
  <rect x="18" y="42" width="864" height="180" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="450" y="62" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">ReAct Loop  (Reason → Act → Observe)</text>

  <!-- User task -->
  <rect x="30" y="74" width="120" height="130" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1.5"/>
  <text x="90" y="94" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle" font-weight="600">User Task</text>
  <text x="90" y="112" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">"Book flight to</text>
  <text x="90" y="126" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">NYC next week,</text>
  <text x="90" y="140" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">cheapest option"</text>
  <text x="90" y="160" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">natural language</text>
  <text x="90" y="174" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">goal</text>

  <path d="M 152 139 L 174 139" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="171,135 179,139 171,143" fill="#3B82F6"/>

  <!-- LLM Think -->
  <rect x="176" y="74" width="150" height="130" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="251" y="94" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" text-anchor="middle" font-weight="600">LLM Reasons</text>
  <text x="251" y="112" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">THOUGHT:</text>
  <text x="251" y="126" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">"I need to search</text>
  <text x="251" y="140" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">for flights first"</text>
  <text x="251" y="158" font-family="monospace" font-size="7.5" fill="#7C3AED" text-anchor="middle">ACTION:</text>
  <text x="251" y="172" font-family="monospace" font-size="8" fill="#7C3AED" text-anchor="middle">search_flights()</text>
  <text x="251" y="186" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">structured JSON call</text>

  <path d="M 328 139 L 350 139" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="347,135 355,139 347,143" fill="#7C3AED"/>

  <!-- Tool Execution -->
  <rect x="352" y="74" width="150" height="130" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="427" y="94" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">Tool Runs</text>
  <text x="427" y="112" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">search_flights(</text>
  <text x="427" y="126" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">  from="LAX",</text>
  <text x="427" y="140" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">  to="JFK",</text>
  <text x="427" y="154" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">  date="next Mon"</text>
  <text x="427" y="168" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">)</text>
  <text x="427" y="188" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">external API call</text>

  <path d="M 504 139 L 526 139" stroke="#059669" stroke-width="2"/>
  <polygon points="523,135 531,139 523,143" fill="#059669"/>

  <!-- Observation -->
  <rect x="528" y="74" width="150" height="130" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="603" y="94" font-family="Inter,sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="600">Observation</text>
  <text x="603" y="112" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">RESULT:</text>
  <text x="603" y="126" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">AA123 $289</text>
  <text x="603" y="140" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">DL456 $342</text>
  <text x="603" y="154" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">UA789 $271</text>
  <text x="603" y="170" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">added to context</text>
  <text x="603" y="184" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">loop continues...</text>

  <path d="M 680 139 L 702 139" stroke="#D97706" stroke-width="2"/>
  <polygon points="699,135 707,139 699,143" fill="#D97706"/>

  <!-- Final Answer -->
  <rect x="704" y="74" width="160" height="130" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="784" y="94" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">Final Answer</text>
  <text x="784" y="112" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">"UA789 is cheapest</text>
  <text x="784" y="126" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">at $271. Here is</text>
  <text x="784" y="140" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">the booking link:"</text>
  <text x="784" y="160" font-family="monospace" font-size="8" fill="#059669" text-anchor="middle">booking confirmed</text>
  <text x="784" y="176" font-family="monospace" font-size="8" fill="#059669" text-anchor="middle">✓ task complete</text>

  <!-- ── Bottom Left: Tool types ── -->
  <rect x="18" y="234" width="420" height="218" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="228" y="254" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Common Tool Types</text>

  <rect x="30" y="264" width="192" height="40" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="42" y="280" font-family="monospace" font-size="9" fill="#1D4ED8" font-weight="600">Search / Read</text>
  <text x="42" y="296" font-family="monospace" font-size="8" fill="#64748B">web_search, read_file, query_db</text>

  <rect x="228" y="264" width="198" height="40" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="240" y="280" font-family="monospace" font-size="9" fill="#065F46" font-weight="600">Write / Execute</text>
  <text x="240" y="296" font-family="monospace" font-size="8" fill="#64748B">write_file, run_code, create_issue</text>

  <rect x="30" y="310" width="192" height="40" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="42" y="326" font-family="monospace" font-size="9" fill="#6D28D9" font-weight="600">API Calls</text>
  <text x="42" y="342" font-family="monospace" font-size="8" fill="#64748B">send_email, book_flight, payment</text>

  <rect x="228" y="310" width="198" height="40" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="240" y="326" font-family="monospace" font-size="9" fill="#92400E" font-weight="600">Sub-Agents</text>
  <text x="240" y="342" font-family="monospace" font-size="8" fill="#64748B">spawn specialist · multi-agent</text>

  <rect x="30" y="356" width="396" height="38" rx="5" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="228" y="372" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Tools defined as JSON schema → LLM decides when to call</text>
  <text x="228" y="386" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">parallel tool calls: multiple actions per turn</text>

  <rect x="30" y="400" width="396" height="44" rx="5" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="1"/>
  <text x="228" y="416" font-family="monospace" font-size="8.5" fill="#065F46" text-anchor="middle">Safety: confirm destructive tools · max iterations</text>
  <text x="228" y="431" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">sandbox code execution · human-in-the-loop for risky ops</text>

  <!-- ── Bottom Right: Key Design Points ── -->
  <rect x="450" y="234" width="432" height="218" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="666" y="254" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Design Patterns  +  Key Points</text>

  <rect x="462" y="264" width="408" height="40" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="472" y="280" font-family="monospace" font-size="9" fill="#6D28D9" font-weight="600">ReAct  (Reason + Act)</text>
  <text x="472" y="295" font-family="monospace" font-size="8.5" fill="#64748B">interleave thinking and acting · chain of thought</text>

  <rect x="462" y="310" width="408" height="40" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="472" y="326" font-family="monospace" font-size="9" fill="#1D4ED8" font-weight="600">Tool Schema (JSON)</text>
  <text x="472" y="341" font-family="monospace" font-size="8.5" fill="#64748B">name, description, parameters → typed inputs</text>

  <rect x="462" y="356" width="408" height="40" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="472" y="372" font-family="monospace" font-size="9" fill="#065F46" font-weight="600">Agentic Loop</text>
  <text x="472" y="387" font-family="monospace" font-size="8.5" fill="#64748B">max_iterations: prevent infinite loops · circuit breaker</text>

  <rect x="462" y="402" width="408" height="42" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="472" y="418" font-family="monospace" font-size="9" fill="#92400E" font-weight="600">Failure Handling</text>
  <text x="472" y="433" font-family="monospace" font-size="8.5" fill="#64748B">tool timeout → retry or fallback · error in observation</text>
</svg>
