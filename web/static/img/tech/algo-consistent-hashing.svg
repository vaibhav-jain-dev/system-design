<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" font-family="Inter,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="700">Consistent Hashing  —  Cheat Sheet</text>

  <!-- ── Left: Hash Ring ── -->
  <rect x="18" y="42" width="400" height="400" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="218" y="64" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Hash Ring  (0 → 2^32)</text>

  <!-- Ring circle -->
  <circle cx="218" cy="240" r="140" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="218" cy="240" r="135" fill="none" stroke="#E2E8F0" stroke-width="0.8"/>

  <!-- Node A at top ~12 o'clock -->
  <circle cx="218" cy="104" r="20" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="218" y="109" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="700">A</text>
  <!-- Node B at ~4 o'clock -->
  <circle cx="339" cy="310" r="20" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="339" y="315" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">B</text>
  <!-- Node C at ~8 o'clock -->
  <circle cx="97" cy="310" r="20" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="97" y="315" font-family="Inter,sans-serif" font-size="10" fill="#6D28D9" text-anchor="middle" font-weight="700">C</text>

  <!-- Key dots on ring -->
  <!-- k1 between A and B (right side, ~2 o'clock) -->
  <circle cx="332" cy="162" r="7" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="347" y="159" font-family="monospace" font-size="8" fill="#92400E">k1</text>
  <!-- k2 between B and C (bottom) -->
  <circle cx="218" cy="378" r="7" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="230" y="382" font-family="monospace" font-size="8" fill="#92400E">k2</text>
  <!-- k3 between C and A (left side) -->
  <circle cx="104" cy="162" r="7" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="62" y="159" font-family="monospace" font-size="8" fill="#92400E">k3</text>

  <!-- Arrow labels showing ownership -->
  <text x="218" y="240" font-family="Inter,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">k1 → Node B</text>
  <text x="218" y="255" font-family="Inter,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">k2 → Node C</text>
  <text x="218" y="270" font-family="Inter,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">k3 → Node A</text>
  <text x="218" y="290" font-family="monospace" font-size="8" fill="#CBD5E1" text-anchor="middle">clockwise lookup</text>

  <!-- Virtual nodes note -->
  <rect x="30" y="398" width="376" height="32" rx="5" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="218" y="412" font-family="monospace" font-size="8.5" fill="#1D4ED8" text-anchor="middle">Virtual nodes: each physical node gets N positions</text>
  <text x="218" y="425" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">on the ring → better load distribution</text>

  <!-- ── Right: Comparison table + Key Points ── -->
  <rect x="430" y="42" width="452" height="400" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="656" y="64" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Modulo vs Consistent Hashing</text>

  <!-- Comparison -->
  <rect x="442" y="74" width="428" height="22" rx="3" fill="#F1F5F9"/>
  <text x="542" y="89" font-family="monospace" font-size="9" fill="#475569" font-weight="600" text-anchor="middle">Modulo Hashing</text>
  <text x="762" y="89" font-family="monospace" font-size="9" fill="#475569" font-weight="600" text-anchor="middle">Consistent Hashing</text>
  <line x1="652" y1="74" x2="652" y2="96" stroke="#E2E8F0" stroke-width="1"/>

  <rect x="442" y="97" width="428" height="36" rx="2" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="442" y="110" font-family="monospace" font-size="8" fill="#475569">  Formula:</text>
  <text x="442" y="124" font-family="monospace" font-size="8" fill="#DC2626">  key % N (N=server count)</text>
  <line x1="652" y1="97" x2="652" y2="133" stroke="#E2E8F0" stroke-width="1"/>
  <text x="662" y="110" font-family="monospace" font-size="8" fill="#475569">  Formula:</text>
  <text x="662" y="124" font-family="monospace" font-size="8" fill="#059669">  hash(key) → clockwise node</text>

  <rect x="442" y="134" width="428" height="36" rx="2" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="442" y="147" font-family="monospace" font-size="8" fill="#475569">  Add node (N→N+1):</text>
  <text x="442" y="161" font-family="monospace" font-size="8" fill="#DC2626">  ~99% keys remap ✗</text>
  <line x1="652" y1="134" x2="652" y2="170" stroke="#E2E8F0" stroke-width="1"/>
  <text x="662" y="147" font-family="monospace" font-size="8" fill="#475569">  Add node:</text>
  <text x="662" y="161" font-family="monospace" font-size="8" fill="#059669">  only 1/N keys remap ✓</text>

  <rect x="442" y="171" width="428" height="36" rx="2" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="0.5"/>
  <text x="442" y="184" font-family="monospace" font-size="8" fill="#475569">  Remove node:</text>
  <text x="442" y="198" font-family="monospace" font-size="8" fill="#DC2626">  rehash everything ✗</text>
  <line x1="652" y1="171" x2="652" y2="207" stroke="#E2E8F0" stroke-width="1"/>
  <text x="662" y="184" font-family="monospace" font-size="8" fill="#475569">  Remove node:</text>
  <text x="662" y="198" font-family="monospace" font-size="8" fill="#059669">  only successor takes over ✓</text>

  <rect x="442" y="208" width="428" height="36" rx="2" fill="#F8FAFC"/>
  <text x="442" y="221" font-family="monospace" font-size="8" fill="#475569">  Load balance:</text>
  <text x="442" y="235" font-family="monospace" font-size="8" fill="#D97706">  perfect (equal split)</text>
  <line x1="652" y1="208" x2="652" y2="244" stroke="#E2E8F0" stroke-width="1"/>
  <text x="662" y="221" font-family="monospace" font-size="8" fill="#475569">  Load balance:</text>
  <text x="662" y="235" font-family="monospace" font-size="8" fill="#D97706">  uneven; fix with virtual nodes</text>

  <!-- Key Points -->
  <text x="656" y="270" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Key Points</text>

  <rect x="442" y="278" width="428" height="38" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="452" y="293" font-family="monospace" font-size="8.5" fill="#1D4ED8" font-weight="600">Virtual Nodes (vnodes):</text>
  <text x="452" y="308" font-family="monospace" font-size="8.5" fill="#64748B">Each server appears N times on ring → smoother distribution</text>

  <rect x="442" y="322" width="428" height="38" rx="5" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="452" y="337" font-family="monospace" font-size="8.5" fill="#6D28D9" font-weight="600">Data Migration:</text>
  <text x="452" y="352" font-family="monospace" font-size="8.5" fill="#64748B">Only keys between old and new node position migrate</text>

  <rect x="442" y="366" width="428" height="38" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="452" y="381" font-family="monospace" font-size="8.5" fill="#065F46" font-weight="600">Used in:</text>
  <text x="452" y="396" font-family="monospace" font-size="8.5" fill="#64748B">DynamoDB, Cassandra, Redis Cluster, Chord DHT</text>

  <rect x="442" y="410" width="428" height="24" rx="4" fill="#F1F5F9"/>
  <text x="656" y="425" font-family="monospace" font-size="8.5" fill="#475569" text-anchor="middle">O(log N) lookup with sorted ring · O(1) with hash table</text>
</svg>
