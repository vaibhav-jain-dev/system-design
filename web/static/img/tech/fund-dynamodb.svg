<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <defs>
    <linearGradient id="bg-ddb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091525"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" fill="url(#bg-ddb)" rx="12"/>

  <!-- ── Left: DynamoDB logo + key stats ── -->
  <rect x="18" y="18" width="280" height="424" rx="8" fill="#1E293B" stroke="#2563EB" stroke-width="1.5"/>

  <!-- DynamoDB cylinder icon (large) -->
  <ellipse cx="158" cy="74" rx="52" ry="18" fill="#1A3A5C" stroke="#2563EB" stroke-width="2"/>
  <path d="M 106 74 L 106 128" stroke="#2563EB" stroke-width="2"/>
  <path d="M 210 74 L 210 128" stroke="#2563EB" stroke-width="2"/>
  <ellipse cx="158" cy="128" rx="52" ry="18" fill="#1A3A5C" stroke="#2563EB" stroke-width="2"/>
  <path d="M 106 100 Q 158 116 210 100" stroke="#2563EB" stroke-width="0.8" fill="none" opacity="0.5"/>
  <text x="158" y="106" font-family="monospace" font-size="18" fill="#60A5FA" text-anchor="middle" font-weight="700">DDB</text>

  <!-- Subtitle -->
  <text x="158" y="155" font-family="Inter,sans-serif" font-size="11" fill="#60A5FA" text-anchor="middle" font-weight="600">DynamoDB</text>
  <text x="158" y="170" font-family="Inter,sans-serif" font-size="10" fill="#475569" text-anchor="middle">Managed NoSQL · AWS</text>

  <!-- Key stats -->
  <rect x="30" y="184" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="204" font-family="Inter,sans-serif" font-size="11" fill="#93C5FD" font-weight="600">Single-Digit ms</text>
  <text x="50" y="220" font-family="monospace" font-size="9" fill="#64748B">read + write latency at any scale</text>

  <rect x="30" y="244" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="264" font-family="Inter,sans-serif" font-size="11" fill="#93C5FD" font-weight="600">Auto-Partitioning</text>
  <text x="50" y="280" font-family="monospace" font-size="9" fill="#64748B">hash(PK) → shard · no manual resharding</text>

  <rect x="30" y="304" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="324" font-family="Inter,sans-serif" font-size="11" fill="#93C5FD" font-weight="600">Capacity Modes</text>
  <text x="50" y="340" font-family="monospace" font-size="9" fill="#64748B">on-demand · provisioned + auto-scale</text>

  <rect x="30" y="364" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="384" font-family="Inter,sans-serif" font-size="11" fill="#93C5FD" font-weight="600">Global Tables</text>
  <text x="50" y="400" font-family="monospace" font-size="9" fill="#64748B">multi-region active-active replication</text>

  <rect x="30" y="424" width="256" height="10" rx="4" fill="#1A3A5C" stroke="#2563EB" stroke-width="0.5"/>
  <text x="158" y="433" font-family="Inter,sans-serif" font-size="8" fill="#60A5FA" text-anchor="middle">99.999% availability · 11 nines durability</text>

  <!-- ── Right: Table Structure + GSI + Partitioning ── -->
  <text x="320" y="30" font-family="Inter,sans-serif" font-size="13" fill="#94A3B8" font-weight="600">Data Model  ·  Access Patterns  ·  Partitioning</text>

  <!-- Table schema -->
  <text x="320" y="52" font-family="Inter,sans-serif" font-size="10" fill="#60A5FA" font-weight="600">Base Table</text>

  <!-- Table header -->
  <rect x="318" y="57" width="563" height="22" rx="3" fill="#1A3A5C" stroke="#2563EB" stroke-width="1.2"/>
  <text x="348" y="72" font-family="monospace" font-size="9" fill="#93C5FD" font-weight="700">PK  (user_id)</text>
  <rect x="420" y="61" width="22" height="13" rx="2" fill="#1D4ED8"/>
  <text x="431" y="72" font-family="monospace" font-size="8" fill="#BFDBFE" text-anchor="middle">PK</text>
  <line x1="490" y1="57" x2="490" y2="79" stroke="#2563EB" stroke-width="0.8" opacity="0.6"/>
  <text x="540" y="72" font-family="monospace" font-size="9" fill="#93C5FD" font-weight="700">SK  (timestamp)</text>
  <rect x="632" y="61" width="22" height="13" rx="2" fill="#4C1D95"/>
  <text x="643" y="72" font-family="monospace" font-size="8" fill="#DDD6FE" text-anchor="middle">SK</text>
  <line x1="678" y1="57" x2="678" y2="79" stroke="#2563EB" stroke-width="0.8" opacity="0.6"/>
  <text x="740" y="72" font-family="monospace" font-size="9" fill="#93C5FD" font-weight="700">data  (attrs)</text>

  <!-- Table rows -->
  <rect x="318" y="80" width="563" height="20" rx="2" fill="#1E293B"/>
  <text x="348" y="94" font-family="monospace" font-size="8.5" fill="#94A3B8">user#1001</text>
  <line x1="490" y1="80" x2="490" y2="100" stroke="#334155" stroke-width="0.8"/>
  <text x="510" y="94" font-family="monospace" font-size="8.5" fill="#94A3B8">2024-01-15T10:00Z</text>
  <line x1="678" y1="80" x2="678" y2="100" stroke="#334155" stroke-width="0.8"/>
  <text x="690" y="94" font-family="monospace" font-size="8.5" fill="#64748B">&#123; type:"order", amt:99 &#125;</text>

  <rect x="318" y="101" width="563" height="20" rx="2" fill="#172033"/>
  <text x="348" y="115" font-family="monospace" font-size="8.5" fill="#94A3B8">user#1001</text>
  <line x1="490" y1="101" x2="490" y2="121" stroke="#334155" stroke-width="0.8"/>
  <text x="510" y="115" font-family="monospace" font-size="8.5" fill="#94A3B8">2024-01-16T14:22Z</text>
  <line x1="678" y1="101" x2="678" y2="121" stroke="#334155" stroke-width="0.8"/>
  <text x="690" y="115" font-family="monospace" font-size="8.5" fill="#64748B">&#123; type:"order", amt:45 &#125;</text>

  <rect x="318" y="122" width="563" height="20" rx="2" fill="#1E293B"/>
  <text x="348" y="136" font-family="monospace" font-size="8.5" fill="#7C3AED">user#2042</text>
  <line x1="490" y1="122" x2="490" y2="142" stroke="#334155" stroke-width="0.8"/>
  <text x="510" y="136" font-family="monospace" font-size="8.5" fill="#94A3B8">2024-01-10T09:11Z</text>
  <line x1="678" y1="122" x2="678" y2="142" stroke="#334155" stroke-width="0.8"/>
  <text x="690" y="136" font-family="monospace" font-size="8.5" fill="#64748B">&#123; type:"return", amt:30 &#125;</text>

  <!-- Access pattern labels -->
  <rect x="318" y="148" width="563" height="18" rx="3" fill="#0F172A"/>
  <text x="590" y="161" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">Query: PK="user#1001" AND SK BETWEEN "2024-01-01" AND "2024-12-31"  →  O(log N + items)</text>

  <!-- GSI section -->
  <text x="320" y="186" font-family="Inter,sans-serif" font-size="10" fill="#A78BFA" font-weight="600">Global Secondary Index (GSI)</text>

  <rect x="318" y="191" width="563" height="22" rx="3" fill="#2D1B69" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="348" y="206" font-family="monospace" font-size="9" fill="#C4B5FD" font-weight="700">GSI-PK  (type)</text>
  <rect x="440" y="195" width="22" height="13" rx="2" fill="#6D28D9"/>
  <text x="451" y="206" font-family="monospace" font-size="8" fill="#EDE9FE" text-anchor="middle">PK</text>
  <line x1="510" y1="191" x2="510" y2="213" stroke="#7C3AED" stroke-width="0.8" opacity="0.6"/>
  <text x="560" y="206" font-family="monospace" font-size="9" fill="#C4B5FD" font-weight="700">GSI-SK  (created_at)</text>
  <line x1="700" y1="191" x2="700" y2="213" stroke="#7C3AED" stroke-width="0.8" opacity="0.6"/>
  <text x="745" y="206" font-family="monospace" font-size="9" fill="#C4B5FD" font-weight="700">→ projects attrs</text>

  <rect x="318" y="214" width="563" height="18" rx="3" fill="#1C1040"/>
  <text x="590" y="227" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Query GSI: type="order" SORT BY created_at DESC  →  all orders, newest first</text>

  <!-- Partitioning diagram -->
  <text x="320" y="252" font-family="Inter,sans-serif" font-size="10" fill="#60A5FA" font-weight="600">Partition Routing  (hash → shard)</text>

  <!-- Hash boxes -->
  <rect x="318" y="258" width="100" height="38" rx="5" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
  <text x="368" y="275" font-family="monospace" font-size="9" fill="#93C5FD" text-anchor="middle">hash</text>
  <text x="368" y="288" font-family="monospace" font-size="9" fill="#93C5FD" text-anchor="middle">(user#1001)</text>

  <path d="M 420 277 L 444 277" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="441,273 449,277 441,281" fill="#3B82F6"/>

  <rect x="447" y="258" width="80" height="38" rx="5" fill="#1D4ED8" stroke="#3B82F6" stroke-width="1"/>
  <text x="487" y="275" font-family="monospace" font-size="9" fill="#BFDBFE" text-anchor="middle">0x3A7F</text>
  <text x="487" y="288" font-family="monospace" font-size="9" fill="#93C5FD" text-anchor="middle">slot 234</text>

  <path d="M 529 277 L 553 277" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="550,273 558,277 550,281" fill="#3B82F6"/>

  <!-- Shard boxes -->
  <rect x="556" y="248" width="100" height="30" rx="4" fill="#1E293B" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="606" y="268" font-family="monospace" font-size="9" fill="#C4B5FD" text-anchor="middle">Shard A</text>

  <rect x="556" y="282" width="100" height="30" rx="4" fill="#1E293B" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="606" y="302" font-family="monospace" font-size="9" fill="#C4B5FD" text-anchor="middle">Shard B  ←</text>

  <rect x="556" y="316" width="100" height="30" rx="4" fill="#1E293B" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="606" y="336" font-family="monospace" font-size="9" fill="#C4B5FD" text-anchor="middle">Shard N</text>

  <!-- Capacity modes card -->
  <rect x="672" y="248" width="210" height="108" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="777" y="268" font-family="Inter,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="600">Capacity Modes</text>
  <rect x="682" y="274" width="190" height="18" rx="3" fill="#0F172A"/>
  <text x="682" y="286" font-family="monospace" font-size="8.5" fill="#FCD34D">  On-Demand</text>
  <text x="682" y="298" font-family="monospace" font-size="8" fill="#64748B">    pay-per-request · no capacity</text>
  <rect x="682" y="302" width="190" height="18" rx="3" fill="#0F172A"/>
  <text x="682" y="314" font-family="monospace" font-size="8.5" fill="#6EE7B7">  Provisioned</text>
  <text x="682" y="326" font-family="monospace" font-size="8" fill="#64748B">    RCU/WCU · auto-scale policy</text>
  <text x="777" y="346" font-family="Inter,sans-serif" font-size="8" fill="#475569" text-anchor="middle">1 RCU = 1 strongly consistent 4KB read</text>

  <!-- Interview key points bar -->
  <rect x="318" y="368" width="563" height="78" rx="6" fill="#1E293B" stroke="#2563EB" stroke-width="0.5"/>
  <text x="600" y="388" font-family="Inter,sans-serif" font-size="11" fill="#93C5FD" text-anchor="middle" font-weight="600">Interview Key Points</text>
  <text x="600" y="406" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Hot partition problem → add random suffix to PK (write sharding)  ·  GSI eventual, base table strongly consistent</text>
  <text x="600" y="422" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Single-table design: store multiple entity types in one table · use PK/SK prefixes  (e.g. USER#, ORDER#)</text>
  <text x="600" y="438" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">DynamoDB Streams → trigger Lambda for fan-out · TTL for automatic item expiry · DAX for &lt;1ms reads</text>
</svg>
