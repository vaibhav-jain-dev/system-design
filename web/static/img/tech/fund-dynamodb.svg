<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 140" fill="none">
  <defs>
    <linearGradient id="bg-ddb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1520"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="240" height="140" fill="url(#bg-ddb)" rx="10"/>

  <!-- DynamoDB table visualization -->
  <!-- Table header -->
  <rect x="16" y="16" width="208" height="24" rx="4" fill="#1A3A5C" stroke="#2563EB" stroke-width="1.5"/>
  <text x="30" y="32" font-family="monospace" font-size="9" fill="#60A5FA" font-weight="700">PK (user_id)</text>
  <text x="120" y="32" font-family="monospace" font-size="9" fill="#60A5FA" font-weight="700">SK (timestamp)</text>
  <text x="200" y="32" font-family="monospace" font-size="9" fill="#60A5FA" font-weight="700">data</text>
  <line x1="108" y1="16" x2="108" y2="40" stroke="#2563EB" stroke-width="0.8" opacity="0.5"/>
  <line x1="186" y1="16" x2="186" y2="40" stroke="#2563EB" stroke-width="0.8" opacity="0.5"/>

  <!-- PK badge -->
  <rect x="106" y="20" width="18" height="11" rx="2" fill="#1D4ED8" opacity="0.8"/>
  <text x="115" y="30" font-family="monospace" font-size="7" fill="#BFDBFE" text-anchor="middle">PK</text>

  <!-- Table rows -->
  <rect x="16" y="42" width="208" height="18" rx="2" fill="#1E293B"/>
  <text x="30" y="55" font-family="monospace" font-size="8" fill="#94A3B8">user#1001</text>
  <text x="120" y="55" font-family="monospace" font-size="8" fill="#94A3B8">2024-01-15</text>
  <text x="200" y="55" font-family="monospace" font-size="8" fill="#64748B">{...}</text>
  <line x1="108" y1="42" x2="108" y2="60" stroke="#334155" stroke-width="0.8"/>
  <line x1="186" y1="42" x2="186" y2="60" stroke="#334155" stroke-width="0.8"/>

  <rect x="16" y="62" width="208" height="18" rx="2" fill="#172033" opacity="0.8"/>
  <text x="30" y="75" font-family="monospace" font-size="8" fill="#94A3B8">user#1001</text>
  <text x="120" y="75" font-family="monospace" font-size="8" fill="#94A3B8">2024-01-16</text>
  <text x="200" y="75" font-family="monospace" font-size="8" fill="#64748B">{...}</text>
  <line x1="108" y1="62" x2="108" y2="80" stroke="#334155" stroke-width="0.8"/>
  <line x1="186" y1="62" x2="186" y2="80" stroke="#334155" stroke-width="0.8"/>

  <rect x="16" y="82" width="208" height="18" rx="2" fill="#1E293B"/>
  <text x="30" y="95" font-family="monospace" font-size="8" fill="#94A3B8">user#2042</text>
  <text x="120" y="95" font-family="monospace" font-size="8" fill="#94A3B8">2024-01-10</text>
  <text x="200" y="95" font-family="monospace" font-size="8" fill="#64748B">{...}</text>
  <line x1="108" y1="82" x2="108" y2="100" stroke="#334155" stroke-width="0.8"/>
  <line x1="186" y1="82" x2="186" y2="100" stroke="#334155" stroke-width="0.8"/>

  <!-- Partition shards -->
  <rect x="16" y="108" width="58" height="20" rx="4" fill="#1E293B" stroke="#7C3AED" stroke-width="1"/>
  <text x="45" y="122" font-family="Inter,sans-serif" font-size="7.5" fill="#C4B5FD" text-anchor="middle">Shard 1</text>
  <rect x="82" y="108" width="58" height="20" rx="4" fill="#1E293B" stroke="#7C3AED" stroke-width="1"/>
  <text x="111" y="122" font-family="Inter,sans-serif" font-size="7.5" fill="#C4B5FD" text-anchor="middle">Shard 2</text>
  <rect x="148" y="108" width="76" height="20" rx="4" fill="#1E293B" stroke="#7C3AED" stroke-width="1"/>
  <text x="186" y="122" font-family="Inter,sans-serif" font-size="7.5" fill="#C4B5FD" text-anchor="middle">Shard N (auto)</text>

  <!-- Labels -->
  <text x="16" y="136" font-family="Inter,sans-serif" font-size="7.5" fill="#475569">Auto-partition • Single-digit ms • 99.999% uptime</text>
</svg>
