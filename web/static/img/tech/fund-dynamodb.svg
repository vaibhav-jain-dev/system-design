<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- ── Left panel ── -->
  <rect x="18" y="18" width="280" height="424" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <ellipse cx="158" cy="74" rx="52" ry="18" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <path d="M 106 74 L 106 128" stroke="#2563EB" stroke-width="2"/>
  <path d="M 210 74 L 210 128" stroke="#2563EB" stroke-width="2"/>
  <ellipse cx="158" cy="128" rx="52" ry="18" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <path d="M 106 100 Q 158 114 210 100" stroke="#2563EB" stroke-width="0.8" fill="none" opacity="0.4"/>
  <text x="158" y="106" font-family="monospace" font-size="18" fill="#1D4ED8" text-anchor="middle" font-weight="700">DDB</text>
  <text x="158" y="155" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="600">DynamoDB</text>
  <text x="158" y="170" font-family="Inter,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Managed NoSQL · AWS</text>

  <rect x="30" y="184" width="256" height="48" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="50" y="204" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" font-weight="600">Single-Digit ms</text>
  <text x="50" y="220" font-family="monospace" font-size="9" fill="#64748B">read + write latency at any scale</text>

  <rect x="30" y="240" width="256" height="48" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="50" y="260" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" font-weight="600">Auto-Partitioning</text>
  <text x="50" y="276" font-family="monospace" font-size="9" fill="#64748B">hash(PK) → shard · no resharding</text>

  <rect x="30" y="296" width="256" height="48" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="50" y="316" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" font-weight="600">Capacity Modes</text>
  <text x="50" y="332" font-family="monospace" font-size="9" fill="#64748B">on-demand · provisioned + auto-scale</text>

  <rect x="30" y="352" width="256" height="48" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="50" y="372" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" font-weight="600">Global Tables</text>
  <text x="50" y="388" font-family="monospace" font-size="9" fill="#64748B">multi-region active-active</text>

  <rect x="30" y="408" width="256" height="26" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="158" y="425" font-family="monospace" font-size="8.5" fill="#1D4ED8" text-anchor="middle">99.999% availability · 11 nines durability</text>

  <!-- ── Right: Table + GSI + Partitioning ── -->
  <text x="320" y="30" font-family="Inter,sans-serif" font-size="13" fill="#374151" font-weight="600">Data Model  ·  Access Patterns  ·  Partitioning</text>

  <!-- Base Table -->
  <text x="320" y="52" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" font-weight="600">Base Table</text>
  <rect x="318" y="57" width="563" height="22" rx="3" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="348" y="72" font-family="monospace" font-size="9" fill="#1E40AF" font-weight="700">PK  (user_id)</text>
  <rect x="430" y="61" width="22" height="13" rx="2" fill="#1D4ED8"/>
  <text x="441" y="72" font-family="monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">PK</text>
  <line x1="490" y1="57" x2="490" y2="79" stroke="#93C5FD" stroke-width="0.8"/>
  <text x="540" y="72" font-family="monospace" font-size="9" fill="#1E40AF" font-weight="700">SK  (timestamp)</text>
  <rect x="634" y="61" width="22" height="13" rx="2" fill="#7C3AED"/>
  <text x="645" y="72" font-family="monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">SK</text>
  <line x1="678" y1="57" x2="678" y2="79" stroke="#93C5FD" stroke-width="0.8"/>
  <text x="740" y="72" font-family="monospace" font-size="9" fill="#1E40AF" font-weight="700">attrs</text>

  <rect x="318" y="80" width="563" height="19" rx="2" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="348" y="93" font-family="monospace" font-size="8.5" fill="#475569">user#1001</text>
  <line x1="490" y1="80" x2="490" y2="99" stroke="#E2E8F0" stroke-width="0.8"/>
  <text x="510" y="93" font-family="monospace" font-size="8.5" fill="#475569">2024-01-15T10:00Z</text>
  <line x1="678" y1="80" x2="678" y2="99" stroke="#E2E8F0" stroke-width="0.8"/>
  <text x="690" y="93" font-family="monospace" font-size="8.5" fill="#64748B">&#123; type:"order", amt:99 &#125;</text>

  <rect x="318" y="100" width="563" height="19" rx="2" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="348" y="113" font-family="monospace" font-size="8.5" fill="#475569">user#1001</text>
  <line x1="490" y1="100" x2="490" y2="119" stroke="#E2E8F0" stroke-width="0.8"/>
  <text x="510" y="113" font-family="monospace" font-size="8.5" fill="#475569">2024-01-16T14:22Z</text>
  <line x1="678" y1="100" x2="678" y2="119" stroke="#E2E8F0" stroke-width="0.8"/>
  <text x="690" y="113" font-family="monospace" font-size="8.5" fill="#64748B">&#123; type:"order", amt:45 &#125;</text>

  <rect x="318" y="120" width="563" height="19" rx="2" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="348" y="133" font-family="monospace" font-size="8.5" fill="#7C3AED">user#2042</text>
  <line x1="490" y1="120" x2="490" y2="139" stroke="#E2E8F0" stroke-width="0.8"/>
  <text x="510" y="133" font-family="monospace" font-size="8.5" fill="#475569">2024-01-10T09:11Z</text>
  <line x1="678" y1="120" x2="678" y2="139" stroke="#E2E8F0" stroke-width="0.8"/>
  <text x="690" y="133" font-family="monospace" font-size="8.5" fill="#64748B">&#123; type:"return", amt:30 &#125;</text>

  <rect x="318" y="140" width="563" height="16" rx="2" fill="#EFF6FF"/>
  <text x="590" y="151" font-family="monospace" font-size="7.5" fill="#1D4ED8" text-anchor="middle">Query: PK="user#1001" AND SK BETWEEN dates  →  O(log N + items)</text>

  <!-- GSI -->
  <text x="320" y="176" font-family="Inter,sans-serif" font-size="10" fill="#7C3AED" font-weight="600">Global Secondary Index (GSI)</text>
  <rect x="318" y="181" width="563" height="22" rx="3" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.2"/>
  <text x="348" y="196" font-family="monospace" font-size="9" fill="#6D28D9" font-weight="700">GSI-PK  (type)</text>
  <rect x="440" y="185" width="22" height="13" rx="2" fill="#7C3AED"/>
  <text x="451" y="196" font-family="monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">PK</text>
  <line x1="510" y1="181" x2="510" y2="203" stroke="#C4B5FD" stroke-width="0.8"/>
  <text x="560" y="196" font-family="monospace" font-size="9" fill="#6D28D9" font-weight="700">GSI-SK  (created_at)</text>
  <line x1="700" y1="181" x2="700" y2="203" stroke="#C4B5FD" stroke-width="0.8"/>
  <text x="745" y="196" font-family="monospace" font-size="9" fill="#6D28D9" font-weight="700">→ projects attrs</text>
  <rect x="318" y="204" width="563" height="16" rx="2" fill="#F5F3FF"/>
  <text x="590" y="215" font-family="monospace" font-size="7.5" fill="#7C3AED" text-anchor="middle">Query GSI: type="order" SORT BY created_at DESC  →  all orders newest first</text>

  <!-- Partitioning -->
  <text x="320" y="242" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" font-weight="600">Partition Routing  (hash → shard)</text>

  <rect x="318" y="248" width="100" height="36" rx="5" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="1.2"/>
  <text x="368" y="263" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">hash</text>
  <text x="368" y="277" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">(user#1001)</text>
  <path d="M 420 266 L 442 266" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="439,262 447,266 439,270" fill="#3B82F6"/>
  <rect x="445" y="248" width="80" height="36" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="485" y="263" font-family="monospace" font-size="9" fill="#1D4ED8" text-anchor="middle">0x3A7F</text>
  <text x="485" y="277" font-family="monospace" font-size="9" fill="#1D4ED8" text-anchor="middle">slot 234</text>
  <path d="M 527 266 L 549 266" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="546,262 554,266 546,270" fill="#3B82F6"/>

  <rect x="552" y="238" width="96" height="28" rx="4" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="600" y="256" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">Shard A</text>
  <rect x="552" y="270" width="96" height="28" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="600" y="289" font-family="monospace" font-size="9" fill="#6D28D9" text-anchor="middle">Shard B ←</text>
  <rect x="552" y="302" width="96" height="28" rx="4" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="600" y="320" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">Shard N</text>

  <!-- Capacity modes -->
  <rect x="662" y="238" width="218" height="98" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="771" y="258" font-family="Inter,sans-serif" font-size="10" fill="#374151" text-anchor="middle" font-weight="600">Capacity Modes</text>
  <rect x="672" y="264" width="198" height="18" rx="3" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.8"/>
  <text x="676" y="276" font-family="monospace" font-size="8.5" fill="#D97706">  On-Demand</text>
  <text x="676" y="288" font-family="monospace" font-size="7.5" fill="#64748B">    pay-per-request · no capacity</text>
  <rect x="672" y="292" width="198" height="18" rx="3" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.8"/>
  <text x="676" y="304" font-family="monospace" font-size="8.5" fill="#059669">  Provisioned</text>
  <text x="676" y="316" font-family="monospace" font-size="7.5" fill="#64748B">    RCU/WCU · auto-scale policy</text>
  <text x="771" y="332" font-family="Inter,sans-serif" font-size="7.5" fill="#94A3B8" text-anchor="middle">1 RCU = 1 strongly consistent 4KB read</text>

  <!-- Key points bar -->
  <rect x="318" y="348" width="563" height="88" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="600" y="368" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Interview Key Points</text>
  <text x="600" y="386" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Hot partition → add random suffix to PK (write sharding)  ·  GSI eventual, base table strongly consistent</text>
  <text x="600" y="403" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Single-table design: multiple entity types in one table · PK/SK prefixes (USER#, ORDER#)</text>
  <text x="600" y="420" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">DynamoDB Streams → Lambda fan-out · TTL for auto-expiry · DAX for &lt;1ms reads</text>
</svg>
