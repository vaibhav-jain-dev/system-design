<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <defs>
    <linearGradient id="bg-url" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" fill="url(#bg-url)" rx="12"/>

  <!-- ── Labels ── -->
  <text x="20" y="14" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">WRITE</text>
  <line x1="50" y1="11" x2="160" y2="11" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="460" y="14" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">READ</text>
  <line x1="480" y1="11" x2="880" y2="11" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- ══ Zone 1: Long URL input (x=20) ══ -->
  <rect x="20" y="60" width="130" height="80" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <!-- URL bar mockup -->
  <rect x="30" y="70" width="110" height="14" rx="3" fill="#0F172A"/>
  <rect x="34" y="73" width="78" height="8" rx="2" fill="#312E81" opacity="0.7"/>
  <text x="73" y="80" font-family="monospace" font-size="5.5" fill="#818CF8" text-anchor="middle">https://very-long-domain.com/</text>
  <!-- text lines -->
  <rect x="30" y="89" width="110" height="5" rx="2" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <rect x="30" y="98" width="110" height="5" rx="2" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <rect x="30" y="107" width="80" height="5" rx="2" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <!-- POST button -->
  <rect x="30" y="117" width="50" height="14" rx="3" fill="#312E81"/>
  <text x="55" y="127" font-family="Inter,sans-serif" font-size="7" fill="#C7D2FE" text-anchor="middle" font-weight="600">POST /shorten</text>
  <text x="85" y="153" font-family="Inter,sans-serif" font-size="8" fill="#818CF8" text-anchor="middle" font-weight="600">Client</text>
  <text x="85" y="164" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">any URL length</text>

  <!-- Arrow 1 -->
  <path d="M 152 100 L 178 100" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="175,96 183,100 175,104" fill="#6366F1"/>

  <!-- ══ Zone 2: App Server + Base62 (x=181) ══ -->
  <rect x="181" y="40" width="150" height="120" rx="8" fill="#1E293B" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="256" y="58" font-family="Inter,sans-serif" font-size="8.5" fill="#C4B5FD" text-anchor="middle" font-weight="600">App Server</text>
  <!-- SHA256 → Base62 mini pipeline -->
  <rect x="193" y="64" width="56" height="22" rx="4" fill="#0F172A" stroke="#4C1D95" stroke-width="1"/>
  <text x="221" y="74" font-family="monospace" font-size="5.5" fill="#94A3B8" text-anchor="middle">SHA-256</text>
  <text x="221" y="82" font-family="monospace" font-size="5" fill="#64748B" text-anchor="middle">hash(long_url)</text>
  <path d="M 251 75 L 261 75" stroke="#818CF8" stroke-width="1"/>
  <polygon points="259,72 264,75 259,78" fill="#818CF8"/>
  <rect x="263" y="64" width="56" height="22" rx="4" fill="#312E81" stroke="#818CF8" stroke-width="1"/>
  <text x="291" y="74" font-family="monospace" font-size="6" fill="#C7D2FE" text-anchor="middle" font-weight="700">Base62</text>
  <text x="291" y="82" font-family="monospace" font-size="5.5" fill="#A5B4FC" text-anchor="middle">7 chars</text>
  <!-- Result -->
  <rect x="193" y="92" width="126" height="18" rx="4" fill="#1E1B4B" stroke="#6366F1" stroke-width="1"/>
  <text x="256" y="105" font-family="monospace" font-size="8" fill="#818CF8" text-anchor="middle" font-weight="700">bit.ly/x7kP2</text>
  <!-- 301 redirect note -->
  <rect x="193" y="115" width="126" height="14" rx="3" fill="#0F2A1E" stroke="#059669" stroke-width="1"/>
  <text x="256" y="125" font-family="Inter,sans-serif" font-size="6.5" fill="#6EE7B7" text-anchor="middle">301 Redirect (browser caches 24h)</text>
  <!-- collision counter -->
  <rect x="193" y="134" width="126" height="14" rx="3" fill="#1C1917" stroke="#D97706" stroke-width="1"/>
  <text x="256" y="144" font-family="Inter,sans-serif" font-size="6.5" fill="#FDE68A" text-anchor="middle">collision? → retry with offset+1</text>
  <text x="256" y="168" font-family="Inter,sans-serif" font-size="7" fill="#7C3AED" text-anchor="middle">5–50ms write latency</text>

  <!-- Arrow 2: App → Redis -->
  <path d="M 333 100 L 359 100" stroke="#DC2626" stroke-width="1.5"/>
  <polygon points="356,96 364,100 356,104" fill="#DC2626"/>
  <text x="346" y="93" font-family="Inter,sans-serif" font-size="6" fill="#DC2626" text-anchor="middle">write+read</text>

  <!-- ══ Zone 3: Redis Cache (x=362) ══ -->
  <rect x="362" y="40" width="130" height="80" rx="8" fill="#1E293B" stroke="#DC2626" stroke-width="1.5"/>
  <!-- Redis cube icon -->
  <path d="M 395 68 L 413 60 L 431 68 L 431 84 L 413 92 L 395 84 Z" fill="#1E293B" stroke="#F87171" stroke-width="1.5"/>
  <path d="M 395 68 L 413 76 L 431 68" fill="none" stroke="#F87171" stroke-width="1"/>
  <path d="M 413 76 L 413 92" stroke="#F87171" stroke-width="1"/>
  <!-- horizontal lines inside cube (data) -->
  <path d="M 397 72 L 411 67" stroke="#FCA5A5" stroke-width="0.8" opacity="0.6"/>
  <path d="M 397 76 L 411 71" stroke="#FCA5A5" stroke-width="0.8" opacity="0.4"/>
  <text x="443" y="68" font-family="Inter,sans-serif" font-size="8" fill="#FCA5A5" font-weight="600">Redis</text>
  <text x="443" y="79" font-family="Inter,sans-serif" font-size="7" fill="#EF4444">sorted set</text>
  <text x="443" y="89" font-family="monospace" font-size="6.5" fill="#64748B">O(1) GET/SET</text>
  <!-- TTL badge -->
  <rect x="362" y="124" width="130" height="14" rx="4" fill="#450A0A" stroke="#DC2626" stroke-width="1"/>
  <text x="427" y="134" font-family="Inter,sans-serif" font-size="7" fill="#FCA5A5" text-anchor="middle">TTL 24h — hot URL cache-hit ~80%</text>
  <text x="427" y="152" font-family="Inter,sans-serif" font-size="8" fill="#F87171" text-anchor="middle" font-weight="600">Redis Cache</text>
  <text x="427" y="163" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">&lt;1ms lookup</text>

  <!-- Arrow 3: Redis → PG -->
  <path d="M 494 100 L 520 100" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="517,96 525,100 517,104" fill="#D97706"/>
  <text x="507" y="93" font-family="Inter,sans-serif" font-size="6" fill="#D97706" text-anchor="middle">cache miss</text>

  <!-- ══ Zone 4: PostgreSQL (x=523) ══ -->
  <rect x="523" y="40" width="130" height="120" rx="8" fill="#1E293B" stroke="#D97706" stroke-width="1.5"/>
  <!-- DB cylinder -->
  <ellipse cx="588" cy="70" rx="28" ry="9" fill="#292524" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 560 70 L 560 104" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 616 70 L 616 104" stroke="#FCD34D" stroke-width="1.5"/>
  <ellipse cx="588" cy="104" rx="28" ry="9" fill="#292524" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 560 87 Q 588 93 616 87" stroke="#FCD34D" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- schema hint -->
  <rect x="531" y="118" width="114" height="26" rx="3" fill="#0F172A"/>
  <text x="535" y="128" font-family="monospace" font-size="5.5" fill="#FCD34D">short_code  VARCHAR(7) PK</text>
  <text x="535" y="137" font-family="monospace" font-size="5.5" fill="#94A3B8">original_url TEXT</text>
  <text x="535" y="146" font-family="monospace" font-size="5.5" fill="#64748B">created_at   TIMESTAMPTZ</text>
  <text x="588" y="162" font-family="Inter,sans-serif" font-size="8" fill="#FDE68A" text-anchor="middle" font-weight="600">PostgreSQL</text>
  <text x="588" y="172" font-family="Inter,sans-serif" font-size="6.5" fill="#92400E" text-anchor="middle">4 shards × 250M rows</text>

  <!-- Arrow 4: PG → CDN -->
  <path d="M 655 100 L 681 100" stroke="#0891B2" stroke-width="1.5"/>
  <polygon points="678,96 686,100 678,104" fill="#0891B2"/>
  <text x="668" y="93" font-family="Inter,sans-serif" font-size="6" fill="#0891B2" text-anchor="middle">cache warm</text>

  <!-- ══ Zone 5: CDN (x=684) ══ -->
  <rect x="684" y="40" width="130" height="80" rx="8" fill="#1E293B" stroke="#0891B2" stroke-width="1.5"/>
  <!-- Globe icon -->
  <circle cx="730" cy="80" r="22" fill="none" stroke="#0891B2" stroke-width="1.5"/>
  <path d="M 730 58 Q 741 69 741 80 Q 741 91 730 102" stroke="#0891B2" stroke-width="1" fill="none"/>
  <path d="M 730 58 Q 719 69 719 80 Q 719 91 730 102" stroke="#0891B2" stroke-width="1" fill="none"/>
  <line x1="708" y1="80" x2="752" y2="80" stroke="#0891B2" stroke-width="1"/>
  <line x1="710" y1="70" x2="750" y2="70" stroke="#0891B2" stroke-width="0.8" opacity="0.5"/>
  <line x1="710" y1="90" x2="750" y2="90" stroke="#0891B2" stroke-width="0.8" opacity="0.5"/>
  <text x="790" y="70" font-family="Inter,sans-serif" font-size="8" fill="#22D3EE" font-weight="600">CDN</text>
  <text x="790" y="81" font-family="Inter,sans-serif" font-size="7" fill="#0891B2">CloudFront</text>
  <text x="790" y="91" font-family="monospace" font-size="6" fill="#64748B">200+ PoPs</text>
  <!-- hit rate badge -->
  <rect x="684" y="124" width="130" height="14" rx="4" fill="#0C4A6E" stroke="#0891B2" stroke-width="1"/>
  <text x="749" y="134" font-family="Inter,sans-serif" font-size="7" fill="#38BDF8" text-anchor="middle">301 cached → 0ms on repeat visit</text>
  <text x="749" y="152" font-family="Inter,sans-serif" font-size="8" fill="#22D3EE" text-anchor="middle" font-weight="600">CloudFront CDN</text>
  <text x="749" y="163" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">absorbs 60% of read traffic</text>

  <!-- ── Bottom metrics bar ── -->
  <rect x="20" y="182" width="860" height="13" rx="4" fill="#1E293B" opacity="0.6"/>
  <text x="145" y="191" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">read:write ratio 100:1</text>
  <line x1="240" y1="183" x2="240" y2="194" stroke="#334155" stroke-width="0.5"/>
  <text x="365" y="191" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">57K writes/s + 5.7M reads/s at peak</text>
  <line x1="490" y1="183" x2="490" y2="194" stroke="#334155" stroke-width="0.5"/>
  <text x="610" y="191" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">storage: ~200 bytes/URL → 200 GB/1B URLs</text>
  <line x1="730" y1="183" x2="730" y2="194" stroke="#334155" stroke-width="0.5"/>
  <text x="815" y="191" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">P99 redirect &lt;50ms</text>
</svg>
