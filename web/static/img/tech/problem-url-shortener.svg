<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none">
  <defs>
    <linearGradient id="bg-url" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="320" height="160" fill="url(#bg-url)" rx="10"/>

  <!-- Long URL box -->
  <rect x="18" y="30" width="132" height="36" rx="6" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <text x="28" y="45" font-family="monospace" font-size="7.5" fill="#94A3B8">https://very-long-domain</text>
  <text x="28" y="57" font-family="monospace" font-size="7.5" fill="#94A3B8">.com/article/2024/slug</text>

  <!-- Arrow with transform box -->
  <path d="M 152 48 L 170 48" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="167,44 175,48 167,52" fill="#6366F1"/>

  <!-- Encoder box in center -->
  <rect x="172" y="32" width="72" height="32" rx="6" fill="#312E81" stroke="#818CF8" stroke-width="1.5"/>
  <text x="208" y="45" font-family="Inter,sans-serif" font-size="8" fill="#C7D2FE" text-anchor="middle" font-weight="600">Base62</text>
  <text x="208" y="57" font-family="Inter,sans-serif" font-size="7" fill="#A5B4FC" text-anchor="middle">Encoder</text>

  <!-- Arrow out -->
  <path d="M 246 48 L 264 48" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="261,44 269,48 261,52" fill="#6366F1"/>

  <!-- Short URL box -->
  <rect x="267" y="30" width="36" height="36" rx="6" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <text x="285" y="44" font-family="monospace" font-size="8" fill="#818CF8" text-anchor="middle" font-weight="700">bit.ly</text>
  <text x="285" y="58" font-family="monospace" font-size="8" fill="#6366F1" text-anchor="middle">/x7kP2</text>

  <!-- Components below -->
  <!-- Redis Cache -->
  <rect x="18" y="88" width="80" height="54" rx="8" fill="#1E293B" stroke="#DC2626" stroke-width="1.5"/>
  <path d="M 42 108 L 58 100 L 74 108 L 74 118 L 58 124 L 42 118 Z" fill="none" stroke="#F87171" stroke-width="1.5"/>
  <path d="M 42 108 L 58 114 L 74 108" fill="none" stroke="#F87171" stroke-width="1"/>
  <path d="M 58 114 L 58 124" stroke="#F87171" stroke-width="1"/>
  <text x="58" y="134" font-family="Inter,sans-serif" font-size="8" fill="#FCA5A5" text-anchor="middle">Redis Cache</text>
  <text x="58" y="144" font-family="Inter,sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Hot URLs</text>

  <!-- DB -->
  <rect x="120" y="88" width="80" height="54" rx="8" fill="#1E293B" stroke="#D97706" stroke-width="1.5"/>
  <ellipse cx="160" cy="108" rx="22" ry="7" fill="none" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 138 108 L 138 128" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 182 108 L 182 128" stroke="#FCD34D" stroke-width="1.5"/>
  <ellipse cx="160" cy="128" rx="22" ry="7" fill="none" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 138 118 Q 160 123 182 118" stroke="#FCD34D" stroke-width="1" fill="none" opacity="0.4"/>
  <text x="160" y="146" font-family="Inter,sans-serif" font-size="8" fill="#FDE68A" text-anchor="middle">PostgreSQL</text>

  <!-- App servers -->
  <rect x="222" y="88" width="80" height="54" rx="8" fill="#1E293B" stroke="#059669" stroke-width="1.5"/>
  <rect x="232" y="100" width="60" height="8" rx="3" fill="#065F46" opacity="0.8"/>
  <rect x="232" y="112" width="60" height="8" rx="3" fill="#065F46" opacity="0.6"/>
  <rect x="232" y="124" width="40" height="8" rx="3" fill="#065F46" opacity="0.4"/>
  <circle cx="277" cy="104" r="3" fill="#10B981"/>
  <circle cx="277" cy="116" r="3" fill="#10B981" opacity="0.7"/>
  <text x="262" y="144" font-family="Inter,sans-serif" font-size="8" fill="#6EE7B7" text-anchor="middle">App Servers</text>
</svg>
