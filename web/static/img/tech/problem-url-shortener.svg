<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- Row labels -->
  <rect x="18" y="18" width="116" height="20" rx="4" fill="#DBEAFE"/>
  <text x="76" y="32" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="700">WRITE PATH</text>
  <rect x="18" y="245" width="116" height="20" rx="4" fill="#D1FAE5"/>
  <text x="76" y="259" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">READ PATH</text>

  <!-- ── ROW 1: WRITE PATH ── -->
  <!-- Client -->
  <rect x="18" y="44" width="140" height="188" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="88" y="64" font-family="Inter,sans-serif" font-size="10" fill="#64748B" text-anchor="middle" font-weight="600">CLIENT</text>
  <circle cx="88" cy="96" r="18" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <circle cx="88" cy="91" r="6" fill="#93C5FD"/>
  <path d="M 72 109 Q 88 100 104 109" fill="#BFDBFE" stroke="none"/>
  <rect x="30" y="122" width="116" height="18" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="88" y="135" font-family="monospace" font-size="8" fill="#1D4ED8" text-anchor="middle">POST /shorten</text>
  <text x="88" y="162" font-family="monospace" font-size="8.5" fill="#1D4ED8" text-anchor="middle">bit.ly/abc123</text>
  <text x="88" y="215" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">browser / mobile</text>

  <path d="M 160 130 L 196 130" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="193,126 201,130 193,134" fill="#3B82F6"/>
  <text x="178" y="122" font-family="monospace" font-size="8" fill="#3B82F6" text-anchor="middle">HTTPS</text>

  <!-- App Server -->
  <rect x="198" y="44" width="228" height="188" rx="8" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="312" y="64" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="700">APP SERVER</text>
  <rect x="210" y="74" width="204" height="34" rx="5" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="312" y="88" font-family="monospace" font-size="9" fill="#1D4ED8" text-anchor="middle" font-weight="600">SHA-256 → Base62</text>
  <text x="312" y="101" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">take first 7 chars of hash</text>
  <rect x="210" y="116" width="204" height="26" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="312" y="127" font-family="monospace" font-size="10" fill="#1E40AF" text-anchor="middle" font-weight="700">bit.ly/x7kP2mN</text>
  <text x="312" y="139" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">62^7 = 3.5 trillion unique codes</text>
  <rect x="210" y="150" width="96" height="20" rx="4" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="258" y="164" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">collision check</text>
  <rect x="314" y="150" width="96" height="20" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="362" y="164" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">301 redirect</text>
  <text x="312" y="215" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">stateless · 3 replicas</text>

  <path d="M 428 130 L 462 130" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="459,126 467,130 459,134" fill="#3B82F6"/>
  <text x="445" y="122" font-family="monospace" font-size="8" fill="#3B82F6" text-anchor="middle">INSERT</text>

  <!-- PostgreSQL Write -->
  <rect x="464" y="44" width="250" height="188" rx="8" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="589" y="64" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="700">POSTGRESQL</text>
  <ellipse cx="539" cy="104" rx="30" ry="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <path d="M 509 104 L 509 138" stroke="#93C5FD" stroke-width="1.5"/>
  <path d="M 569 104 L 569 138" stroke="#93C5FD" stroke-width="1.5"/>
  <ellipse cx="539" cy="138" rx="30" ry="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="539" y="125" font-family="monospace" font-size="8" fill="#1D4ED8" text-anchor="middle">urls</text>
  <rect x="580" y="78" width="122" height="100" rx="5" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="641" y="94" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">id  BIGSERIAL PK</text>
  <text x="641" y="108" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">short_code VARCHAR(7)</text>
  <text x="641" y="122" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">long_url  TEXT</text>
  <text x="641" y="136" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">user_id  BIGINT FK</text>
  <text x="641" y="150" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">created_at TS</text>
  <text x="641" y="164" font-family="monospace" font-size="7.5" fill="#3B82F6" text-anchor="middle">INDEX(short_code)</text>
  <text x="589" y="215" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">primary · replica · 500B rows/5yr</text>

  <!-- ── ROW 2: READ PATH ── -->
  <!-- CDN -->
  <rect x="18" y="268" width="160" height="170" rx="8" fill="#FFFFFF" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="98" y="288" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">CDN / EDGE</text>
  <circle cx="98" cy="334" r="28" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <ellipse cx="98" cy="334" rx="10" ry="28" fill="none" stroke="#059669" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="98" cy="334" rx="28" ry="10" fill="none" stroke="#059669" stroke-width="0.8" opacity="0.5"/>
  <text x="98" y="339" font-family="Inter,sans-serif" font-size="11" fill="#065F46" text-anchor="middle" font-weight="700">CF</text>
  <text x="98" y="377" font-family="monospace" font-size="8" fill="#064E3B" text-anchor="middle">CloudFront</text>
  <text x="98" y="420" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">~12ms edge latency</text>

  <path d="M 180 356 L 228 356" stroke="#059669" stroke-width="2"/>
  <polygon points="183,352 175,356 183,360" fill="#059669"/>
  <text x="204" y="348" font-family="monospace" font-size="8" fill="#059669" text-anchor="middle">HIT</text>

  <!-- Redis -->
  <rect x="230" y="268" width="200" height="170" rx="8" fill="#FFFFFF" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="330" y="288" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">REDIS CACHE</text>
  <polygon points="330,306 358,298 358,326 330,334" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <polygon points="302,306 330,298 358,298 330,306" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <polygon points="302,306 302,334 330,334 330,306" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
  <rect x="242" y="344" width="176" height="14" rx="3" fill="#ECFDF5"/>
  <text x="330" y="355" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">x7kP2mN → long_url</text>
  <rect x="242" y="362" width="176" height="14" rx="3" fill="#F0FDF4"/>
  <text x="330" y="373" font-family="monospace" font-size="8" fill="#064E3B" text-anchor="middle">TTL 24h · O(1) GET</text>
  <text x="330" y="408" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">top 20% URLs = 80% reads</text>
  <text x="330" y="422" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">cache miss → fallback to DB</text>

  <path d="M 432 356 L 464 356" stroke="#059669" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="435,352 427,356 435,360" fill="#059669"/>
  <text x="448" y="347" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">MISS</text>

  <!-- PostgreSQL Read -->
  <rect x="466" y="268" width="248" height="170" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="590" y="288" font-family="Inter,sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="700">POSTGRESQL (read replica)</text>
  <ellipse cx="540" cy="326" rx="30" ry="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <path d="M 510 326 L 510 360" stroke="#CBD5E1" stroke-width="1.5"/>
  <path d="M 570 326 L 570 360" stroke="#CBD5E1" stroke-width="1.5"/>
  <ellipse cx="540" cy="360" rx="30" ry="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="540" y="347" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">replica</text>
  <rect x="582" y="308" width="120" height="66" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="642" y="323" font-family="monospace" font-size="7.5" fill="#475569" text-anchor="middle">SELECT long_url</text>
  <text x="642" y="337" font-family="monospace" font-size="7.5" fill="#475569" text-anchor="middle">WHERE short_code</text>
  <text x="642" y="351" font-family="monospace" font-size="7.5" fill="#3B82F6" text-anchor="middle">= 'x7kP2mN'</text>
  <text x="642" y="365" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">INDEX scan O(logN)</text>
  <text x="590" y="415" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">populate cache on miss</text>

  <!-- Vertical connector -->
  <line x1="589" y1="232" x2="589" y2="268" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom metrics bar -->
  <rect x="18" y="444" width="864" height="14" rx="4" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="450" y="455" font-family="monospace" font-size="8" fill="#1D4ED8" text-anchor="middle">read:write 100:1  ·  57K writes/s peak  ·  5.7M reads/s  ·  P99 redirect &lt;50ms  ·  Base62: 0-9 A-Z a-z  ·  62^7 = 3.5 trillion</text>
</svg>
