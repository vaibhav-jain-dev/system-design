<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <defs>
    <linearGradient id="bg-url" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" fill="url(#bg-url)" rx="12"/>

  <!-- ── Row labels ── -->
  <text x="18" y="17" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">WRITE PATH</text>
  <line x1="98" y1="14" x2="882" y2="14" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="18" y="244" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">READ PATH</text>
  <line x1="98" y1="241" x2="882" y2="241" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- ══════════════ ROW 1: WRITE PATH ══════════════ -->

  <!-- Zone 1: Client -->
  <rect x="18" y="23" width="250" height="205" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <rect x="30" y="38" width="226" height="18" rx="3" fill="#0F172A"/>
  <rect x="34" y="41" width="160" height="12" rx="2" fill="#312E81" opacity="0.7"/>
  <text x="114" y="50" font-family="monospace" font-size="7" fill="#818CF8" text-anchor="middle">https://very-long-domain.com/path?q=…</text>
  <rect x="30" y="61" width="226" height="6" rx="2" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <rect x="30" y="71" width="226" height="6" rx="2" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <rect x="30" y="81" width="160" height="6" rx="2" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <rect x="30" y="93" width="96" height="18" rx="4" fill="#312E81"/>
  <text x="78" y="105" font-family="Inter,sans-serif" font-size="8.5" fill="#C7D2FE" text-anchor="middle" font-weight="600">POST /shorten</text>
  <text x="143" y="175" font-family="Inter,sans-serif" font-size="11" fill="#818CF8" text-anchor="middle" font-weight="700">Client</text>
  <text x="143" y="192" font-family="Inter,sans-serif" font-size="7.5" fill="#475569" text-anchor="middle">any URL length · 100M new/day</text>

  <!-- Arrow write: Client → App Server -->
  <path d="M 270 100 L 292 100" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="289,96 297,100 289,104" fill="#6366F1"/>
  <text x="283" y="93" font-family="Inter,sans-serif" font-size="6.5" fill="#6366F1" text-anchor="middle">POST</text>

  <!-- Zone 2: App Server -->
  <rect x="295" y="23" width="305" height="205" rx="8" fill="#1E293B" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="447" y="44" font-family="Inter,sans-serif" font-size="11" fill="#C4B5FD" text-anchor="middle" font-weight="700">App Server</text>
  <!-- SHA-256 → Base62 pipeline -->
  <rect x="308" y="54" width="100" height="30" rx="4" fill="#0F172A" stroke="#4C1D95" stroke-width="1"/>
  <text x="358" y="68" font-family="monospace" font-size="8.5" fill="#94A3B8" text-anchor="middle">SHA-256</text>
  <text x="358" y="79" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">hash(long_url)</text>
  <path d="M 410 69 L 424 69" stroke="#818CF8" stroke-width="1.5"/>
  <polygon points="421,65 429,69 421,73" fill="#818CF8"/>
  <rect x="427" y="54" width="100" height="30" rx="4" fill="#312E81" stroke="#818CF8" stroke-width="1"/>
  <text x="477" y="68" font-family="monospace" font-size="10" fill="#C7D2FE" text-anchor="middle" font-weight="700">Base62</text>
  <text x="477" y="79" font-family="monospace" font-size="7" fill="#A5B4FC" text-anchor="middle">7 chars</text>
  <!-- Result code -->
  <rect x="308" y="92" width="279" height="26" rx="4" fill="#1E1B4B" stroke="#6366F1" stroke-width="1"/>
  <text x="447" y="109" font-family="monospace" font-size="12" fill="#818CF8" text-anchor="middle" font-weight="700">bit.ly/x7kP2</text>
  <!-- 301 note -->
  <rect x="308" y="125" width="279" height="18" rx="3" fill="#0F2A1E" stroke="#059669" stroke-width="1"/>
  <text x="447" y="137" font-family="Inter,sans-serif" font-size="8" fill="#6EE7B7" text-anchor="middle">301 Redirect — browser caches 24h, 0ms repeat</text>
  <!-- collision -->
  <rect x="308" y="148" width="279" height="18" rx="3" fill="#1C1917" stroke="#D97706" stroke-width="1"/>
  <text x="447" y="160" font-family="Inter,sans-serif" font-size="8" fill="#FDE68A" text-anchor="middle">collision? → retry with offset+1 (rare, ~0.01%)</text>
  <text x="447" y="207" font-family="Inter,sans-serif" font-size="8.5" fill="#7C3AED" text-anchor="middle">5–50ms write latency</text>

  <!-- Arrows: App Server → PG (write) -->
  <path d="M 602 100 L 622 100" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="619,96 627,100 619,104" fill="#D97706"/>
  <text x="612" y="93" font-family="Inter,sans-serif" font-size="6.5" fill="#D97706" text-anchor="middle">write</text>

  <!-- Zone 3: PostgreSQL -->
  <rect x="625" y="23" width="257" height="205" rx="8" fill="#1E293B" stroke="#D97706" stroke-width="1.5"/>
  <ellipse cx="754" cy="90" rx="50" ry="17" fill="#292524" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 704 90 L 704 140" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 804 90 L 804 140" stroke="#FCD34D" stroke-width="1.5"/>
  <ellipse cx="754" cy="140" rx="50" ry="17" fill="#292524" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 704 115 Q 754 125 804 115" stroke="#FCD34D" stroke-width="0.8" fill="none" opacity="0.4"/>
  <rect x="636" y="161" width="234" height="48" rx="3" fill="#0F172A"/>
  <text x="641" y="174" font-family="monospace" font-size="7" fill="#FCD34D">short_code  VARCHAR(7)  PK</text>
  <text x="641" y="187" font-family="monospace" font-size="7" fill="#94A3B8">original_url  TEXT</text>
  <text x="641" y="200" font-family="monospace" font-size="7" fill="#64748B">created_at  TIMESTAMPTZ</text>
  <text x="754" y="220" font-family="Inter,sans-serif" font-size="11" fill="#FDE68A" text-anchor="middle" font-weight="700">PostgreSQL</text>

  <!-- Vertical connector: shared DB between rows -->
  <path d="M 754 230 L 754 250" stroke="#FCD34D" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ══════════════ ROW 2: READ PATH ══════════════ -->

  <!-- Zone 4: CDN -->
  <rect x="18" y="251" width="250" height="200" rx="8" fill="#1E293B" stroke="#0891B2" stroke-width="1.5"/>
  <circle cx="143" cy="325" r="42" fill="none" stroke="#0891B2" stroke-width="1.5"/>
  <path d="M 143 283 Q 160 304 160 325 Q 160 346 143 367" stroke="#0891B2" stroke-width="1" fill="none"/>
  <path d="M 143 283 Q 126 304 126 325 Q 126 346 143 367" stroke="#0891B2" stroke-width="1" fill="none"/>
  <line x1="101" y1="325" x2="185" y2="325" stroke="#0891B2" stroke-width="1"/>
  <line x1="104" y1="308" x2="182" y2="308" stroke="#0891B2" stroke-width="0.8" opacity="0.5"/>
  <line x1="104" y1="342" x2="182" y2="342" stroke="#0891B2" stroke-width="0.8" opacity="0.5"/>
  <rect x="30" y="373" width="226" height="18" rx="4" fill="#0C4A6E" stroke="#0891B2" stroke-width="1"/>
  <text x="143" y="385" font-family="Inter,sans-serif" font-size="8" fill="#38BDF8" text-anchor="middle">301 cached → 0ms on repeat visit · 200+ PoPs</text>
  <text x="143" y="428" font-family="Inter,sans-serif" font-size="11" fill="#22D3EE" text-anchor="middle" font-weight="700">CloudFront CDN</text>
  <text x="143" y="444" font-family="Inter,sans-serif" font-size="7.5" fill="#475569" text-anchor="middle">absorbs 60%+ of all read traffic</text>

  <!-- Arrow (miss): CDN ← Redis -->
  <path d="M 270 325 L 292 325" stroke="#0891B2" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="273,321 265,325 273,329" fill="#0891B2"/>
  <text x="281" y="317" font-family="Inter,sans-serif" font-size="7" fill="#0891B2" text-anchor="middle">miss</text>

  <!-- Zone 5: Redis Cache -->
  <rect x="295" y="251" width="305" height="200" rx="8" fill="#1E293B" stroke="#DC2626" stroke-width="1.5"/>
  <!-- Redis cube icon -->
  <path d="M 338 318 L 365 303 L 392 318 L 392 348 L 365 363 L 338 348 Z" fill="#1E293B" stroke="#F87171" stroke-width="2"/>
  <path d="M 338 318 L 365 333 L 392 318" fill="none" stroke="#F87171" stroke-width="1.2"/>
  <path d="M 365 333 L 365 363" stroke="#F87171" stroke-width="1.2"/>
  <path d="M 340 323 L 363 310" stroke="#FCA5A5" stroke-width="1" opacity="0.6"/>
  <path d="M 340 330 L 363 317" stroke="#FCA5A5" stroke-width="1" opacity="0.4"/>
  <text x="408" y="318" font-family="Inter,sans-serif" font-size="12" fill="#FCA5A5" font-weight="700">Redis</text>
  <text x="408" y="334" font-family="Inter,sans-serif" font-size="9" fill="#EF4444">sorted set</text>
  <text x="408" y="348" font-family="monospace" font-size="8" fill="#64748B">O(1) GET/SET</text>
  <rect x="308" y="370" width="279" height="18" rx="4" fill="#450A0A" stroke="#DC2626" stroke-width="1"/>
  <text x="447" y="382" font-family="Inter,sans-serif" font-size="8" fill="#FCA5A5" text-anchor="middle">TTL 24h — hot URL cache-hit ~80% · warm cache</text>
  <text x="447" y="428" font-family="Inter,sans-serif" font-size="11" fill="#F87171" text-anchor="middle" font-weight="700">Redis Cache</text>
  <text x="447" y="444" font-family="Inter,sans-serif" font-size="7.5" fill="#475569" text-anchor="middle">&lt;1ms lookup · fail-open to DB</text>

  <!-- Arrow (miss): Redis ← PostgreSQL -->
  <path d="M 602 325 L 622 325" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="605,321 597,325 605,329" fill="#D97706"/>
  <text x="612" y="317" font-family="Inter,sans-serif" font-size="7" fill="#D97706" text-anchor="middle">miss</text>

  <!-- Zone 6: PostgreSQL (read row) -->
  <rect x="625" y="251" width="257" height="200" rx="8" fill="#1E293B" stroke="#D97706" stroke-width="1.5"/>
  <ellipse cx="754" cy="309" rx="50" ry="17" fill="#292524" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 704 309 L 704 359" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 804 309 L 804 359" stroke="#FCD34D" stroke-width="1.5"/>
  <ellipse cx="754" cy="359" rx="50" ry="17" fill="#292524" stroke="#FCD34D" stroke-width="1.5"/>
  <rect x="636" y="380" width="234" height="30" rx="3" fill="#0F172A"/>
  <text x="753" y="394" font-family="Inter,sans-serif" font-size="8.5" fill="#FDE68A" text-anchor="middle">GetItem O(1) · ~5ms</text>
  <text x="753" y="407" font-family="Inter,sans-serif" font-size="8" fill="#64748B" text-anchor="middle">on-demand · auto-scale</text>
  <text x="754" y="428" font-family="Inter,sans-serif" font-size="11" fill="#FDE68A" text-anchor="middle" font-weight="700">PostgreSQL</text>
  <text x="754" y="444" font-family="Inter,sans-serif" font-size="7.5" fill="#92400E" text-anchor="middle">4 shards × 250M rows · 91 TB/5yr</text>

  <!-- ── Bottom metrics bar ── -->
  <rect x="18" y="450" width="864" height="10" rx="3" fill="#1E293B" opacity="0.7"/>
  <text x="160" y="458" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">read:write 100:1</text>
  <line x1="290" y1="451" x2="290" y2="459" stroke="#334155" stroke-width="0.5"/>
  <text x="450" y="458" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">57K writes/s + 5.7M reads/s at peak</text>
  <line x1="610" y1="451" x2="610" y2="459" stroke="#334155" stroke-width="0.5"/>
  <text x="750" y="458" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">P99 redirect &lt;50ms · 99.99% uptime</text>
</svg>
