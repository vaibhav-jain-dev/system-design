<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" font-family="Inter,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="700">Embeddings &amp; Vector Search  —  Cheat Sheet</text>

  <!-- ── Top: What are embeddings ── -->
  <rect x="18" y="42" width="864" height="120" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="450" y="62" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Text → Dense Vector  (Semantic Meaning Encoded as Numbers)</text>

  <!-- Text items -->
  <rect x="30" y="74" width="130" height="32" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="95" y="95" font-family="monospace" font-size="9" fill="#1D4ED8" text-anchor="middle">"The cat sat"</text>
  <rect x="30" y="112" width="130" height="32" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="95" y="133" font-family="monospace" font-size="9" fill="#1D4ED8" text-anchor="middle">"A feline rested"</text>

  <path d="M 162 91 L 192 91" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="189,87 197,91 189,95" fill="#3B82F6"/>
  <path d="M 162 128 L 192 128" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="189,124 197,128 189,132" fill="#3B82F6"/>

  <!-- Embedding model -->
  <rect x="194" y="74" width="130" height="70" rx="5" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="259" y="94" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" text-anchor="middle" font-weight="600">Embedding</text>
  <text x="259" y="108" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" text-anchor="middle">Model</text>
  <text x="259" y="124" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">text-embedding-3</text>
  <text x="259" y="136" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">1536-dim output</text>

  <path d="M 326 91 L 356 91" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="353,87 361,91 353,95" fill="#7C3AED"/>
  <path d="M 326 128 L 356 128" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="353,124 361,128 353,132" fill="#7C3AED"/>

  <!-- Vectors -->
  <rect x="358" y="74" width="200" height="32" rx="5" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="458" y="89" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">[0.12, -0.43, 0.81, 0.02, ...]</text>
  <text x="458" y="100" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">1536 dims</text>
  <rect x="358" y="112" width="200" height="32" rx="5" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="458" y="127" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">[0.11, -0.44, 0.80, 0.03, ...]</text>
  <text x="458" y="138" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">very similar vectors ↑</text>

  <!-- Similarity result -->
  <rect x="570" y="74" width="276" height="70" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="708" y="94" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="600">Cosine Similarity</text>
  <text x="708" y="112" font-family="monospace" font-size="11" fill="#059669" text-anchor="middle" font-weight="700">similarity = 0.97</text>
  <text x="708" y="130" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">≈ same meaning even different words</text>

  <!-- ── Bottom Left: Vector DB internals ── -->
  <rect x="18" y="174" width="420" height="278" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="228" y="194" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Vector DB Internals  (ANN Search)</text>

  <!-- HNSW explanation -->
  <rect x="30" y="204" width="396" height="60" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="42" y="220" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" font-weight="600">HNSW  (Hierarchical Navigable Small World)</text>
  <text x="42" y="236" font-family="monospace" font-size="8.5" fill="#64748B">Multi-layer graph: top layers = highway, bottom = local</text>
  <text x="42" y="250" font-family="monospace" font-size="8.5" fill="#64748B">Search: start top, greedily descend to nearest neighbors</text>
  <text x="42" y="262" font-family="monospace" font-size="8" fill="#1D4ED8">O(log N) search · near-exact recall · used by pgvector, Qdrant</text>

  <!-- IVF-PQ -->
  <rect x="30" y="270" width="396" height="56" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="42" y="286" font-family="Inter,sans-serif" font-size="9" fill="#065F46" font-weight="600">IVF-PQ  (Inverted File + Product Quantization)</text>
  <text x="42" y="302" font-family="monospace" font-size="8.5" fill="#64748B">Cluster vectors into cells (IVF) · compress each (PQ)</text>
  <text x="42" y="316" font-family="monospace" font-size="8.5" fill="#64748B">Search only nearby cells → fast but approx</text>
  <text x="42" y="326" font-family="monospace" font-size="8" fill="#065F46">Lower memory (4–8× compression) · used by Faiss, Pinecone</text>

  <!-- Metrics -->
  <rect x="30" y="332" width="396" height="44" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="42" y="348" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" font-weight="600">Distance Metrics</text>
  <text x="42" y="364" font-family="monospace" font-size="8.5" fill="#64748B">Cosine: angle between vectors (text/images)</text>
  <text x="42" y="376" font-family="monospace" font-size="8.5" fill="#64748B">Euclidean: distance (point clouds)  ·  Dot product: fast</text>

  <rect x="30" y="382" width="396" height="62" rx="5" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="228" y="398" font-family="Inter,sans-serif" font-size="9" fill="#374151" text-anchor="middle" font-weight="600">Vector DB Options</text>
  <text x="228" y="414" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Pinecone (managed) · Weaviate · Qdrant · Chroma (local)</text>
  <text x="228" y="428" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">pgvector (PostgreSQL ext) · Redis Vector · Elasticsearch</text>
  <text x="228" y="440" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">hybrid: keyword + vector search (BM25 + ANN)</text>

  <!-- ── Bottom Right: Use cases ── -->
  <rect x="450" y="174" width="432" height="278" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="666" y="194" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Use Cases  +  Key Points</text>

  <rect x="462" y="204" width="408" height="44" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="472" y="220" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" font-weight="600">Semantic Search</text>
  <text x="472" y="236" font-family="monospace" font-size="8.5" fill="#64748B">query "cheap flights" → finds "discount airfare"</text>
  <text x="472" y="246" font-family="monospace" font-size="8" fill="#64748B">beyond keyword match · understands intent</text>

  <rect x="462" y="254" width="408" height="44" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="472" y="270" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" font-weight="600">Recommendation Systems</text>
  <text x="472" y="286" font-family="monospace" font-size="8.5" fill="#64748B">embed items → find similar items/users</text>
  <text x="472" y="296" font-family="monospace" font-size="8" fill="#64748B">collaborative filtering at scale</text>

  <rect x="462" y="304" width="408" height="44" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="472" y="320" font-family="Inter,sans-serif" font-size="9" fill="#065F46" font-weight="600">Deduplication / Clustering</text>
  <text x="472" y="336" font-family="monospace" font-size="8.5" fill="#64748B">near-duplicate detection · topic clustering</text>
  <text x="472" y="346" font-family="monospace" font-size="8" fill="#64748B">sim &gt; 0.95 threshold → mark as duplicate</text>

  <rect x="462" y="354" width="408" height="44" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="472" y="370" font-family="Inter,sans-serif" font-size="9" fill="#92400E" font-weight="600">Anomaly Detection</text>
  <text x="472" y="386" font-family="monospace" font-size="8.5" fill="#64748B">item far from cluster center → anomalous</text>
  <text x="472" y="396" font-family="monospace" font-size="8" fill="#64748B">fraud detection · log anomalies</text>

  <rect x="462" y="404" width="408" height="40" rx="5" fill="#FCE7F3" stroke="#FBCFE8" stroke-width="1"/>
  <text x="472" y="420" font-family="Inter,sans-serif" font-size="9" fill="#9D174D" font-weight="600">Key Interview Point</text>
  <text x="472" y="436" font-family="monospace" font-size="8.5" fill="#64748B">Embedding dim: larger = better quality, more memory</text>

  <rect x="462" y="450" width="408" height="0" rx="0" fill="none"/>
</svg>
