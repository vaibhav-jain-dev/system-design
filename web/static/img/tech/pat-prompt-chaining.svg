<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" font-family="Inter,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="700">Prompt Chaining  —  Cheat Sheet</text>

  <!-- ── Top: Sequential chain ── -->
  <rect x="18" y="42" width="864" height="110" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="450" y="62" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Sequential Chain  (output of step N becomes input of step N+1)</text>

  <rect x="30" y="72" width="138" height="64" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1.5"/>
  <text x="99" y="92" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle" font-weight="600">Step 1: Extract</text>
  <text x="99" y="108" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">"Extract key facts</text>
  <text x="99" y="122" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">from article"</text>

  <path d="M 170 104 L 190 104" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="187,100 195,104 187,108" fill="#3B82F6"/>

  <rect x="192" y="72" width="138" height="64" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="261" y="92" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" text-anchor="middle" font-weight="600">Step 2: Translate</text>
  <text x="261" y="108" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">"Translate facts</text>
  <text x="261" y="122" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">to Spanish"</text>

  <path d="M 332 104 L 352 104" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="349,100 357,104 349,108" fill="#7C3AED"/>

  <rect x="354" y="72" width="138" height="64" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="423" y="92" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">Step 3: Format</text>
  <text x="423" y="108" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">"Format as</text>
  <text x="423" y="122" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">bullet points"</text>

  <path d="M 494 104 L 514 104" stroke="#059669" stroke-width="2"/>
  <polygon points="511,100 519,104 511,108" fill="#059669"/>

  <rect x="516" y="72" width="138" height="64" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="585" y="92" font-family="Inter,sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="600">Step 4: Validate</text>
  <text x="585" y="108" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">"Check accuracy,</text>
  <text x="585" y="122" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">flag issues"</text>

  <path d="M 656 104 L 676 104" stroke="#D97706" stroke-width="2"/>
  <polygon points="673,100 681,104 673,108" fill="#D97706"/>

  <rect x="678" y="72" width="192" height="64" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="774" y="92" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">Final Output</text>
  <text x="774" y="108" font-family="monospace" font-size="8" fill="#064E3B" text-anchor="middle">validated Spanish</text>
  <text x="774" y="122" font-family="monospace" font-size="8" fill="#064E3B" text-anchor="middle">bullet point summary</text>

  <!-- ── Bottom Left: Patterns ── -->
  <rect x="18" y="164" width="420" height="288" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="228" y="184" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Chain Patterns</text>

  <!-- Sequential -->
  <rect x="30" y="194" width="396" height="50" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="42" y="210" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" font-weight="600">Sequential  (most common)</text>
  <text x="42" y="226" font-family="monospace" font-size="8.5" fill="#64748B">A → B → C · each step refines/transforms</text>
  <text x="42" y="238" font-family="monospace" font-size="8" fill="#64748B">use when: complex task needs decomposition into subtasks</text>

  <!-- Parallel -->
  <rect x="30" y="250" width="396" height="50" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="42" y="266" font-family="Inter,sans-serif" font-size="9" fill="#065F46" font-weight="600">Parallel  (fan-out/fan-in)</text>
  <text x="42" y="282" font-family="monospace" font-size="8.5" fill="#64748B">A → [B1, B2, B3] → C (merge results)</text>
  <text x="42" y="294" font-family="monospace" font-size="8" fill="#64748B">use when: independent sub-tasks can run concurrently</text>

  <!-- Conditional -->
  <rect x="30" y="306" width="396" height="50" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="42" y="322" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" font-weight="600">Conditional  (routing)</text>
  <text x="42" y="338" font-family="monospace" font-size="8.5" fill="#64748B">A → classify → route to B1 or B2 based on output</text>
  <text x="42" y="350" font-family="monospace" font-size="8" fill="#64748B">use when: different tasks need different handling</text>

  <!-- Loop/retry -->
  <rect x="30" y="362" width="396" height="50" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="42" y="378" font-family="Inter,sans-serif" font-size="9" fill="#92400E" font-weight="600">Loop / Retry  (self-correction)</text>
  <text x="42" y="394" font-family="monospace" font-size="8.5" fill="#64748B">A → validate → if fail: retry A with feedback</text>
  <text x="42" y="406" font-family="monospace" font-size="8" fill="#64748B">use when: output needs quality check + correction</text>

  <rect x="30" y="418" width="396" height="26" rx="4" fill="#F1F5F9"/>
  <text x="228" y="435" font-family="monospace" font-size="8.5" fill="#475569" text-anchor="middle">Each step: focused prompt + clear output format → reliable</text>

  <!-- ── Bottom Right: Key Points ── -->
  <rect x="450" y="164" width="432" height="288" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="666" y="184" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Design Principles  +  Tradeoffs</text>

  <rect x="462" y="194" width="408" height="52" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="472" y="210" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" font-weight="600">Why Chain?</text>
  <text x="472" y="226" font-family="monospace" font-size="8.5" fill="#64748B">Complex tasks exceed context window → decompose</text>
  <text x="472" y="240" font-family="monospace" font-size="8" fill="#64748B">Each step can be tested independently</text>

  <rect x="462" y="252" width="408" height="52" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="472" y="268" font-family="Inter,sans-serif" font-size="9" fill="#065F46" font-weight="600">Output Format Control</text>
  <text x="472" y="284" font-family="monospace" font-size="8.5" fill="#64748B">Use JSON output per step → structured, parseable</text>
  <text x="472" y="296" font-family="monospace" font-size="8" fill="#64748B">Pydantic / schema validation between steps</text>

  <rect x="462" y="310" width="408" height="52" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="472" y="326" font-family="Inter,sans-serif" font-size="9" fill="#92400E" font-weight="600">Cost &amp; Latency</text>
  <text x="472" y="342" font-family="monospace" font-size="8.5" fill="#64748B">N steps = N LLM calls = N × latency (sequential)</text>
  <text x="472" y="354" font-family="monospace" font-size="8" fill="#64748B">Parallel: fan-out cuts wall time but adds complexity</text>

  <rect x="462" y="368" width="408" height="52" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="472" y="384" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" font-weight="600">When to Use vs Agent</text>
  <text x="472" y="400" font-family="monospace" font-size="8.5" fill="#64748B">Chaining: predictable DAG of steps · deterministic</text>
  <text x="472" y="412" font-family="monospace" font-size="8" fill="#64748B">Agent: dynamic steps · unknown # of iterations needed</text>

  <rect x="462" y="426" width="408" height="18" rx="4" fill="#F1F5F9"/>
  <text x="666" y="439" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">LangChain · LlamaIndex · Claude API message arrays</text>
</svg>
