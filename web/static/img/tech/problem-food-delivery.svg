<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- Row labels -->
  <rect x="18" y="18" width="100" height="20" rx="4" fill="#D1FAE5"/>
  <text x="68" y="32" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">USER FLOW</text>
  <rect x="18" y="188" width="120" height="20" rx="4" fill="#E0E7FF"/>
  <text x="78" y="202" font-family="Inter,sans-serif" font-size="10" fill="#4338CA" text-anchor="middle" font-weight="700">PLATFORM CORE</text>
  <rect x="18" y="358" width="130" height="20" rx="4" fill="#FEF3C7"/>
  <text x="83" y="372" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="700">DELIVERY LAYER</text>

  <!-- ── USER FLOW ── -->
  <!-- Customer -->
  <rect x="40" y="50" width="150" height="120" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="115" y="70" font-family="Inter,sans-serif" font-size="10" fill="#059669" text-anchor="middle" font-weight="700">CUSTOMER</text>
  <rect x="56" y="80" width="118" height="20" rx="4" fill="#ECFDF5"/>
  <text x="115" y="93" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">Browse restaurants</text>
  <rect x="56" y="106" width="118" height="20" rx="4" fill="#D1FAE5"/>
  <text x="115" y="119" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">Place order</text>
  <rect x="56" y="132" width="118" height="20" rx="4" fill="#ECFDF5"/>
  <text x="115" y="145" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">Track delivery 📍</text>

  <!-- Arrow -->
  <path d="M 192 110 L 240 110" stroke="#059669" stroke-width="2"/>
  <polygon points="237,106 245,110 237,114" fill="#059669"/>

  <!-- Restaurant -->
  <rect x="250" y="50" width="150" height="120" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="325" y="70" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="700">RESTAURANT</text>
  <rect x="266" y="80" width="118" height="20" rx="4" fill="#FEF3C7"/>
  <text x="325" y="93" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">Accept/reject order</text>
  <rect x="266" y="106" width="118" height="20" rx="4" fill="#FFFBEB"/>
  <text x="325" y="119" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">Prep time estimate</text>
  <rect x="266" y="132" width="118" height="20" rx="4" fill="#FEF3C7"/>
  <text x="325" y="145" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">Mark ready</text>

  <!-- Arrow -->
  <path d="M 402 110 L 450 110" stroke="#D97706" stroke-width="2"/>
  <polygon points="447,106 455,110 447,114" fill="#D97706"/>

  <!-- Order lifecycle -->
  <rect x="460" y="42" width="420" height="135" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="670" y="62" font-family="Inter,sans-serif" font-size="10" fill="#4338CA" text-anchor="middle" font-weight="700">ORDER LIFECYCLE (State Machine)</text>

  <!-- State flow -->
  <rect x="480" y="78" width="68" height="28" rx="6" fill="#E0E7FF" stroke="#818CF8" stroke-width="1"/>
  <text x="514" y="96" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">PLACED</text>
  <path d="M 550 92 L 568 92" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="565,88 573,92 565,96" fill="#6366F1"/>

  <rect x="576" y="78" width="80" height="28" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="616" y="96" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">ACCEPTED</text>
  <path d="M 658 92 L 676 92" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="673,88 681,92 673,96" fill="#D97706"/>

  <rect x="684" y="78" width="72" height="28" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="720" y="96" font-family="monospace" font-size="8" fill="#1D4ED8" text-anchor="middle">PREPARING</text>
  <path d="M 758 92 L 776 92" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="773,88 781,92 773,96" fill="#3B82F6"/>

  <rect x="784" y="78" width="80" height="28" rx="6" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="824" y="96" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">READY</text>

  <!-- Second row -->
  <rect x="480" y="120" width="84" height="28" rx="6" fill="#E0E7FF" stroke="#818CF8" stroke-width="1"/>
  <text x="522" y="138" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">PICKED UP</text>
  <path d="M 566 134 L 584 134" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="581,130 589,134 581,138" fill="#6366F1"/>

  <rect x="592" y="120" width="84" height="28" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="634" y="138" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">EN ROUTE</text>
  <path d="M 678 134 L 696 134" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="693,130 701,134 693,138" fill="#D97706"/>

  <rect x="704" y="120" width="84" height="28" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="746" y="138" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">DELIVERED</text>

  <path d="M 824 108 L 824 118 Q 824 120 822 120 L 478 120 Q 476 120 476 122 L 476 128" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ── PLATFORM CORE ── -->
  <!-- Order Service -->
  <rect x="40" y="218" width="180" height="120" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="130" y="238" font-family="Inter,sans-serif" font-size="10" fill="#4338CA" text-anchor="middle" font-weight="700">ORDER SERVICE</text>
  <text x="130" y="260" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Saga orchestrator</text>
  <text x="130" y="278" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Idempotency keys</text>
  <rect x="56" y="290" width="148" height="22" rx="4" fill="#E0E7FF"/>
  <text x="130" y="305" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">DynamoDB (order table)</text>
  <text x="130" y="324" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">PK: order_id · GSI: user_id</text>

  <!-- Matching Service -->
  <rect x="260" y="218" width="180" height="120" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="350" y="238" font-family="Inter,sans-serif" font-size="10" fill="#059669" text-anchor="middle" font-weight="700">MATCHING SERVICE</text>
  <text x="350" y="260" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Geohash lookup</text>
  <text x="350" y="278" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Driver scoring</text>
  <rect x="276" y="290" width="148" height="22" rx="4" fill="#ECFDF5"/>
  <text x="350" y="305" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">Redis (driver locations)</text>
  <text x="350" y="324" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">GEOADD · GEORADIUS 3km</text>

  <!-- ETA Service -->
  <rect x="480" y="218" width="180" height="120" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="570" y="238" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="700">ETA + SURGE</text>
  <text x="570" y="260" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">ML-based ETA</text>
  <text x="570" y="278" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Dynamic pricing</text>
  <rect x="496" y="290" width="148" height="22" rx="4" fill="#FEF3C7"/>
  <text x="570" y="305" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">supply/demand ratio</text>
  <text x="570" y="324" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">surge = 1.0x → 2.5x</text>

  <!-- Notification Service -->
  <rect x="700" y="218" width="180" height="120" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/>
  <text x="790" y="238" font-family="Inter,sans-serif" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="700">NOTIFICATIONS</text>
  <text x="790" y="260" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Push + SMS + Email</text>
  <text x="790" y="278" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Order status updates</text>
  <rect x="716" y="290" width="148" height="22" rx="4" fill="#FEE2E2"/>
  <text x="790" y="305" font-family="monospace" font-size="8" fill="#991B1B" text-anchor="middle">SQS → Lambda fan-out</text>

  <!-- Arrows between services -->
  <path d="M 222 278 L 258 278" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="255,274 263,278 255,282" fill="#6366F1"/>
  <path d="M 442 278 L 478 278" stroke="#059669" stroke-width="1.5"/>
  <polygon points="475,274 483,278 475,282" fill="#059669"/>
  <path d="M 662 278 L 698 278" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="695,274 703,278 695,282" fill="#D97706"/>

  <!-- ── DELIVERY LAYER ── -->
  <!-- Driver tracking -->
  <rect x="100" y="385" width="300" height="60" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="250" y="405" font-family="Inter,sans-serif" font-size="10" fill="#059669" text-anchor="middle" font-weight="700">LIVE TRACKING</text>
  <text x="250" y="425" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">GPS updates every 4s → Redis Geo → WebSocket push to customer</text>
  <text x="250" y="438" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">50K concurrent deliveries × 0.25 updates/s = 12.5K writes/s</text>

  <!-- Payment -->
  <rect x="440" y="385" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="540" y="405" font-family="Inter,sans-serif" font-size="10" fill="#6D28D9" text-anchor="middle" font-weight="700">PAYMENT (Stripe)</text>
  <text x="540" y="425" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Auth on order → Capture on delivery</text>
  <text x="540" y="438" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">Idempotency key = order_id</text>

  <!-- Analytics -->
  <rect x="680" y="385" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="1.5"/>
  <text x="780" y="405" font-family="Inter,sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="700">ANALYTICS</text>
  <text x="780" y="425" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Kafka → Flink → dashboard</text>
  <text x="780" y="438" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">ETA accuracy, driver utilization</text>
</svg>
