<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <rect x="18" y="18" width="130" height="20" rx="4" fill="#E0E7FF"/>
  <text x="83" y="32" font-family="Inter,sans-serif" font-size="10" fill="#4338CA" text-anchor="middle" font-weight="700">CALENDAR CORE</text>

  <!-- Calendar Grid -->
  <rect x="40" y="50" width="340" height="260" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="210" y="70" font-family="Inter,sans-serif" font-size="11" fill="#4338CA" text-anchor="middle" font-weight="700">WEEK VIEW — March 10–14</text>

  <!-- Day headers -->
  <rect x="100" y="82" width="56" height="20" rx="3" fill="#E0E7FF"/>
  <text x="128" y="96" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">MON</text>
  <rect x="160" y="82" width="56" height="20" rx="3" fill="#E0E7FF"/>
  <text x="188" y="96" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">TUE</text>
  <rect x="220" y="82" width="56" height="20" rx="3" fill="#E0E7FF"/>
  <text x="248" y="96" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">WED</text>
  <rect x="280" y="82" width="56" height="20" rx="3" fill="#E0E7FF"/>
  <text x="308" y="96" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">THU</text>
  <rect x="340" y="82" width="36" height="20" rx="3" fill="#E0E7FF"/>
  <text x="358" y="96" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">FRI</text>

  <!-- Time labels -->
  <text x="76" y="122" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="end">9:00</text>
  <text x="76" y="162" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="end">10:00</text>
  <text x="76" y="202" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="end">11:00</text>
  <text x="76" y="242" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="end">12:00</text>
  <text x="76" y="282" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="end">1:00</text>

  <!-- Grid lines -->
  <line x1="88" y1="116" x2="376" y2="116" stroke="#F0F1F3" stroke-width="1"/>
  <line x1="88" y1="156" x2="376" y2="156" stroke="#F0F1F3" stroke-width="1"/>
  <line x1="88" y1="196" x2="376" y2="196" stroke="#F0F1F3" stroke-width="1"/>
  <line x1="88" y1="236" x2="376" y2="236" stroke="#F0F1F3" stroke-width="1"/>
  <line x1="88" y1="276" x2="376" y2="276" stroke="#F0F1F3" stroke-width="1"/>

  <!-- Events -->
  <rect x="100" y="116" width="56" height="60" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="128" y="132" font-family="Inter,sans-serif" font-size="7" fill="#1D4ED8" text-anchor="middle" font-weight="600">Team Standup</text>
  <text x="128" y="145" font-family="monospace" font-size="6" fill="#64748B" text-anchor="middle">9:00–10:30</text>
  <text x="128" y="158" font-family="monospace" font-size="6" fill="#64748B" text-anchor="middle">recurring</text>

  <rect x="160" y="136" width="56" height="40" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="188" y="152" font-family="Inter,sans-serif" font-size="7" fill="#065F46" text-anchor="middle" font-weight="600">1:1 w/ Alice</text>
  <text x="188" y="165" font-family="monospace" font-size="6" fill="#64748B" text-anchor="middle">9:30–10:00</text>

  <rect x="220" y="196" width="56" height="60" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="248" y="212" font-family="Inter,sans-serif" font-size="7" fill="#92400E" text-anchor="middle" font-weight="600">Design Review</text>
  <text x="248" y="225" font-family="monospace" font-size="6" fill="#64748B" text-anchor="middle">11:00–12:00</text>
  <text x="248" y="238" font-family="monospace" font-size="6" fill="#64748B" text-anchor="middle">5 attendees</text>

  <rect x="280" y="236" width="56" height="40" rx="4" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="308" y="252" font-family="Inter,sans-serif" font-size="7" fill="#6D28D9" text-anchor="middle" font-weight="600">Interview</text>
  <text x="308" y="265" font-family="monospace" font-size="6" fill="#64748B" text-anchor="middle">12:00–1:00</text>

  <!-- Conflict indicator -->
  <rect x="100" y="136" width="56" height="16" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" opacity="0.7"/>
  <text x="128" y="147" font-family="monospace" font-size="6" fill="#DC2626" text-anchor="middle" font-weight="600">CONFLICT</text>

  <!-- ── ARCHITECTURE (right) ── -->
  <rect x="420" y="50" width="460" height="130" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="650" y="70" font-family="Inter,sans-serif" font-size="11" fill="#059669" text-anchor="middle" font-weight="700">RECURRING EVENTS ENGINE</text>

  <rect x="440" y="84" width="120" height="40" rx="4" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="500" y="100" font-family="Inter,sans-serif" font-size="8" fill="#065F46" text-anchor="middle" font-weight="600">RRULE Parser</text>
  <text x="500" y="116" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">FREQ=WEEKLY;BYDAY=MO</text>

  <path d="M 562 104 L 588 104" stroke="#059669" stroke-width="1.5"/>
  <polygon points="585,100 593,104 585,108" fill="#059669"/>

  <rect x="596" y="84" width="120" height="40" rx="4" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="656" y="100" font-family="Inter,sans-serif" font-size="8" fill="#065F46" text-anchor="middle" font-weight="600">Instance Generator</text>
  <text x="656" y="116" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">virtual expansion</text>

  <path d="M 718 104 L 744 104" stroke="#059669" stroke-width="1.5"/>
  <polygon points="741,100 749,104 741,108" fill="#059669"/>

  <rect x="752" y="84" width="110" height="40" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="807" y="100" font-family="Inter,sans-serif" font-size="8" fill="#065F46" text-anchor="middle" font-weight="600">Exception Store</text>
  <text x="807" y="116" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">"skip Mar 17"</text>

  <text x="650" y="158" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">Store RRULE once → generate instances on-the-fly → override with exceptions</text>

  <!-- Notification / Reminders -->
  <rect x="420" y="200" width="220" height="110" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="530" y="220" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="700">REMINDERS</text>
  <rect x="436" y="234" width="188" height="24" rx="4" fill="#FEF3C7"/>
  <text x="530" y="250" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">SQS delay queue (15 min before)</text>
  <rect x="436" y="264" width="188" height="24" rx="4" fill="#FFFBEB"/>
  <text x="530" y="280" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">Push + Email + Calendar sync</text>
  <text x="530" y="300" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">10M reminders/day at peak</text>

  <!-- Conflict Detection -->
  <rect x="660" y="200" width="220" height="110" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/>
  <text x="770" y="220" font-family="Inter,sans-serif" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="700">CONFLICT DETECTION</text>
  <rect x="676" y="234" width="188" height="24" rx="4" fill="#FEE2E2"/>
  <text x="770" y="250" font-family="monospace" font-size="8" fill="#991B1B" text-anchor="middle">Interval overlap check</text>
  <rect x="676" y="264" width="188" height="24" rx="4" fill="#FEE2E2"/>
  <text x="770" y="280" font-family="monospace" font-size="8" fill="#991B1B" text-anchor="middle">start_A &lt; end_B AND start_B &lt; end_A</text>
  <text x="770" y="300" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">O(N) per day · cached per user</text>

  <!-- Data Model -->
  <rect x="40" y="330" width="840" height="110" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="1"/>
  <text x="460" y="350" font-family="Inter,sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="700">DATA MODEL (DynamoDB)</text>

  <rect x="60" y="364" width="200" height="60" rx="4" fill="#F1F5F9" stroke="#E2E5EA" stroke-width="1"/>
  <text x="160" y="380" font-family="Inter,sans-serif" font-size="9" fill="#475569" text-anchor="middle" font-weight="600">events</text>
  <text x="160" y="396" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">PK: user_id · SK: event_id</text>
  <text x="160" y="412" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">rrule, start, end, title</text>

  <rect x="290" y="364" width="200" height="60" rx="4" fill="#F1F5F9" stroke="#E2E5EA" stroke-width="1"/>
  <text x="390" y="380" font-family="Inter,sans-serif" font-size="9" fill="#475569" text-anchor="middle" font-weight="600">attendees</text>
  <text x="390" y="396" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">PK: event_id · SK: user_id</text>
  <text x="390" y="412" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">rsvp_status, role</text>

  <rect x="520" y="364" width="200" height="60" rx="4" fill="#F1F5F9" stroke="#E2E5EA" stroke-width="1"/>
  <text x="620" y="380" font-family="Inter,sans-serif" font-size="9" fill="#475569" text-anchor="middle" font-weight="600">calendar_view (GSI)</text>
  <text x="620" y="396" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">PK: user_id#YYYY-MM</text>
  <text x="620" y="412" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">SK: start_time · fast range query</text>

  <rect x="750" y="364" width="110" height="60" rx="4" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="805" y="380" font-family="Inter,sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="600">Redis cache</text>
  <text x="805" y="396" font-family="monospace" font-size="7" fill="#92400E" text-anchor="middle">user → this week</text>
  <text x="805" y="412" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">TTL: 1 hour</text>
</svg>
