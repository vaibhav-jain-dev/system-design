<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- Title area -->
  <rect x="18" y="18" width="140" height="20" rx="4" fill="#FEE2E2"/>
  <text x="88" y="32" font-family="Inter,sans-serif" font-size="10" fill="#991B1B" text-anchor="middle" font-weight="700">CONCURRENCY CORE</text>

  <!-- ── SEAT MAP (left side) ── -->
  <rect x="40" y="50" width="280" height="200" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="180" y="70" font-family="Inter,sans-serif" font-size="11" fill="#4338CA" text-anchor="middle" font-weight="700">VENUE SEAT MAP</text>

  <!-- Seat grid -->
  <g transform="translate(60, 82)">
    <!-- Row A -->
    <text x="-8" y="14" font-family="monospace" font-size="9" fill="#94A3B8">A</text>
    <rect x="8" y="2" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="32" y="2" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="56" y="2" width="20" height="18" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="80" y="2" width="20" height="18" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="104" y="2" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="128" y="2" width="20" height="18" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <rect x="152" y="2" width="20" height="18" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <rect x="176" y="2" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="200" y="2" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="224" y="2" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>

    <!-- Row B -->
    <text x="-8" y="38" font-family="monospace" font-size="9" fill="#94A3B8">B</text>
    <rect x="8" y="26" width="20" height="18" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <rect x="32" y="26" width="20" height="18" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <rect x="56" y="26" width="20" height="18" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <rect x="80" y="26" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="104" y="26" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="128" y="26" width="20" height="18" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="152" y="26" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="176" y="26" width="20" height="18" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <rect x="200" y="26" width="20" height="18" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <rect x="224" y="26" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>

    <!-- Row C -->
    <text x="-8" y="62" font-family="monospace" font-size="9" fill="#94A3B8">C</text>
    <rect x="8" y="50" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="32" y="50" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="56" y="50" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="80" y="50" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="104" y="50" width="20" height="18" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <rect x="128" y="50" width="20" height="18" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <rect x="152" y="50" width="20" height="18" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <rect x="176" y="50" width="20" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <rect x="200" y="50" width="20" height="18" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="224" y="50" width="20" height="18" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  </g>

  <!-- Legend -->
  <rect x="60" y="186" width="12" height="12" rx="2" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="78" y="196" font-family="monospace" font-size="8" fill="#065F46">Available</text>
  <rect x="130" y="186" width="12" height="12" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="148" y="196" font-family="monospace" font-size="8" fill="#92400E">Locked (5m)</text>
  <rect x="210" y="186" width="12" height="12" rx="2" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="228" y="196" font-family="monospace" font-size="8" fill="#991B1B">Sold</text>

  <!-- Stage label -->
  <rect x="110" y="210" width="140" height="22" rx="4" fill="#F1F5F9"/>
  <text x="180" y="225" font-family="Inter,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">10,000 seats · 50K users at drop</text>

  <!-- ── BOOKING FLOW (right side) ── -->
  <rect x="360" y="50" width="520" height="200" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="620" y="70" font-family="Inter,sans-serif" font-size="11" fill="#92400E" text-anchor="middle" font-weight="700">BOOKING FLOW (Optimistic Locking)</text>

  <!-- Step 1: Select -->
  <rect x="380" y="86" width="120" height="60" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="440" y="104" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle" font-weight="600">1. SELECT SEATS</text>
  <text x="440" y="120" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">Read seat status</text>
  <text x="440" y="133" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">from Redis cache</text>

  <path d="M 502 116 L 524 116" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="521,112 529,116 521,120" fill="#6366F1"/>

  <!-- Step 2: Lock -->
  <rect x="532" y="86" width="120" height="60" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="592" y="104" font-family="Inter,sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="600">2. LOCK (5 min)</text>
  <text x="592" y="120" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">Redis SETNX + TTL</text>
  <text x="592" y="133" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">seat:A3 → user_42</text>

  <path d="M 654 116 L 676 116" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="673,112 681,116 673,120" fill="#D97706"/>

  <!-- Step 3: Pay -->
  <rect x="684" y="86" width="120" height="60" rx="6" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="744" y="104" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" text-anchor="middle" font-weight="600">3. PAYMENT</text>
  <text x="744" y="120" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">Stripe auth hold</text>
  <text x="744" y="133" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">idempotency key</text>

  <!-- Confirm or release -->
  <rect x="532" y="164" width="120" height="40" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="592" y="180" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">4a. CONFIRM</text>
  <text x="592" y="196" font-family="monospace" font-size="7" fill="#065F46" text-anchor="middle">DynamoDB write + QR</text>

  <rect x="684" y="164" width="120" height="40" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="744" y="180" font-family="Inter,sans-serif" font-size="9" fill="#991B1B" text-anchor="middle" font-weight="600">4b. TIMEOUT</text>
  <text x="744" y="196" font-family="monospace" font-size="7" fill="#991B1B" text-anchor="middle">TTL expires → auto-release</text>

  <path d="M 744 148 L 744 162" stroke="#7C3AED" stroke-width="1.5"/>
  <polygon points="740,159 744,167 748,159" fill="#7C3AED"/>
  <path d="M 684 148 L 592 162" stroke="#059669" stroke-width="1.5"/>
  <polygon points="594,157 589,165 597,163" fill="#059669"/>

  <!-- Arrow for timeout path -->
  <path d="M 806 184 L 830 184 L 830 116 L 856 116" stroke="#DC2626" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="840" y="104" width="36" height="24" rx="4" fill="#FEE2E2"/>
  <text x="858" y="119" font-family="monospace" font-size="8" fill="#DC2626" text-anchor="middle">retry</text>

  <!-- ── BOTTOM: Infrastructure ── -->
  <rect x="40" y="270" width="260" height="170" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/>
  <text x="170" y="290" font-family="Inter,sans-serif" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="700">RACE CONDITION PREVENTION</text>
  <rect x="56" y="300" width="228" height="28" rx="4" fill="#FEE2E2"/>
  <text x="170" y="318" font-family="monospace" font-size="8" fill="#991B1B" text-anchor="middle">50K users click "Buy" at same instant</text>
  <rect x="56" y="336" width="228" height="24" rx="4" fill="#E0E7FF"/>
  <text x="170" y="352" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">Redis SETNX = atomic lock (no races)</text>
  <rect x="56" y="368" width="228" height="24" rx="4" fill="#D1FAE5"/>
  <text x="170" y="384" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">DynamoDB condition: status = AVAILABLE</text>
  <rect x="56" y="400" width="228" height="24" rx="4" fill="#FEF3C7"/>
  <text x="170" y="416" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">Double-booking = 0% with this design</text>

  <!-- Queue / waiting room -->
  <rect x="340" y="270" width="260" height="170" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="470" y="290" font-family="Inter,sans-serif" font-size="10" fill="#4338CA" text-anchor="middle" font-weight="700">VIRTUAL WAITING ROOM</text>
  <rect x="356" y="304" width="228" height="40" rx="4" fill="#E0E7FF"/>
  <text x="470" y="322" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">CloudFront → SQS queue → drip N/sec</text>
  <text x="470" y="336" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">absorbs 500K spike → feeds 5K/s to backend</text>
  <rect x="380" y="356" width="50" height="24" rx="12" fill="#E0E7FF" stroke="#818CF8" stroke-width="1"/>
  <text x="405" y="372" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">👤</text>
  <rect x="436" y="356" width="50" height="24" rx="12" fill="#E0E7FF" stroke="#818CF8" stroke-width="1"/>
  <text x="461" y="372" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">👤</text>
  <rect x="492" y="356" width="50" height="24" rx="12" fill="#E0E7FF" stroke="#818CF8" stroke-width="1"/>
  <text x="517" y="372" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">👤</text>
  <text x="470" y="404" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">Position: #4,231 · Est. wait: 3 min</text>
  <text x="470" y="424" font-family="Inter,sans-serif" font-size="8" fill="#6366F1" text-anchor="middle" font-weight="600">Fair FIFO ordering prevents bot scalping</text>

  <!-- QR / Ticket -->
  <rect x="640" y="270" width="240" height="170" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="760" y="290" font-family="Inter,sans-serif" font-size="10" fill="#059669" text-anchor="middle" font-weight="700">TICKET DELIVERY</text>
  <rect x="680" y="308" width="120" height="100" rx="8" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <rect x="700" y="318" width="80" height="80" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="740" y="360" font-family="monospace" font-size="20" fill="#059669" text-anchor="middle">QR</text>
  <text x="740" y="380" font-family="monospace" font-size="7" fill="#065F46" text-anchor="middle">signed JWT</text>
  <text x="820" y="340" font-family="monospace" font-size="8" fill="#64748B">Event: Rock Show</text>
  <text x="820" y="356" font-family="monospace" font-size="8" fill="#64748B">Seat: A-3</text>
  <text x="820" y="372" font-family="monospace" font-size="8" fill="#64748B">Date: Mar 15</text>
  <text x="820" y="388" font-family="monospace" font-size="8" fill="#059669" font-weight="600">$85.00</text>
  <text x="760" y="430" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">Apple Wallet + Email + SMS</text>
</svg>
