<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none">
  <defs>
    <linearGradient id="bg-rl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="320" height="160" fill="url(#bg-rl)" rx="10"/>

  <!-- Token Bucket visualization -->
  <!-- Bucket -->
  <path d="M 30 50 L 20 130 L 90 130 L 80 50 Z" fill="#1E293B" stroke="#7C3AED" stroke-width="2"/>
  <!-- Token fill level -->
  <clipPath id="bucket-clip">
    <path d="M 30 50 L 20 130 L 90 130 L 80 50 Z"/>
  </clipPath>
  <rect x="16" y="85" width="78" height="50" fill="#4C1D95" opacity="0.6" clip-path="url(#bucket-clip)"/>
  <!-- Tokens in bucket -->
  <circle cx="40" cy="100" r="6" fill="#A78BFA" opacity="0.9"/>
  <circle cx="58" cy="95" r="6" fill="#A78BFA" opacity="0.9"/>
  <circle cx="72" cy="105" r="6" fill="#A78BFA" opacity="0.9"/>
  <circle cx="46" cy="113" r="6" fill="#7C3AED" opacity="0.7"/>
  <circle cx="64" cy="118" r="6" fill="#7C3AED" opacity="0.7"/>
  <text x="55" y="145" font-family="Inter,sans-serif" font-size="8" fill="#C4B5FD" text-anchor="middle">Token Bucket</text>

  <!-- Incoming tokens (refill) -->
  <text x="110" y="35" font-family="Inter,sans-serif" font-size="8" fill="#6EE7B7">Refill Rate</text>
  <text x="110" y="47" font-family="Inter,sans-serif" font-size="9" fill="#34D399" font-weight="700">100/sec</text>
  <path d="M 55 50 L 55 38" stroke="#10B981" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="51,41 55,33 59,41" fill="#10B981"/>

  <!-- Requests coming in -->
  <text x="108" y="75" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8">Requests</text>
  <!-- Request arrows -->
  <circle cx="120" cy="95" r="5" fill="#2563EB" opacity="0.8"/>
  <circle cx="138" cy="85" r="5" fill="#2563EB" opacity="0.8"/>
  <circle cx="130" cy="108" r="5" fill="#2563EB" opacity="0.8"/>
  <path d="M 120 95 L 92 110" stroke="#2563EB" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <path d="M 138 85 L 92 95" stroke="#2563EB" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <path d="M 130 108 L 92 120" stroke="#2563EB" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- Rate limiter decision gate -->
  <rect x="160" y="65" width="70" height="60" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="185,78 195,90 185,102 175,90" fill="#312E81" stroke="#818CF8" stroke-width="1"/>
  <text x="195" y="88" font-family="Inter,sans-serif" font-size="7" fill="#A5B4FC">Check</text>
  <text x="195" y="98" font-family="Inter,sans-serif" font-size="7" fill="#A5B4FC">Limit?</text>
  <text x="195" y="116" font-family="Inter,sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Rate Limiter</text>

  <!-- Allowed →  -->
  <rect x="252" y="55" width="54" height="28" rx="6" fill="#064E3B" stroke="#10B981" stroke-width="1.5"/>
  <text x="279" y="73" font-family="Inter,sans-serif" font-size="9" fill="#34D399" text-anchor="middle" font-weight="600">✓ 200 OK</text>
  <path d="M 232 78 L 250 70" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="247,66 254,70 247,74" fill="#10B981"/>

  <!-- Rejected → 429 -->
  <rect x="252" y="105" width="54" height="28" rx="6" fill="#450A0A" stroke="#DC2626" stroke-width="1.5"/>
  <text x="279" y="123" font-family="Inter,sans-serif" font-size="9" fill="#F87171" text-anchor="middle" font-weight="600">✗ 429</text>
  <path d="M 232 108 L 250 118" stroke="#DC2626" stroke-width="1.5"/>
  <polygon points="247,114 254,118 247,122" fill="#DC2626"/>

  <!-- Redis counter -->
  <rect x="160" y="138" width="70" height="16" rx="4" fill="#1E293B" stroke="#DC2626" stroke-width="1"/>
  <text x="195" y="149" font-family="Inter,sans-serif" font-size="7.5" fill="#FCA5A5" text-anchor="middle">Redis Counter</text>
</svg>
