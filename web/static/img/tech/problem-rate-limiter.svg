<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <defs>
    <linearGradient id="bg-rl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <clipPath id="bucket-clip">
      <path d="M 345 60 L 333 155 L 415 155 L 403 60 Z"/>
    </clipPath>
  </defs>
  <rect width="900" height="460" fill="url(#bg-rl)" rx="12"/>

  <!-- ── Row labels ── -->
  <text x="18" y="17" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">ALGORITHM LAYER</text>
  <line x1="128" y1="14" x2="882" y2="14" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="18" y="244" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">DECISION GATE</text>
  <line x1="118" y1="241" x2="882" y2="241" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- ══════════════ ROW 1: ALGORITHM LAYER ══════════════ -->

  <!-- Zone 1: Incoming burst -->
  <rect x="18" y="23" width="250" height="205" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="143" y="43" font-family="Inter,sans-serif" font-size="10" fill="#60A5FA" text-anchor="middle" font-weight="600">Incoming Burst</text>
  <circle cx="55"  cy="80"  r="14" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="55"  y="85"  font-family="monospace" font-size="7.5" fill="#60A5FA" text-anchor="middle">REQ</text>
  <circle cx="90"  cy="65"  r="14" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="90"  y="70"  font-family="monospace" font-size="7.5" fill="#60A5FA" text-anchor="middle">REQ</text>
  <circle cx="65"  cy="108" r="14" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="65"  y="113" font-family="monospace" font-size="7.5" fill="#60A5FA" text-anchor="middle">REQ</text>
  <circle cx="100" cy="95"  r="14" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="100" y="100" font-family="monospace" font-size="7.5" fill="#60A5FA" text-anchor="middle">REQ</text>
  <circle cx="55"  cy="135" r="14" fill="#312E3A" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <circle cx="90"  cy="148" r="14" fill="#312E3A" stroke="#6366F1" stroke-width="1.5" opacity="0.35"/>
  <circle cx="65"  cy="165" r="11" fill="#312E3A" stroke="#6366F1" stroke-width="1.5" opacity="0.2"/>
  <rect x="130" y="60" width="125" height="52" rx="6" fill="#1E293B" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="192" y="82" font-family="Inter,sans-serif" font-size="28" fill="#3B82F6" text-anchor="middle" font-weight="700">10K</text>
  <text x="192" y="100" font-family="Inter,sans-serif" font-size="9" fill="#475569" text-anchor="middle">requests/second</text>
  <text x="143" y="190" font-family="Inter,sans-serif" font-size="9" fill="#60A5FA" text-anchor="middle">burst traffic pattern</text>

  <!-- Arrow: burst → Token Bucket -->
  <path d="M 270 107 L 292 107" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="289,103 297,107 289,111" fill="#3B82F6"/>

  <!-- Zone 2: Token Bucket -->
  <rect x="295" y="23" width="305" height="205" rx="8" fill="#1E293B" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="447" y="43" font-family="Inter,sans-serif" font-size="10" fill="#C4B5FD" text-anchor="middle" font-weight="600">Token Bucket</text>
  <!-- Bucket trapezoid -->
  <path d="M 345 58 L 333 155 L 415 155 L 403 58 Z" fill="#1E293B" stroke="#7C3AED" stroke-width="2"/>
  <!-- Token fill (60%) -->
  <rect x="329" y="105" width="90" height="54" fill="#4C1D95" opacity="0.5" clip-path="url(#bucket-clip)"/>
  <!-- Tokens -->
  <circle cx="355" cy="118" r="11" fill="#A78BFA" opacity="0.9"/>
  <circle cx="378" cy="110" r="11" fill="#A78BFA" opacity="0.9"/>
  <circle cx="400" cy="120" r="11" fill="#A78BFA" opacity="0.9"/>
  <circle cx="362" cy="138" r="11" fill="#7C3AED" opacity="0.8"/>
  <circle cx="388" cy="144" r="11" fill="#7C3AED" opacity="0.7"/>
  <!-- Refill arrow -->
  <path d="M 374 26 L 374 55" stroke="#10B981" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="370,31 374,24 378,31" fill="#10B981"/>
  <text x="390" y="34" font-family="Inter,sans-serif" font-size="9" fill="#34D399" font-weight="600">+100/sec refill</text>
  <text x="374" y="172" font-family="Inter,sans-serif" font-size="9" fill="#C4B5FD" text-anchor="middle">capacity: 500 tokens</text>
  <!-- Stats on right -->
  <rect x="432" y="64" width="155" height="76" rx="6" fill="#0F172A"/>
  <text x="440" y="82" font-family="monospace" font-size="8.5" fill="#A78BFA">1 req = 1 token</text>
  <text x="440" y="98" font-family="monospace" font-size="8.5" fill="#A78BFA">refill: constant rate</text>
  <text x="440" y="114" font-family="monospace" font-size="8.5" fill="#A78BFA">burst: up to capacity</text>
  <text x="440" y="130" font-family="monospace" font-size="8.5" fill="#64748B">O(1) per check</text>

  <!-- Arrow: Bucket → Redis -->
  <path d="M 602 107 L 622 107" stroke="#7C3AED" stroke-width="1.5"/>
  <polygon points="619,103 627,107 619,111" fill="#7C3AED"/>
  <text x="612" y="100" font-family="Inter,sans-serif" font-size="7" fill="#7C3AED" text-anchor="middle">INCR</text>

  <!-- Zone 3: Redis Counter -->
  <rect x="625" y="23" width="257" height="205" rx="8" fill="#1E293B" stroke="#DC2626" stroke-width="1.5"/>
  <text x="753" y="43" font-family="Inter,sans-serif" font-size="10" fill="#FCA5A5" text-anchor="middle" font-weight="600">Redis Counter</text>
  <!-- Redis cube -->
  <path d="M 640 90 L 668 75 L 696 90 L 696 118 L 668 133 L 640 118 Z" fill="#1E293B" stroke="#F87171" stroke-width="2"/>
  <path d="M 640 90 L 668 105 L 696 90" fill="none" stroke="#F87171" stroke-width="1.2"/>
  <path d="M 668 105 L 668 133" stroke="#F87171" stroke-width="1.2"/>
  <!-- counter data rows -->
  <rect x="706" y="56" width="162" height="12" rx="2" fill="#0F172A"/>
  <text x="710" y="65" font-family="monospace" font-size="7.5" fill="#FCA5A5">user:123  →  87</text>
  <rect x="706" y="72" width="162" height="12" rx="2" fill="#0F172A"/>
  <text x="710" y="81" font-family="monospace" font-size="7.5" fill="#FCA5A5">user:456  →  12</text>
  <rect x="706" y="88" width="162" height="12" rx="2" fill="#0F172A"/>
  <text x="710" y="97" font-family="monospace" font-size="7.5" fill="#FCA5A5">user:789  →  99</text>
  <rect x="706" y="104" width="162" height="12" rx="2" fill="#450A0A"/>
  <text x="710" y="113" font-family="monospace" font-size="7.5" fill="#F87171">user:321  →  100 ⚠</text>
  <rect x="636" y="140" width="234" height="16" rx="3" fill="#0F172A"/>
  <text x="753" y="151" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">INCR + EXPIRE — atomic Lua script</text>
  <text x="753" y="190" font-family="Inter,sans-serif" font-size="9" fill="#FCA5A5" text-anchor="middle">&lt;1ms per check · atomic</text>

  <!-- ══════════════ ROW 2: DECISION GATE ══════════════ -->

  <!-- Vertical arrow: Redis → Decision -->
  <path d="M 753 230 L 753 258" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="749,255 753,263 757,255" fill="#6366F1"/>

  <!-- Zone 4: Decision Diamond -->
  <rect x="625" y="263" width="257" height="190" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="753,285 790,318 753,351 716,318" fill="#312E81" stroke="#818CF8" stroke-width="2"/>
  <text x="753" y="314" font-family="Inter,sans-serif" font-size="9" fill="#C7D2FE" text-anchor="middle">count</text>
  <text x="753" y="328" font-family="Inter,sans-serif" font-size="9" fill="#C7D2FE" text-anchor="middle">&lt; limit?</text>
  <text x="753" y="430" font-family="Inter,sans-serif" font-size="10" fill="#A5B4FC" text-anchor="middle" font-weight="600">Rate Limiter</text>
  <text x="753" y="446" font-family="Inter,sans-serif" font-size="8" fill="#475569" text-anchor="middle">per-request decision</text>

  <!-- Arrow YES: Decision → Allow -->
  <path d="M 716 310 L 600 310" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="603,306 595,310 603,314" fill="#10B981"/>
  <text x="658" y="303" font-family="Inter,sans-serif" font-size="8.5" fill="#10B981" text-anchor="middle">YES ✓</text>

  <!-- Arrow NO: Decision → Block -->
  <path d="M 716 326 L 600 360" stroke="#DC2626" stroke-width="1.5"/>
  <polygon points="604,357 596,363 602,353" fill="#DC2626"/>
  <text x="658" y="350" font-family="Inter,sans-serif" font-size="8.5" fill="#DC2626" text-anchor="middle">NO ✗</text>

  <!-- Zone 5: Allow -->
  <rect x="295" y="286" width="295" height="76" rx="8" fill="#064E3B" stroke="#10B981" stroke-width="1.5"/>
  <text x="442" y="318" font-family="Inter,sans-serif" font-size="18" fill="#34D399" text-anchor="middle" font-weight="700">✓  200 OK</text>
  <text x="442" y="338" font-family="Inter,sans-serif" font-size="8.5" fill="#6EE7B7" text-anchor="middle">request passes → API Server</text>
  <text x="442" y="352" font-family="Inter,sans-serif" font-size="8" fill="#475569" text-anchor="middle">X-RateLimit-Remaining: 13</text>

  <!-- Zone 6: Block -->
  <rect x="295" y="373" width="295" height="80" rx="8" fill="#450A0A" stroke="#DC2626" stroke-width="1.5"/>
  <text x="442" y="408" font-family="Inter,sans-serif" font-size="16" fill="#F87171" text-anchor="middle" font-weight="700">✗  429 Too Many</text>
  <text x="442" y="428" font-family="Inter,sans-serif" font-size="8.5" fill="#EF4444" text-anchor="middle">Retry-After: 1s  ·  client must back off</text>

  <!-- Zone 7: Headers / fail-open policy -->
  <rect x="18" y="263" width="265" height="190" rx="8" fill="#1E293B" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="283" font-family="Inter,sans-serif" font-size="10" fill="#6EE7B7" text-anchor="middle" font-weight="600">Response Headers</text>
  <rect x="30" y="291" width="241" height="14" rx="2" fill="#0C1A0C"/>
  <text x="35" y="302" font-family="monospace" font-size="8" fill="#6EE7B7">X-RateLimit-Limit:     100</text>
  <rect x="30" y="309" width="241" height="14" rx="2" fill="#0C1A0C"/>
  <text x="35" y="320" font-family="monospace" font-size="8" fill="#6EE7B7">X-RateLimit-Remaining: 13</text>
  <rect x="30" y="327" width="241" height="14" rx="2" fill="#0C1A0C"/>
  <text x="35" y="338" font-family="monospace" font-size="8" fill="#6EE7B7">X-RateLimit-Reset:  1710400</text>
  <rect x="30" y="345" width="241" height="14" rx="2" fill="#2D0A0A"/>
  <text x="35" y="356" font-family="monospace" font-size="8" fill="#F87171">Retry-After: 1  (on 429 only)</text>
  <rect x="30" y="367" width="241" height="76" rx="4" fill="#0F172A" stroke="#334155" stroke-width="0.5"/>
  <text x="150" y="384" font-family="Inter,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">fail-open policy:</text>
  <text x="150" y="400" font-family="Inter,sans-serif" font-size="9" fill="#34D399" text-anchor="middle">Redis down → allow request</text>
  <text x="150" y="414" font-family="Inter,sans-serif" font-size="8" fill="#475569" text-anchor="middle">in-memory fallback · circuit breaker</text>
  <text x="150" y="428" font-family="Inter,sans-serif" font-size="8" fill="#475569" text-anchor="middle">prevents limiter outage from killing API</text>

  <!-- ── Bottom metrics bar ── -->
  <rect x="18" y="450" width="864" height="10" rx="3" fill="#1E293B" opacity="0.7"/>
  <text x="160" y="458" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">algorithm: Token Bucket</text>
  <line x1="290" y1="451" x2="290" y2="459" stroke="#334155" stroke-width="0.5"/>
  <text x="450" y="458" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">Redis INCR + EXPIRE — atomic Lua · &lt;1ms</text>
  <line x1="610" y1="451" x2="610" y2="459" stroke="#334155" stroke-width="0.5"/>
  <text x="750" y="458" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">fail-open · per-user key: uid + window</text>
</svg>
