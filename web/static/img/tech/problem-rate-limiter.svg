<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- Row labels -->
  <rect x="18" y="18" width="138" height="20" rx="4" fill="#EDE9FE"/>
  <text x="87" y="32" font-family="Inter,sans-serif" font-size="10" fill="#6D28D9" text-anchor="middle" font-weight="700">ALGORITHM LAYER</text>
  <rect x="18" y="245" width="116" height="20" rx="4" fill="#FEF3C7"/>
  <text x="76" y="259" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="700">DECISION GATE</text>

  <!-- ── ROW 1: ALGORITHM LAYER ── -->
  <!-- Incoming Burst -->
  <rect x="18" y="44" width="160" height="190" rx="8" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="98" y="64" font-family="Inter,sans-serif" font-size="10" fill="#6D28D9" text-anchor="middle" font-weight="600">BURST TRAFFIC</text>
  <circle cx="50" cy="94" r="10" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="78" cy="88" r="10" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="106" cy="96" r="10" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="64" cy="116" r="10" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="92" cy="110" r="10" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="120" cy="118" r="10" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="50" cy="136" r="10" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="78" cy="130" r="10" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="106" cy="138" r="10" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="134" cy="108" r="10" fill="#C4B5FD" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="98" y="163" font-family="monospace" font-size="8" fill="#7C3AED" text-anchor="middle">10K req/s spike</text>
  <text x="98" y="215" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">API clients</text>

  <path d="M 180 130 L 212 130" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="209,126 217,130 209,134" fill="#7C3AED"/>

  <!-- Token Bucket -->
  <rect x="214" y="44" width="234" height="190" rx="8" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="331" y="64" font-family="Inter,sans-serif" font-size="10" fill="#6D28D9" text-anchor="middle" font-weight="700">TOKEN BUCKET</text>
  <path d="M 278 80 L 306 80 L 320 148 L 264 148 Z" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <circle cx="282" cy="100" r="7" fill="#7C3AED" opacity="0.7"/>
  <circle cx="302" cy="104" r="7" fill="#7C3AED" opacity="0.7"/>
  <circle cx="288" cy="119" r="7" fill="#7C3AED" opacity="0.7"/>
  <circle cx="308" cy="121" r="7" fill="#7C3AED" opacity="0.5"/>
  <circle cx="274" cy="127" r="7" fill="#A78BFA" opacity="0.5"/>
  <path d="M 340 90 Q 358 80 358 114 Q 358 148 340 140" stroke="#059669" stroke-width="1.5" fill="none"/>
  <polygon points="341,143 339,137 345,140" fill="#059669"/>
  <text x="374" y="98" font-family="monospace" font-size="8" fill="#065F46">refill</text>
  <text x="374" y="111" font-family="monospace" font-size="8" fill="#065F46">100/s</text>
  <rect x="224" y="158" width="214" height="32" rx="4" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="331" y="171" font-family="monospace" font-size="8" fill="#6D28D9" text-anchor="middle">capacity=100 · refill=100/s</text>
  <text x="331" y="184" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">per user_id key in Redis</text>
  <text x="331" y="218" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">burst absorber · smooth traffic</text>

  <path d="M 450 130 L 482 130" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="479,126 487,130 479,134" fill="#7C3AED"/>
  <text x="466" y="122" font-family="monospace" font-size="8" fill="#7C3AED" text-anchor="middle">Lua</text>

  <!-- Redis Counter -->
  <rect x="484" y="44" width="250" height="190" rx="8" fill="#FFFFFF" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="609" y="64" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">REDIS COUNTER</text>
  <polygon points="609,82 637,74 637,104 609,112" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <polygon points="581,82 609,74 637,74 609,82" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <polygon points="581,82 581,112 609,112 609,82" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
  <rect x="494" y="122" width="230" height="16" rx="3" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="609" y="134" font-family="monospace" font-size="8" fill="#064E3B" text-anchor="middle">rl:user:1001  count:87  ex:13s</text>
  <rect x="494" y="142" width="230" height="16" rx="3" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="609" y="154" font-family="monospace" font-size="8" fill="#064E3B" text-anchor="middle">rl:user:2042  count:12  ex:48s</text>
  <rect x="494" y="162" width="230" height="16" rx="3" fill="#ECFDF5"/>
  <text x="609" y="174" font-family="monospace" font-size="8" fill="#059669" text-anchor="middle">INCR + EXPIRE · atomic Lua</text>
  <text x="609" y="218" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">sub-ms latency · in-memory</text>

  <!-- Vertical arrow to Decision diamond -->
  <path d="M 609 234 L 609 265" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="605,262 609,270 613,262" fill="#7C3AED"/>

  <!-- ── ROW 2: DECISION GATE ── -->
  <!-- Response Headers -->
  <rect x="18" y="268" width="234" height="170" rx="8" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="135" y="288" font-family="Inter,sans-serif" font-size="10" fill="#6D28D9" text-anchor="middle" font-weight="600">RESPONSE HEADERS</text>
  <rect x="28" y="298" width="214" height="15" rx="3" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="135" y="309" font-family="monospace" font-size="8" fill="#6D28D9" text-anchor="middle">X-RateLimit-Limit: 100</text>
  <rect x="28" y="317" width="214" height="15" rx="3" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="135" y="328" font-family="monospace" font-size="8" fill="#6D28D9" text-anchor="middle">X-RateLimit-Remaining: 13</text>
  <rect x="28" y="336" width="214" height="15" rx="3" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="135" y="347" font-family="monospace" font-size="8" fill="#6D28D9" text-anchor="middle">X-RateLimit-Reset: 1704067213</text>
  <rect x="28" y="355" width="214" height="15" rx="3" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="135" y="366" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">Retry-After: 47  (429 only)</text>
  <rect x="28" y="388" width="214" height="34" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="135" y="402" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">fail-open policy:</text>
  <text x="135" y="415" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">pass if Redis unreachable</text>

  <!-- 200 OK -->
  <rect x="264" y="268" width="164" height="82" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="346" y="300" font-family="Inter,sans-serif" font-size="22" fill="#059669" text-anchor="middle" font-weight="700">✓ 200</text>
  <text x="346" y="321" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle">request allowed</text>
  <text x="346" y="337" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">token consumed</text>

  <!-- Decision Diamond -->
  <polygon points="530,326 580,354 530,382 480,354" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
  <text x="530" y="350" font-family="monospace" font-size="9" fill="#6D28D9" text-anchor="middle">count</text>
  <text x="530" y="363" font-family="monospace" font-size="9" fill="#6D28D9" text-anchor="middle">&lt; limit?</text>
  <path d="M 480 354 L 430 310" stroke="#059669" stroke-width="1.5"/>
  <polygon points="433,307 427,301 424,311" fill="#059669"/>
  <text x="448" y="322" font-family="monospace" font-size="8" fill="#059669">YES</text>
  <path d="M 580 354 L 646 310" stroke="#DC2626" stroke-width="1.5"/>
  <polygon points="643,307 649,301 652,311" fill="#DC2626"/>
  <text x="604" y="322" font-family="monospace" font-size="8" fill="#DC2626">NO</text>

  <!-- 429 Too Many -->
  <rect x="648" y="268" width="232" height="82" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="764" y="300" font-family="Inter,sans-serif" font-size="22" fill="#DC2626" text-anchor="middle" font-weight="700">✗ 429</text>
  <text x="764" y="321" font-family="Inter,sans-serif" font-size="10" fill="#991B1B" text-anchor="middle">Too Many Requests</text>
  <text x="764" y="337" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">reject + Retry-After header</text>

  <!-- Algorithm comparison -->
  <rect x="264" y="362" width="616" height="76" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="572" y="380" font-family="Inter,sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600">Algorithm Comparison</text>
  <line x1="418" y1="368" x2="418" y2="438" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="572" y1="368" x2="572" y2="438" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="726" y1="368" x2="726" y2="438" stroke="#E2E8F0" stroke-width="1"/>
  <text x="341" y="398" font-family="monospace" font-size="8.5" fill="#7C3AED" font-weight="600">Token Bucket</text>
  <text x="341" y="413" font-family="monospace" font-size="8" fill="#64748B">burst OK · smooth refill</text>
  <text x="495" y="398" font-family="monospace" font-size="8.5" fill="#2563EB" font-weight="600">Sliding Window</text>
  <text x="495" y="413" font-family="monospace" font-size="8" fill="#64748B">precise · 2× memory</text>
  <text x="649" y="398" font-family="monospace" font-size="8.5" fill="#059669" font-weight="600">Fixed Window</text>
  <text x="649" y="413" font-family="monospace" font-size="8" fill="#64748B">simple · boundary spike</text>
  <text x="810" y="398" font-family="monospace" font-size="8.5" fill="#D97706" font-weight="600">Leaky Bucket</text>
  <text x="810" y="413" font-family="monospace" font-size="8" fill="#64748B">constant rate · queue</text>

  <!-- Bottom bar -->
  <rect x="18" y="444" width="864" height="14" rx="4" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="450" y="455" font-family="monospace" font-size="8" fill="#6D28D9" text-anchor="middle">algorithm: Token Bucket  ·  Redis INCR+EXPIRE atomic Lua  ·  fail-open policy  ·  per user_id key  ·  &lt;1ms decision</text>
</svg>
