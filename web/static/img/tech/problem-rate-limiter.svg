<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <defs>
    <linearGradient id="bg-rl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <clipPath id="bucket-clip-wide">
      <path d="M 118 68 L 106 148 L 178 148 L 166 68 Z"/>
    </clipPath>
  </defs>
  <rect width="900" height="200" fill="url(#bg-rl)" rx="12"/>

  <!-- ── Section labels ── -->
  <text x="20" y="14" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">INCOMING BURST</text>
  <line x1="130" y1="11" x2="200" y2="11" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="260" y="14" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">ALGORITHM</text>
  <line x1="340" y1="11" x2="510" y2="11" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="570" y="14" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">DECISION GATE</text>
  <line x1="680" y1="11" x2="880" y2="11" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- ══ Zone 1: Incoming requests (x=20) ══ -->
  <!-- Request circles: burst of traffic -->
  <circle cx="38"  cy="55"  r="9" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="38"  cy="58"  font-family="monospace" font-size="5.5" fill="#60A5FA" text-anchor="middle" dominant-baseline="middle">REQ</text>
  <circle cx="62"  cy="40"  r="9" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="62"  cy="43"  font-family="monospace" font-size="5.5" fill="#60A5FA" text-anchor="middle" dominant-baseline="middle">REQ</text>
  <circle cx="44"  cy="80"  r="9" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="44"  cy="83"  font-family="monospace" font-size="5.5" fill="#60A5FA" text-anchor="middle" dominant-baseline="middle">REQ</text>
  <circle cx="72"  cy="68"  r="9" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="72"  cy="71"  font-family="monospace" font-size="5.5" fill="#60A5FA" text-anchor="middle" dominant-baseline="middle">REQ</text>
  <circle cx="50"  cy="105" r="9" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="50"  cy="108" font-family="monospace" font-size="5.5" fill="#60A5FA" text-anchor="middle" dominant-baseline="middle">REQ</text>
  <circle cx="75"  cy="95"  r="9" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="75"  cy="98"  font-family="monospace" font-size="5.5" fill="#60A5FA" text-anchor="middle" dominant-baseline="middle">REQ</text>
  <circle cx="40"  cy="128" r="9" fill="#312E3A" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
  <circle cx="68"  cy="120" r="9" fill="#312E3A" stroke="#6366F1" stroke-width="1.5" opacity="0.4"/>
  <circle cx="28"  cy="148" r="9" fill="#312E3A" stroke="#6366F1" stroke-width="1.5" opacity="0.3"/>
  <circle cx="60"  cy="145" r="9" fill="#312E3A" stroke="#6366F1" stroke-width="1.5" opacity="0.2"/>
  <!-- rate label -->
  <rect x="20" y="162" width="75" height="22" rx="4" fill="#1E293B"/>
  <text x="57" y="173" font-family="Inter,sans-serif" font-size="8" fill="#3B82F6" text-anchor="middle" font-weight="600">10,000</text>
  <text x="57" y="182" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">req/s burst</text>

  <!-- Arrow: requests → Token Bucket -->
  <path d="M 98 90 L 100 90" stroke="#3B82F6" stroke-width="1.5"/>
  <path d="M 100 90 L 100 90" stroke="#3B82F6" stroke-width="1.5"/>
  <path d="M 98 55 Q 105 55 105 80 L 105 108 Q 105 120 98 120" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.5"/>
  <path d="M 105 90 L 103 90" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="103,86 110,90 103,94" fill="#3B82F6"/>

  <!-- ══ Zone 2: Token Bucket (x=112) ══ -->
  <!-- Bucket trapezoid -->
  <path d="M 118 68 L 106 148 L 178 148 L 166 68 Z" fill="#1E293B" stroke="#7C3AED" stroke-width="2"/>
  <!-- Token fill level (60%) -->
  <rect x="102" y="105" width="80" height="47" fill="#4C1D95" opacity="0.5" clip-path="url(#bucket-clip-wide)"/>
  <!-- Tokens in bucket -->
  <circle cx="128" cy="118" r="7" fill="#A78BFA" opacity="0.9"/>
  <circle cx="148" cy="112" r="7" fill="#A78BFA" opacity="0.9"/>
  <circle cx="165" cy="120" r="7" fill="#A78BFA" opacity="0.9"/>
  <circle cx="135" cy="132" r="7" fill="#7C3AED" opacity="0.8"/>
  <circle cx="158" cy="136" r="7" fill="#7C3AED" opacity="0.7"/>
  <circle cx="120" cy="140" r="5" fill="#6D28D9" opacity="0.6"/>
  <circle cx="168" cy="142" r="4" fill="#6D28D9" opacity="0.5"/>
  <!-- Refill arrow (top) -->
  <path d="M 142 44 L 142 66" stroke="#10B981" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="138,49 142,42 146,49" fill="#10B981"/>
  <text x="155" y="46" font-family="Inter,sans-serif" font-size="7.5" fill="#34D399" font-weight="600">+100/sec</text>
  <text x="155" y="57" font-family="Inter,sans-serif" font-size="6.5" fill="#6EE7B7">refill rate</text>
  <text x="142" y="162" font-family="Inter,sans-serif" font-size="8" fill="#C4B5FD" text-anchor="middle" font-weight="600">Token Bucket</text>
  <text x="142" y="173" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">capacity: 500 tokens</text>

  <!-- Arrow: bucket → Redis -->
  <path d="M 182 108 L 208 108" stroke="#7C3AED" stroke-width="1.5"/>
  <polygon points="205,104 213,108 205,112" fill="#7C3AED"/>
  <text x="195" y="100" font-family="Inter,sans-serif" font-size="6" fill="#7C3AED" text-anchor="middle">INCR/DECR</text>

  <!-- ══ Zone 3: Redis Counter (x=212) ══ -->
  <rect x="212" y="65" width="140" height="86" rx="8" fill="#1E293B" stroke="#DC2626" stroke-width="1.5"/>
  <!-- Redis cube -->
  <path d="M 238 90 L 258 80 L 278 90 L 278 108 L 258 118 L 238 108 Z" fill="#1E293B" stroke="#F87171" stroke-width="1.5"/>
  <path d="M 238 90 L 258 100 L 278 90" fill="none" stroke="#F87171" stroke-width="1"/>
  <path d="M 258 100 L 258 118" stroke="#F87171" stroke-width="1"/>
  <!-- counter data rows -->
  <rect x="288" y="73" width="56" height="9" rx="2" fill="#0F172A"/>
  <text x="292" y="80" font-family="monospace" font-size="5.5" fill="#FCA5A5">user:123  → 87</text>
  <rect x="288" y="85" width="56" height="9" rx="2" fill="#0F172A"/>
  <text x="292" y="92" font-family="monospace" font-size="5.5" fill="#FCA5A5">user:456  → 12</text>
  <rect x="288" y="97" width="56" height="9" rx="2" fill="#0F172A"/>
  <text x="292" y="104" font-family="monospace" font-size="5.5" fill="#FCA5A5">user:789  → 99</text>
  <rect x="288" y="109" width="56" height="9" rx="2" fill="#450A0A"/>
  <text x="292" y="116" font-family="monospace" font-size="5.5" fill="#F87171">user:321  → 100 ⚠</text>
  <text x="282" y="140" font-family="Inter,sans-serif" font-size="8" fill="#FCA5A5" text-anchor="middle" font-weight="600">Redis Counter</text>
  <text x="282" y="151" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">INCR + EXPIRE — atomic Lua</text>
  <text x="282" y="162" font-family="monospace" font-size="6.5" fill="#64748B" text-anchor="middle">&lt;1ms per check</text>

  <!-- Arrow: Redis → Decision -->
  <path d="M 354 108 L 380 108" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="377,104 385,108 377,112" fill="#6366F1"/>

  <!-- ══ Zone 4: Decision diamond (x=384) ══ -->
  <rect x="384" y="65" width="120" height="86" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <!-- Diamond -->
  <polygon points="444,80 468,100 444,120 420,100" fill="#312E81" stroke="#818CF8" stroke-width="1.5"/>
  <text x="444" y="97" font-family="Inter,sans-serif" font-size="7" fill="#C7D2FE" text-anchor="middle">count</text>
  <text x="444" y="107" font-family="Inter,sans-serif" font-size="7" fill="#C7D2FE" text-anchor="middle">&lt; limit?</text>
  <text x="444" y="145" font-family="Inter,sans-serif" font-size="7.5" fill="#A5B4FC" text-anchor="middle" font-weight="600">Rate Limiter</text>

  <!-- Arrow: Decision → Allow -->
  <path d="M 468 92 L 530 65" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="527,62 534,68 524,67" fill="#10B981"/>
  <text x="490" y="72" font-family="Inter,sans-serif" font-size="7" fill="#10B981">YES</text>

  <!-- Arrow: Decision → Block -->
  <path d="M 468 108 L 530 135" stroke="#DC2626" stroke-width="1.5"/>
  <polygon points="527,132 534,138 524,137" fill="#DC2626"/>
  <text x="490" y="132" font-family="Inter,sans-serif" font-size="7" fill="#DC2626">NO</text>

  <!-- ══ Zone 5: Allow path (x=533, y=40) ══ -->
  <rect x="533" y="42" width="120" height="36" rx="6" fill="#064E3B" stroke="#10B981" stroke-width="1.5"/>
  <text x="593" y="57" font-family="Inter,sans-serif" font-size="9" fill="#34D399" text-anchor="middle" font-weight="700">✓ 200 OK</text>
  <text x="593" y="70" font-family="Inter,sans-serif" font-size="6.5" fill="#6EE7B7" text-anchor="middle">request passes through</text>

  <!-- ══ Zone 5b: Block path (x=533, y=122) ══ -->
  <rect x="533" y="122" width="120" height="36" rx="6" fill="#450A0A" stroke="#DC2626" stroke-width="1.5"/>
  <text x="593" y="137" font-family="Inter,sans-serif" font-size="9" fill="#F87171" text-anchor="middle" font-weight="700">✗ 429 Too Many</text>
  <text x="593" y="150" font-family="Inter,sans-serif" font-size="6.5" fill="#EF4444" text-anchor="middle">Retry-After: 1s header</text>

  <!-- Arrow: Allow → API Server -->
  <path d="M 655 60 L 695 60" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="692,56 700,60 692,64" fill="#10B981"/>

  <!-- Arrow: Block → nowhere (rejected) -->
  <path d="M 655 140 L 695 140" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
  <text x="720" y="152" font-family="Inter,sans-serif" font-size="7" fill="#DC2626" text-anchor="middle">rejected</text>

  <!-- ══ Zone 6: API Server (x=698) ══ -->
  <rect x="698" y="32" width="140" height="70" rx="8" fill="#1E293B" stroke="#059669" stroke-width="1.5"/>
  <!-- server rack -->
  <rect x="710" y="42" width="116" height="12" rx="3" fill="#064E3B"/>
  <circle cx="812" cy="48" r="4" fill="#10B981"/>
  <rect x="714" y="46" width="88" height="4" rx="1" fill="#065F46"/>
  <rect x="710" y="58" width="116" height="12" rx="3" fill="#064E3B"/>
  <circle cx="812" cy="64" r="4" fill="#10B981" opacity="0.7"/>
  <rect x="714" y="62" width="70" height="4" rx="1" fill="#065F46"/>
  <rect x="710" y="74" width="116" height="12" rx="3" fill="#064E3B" opacity="0.6"/>
  <circle cx="812" cy="80" r="4" fill="#10B981" opacity="0.4"/>
  <rect x="714" y="78" width="55" height="4" rx="1" fill="#065F46" opacity="0.6"/>
  <text x="768" y="115" font-family="Inter,sans-serif" font-size="8.5" fill="#6EE7B7" text-anchor="middle" font-weight="600">API Server</text>
  <text x="768" y="127" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">only allowed requests reach here</text>

  <!-- Headers annotation -->
  <rect x="698" y="140" width="140" height="38" rx="6" fill="#0C1A0C" stroke="#059669" stroke-width="1"/>
  <text x="706" y="153" font-family="monospace" font-size="5.5" fill="#6EE7B7">X-RateLimit-Limit:     100</text>
  <text x="706" y="163" font-family="monospace" font-size="5.5" fill="#6EE7B7">X-RateLimit-Remaining: 13</text>
  <text x="706" y="173" font-family="monospace" font-size="5.5" fill="#F87171">Retry-After: 1  (on 429)</text>

  <!-- ── Bottom metrics bar ── -->
  <rect x="20" y="184" width="860" height="12" rx="4" fill="#1E293B" opacity="0.6"/>
  <text x="120" y="193" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">algorithm: Token Bucket</text>
  <line x1="210" y1="185" x2="210" y2="195" stroke="#334155" stroke-width="0.5"/>
  <text x="320" y="193" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">Redis INCR + EXPIRE — atomic Lua script</text>
  <line x1="430" y1="185" x2="430" y2="195" stroke="#334155" stroke-width="0.5"/>
  <text x="555" y="193" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">fail-open: in-memory fallback if Redis down</text>
  <line x1="680" y1="185" x2="680" y2="195" stroke="#334155" stroke-width="0.5"/>
  <text x="790" y="193" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">per-user key: user_id + window_start</text>
</svg>
