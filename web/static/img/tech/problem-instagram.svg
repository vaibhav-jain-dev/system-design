<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <defs>
    <linearGradient id="bg-ig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1033"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="photo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" fill="url(#bg-ig)" rx="12"/>

  <!-- ── Row labels ── -->
  <text x="18" y="17" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">UPLOAD PATH</text>
  <line x1="98" y1="14" x2="882" y2="14" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="18" y="244" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">FAN-OUT + READ PATH</text>
  <line x1="162" y1="241" x2="882" y2="241" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- ══════════════ ROW 1: UPLOAD PATH ══════════════ -->

  <!-- Zone 1: Mobile Device -->
  <rect x="18" y="23" width="250" height="205" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <rect x="55" y="38" width="176" height="128" rx="10" fill="#0F172A"/>
  <!-- photo preview -->
  <rect x="60" y="43" width="166" height="92" rx="6" fill="url(#photo-grad)"/>
  <!-- mountain silhouette -->
  <path d="M 60 118 L 90 82 L 118 96 L 140 74 L 226 118" fill="#1E293B" opacity="0.6"/>
  <circle cx="90" cy="58" r="12" fill="#FCD34D" opacity="0.5"/>
  <!-- caption lines -->
  <rect x="62" y="139" width="162" height="7" rx="2" fill="#1E293B"/>
  <rect x="62" y="150" width="110" height="7" rx="2" fill="#1E293B"/>
  <!-- upload button -->
  <rect x="62" y="160" width="162" height="22" rx="6" fill="#312E81"/>
  <text x="143" y="175" font-family="Inter,sans-serif" font-size="10" fill="#C7D2FE" text-anchor="middle" font-weight="600">▲  Upload</text>
  <!-- home indicator -->
  <rect x="115" y="172" width="56" height="5" rx="2.5" fill="#334155"/>
  <text x="143" y="203" font-family="Inter,sans-serif" font-size="11" fill="#818CF8" text-anchor="middle" font-weight="700">Mobile</text>
  <text x="143" y="219" font-family="Inter,sans-serif" font-size="7.5" fill="#475569" text-anchor="middle">300M uploads/day</text>

  <!-- Arrow: Mobile → Upload Service -->
  <path d="M 270 125 L 292 125" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="289,121 297,125 289,129" fill="#6366F1"/>
  <text x="281" y="118" font-family="Inter,sans-serif" font-size="7" fill="#6366F1" text-anchor="middle">POST</text>

  <!-- Zone 2: Upload Service -->
  <rect x="295" y="23" width="305" height="205" rx="8" fill="#1E293B" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="447" y="44" font-family="Inter,sans-serif" font-size="11" fill="#C4B5FD" text-anchor="middle" font-weight="700">Upload Service</text>
  <!-- photo resize variants -->
  <rect x="308" y="54" width="52" height="40" rx="4" fill="url(#photo-grad)"/>
  <text x="334" y="78" font-family="Inter,sans-serif" font-size="14" fill="#E9D5FF" text-anchor="middle" font-weight="700">L</text>
  <rect x="368" y="60" width="42" height="32" rx="4" fill="url(#photo-grad)" opacity="0.8"/>
  <text x="389" y="80" font-family="Inter,sans-serif" font-size="12" fill="#E9D5FF" text-anchor="middle" font-weight="700">M</text>
  <rect x="418" y="66" width="32" height="24" rx="4" fill="url(#photo-grad)" opacity="0.6"/>
  <text x="434" y="82" font-family="Inter,sans-serif" font-size="10" fill="#E9D5FF" text-anchor="middle" font-weight="700">S</text>
  <text x="390" y="110" font-family="Inter,sans-serif" font-size="8.5" fill="#A78BFA" text-anchor="middle">resize → 3 variants async</text>
  <!-- metadata -->
  <rect x="308" y="118" width="279" height="16" rx="3" fill="#0F172A"/>
  <text x="447" y="129" font-family="monospace" font-size="8" fill="#7C3AED" text-anchor="middle">photo_id  user_id  timestamp  geo</text>
  <!-- Kafka event -->
  <rect x="308" y="138" width="279" height="16" rx="3" fill="#1E293B" stroke="#2563EB" stroke-width="1"/>
  <text x="447" y="149" font-family="Inter,sans-serif" font-size="8" fill="#93C5FD" text-anchor="middle">→ Kafka event → fan-out worker (async)</text>
  <text x="447" y="200" font-family="Inter,sans-serif" font-size="8.5" fill="#7C3AED" text-anchor="middle">returns ACK immediately · async write</text>

  <!-- Arrow: Upload → S3 -->
  <path d="M 602 107 L 622 107" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="619,103 627,107 619,111" fill="#D97706"/>
  <text x="612" y="100" font-family="Inter,sans-serif" font-size="7" fill="#D97706" text-anchor="middle">store</text>

  <!-- Zone 3: S3 -->
  <rect x="625" y="23" width="257" height="205" rx="8" fill="#1E293B" stroke="#D97706" stroke-width="1.5"/>
  <text x="753" y="44" font-family="Inter,sans-serif" font-size="11" fill="#FDE68A" text-anchor="middle" font-weight="700">S3  Object Store</text>
  <!-- S3 bucket icon -->
  <path d="M 680 62 L 670 138 L 836 138 L 826 62 Z" fill="#1E293B" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 672 62 Q 753 46 834 62" stroke="#FCD34D" stroke-width="1.5" fill="none"/>
  <!-- photos in bucket -->
  <rect x="692" y="72" width="36" height="28" rx="3" fill="#78350F" opacity="0.8"/>
  <rect x="736" y="72" width="36" height="28" rx="3" fill="#92400E" opacity="0.7"/>
  <rect x="780" y="72" width="36" height="28" rx="3" fill="#78350F" opacity="0.6"/>
  <rect x="692" y="104" width="36" height="24" rx="3" fill="#92400E" opacity="0.5"/>
  <rect x="736" y="104" width="36" height="24" rx="3" fill="#78350F" opacity="0.4"/>
  <rect x="636" y="148" width="234" height="14" rx="3" fill="#0F172A"/>
  <text x="753" y="159" font-family="monospace" font-size="8" fill="#FCD34D" text-anchor="middle">3 redundant copies · 11 nines durability</text>
  <text x="753" y="185" font-family="Inter,sans-serif" font-size="9" fill="#D97706" text-anchor="middle">CDN origin · multipart upload</text>
  <text x="753" y="200" font-family="Inter,sans-serif" font-size="8" fill="#64748B" text-anchor="middle">signed URLs · lifecycle policies</text>

  <!-- ══════════════ ROW 2: FAN-OUT + READ PATH ══════════════ -->

  <!-- Vertical arrow: Upload Service → Fan-out Worker -->
  <path d="M 447 230 L 447 256" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="443,253 447,261 451,253" fill="#2563EB"/>

  <!-- Zone 4: Fan-out Worker (spans center) -->
  <rect x="295" y="263" width="305" height="90" rx="8" fill="#1E293B" stroke="#2563EB" stroke-width="1.5"/>
  <text x="447" y="290" font-family="Inter,sans-serif" font-size="11" fill="#93C5FD" text-anchor="middle" font-weight="700">Fan-out Worker</text>
  <text x="447" y="308" font-family="Inter,sans-serif" font-size="8.5" fill="#475569" text-anchor="middle">Kafka consumer → writes to N follower feeds</text>
  <text x="447" y="324" font-family="Inter,sans-serif" font-size="8" fill="#64748B" text-anchor="middle">push for &lt;1K followers · pull for celebs &gt;1M</text>
  <text x="447" y="341" font-family="monospace" font-size="7.5" fill="#475569" text-anchor="middle">Redis ZADD feed:{user_id} score photo_id</text>

  <!-- Arrow: Fan-out → Feed Cache -->
  <path d="M 602 305 L 622 305" stroke="#2563EB" stroke-width="1.5"/>
  <polygon points="619,301 627,305 619,309" fill="#2563EB"/>

  <!-- Zone 5: Feed Cache (Redis) -->
  <rect x="625" y="251" width="257" height="200" rx="8" fill="#1E293B" stroke="#DC2626" stroke-width="1.5"/>
  <text x="753" y="272" font-family="Inter,sans-serif" font-size="11" fill="#FCA5A5" text-anchor="middle" font-weight="700">Feed Cache (Redis)</text>
  <!-- Redis cube -->
  <path d="M 643 310 L 668 296 L 693 310 L 693 338 L 668 352 L 643 338 Z" fill="#1E293B" stroke="#F87171" stroke-width="1.5"/>
  <path d="M 643 310 L 668 324 L 693 310" fill="none" stroke="#F87171" stroke-width="1"/>
  <path d="M 668 324 L 668 352" stroke="#F87171" stroke-width="1"/>
  <!-- feed entries -->
  <rect x="703" y="290" width="169" height="12" rx="2" fill="#0F172A"/>
  <text x="707" y="300" font-family="monospace" font-size="7.5" fill="#FCA5A5">feed:7   [p12,p88,p21…]</text>
  <rect x="703" y="306" width="169" height="12" rx="2" fill="#0F172A"/>
  <text x="707" y="316" font-family="monospace" font-size="7.5" fill="#FCA5A5">feed:23  [p4,p91,p15…]</text>
  <rect x="703" y="322" width="169" height="12" rx="2" fill="#0F172A"/>
  <text x="707" y="332" font-family="monospace" font-size="7.5" fill="#FCA5A5">feed:42  [p7,p3,p100…]</text>
  <rect x="636" y="358" width="234" height="14" rx="3" fill="#0F172A"/>
  <text x="753" y="369" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">ZADD sorted set · score = timestamp</text>
  <text x="753" y="400" font-family="Inter,sans-serif" font-size="9" fill="#F87171" text-anchor="middle">TTL 48h · &lt;1ms feed read</text>
  <text x="753" y="416" font-family="Inter,sans-serif" font-size="8" fill="#475569" text-anchor="middle">500M+ feeds pre-computed</text>
  <text x="753" y="432" font-family="Inter,sans-serif" font-size="8" fill="#64748B" text-anchor="middle">photos served via CDN · S3 signed URL</text>

  <!-- Zone 6: Viewers (left) -->
  <rect x="18" y="251" width="265" height="200" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <text x="150" y="272" font-family="Inter,sans-serif" font-size="11" fill="#818CF8" text-anchor="middle" font-weight="700">Viewers</text>
  <!-- feed mockups -->
  <rect x="30" y="282" width="100" height="70" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1"/>
  <rect x="34" y="288" width="92" height="52" rx="4" fill="url(#photo-grad)" opacity="0.7"/>
  <text x="80" y="362" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">feed A</text>
  <rect x="153" y="282" width="100" height="70" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1" opacity="0.8"/>
  <rect x="157" y="288" width="92" height="52" rx="4" fill="url(#photo-grad)" opacity="0.5"/>
  <text x="203" y="362" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">feed B</text>
  <text x="150" y="385" font-family="Inter,sans-serif" font-size="22" fill="#475569" text-anchor="middle">···</text>
  <rect x="30" y="395" width="224" height="44" rx="6" fill="#1E293B" stroke="#6366F1" stroke-width="0.5"/>
  <text x="142" y="415" font-family="Inter,sans-serif" font-size="22" fill="#818CF8" text-anchor="middle" font-weight="700">500M+</text>
  <text x="142" y="430" font-family="Inter,sans-serif" font-size="8.5" fill="#475569" text-anchor="middle">daily active users · CDN &lt;50ms globally</text>

  <!-- ── Bottom metrics bar ── -->
  <rect x="18" y="450" width="864" height="10" rx="3" fill="#1E293B" opacity="0.7"/>
  <text x="160" y="458" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">upload: async resize + object store</text>
  <line x1="290" y1="451" x2="290" y2="459" stroke="#334155" stroke-width="0.5"/>
  <text x="450" y="458" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">fan-out: write &lt;1K followers · pull-on-read for celebs</text>
  <line x1="610" y1="451" x2="610" y2="459" stroke="#334155" stroke-width="0.5"/>
  <text x="750" y="458" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">feed sorted set TTL 48h · photos via CDN</text>
</svg>
