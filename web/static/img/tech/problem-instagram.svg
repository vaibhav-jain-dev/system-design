<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <defs>
    <linearGradient id="bg-ig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1033"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="photo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" fill="url(#bg-ig)" rx="12"/>

  <!-- ── Section labels ── -->
  <text x="20" y="14" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">UPLOAD PATH</text>
  <line x1="110" y1="11" x2="340" y2="11" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="400" y="14" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">FAN-OUT</text>
  <line x1="450" y1="11" x2="600" y2="11" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="640" y="14" font-family="Inter,sans-serif" font-size="7" fill="#334155" letter-spacing="1.5">READ PATH</text>
  <line x1="720" y1="11" x2="880" y2="11" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- ══ Zone 1: Mobile Device (x=20) ══ -->
  <rect x="24" y="42" width="76" height="116" rx="10" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <rect x="30" y="50" width="64" height="80" rx="4" fill="#0F172A"/>
  <!-- photo preview -->
  <rect x="33" y="53" width="58" height="44" rx="3" fill="url(#photo-grad)"/>
  <!-- mountain photo icon -->
  <path d="M 33 86 L 46 68 L 58 80 L 66 72 L 91 86" fill="#1E293B" opacity="0.5"/>
  <circle cx="44" cy="62" r="5" fill="#FCD34D" opacity="0.6"/>
  <!-- caption lines -->
  <rect x="33" y="100" width="58" height="5" rx="2" fill="#1E293B"/>
  <rect x="33" y="109" width="42" height="5" rx="2" fill="#1E293B"/>
  <!-- upload button -->
  <rect x="33" y="120" width="58" height="14" rx="4" fill="#312E81"/>
  <text x="62" y="130" font-family="Inter,sans-serif" font-size="7" fill="#C7D2FE" text-anchor="middle" font-weight="600">▲ Upload</text>
  <!-- home indicator -->
  <rect x="52" y="152" width="20" height="3" rx="1.5" fill="#334155"/>
  <text x="62" y="170" font-family="Inter,sans-serif" font-size="7.5" fill="#818CF8" text-anchor="middle" font-weight="600">Mobile</text>
  <text x="62" y="181" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">300M uploads/day</text>

  <!-- Arrow: Mobile → Upload Service -->
  <path d="M 103 90 L 131 90" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="128,86 136,90 128,94" fill="#6366F1"/>
  <text x="117" y="82" font-family="Inter,sans-serif" font-size="6" fill="#6366F1" text-anchor="middle">POST</text>

  <!-- ══ Zone 2: Upload Service (x=134) ══ -->
  <rect x="134" y="55" width="110" height="70" rx="8" fill="#1E293B" stroke="#7C3AED" stroke-width="1.5"/>
  <!-- resize pipeline -->
  <text x="189" y="72" font-family="Inter,sans-serif" font-size="7.5" fill="#C4B5FD" text-anchor="middle" font-weight="600">Upload Service</text>
  <!-- size variants -->
  <rect x="142" y="78" width="22" height="16" rx="2" fill="url(#photo-grad)"/>
  <text x="153" y="89" font-family="Inter,sans-serif" font-size="5.5" fill="#E9D5FF" text-anchor="middle">L</text>
  <rect x="168" y="80" width="18" height="12" rx="2" fill="url(#photo-grad)" opacity="0.8"/>
  <text x="177" y="90" font-family="Inter,sans-serif" font-size="5" fill="#E9D5FF" text-anchor="middle">M</text>
  <rect x="190" y="82" width="14" height="10" rx="2" fill="url(#photo-grad)" opacity="0.6"/>
  <text x="197" y="90" font-family="Inter,sans-serif" font-size="4.5" fill="#E9D5FF" text-anchor="middle">S</text>
  <text x="189" y="105" font-family="Inter,sans-serif" font-size="6.5" fill="#A78BFA" text-anchor="middle">resize → 3 variants</text>
  <!-- metadata -->
  <rect x="142" y="110" width="94" height="10" rx="2" fill="#0F172A"/>
  <text x="189" y="118" font-family="monospace" font-size="5.5" fill="#7C3AED" text-anchor="middle">photo_id, user_id, timestamp</text>
  <text x="189" y="136" font-family="Inter,sans-serif" font-size="6.5" fill="#7C3AED" text-anchor="middle">async after ACK</text>

  <!-- Arrow: Upload → S3 -->
  <path d="M 246 90 L 272 90" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="269,86 277,90 269,94" fill="#D97706"/>
  <text x="259" y="82" font-family="Inter,sans-serif" font-size="6" fill="#D97706" text-anchor="middle">store</text>

  <!-- ══ Zone 3: S3 Object Store (x=275) ══ -->
  <rect x="275" y="42" width="120" height="56" rx="8" fill="#1E293B" stroke="#D97706" stroke-width="1.5"/>
  <!-- S3 bucket icon -->
  <path d="M 296 58 L 291 80 L 339 80 L 334 58 Z" fill="#1E293B" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 293 58 Q 315 51 337 58" stroke="#FCD34D" stroke-width="1.5" fill="none"/>
  <!-- photos in bucket rows -->
  <rect x="296" y="63" width="16" height="12" rx="1" fill="#78350F" opacity="0.8"/>
  <rect x="315" y="63" width="16" height="12" rx="1" fill="#92400E" opacity="0.7"/>
  <rect x="296" y="65" width="16" height="3" rx="1" fill="#FCD34D" opacity="0.4"/>
  <!-- stats -->
  <text x="356" y="58" font-family="Inter,sans-serif" font-size="7.5" fill="#FDE68A" font-weight="600">S3</text>
  <text x="356" y="70" font-family="Inter,sans-serif" font-size="6.5" fill="#D97706">Object Store</text>
  <text x="356" y="82" font-family="monospace" font-size="5.5" fill="#64748B">CDN-origin</text>
  <text x="335" y="108" font-family="Inter,sans-serif" font-size="7.5" fill="#FDE68A" text-anchor="middle" font-weight="600">Object Storage</text>
  <text x="335" y="120" font-family="Inter,sans-serif" font-size="6.5" fill="#92400E" text-anchor="middle">3 redundant copies / region</text>

  <!-- Arrow: Upload → Fan-out Worker (via queue) -->
  <path d="M 189 127 L 189 148 L 360 148 L 360 160" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="356,157 360,165 364,157" fill="#2563EB"/>
  <text x="270" y="143" font-family="Inter,sans-serif" font-size="6" fill="#2563EB" text-anchor="middle">Kafka event</text>

  <!-- ══ Zone 4: Fan-out Worker (x=275, y=165) ══ -->
  <rect x="275" y="163" width="120" height="24" rx="6" fill="#1E293B" stroke="#2563EB" stroke-width="1.5"/>
  <text x="335" y="175" font-family="Inter,sans-serif" font-size="8" fill="#93C5FD" text-anchor="middle" font-weight="600">Fan-out Worker</text>
  <text x="335" y="183" font-family="Inter,sans-serif" font-size="6" fill="#475569" text-anchor="middle">write to N follower feeds</text>

  <!-- Arrow: Fan-out → Feed DBs -->
  <path d="M 397 175 L 430 175" stroke="#2563EB" stroke-width="1.5"/>
  <polygon points="427,171 435,175 427,179" fill="#2563EB"/>

  <!-- ══ Zone 5: Feed Cache / Redis (x=432) ══ -->
  <rect x="432" y="42" width="130" height="148" rx="8" fill="#1E293B" stroke="#DC2626" stroke-width="1.5"/>
  <text x="497" y="60" font-family="Inter,sans-serif" font-size="8" fill="#FCA5A5" text-anchor="middle" font-weight="600">Feed Cache</text>
  <!-- Redis cube -->
  <path d="M 455 80 L 475 70 L 495 80 L 495 100 L 475 110 L 455 100 Z" fill="#1E293B" stroke="#F87171" stroke-width="1.5"/>
  <path d="M 455 80 L 475 90 L 495 80" fill="none" stroke="#F87171" stroke-width="1"/>
  <path d="M 475 90 L 475 110" stroke="#F87171" stroke-width="1"/>
  <!-- feed entries -->
  <rect x="505" y="68" width="50" height="8" rx="2" fill="#0F172A"/>
  <text x="530" y="75" font-family="monospace" font-size="5.5" fill="#FCA5A5">user_feed:7</text>
  <rect x="505" y="80" width="50" height="8" rx="2" fill="#0F172A"/>
  <text x="530" y="87" font-family="monospace" font-size="5.5" fill="#FCA5A5">user_feed:23</text>
  <rect x="505" y="92" width="50" height="8" rx="2" fill="#0F172A"/>
  <text x="530" y="99" font-family="monospace" font-size="5.5" fill="#FCA5A5">user_feed:42</text>
  <!-- sorted set label -->
  <rect x="440" y="116" width="114" height="10" rx="3" fill="#0F172A"/>
  <text x="497" y="124" font-family="monospace" font-size="5.5" fill="#64748B" text-anchor="middle">ZADD feed_key score photo_id</text>
  <rect x="440" y="130" width="114" height="10" rx="3" fill="#450A0A" stroke="#DC2626" stroke-width="0.5"/>
  <text x="497" y="138" font-family="Inter,sans-serif" font-size="6.5" fill="#FCA5A5" text-anchor="middle">sorted by timestamp score</text>
  <!-- fan-out note -->
  <rect x="440" y="145" width="114" height="10" rx="3" fill="#0C1A3A"/>
  <text x="497" y="153" font-family="Inter,sans-serif" font-size="6.5" fill="#60A5FA" text-anchor="middle">fan-out: writes &lt;1K followers</text>
  <rect x="440" y="158" width="114" height="10" rx="3" fill="#0C1A3A"/>
  <text x="497" y="166" font-family="Inter,sans-serif" font-size="6.5" fill="#93C5FD" text-anchor="middle">pull: celebs &gt;1M followers</text>
  <text x="497" y="182" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">&lt;1ms feed read</text>

  <!-- Arrow: S3 → CDN -->
  <path d="M 397 70 L 425 70" stroke="#0891B2" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Arrow: CDN zone (right) -->
  <path d="M 564 100 L 598 100" stroke="#0891B2" stroke-width="1.5"/>
  <polygon points="595,96 603,100 595,104" fill="#0891B2"/>

  <!-- Arrow: Feed Cache → CDN -->
  <path d="M 564 70 L 598 70" stroke="#0891B2" stroke-width="1.5"/>
  <polygon points="595,66 603,70 595,74" fill="#0891B2"/>
  <text x="581" y="62" font-family="Inter,sans-serif" font-size="6" fill="#0891B2" text-anchor="middle">assets</text>
  <text x="581" y="92" font-family="Inter,sans-serif" font-size="6" fill="#0891B2" text-anchor="middle">feed</text>

  <!-- ══ Zone 6: CDN (x=601) ══ -->
  <rect x="601" y="42" width="120" height="90" rx="8" fill="#1E293B" stroke="#0891B2" stroke-width="1.5"/>
  <!-- Globe icon -->
  <circle cx="645" cy="87" r="24" fill="none" stroke="#0891B2" stroke-width="1.5"/>
  <path d="M 645 63 Q 657 75 657 87 Q 657 99 645 111" stroke="#0891B2" stroke-width="1" fill="none"/>
  <path d="M 645 63 Q 633 75 633 87 Q 633 99 645 111" stroke="#0891B2" stroke-width="1" fill="none"/>
  <line x1="621" y1="87" x2="669" y2="87" stroke="#0891B2" stroke-width="1"/>
  <line x1="623" y1="76" x2="667" y2="76" stroke="#0891B2" stroke-width="0.8" opacity="0.5"/>
  <line x1="623" y1="98" x2="667" y2="98" stroke="#0891B2" stroke-width="0.8" opacity="0.5"/>
  <text x="690" y="75" font-family="Inter,sans-serif" font-size="8" fill="#22D3EE" font-weight="600">CDN</text>
  <text x="690" y="87" font-family="Inter,sans-serif" font-size="6.5" fill="#0891B2">200+ PoPs</text>
  <text x="690" y="99" font-family="Inter,sans-serif" font-size="6.5" fill="#0891B2">edge cache</text>
  <text x="661" y="145" font-family="Inter,sans-serif" font-size="8" fill="#22D3EE" text-anchor="middle" font-weight="600">CDN / Edge</text>
  <text x="661" y="157" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">photos served from nearest PoP</text>

  <!-- Arrow: CDN → Viewers -->
  <path d="M 723 87 L 753 87" stroke="#0891B2" stroke-width="1.5"/>
  <polygon points="750,83 758,87 750,91" fill="#0891B2"/>

  <!-- ══ Zone 7: Viewers (x=756) ══ -->
  <rect x="756" y="42" width="124" height="90" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <!-- Three user devices stacked -->
  <rect x="764" y="52" width="40" height="28" rx="4" fill="#1E293B" stroke="#818CF8" stroke-width="1"/>
  <rect x="767" y="55" width="34" height="18" rx="2" fill="url(#photo-grad)" opacity="0.7"/>
  <text x="784" y="88" font-family="Inter,sans-serif" font-size="6.5" fill="#94A3B8" text-anchor="middle">feed A</text>
  <rect x="812" y="52" width="40" height="28" rx="4" fill="#1E293B" stroke="#818CF8" stroke-width="1" opacity="0.8"/>
  <rect x="815" y="55" width="34" height="18" rx="2" fill="url(#photo-grad)" opacity="0.5"/>
  <text x="832" y="88" font-family="Inter,sans-serif" font-size="6.5" fill="#94A3B8" text-anchor="middle">feed B</text>
  <!-- ellipsis for more users -->
  <text x="800" y="110" font-family="Inter,sans-serif" font-size="14" fill="#475569" text-anchor="middle">···</text>
  <text x="818" y="125" font-family="Inter,sans-serif" font-size="8" fill="#818CF8" text-anchor="middle" font-weight="600">500M+</text>
  <text x="818" y="136" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">daily active users</text>

  <!-- ── Bottom metrics bar ── -->
  <rect x="20" y="184" width="860" height="12" rx="4" fill="#1E293B" opacity="0.6"/>
  <text x="115" y="193" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">upload: async resize + store</text>
  <line x1="215" y1="185" x2="215" y2="195" stroke="#334155" stroke-width="0.5"/>
  <text x="335" y="193" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">fan-out write (&lt;1K) or pull-on-read (celeb)</text>
  <line x1="455" y1="185" x2="455" y2="195" stroke="#334155" stroke-width="0.5"/>
  <text x="570" y="193" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">feed sorted set TTL 48h — 500 photos max</text>
  <line x1="685" y1="185" x2="685" y2="195" stroke="#334155" stroke-width="0.5"/>
  <text x="793" y="193" font-family="Inter,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">CDN: photos served &lt;50ms globally</text>
</svg>
