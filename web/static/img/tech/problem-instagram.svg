<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- Row labels -->
  <rect x="18" y="18" width="116" height="20" rx="4" fill="#FCE7F3"/>
  <text x="76" y="32" font-family="Inter,sans-serif" font-size="10" fill="#9D174D" text-anchor="middle" font-weight="700">UPLOAD PATH</text>
  <rect x="18" y="245" width="148" height="20" rx="4" fill="#FEF3C7"/>
  <text x="92" y="259" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="700">FAN-OUT + READ PATH</text>

  <!-- ── ROW 1: UPLOAD PATH ── -->
  <!-- Mobile -->
  <rect x="18" y="44" width="150" height="190" rx="8" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/>
  <text x="93" y="64" font-family="Inter,sans-serif" font-size="10" fill="#9D174D" text-anchor="middle" font-weight="600">MOBILE</text>
  <rect x="56" y="72" width="74" height="108" rx="8" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1.5"/>
  <rect x="60" y="80" width="66" height="60" rx="4" fill="#FBCFE8"/>
  <rect x="66" y="84" width="54" height="48" rx="2" fill="#F9A8D4"/>
  <circle cx="80" cy="96" r="5" fill="#FECDD3"/>
  <path d="M 66 120 L 82 108 L 96 118 L 106 108 L 120 120 L 120 132 L 66 132 Z" fill="#F472B6" opacity="0.4"/>
  <rect x="66" y="148" width="54" height="16" rx="4" fill="#DB2777"/>
  <text x="93" y="160" font-family="Inter,sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">Upload</text>
  <text x="93" y="196" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">500M users · 100M</text>
  <text x="93" y="209" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">uploads/day</text>

  <path d="M 170 130 L 204 130" stroke="#DB2777" stroke-width="2"/>
  <polygon points="201,126 209,130 201,134" fill="#DB2777"/>
  <text x="187" y="122" font-family="monospace" font-size="8" fill="#DB2777" text-anchor="middle">HTTP</text>

  <!-- Upload Service -->
  <rect x="206" y="44" width="256" height="190" rx="8" fill="#FFFFFF" stroke="#F9A8D4" stroke-width="1.5"/>
  <text x="334" y="64" font-family="Inter,sans-serif" font-size="10" fill="#9D174D" text-anchor="middle" font-weight="700">UPLOAD SERVICE</text>
  <text x="228" y="84" font-family="monospace" font-size="8.5" fill="#64748B">Resize variants:</text>
  <rect x="220" y="90" width="52" height="40" rx="4" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
  <text x="246" y="107" font-family="monospace" font-size="8" fill="#9D174D" text-anchor="middle">L</text>
  <text x="246" y="120" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">1080px</text>
  <rect x="278" y="90" width="46" height="40" rx="4" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
  <text x="301" y="107" font-family="monospace" font-size="8" fill="#9D174D" text-anchor="middle">M</text>
  <text x="301" y="120" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">720px</text>
  <rect x="330" y="94" width="40" height="36" rx="4" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
  <text x="350" y="109" font-family="monospace" font-size="8" fill="#9D174D" text-anchor="middle">S</text>
  <text x="350" y="122" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">480px</text>
  <rect x="220" y="140" width="228" height="30" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="334" y="153" font-family="monospace" font-size="9" fill="#92400E" text-anchor="middle" font-weight="600">Kafka: photo.uploaded</text>
  <text x="334" y="165" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">&#123; photoId, userId, variants[] &#125;</text>
  <text x="334" y="215" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">async · decoupled from fan-out</text>

  <path d="M 464 130 L 496 130" stroke="#DB2777" stroke-width="2"/>
  <polygon points="493,126 501,130 493,134" fill="#DB2777"/>

  <!-- S3 -->
  <rect x="498" y="44" width="238" height="190" rx="8" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="617" y="64" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="700">S3 OBJECT STORE</text>
  <ellipse cx="617" cy="106" rx="44" ry="16" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <path d="M 573 106 L 573 150" stroke="#F59E0B" stroke-width="1.5"/>
  <path d="M 661 106 L 661 150" stroke="#F59E0B" stroke-width="1.5"/>
  <ellipse cx="617" cy="150" rx="44" ry="16" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <path d="M 573 128 Q 617 140 661 128" stroke="#F59E0B" stroke-width="0.8" fill="none" opacity="0.5"/>
  <text x="617" y="132" font-family="monospace" font-size="9" fill="#92400E" text-anchor="middle">S3</text>
  <rect x="510" y="170" width="214" height="28" rx="4" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="617" y="183" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">photos/{userId}/{photoId}_L.jpg</text>
  <text x="617" y="195" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">3 variants · 11 nines durability</text>
  <text x="617" y="216" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">CDN origin · presigned upload URLs</text>

  <!-- Vertical connector -->
  <line x1="334" y1="234" x2="334" y2="268" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ── ROW 2: FAN-OUT ── -->
  <!-- Viewers -->
  <rect x="18" y="268" width="190" height="170" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="113" y="288" font-family="Inter,sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600">VIEWERS</text>
  <rect x="28" y="298" width="40" height="56" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="30" y="302" width="36" height="34" rx="2" fill="#FCE7F3"/>
  <rect x="84" y="298" width="40" height="56" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="86" y="302" width="36" height="34" rx="2" fill="#DBEAFE"/>
  <rect x="140" y="298" width="40" height="56" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="142" y="302" width="36" height="34" rx="2" fill="#D1FAE5"/>
  <text x="113" y="374" font-family="Inter,sans-serif" font-size="16" fill="#1E293B" text-anchor="middle" font-weight="700">500M+</text>
  <text x="113" y="392" font-family="Inter,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">daily active users</text>
  <text x="113" y="412" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">GET /feed → Redis</text>

  <path d="M 210 358 L 244 358" stroke="#D97706" stroke-width="2"/>
  <polygon points="241,354 249,358 241,362" fill="#D97706"/>

  <!-- Fan-out Worker -->
  <rect x="246" y="268" width="234" height="170" rx="8" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="363" y="288" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="700">FAN-OUT WORKER</text>
  <text x="260" y="308" font-family="monospace" font-size="8.5" fill="#64748B">Kafka → consume event</text>
  <rect x="258" y="314" width="214" height="20" rx="4" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="365" y="328" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">ZADD feed:{followerId} ts photoId</text>
  <rect x="258" y="340" width="102" height="42" rx="4" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="309" y="355" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle" font-weight="600">PUSH</text>
  <text x="309" y="368" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">&lt;1K followers</text>
  <text x="309" y="379" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">write all feeds</text>
  <rect x="366" y="340" width="102" height="42" rx="4" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="417" y="355" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle" font-weight="600">PULL</text>
  <text x="417" y="368" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">celebs &gt;1K</text>
  <text x="417" y="379" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">merge on read</text>
  <text x="363" y="418" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">async · scale consumers</text>

  <path d="M 482 358 L 514 358" stroke="#059669" stroke-width="2"/>
  <polygon points="511,354 519,358 511,362" fill="#059669"/>

  <!-- Feed Cache -->
  <rect x="516" y="268" width="366" height="170" rx="8" fill="#FFFFFF" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="699" y="288" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">FEED CACHE  (Redis Sorted Set)</text>
  <polygon points="547,306 575,298 575,328 547,336" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <polygon points="519,306 547,298 575,298 547,306" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <polygon points="519,306 519,336 547,336 547,306" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
  <rect x="592" y="298" width="278" height="14" rx="3" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="731" y="309" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">feed:userId → [(score:ts, photoId), ...]</text>
  <rect x="592" y="316" width="278" height="14" rx="3" fill="#ECFDF5"/>
  <text x="731" y="327" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">ZRANGEBYSCORE → top 20 posts</text>
  <rect x="592" y="334" width="278" height="14" rx="3" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="731" y="345" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">TTL: 48h · ~200 entries/user</text>
  <rect x="592" y="352" width="278" height="14" rx="3" fill="#FEF3C7"/>
  <text x="731" y="363" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">cache miss → rebuild from DB + follows</text>
  <text x="699" y="404" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">O(logN) ZRANGEBYSCORE · &lt;1ms feed read</text>
  <text x="699" y="420" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">CDN serves media · Redis serves feed ordering</text>

  <!-- Bottom bar -->
  <rect x="18" y="444" width="864" height="14" rx="4" fill="#FCE7F3" stroke="#FBCFE8" stroke-width="1"/>
  <text x="450" y="455" font-family="monospace" font-size="8" fill="#9D174D" text-anchor="middle">upload async  ·  fan-out push/pull hybrid  ·  feed TTL 48h  ·  CDN for media  ·  100M uploads/day  ·  500M DAU</text>
</svg>
