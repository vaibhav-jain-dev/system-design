<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none">
  <defs>
    <linearGradient id="bg-ig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1033"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="photo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="320" height="160" fill="url(#bg-ig)" rx="10"/>

  <!-- Upload flow (left) -->
  <!-- User device -->
  <rect x="12" y="55" width="44" height="64" rx="6" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <rect x="16" y="60" width="36" height="48" rx="3" fill="#334155"/>
  <!-- Photo on screen -->
  <rect x="19" y="63" width="30" height="24" rx="2" fill="url(#photo-grad)"/>
  <circle cx="26" cy="70" r="3" fill="#A78BFA" opacity="0.6"/>
  <path d="M 19 82 L 26 75 L 32 80 L 37 73 L 49 82" stroke="#818CF8" stroke-width="1" fill="none"/>
  <text x="34" y="101" font-family="Inter,sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Upload</text>

  <!-- Arrow to CDN -->
  <path d="M 58 78 L 80 78" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="77,74 85,78 77,82" fill="#6366F1"/>

  <!-- Object Store / S3 -->
  <rect x="84" y="55" width="64" height="58" rx="8" fill="#1E293B" stroke="#D97706" stroke-width="1.5"/>
  <!-- Bucket icon -->
  <path d="M 100 72 L 96 88 L 132 88 L 128 72 Z" fill="#1E293B" stroke="#FCD34D" stroke-width="1.5"/>
  <path d="M 98 72 Q 116 66 134 72" stroke="#FCD34D" stroke-width="1.5" fill="none"/>
  <!-- Photos in bucket -->
  <rect x="100" y="75" width="12" height="9" rx="1" fill="#78350F" opacity="0.8"/>
  <rect x="115" y="75" width="12" height="9" rx="1" fill="#92400E" opacity="0.7"/>
  <rect x="100" y="78" width="12" height="2" rx="1" fill="#FCD34D" opacity="0.5"/>
  <text x="116" y="104" font-family="Inter,sans-serif" font-size="8" fill="#FDE68A" text-anchor="middle">Object</text>
  <text x="116" y="114" font-family="Inter,sans-serif" font-size="8" fill="#FDE68A" text-anchor="middle">Storage</text>

  <!-- CDN edge -->
  <rect x="84" y="120" width="64" height="28" rx="6" fill="#0F2A1E" stroke="#059669" stroke-width="1.5"/>
  <circle cx="116" cy="134" r="8" fill="none" stroke="#10B981" stroke-width="1"/>
  <path d="M 108 134 Q 116 126 124 134 Q 116 142 108 134" stroke="#10B981" stroke-width="0.8" fill="none"/>
  <line x1="108" y1="134" x2="124" y2="134" stroke="#10B981" stroke-width="0.8"/>
  <text x="116" y="144" font-family="monospace" font-size="7" fill="#6EE7B7" text-anchor="middle">CDN</text>

  <!-- Feed generation (right) -->
  <!-- Feed DB -->
  <rect x="170" y="40" width="60" height="52" rx="8" fill="#1E293B" stroke="#7C3AED" stroke-width="1.5"/>
  <ellipse cx="200" cy="56" rx="18" ry="6" fill="none" stroke="#C4B5FD" stroke-width="1.5"/>
  <path d="M 182 56 L 182 76" stroke="#C4B5FD" stroke-width="1.5"/>
  <path d="M 218 56 L 218 76" stroke="#C4B5FD" stroke-width="1.5"/>
  <ellipse cx="200" cy="76" rx="18" ry="6" fill="none" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="200" y="102" font-family="Inter,sans-serif" font-size="8" fill="#DDD6FE" text-anchor="middle">Feed DB</text>

  <!-- Worker -->
  <rect x="170" y="104" width="60" height="30" rx="6" fill="#1E293B" stroke="#2563EB" stroke-width="1.5"/>
  <text x="200" y="120" font-family="Inter,sans-serif" font-size="8" fill="#93C5FD" text-anchor="middle">Fan-out</text>
  <text x="200" y="130" font-family="Inter,sans-serif" font-size="7" fill="#60A5FA" text-anchor="middle">Worker</text>

  <!-- Follower feeds -->
  <rect x="252" y="30" width="52" height="22" rx="5" fill="#1E293B" stroke="#6366F1" stroke-width="1"/>
  <text x="278" y="45" font-family="Inter,sans-serif" font-size="7" fill="#A5B4FC" text-anchor="middle">User A Feed</text>
  <rect x="252" y="60" width="52" height="22" rx="5" fill="#1E293B" stroke="#6366F1" stroke-width="1"/>
  <text x="278" y="75" font-family="Inter,sans-serif" font-size="7" fill="#A5B4FC" text-anchor="middle">User B Feed</text>
  <rect x="252" y="90" width="52" height="22" rx="5" fill="#1E293B" stroke="#6366F1" stroke-width="1"/>
  <text x="278" y="105" font-family="Inter,sans-serif" font-size="7" fill="#A5B4FC" text-anchor="middle">User C Feed</text>
  <rect x="252" y="120" width="52" height="22" rx="5" fill="#1E293B" stroke="#6366F1" stroke-width="1" opacity="0.6"/>
  <text x="278" y="135" font-family="Inter,sans-serif" font-size="7" fill="#6366F1" text-anchor="middle">10M+ users</text>

  <!-- Arrows from worker to feeds -->
  <path d="M 232 120 L 250 41" stroke="#6366F1" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <path d="M 232 120 L 250 71" stroke="#6366F1" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <path d="M 232 120 L 250 101" stroke="#6366F1" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <path d="M 232 120 L 250 131" stroke="#6366F1" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- Arrows between S3 and Feed -->
  <path d="M 150 70 L 168 70" stroke="#D97706" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <polygon points="165,66 173,70 165,74" fill="#D97706" opacity="0.6"/>
</svg>
