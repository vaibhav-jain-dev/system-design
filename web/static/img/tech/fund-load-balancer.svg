<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- ── Left panel ── -->
  <rect x="18" y="18" width="280" height="424" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="98" y="44" width="120" height="80" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
  <circle cx="158" cy="68" r="18" fill="#DBEAFE"/>
  <path d="M 138 72 L 148 56 L 178 72" stroke="#2563EB" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 130 87 L 158 78 L 186 87" stroke="#2563EB" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="158" y="112" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle">Load Balancer</text>
  <text x="158" y="152" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="600">Layer 4  vs  Layer 7</text>
  <text x="158" y="168" font-family="Inter,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">NLB  ·  ALB  ·  HAProxy  ·  Nginx</text>

  <rect x="30" y="180" width="256" height="48" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="50" y="200" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" font-weight="600">Round Robin</text>
  <text x="50" y="216" font-family="monospace" font-size="9" fill="#64748B">equal distribution · stateless</text>

  <rect x="30" y="236" width="256" height="48" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="50" y="256" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" font-weight="600">Least Connections</text>
  <text x="50" y="272" font-family="monospace" font-size="9" fill="#64748B">route to fewest active connections</text>

  <rect x="30" y="292" width="256" height="48" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="50" y="312" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" font-weight="600">IP Hash</text>
  <text x="50" y="328" font-family="monospace" font-size="9" fill="#64748B">hash(client_ip) → sticky server</text>

  <rect x="30" y="348" width="256" height="48" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="50" y="368" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" font-weight="600">Weighted RR</text>
  <text x="50" y="384" font-family="monospace" font-size="9" fill="#64748B">server capacity ratios · canary deploy</text>

  <rect x="30" y="404" width="256" height="30" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="158" y="423" font-family="monospace" font-size="9" fill="#1D4ED8" text-anchor="middle">Health check every 5–30s · auto-failover</text>

  <!-- ── Right: Architecture ── -->
  <text x="320" y="30" font-family="Inter,sans-serif" font-size="13" fill="#374151" font-weight="600">Traffic Flow  ·  L4 vs L7  ·  Health Checks</text>

  <!-- Clients -->
  <rect x="318" y="42" width="100" height="162" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="368" y="64" font-family="Inter,sans-serif" font-size="10" fill="#64748B" text-anchor="middle" font-weight="600">Clients</text>
  <circle cx="346" cy="88" r="12" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="346" cy="84" r="4" fill="#94A3B8"/>
  <path d="M 334 97 Q 346 91 358 97" fill="#E2E8F0" stroke="none"/>
  <circle cx="386" cy="104" r="12" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="386" cy="100" r="4" fill="#94A3B8"/>
  <path d="M 374 113 Q 386 107 398 113" fill="#E2E8F0" stroke="none"/>
  <circle cx="346" cy="130" r="12" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="346" cy="126" r="4" fill="#94A3B8"/>
  <path d="M 334 139 Q 346 133 358 139" fill="#E2E8F0" stroke="none"/>
  <circle cx="386" cy="152" r="12" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="386" cy="148" r="4" fill="#94A3B8"/>
  <path d="M 374 161 Q 386 155 398 161" fill="#E2E8F0" stroke="none"/>
  <text x="368" y="192" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">10K+ rps</text>

  <path d="M 420 123 L 450 123" stroke="#2563EB" stroke-width="2"/>
  <polygon points="447,119 455,123 447,127" fill="#2563EB"/>

  <!-- Load Balancer box -->
  <rect x="453" y="42" width="130" height="162" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="518" y="64" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="700">Load Balancer</text>
  <circle cx="518" cy="96" r="22" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <path d="M 501 100 L 509 86 L 535 100" stroke="#2563EB" stroke-width="2" fill="none"/>
  <path d="M 495 114 L 518 107 L 541 114" stroke="#2563EB" stroke-width="1.5" fill="none"/>
  <rect x="464" y="128" width="46" height="18" rx="3" fill="#1D4ED8"/>
  <text x="487" y="141" font-family="monospace" font-size="9" fill="#FFFFFF" text-anchor="middle">L4/NLB</text>
  <rect x="516" y="128" width="58" height="18" rx="3" fill="#3B82F6"/>
  <text x="545" y="141" font-family="monospace" font-size="9" fill="#FFFFFF" text-anchor="middle">L7/ALB</text>
  <text x="518" y="162" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">Round Robin</text>
  <text x="518" y="175" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">algorithm</text>
  <text x="518" y="192" font-family="Inter,sans-serif" font-size="8" fill="#2563EB" text-anchor="middle">VIP: 10.0.0.1</text>

  <!-- Arrows to servers -->
  <path d="M 585 80 L 617 58" stroke="#059669" stroke-width="1.5"/>
  <polygon points="614,62 621,52 616,63" fill="#059669"/>
  <path d="M 585 123 L 617 123" stroke="#059669" stroke-width="1.5"/>
  <polygon points="614,119 622,123 614,127" fill="#059669"/>
  <path d="M 585 165 L 617 187" stroke="#059669" stroke-width="1.5"/>
  <polygon points="615,184 621,193 616,182" fill="#059669"/>

  <!-- Server A (healthy) -->
  <rect x="620" y="36" width="120" height="50" rx="5" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="630" y="46" width="88" height="8" rx="2" fill="#D1FAE5"/>
  <rect x="630" y="57" width="58" height="8" rx="2" fill="#D1FAE5" opacity="0.5"/>
  <circle cx="732" cy="50" r="5" fill="#059669"/>
  <text x="680" y="76" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle">Server A  · healthy</text>

  <!-- Server B (healthy) -->
  <rect x="620" y="98" width="120" height="50" rx="5" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="630" y="108" width="88" height="8" rx="2" fill="#D1FAE5"/>
  <rect x="630" y="119" width="58" height="8" rx="2" fill="#D1FAE5" opacity="0.5"/>
  <circle cx="732" cy="112" r="5" fill="#059669"/>
  <text x="680" y="138" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle">Server B  · healthy</text>

  <!-- Server C (degraded) -->
  <rect x="620" y="160" width="120" height="50" rx="5" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <rect x="630" y="170" width="88" height="8" rx="2" fill="#FDE68A" opacity="0.5"/>
  <rect x="630" y="181" width="58" height="8" rx="2" fill="#FDE68A" opacity="0.3"/>
  <circle cx="732" cy="174" r="5" fill="#F59E0B"/>
  <text x="680" y="200" font-family="Inter,sans-serif" font-size="9" fill="#92400E" text-anchor="middle">Server C  · degraded</text>

  <!-- Health check indicators -->
  <line x1="740" y1="61" x2="850" y2="61" stroke="#059669" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="740" y1="123" x2="850" y2="123" stroke="#059669" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="740" y1="185" x2="850" y2="185" stroke="#D97706" stroke-width="0.8" stroke-dasharray="3,3"/>
  <rect x="850" y="46" width="18" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="859" y="59" font-family="monospace" font-size="9" fill="#059669" text-anchor="middle">✓</text>
  <rect x="850" y="108" width="18" height="18" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="859" y="121" font-family="monospace" font-size="9" fill="#059669" text-anchor="middle">✓</text>
  <rect x="850" y="170" width="18" height="18" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="859" y="183" font-family="monospace" font-size="9" fill="#D97706" text-anchor="middle">!</text>
  <text x="859" y="200" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">check</text>

  <!-- L4 vs L7 comparison -->
  <text x="320" y="230" font-family="Inter,sans-serif" font-size="11" fill="#374151" font-weight="600">L4 vs L7  Comparison</text>

  <rect x="318" y="238" width="270" height="148" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="318" y="238" width="270" height="28" rx="6" fill="#DBEAFE"/>
  <rect x="318" y="252" width="270" height="14" rx="0" fill="#DBEAFE"/>
  <text x="453" y="257" font-family="Inter,sans-serif" font-size="12" fill="#1D4ED8" text-anchor="middle" font-weight="700">Layer 4  (NLB / TCP)</text>
  <text x="335" y="278" font-family="monospace" font-size="9" fill="#64748B">Protocol:</text>
  <text x="420" y="278" font-family="monospace" font-size="9" fill="#374151">TCP / UDP</text>
  <text x="335" y="295" font-family="monospace" font-size="9" fill="#64748B">Routing key:</text>
  <text x="420" y="295" font-family="monospace" font-size="9" fill="#374151">IP + port only</text>
  <text x="335" y="312" font-family="monospace" font-size="9" fill="#64748B">SSL termination:</text>
  <text x="420" y="312" font-family="monospace" font-size="9" fill="#374151">no (passthrough)</text>
  <text x="335" y="329" font-family="monospace" font-size="9" fill="#64748B">Latency:</text>
  <text x="420" y="329" font-family="monospace" font-size="9" fill="#059669">&lt;1ms overhead</text>
  <text x="335" y="346" font-family="monospace" font-size="9" fill="#64748B">Use case:</text>
  <text x="420" y="346" font-family="monospace" font-size="9" fill="#374151">gaming, DB, SMTP</text>
  <rect x="328" y="358" width="250" height="20" rx="3" fill="#EFF6FF"/>
  <text x="453" y="372" font-family="monospace" font-size="8.5" fill="#1D4ED8" text-anchor="middle">AWS NLB · millions rps · static IP</text>

  <rect x="598" y="238" width="270" height="148" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="598" y="238" width="270" height="28" rx="6" fill="#EDE9FE"/>
  <rect x="598" y="252" width="270" height="14" rx="0" fill="#EDE9FE"/>
  <text x="733" y="257" font-family="Inter,sans-serif" font-size="12" fill="#6D28D9" text-anchor="middle" font-weight="700">Layer 7  (ALB / HTTP)</text>
  <text x="615" y="278" font-family="monospace" font-size="9" fill="#64748B">Protocol:</text>
  <text x="700" y="278" font-family="monospace" font-size="9" fill="#374151">HTTP / HTTPS / gRPC</text>
  <text x="615" y="295" font-family="monospace" font-size="9" fill="#64748B">Routing key:</text>
  <text x="700" y="295" font-family="monospace" font-size="9" fill="#374151">path, host, headers</text>
  <text x="615" y="312" font-family="monospace" font-size="9" fill="#64748B">SSL termination:</text>
  <text x="700" y="312" font-family="monospace" font-size="9" fill="#059669">yes — offloads servers</text>
  <text x="615" y="329" font-family="monospace" font-size="9" fill="#64748B">Latency:</text>
  <text x="700" y="329" font-family="monospace" font-size="9" fill="#374151">~1–5ms overhead</text>
  <text x="615" y="346" font-family="monospace" font-size="9" fill="#64748B">Use case:</text>
  <text x="700" y="346" font-family="monospace" font-size="9" fill="#374151">microservices, API GW</text>
  <rect x="608" y="358" width="250" height="20" rx="3" fill="#F5F3FF"/>
  <text x="733" y="372" font-family="monospace" font-size="8.5" fill="#7C3AED" text-anchor="middle">AWS ALB · /api → svc-A, /static → S3</text>

  <!-- Key points -->
  <rect x="318" y="396" width="550" height="56" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="593" y="414" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Interview Key Points</text>
  <text x="593" y="432" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Sticky sessions via cookie/IP hash breaks horizontal scale  ·  Health check interval vs threshold tradeoff</text>
  <text x="593" y="447" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">LB itself is SPOF → use anycast IP + multiple LBs  ·  X-Forwarded-For preserves real client IP</text>
</svg>
