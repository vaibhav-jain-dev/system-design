<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <defs>
    <linearGradient id="bg-lb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091828"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" fill="url(#bg-lb)" rx="12"/>

  <!-- ── Left: LB icon + algorithms ── -->
  <rect x="18" y="18" width="280" height="424" rx="8" fill="#1E293B" stroke="#2563EB" stroke-width="1.5"/>

  <!-- LB icon (large) -->
  <rect x="98" y="44" width="120" height="80" rx="10" fill="#0F172A" stroke="#2563EB" stroke-width="2.5"/>
  <circle cx="158" cy="68" r="18" fill="#1D4ED8" opacity="0.3"/>
  <path d="M 138 72 L 148 56 L 178 72" stroke="#60A5FA" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 130 87 L 158 78 L 186 87" stroke="#60A5FA" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="158" y="112" font-family="Inter,sans-serif" font-size="11" fill="#93C5FD" text-anchor="middle">Load Balancer</text>

  <text x="158" y="150" font-family="Inter,sans-serif" font-size="11" fill="#60A5FA" text-anchor="middle" font-weight="600">Layer 4  vs  Layer 7</text>
  <text x="158" y="166" font-family="Inter,sans-serif" font-size="10" fill="#475569" text-anchor="middle">NLB  ·  ALB  ·  HAProxy  ·  Nginx</text>

  <!-- Key stats -->
  <rect x="30" y="178" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="198" font-family="Inter,sans-serif" font-size="11" fill="#93C5FD" font-weight="600">Round Robin</text>
  <text x="50" y="214" font-family="monospace" font-size="9" fill="#64748B">equal distribution · stateless</text>

  <rect x="30" y="238" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="258" font-family="Inter,sans-serif" font-size="11" fill="#93C5FD" font-weight="600">Least Connections</text>
  <text x="50" y="274" font-family="monospace" font-size="9" fill="#64748B">route to server with fewest active</text>

  <rect x="30" y="298" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="318" font-family="Inter,sans-serif" font-size="11" fill="#93C5FD" font-weight="600">IP Hash</text>
  <text x="50" y="334" font-family="monospace" font-size="9" fill="#64748B">hash(client_ip) → sticky to server</text>

  <rect x="30" y="358" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="378" font-family="Inter,sans-serif" font-size="11" fill="#93C5FD" font-weight="600">Weighted RR</text>
  <text x="50" y="394" font-family="monospace" font-size="9" fill="#64748B">server capacity ratios · canary deploy</text>

  <rect x="30" y="418" width="256" height="16" rx="4" fill="#1E293B" stroke="#2563EB" stroke-width="0.5"/>
  <text x="158" y="430" font-family="Inter,sans-serif" font-size="9" fill="#60A5FA" text-anchor="middle">Health check every 5–30s · auto-failover</text>

  <!-- ── Right: Architecture diagram ── -->
  <text x="320" y="30" font-family="Inter,sans-serif" font-size="13" fill="#94A3B8" font-weight="600">Traffic Flow  ·  L4 vs L7  ·  Health Checks</text>

  <!-- Clients -->
  <rect x="318" y="42" width="100" height="160" rx="6" fill="#1E293B" stroke="#475569" stroke-width="1"/>
  <text x="368" y="64" font-family="Inter,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="600">Clients</text>
  <!-- Client circles -->
  <circle cx="348" cy="88" r="13" fill="#0F172A" stroke="#64748B" stroke-width="1"/>
  <circle cx="348" cy="84" r="4" fill="#64748B"/>
  <path d="M 335 98 Q 348 91 361 98" fill="#334155" stroke="none"/>
  <circle cx="388" cy="104" r="13" fill="#0F172A" stroke="#64748B" stroke-width="1"/>
  <circle cx="388" cy="100" r="4" fill="#64748B"/>
  <path d="M 375 114 Q 388 107 401 114" fill="#334155" stroke="none"/>
  <circle cx="348" cy="130" r="13" fill="#0F172A" stroke="#64748B" stroke-width="1"/>
  <circle cx="348" cy="126" r="4" fill="#64748B"/>
  <path d="M 335 140 Q 348 133 361 140" fill="#334155" stroke="none"/>
  <circle cx="388" cy="152" r="13" fill="#0F172A" stroke="#64748B" stroke-width="1"/>
  <circle cx="388" cy="148" r="4" fill="#64748B"/>
  <path d="M 375 162 Q 388 155 401 162" fill="#334155" stroke="none"/>
  <text x="368" y="192" font-family="Inter,sans-serif" font-size="8" fill="#64748B" text-anchor="middle">10K+ rps</text>

  <!-- Arrow: Clients → LB -->
  <path d="M 420 122 L 452 122" stroke="#2563EB" stroke-width="2"/>
  <polygon points="449,118 457,122 449,126" fill="#2563EB"/>

  <!-- Load Balancer box -->
  <rect x="455" y="42" width="130" height="160" rx="6" fill="#1E293B" stroke="#2563EB" stroke-width="2"/>
  <text x="520" y="64" font-family="Inter,sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle" font-weight="700">Load Balancer</text>
  <!-- LB visual -->
  <circle cx="520" cy="96" r="22" fill="#1D4ED8" opacity="0.2" stroke="#3B82F6" stroke-width="1.5"/>
  <path d="M 503 100 L 511 86 L 537 100" stroke="#60A5FA" stroke-width="2" fill="none"/>
  <path d="M 497 114 L 520 107 L 543 114" stroke="#60A5FA" stroke-width="1.5" fill="none"/>
  <!-- L4/L7 badges -->
  <rect x="466" y="128" width="46" height="18" rx="3" fill="#1D4ED8" opacity="0.7"/>
  <text x="489" y="141" font-family="monospace" font-size="9" fill="#BFDBFE" text-anchor="middle">L4/NLB</text>
  <rect x="518" y="128" width="58" height="18" rx="3" fill="#0F4C8A"/>
  <text x="547" y="141" font-family="monospace" font-size="9" fill="#93C5FD" text-anchor="middle">L7/ALB</text>
  <text x="520" y="162" font-family="monospace" font-size="7.5" fill="#475569" text-anchor="middle">Round Robin</text>
  <text x="520" y="175" font-family="monospace" font-size="7.5" fill="#475569" text-anchor="middle">algorithm</text>
  <text x="520" y="192" font-family="Inter,sans-serif" font-size="8" fill="#2563EB" text-anchor="middle">VIP: 10.0.0.1</text>

  <!-- Arrows: LB → Servers -->
  <path d="M 587 80 L 619 58" stroke="#059669" stroke-width="1.5"/>
  <polygon points="616,62 623,52 618,63" fill="#059669"/>
  <path d="M 587 122 L 619 122" stroke="#059669" stroke-width="1.5"/>
  <polygon points="616,118 624,122 616,126" fill="#059669"/>
  <path d="M 587 164 L 619 186" stroke="#059669" stroke-width="1.5"/>
  <polygon points="617,183 623,192 618,181" fill="#059669"/>

  <!-- Server A -->
  <rect x="622" y="36" width="122" height="50" rx="5" fill="#1E293B" stroke="#059669" stroke-width="1.5"/>
  <rect x="632" y="46" width="90" height="8" rx="2" fill="#065F46" opacity="0.8"/>
  <rect x="632" y="57" width="60" height="8" rx="2" fill="#065F46" opacity="0.5"/>
  <circle cx="734" cy="50" r="5" fill="#10B981"/>
  <text x="683" y="76" font-family="Inter,sans-serif" font-size="9" fill="#6EE7B7" text-anchor="middle">Server A  · 4 vCPU</text>

  <!-- Server B -->
  <rect x="622" y="97" width="122" height="50" rx="5" fill="#1E293B" stroke="#059669" stroke-width="1.5"/>
  <rect x="632" y="107" width="90" height="8" rx="2" fill="#065F46" opacity="0.8"/>
  <rect x="632" y="118" width="60" height="8" rx="2" fill="#065F46" opacity="0.5"/>
  <circle cx="734" cy="111" r="5" fill="#10B981"/>
  <text x="683" y="137" font-family="Inter,sans-serif" font-size="9" fill="#6EE7B7" text-anchor="middle">Server B  · 4 vCPU</text>

  <!-- Server C (degraded) -->
  <rect x="622" y="158" width="122" height="50" rx="5" fill="#1E293B" stroke="#D97706" stroke-width="1.5"/>
  <rect x="632" y="168" width="90" height="8" rx="2" fill="#065F46" opacity="0.5"/>
  <rect x="632" y="179" width="60" height="8" rx="2" fill="#065F46" opacity="0.3"/>
  <circle cx="734" cy="172" r="5" fill="#F59E0B"/>
  <text x="683" y="198" font-family="Inter,sans-serif" font-size="9" fill="#FCD34D" text-anchor="middle">Server C  · degraded</text>

  <!-- Health check dotted lines -->
  <path d="M 744 61 L 855 61" stroke="#10B981" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>
  <path d="M 744 122 L 855 122" stroke="#10B981" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>
  <path d="M 744 183 L 855 183" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>
  <rect x="855" y="40" width="18" height="18" rx="3" fill="#064E3B" stroke="#10B981" stroke-width="1"/>
  <text x="864" y="54" font-family="monospace" font-size="9" fill="#10B981" text-anchor="middle">✓</text>
  <rect x="855" y="104" width="18" height="18" rx="3" fill="#064E3B" stroke="#10B981" stroke-width="1"/>
  <text x="864" y="118" font-family="monospace" font-size="9" fill="#10B981" text-anchor="middle">✓</text>
  <rect x="855" y="165" width="18" height="18" rx="3" fill="#451A03" stroke="#F59E0B" stroke-width="1"/>
  <text x="864" y="179" font-family="monospace" font-size="9" fill="#F59E0B" text-anchor="middle">!</text>
  <text x="864" y="198" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">health</text>

  <!-- ── Bottom: L4 vs L7 comparison ── -->
  <text x="320" y="228" font-family="Inter,sans-serif" font-size="11" fill="#94A3B8" font-weight="600">L4 vs L7  Comparison</text>

  <!-- L4 card -->
  <rect x="318" y="236" width="270" height="148" rx="6" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="318" y="236" width="270" height="28" rx="6" fill="#1D4ED8" opacity="0.4"/>
  <text x="453" y="255" font-family="Inter,sans-serif" font-size="12" fill="#93C5FD" text-anchor="middle" font-weight="700">Layer 4  (NLB / TCP)</text>

  <text x="335" y="276" font-family="monospace" font-size="9" fill="#64748B">Protocol:</text>
  <text x="420" y="276" font-family="monospace" font-size="9" fill="#94A3B8">TCP / UDP</text>
  <text x="335" y="293" font-family="monospace" font-size="9" fill="#64748B">Routing key:</text>
  <text x="420" y="293" font-family="monospace" font-size="9" fill="#94A3B8">IP + port only</text>
  <text x="335" y="310" font-family="monospace" font-size="9" fill="#64748B">SSL termination:</text>
  <text x="420" y="310" font-family="monospace" font-size="9" fill="#94A3B8">no (passthrough)</text>
  <text x="335" y="327" font-family="monospace" font-size="9" fill="#64748B">Latency:</text>
  <text x="420" y="327" font-family="monospace" font-size="9" fill="#34D399">&lt;1ms overhead</text>
  <text x="335" y="344" font-family="monospace" font-size="9" fill="#64748B">Use case:</text>
  <text x="420" y="344" font-family="monospace" font-size="9" fill="#94A3B8">gaming, DB, SMTP</text>
  <rect x="328" y="356" width="250" height="20" rx="3" fill="#0F172A"/>
  <text x="453" y="370" font-family="monospace" font-size="8.5" fill="#60A5FA" text-anchor="middle">AWS NLB · millions rps · static IP</text>

  <!-- L7 card -->
  <rect x="598" y="236" width="270" height="148" rx="6" fill="#1E293B" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="598" y="236" width="270" height="28" rx="6" fill="#4C1D95" opacity="0.5"/>
  <text x="733" y="255" font-family="Inter,sans-serif" font-size="12" fill="#C4B5FD" text-anchor="middle" font-weight="700">Layer 7  (ALB / HTTP)</text>

  <text x="615" y="276" font-family="monospace" font-size="9" fill="#64748B">Protocol:</text>
  <text x="700" y="276" font-family="monospace" font-size="9" fill="#94A3B8">HTTP / HTTPS / gRPC</text>
  <text x="615" y="293" font-family="monospace" font-size="9" fill="#64748B">Routing key:</text>
  <text x="700" y="293" font-family="monospace" font-size="9" fill="#94A3B8">path, host, headers</text>
  <text x="615" y="310" font-family="monospace" font-size="9" fill="#64748B">SSL termination:</text>
  <text x="700" y="310" font-family="monospace" font-size="9" fill="#34D399">yes — offloads servers</text>
  <text x="615" y="327" font-family="monospace" font-size="9" fill="#64748B">Latency:</text>
  <text x="700" y="327" font-family="monospace" font-size="9" fill="#94A3B8">~1–5ms overhead</text>
  <text x="615" y="344" font-family="monospace" font-size="9" fill="#64748B">Use case:</text>
  <text x="700" y="344" font-family="monospace" font-size="9" fill="#94A3B8">microservices, API GW</text>
  <rect x="608" y="356" width="250" height="20" rx="3" fill="#0F172A"/>
  <text x="733" y="370" font-family="monospace" font-size="8.5" fill="#A78BFA" text-anchor="middle">AWS ALB · /api → svc-A, /static → S3</text>

  <!-- Bottom bar -->
  <rect x="318" y="396" width="550" height="46" rx="6" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="593" y="414" font-family="Inter,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" font-weight="600">Interview Key Points</text>
  <text x="593" y="431" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Sticky sessions via cookie / IP hash breaks horizontal scale  ·  Health check interval vs threshold tradeoff</text>
  <text x="593" y="446" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">LB itself is SPOF → use anycast IP + multiple LBs  ·  X-Forwarded-For preserves real client IP through L7</text>
</svg>
