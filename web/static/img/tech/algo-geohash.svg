<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" font-family="Inter,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="700">Geohash  —  Proximity Search Cheat Sheet</text>

  <!-- ── Left: Grid visualization ── -->
  <rect x="18" y="42" width="420" height="410" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="228" y="64" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Recursive Binary Subdivision</text>

  <!-- World grid (level 1) - 2 cells wide, 2 cells tall shown -->
  <rect x="38" y="74" width="380" height="200" rx="4" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Level 1 subdivisions - shown as main grid -->
  <line x1="228" y1="74" x2="228" y2="274" stroke="#94A3B8" stroke-width="1"/>
  <line x1="38" y1="174" x2="418" y2="174" stroke="#94A3B8" stroke-width="1"/>
  <text x="133" y="119" font-family="monospace" font-size="9" fill="#94A3B8" text-anchor="middle">SW quadrant</text>
  <text x="323" y="119" font-family="monospace" font-size="9" fill="#94A3B8" text-anchor="middle">SE quadrant</text>
  <text x="133" y="219" font-family="monospace" font-size="9" fill="#94A3B8" text-anchor="middle">NW quadrant</text>
  <text x="323" y="219" font-family="monospace" font-size="9" fill="#94A3B8" text-anchor="middle">NE quadrant</text>

  <!-- Zoom in: subdivide NE quadrant further -->
  <rect x="228" y="74" width="190" height="100" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- NE sub-grid (2x2) -->
  <line x1="323" y1="74" x2="323" y2="174" stroke="#93C5FD" stroke-width="1"/>
  <line x1="228" y1="124" x2="418" y2="124" stroke="#93C5FD" stroke-width="1"/>
  <!-- Highlight one cell -->
  <rect x="323" y="74" width="95" height="50" rx="2" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="370" y="100" font-family="monospace" font-size="8" fill="#1D4ED8" text-anchor="middle">precision</text>
  <text x="370" y="113" font-family="monospace" font-size="8" fill="#1D4ED8" text-anchor="middle">= 2 chars</text>

  <!-- Location pin -->
  <circle cx="370" cy="92" r="6" fill="#DC2626"/>
  <path d="M 370 98 L 370 108" stroke="#DC2626" stroke-width="1.5"/>

  <!-- Geohash text result -->
  <rect x="38" y="284" width="380" height="34" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="228" y="299" font-family="monospace" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="700">"dp3wjz4" → lat: 40.7589, lng: -73.9851</text>
  <text x="228" y="312" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Times Square, NYC · 7 chars = ±153m precision</text>

  <!-- Precision table -->
  <rect x="38" y="326" width="380" height="120" rx="5" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="228" y="344" font-family="Inter,sans-serif" font-size="10" fill="#374151" text-anchor="middle" font-weight="600">Precision vs Length</text>
  <line x1="38" y1="350" x2="418" y2="350" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="48" y="354" width="80" height="14" rx="2" fill="#E2E8F0"/>
  <text x="88" y="365" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">Length</text>
  <rect x="136" y="354" width="136" height="14" rx="2" fill="#E2E8F0"/>
  <text x="204" y="365" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">Cell Size</text>
  <rect x="280" y="354" width="128" height="14" rx="2" fill="#E2E8F0"/>
  <text x="344" y="365" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">Use Case</text>
  <text x="88" y="384" font-family="monospace" font-size="8.5" fill="#374151" text-anchor="middle">4 chars</text>
  <text x="204" y="384" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">±20km</text>
  <text x="344" y="384" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">city-level</text>
  <text x="88" y="400" font-family="monospace" font-size="8.5" fill="#374151" text-anchor="middle">6 chars</text>
  <text x="204" y="400" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">±1.2km</text>
  <text x="344" y="400" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">neighborhood</text>
  <text x="88" y="416" font-family="monospace" font-size="8.5" fill="#1D4ED8" text-anchor="middle" font-weight="600">7 chars</text>
  <text x="204" y="416" font-family="monospace" font-size="8.5" fill="#059669" text-anchor="middle">±153m</text>
  <text x="344" y="416" font-family="monospace" font-size="8.5" fill="#1D4ED8" text-anchor="middle">nearby drivers</text>
  <text x="88" y="432" font-family="monospace" font-size="8.5" fill="#374151" text-anchor="middle">9 chars</text>
  <text x="204" y="432" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">±2.4m</text>
  <text x="344" y="432" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">delivery pin</text>

  <!-- ── Right: How it works + Use cases ── -->
  <rect x="450" y="42" width="432" height="410" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="666" y="64" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">How It Works  +  Proximity Search</text>

  <!-- Encoding explanation -->
  <rect x="462" y="74" width="408" height="100" rx="5" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="472" y="91" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" font-weight="600">Encoding Process</text>
  <text x="472" y="107" font-family="monospace" font-size="8.5" fill="#64748B">1. Divide longitude [-180,180] into left/right halves</text>
  <text x="472" y="122" font-family="monospace" font-size="8.5" fill="#64748B">2. Target point in right half → bit=1, left → bit=0</text>
  <text x="472" y="137" font-family="monospace" font-size="8.5" fill="#64748B">3. Alternate: long bit, lat bit, long bit, lat bit...</text>
  <text x="472" y="152" font-family="monospace" font-size="8.5" fill="#64748B">4. Encode every 5 bits → base32 character</text>
  <text x="472" y="165" font-family="monospace" font-size="8" fill="#1D4ED8">Result: hierarchical prefix string (parent contains child)</text>

  <!-- Proximity search -->
  <rect x="462" y="180" width="408" height="80" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="472" y="197" font-family="Inter,sans-serif" font-size="9" fill="#065F46" font-weight="600">Proximity Search (Nearest Neighbor)</text>
  <text x="472" y="213" font-family="monospace" font-size="8.5" fill="#64748B">1. Get geohash of user location (e.g., "dp3wj")</text>
  <text x="472" y="228" font-family="monospace" font-size="8.5" fill="#64748B">2. Find 8 neighboring cells (avoid boundary errors)</text>
  <text x="472" y="243" font-family="monospace" font-size="8.5" fill="#64748B">3. Query DB: WHERE geohash IN (cell + 8 neighbors)</text>
  <text x="472" y="255" font-family="monospace" font-size="8" fill="#059669">+ index on geohash → fast prefix scan</text>

  <!-- Boundary problem -->
  <rect x="462" y="266" width="408" height="62" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="472" y="283" font-family="Inter,sans-serif" font-size="9" fill="#92400E" font-weight="600">⚠  Boundary Problem</text>
  <text x="472" y="299" font-family="monospace" font-size="8.5" fill="#64748B">Two nearby points can have different geohashes</text>
  <text x="472" y="314" font-family="monospace" font-size="8.5" fill="#64748B">if they're in different cells → always query 9 cells</text>
  <text x="472" y="326" font-family="monospace" font-size="8" fill="#D97706">(center cell + 8 neighbors)</text>

  <!-- Use cases -->
  <rect x="462" y="334" width="408" height="62" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="472" y="351" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" font-weight="600">System Design Use Cases</text>
  <text x="472" y="367" font-family="monospace" font-size="8.5" fill="#64748B">Uber/Lyft: find nearby drivers in geohash cell</text>
  <text x="472" y="382" font-family="monospace" font-size="8.5" fill="#64748B">Yelp: restaurants within radius (6-char geohash)</text>
  <text x="472" y="394" font-family="monospace" font-size="8" fill="#64748B">Redis GEOADD/GEORADIUS uses geohash internally</text>

  <!-- Alternatives -->
  <rect x="462" y="402" width="408" height="42" rx="5" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="472" y="418" font-family="Inter,sans-serif" font-size="9" fill="#475569" font-weight="600">Alternatives</text>
  <text x="472" y="433" font-family="monospace" font-size="8.5" fill="#64748B">S2 Cells (Google) · QuadTree · R-Tree · H3 (Uber)</text>
</svg>
