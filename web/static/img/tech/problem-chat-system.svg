<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- Row labels -->
  <rect x="18" y="18" width="120" height="20" rx="4" fill="#DBEAFE"/>
  <text x="78" y="32" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="700">CLIENT LAYER</text>
  <rect x="18" y="180" width="120" height="20" rx="4" fill="#E0E7FF"/>
  <text x="78" y="194" font-family="Inter,sans-serif" font-size="10" fill="#4338CA" text-anchor="middle" font-weight="700">SERVICE LAYER</text>
  <rect x="18" y="340" width="120" height="20" rx="4" fill="#FEF3C7"/>
  <text x="78" y="354" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="700">STORAGE LAYER</text>

  <!-- ── CLIENT LAYER ── -->
  <!-- User A -->
  <rect x="60" y="50" width="140" height="110" rx="8" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="130" y="70" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="600">USER A (MOBILE)</text>
  <rect x="78" y="80" width="104" height="60" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <rect x="86" y="88" width="88" height="12" rx="3" fill="#DBEAFE"/>
  <text x="130" y="97" font-family="monospace" font-size="7" fill="#1D4ED8" text-anchor="middle">Hey, are you free?</text>
  <rect x="86" y="106" width="70" height="12" rx="3" fill="#D1FAE5"/>
  <text x="121" y="115" font-family="monospace" font-size="7" fill="#065F46" text-anchor="middle">Yes! Where?</text>
  <rect x="86" y="124" width="88" height="12" rx="3" fill="#DBEAFE"/>
  <text x="130" y="133" font-family="monospace" font-size="7" fill="#1D4ED8" text-anchor="middle">Coffee at 3pm ☕</text>

  <!-- User B -->
  <rect x="350" y="50" width="140" height="110" rx="8" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="420" y="70" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="600">USER B (WEB)</text>
  <rect x="368" y="80" width="104" height="60" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <rect x="376" y="88" width="88" height="12" rx="3" fill="#DBEAFE"/>
  <rect x="376" y="106" width="70" height="12" rx="3" fill="#D1FAE5"/>
  <rect x="376" y="124" width="88" height="12" rx="3" fill="#DBEAFE"/>
  <circle cx="474" cy="130" r="8" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="474" y="133" font-family="Inter,sans-serif" font-size="7" fill="#059669" text-anchor="middle">✓✓</text>

  <!-- Group Chat -->
  <rect x="620" y="50" width="260" height="110" rx="8" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="750" y="70" font-family="Inter,sans-serif" font-size="10" fill="#6D28D9" text-anchor="middle" font-weight="600">GROUP CHAT (500 MEMBERS)</text>
  <rect x="638" y="80" width="224" height="60" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <circle cx="660" cy="100" r="8" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1"/>
  <circle cx="676" cy="100" r="8" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1"/>
  <circle cx="692" cy="100" r="8" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1"/>
  <text x="720" y="103" font-family="monospace" font-size="7" fill="#6D28D9">+497 members</text>
  <text x="750" y="125" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">fan-out to 500 WebSocket connections</text>

  <!-- Arrows down -->
  <path d="M 130 162 L 130 200" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="126,197 130,205 134,197" fill="#3B82F6"/>
  <text x="140" y="182" font-family="monospace" font-size="8" fill="#3B82F6">WebSocket</text>

  <path d="M 420 162 L 420 200" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="416,197 420,205 424,197" fill="#3B82F6"/>

  <path d="M 750 162 L 750 200" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="746,197 750,205 754,197" fill="#7C3AED"/>

  <!-- ── SERVICE LAYER ── -->
  <!-- WebSocket Gateway -->
  <rect x="60" y="210" width="200" height="110" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="160" y="230" font-family="Inter,sans-serif" font-size="11" fill="#4338CA" text-anchor="middle" font-weight="700">WEBSOCKET GATEWAY</text>
  <rect x="78" y="240" width="164" height="30" rx="4" fill="#E0E7FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="160" y="258" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">2M concurrent connections</text>
  <rect x="78" y="278" width="164" height="30" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="160" y="296" font-family="monospace" font-size="8" fill="#1D4ED8" text-anchor="middle">session → server mapping</text>

  <!-- Chat Service -->
  <rect x="310" y="210" width="200" height="110" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="410" y="230" font-family="Inter,sans-serif" font-size="11" fill="#4338CA" text-anchor="middle" font-weight="700">CHAT SERVICE</text>
  <rect x="328" y="240" width="164" height="26" rx="4" fill="#E0E7FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="410" y="257" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">message ordering</text>
  <rect x="328" y="272" width="164" height="26" rx="4" fill="#E0E7FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="410" y="289" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">delivery guarantees</text>
  <rect x="328" y="304" width="80" height="12" rx="3" fill="#D1FAE5"/>
  <text x="368" y="313" font-family="monospace" font-size="7" fill="#065F46" text-anchor="middle">at-least-once</text>

  <!-- Presence Service -->
  <rect x="560" y="210" width="160" height="110" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="640" y="230" font-family="Inter,sans-serif" font-size="10" fill="#059669" text-anchor="middle" font-weight="600">PRESENCE</text>
  <circle cx="600" cy="260" r="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="620" y="263" font-family="monospace" font-size="8" fill="#065F46">online: heartbeat 30s</text>
  <circle cx="600" cy="284" r="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="620" y="287" font-family="monospace" font-size="8" fill="#92400E">idle: 5m no activity</text>
  <circle cx="600" cy="308" r="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="620" y="311" font-family="monospace" font-size="8" fill="#991B1B">offline: connection closed</text>

  <!-- Push / Notification -->
  <rect x="760" y="210" width="120" height="110" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="820" y="230" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="600">PUSH SERVICE</text>
  <rect x="772" y="244" width="96" height="24" rx="4" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="820" y="259" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">APNs / FCM</text>
  <rect x="772" y="276" width="96" height="24" rx="4" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="820" y="291" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">offline delivery</text>

  <!-- Arrows between services -->
  <path d="M 262 265 L 308 265" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="305,261 313,265 305,269" fill="#6366F1"/>
  <path d="M 512 265 L 558 265" stroke="#059669" stroke-width="1.5"/>
  <polygon points="555,261 563,265 555,269" fill="#059669"/>
  <path d="M 722 265 L 758 265" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="755,261 763,265 755,269" fill="#D97706"/>

  <!-- ── STORAGE LAYER ── -->
  <!-- Message Store -->
  <rect x="60" y="370" width="200" height="72" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="160" y="390" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="600">MESSAGE STORE (Cassandra)</text>
  <text x="160" y="410" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">partition: chat_id</text>
  <text x="160" y="425" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">sort: message_id (Snowflake)</text>

  <!-- Session Cache -->
  <rect x="310" y="370" width="200" height="72" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/>
  <text x="410" y="390" font-family="Inter,sans-serif" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="600">SESSION CACHE (Redis)</text>
  <text x="410" y="410" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">user → gateway server</text>
  <text x="410" y="425" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">pub/sub for fan-out</text>

  <!-- Message Queue -->
  <rect x="560" y="370" width="200" height="72" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="660" y="390" font-family="Inter,sans-serif" font-size="10" fill="#059669" text-anchor="middle" font-weight="600">MESSAGE QUEUE (Kafka)</text>
  <text x="660" y="410" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">partition: chat_id</text>
  <text x="660" y="425" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">ordering + durability</text>

  <!-- Arrows from service to storage -->
  <path d="M 160 322 L 160 368" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="156,365 160,373 164,365" fill="#D97706"/>
  <path d="M 410 322 L 410 368" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="406,365 410,373 414,365" fill="#DC2626"/>
  <path d="M 640 322 L 640 368" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="636,365 640,373 644,365" fill="#059669"/>
</svg>
