<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" font-family="Inter,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="700">Bloom Filter  —  Cheat Sheet</text>

  <!-- ── Top: Bit array visual ── -->
  <rect x="18" y="42" width="864" height="150" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="450" y="64" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Bit Array  (m=20 bits shown)  ·  3 hash functions  h1, h2, h3</text>

  <!-- Bit array cells -->
  <!-- Initially empty: indices 0..19 -->
  <text x="60" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">0</text>
  <text x="100" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">1</text>
  <text x="140" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">2</text>
  <text x="180" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">3</text>
  <text x="220" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">4</text>
  <text x="260" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">5</text>
  <text x="300" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">6</text>
  <text x="340" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">7</text>
  <text x="380" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">8</text>
  <text x="420" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">9</text>
  <text x="460" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">10</text>
  <text x="500" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">11</text>
  <text x="540" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">12</text>
  <text x="580" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">13</text>
  <text x="620" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">14</text>
  <text x="660" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">15</text>
  <text x="700" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">16</text>
  <text x="740" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">17</text>
  <text x="780" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">18</text>
  <text x="820" y="82" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">19</text>

  <!-- Bit cells: 0=empty, set bits colored after "alice" insert at 2,5,13 and "bob" at 5,9,17 -->
  <!-- 0=empty -->
  <rect x="40" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="59" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 1=empty -->
  <rect x="80" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="99" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 2=set by alice/h1 -->
  <rect x="120" y="88" width="38" height="28" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="139" y="107" font-family="monospace" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="700">1</text>
  <!-- 3=empty -->
  <rect x="160" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="179" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 4=empty -->
  <rect x="200" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="219" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 5=set by alice/h2 AND bob/h1 (collision!) -->
  <rect x="240" y="88" width="38" height="28" rx="3" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="259" y="107" font-family="monospace" font-size="10" fill="#6D28D9" text-anchor="middle" font-weight="700">1</text>
  <!-- 6=empty -->
  <rect x="280" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="299" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 7=empty -->
  <rect x="320" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="339" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 8=empty -->
  <rect x="360" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="379" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 9=set by bob/h2 -->
  <rect x="400" y="88" width="38" height="28" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="419" y="107" font-family="monospace" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">1</text>
  <!-- 10=empty -->
  <rect x="440" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="459" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 11=empty -->
  <rect x="480" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="499" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 12=empty -->
  <rect x="520" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="539" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 13=set by alice/h3 -->
  <rect x="560" y="88" width="38" height="28" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="579" y="107" font-family="monospace" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="700">1</text>
  <!-- 14=empty -->
  <rect x="600" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="619" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 15=empty -->
  <rect x="640" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="659" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 16=empty -->
  <rect x="680" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="699" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 17=set by bob/h3 -->
  <rect x="720" y="88" width="38" height="28" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="739" y="107" font-family="monospace" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">1</text>
  <!-- 18=empty -->
  <rect x="760" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="779" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>
  <!-- 19=empty -->
  <rect x="800" y="88" width="38" height="28" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="819" y="107" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">0</text>

  <!-- Arrow annotations showing hash functions -->
  <path d="M 139 120 L 139 138" stroke="#3B82F6" stroke-width="1"/>
  <path d="M 259 120 L 259 138" stroke="#7C3AED" stroke-width="1"/>
  <path d="M 579 120 L 579 138" stroke="#3B82F6" stroke-width="1"/>
  <rect x="30" y="138" width="300" height="14" rx="3" fill="#EFF6FF"/>
  <text x="180" y="149" font-family="monospace" font-size="8" fill="#1D4ED8" text-anchor="middle">INSERT "alice" → h1=2, h2=5, h3=13</text>
  <path d="M 259 120 L 419 138" stroke="#059669" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M 739 120 L 739 138" stroke="#059669" stroke-width="1"/>
  <rect x="380" y="138" width="300" height="14" rx="3" fill="#ECFDF5"/>
  <text x="530" y="149" font-family="monospace" font-size="8" fill="#059669" text-anchor="middle">INSERT "bob" → h1=5, h2=9, h3=17</text>

  <!-- ── Bottom Left: Lookup logic ── -->
  <rect x="18" y="204" width="420" height="248" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="228" y="224" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Lookup Logic</text>

  <!-- True negative -->
  <rect x="30" y="234" width="396" height="60" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="42" y="252" font-family="monospace" font-size="9" fill="#065F46" font-weight="600">CHECK "alice"  →  h1=2✓  h2=5✓  h3=13✓</text>
  <text x="42" y="270" font-family="monospace" font-size="9" fill="#059669">All bits set →  "possibly in set"</text>
  <text x="42" y="286" font-family="monospace" font-size="8" fill="#94A3B8">(alice WAS inserted; result is correct)</text>

  <!-- False positive -->
  <rect x="30" y="300" width="396" height="60" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="42" y="318" font-family="monospace" font-size="9" fill="#92400E" font-weight="600">CHECK "charlie"  →  h1=5✓  h2=9✓  h3=2✓</text>
  <text x="42" y="336" font-family="monospace" font-size="9" fill="#D97706">All bits set → "possibly in set"</text>
  <text x="42" y="352" font-family="monospace" font-size="8" fill="#94A3B8">FALSE POSITIVE! charlie was never inserted</text>

  <!-- True negative -->
  <rect x="30" y="366" width="396" height="60" rx="5" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="42" y="384" font-family="monospace" font-size="9" fill="#475569" font-weight="600">CHECK "dave"  →  h1=0✗  h2=7✗  h3=11✗</text>
  <text x="42" y="402" font-family="monospace" font-size="9" fill="#475569">Any bit NOT set → "definitely NOT in set"</text>
  <text x="42" y="418" font-family="monospace" font-size="8" fill="#94A3B8">True negative — guaranteed correct</text>

  <!-- ── Bottom Right: Key properties ── -->
  <rect x="450" y="204" width="432" height="248" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="666" y="224" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Properties + Interview Points</text>

  <rect x="462" y="234" width="408" height="48" rx="5" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="472" y="250" font-family="Inter,sans-serif" font-size="9" fill="#991B1B" font-weight="600">False Positives — YES possible</text>
  <text x="472" y="266" font-family="monospace" font-size="8" fill="#64748B">FP rate ≈ (1 − e^(−kn/m))^k  · tune with larger m</text>
  <text x="472" y="278" font-family="monospace" font-size="8" fill="#64748B">More bits → lower FP. Typical target: &lt;1% FP rate</text>

  <rect x="462" y="288" width="408" height="38" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="472" y="304" font-family="Inter,sans-serif" font-size="9" fill="#065F46" font-weight="600">False Negatives — NEVER possible</text>
  <text x="472" y="318" font-family="monospace" font-size="8" fill="#64748B">If bloom says NO, item is definitely absent</text>

  <rect x="462" y="332" width="408" height="38" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="472" y="348" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" font-weight="600">Space Efficiency</text>
  <text x="472" y="362" font-family="monospace" font-size="8" fill="#64748B">~10 bits/element vs. hash set (64+ bits/element)</text>

  <rect x="462" y="376" width="408" height="38" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="472" y="392" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" font-weight="600">Used For</text>
  <text x="472" y="406" font-family="monospace" font-size="8" fill="#64748B">URL shortener: avoid DB lookup for new codes</text>
  <text x="472" y="418" font-family="monospace" font-size="8" fill="#64748B">Cassandra / HBase: SSTable membership test</text>

  <rect x="462" y="420" width="408" height="24" rx="4" fill="#F1F5F9"/>
  <text x="666" y="436" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">O(k) insert + lookup · k = number of hash functions · cannot delete</text>
</svg>
