<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" font-family="Inter,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="700">Token Bucket  —  Cheat Sheet</text>

  <!-- ── Top: Visual diagram ── -->
  <rect x="18" y="42" width="420" height="280" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="228" y="64" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Token Bucket Mechanics</text>

  <!-- Bucket shape -->
  <path d="M 128 96 L 168 96 L 186 196 L 110 196 Z" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <!-- Tokens in bucket -->
  <circle cx="135" cy="116" r="9" fill="#7C3AED"/>
  <circle cx="155" cy="122" r="9" fill="#7C3AED"/>
  <circle cx="142" cy="137" r="9" fill="#7C3AED"/>
  <circle cx="160" cy="142" r="9" fill="#A78BFA"/>
  <circle cx="128" cy="152" r="9" fill="#A78BFA"/>
  <circle cx="150" cy="158" r="9" fill="#C4B5FD"/>
  <text x="148" y="175" font-family="monospace" font-size="8" fill="#6D28D9" text-anchor="middle">6 tokens</text>
  <text x="148" y="188" font-family="monospace" font-size="7.5" fill="#64748B" text-anchor="middle">capacity=10</text>

  <!-- Refill arrow (top) -->
  <path d="M 186 130 Q 220 110 220 130 Q 220 150 186 155" stroke="#059669" stroke-width="2" fill="none"/>
  <polygon points="188,152 184,160 192,158" fill="#059669"/>
  <text x="236" y="128" font-family="monospace" font-size="9" fill="#059669" font-weight="600">+1 token</text>
  <text x="236" y="142" font-family="monospace" font-size="9" fill="#065F46">per 10ms</text>
  <text x="236" y="156" font-family="monospace" font-size="8" fill="#64748B">= 100/s rate</text>

  <!-- Request comes in -->
  <path d="M 32 148 L 108 148" stroke="#1D4ED8" stroke-width="2"/>
  <polygon points="105,144 113,148 105,152" fill="#1D4ED8"/>
  <text x="70" y="140" font-family="monospace" font-size="9" fill="#1D4ED8" text-anchor="middle">request</text>
  <text x="70" y="164" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">arrives</text>

  <!-- Decision diamond -->
  <polygon points="300,148 336,172 300,196 264,172" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
  <text x="300" y="168" font-family="monospace" font-size="9" fill="#6D28D9" text-anchor="middle">tokens</text>
  <text x="300" y="181" font-family="monospace" font-size="9" fill="#6D28D9" text-anchor="middle">&gt; 0?</text>

  <!-- Arrow from bucket to diamond -->
  <path d="M 186 165 L 262 170" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="259,166 267,170 259,174" fill="#7C3AED"/>
  <text x="224" y="160" font-family="monospace" font-size="7.5" fill="#94A3B8">check</text>

  <!-- YES path -->
  <path d="M 264 172 L 212 220" stroke="#059669" stroke-width="1.5"/>
  <polygon points="215,217 209,225 218,223" fill="#059669"/>
  <text x="228" y="207" font-family="monospace" font-size="8" fill="#059669">YES</text>
  <rect x="140" y="220" width="136" height="32" rx="5" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="208" y="234" font-family="monospace" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">consume 1 token</text>
  <text x="208" y="247" font-family="monospace" font-size="8.5" fill="#059669" text-anchor="middle">→ 200 OK ✓</text>

  <!-- NO path -->
  <path d="M 336 172 L 390 220" stroke="#DC2626" stroke-width="1.5"/>
  <polygon points="386,217 394,224 388,214" fill="#DC2626"/>
  <text x="368" y="207" font-family="monospace" font-size="8" fill="#DC2626">NO</text>
  <rect x="342" y="220" width="136" height="32" rx="5" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="410" y="234" font-family="monospace" font-size="9" fill="#991B1B" text-anchor="middle" font-weight="600">bucket empty</text>
  <text x="410" y="247" font-family="monospace" font-size="8.5" fill="#DC2626" text-anchor="middle">→ 429 reject ✗</text>

  <!-- Timeline visualization -->
  <rect x="30" y="270" width="396" height="40" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="34" y="284" font-family="monospace" font-size="7.5" fill="#64748B">time →</text>
  <!-- Refill ticks -->
  <rect x="72" y="277" width="8" height="20" rx="2" fill="#7C3AED" opacity="0.5"/>
  <rect x="96" y="277" width="8" height="20" rx="2" fill="#7C3AED" opacity="0.6"/>
  <rect x="120" y="277" width="8" height="20" rx="2" fill="#7C3AED" opacity="0.7"/>
  <rect x="144" y="277" width="8" height="20" rx="2" fill="#7C3AED" opacity="0.8"/>
  <rect x="168" y="277" width="8" height="20" rx="2" fill="#7C3AED"/>
  <rect x="192" y="277" width="8" height="20" rx="2" fill="#7C3AED"/>
  <rect x="216" y="277" width="8" height="20" rx="2" fill="#7C3AED"/>
  <!-- burst consume -->
  <rect x="240" y="277" width="8" height="20" rx="2" fill="#059669"/>
  <rect x="248" y="277" width="8" height="20" rx="2" fill="#059669"/>
  <rect x="256" y="277" width="8" height="20" rx="2" fill="#059669"/>
  <rect x="264" y="277" width="8" height="20" rx="2" fill="#059669"/>
  <rect x="272" y="277" width="8" height="20" rx="2" fill="#059669"/>
  <rect x="280" y="277" width="8" height="20" rx="2" fill="#DC2626" opacity="0.7"/>
  <rect x="288" y="277" width="8" height="20" rx="2" fill="#DC2626" opacity="0.5"/>
  <text x="228" y="308" font-family="monospace" font-size="7.5" fill="#059669" text-anchor="middle">burst OK</text>
  <text x="284" y="308" font-family="monospace" font-size="7.5" fill="#DC2626" text-anchor="middle">429</text>

  <!-- ── Right: 4 Algorithms comparison ── -->
  <rect x="450" y="42" width="432" height="280" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="666" y="64" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">4 Rate Limiting Algorithms</text>

  <!-- Token Bucket -->
  <rect x="462" y="74" width="408" height="48" rx="5" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="472" y="90" font-family="Inter,sans-serif" font-size="10" fill="#6D28D9" font-weight="700">Token Bucket</text>
  <rect x="600" y="76" width="60" height="14" rx="3" fill="#7C3AED"/>
  <text x="630" y="87" font-family="monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">BEST</text>
  <text x="472" y="106" font-family="monospace" font-size="8" fill="#64748B">burst OK up to capacity · smooth via refill rate · per-user key in Redis</text>
  <text x="472" y="118" font-family="monospace" font-size="8" fill="#64748B">✓ bursts allowed  ✓ constant memory  ✓ easy implementation</text>

  <!-- Leaky Bucket -->
  <rect x="462" y="128" width="408" height="40" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="472" y="144" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" font-weight="700">Leaky Bucket</text>
  <text x="472" y="160" font-family="monospace" font-size="8" fill="#64748B">queue requests · process at constant rate · rejects when queue full</text>

  <!-- Fixed Window -->
  <rect x="462" y="174" width="408" height="40" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="472" y="190" font-family="Inter,sans-serif" font-size="10" fill="#92400E" font-weight="700">Fixed Window Counter</text>
  <text x="472" y="206" font-family="monospace" font-size="8" fill="#64748B">INCR counter per window · reset at boundary · spike risk at reset</text>

  <!-- Sliding Window -->
  <rect x="462" y="220" width="408" height="40" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="472" y="236" font-family="Inter,sans-serif" font-size="10" fill="#065F46" font-weight="700">Sliding Window Log</text>
  <text x="472" y="252" font-family="monospace" font-size="8" fill="#64748B">ZADD timestamps · count in window · most accurate · 2× memory</text>

  <rect x="462" y="266" width="408" height="44" rx="5" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="666" y="282" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Redis impl: INCR key EX window (fixed) · ZADD + ZCOUNT (sliding)</text>
  <text x="666" y="298" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Lua script for atomic check-and-decrement in one round trip</text>

  <!-- ── Bottom: Key points ── -->
  <rect x="18" y="334" width="864" height="112" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="450" y="354" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Interview Key Points</text>

  <rect x="30" y="362" width="196" height="76" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="128" y="378" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" text-anchor="middle" font-weight="600">Why Redis?</text>
  <text x="128" y="394" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">atomic INCR/DECR</text>
  <text x="128" y="408" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">EXPIRE for TTL</text>
  <text x="128" y="422" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Lua = 1 round trip</text>

  <rect x="234" y="362" width="196" height="76" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="332" y="378" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">Fail-Open vs Closed</text>
  <text x="332" y="394" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">open: pass if Redis down</text>
  <text x="332" y="408" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">closed: reject if unsure</text>
  <text x="332" y="422" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">open preferred for APIs</text>

  <rect x="438" y="362" width="196" height="76" rx="5" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="536" y="378" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle" font-weight="600">Distributed Sync</text>
  <text x="536" y="394" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">sticky sessions (IP hash)</text>
  <text x="536" y="408" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">central Redis cluster</text>
  <text x="536" y="422" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">gossip protocol</text>

  <rect x="642" y="362" width="228" height="76" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="756" y="378" font-family="Inter,sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="600">Headers to Return</text>
  <text x="756" y="394" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">X-RateLimit-Limit: 100</text>
  <text x="756" y="408" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">X-RateLimit-Remaining: 0</text>
  <text x="756" y="422" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Retry-After: 47 (429 only)</text>
</svg>
