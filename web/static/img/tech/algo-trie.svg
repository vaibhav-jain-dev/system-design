<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" font-family="Inter,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="700">Trie (Prefix Tree)  —  Cheat Sheet</text>

  <!-- ── Left: Trie diagram ── -->
  <rect x="18" y="42" width="440" height="410" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="238" y="64" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Words: "app", "apple", "apply", "apt", "apt"</text>

  <!-- Root node -->
  <circle cx="238" cy="94" r="18" fill="#1D4ED8" stroke="#1E40AF" stroke-width="2"/>
  <text x="238" y="99" font-family="Inter,sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="700">*</text>
  <text x="262" y="99" font-family="monospace" font-size="8" fill="#64748B">root</text>

  <!-- Level 1: a, b -->
  <line x1="238" y1="112" x2="178" y2="152" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="238" y1="112" x2="298" y2="152" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="178" cy="164" r="16" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="178" y="169" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="700">a</text>
  <circle cx="298" cy="164" r="16" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="298" y="169" font-family="Inter,sans-serif" font-size="11" fill="#64748B" text-anchor="middle" font-weight="700">b</text>
  <!-- Edge labels -->
  <text x="200" y="142" font-family="monospace" font-size="8" fill="#64748B">a</text>
  <text x="274" y="142" font-family="monospace" font-size="8" fill="#94A3B8">b</text>

  <!-- Level 2 under 'a': p, p -->
  <line x1="178" y1="180" x2="138" y2="218" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="178" y1="180" x2="218" y2="218" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- 'ap' node -->
  <circle cx="138" cy="230" r="16" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="138" y="235" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="700">p</text>
  <text x="110" y="230" font-family="monospace" font-size="7" fill="#94A3B8">ap</text>
  <!-- 'at' path -->
  <circle cx="218" cy="230" r="16" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="218" y="235" font-family="Inter,sans-serif" font-size="11" fill="#64748B" text-anchor="middle" font-weight="700">t</text>
  <text x="196" y="210" font-family="monospace" font-size="8" fill="#64748B">p</text>
  <text x="158" y="210" font-family="monospace" font-size="8" fill="#64748B">t</text>

  <!-- Level 3 under 'ap': p -->
  <line x1="138" y1="246" x2="138" y2="282" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- 'app' node (end) -->
  <circle cx="138" cy="294" r="16" fill="#DBEAFE" stroke="#059669" stroke-width="2"/>
  <text x="138" y="299" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="700">p</text>
  <circle cx="146" cy="282" r="4" fill="#059669"/>
  <text x="162" y="280" font-family="monospace" font-size="7.5" fill="#059669">end</text>
  <text x="110" y="294" font-family="monospace" font-size="7" fill="#94A3B8">app</text>

  <!-- Level 4 under 'app': l -->
  <line x1="138" y1="310" x2="90" y2="346" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="138" y1="310" x2="186" y2="346" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- 'appl' -->
  <circle cx="90" cy="358" r="16" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="90" y="363" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="700">l</text>
  <!-- Level 5: e, y -->
  <line x1="90" y1="374" x2="66" y2="406" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="90" y1="374" x2="114" y2="406" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- 'apple' -->
  <circle cx="66" cy="418" r="14" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="66" y="423" font-family="monospace" font-size="9" fill="#065F46" text-anchor="middle">e</text>
  <text x="36" y="418" font-family="monospace" font-size="7" fill="#059669">apple</text>
  <!-- 'apply' -->
  <circle cx="114" cy="418" r="14" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="114" y="423" font-family="monospace" font-size="9" fill="#065F46" text-anchor="middle">y</text>
  <text x="130" y="418" font-family="monospace" font-size="7" fill="#059669">apply</text>

  <!-- 'pt' at 218 -->
  <circle cx="186" cy="358" r="16" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="186" y="363" font-family="Inter,sans-serif" font-size="11" fill="#64748B" text-anchor="middle" font-weight="700">p</text>
  <!-- 'apt' end -->
  <line x1="218" y1="246" x2="258" y2="282" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="258" cy="294" r="16" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="258" y="299" font-family="Inter,sans-serif" font-size="11" fill="#065F46" text-anchor="middle" font-weight="700">t</text>
  <text x="280" y="299" font-family="monospace" font-size="7" fill="#059669">apt✓</text>

  <!-- Edge label 'p' for apt -->
  <text x="242" y="272" font-family="monospace" font-size="8" fill="#64748B">t</text>

  <!-- Legend -->
  <circle cx="340" cy="400" r="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="355" y="405" font-family="monospace" font-size="8" fill="#065F46">= end of word</text>

  <!-- ── Right: Properties + Use cases ── -->
  <rect x="470" y="42" width="412" height="410" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="676" y="64" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Properties + Use Cases</text>

  <rect x="482" y="74" width="388" height="52" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="492" y="91" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" font-weight="600">Complexity</text>
  <text x="492" y="107" font-family="monospace" font-size="8.5" fill="#64748B">Insert: O(m)  ·  Search: O(m)  ·  Prefix: O(p + N)</text>
  <text x="492" y="119" font-family="monospace" font-size="8" fill="#64748B">m = word length · p = prefix len · N = results count</text>

  <rect x="482" y="132" width="388" height="52" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="492" y="149" font-family="Inter,sans-serif" font-size="9" fill="#065F46" font-weight="600">Space</text>
  <text x="492" y="165" font-family="monospace" font-size="8.5" fill="#64748B">O(ALPHABET_SIZE × N × M) worst case</text>
  <text x="492" y="177" font-family="monospace" font-size="8" fill="#64748B">compact with hash map children</text>

  <text x="482" y="206" font-family="Inter,sans-serif" font-size="10" fill="#374151" font-weight="600">Primary Use Cases</text>

  <rect x="482" y="214" width="388" height="46" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="492" y="230" font-family="Inter,sans-serif" font-size="9" fill="#92400E" font-weight="600">Search Autocomplete</text>
  <text x="492" y="245" font-family="monospace" font-size="8.5" fill="#64748B">type "app" → traverse trie → collect all words</text>
  <text x="492" y="257" font-family="monospace" font-size="8" fill="#64748B">rank by frequency stored in each node</text>

  <rect x="482" y="266" width="388" height="46" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="492" y="282" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" font-weight="600">IP Routing (Longest Prefix Match)</text>
  <text x="492" y="297" font-family="monospace" font-size="8.5" fill="#64748B">binary trie · each bit = left/right branch</text>
  <text x="492" y="309" font-family="monospace" font-size="8" fill="#64748B">longest matching prefix → routing table</text>

  <rect x="482" y="318" width="388" height="46" rx="5" fill="#FCE7F3" stroke="#FBCFE8" stroke-width="1"/>
  <text x="492" y="334" font-family="Inter,sans-serif" font-size="9" fill="#9D174D" font-weight="600">Spell Checker / Autocorrect</text>
  <text x="492" y="349" font-family="monospace" font-size="8.5" fill="#64748B">Levenshtein distance · BFS on trie</text>
  <text x="492" y="361" font-family="monospace" font-size="8" fill="#64748B">find words within edit distance k</text>

  <rect x="482" y="370" width="388" height="46" rx="5" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="1"/>
  <text x="492" y="386" font-family="Inter,sans-serif" font-size="9" fill="#065F46" font-weight="600">Interview Trick: Trie Optimizations</text>
  <text x="492" y="401" font-family="monospace" font-size="8.5" fill="#64748B">Compressed trie (radix tree) — merge single-child chains</text>
  <text x="492" y="413" font-family="monospace" font-size="8" fill="#64748B">Store top-K words at each node → O(1) prefix results</text>

  <rect x="482" y="422" width="388" height="22" rx="4" fill="#F1F5F9"/>
  <text x="676" y="437" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">Trie beats hash map for prefix queries; hash map wins for exact lookup</text>
</svg>
