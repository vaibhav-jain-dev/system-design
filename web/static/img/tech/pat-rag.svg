<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" font-family="Inter,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="700">RAG (Retrieval-Augmented Generation)  —  Cheat Sheet</text>

  <!-- ── Top: Architecture flow ── -->
  <rect x="18" y="42" width="864" height="120" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="450" y="62" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">RAG Pipeline  (Query Time)</text>

  <!-- User Query -->
  <rect x="28" y="74" width="110" height="74" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1.5"/>
  <text x="83" y="94" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="600">User Query</text>
  <text x="83" y="110" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">"What is our</text>
  <text x="83" y="122" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">refund policy?"</text>

  <path d="M 140 111 L 162 111" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="159,107 167,111 159,115" fill="#3B82F6"/>

  <!-- Embedding Model -->
  <rect x="164" y="74" width="130" height="74" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="229" y="94" font-family="Inter,sans-serif" font-size="10" fill="#6D28D9" text-anchor="middle" font-weight="600">Embed Query</text>
  <text x="229" y="110" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">text-embedding-3</text>
  <text x="229" y="122" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">[0.12, -0.43,...]</text>
  <text x="229" y="136" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">1536-dim vector</text>

  <path d="M 296 111 L 318 111" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="315,107 323,111 315,115" fill="#7C3AED"/>

  <!-- Vector DB -->
  <rect x="320" y="74" width="140" height="74" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="390" y="94" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="600">Vector Search</text>
  <text x="390" y="110" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">cosine similarity</text>
  <text x="390" y="122" font-family="monospace" font-size="8" fill="#064E3B" text-anchor="middle">top-K chunks</text>
  <text x="390" y="136" font-family="monospace" font-size="7.5" fill="#94A3B8" text-anchor="middle">Pinecone / pgvector</text>

  <path d="M 462 111 L 484 111" stroke="#059669" stroke-width="2"/>
  <polygon points="481,107 489,111 481,115" fill="#059669"/>

  <!-- Context Assembly -->
  <rect x="486" y="74" width="140" height="74" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="556" y="94" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="600">Build Prompt</text>
  <text x="556" y="110" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">System prompt</text>
  <text x="556" y="122" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">+ context chunks</text>
  <text x="556" y="136" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">+ user query</text>

  <path d="M 628 111 L 650 111" stroke="#D97706" stroke-width="2"/>
  <polygon points="647,107 655,111 647,115" fill="#D97706"/>

  <!-- LLM -->
  <rect x="652" y="74" width="120" height="74" rx="6" fill="#FCE7F3" stroke="#FBCFE8" stroke-width="1.5"/>
  <text x="712" y="94" font-family="Inter,sans-serif" font-size="10" fill="#9D174D" text-anchor="middle" font-weight="600">LLM</text>
  <text x="712" y="110" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">GPT-4 / Claude</text>
  <text x="712" y="122" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">grounded</text>
  <text x="712" y="134" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">answer</text>

  <path d="M 774 111 L 796 111" stroke="#DB2777" stroke-width="2"/>
  <polygon points="793,107 801,111 793,115" fill="#DB2777"/>

  <!-- Answer -->
  <rect x="798" y="74" width="76" height="74" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="836" y="97" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="600">Answer</text>
  <text x="836" y="113" font-family="monospace" font-size="8" fill="#064E3B" text-anchor="middle">cited from</text>
  <text x="836" y="125" font-family="monospace" font-size="8" fill="#064E3B" text-anchor="middle">your docs</text>

  <!-- ── Bottom Left: Indexing pipeline ── -->
  <rect x="18" y="174" width="420" height="278" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="228" y="194" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Indexing Pipeline  (Build Time)</text>

  <rect x="30" y="202" width="396" height="36" rx="5" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="42" y="216" font-family="monospace" font-size="9" fill="#1D4ED8" font-weight="600">1. Load Documents</text>
  <text x="42" y="230" font-family="monospace" font-size="8.5" fill="#64748B">PDF, HTML, Markdown, Confluence, Notion, DB</text>

  <path d="M 228 238 L 228 246" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="224,243 228,251 232,243" fill="#CBD5E1"/>

  <rect x="30" y="250" width="396" height="36" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="42" y="264" font-family="monospace" font-size="9" fill="#6D28D9" font-weight="600">2. Chunk Text</text>
  <text x="42" y="278" font-family="monospace" font-size="8.5" fill="#64748B">512–1024 tokens · overlap 10–20% · respect sections</text>

  <path d="M 228 286 L 228 294" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="224,291 228,299 232,291" fill="#CBD5E1"/>

  <rect x="30" y="298" width="396" height="36" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="42" y="312" font-family="monospace" font-size="9" fill="#065F46" font-weight="600">3. Embed Chunks</text>
  <text x="42" y="326" font-family="monospace" font-size="8.5" fill="#64748B">text-embedding-3-small · ada-002 · all-MiniLM-L6-v2</text>

  <path d="M 228 334 L 228 342" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="224,339 228,347 232,339" fill="#CBD5E1"/>

  <rect x="30" y="346" width="396" height="36" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="42" y="360" font-family="monospace" font-size="9" fill="#92400E" font-weight="600">4. Store in Vector DB</text>
  <text x="42" y="374" font-family="monospace" font-size="8.5" fill="#64748B">Pinecone · pgvector · Weaviate · Qdrant · Chroma</text>

  <rect x="30" y="398" width="396" height="46" rx="5" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="228" y="414" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Metadata: source, date, section → filter at query time</text>
  <text x="228" y="430" font-family="monospace" font-size="8.5" fill="#64748B" text-anchor="middle">Re-rank: cross-encoder after vector retrieval for precision</text>

  <!-- ── Bottom Right: Key decisions ── -->
  <rect x="450" y="174" width="432" height="278" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="666" y="194" font-family="Inter,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Design Decisions  +  Key Points</text>

  <rect x="462" y="204" width="408" height="44" rx="5" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1"/>
  <text x="472" y="220" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" font-weight="600">Chunk Size Tradeoff</text>
  <text x="472" y="235" font-family="monospace" font-size="8.5" fill="#64748B">Small chunks → precise retrieval, context lost</text>
  <text x="472" y="248" font-family="monospace" font-size="8" fill="#64748B">Large chunks → context preserved, noisy retrieval</text>

  <rect x="462" y="254" width="408" height="44" rx="5" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1"/>
  <text x="472" y="270" font-family="Inter,sans-serif" font-size="9" fill="#065F46" font-weight="600">Similarity Metrics</text>
  <text x="472" y="285" font-family="monospace" font-size="8.5" fill="#64748B">cosine similarity (most common) · dot product</text>
  <text x="472" y="298" font-family="monospace" font-size="8" fill="#64748B">Euclidean distance · best for normalized vectors</text>

  <rect x="462" y="304" width="408" height="44" rx="5" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
  <text x="472" y="320" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" font-weight="600">Hallucination Prevention</text>
  <text x="472" y="335" font-family="monospace" font-size="8.5" fill="#64748B">Ground LLM in retrieved context</text>
  <text x="472" y="348" font-family="monospace" font-size="8" fill="#64748B">cite sources · threshold minimum similarity score</text>

  <rect x="462" y="354" width="408" height="44" rx="5" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="472" y="370" font-family="Inter,sans-serif" font-size="9" fill="#92400E" font-weight="600">Advanced: HyDE + Re-ranking</text>
  <text x="472" y="385" font-family="monospace" font-size="8.5" fill="#64748B">HyDE: generate hypothetical doc, embed, search</text>
  <text x="472" y="398" font-family="monospace" font-size="8" fill="#64748B">Re-rank: cross-encoder scores top-K for final order</text>

  <rect x="462" y="404" width="408" height="40" rx="5" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="666" y="420" font-family="monospace" font-size="8.5" fill="#475569" text-anchor="middle">RAG beats fine-tuning when: data changes frequently</text>
  <text x="666" y="436" font-family="monospace" font-size="8.5" fill="#475569" text-anchor="middle">or requires citations · fine-tune for style/behavior</text>
</svg>
