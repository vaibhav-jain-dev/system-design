<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <rect x="18" y="18" width="120" height="20" rx="4" fill="#F5F3FF"/>
  <text x="78" y="32" font-family="Inter,sans-serif" font-size="10" fill="#6D28D9" text-anchor="middle" font-weight="700">TRIE + RANKING</text>

  <!-- Search Bar -->
  <rect x="200" y="50" width="500" height="44" rx="22" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
  <text x="240" y="76" font-family="Inter,sans-serif" font-size="14" fill="#1E293B" font-weight="500">how to des</text>
  <text x="358" y="76" font-family="Inter,sans-serif" font-size="14" fill="#94A3B8">|</text>
  <circle cx="668" cy="72" r="14" fill="#6366F1"/>
  <text x="668" y="77" font-family="Inter,sans-serif" font-size="12" fill="white" text-anchor="middle">🔍</text>

  <!-- Dropdown suggestions -->
  <rect x="200" y="96" width="500" height="140" rx="8" fill="#FFFFFF" stroke="#E2E5EA" stroke-width="1.5">
  </rect>
  <rect x="208" y="104" width="484" height="30" rx="4" fill="#EEF2FF"/>
  <text x="226" y="123" font-family="Inter,sans-serif" font-size="11" fill="#1E293B">how to design a <text font-weight="700">url shortener</text></text>
  <text x="670" y="123" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="end">12.5K/mo</text>

  <rect x="208" y="138" width="484" height="30" rx="4" fill="#FFFFFF"/>
  <text x="226" y="157" font-family="Inter,sans-serif" font-size="11" fill="#1E293B">how to design a <text font-weight="700">rate limiter</text></text>
  <text x="670" y="157" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="end">8.2K/mo</text>

  <rect x="208" y="172" width="484" height="30" rx="4" fill="#FFFFFF"/>
  <text x="226" y="191" font-family="Inter,sans-serif" font-size="11" fill="#1E293B">how to design a <text font-weight="700">distributed cache</text></text>
  <text x="670" y="191" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="end">5.1K/mo</text>

  <rect x="208" y="206" width="484" height="24" rx="4" fill="#F8FAFC"/>
  <text x="450" y="222" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">ranked by frequency × recency × personalization</text>

  <!-- Latency target -->
  <rect x="710" y="96" width="80" height="28" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="750" y="114" font-family="monospace" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">&lt;100ms</text>

  <!-- ── TRIE STRUCTURE ── -->
  <rect x="40" y="260" width="360" height="180" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="220" y="280" font-family="Inter,sans-serif" font-size="11" fill="#6D28D9" text-anchor="middle" font-weight="700">TRIE DATA STRUCTURE</text>

  <!-- Root -->
  <circle cx="200" cy="306" r="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="200" y="310" font-family="monospace" font-size="9" fill="#6D28D9" text-anchor="middle">h</text>

  <!-- Level 2 -->
  <line x1="200" y1="318" x2="140" y2="340" stroke="#A78BFA" stroke-width="1.5"/>
  <line x1="200" y1="318" x2="260" y2="340" stroke="#A78BFA" stroke-width="1.5"/>

  <circle cx="140" cy="350" r="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="140" y="354" font-family="monospace" font-size="9" fill="#6D28D9" text-anchor="middle">o</text>
  <circle cx="260" cy="350" r="12" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1"/>
  <text x="260" y="354" font-family="monospace" font-size="9" fill="#7C3AED" text-anchor="middle">e</text>

  <!-- Level 3 -->
  <line x1="140" y1="362" x2="90" y2="384" stroke="#A78BFA" stroke-width="1.5"/>
  <line x1="140" y1="362" x2="190" y2="384" stroke="#A78BFA" stroke-width="1.5"/>

  <circle cx="90" cy="394" r="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="90" y="398" font-family="monospace" font-size="9" fill="#6D28D9" text-anchor="middle">w</text>
  <circle cx="190" cy="394" r="12" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="190" y="398" font-family="monospace" font-size="9" fill="#6D28D9" text-anchor="middle">t</text>

  <!-- Leaf annotations -->
  <rect x="50" y="412" width="80" height="16" rx="3" fill="#D1FAE5"/>
  <text x="90" y="424" font-family="monospace" font-size="7" fill="#065F46" text-anchor="middle">"how" → 50K</text>
  <rect x="150" y="412" width="80" height="16" rx="3" fill="#D1FAE5"/>
  <text x="190" y="424" font-family="monospace" font-size="7" fill="#065F46" text-anchor="middle">"hot" → 12K</text>

  <!-- Top-K annotation -->
  <rect x="280" y="370" width="110" height="50" rx="4" fill="#E0E7FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="335" y="388" font-family="Inter,sans-serif" font-size="8" fill="#4338CA" text-anchor="middle" font-weight="600">Each node stores</text>
  <text x="335" y="404" font-family="monospace" font-size="8" fill="#4338CA" text-anchor="middle">top-K completions</text>
  <text x="335" y="416" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">pre-computed</text>

  <!-- ── ARCHITECTURE ── -->
  <rect x="430" y="260" width="450" height="180" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="655" y="280" font-family="Inter,sans-serif" font-size="11" fill="#4338CA" text-anchor="middle" font-weight="700">ARCHITECTURE</text>

  <!-- CDN / Edge -->
  <rect x="450" y="296" width="100" height="50" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="500" y="316" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle" font-weight="600">CDN Cache</text>
  <text x="500" y="334" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">top 1K prefixes</text>

  <path d="M 552 321 L 578 321" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="575,317 583,321 575,325" fill="#3B82F6"/>

  <!-- API Gateway -->
  <rect x="586" y="296" width="100" height="50" rx="6" fill="#E0E7FF" stroke="#818CF8" stroke-width="1"/>
  <text x="636" y="316" font-family="Inter,sans-serif" font-size="9" fill="#4338CA" text-anchor="middle" font-weight="600">API Gateway</text>
  <text x="636" y="334" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">debounce 100ms</text>

  <path d="M 688 321 L 714 321" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="711,317 719,321 711,325" fill="#6366F1"/>

  <!-- Trie Service -->
  <rect x="722" y="296" width="140" height="50" rx="6" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="792" y="316" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" text-anchor="middle" font-weight="600">Trie Service</text>
  <text x="792" y="334" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">in-memory trie lookup</text>

  <!-- Offline pipeline -->
  <rect x="450" y="366" width="412" height="56" rx="6" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="656" y="386" font-family="Inter,sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="600">OFFLINE: Trie Builder Pipeline</text>
  <text x="656" y="404" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Kafka (search logs) → Flink (count + rank) → Build trie → Deploy to Trie Service</text>
  <text x="656" y="418" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">Rebuild every 15 min · 50M unique queries → ~2 GB trie per shard</text>
</svg>
