<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- Labels -->
  <rect x="18" y="18" width="100" height="20" rx="4" fill="#DBEAFE"/>
  <text x="68" y="32" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="700">WRITE PATH</text>
  <rect x="18" y="240" width="100" height="20" rx="4" fill="#D1FAE5"/>
  <text x="68" y="254" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">READ PATH</text>

  <!-- ── WRITE PATH ── -->
  <!-- Post Tweet -->
  <rect x="40" y="50" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="110" y="70" font-family="Inter,sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle" font-weight="600">NEW TWEET</text>
  <rect x="56" y="80" width="108" height="18" rx="3" fill="#DBEAFE"/>
  <text x="110" y="93" font-family="monospace" font-size="7" fill="#1D4ED8" text-anchor="middle">user_42 posts</text>
  <text x="110" y="118" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">5K tweets/sec</text>

  <path d="M 182 90 L 220 90" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="217,86 225,90 217,94" fill="#3B82F6"/>

  <!-- Tweet Store -->
  <rect x="230" y="50" width="160" height="80" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="310" y="70" font-family="Inter,sans-serif" font-size="10" fill="#4338CA" text-anchor="middle" font-weight="600">TWEET STORE</text>
  <text x="310" y="90" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">DynamoDB</text>
  <text x="310" y="106" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">PK: tweet_id (Snowflake)</text>
  <text x="310" y="120" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">single write, append-only</text>

  <path d="M 392 90 L 430 90" stroke="#6366F1" stroke-width="2"/>
  <polygon points="427,86 435,90 427,94" fill="#6366F1"/>

  <!-- Fan-out Service -->
  <rect x="440" y="42" width="280" height="180" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="580" y="62" font-family="Inter,sans-serif" font-size="11" fill="#92400E" text-anchor="middle" font-weight="700">FAN-OUT SERVICE</text>

  <!-- Normal user fan-out -->
  <rect x="460" y="76" width="240" height="56" rx="6" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="580" y="92" font-family="Inter,sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="600">NORMAL USER (&lt;10K followers)</text>
  <text x="580" y="108" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Fan-out on WRITE → push to all follower timelines</text>
  <text x="580" y="122" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">Redis LPUSH to 500 timelines = 500 writes</text>

  <!-- Celebrity fan-out -->
  <rect x="460" y="140" width="240" height="56" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="580" y="156" font-family="Inter,sans-serif" font-size="9" fill="#991B1B" text-anchor="middle" font-weight="600">CELEBRITY (&gt;10K followers)</text>
  <text x="580" y="172" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Fan-out on READ → merge at read time</text>
  <text x="580" y="186" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">10M followers × write = too expensive</text>

  <!-- Fan-out arrow to timeline caches -->
  <path d="M 720 120 L 770 120" stroke="#D97706" stroke-width="2"/>
  <polygon points="767,116 775,120 767,124" fill="#D97706"/>

  <!-- Timeline Caches -->
  <rect x="780" y="50" width="100" height="170" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/>
  <text x="830" y="70" font-family="Inter,sans-serif" font-size="9" fill="#DC2626" text-anchor="middle" font-weight="600">REDIS</text>
  <text x="830" y="84" font-family="Inter,sans-serif" font-size="9" fill="#DC2626" text-anchor="middle" font-weight="600">TIMELINES</text>
  <rect x="792" y="96" width="76" height="14" rx="3" fill="#FEE2E2"/>
  <text x="830" y="107" font-family="monospace" font-size="7" fill="#991B1B" text-anchor="middle">user:1 → [t5,t3,t1]</text>
  <rect x="792" y="114" width="76" height="14" rx="3" fill="#FEE2E2"/>
  <text x="830" y="125" font-family="monospace" font-size="7" fill="#991B1B" text-anchor="middle">user:2 → [t6,t4,t2]</text>
  <rect x="792" y="132" width="76" height="14" rx="3" fill="#FEE2E2"/>
  <text x="830" y="143" font-family="monospace" font-size="7" fill="#991B1B" text-anchor="middle">user:3 → [t7,t5,t1]</text>
  <text x="830" y="170" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">800 tweet IDs</text>
  <text x="830" y="184" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">per user list</text>
  <text x="830" y="198" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">~6.4 KB each</text>
  <text x="830" y="212" font-family="monospace" font-size="7" fill="#DC2626" text-anchor="middle">300M users</text>

  <!-- ── READ PATH ── -->
  <!-- User opens app -->
  <rect x="40" y="270" width="140" height="70" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="110" y="290" font-family="Inter,sans-serif" font-size="10" fill="#059669" text-anchor="middle" font-weight="600">USER OPENS APP</text>
  <text x="110" y="310" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">GET /feed</text>
  <text x="110" y="326" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">300K reads/sec</text>

  <path d="M 182 305 L 220 305" stroke="#059669" stroke-width="2"/>
  <polygon points="217,301 225,305 217,309" fill="#059669"/>

  <!-- Step 1: Read pre-computed -->
  <rect x="230" y="270" width="170" height="70" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/>
  <text x="315" y="290" font-family="Inter,sans-serif" font-size="9" fill="#DC2626" text-anchor="middle" font-weight="600">1. REDIS: PRE-COMPUTED</text>
  <text x="315" y="310" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">LRANGE user:42 0 19</text>
  <text x="315" y="326" font-family="monospace" font-size="7" fill="#059669" text-anchor="middle">sub-ms · 95% of users</text>

  <path d="M 402 305 L 430 305" stroke="#6366F1" stroke-width="2"/>
  <polygon points="427,301 435,305 427,309" fill="#6366F1"/>

  <!-- Step 2: Merge celebrities -->
  <rect x="440" y="270" width="170" height="70" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="525" y="290" font-family="Inter,sans-serif" font-size="9" fill="#4338CA" text-anchor="middle" font-weight="600">2. MERGE CELEBRITIES</text>
  <text x="525" y="310" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">Fetch latest from each</text>
  <text x="525" y="326" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">~5 celebrity follows avg</text>

  <path d="M 612 305 L 640 305" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="637,301 645,305 637,309" fill="#7C3AED"/>

  <!-- Step 3: Rank -->
  <rect x="650" y="270" width="130" height="70" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="715" y="290" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" text-anchor="middle" font-weight="600">3. RANK + FILTER</text>
  <text x="715" y="310" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">ML scoring</text>
  <text x="715" y="326" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">return top 20</text>

  <path d="M 782 305 L 810 305" stroke="#059669" stroke-width="2"/>
  <polygon points="807,301 815,305 807,309" fill="#059669"/>

  <rect x="820" y="280" width="60" height="50" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="850" y="302" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">FEED</text>
  <text x="850" y="318" font-family="monospace" font-size="7" fill="#065F46" text-anchor="middle">&lt;50ms</text>

  <!-- Bottom: Key numbers -->
  <rect x="40" y="370" width="840" height="72" rx="8" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1"/>
  <text x="460" y="390" font-family="Inter,sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="700">KEY TRADE-OFF: Fan-out on Write vs Read</text>
  <rect x="60" y="400" width="380" height="30" rx="4" fill="#FEF3C7"/>
  <text x="250" y="419" font-family="monospace" font-size="8" fill="#92400E" text-anchor="middle">Write: 500 followers × 5K tweets/s = 2.5M Redis writes/s (fast reads, high write cost)</text>
  <rect x="460" y="400" width="400" height="30" rx="4" fill="#DBEAFE"/>
  <text x="660" y="419" font-family="monospace" font-size="8" fill="#1D4ED8" text-anchor="middle">Read: merge 5 celeb feeds on-the-fly (slow reads, saves 10M+ writes per celebrity tweet)</text>
</svg>
