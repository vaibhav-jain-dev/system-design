<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- Labels -->
  <rect x="18" y="18" width="120" height="20" rx="4" fill="#D1FAE5"/>
  <text x="78" y="32" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">GEO MATCHING</text>

  <!-- ── MAP AREA ── -->
  <rect x="40" y="50" width="400" height="260" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="240" y="70" font-family="Inter,sans-serif" font-size="11" fill="#059669" text-anchor="middle" font-weight="700">GEOSPATIAL MATCHING</text>

  <!-- Grid / map background -->
  <rect x="60" y="82" width="360" height="200" rx="4" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>

  <!-- Geohash grid -->
  <line x1="180" y1="82" x2="180" y2="282" stroke="#A7F3D0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="300" y1="82" x2="300" y2="282" stroke="#A7F3D0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="150" x2="420" y2="150" stroke="#A7F3D0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="216" x2="420" y2="216" stroke="#A7F3D0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Geohash labels -->
  <text x="120" y="100" font-family="monospace" font-size="7" fill="#6EE7B7">9q8yy</text>
  <text x="240" y="100" font-family="monospace" font-size="7" fill="#6EE7B7">9q8yz</text>
  <text x="360" y="100" font-family="monospace" font-size="7" fill="#6EE7B7">9q8yw</text>

  <!-- Rider (request) -->
  <circle cx="220" cy="180" r="14" fill="#3B82F6" stroke="#1D4ED8" stroke-width="2"/>
  <text x="220" y="184" font-family="Inter,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="700">R</text>
  <text x="220" y="204" font-family="monospace" font-size="7" fill="#1D4ED8" text-anchor="middle">Rider request</text>

  <!-- Search radius -->
  <circle cx="220" cy="180" r="60" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="284" y="145" font-family="monospace" font-size="7" fill="#3B82F6">3 km radius</text>

  <!-- Drivers -->
  <circle cx="160" cy="140" r="10" fill="#059669" stroke="#047857" stroke-width="1.5"/>
  <text x="160" y="144" font-family="Inter,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="700">D</text>
  <text x="160" y="130" font-family="monospace" font-size="6" fill="#065F46" text-anchor="middle">1.2 km</text>

  <circle cx="280" cy="160" r="10" fill="#059669" stroke="#047857" stroke-width="1.5"/>
  <text x="280" y="164" font-family="Inter,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="700">D</text>
  <text x="280" y="150" font-family="monospace" font-size="6" fill="#065F46" text-anchor="middle">2.1 km</text>

  <circle cx="190" cy="220" r="10" fill="#059669" stroke="#047857" stroke-width="1.5"/>
  <text x="190" y="224" font-family="Inter,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="700">D</text>
  <text x="190" y="240" font-family="monospace" font-size="6" fill="#065F46" text-anchor="middle">1.8 km</text>

  <!-- Driver outside radius (gray) -->
  <circle cx="380" cy="250" r="10" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <text x="380" y="254" font-family="Inter,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="700">D</text>
  <text x="380" y="270" font-family="monospace" font-size="6" fill="#94A3B8" text-anchor="middle">5.3 km ✗</text>

  <!-- Bottom info -->
  <text x="240" y="300" font-family="monospace" font-size="8" fill="#059669" text-anchor="middle">Redis GEORADIUS → 3 drivers within 3 km → score + dispatch</text>

  <!-- ── MATCHING + DISPATCH (right side) ── -->
  <rect x="470" y="50" width="410" height="130" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="675" y="70" font-family="Inter,sans-serif" font-size="11" fill="#4338CA" text-anchor="middle" font-weight="700">DRIVER SCORING + DISPATCH</text>

  <!-- Scoring factors -->
  <rect x="490" y="84" width="110" height="40" rx="4" fill="#E0E7FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="545" y="100" font-family="Inter,sans-serif" font-size="8" fill="#4338CA" text-anchor="middle" font-weight="600">Distance</text>
  <text x="545" y="114" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">weight: 0.4</text>

  <rect x="610" y="84" width="110" height="40" rx="4" fill="#E0E7FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="665" y="100" font-family="Inter,sans-serif" font-size="8" fill="#4338CA" text-anchor="middle" font-weight="600">ETA</text>
  <text x="665" y="114" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">weight: 0.3</text>

  <rect x="730" y="84" width="110" height="40" rx="4" fill="#E0E7FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="785" y="100" font-family="Inter,sans-serif" font-size="8" fill="#4338CA" text-anchor="middle" font-weight="600">Rating</text>
  <text x="785" y="114" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">weight: 0.2</text>

  <!-- Winner -->
  <rect x="590" y="134" width="140" height="30" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="660" y="153" font-family="monospace" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">Driver A → score: 0.87</text>
  <text x="660" y="170" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">20s timeout to accept · cascade to next</text>

  <!-- ── RIDE STATE MACHINE ── -->
  <rect x="470" y="200" width="410" height="110" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="675" y="220" font-family="Inter,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="700">RIDE STATE MACHINE</text>

  <rect x="490" y="236" width="68" height="28" rx="6" fill="#E0E7FF" stroke="#818CF8" stroke-width="1"/>
  <text x="524" y="254" font-family="monospace" font-size="7" fill="#4338CA" text-anchor="middle">REQUESTED</text>
  <path d="M 560 250 L 576 250" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="573,246 581,250 573,254" fill="#6366F1"/>

  <rect x="584" y="236" width="68" height="28" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="618" y="254" font-family="monospace" font-size="7" fill="#92400E" text-anchor="middle">MATCHED</text>
  <path d="M 654 250 L 670 250" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="667,246 675,250 667,254" fill="#D97706"/>

  <rect x="678" y="236" width="68" height="28" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="712" y="254" font-family="monospace" font-size="7" fill="#1D4ED8" text-anchor="middle">EN ROUTE</text>
  <path d="M 748 250 L 764 250" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="761,246 769,250 761,254" fill="#3B82F6"/>

  <rect x="772" y="236" width="68" height="28" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="806" y="254" font-family="monospace" font-size="7" fill="#065F46" text-anchor="middle">COMPLETED</text>

  <text x="660" y="290" font-family="monospace" font-size="7" fill="#94A3B8" text-anchor="middle">GPS updates every 4s → Redis → WebSocket to rider</text>

  <!-- ── SURGE PRICING ── -->
  <rect x="40" y="330" width="400" height="110" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/>
  <text x="240" y="350" font-family="Inter,sans-serif" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="700">SURGE PRICING</text>

  <!-- Supply/demand bars -->
  <rect x="70" y="370" width="160" height="20" rx="4" fill="#DBEAFE"/>
  <text x="150" y="384" font-family="monospace" font-size="8" fill="#1D4ED8" text-anchor="middle">Demand: 500 rides/min</text>

  <rect x="70" y="396" width="80" height="20" rx="4" fill="#D1FAE5"/>
  <text x="110" y="410" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">Supply: 200</text>

  <text x="300" y="384" font-family="Inter,sans-serif" font-size="9" fill="#DC2626" font-weight="600">Ratio: 2.5x</text>
  <text x="300" y="404" font-family="monospace" font-size="8" fill="#64748B">surge = max(1.0, demand/supply)</text>
  <text x="300" y="420" font-family="monospace" font-size="7" fill="#94A3B8">Recalculated per geohash every 2 min</text>

  <!-- Key numbers -->
  <rect x="470" y="330" width="410" height="110" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="1"/>
  <text x="675" y="350" font-family="Inter,sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="700">SCALE NUMBERS</text>
  <text x="675" y="375" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">1M active drivers → 250K GPS updates/sec</text>
  <text x="675" y="395" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">Redis Geo: GEOADD + GEORADIUS in &lt;1ms</text>
  <text x="675" y="415" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">Match latency target: &lt;3 seconds end-to-end</text>
  <text x="675" y="432" font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle">Partition by city → independent Redis clusters per region</text>
</svg>
