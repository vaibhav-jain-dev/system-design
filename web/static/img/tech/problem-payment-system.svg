<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <rect x="18" y="18" width="140" height="20" rx="4" fill="#D1FAE5"/>
  <text x="88" y="32" font-family="Inter,sans-serif" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">EXACTLY-ONCE PAY</text>

  <!-- ── PAYMENT FLOW ── -->
  <rect x="40" y="50" width="820" height="160" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="450" y="70" font-family="Inter,sans-serif" font-size="11" fill="#059669" text-anchor="middle" font-weight="700">PAYMENT FLOW (Two-Phase Commit)</text>

  <!-- Step 1 -->
  <rect x="60" y="86" width="120" height="60" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="120" y="104" font-family="Inter,sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle" font-weight="600">1. CREATE ORDER</text>
  <text x="120" y="120" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">idempotency_key</text>
  <text x="120" y="133" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">= order_id + attempt</text>

  <path d="M 182 116 L 210 116" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="207,112 215,116 207,120" fill="#6366F1"/>

  <!-- Step 2 -->
  <rect x="218" y="86" width="120" height="60" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="278" y="104" font-family="Inter,sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="600">2. AUTH HOLD</text>
  <text x="278" y="120" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">Stripe: auth $50.00</text>
  <text x="278" y="133" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">hold for 7 days</text>

  <path d="M 340 116 L 368 116" stroke="#D97706" stroke-width="1.5"/>
  <polygon points="365,112 373,116 365,120" fill="#D97706"/>

  <!-- Step 3 -->
  <rect x="376" y="86" width="120" height="60" rx="6" fill="#E0E7FF" stroke="#818CF8" stroke-width="1.5"/>
  <text x="436" y="104" font-family="Inter,sans-serif" font-size="9" fill="#4338CA" text-anchor="middle" font-weight="600">3. FULFILL</text>
  <text x="436" y="120" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">Ship item / provide</text>
  <text x="436" y="133" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">service access</text>

  <path d="M 498 116 L 526 116" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="523,112 531,116 523,120" fill="#6366F1"/>

  <!-- Step 4 -->
  <rect x="534" y="86" width="120" height="60" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="594" y="104" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">4. CAPTURE</text>
  <text x="594" y="120" font-family="monospace" font-size="7" fill="#065F46" text-anchor="middle">Stripe: capture $50</text>
  <text x="594" y="133" font-family="monospace" font-size="7" fill="#065F46" text-anchor="middle">money moves</text>

  <path d="M 656 116 L 684 116" stroke="#059669" stroke-width="1.5"/>
  <polygon points="681,112 689,116 681,120" fill="#059669"/>

  <!-- Step 5 (or fail path) -->
  <rect x="692" y="86" width="148" height="60" rx="6" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1"/>
  <text x="766" y="104" font-family="Inter,sans-serif" font-size="9" fill="#6D28D9" text-anchor="middle" font-weight="600">5. RECONCILE</text>
  <text x="766" y="120" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">ledger entry + receipt</text>
  <text x="766" y="133" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">webhook → customer</text>

  <!-- Failure path -->
  <rect x="376" y="158" width="278" height="36" rx="4" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="515" y="172" font-family="Inter,sans-serif" font-size="8" fill="#DC2626" text-anchor="middle" font-weight="600">FAILURE: Auto-void auth hold → Refund → Notify customer</text>
  <text x="515" y="186" font-family="monospace" font-size="7" fill="#991B1B" text-anchor="middle">Saga compensation: reverse each step in order</text>

  <!-- ── IDEMPOTENCY ── -->
  <rect x="40" y="230" width="400" height="210" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/>
  <text x="240" y="250" font-family="Inter,sans-serif" font-size="11" fill="#DC2626" text-anchor="middle" font-weight="700">IDEMPOTENCY (Prevent Double Charge)</text>

  <!-- Request 1 -->
  <rect x="60" y="268" width="360" height="36" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="80" y="283" font-family="monospace" font-size="8" fill="#065F46">POST /pay</text>
  <text x="200" y="283" font-family="monospace" font-size="8" fill="#065F46">Key: ord_123_v1</text>
  <text x="360" y="283" font-family="monospace" font-size="8" fill="#065F46" text-anchor="end">→ 200 OK ✓</text>
  <text x="80" y="298" font-family="monospace" font-size="7" fill="#94A3B8">First attempt — processes payment, stores result</text>

  <!-- Request 2 (retry) -->
  <rect x="60" y="310" width="360" height="36" rx="4" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="80" y="325" font-family="monospace" font-size="8" fill="#92400E">POST /pay</text>
  <text x="200" y="325" font-family="monospace" font-size="8" fill="#92400E">Key: ord_123_v1</text>
  <text x="360" y="325" font-family="monospace" font-size="8" fill="#92400E" text-anchor="end">→ 200 OK (cached)</text>
  <text x="80" y="340" font-family="monospace" font-size="7" fill="#94A3B8">Network retry — returns cached result, NO second charge</text>

  <!-- Request 3 (new) -->
  <rect x="60" y="352" width="360" height="36" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="80" y="367" font-family="monospace" font-size="8" fill="#1D4ED8">POST /pay</text>
  <text x="200" y="367" font-family="monospace" font-size="8" fill="#1D4ED8">Key: ord_456_v1</text>
  <text x="360" y="367" font-family="monospace" font-size="8" fill="#1D4ED8" text-anchor="end">→ 200 OK ✓</text>
  <text x="80" y="382" font-family="monospace" font-size="7" fill="#94A3B8">Different order — new key, processes normally</text>

  <text x="240" y="422" font-family="monospace" font-size="8" fill="#DC2626" text-anchor="middle" font-weight="600">Key = order_id + version → DynamoDB conditional write</text>

  <!-- ── LEDGER ── -->
  <rect x="470" y="230" width="390" height="210" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="665" y="250" font-family="Inter,sans-serif" font-size="11" fill="#4338CA" text-anchor="middle" font-weight="700">DOUBLE-ENTRY LEDGER</text>

  <!-- Ledger entries -->
  <rect x="490" y="268" width="350" height="20" rx="3" fill="#E0E7FF"/>
  <text x="500" y="282" font-family="monospace" font-size="8" fill="#4338CA">DEBIT</text>
  <text x="580" y="282" font-family="monospace" font-size="8" fill="#4338CA">customer_wallet</text>
  <text x="800" y="282" font-family="monospace" font-size="8" fill="#DC2626" text-anchor="end">-$50.00</text>

  <rect x="490" y="292" width="350" height="20" rx="3" fill="#ECFDF5"/>
  <text x="500" y="306" font-family="monospace" font-size="8" fill="#065F46">CREDIT</text>
  <text x="580" y="306" font-family="monospace" font-size="8" fill="#065F46">merchant_wallet</text>
  <text x="800" y="306" font-family="monospace" font-size="8" fill="#059669" text-anchor="end">+$47.50</text>

  <rect x="490" y="316" width="350" height="20" rx="3" fill="#ECFDF5"/>
  <text x="500" y="330" font-family="monospace" font-size="8" fill="#065F46">CREDIT</text>
  <text x="580" y="330" font-family="monospace" font-size="8" fill="#065F46">platform_fee</text>
  <text x="800" y="330" font-family="monospace" font-size="8" fill="#059669" text-anchor="end">+$2.50</text>

  <rect x="490" y="344" width="350" height="20" rx="3" fill="#F1F5F9"/>
  <text x="665" y="358" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">SUM(debits) = SUM(credits) — always balanced</text>

  <!-- Reconciliation -->
  <rect x="490" y="378" width="350" height="44" rx="4" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="665" y="396" font-family="Inter,sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="600">Daily Reconciliation</text>
  <text x="665" y="414" font-family="monospace" font-size="7" fill="#64748B" text-anchor="middle">Compare internal ledger vs Stripe settlements → flag mismatches → auto-resolve 98%</text>
</svg>
