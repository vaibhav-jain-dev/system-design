<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <defs>
    <linearGradient id="bg-redis" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A0A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" fill="url(#bg-redis)" rx="12"/>

  <!-- ── Left: Redis logo + key stats ── -->
  <rect x="18" y="18" width="280" height="424" rx="8" fill="#1E293B" stroke="#DC2626" stroke-width="1.5"/>

  <!-- Hexagon logo (large) -->
  <polygon points="158,48 198,70 198,114 158,136 118,114 118,70" fill="#1A0A0A" stroke="#DC2626" stroke-width="2.5"/>
  <polygon points="158,56 194,76 194,108 158,128 122,108 122,76" fill="#1E293B" stroke="#EF4444" stroke-width="2"/>
  <text x="158" y="108" font-family="monospace" font-size="40" fill="#EF4444" text-anchor="middle" font-weight="700">R</text>

  <!-- Lightning bolt -->
  <path d="M 205 55 L 196 76 L 205 76 L 196 98 L 218 68 L 206 68 Z" fill="#F59E0B" opacity="0.9"/>
  <text x="232" y="70" font-family="Inter,sans-serif" font-size="12" fill="#FCD34D" font-weight="700">Sub-ms</text>
  <text x="232" y="86" font-family="Inter,sans-serif" font-size="11" fill="#D97706">latency</text>

  <!-- Key stats -->
  <rect x="30" y="150" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="170" font-family="Inter,sans-serif" font-size="11" fill="#FCA5A5" font-weight="600">In-Memory</text>
  <text x="50" y="186" font-family="monospace" font-size="9" fill="#64748B">RAM-based · no disk I/O on hot path</text>
  <rect x="30" y="210" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="230" font-family="Inter,sans-serif" font-size="11" fill="#FCA5A5" font-weight="600">Single-Threaded Core</text>
  <text x="50" y="246" font-family="monospace" font-size="9" fill="#64748B">no locks · atomic by design</text>
  <rect x="30" y="270" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="290" font-family="Inter,sans-serif" font-size="11" fill="#FCA5A5" font-weight="600">Persistence Options</text>
  <text x="50" y="306" font-family="monospace" font-size="9" fill="#64748B">RDB snapshots · AOF append-only</text>
  <rect x="30" y="330" width="256" height="52" rx="6" fill="#0F172A"/>
  <text x="50" y="350" font-family="Inter,sans-serif" font-size="11" fill="#FCA5A5" font-weight="600">Cluster Mode</text>
  <text x="50" y="366" font-family="monospace" font-size="9" fill="#64748B">16384 hash slots · auto-failover</text>
  <rect x="30" y="390" width="256" height="40" rx="6" fill="#1E293B" stroke="#EF4444" stroke-width="0.5"/>
  <text x="158" y="408" font-family="Inter,sans-serif" font-size="11" fill="#FCA5A5" text-anchor="middle" font-weight="600">Use Cases</text>
  <text x="158" y="423" font-family="Inter,sans-serif" font-size="9" fill="#475569" text-anchor="middle">Cache · Session · Rate Limit · Queue · Pub/Sub</text>

  <!-- ── Right: Data Structures grid ── -->
  <text x="320" y="30" font-family="Inter,sans-serif" font-size="13" fill="#94A3B8" font-weight="600">Data Structures</text>

  <!-- Row 1 -->
  <rect x="318" y="42" width="270" height="96" rx="6" fill="#1E293B" stroke="#EF4444" stroke-width="1.2"/>
  <text x="338" y="66" font-family="monospace" font-size="14" fill="#FCA5A5" font-weight="700">String</text>
  <text x="338" y="84" font-family="monospace" font-size="9" fill="#64748B">SET key value EX ttl</text>
  <text x="338" y="100" font-family="monospace" font-size="9" fill="#64748B">INCR key  → atomic counter</text>
  <text x="534" y="66" font-family="monospace" font-size="11" fill="#FCA5A5">O(1)</text>
  <text x="534" y="80" font-family="monospace" font-size="9" fill="#475569">get/set</text>

  <rect x="608" y="42" width="274" height="96" rx="6" fill="#1E293B" stroke="#EF4444" stroke-width="1.2"/>
  <text x="628" y="66" font-family="monospace" font-size="14" fill="#FCA5A5" font-weight="700">Hash</text>
  <text x="628" y="84" font-family="monospace" font-size="9" fill="#64748B">HSET key field val</text>
  <text x="628" y="100" font-family="monospace" font-size="9" fill="#64748B">HMGET → batch fetch</text>
  <text x="824" y="66" font-family="monospace" font-size="11" fill="#FCA5A5">O(1)</text>
  <text x="824" y="80" font-family="monospace" font-size="9" fill="#475569">per field</text>

  <!-- Row 2 -->
  <rect x="318" y="152" width="270" height="96" rx="6" fill="#1E293B" stroke="#DC2626" stroke-width="1.2"/>
  <text x="338" y="176" font-family="monospace" font-size="14" fill="#FCA5A5" font-weight="700">Sorted Set</text>
  <text x="338" y="194" font-family="monospace" font-size="9" fill="#64748B">ZADD key score member</text>
  <text x="338" y="210" font-family="monospace" font-size="9" fill="#64748B">ZRANGE → leaderboards</text>
  <text x="524" y="176" font-family="monospace" font-size="11" fill="#FCA5A5">O(logN)</text>
  <text x="524" y="190" font-family="monospace" font-size="9" fill="#475569">add/range</text>

  <rect x="608" y="152" width="274" height="96" rx="6" fill="#1E293B" stroke="#DC2626" stroke-width="1.2"/>
  <text x="628" y="176" font-family="monospace" font-size="14" fill="#FCA5A5" font-weight="700">List</text>
  <text x="628" y="194" font-family="monospace" font-size="9" fill="#64748B">RPUSH / LPOP → queue</text>
  <text x="628" y="210" font-family="monospace" font-size="9" fill="#64748B">BLPOP → blocking pop</text>
  <text x="824" y="176" font-family="monospace" font-size="11" fill="#FCA5A5">O(1)</text>
  <text x="824" y="190" font-family="monospace" font-size="9" fill="#475569">push/pop</text>

  <!-- Row 3 -->
  <rect x="318" y="262" width="270" height="96" rx="6" fill="#1E293B" stroke="#B91C1C" stroke-width="1.2"/>
  <text x="338" y="286" font-family="monospace" font-size="14" fill="#FCA5A5" font-weight="700">Set</text>
  <text x="338" y="304" font-family="monospace" font-size="9" fill="#64748B">SADD / SISMEMBER</text>
  <text x="338" y="320" font-family="monospace" font-size="9" fill="#64748B">SINTER → common friends</text>
  <text x="524" y="286" font-family="monospace" font-size="11" fill="#FCA5A5">O(1)</text>
  <text x="524" y="300" font-family="monospace" font-size="9" fill="#475569">add/check</text>

  <rect x="608" y="262" width="274" height="96" rx="6" fill="#1E293B" stroke="#B91C1C" stroke-width="1.2"/>
  <text x="628" y="286" font-family="monospace" font-size="14" fill="#FCA5A5" font-weight="700">Pub/Sub</text>
  <text x="628" y="304" font-family="monospace" font-size="9" fill="#64748B">PUBLISH channel msg</text>
  <text x="628" y="320" font-family="monospace" font-size="9" fill="#64748B">SUBSCRIBE → real-time</text>
  <text x="824" y="286" font-family="monospace" font-size="11" fill="#FCA5A5">O(N)</text>
  <text x="824" y="300" font-family="monospace" font-size="9" fill="#475569">subscribers</text>

  <!-- Row 4 bottom bar -->
  <rect x="318" y="372" width="563" height="70" rx="6" fill="#1E293B" stroke="#EF4444" stroke-width="0.5"/>
  <text x="600" y="396" font-family="Inter,sans-serif" font-size="12" fill="#FCA5A5" text-anchor="middle" font-weight="600">Interview Key Points</text>
  <text x="600" y="416" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">Lua scripts for atomicity  ·  EXPIRE for TTL  ·  Cluster = 16384 slots  ·  AOF for durability</text>
  <text x="600" y="432" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">fail-open: if Redis down → allow  ·  r6g.large = 13GB RAM ≈ $150/mo</text>
</svg>
