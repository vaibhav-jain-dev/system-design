<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <rect width="900" height="460" fill="#F8FAFC" rx="12"/>

  <!-- ── Left panel ── -->
  <rect x="18" y="18" width="280" height="424" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <polygon points="158,42 206,70 206,126 158,154 110,126 110,70" fill="#ECFDF5" stroke="#059669" stroke-width="2.5"/>
  <text x="158" y="106" font-family="Inter,sans-serif" font-size="36" fill="#059669" text-anchor="middle" font-weight="700">R</text>
  <text x="158" y="170" font-family="Inter,sans-serif" font-size="13" fill="#065F46" text-anchor="middle" font-weight="700">Redis</text>
  <text x="224" y="82" font-family="Inter,sans-serif" font-size="18" fill="#F59E0B">⚡</text>
  <text x="234" y="100" font-family="Inter,sans-serif" font-size="10" fill="#065F46" font-weight="600">Sub-ms</text>
  <text x="234" y="114" font-family="Inter,sans-serif" font-size="9" fill="#64748B">latency</text>

  <rect x="30" y="180" width="256" height="48" rx="6" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="1"/>
  <text x="50" y="200" font-family="Inter,sans-serif" font-size="11" fill="#065F46" font-weight="600">In-Memory</text>
  <text x="50" y="218" font-family="monospace" font-size="9" fill="#64748B">all data in RAM · O(1) reads/writes</text>

  <rect x="30" y="236" width="256" height="48" rx="6" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="1"/>
  <text x="50" y="256" font-family="Inter,sans-serif" font-size="11" fill="#065F46" font-weight="600">Single-Threaded</text>
  <text x="50" y="274" font-family="monospace" font-size="9" fill="#64748B">no locks needed · atomic ops</text>

  <rect x="30" y="292" width="256" height="48" rx="6" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="1"/>
  <text x="50" y="312" font-family="Inter,sans-serif" font-size="11" fill="#065F46" font-weight="600">Persistence</text>
  <text x="50" y="330" font-family="monospace" font-size="9" fill="#64748B">RDB snapshots · AOF append-only</text>

  <rect x="30" y="348" width="256" height="48" rx="6" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="1"/>
  <text x="50" y="368" font-family="Inter,sans-serif" font-size="11" fill="#065F46" font-weight="600">Cluster Mode</text>
  <text x="50" y="386" font-family="monospace" font-size="9" fill="#64748B">16384 hash slots · auto-sharding</text>

  <rect x="30" y="404" width="256" height="30" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="158" y="416" font-family="Inter,sans-serif" font-size="9" fill="#065F46" text-anchor="middle" font-weight="600">Use Cases</text>
  <text x="158" y="428" font-family="monospace" font-size="8" fill="#64748B" text-anchor="middle">cache · session · rate-limit · pub/sub</text>

  <!-- ── Right: Data Structures ── -->
  <text x="320" y="30" font-family="Inter,sans-serif" font-size="13" fill="#374151" font-weight="600">Data Structures  ·  Commands  ·  Complexity</text>

  <!-- String -->
  <rect x="318" y="38" width="268" height="122" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="318" y="38" width="268" height="28" rx="8" fill="#DBEAFE"/>
  <rect x="318" y="52" width="268" height="14" rx="0" fill="#DBEAFE"/>
  <text x="440" y="57" font-family="Inter,sans-serif" font-size="11" fill="#1D4ED8" font-weight="700">String</text>
  <rect x="538" y="40" width="40" height="18" rx="4" fill="#1D4ED8"/>
  <text x="558" y="53" font-family="monospace" font-size="9" fill="#FFFFFF" text-anchor="middle">O(1)</text>
  <text x="336" y="84" font-family="monospace" font-size="9" fill="#475569">SET user:1 "Alice" EX 3600</text>
  <text x="336" y="100" font-family="monospace" font-size="9" fill="#475569">GET user:1  →  "Alice"</text>
  <text x="336" y="116" font-family="monospace" font-size="9" fill="#475569">INCR counter  →  atomic</text>
  <text x="336" y="133" font-family="monospace" font-size="8" fill="#94A3B8">cache · counters · sessions</text>
  <text x="336" y="148" font-family="monospace" font-size="8" fill="#94A3B8">max 512MB per key</text>

  <!-- Hash -->
  <rect x="596" y="38" width="285" height="122" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="596" y="38" width="285" height="28" rx="8" fill="#D1FAE5"/>
  <rect x="596" y="52" width="285" height="14" rx="0" fill="#D1FAE5"/>
  <text x="718" y="57" font-family="Inter,sans-serif" font-size="11" fill="#065F46" font-weight="700">Hash</text>
  <rect x="840" y="40" width="34" height="18" rx="4" fill="#059669"/>
  <text x="857" y="53" font-family="monospace" font-size="9" fill="#FFFFFF" text-anchor="middle">O(1)</text>
  <text x="614" y="84" font-family="monospace" font-size="9" fill="#475569">HSET user:1 name "Alice" age 30</text>
  <text x="614" y="100" font-family="monospace" font-size="9" fill="#475569">HGET user:1 name  →  "Alice"</text>
  <text x="614" y="116" font-family="monospace" font-size="9" fill="#475569">HMGET user:1 name age</text>
  <text x="614" y="133" font-family="monospace" font-size="8" fill="#94A3B8">object storage · user profiles</text>
  <text x="614" y="148" font-family="monospace" font-size="8" fill="#94A3B8">field-level updates</text>

  <!-- Sorted Set -->
  <rect x="318" y="170" width="268" height="122" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="318" y="170" width="268" height="28" rx="8" fill="#EDE9FE"/>
  <rect x="318" y="184" width="268" height="14" rx="0" fill="#EDE9FE"/>
  <text x="440" y="189" font-family="Inter,sans-serif" font-size="11" fill="#6D28D9" font-weight="700">Sorted Set (ZSet)</text>
  <rect x="524" y="172" width="55" height="18" rx="4" fill="#7C3AED"/>
  <text x="551" y="185" font-family="monospace" font-size="9" fill="#FFFFFF" text-anchor="middle">O(logN)</text>
  <text x="336" y="216" font-family="monospace" font-size="9" fill="#475569">ZADD lb 1500 "player:1"</text>
  <text x="336" y="232" font-family="monospace" font-size="9" fill="#475569">ZRANGEBYSCORE rl:u1 -inf now</text>
  <text x="336" y="248" font-family="monospace" font-size="9" fill="#475569">ZREVRANK lb "player:1"</text>
  <text x="336" y="265" font-family="monospace" font-size="8" fill="#94A3B8">rate limiting · leaderboards · feed</text>
  <text x="336" y="280" font-family="monospace" font-size="8" fill="#94A3B8">sliding window · ranked lists</text>

  <!-- List -->
  <rect x="596" y="170" width="285" height="122" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="596" y="170" width="285" height="28" rx="8" fill="#FEF3C7"/>
  <rect x="596" y="184" width="285" height="14" rx="0" fill="#FEF3C7"/>
  <text x="718" y="189" font-family="Inter,sans-serif" font-size="11" fill="#92400E" font-weight="700">List</text>
  <rect x="840" y="172" width="34" height="18" rx="4" fill="#D97706"/>
  <text x="857" y="185" font-family="monospace" font-size="9" fill="#FFFFFF" text-anchor="middle">O(1)</text>
  <text x="614" y="216" font-family="monospace" font-size="9" fill="#475569">LPUSH queue "job1"</text>
  <text x="614" y="232" font-family="monospace" font-size="9" fill="#475569">BRPOP queue 0  →  blocking pop</text>
  <text x="614" y="248" font-family="monospace" font-size="9" fill="#475569">LRANGE timeline 0 19</text>
  <text x="614" y="265" font-family="monospace" font-size="8" fill="#94A3B8">task queue · activity feed</text>
  <text x="614" y="280" font-family="monospace" font-size="8" fill="#94A3B8">recent items</text>

  <!-- Set -->
  <rect x="318" y="302" width="268" height="122" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="318" y="302" width="268" height="28" rx="8" fill="#FCE7F3"/>
  <rect x="318" y="316" width="268" height="14" rx="0" fill="#FCE7F3"/>
  <text x="440" y="321" font-family="Inter,sans-serif" font-size="11" fill="#9D174D" font-weight="700">Set</text>
  <rect x="524" y="304" width="55" height="18" rx="4" fill="#DB2777"/>
  <text x="551" y="317" font-family="monospace" font-size="9" fill="#FFFFFF" text-anchor="middle">O(1) avg</text>
  <text x="336" y="348" font-family="monospace" font-size="9" fill="#475569">SADD online:users "user:1"</text>
  <text x="336" y="364" font-family="monospace" font-size="9" fill="#475569">SISMEMBER → true/false</text>
  <text x="336" y="380" font-family="monospace" font-size="9" fill="#475569">SUNION tagA tagB</text>
  <text x="336" y="397" font-family="monospace" font-size="8" fill="#94A3B8">unique visitors · deduplication</text>
  <text x="336" y="412" font-family="monospace" font-size="8" fill="#94A3B8">tags · friend lists</text>

  <!-- Pub/Sub -->
  <rect x="596" y="302" width="285" height="122" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="596" y="302" width="285" height="28" rx="8" fill="#E0F2FE"/>
  <rect x="596" y="316" width="285" height="14" rx="0" fill="#E0F2FE"/>
  <text x="718" y="321" font-family="Inter,sans-serif" font-size="11" fill="#0369A1" font-weight="700">Pub/Sub</text>
  <rect x="833" y="304" width="41" height="18" rx="4" fill="#0284C7"/>
  <text x="853" y="317" font-family="monospace" font-size="9" fill="#FFFFFF" text-anchor="middle">O(N)</text>
  <text x="614" y="348" font-family="monospace" font-size="9" fill="#475569">PUBLISH chat:room1 "Hello"</text>
  <text x="614" y="364" font-family="monospace" font-size="9" fill="#475569">SUBSCRIBE chat:room1</text>
  <text x="614" y="380" font-family="monospace" font-size="9" fill="#475569">PSUBSCRIBE chat:*</text>
  <text x="614" y="397" font-family="monospace" font-size="8" fill="#94A3B8">real-time · notifications</text>
  <text x="614" y="412" font-family="monospace" font-size="8" fill="#94A3B8">fire-and-forget · no persistence</text>

  <!-- Bottom bar -->
  <rect x="318" y="432" width="563" height="20" rx="4" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="600" y="446" font-family="monospace" font-size="8.5" fill="#065F46" text-anchor="middle">Lua scripts · EXPIRE/TTL · Cluster 16384 slots · AOF fsync=always · WAIT for sync replication</text>
</svg>
