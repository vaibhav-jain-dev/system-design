<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 140" fill="none">
  <defs>
    <linearGradient id="bg-redis" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A0A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="240" height="140" fill="url(#bg-redis)" rx="10"/>

  <!-- Redis logo-style hexagon -->
  <polygon points="120,18 148,34 148,66 120,82 92,66 92,34" fill="#1A0A0A" stroke="#DC2626" stroke-width="2"/>
  <!-- Inner hexagon layers (stack effect) -->
  <polygon points="120,24 144,38 144,62 120,76 96,62 96,38" fill="#1E293B" stroke="#EF4444" stroke-width="1.5"/>
  <!-- R letter -->
  <text x="120" y="56" font-family="monospace" font-size="22" fill="#EF4444" text-anchor="middle" font-weight="700">R</text>

  <!-- Lightning bolt = fast -->
  <path d="M 155 25 L 148 42 L 155 42 L 148 60 L 162 38 L 154 38 Z" fill="#F59E0B" opacity="0.9"/>
  <text x="175" y="45" font-family="Inter,sans-serif" font-size="9" fill="#FCD34D" font-weight="600">Sub-ms</text>
  <text x="175" y="57" font-family="Inter,sans-serif" font-size="8" fill="#D97706">latency</text>

  <!-- Data structures below -->
  <text x="120" y="98" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">Data Structures</text>
  <rect x="16" y="105" width="44" height="22" rx="4" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
  <text x="38" y="119" font-family="monospace" font-size="8" fill="#FCA5A5" text-anchor="middle">String</text>
  <rect x="68" y="105" width="44" height="22" rx="4" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
  <text x="90" y="119" font-family="monospace" font-size="8" fill="#FCA5A5" text-anchor="middle">Hash</text>
  <rect x="120" y="105" width="44" height="22" rx="4" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
  <text x="142" y="119" font-family="monospace" font-size="8" fill="#FCA5A5" text-anchor="middle">ZSet</text>
  <rect x="172" y="105" width="52" height="22" rx="4" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
  <text x="198" y="119" font-family="monospace" font-size="8" fill="#FCA5A5" text-anchor="middle">Pub/Sub</text>
</svg>
