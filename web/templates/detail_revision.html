{{define "detail_revision.html"}}
<div class="revision-root">

  <!-- Header -->
  <div class="revision-header">
    <div class="revision-header-left">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6366F1" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <h1 class="revision-title">Visual Revision Notes</h1>
    </div>
    <div class="revision-header-right">
      <span class="revision-count">{{len .Problems}} problems</span>
    </div>
  </div>

  <!-- TOC -->
  <div class="revision-toc">
    {{range .Problems}}
    <a class="revision-toc-chip" href="#rev-{{.Slug}}">{{.Title}}</a>
    {{end}}
  </div>

  <!-- SVG Diagrams -->
  <div class="revision-diagrams">
    {{range .Problems}}
    <div class="revision-card" id="rev-{{.Slug}}">
      <div class="revision-card-title">
        <a href="/problem/{{.Slug}}" class="revision-card-link">{{.Title}}</a>
        <span class="revision-card-desc">{{.Description}}</span>
      </div>
      <div class="revision-svg-wrap">
        {{index $.RevisionSVGs .Slug}}
      </div>
    </div>
    {{end}}
  </div>

</div>
{{end}}
