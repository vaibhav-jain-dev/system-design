{{define "detail_concept.html"}}
<div class="detail-header">
    <div class="detail-header-top">
        <div class="detail-icon-wrap concept-icon-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div>
            <div class="detail-badge badge-concept">{{.ConceptCategory}}</div>
            <h2 class="detail-title">{{.Concept.Title}}</h2>
        </div>
    </div>
    <p class="detail-desc">{{.Concept.Description}}</p>
</div>

<!-- Appearances section -->
<div class="concept-appearances">
    <h3 class="section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Appears In ({{len .Concept.AppearsIn}} locations)
    </h3>
    <div class="concept-links">
        {{range .Concept.AppearsIn}}
        <a class="concept-link-card concept-link-{{.Type}}"
           hx-get="{{.URL}}"
           hx-target="#detail"
           hx-swap="innerHTML"
           hx-push-url="true"
           href="{{.URL}}">
            <div class="concept-link-type">{{.Type}}</div>
            <div class="concept-link-title">{{.Title}}</div>
            <div class="concept-link-section">
                {{if .Section}}§ {{.Section}}{{end}}
                {{if .Phase}}<span class="concept-link-phase">Phase {{.Phase}}</span>{{end}}
            </div>
        </a>
        {{end}}
    </div>
</div>
{{end}}
