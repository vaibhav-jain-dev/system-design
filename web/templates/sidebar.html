{{define "sidebar.html"}}
<nav class="sidebar-nav">
    <!-- Problems section -->
    <div class="sidebar-section">
        <h3 class="sidebar-section-title">Problems</h3>
        <ul class="sidebar-list">
            {{range .Problems}}
            <li>
                <a href="/problem/{{.Slug}}"
                   hx-get="/problem/{{.Slug}}"
                   hx-target="#detail"
                   hx-swap="innerHTML"
                   hx-push-url="true"
                   class="sidebar-item"
                   onclick="this.closest('.app').classList.remove('sidebar-open'); document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active')); this.classList.add('active');">
                    <span class="status-dot"></span>
                    {{.Title}}
                </a>
            </li>
            {{end}}
        </ul>
    </div>

    <!-- Fundamentals section -->
    <div class="sidebar-section">
        <h3 class="sidebar-section-title">Fundamentals</h3>
        <ul class="sidebar-list" x-data>
            {{range .Fundamentals}}
            <li x-data="{ open: false }">
                {{if .Children}}
                <div class="sidebar-group">
                    <button class="tree-toggle" @click="open = !open">
                        <svg class="chevron" :class="open && 'rotated'" width="12" height="12" viewBox="0 0 12 12"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                    </button>
                    <a href="/fund/{{.Slug}}"
                       hx-get="/fund/{{.Slug}}"
                       hx-target="#detail"
                       hx-swap="innerHTML"
                       hx-push-url="true"
                       class="sidebar-item"
                       onclick="this.closest('.app').classList.remove('sidebar-open'); document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active')); this.classList.add('active');">
                        <span class="status-dot"></span>
                        {{.Title}}
                    </a>
                </div>
                <ul class="sidebar-children" x-show="open" x-transition.duration.200ms>
                    {{range .Children}}
                    <li>
                        <a href="/fund/{{.Slug}}"
                           hx-get="/fund/{{.Slug}}"
                           hx-target="#detail"
                           hx-swap="innerHTML"
                           hx-push-url="true"
                           class="sidebar-item child-item"
                           onclick="this.closest('.app').classList.remove('sidebar-open'); document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active')); this.classList.add('active');">
                            <span class="status-dot"></span>
                            {{.Title}}
                        </a>
                    </li>
                    {{end}}
                </ul>
                {{else}}
                <a href="/fund/{{.Slug}}"
                   hx-get="/fund/{{.Slug}}"
                   hx-target="#detail"
                   hx-swap="innerHTML"
                   hx-push-url="true"
                   class="sidebar-item"
                   onclick="this.closest('.app').classList.remove('sidebar-open'); document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active')); this.classList.add('active');">
                    <span class="status-dot"></span>
                    {{.Title}}
                </a>
                {{end}}
            </li>
            {{end}}
        </ul>
    </div>
</nav>
{{end}}
