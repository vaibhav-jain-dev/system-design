{{define "detail_pattern.html"}}
<div class="detail-header">
    <div class="detail-header-top">
        <div class="detail-icon-wrap pattern-icon-wrap">{{slugIcon .Pattern.Slug}}</div>
        <div>
            <div class="detail-badge badge-pattern">Design Pattern</div>
            <h2 class="detail-title">{{.Pattern.Title}}</h2>
        </div>
    </div>
    <p class="detail-desc">{{.Pattern.Description}}</p>
</div>

<!-- Content section -->
<div class="detail-content">
    {{if .Content}}
    {{.Content}}
    {{else}}
    <div class="no-content">
        <p>Content not yet written.</p>
        <p class="no-content-path">Create: <code>content/{{.Pattern.Path}}/index.html</code></p>
    </div>
    {{end}}
</div>
{{end}}
