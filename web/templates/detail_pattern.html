{{define "detail_pattern.html"}}
<div class="detail-header">
    <div class="detail-header-top">
        <div class="detail-icon-wrap pattern-icon-wrap">{{slugIcon .Pattern.Slug}}</div>
        <div>
            <div class="detail-badge badge-pattern">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4c0 1.95-1.4 3.57-3.25 3.92L12 22"/><path d="M12 2a4 4 0 0 0-4 4c0 1.95 1.4 3.57 3.25 3.92"/></svg>
                Design Pattern
            </div>
            <h2 class="detail-title">{{.Pattern.Title}}</h2>
        </div>
    </div>
    <p class="detail-desc">{{.Pattern.Description}}</p>
</div>

<!-- Content section -->
<div class="detail-content">
    {{if .Content}}
    {{.Content}}
    {{else}}
    <div class="no-content">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
        <p>Content not yet written.</p>
        <p class="no-content-path">Create: <code>content/{{.Pattern.Path}}/index.html</code></p>
    </div>
    {{end}}
</div>
{{end}}
