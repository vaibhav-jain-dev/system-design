version: "3.9"

services:
  dashboard:
    build: .
    ports:
      - "8096:8080"
    volumes:
      # Mount content for live editing without rebuild
      - ./content:/app/content
      # Mount output for PDF persistence
      - ./output:/app/output
      # Mount engine for live editing
      - ./engine:/app/engine
    environment:
      - PORT=8080
    restart: unless-stopped
